body:
  text: 後漢光武皇帝紀卷第七袁宏十三年春正月戊子詔曰往年勑郡國勿因計吏有所進獻今故未止非徒勞役道途所過未免煩費巳勑太官勿復受其遠方食物乘輿口實可以薦宗廟者即如舊制時有獻善馬日行千里寶劒直百金馬以駕鼓車劒以賜騎士上雅性不喜聽音樂手不持珠玉征伐常乘革車用事而巳及公孫述平傳送鼓師葆車然後乘輿器服漸備物焉二月馬武軍下曲陽以備胡冦丁亥太原王章為齊公魯王興為魯公五月殷紹嘉公為宋公周承休公為衛公徙鄧禹為髙密侯食四縣上以禹功大封弟寬為明親侯禹以特進奉朝請袁宏曰古之明君必降巳虗求以近輔佐之臣所以寄通羣方和睦夭人古之賢臣必擇木棲集以佐髙世之主主以宣明不以道勝而不招臣務對􅏡不以時艱而不進及其相遇若合符契功髙而尊禮其人師喪而不咎其敗此三代君臣所以上下休喜比德天地末世推移其道不純務巳尚功舋自外入君臣之契多不全矣唯燕然和樂終始如一風塗擬議古之流矣髙祖之興蕭公之力也且暫亡若失左右手及天下巳定無所用之賴鮑生之說以濟其身狼虎塗跣卒入囹圄子房玄算髙祖之蓍龜也始者相得非子房不謀也海內既安杜門不出假託神仙僅乃獲免光武之在河北未知身首安寄也鄧生杖策深陳天人之㑹舉才任使開拓帝王之略當此之時臣主歡然以千載俄頃也洎關中一敗終身不得列於三公俯首頓足與夫列侯齊伍嗚呼彼諸君子皆嘗乘雲龍之㑹當帝者之心鞠躬謹密猶有若斯之難而况以勢相從不以義合者乎山桑侯王常東光侯耿純薨是時有上書言宜令司􅘗校尉督察三公司徒掾蒼梧陳元上疏曰臣聞師臣者帝賔臣者王故武王以太公為師齊桓公以管夷吾為仲父古之道也近魏文侯友田子諸侯不敢入其境髙皇帝令相國奏事不拜入殿不趨所以寵大臣也及新室王莽遭漢中衰獨操國柄以偷天下況巳自喻不信羣臣奪公輔之任損宰相之威然不能禁天下之謀身為世戮故人君患在自驕不患驕臣失在自任不在任人方今四方未集百姓未一觀聽者注耳目之時也陛下宜修文武之典襲祖宗之德屈節待賢以示將來不宜有司察公輔之名也上善其言南陽太守杜詩上書曰臣聞唐虞以股肱康而文王以多士寧是故詩稱濟濟書曰良哉臣詩竊見故大司徒伏湛自行束修無所毁玷篤信好學守死善道經為人師行為儀表在平原吏民畏愛遭世反覆城郭不傾秉節持重不可推移陛下深見臧否顯以宰相微過斥退久而不用湛德足以左右王室名足以昭示遠人前者選擇諸侯以為公卿所以砥礪藩屏勸進忠信湛宜任宰相輔佐之官夏詔徴湛既到即入見賞賜浸渥將用之暴病薨賜祕器上親弔祠伏氏世以經學清約相承東州號曰伏不鬬由家風化道然也湛兄子恭明帝時為司空大司徒侯霸薨上傷惜之親自臨弔詔曰惟霸積善之德久而益彰清潔之操白首彌厲漢之舊制丞相拜日封為列侯頃以軍旅暴露功臣未受國邑録忠臣之心不欲先饗其寵故未爵命其追爵諡霸使襲其後於是封霸為則鄉侯諡曰哀侯臨淮吏民聞霸薨莫不隕涕共為立祠四時祭之十四年春正月胸奴遣使來獻中郎將劉襄使胸奴夏四月辛巳封孔子後孔志為褒城侯越嶲人任貴遣使降九月莎車王賢善王心信遣使奉獻濟南太守王梁薨初梁為河南尹穿渠引穀水以注洛陽城下渠成而不流有司奏劾梁梁慙懼上書乞骸骨上乃徙梁為濟南相更封阜城侯十五年春二月大司馬吳漢將馬武等徙鴈門代郡上谷民遷中山以避胡冦於是馬武殺軍吏詔命武將妻子就侯國武自歸京師天子削武五百戶更封為楊虗侯武好酒敢直言時醉在上前面折同列言其短長無所回避上恣聽之上嘗與功臣宴飲歷問曰諸君不遭際㑹與朕相遇能何為乎鄧禹對曰臣嘗學問可郡文學上笑曰言何謙也卿鄧氏子志行修整可掾功曹各以次對至武曰臣以武勇顯可為守尉督盜賊帝笑曰且不為盜賊自致亭長斯可矣袁宏曰夫夀夭窮逹有生之分也得失悲欣萬物之情也故推分而觀帝王之與布衣竹柏之與朝菌焉足言哉以情而談一顧之與暫毀傾蓋之與脫驂猶尚可為歡戚而況大斯哉夫能與造化推移而不以哀樂為心者逹節之人也自斯巳還屬於方域得之不能不欣喪之不能不戚故原得失之大而天下所必同者莫尚於通塞乎然才髙者宜通而懷寶以之陸沈德薄者必卑而鄙夫以之竊位是則通塞可得而遇否泰難得而期也君子或因風雲之勢以建山嶽之功乘日月之末光以成一匱之業雖著功美於當年猶欣一遇於千載若夫版築漁釣織箔鼓刀韞櫝胸懷與之朽爛者焉可數哉至如樂毅之遇於燕昭屈原之事於楚懹白起之用於秦王范增之奉於項籍雖終同顛沛猶一申其志誠未足以語夫通塞者乎白首抱關轉死溝壑者何殊間哉夫以鄧生之才參擬王佐之略損翮弭鱗棲遲刀筆之間豈以為謙勢誠然也及其遇雲雨騰龍津豈猶吳漢之疇能就成天之構馬武之徒亦與鸞鳳參飛由此觀之向之所謂通塞者豈不然乎初有司請封皇子天子弗許也固請連年乃從之四月戊申封皇子輔為右翊公英為楚公陽為東海公康為濟南公延為淮陽公荆為山陽公衡為臨淮公焉為左翊公京為琅邪公是日天子思李通之功乃封通少子雄為邵陵侯袁宏曰書稱協和萬邦易曰萬國咸寧然則諸侯之治建於上古未有知其所始者也嘗試言之曰夫百人聚不亂則散以一人為主則斯治矣有主則治無主則亂故分而主之則諸侯之勢成矣總而君之則王者之權定矣然分而主之必經綸而後寧總而君之必統體而後安然則經綸之方在乎設官分職因萬物之所能統體之道在乎至公無私與天下均其欲故帝王之作必建萬國而樹親賢置百司而班羣才所以不私諸巳共饗天下分其力任以濟民事周禮天子之田方千里公之田方五百里侯伯子男降殺之謂之五等雖冨有天下綜理不過王畿臨饗一國政刑不出封域故衆務簡而才有餘所任輕而事不滯諸侯朝聘所以述職納賦盡其禮敬也天子巡狩所以觀察風教知其善惡也功德著於民者加地進律其有不善者則明九伐之制是以世祿承襲之徒保其富厚而無苟且之慮修績述官之疇務善其禮不為進取之計故信義著而道化成名器固而風俗淳推之百世可久之道也爰自唐虞至于三代文質相因損益有物諸侯之制存而不革長世育民所由遠矣及王略不震諸侯違度官失其序民移其業然而衆國扶持大小相制雖疆毅之國不能擅一時之勢豪傑之士無所騁嘯咤之心昔周室微弱政教陵遲桓文翼戴二國是賴憂勤王室則諸侯慕而率從振而驕之則九國叛而不至楚恃江漢秦據崤函心希九鼎志存神器然畏迫宗姬忌憚齊晉歷載八百然後降為庶人豈非列國扶疏根深難拔巳然之效哉戰國之時志在兼並伐國而貪其民得邑而置其私而郡縣之勢萌矣秦有天下覽周之弊毁廢五等因而用之傾天下之珍以奉一身之欲舉四海之務以關一人之聽故財有餘而天下分怨不理而四海叛髙祖既帝鑒秦之失分裂膏腴封殖子弟至於將相功臣租稅而巳郡縣之官即而弗改夫畫土分民止於親戚班爵施勞不逮功賢猶賴宗室之固以折諸吕之難况萬國親賢兼樹者哉文帝時賈誼言曰夫欲天下之安莫若衆建諸侯而少其力使海內之勢若身之使臂臂之使指則諸國之君莫有異心輻湊並進而歸命天子矣文帝不從卒有吳楚之變忿而懲之大懼諸侯推恩以分其國因事以削其邑枝葉既落本根從焉遂使王莽假託恩道揖讓稱帝豈不易哉光武中興振而復之奄有天下不失舊物而建封略一遵前制諸侯禁網日月增密末世衰微遂以卑弱宗室懼於罪敗同姓挫於庶民一夫攘臂故以能亂天下矣由此觀之五等之治歷載彌長君臣世及莫有遷去雖元首不康諸侯不為失政一國不治天下不為之亂故時有革代之變而無土崩之勢郡縣之立禍亂實多君無常君之民尊卑迭而無别去來似於過客人務一時之功家有苟且之計機務充於王府權重并於京師一人休明則王政略班海內元首昏暗則匹夫擬議神器是以閨闥不净四海為之鼎沸天網一㢮六合為之窮兵夫安勢著於古今歷代之君莫能創改不欲天下不亂其可得乎嗚呼帝王之道可不鑒歟癸丑追尊兄縯曰齊武公仲曰魯哀公盧芳自胸奴入髙柳左馮翊蓋延薨是時天下墾田多不實百姓嗟怨諸郡各使吏奏事帝見陳留吏其牘下疏云頴川弘農可問河南南陽不可問詔吏吏誑言於長壽街上得之東海公陽在幄後因言曰吏受郡勑欲以墾田民相比方詔難曰即如此何故言河南南陽不可問對曰河南帝城多近臣南陽帝鄉多近親故田宅不可問乃詰吏吏具服如陽言由是帝彌重陽也十六年春二月交址女子徴側徴二反九真日南合浦竝為盜賊三月辛丑日有蝕之冬十月盧芳降封芳為代王是時天下刺史太守以墾田不實下獄死者十餘人於是南郡太守劉隆亦繫獄上以隆功臣也免為庶人上從容問虎賁中郎將馬援曰吾甚恨前殺牧守多也援曰死得罪何多之有但死者既往不可復生上大笑其順時不忤皆此類也援長七尺五寸踈眉美鬚博通多間於進對善說前言往事與上言舊時三輔長者閭里豪傑皇太子諸王聽之無倦上知援智有餘甚見親重十七年春二月乙未晦日有蝕之夏四月上幸滎陽頴川章陵六月癸巳臨淮公衡薨秋七月廬江費登等反虎賁中郎將馬援平之冬十月辛巳皇后郭氏廢立皇后隂氏初郭后寵衰數懷怨恚廢東門侯郅惲上書曰臣聞夫婦之間父不能得之於子君不能得之於臣況臣欲得之於君乎是臣所不敢也雖然願陛下念其不可勿亂大倫使天下有議社稷者上善之曰惲恕巳而量主知我必不可以所私而輕天下者也隂后南陽新野人更始元年世祖納后于宛方北之洛陽令后歸新野止宛宛中少黨諸隂鄧鄉里豪居能自讓建武初迎后於育陽為貴人上以后性寬仁欲立之后輒退讓自陳不足以當大位時郭后以生太子疆故遂立郭后及后生東海王陽而寵益盛后性慈仁十嵗喪父語及之未嘗不流涕上常言希見親不在巳數十年語及之輒涕者追爵諡后父隆為宣恩侯以兄識為侍中封元庶侯識弟興為期門僕射興弟就襲父爵更封新陽候識字次伯齊武王時以率宗人賔客為偏禆矣及隨世祖征伐數有戰功將益其邑識辭曰天下初定將帥有功者衆臣幸託屬掖庭賞賜豐衍如復加爵邑此親戚受賞國人計功也不可以示天下上甚美之興字君陵筋力過人其從出入常操小蓋鄣翳風雨泥塗狹隘躬自履涉上所幸止必先入清宫居則博觀五經訪問收事尊賢下士廣求得失獻善替否薦逹後進好施接人門無遊俠與張宗等不相好知其有用猶稱其所長而逹之張汜之徒與興厚善以為華而少實但私之以財終不為言是以世稱其忠起第宅采椂粗朴足避風雨常稱豐屋之戒若不修德雖有崇臺廣厦猶傳舍也上嘗封興置印綬前興國讓曰未有先登陷陳之功而一家數人受爵土令天下觖望至讓不願臣蒙陛下中宫恩澤至厚可謂冨貴巳極不可復加上見其讓切不奪其志皇后問故興曰后不讀書記邪亢龍有悔多見不知量外戚家若不知謙嫁女欲得因力配尊貴娶婦求公主愚心實不安也富貴有極當知足驕奢益為觀聽所譏后悅其言不為宗親求位以干王政就剛強不順理頗以貴勢傲物扶風人井丹髙抗之士也諸王貴人更請丹莫能致就自以為能致丹詭諸王錢二萬使人通丹致之丹不得巳乃詣就為丹設麥飯𬞞食丹推去之曰以君侯為能供美食故相過耳何謂如此就更為置盛饌及就起左右進輦丹笑曰聞桀乘人車此其是邪坐中皆失色莫之敢應就即為去輦談論盡日乃去以其名髙就等無敢失意者丹亦終身不仕明帝𥘉就為少府子豐尚酈邑公主公主驕妒豐亦狷狹遂殺公主豐誅死就自殺家屬歸本郡郭后既廢太子太傅張湛稱疾引退為太中大夫上欲以湛為大司徒湛至朝堂坐遺小便自稱疾篤遂不用卒于家湛字子孝右扶風平陵人舉動必以禮雖幽室間處不易其度閨門之內若嚴君焉三輔歸之以為儀表成哀間為二千石王莽時歷守尉建武初為左馮翊修禮教明好惡政化大行嘗告歸平陵望縣門而下車主簿進曰明府位尊德重不宜自輕湛曰禮下公門式路馬孔子於鄉黨恂恂如也父母之國所宜盡禮湛𬒳徴當還馮翊曰舊令尹之政必以告新令尹湛曰君以德進湛以罪退逡巡而去湛常乘白馬上每有異政輒言白馬生且復諫矣壬午徙左馮翊公輒為中山王諸國公皆為王是嵗鳳皇五集頴川郡衆鳥竝從行列蓋地數頃留止七十日十八年春二月蜀郡史歆反巴郡宕渠楊偉徐客等各起兵以應歆大司馬吳漢臧宮擊之壬午上幸長安祠園陵夏四月伏波將軍馬援扶樂侯劉隆樓船將軍殷志平樂侯韓宇擊交址至合浦殷志病死援當浮海入交址船少不足渡乃問山行者遂浮海隨山開道千餘里自西至浪泊擊徴二等降者數千人韓宇後病死援並將其衆追徴二等至禁溪連破之二等各將數百人走戊申上幸河內五月代王芳復入胸奴六月壬戌赦益州殊死巳下亡命者秋史歆等平吳漢徙偉客等二百餘戶于長沙冬十月􅏤辰上幸南郡還祠章陵辛丑追諡外祖父樊重為壽張敬侯重字君雲家世溫厚三世不分財重居家有法子孫進見如吏其治家僮僕無逰手身自隱親故能殖其財田至三百頃資至巨萬其興功造作為無窮之規欲治器物則先種梓漆人皆笑之然卒得其用居家擬於邦君外孫何氏兄弟爭財重耻之以田二頃解其訟由是縣邑敬其德讓重八十餘而終不索假貸者可百餘萬臨困悉削文書不告兒子債家聞之皆爭往償之諸子不受也中子密字靡卿初與齊武王共起義兵湖陽收繫妻子將殺之湖陽令曰樊重父子有禮行於鄉里正有大罪且當在後何可殺耶宗家亦有繫者多被害唯密妻子得免後隨世祖征伐數有勤勞封壽張侯密謙恭畏慎不汲汲於官位父子內相勑戒以富貴盈溢未有能終者吾非不嘉榮勢也天道惡盈而好謙畏天道耳前世貴戚可明戒也保身全命云不樂哉每當朝㑹輒俯伏須漏盡雖令不朝恐有謬誤猶晨詣闕下上以是尤重之時見得失乃獻便宜輒自手書削藁公卿朝見訪政事終不敢對疾病上自臨視垂涕問所欲密自陳身無功食大國誠恐子孫不能保全大恩令臣魂神慙負黃泉願還壽張食小鄉亭上悲傷其言後復封密小子茂為平望侯臨薨勑諸子薄葬靜掃閉戶物不得所下與夫人同塜異藏各自一延道以死生各異棺柩一藏不當復見如有腐敗傷孝子心朝廷善之諡曰恭侯初兵革起而皇妣薨宗人樊臣公獨親殯斂世祖即位擢為中大夫固始侯李通薨諡曰恭侯賜甚盛上及皇后親弔送葬十九年春正月巷人傅鎮反臧宮擊之東海王陽曰賊相迫劫反耳其中必有欲悔者今圍之急不如小緩之令得亡逃亡逃亭長足以取之從之賊果破走馬援斬徴二等二月封援為新息侯設牛酒勞軍士因撫觴而言曰吾從弟少遊哀吾慷慨多大志曰人生一世但求衣食仕官不過郡掾吏守墳墓護妻子鄉里稱善人斯可矣安用餘為當吾在浪泊西時下潦上霧毒氣浮蒸仰視飛鳶跕跕墮水中憶少游語何可得也今賴諸士大夫之力而吾先受其賜所以喜且愧也坐者聞之莫不歎息之袁宏曰少遊之言有心哉人之性分靜躁不同或安卑素守隱約顧視榮名忽若脫履彼二塗者終之以道亦各一家之趣也然功業難就而卑素易從而古今之士莫不自託於功務而莫肯於間逸者將自負其才顧衆而動乎然則榮名功業非為不善也千載一遇處智之地難也若夫安素守隱其於人間之歡故以易而無纍矣然苟非夷塗外物難必螻蟻且能為害而况萬物乎故久處貧賤誠有志者之所耻也歸終而言取保家之主乎詔援復擊九真自無功至居風斬首三千餘級徙其渠帥數百家於零陵援所過令治城郭修溉灌申舊制明約束是後駱越常奉馬將軍故事自郭氏廢後太子疆不自安郅惲勸之曰久處疑位上違孝道下近危殆昔髙宗賢君吉甫令臣及有纎芥放逐孝子春秋之義母以子貴太子宜引愆退身疆遂因左右陳誠願備藩輔世祖遲回者久之乃許焉十月戊申皇太子強封東海王食東海魯國二郡租賦之稅車服之飾加於諸王疆上書讓東海又因太子口陳至誠上不許以彊章示公卿而嘉歎之袁宏曰夫建太子以為儲二所以重宗統一民心也非有大惡於天下不可移也世祖中興後漢之業宜遵統一之道以為後嗣之法今太子之德未虧於外內寵既多嫡子遷位可謂失矣然東海歸藩謙恭之心彌亮明帝承統友于之情愈篤雖長幼易位興廢不同父子兄弟至性無間夫以三代之道處之亦何以過乎惲字君章汝南西平人志氣髙抗不慕當世王莽末民不堪命惲西至長安上書諌莽曰臣聞智者順命以成德愚者逆以取害神器有命正不可虗獲上天垂戒欲以陛下就臣位陛下宜順天命轉禍為福如不早圖是不免於竊位也天為陛下嚴父臣為陛下孝子父教不可廢子諌不可難惟陛下留神莽大怒即下詔獄劾惲大逆猶以惲據正義難即害之使黃門近臣脅導惲令為病狂恍惚不自知所言惲終不轉曰所言皆天文聖意非狂人所能造遂繫經冬㑹赦得免因南遊蒼梧建武初自蒼梧還鄉里縣令卑身崇禮以為門下掾惲感其意遂為之屈惲友人董子張父及叔父為人所害子張病困惲往候子張子張絶良久氣復還視惲􅒣欷惲曰吾知子不悲天命長短而痛心二父讎不復也子張卧目擊惲惲即起將客追仇人取其頭以示子張子張悲喜氣便絶惲即詣令自首令應之遲惲曰為交報仇吏之私也奉法不阿君之義也虧君生身非節也趨出詣獄令跣追之拔刀自向曰子不出吾以死明之惲隨令出久之為郡功曹汝南舊事冬饗百里內縣皆持牛酒到府宴飮時太守歐陽歙饗禮訖教曰西部督郵繇延天資忠貞稟性公方典部折衡推破姦雄書曰安民則惠黎民懷之蓋舉善以教則不能者勸今與衆儒共論延功顯之于朝太守敬嘉厥休牛酒以養德主簿讀教戶曹引延受賜惲前跪曰司正舉觥以君之罪告謝于天明府有言而誤不可掩覆按延質性貪邪所在荒亂虐而不治冤慝竝作百姓怨之而明府以惡為善股肱莫爭此既無君又復無臣君臣俱喪孰舉有罪君雖顛危臣子扶持不至於亡惲敢再拜奉觥歙甚慙門下掾鄭次都曰君明臣直功曹言切明府之德也可無受觥哉太守曰實歙罪也敬舉觥惲乃免冠曰昔虞舜輔堯四罪咸服讒言弗行故能作股肱帝用有歌惲不忠孔壬是昭績言象龍豺獸從政既誹謗而又露言罪莫重焉請收惲延以明好惡歙曰是吾過也遂不宴而罷惲歸府因稱病延亦退次都素清髙與惲厚招惲去曰道不同不相為謀自古而然子直心誠三代之道繇延雖去必復還吾不忍見子有不容君之危盍去乎惲曰孟軻以彊其君所不能為忠也量君之所不能為賊也惲業彊之矣障君於朝而不死職以求直罪也延退惲又去不可次都遂去隱於弋陽山中居數月延果復召惲即去從次都止漁釣甚娛留數十日惲喟然歎曰天生俊士以為民無乃違命而亂倫乎鳥獸不可與同羣子從我為伊尹乎將為巢許而辭堯也次都曰吾足矣幸得全軀種類還奉墳墓盡其學問道雖不行施之有政是亦為政也吾年耄矣安得從子子勉正命勿勞神以害生各别去惲客於江夏郡舉孝廉為郎遷帝東城門候世祖嘗夜出還詔開欲入惲不內上令從門舉火射帝面惲對曰火明遼遠遂距不開明日惲諌曰昔文王不敢盤遊于田以萬民惟正陛下既遊獵山林夜以繼晝其如社稷宗廟何暴虎馮河可為至戒小臣所竊憂也由是上重之令授太子詩常講殿中後為梁令長沙太守崇教化表異行上使執金吾隂識護太子家博士桓榮授太子經二人者皆專心輔導勸以德義太子亦虗納焉秋九月壬申上幸南陽冬十二月越嶲太守任貴反武威將軍劉尚平之二十年夏六月徙中山王輔為沛王秋馬援自交趾還位班九卿賞賜甚厚援將至京師故舊迎之平陵人孟冀計謀之士也以援自遠而還勞而賀之援曰我望卿有竒也但復與衆人同語邪武帝時伏波將軍路博德開七郡封符離侯數百戶今我但平亂郡爾猥封近縣且三千戶國家追録我和􅊈隴間功我自視功薄賞厚人當功厚賞薄於後乃長先生欲何用相濟冀曰愚不及是援曰今尚有胸奴烏桓擾北邉我欲自請擊胸奴男兒要欲死於邉野以馬革裹尸還葬矣反卧牀上於兒女子手中死邪兾曰諒為烈士當如此矣㑹胸奴入右北平詔以事示援遂自擊北邉十月上幸東海沛國省五原郡徙其吏民于河東十二月伏波將軍馬援出定襄上以援勤勞賜縑千匹援謂黃門竇固太僕梁松曰凡人富貴當使可復賤也如公等貴欲不可賤居髙益堅願思吾言有識聞援言無不歎息大司馬吳漢薨諡曰忠侯葬如霍光故事漢性彊力每從征伐上未安漢不敢息軍有利鈍諸將或失其度漢常自厲吏士益治兵器上時令人視之曰吳公方修戰攻具上嘗曰吳公如此隱若一敵國矣及在朝廷唯公天下嘗旱公卿請雨不得漢乃悉出其僮僕一時免之漢又嘗出征妻子在後買田安業漢還讓妻子曰軍帥在外吏士不足何多買田宅乎遂盡以分付昆弟外家其忠自天性故能常任禮以功名終是時上欲以衛尉隂興為大司馬興叩頭曰臣不敢惜身誠恐虧損聖德辭讓至切上以此聽之乃以扶樂侯劉隆為驃騎將軍行大司馬事二十一年秋八月馬援以三千騎出髙柳失道還胸奴鮮卑冦遼東太守祭􅊮率吏士擊之斬首二千餘級遂窮追出塞復斬首千餘級收其兵器得馬數千匹由是胸奴鮮卑震服不敢窺塞彤乃思所以離間二寇以分其勢招呼鮮卑示以財利鮮卑後不𣢾塞彤之計也冬十月胸奴入上谷中山殺掠吏民西域鄯善王安莎車王賢等十六國遣使奉獻咸願請都護上以中國初定未遑外事厚加賞賜遣之大司空竇融以疾策罷嵗餘行衛尉事融數稱疾乞骸骨賜錢帛太官致珍竒弟顯親侯友薨上愍融年衰遣中常侍即其卧內彊進酒食是時郡國皆大水百姓饑饉光祿勳杜林上疏曰臣聞先王之道明聖用而治同也其見惡如農夫之務去草焉芟夷藴崇之勿使能殖防其漸也狼子野心奔馬善驚成王深知其患故以殷民六族分伯禽七族分康叔懷姓九族分唐叔檢其姦軌又遷其餘衆於成周所以挫其彊禦之力黜其驕恣之心及漢初興上稽舊章同符在昔徙齊諸田楚昭屈景燕趙韓魏之後以削弱六國彊宗故邑里無見利之家山澤無兼並之民萬里一統海內賴安其後輒因衰粗之痛脅以送終之義故遂相率而陪園陵無反顧之心追觀往政皆神道設教彊幹百世之要也是以永享康寧之福而無怵惕之憂繼嗣承業恭巳而治蓋此之助也今被災之民輕薄無重者可徙於饒榖之郡所以清散其凶全其性命也昔魯隱有賢行將致國於桓猶留連貪不能早退況草創豪帥本無業徒因攘擾之時擅有山川之利雖遇災然其狃泰之意僥幸之望蔓延無足不可不察也上察林才堪任宰相㑹司空缺乃以林為司空林自為九卿至三公輒每上封事及與朝廷之議常依經附古不苟隨於衆為任職相上亦雅善之雖在公卿講授不倦學者朝夕滿堂士以慕之初林薦杜陵人申屠剛抗直之士嘗慕史魚汲黯之為人避亂西州每諫爭隗囂義形於色上以剛為侍御史遷尚書謇謇多直言無所屈撓是時隴蜀未平上嘗欲近出剛諫上不聽剛以頭軔乘輿車輪不得前乃止剛數犯嚴顏由是出為隂平令徴為太中大夫以病去終于家後漢灮武皇帝紀卷第七
