body:
  text: 後漢孝桓皇帝紀下卷第二十二袁宏四年春正月辛丑南宫嘉德殿火二月壬申武庫火夏四月甲寅河間孝王遷為王五月有星孛于大辰丁卯源陵長壽門火六月羌寇金城安定漢陽武威殺吏民中郎將皇甫規討羌大破之先是涼州刺史郭閎漢陽太守趙喜安定太守孫俊皆不任職倚恃貴戚有司不敢紏規悉條奏其罪羌人聞之翕然乃喜一時降者二十餘萬口徴拜議郎論功未畢常侍左悺私求於規規執正不許悺遂以餘冦不絶收規下獄學生張鳯等三百餘人守闕訟規終不省規竟坐論會赦復徴為尚書頃之復為中郎將討梁益叛羌有功封喜城侯固讓不受規字威明安定朝那人初譏切梁氏謝病歸教授十餘年兾既誅旬月之間禮辟五至皆不就公車徴乃起為太山太守規好推賢逹士太傅陳蕃太尉楊秉長樂少府李膺太守張奐皆規所教授致顯名於世秋八月關內侯以張掖酒泉尚書令陳蕃薦五處士曰臣聞善人者天地之紀治之所由也詩云思皇多士生此王國天誕俊乂為陛下出當輔明時左右大業者也處士豫章徐稚彭城薑肱汝南袁閎京兆韋著潁川李曇德行純備著于民聽冝登論道協亮天工終能翼宣威德增光日月者也詔公車備禮徵皆辭疾不至稚字孺子豫章南昌人也家貧常自耕稼非其衣不服非其力不食恭儉義讓非禮不言所居服其德化道不拾遺陳蕃嘗為豫章太守以禮請署功曹稚為之起既謁而退蕃饋之粟受而分諸鄰里舉有道起家拜太原太守皆不就諸公所辟雖不就其有死喪者負笈徒步千里赴弔斗酒隻雞藉以白茅酹畢便退喪主不得知也初稚少時遊國學中江夏黃瓊教授於家故稚從之咨訪大義瓊後仕進位至三司稚絶不復交及瓊薨當葬稚乃往赴弔進酹哀哭而去人莫知者時天下名士四方遠近無不會者各言聞豫章徐孺子來何不相見推問喪宰曰頃寧有書生來邪對曰先時有一書生來衣粗薄而哭之哀不記姓字僉曰必孺子也於是推選能言語者陳留茅季偉候與相見酤酒市肉稚為飲食季偉請國家之事稚不答更問稼穡之家稚乃答之季偉還為諸君説之或曰孔子云可與言而不與言失人稚其失人乎郭林宗曰不如君言也孺子之為人也清潔高廉飢不可得食寒不可得衣而為季偉飮酒食肉此為已知季偉之賢故也所以不答國事者是其智可及其愚不可及也何不知之乎是時宦豎專政漢室侵亂林宗周旋京師誨誘不息稚以書誡之曰大木將顛非一繩所維何為棲棲不遑寧處林宗感悟曰謹拜斯言以為師表薑肱字伯淮彭城廣戚人隱居靜處非義不行敬奉舊老訓導後進常與小弟季江俱行為盜所劫欲殺其弟肱曰弟年稚弱父母所矜又未聘娶願自殺以濟家弟季江復言曰兄年德在前家之英俊何害之不如殺我我頑暗生無益於物沒不損於數乞自受戮以代兄命二人各爭死於路盜戢刃曰二君所謂義士棄物而去肱車中尚有數千錢在席下盜不見也使從者追以與之賊感之亦復不取肱以物巳歷盜手因以付亭長委去舉有道方正皆不就袁閎字夏甫太傅安之玄孫自安至閎四世三公貴傾天下閎玄靜履真不慕榮宦身安茅茨妻子御糟粳父為彭城太守喪官閎兄弟五人常步行隨柩車號泣晝夜從叔逢隗並為公輔前後贈遺一無所受二公忿之至於州府辟召州郡禮命皆不就韋著字休明京兆杜陵人隱居講授不修世務李曇字子雲潁川陽翟人少喪父事繼母繼母酷烈曇奉逾謹率妻子執勤苦不以為怨曇身耕農以奉供養得四時珍玩未嘗不先拜而後進母鄉里有父母者宗其孝行以為法度徴聘不應唯以奉親為歡夏四月戊辰虎賁掖門火五月康陵園火武陽蠻夷反車騎將軍馮緄討之緄上書曰夫勢得容姦伯夷可疑不得容姦盜跖可信樂羊伐中山反而語功文侯示以謗書一篋願請中常侍一人監軍財費尚書朱穆奏曰臣聞出郊之事將軍制之所以崇威信合事宜也即緄有嫌不當荷任即緄無嫌義不見疑樂羊戰國陪臣猶賴見信之主以全其功況唐虞之朝而有猜嫌之事哉緄設虛端以自阻衛為臣不忠帝寢其奏穆又上書言漢故事中常侍或用士人建武已來乃悉用宦者延平已來寖益貴盛假貂璫之飾任常伯之職天朝政事一更其手權傾天下寵逼人主子弟親戚並荷職任放濫驕逸莫能禁御無行之徒媚求官爵恃勢驕寵漁食百姓臣以為可皆遣罷率由舊章博選天下清純之士逹國體者以輔其虛即陛下可為堯舜之君衆僚皆為稷卨之臣矣上不從穆後復見口陳奏上不悅穆伏不起左右叱穆出於是宦者更共稱詔以詰讓穆憤激發疽而卒公卿以穆立節忠清守死善道冝蒙旌寵以勸忠勤乃追贈益州刺史穆字公叔南陽宛人初為兾州刺史始濟河長吏解印去者四十餘人中常侍趙忠喪父殮為璵璠玉匣穆下郡考正乃至發墓視尸其家稱冤自訴穆坐徴詣廷尉髠輸左校後得原歸家頃之朝臣多為穆怨由是徴命議郎尚書十一月武陵蠻夷降六年春正月戊午司徒种皓薨大鴻臚許栩為司徒皓字景伯河南洛陽人父早亡有財三千萬皓皆以賑鄉里貧者當時豪貴莫不遂識知之年四十四縣始召為門下吏時河南尹田歆外生王諶名知人歆謂之曰河南當舉六孝廉皆得貴人書命不宜相違欲以五副之自舉一清名堪成就者上以報國下以託子孫汝助我索之諶答曰知臣莫若君君為二千石當清察郡中詢于賢良諶安得知之歆曰郡中所送固凡庸耳欲因汝之明狀人之所不知而有竒者耳明日諶東出送客駐車太陽郭裏見皓還語歆曰為君得孝廉矣問為山澤答曰洛陽門下吏也歆笑曰當得隱滯之吏乃洛陽夫耶答曰夫異士不居山谷但其居處異耳德未必有也處人間而有異而人不知己獨知之乃竒耳若不相信可召而與之言歆便於府召見於庭中詰問職事長吏所施行皓分别具對皆有條理乃署主簿功曹舉孝廉由是知名二月戊戌大赦天下夏四月辛亥康陵東署大火秋七月甲午平陵園寢火十月上廣城校獵光祿勳陳蕃上書諌曰臣聞人主有事於苑囿唯西郊順時講武以殺屬助祭盡孝敬之道也違是則為逸遊肆樂情意故臯陶誡舜曰無敢遊逸周公誡成王曰無盤遊于田虞舜成王猶有此誡況德不及二主者哉當今兵戎未戢是陛下焦心坐而待旦之時也而不以是乃揚旌旗之耀騁輿馬之觀非聖賢恤民之意者也上不納七年春二月太尉黃瓊薨瓊字世英江夏安陸人清貞守正進止必以禮居宰相位廉平公正數納讜言為朝廷所重上亦愍惜焉贈車騎將軍邟鄉侯印綬諡曰昭侯有孫曰琬三月癸亥殞石于右扶風太常楊秉為太尉是時中常侍侯覽貝瑗驕縱最甚選舉不實政以賄成秉奏覽等佞諂便僻竊國權柄召樹姦黨賊害忠良請免官理罪奏尚書詰祿曰夫設官分職各有司存三公統外御史察內今越左右何所依據其開公具對秉便對曰除君之惡唯力是視鄧通失禮申屠嘉召而責讓文帝從而請之漢故事三公鼎司無所不統尚書不能詰上不得已乃免覽官瑗削國事於是奏免刺史郡守已下六十餘人皆民之蠧也夏四月乙丑封皇后弟鄧庾為育陽侯秋九月武陵蠻夷叛冦掠數郡荆州刺史度尚討之將戰召尚治中别駕曰今後無轉輸前有強敵吏士捷獲已多緩之則不肯力戰急之則事情切迫濳有逃竄今與諸君俱處虎口勝則功成敗則無餘為之奈何諸從事者莫知所出尚宣言曰今兵實少未可進當復須諸郡兵至且各休息聽其射獵軍中喜踊大小皆出尚密呼所親燔其積聚獵者還莫不涕泣尚使人慰勞曰蠻人多寶足富數世諸卿但不併力耳所亡何足介意其明旦秣馬蓐食徑赴城屯賊見尚晏然不圖其吏士憤激遂尅殄之封右尚鄉侯除一子為郎尚字博平山陽湖陸人也初為上虞長紏摘姦伏縣中謂之神明擢門下書佐朱俊謂之幹世之才俊後顯名終如尚言縣有孝女曹娥年十四父旴溺於江不得尸娥號慕不已遂赴江而死前後長吏莫有紀者尚至官改葬娥樹碑表墓以彰孝行縣民故洛陽市長淳于翼學問淵深大儒舊名常隱於田里希見長吏尚往候之晨到其門翼不即相見主簿曰還不聽停車待之翼晡乃見尚尚宗其道德極談乃退其優賢表善皆類此也冬十月行幸章陵祠舊宅遂有事於陵廟戊辰行幸於雲夢臨水祠湖陽新野公主張敬侯魯哀公廟是時勃海王悝驕慢僣侈不奉法度見上無子隂有嗣漢之望北軍中候史弼上疏曰臣聞帝王之於親戚愛之雖隆必示之以威禮寵之雖貴必示之以法度如是則和親之道興骨肉之情固昔襄王恣甘昭公孝景皇帝驕梁孝王二弟階寵卒用悖慢周有播蕩之禍漢有袁盎之變竊聞勃海王悝恃至親之屬藉偏私之愛有僣慢之心頗不用制度外聚輕薄不逞之徒內荒酒樂出入無常所與群居皆家之棄子朝之斥臣有口無行必有羊勝伍𬒳之類州司不敢彈紏傅相不能匡輔陛下寬仁隆於友于之義不忍遏絶恐遂滋蔓為害彌大乞露臣奏宣示百僚使議於朝明言其失然後詔公卿平處其法法決罪定乃下不忍之詔臣下固執然後少有所許如是則聖主無傷親之議勃海長有享國之祚不然懼大獄將興使者相望於道矣上以至親不問其事弼字公謙陳留考城人歷職忠謇無所傾撓自尚書為平原太守詔書下諸郡察黨人時所在怖懼皆有所舉多至數千人弼獨上言無黨人從事主者坐問責曰詔書憎嫉黨人懇極至諸郡皆有平原何獨無弼對曰先王疆理天下畫為九壤物土不同風俗亦異他郡自有平原自無胡可相比若趨諾詔書誣陷良善平原之人皆為黨乎從事大怒奏弼罪以贖免遷河東太守弼初至鄉勑門下有請一無所通常侍侯覽遣諸生齎書求假鹽稅及有所屬門長不為通生詐稱自言者以見弼弼怒收付獄即日考殺之覽後以誣弼謗誹朝政徴詣廷尉論棄市平原吏民走詣闕訟弼得減死一等刑竟歸田里後數為公卿所薦拜彭城相為政務抑豪強雖有縱放然豪右斂手小民有罪率多恩貸八年春正月使中常侍左悺之苦祠老子上始好神仙之事勃海王悝謀反徙為定陶王丙申晦日有蝕之詔公卿校尉舉賢良方正各一人河南劉淑對曰臣聞立天之道曰隂與陽立人之道曰仁與義故夫婦正則父子親父子親則君臣通君臣通則仁義立仁義立則隂陽和而風雨時矣夫吉凶在人水旱由政故勢在臣下則地震坤裂下情不通則日月失明百姓怨恨則水旱暴興主上驕盈則澤不下流由此觀之君其綱也臣其紀也綱紀整則萬目張君臣正則萬國理故能父慈子孝夫信婦貞兄愛弟順如此則隂陽風雨時萬物得所矣癸未廢皇后鄧氏后驕忌喜與上所幸郭貴人更相譖訴由是故以廢憂死親屬皆免歸本郡三月辛巳大赦天下夏四月丁巳壞諸淫祀壬戌河水清五月丙戌太尉楊秉薨秉字叔節少傳父業隱居教授三十餘年乃應司空之命稍遷刺史二千石所歷皆有政迹雖三公之子經歷州郡常布衣𬞞食老而不改在公卿位朝廷每有得失便盡心正諌退而削草雖子弟不知也秉不飲酒早喪夫人遂不復娶所在以淳明稱嘗曰我有三不惑財酒色有子曰賜亦顯行儒行六月胸奴冦邉郎將度尚擊之九月京師地震冬十月丙寅太中大夫陳蕃為太尉蕃讓曰不僭不忘率由舊章臣不如太常胡廣齊七政訓五典臣不如議郎王暢文武兼資折衝萬里臣不如弛刑司隸李膺上不許蕃又上書曰臣聞昔齊桓公任管仲將正諸侯先為政令今寇賊在外四肢之疾耳臣竊寢不能寐食不能飽憂陛下內政未治忠言日踈前梁兾五侯弄權天啓陛下收而戮之當時天下號為小清其前監未逺旋起覆車之軌矣往年地動日蝕火災皆隂盛之應願陛下割塞左右豫政之原引納尚書朝省之事簡練髙潔斥退佞邪如此則天和於上地洽於下矣從陛下踐祚已來大臣誰敢舉左右之罪往者申屠嘉召鄧通文帝遣詣嘉府乃從而請之三公之職何所不統但令左右驕忿欲令三公不得舉筆臣蕃今擢自閭閻特為陛下日月所照奈何受恩如臣而當避難苟生不敢正言陛下雖厭臣毒言人主有自勉強奏書上不恱愈以疾蕃辛巳立皇后竇氏初憲之誅家屬廢為庶民武字遊平少有學行常間居大澤不交世務諸生自逺方來授業百餘人名聞關西武生五男二女長男紹次機次恪長女妙即后也上以武三輔大族武有盛名后入掖庭逾月立為皇后武甚不樂輿疾至京師拜武為特進城門校尉封槐里侯紹為虎賁中郎將武乃稱疾篤固辭爵位勃海盜賊蓋登自稱太上皇帝伏誅十二月使中常侍管霸之苦祀老子九年春正月沛國盜賊戴異自稱上皇帝伏誅辛酉太常胡廣為司徒三月辛巳京師夜有火光轉相驚譟夏四月庚午河水清平原人襄揩詣闕上書曰臣聞天不言者以文象設教臣竊見往年五月熒惑入紫微犯帝座其閏月太白犯房心於占天子凶三月洛陽城中夜無故云火光人聲正喧於占皆不出三年天子當之春夏已來皆有繁霜皆用刑酷急不當罪使之然也自陛下即位已來誅冦氏孫氏鄧氏其從坐者非一李雲之死天下知其冤也自漢興已來未有諫主𬒳誅用刑太深如今者也昔文王能以一妻享十子之祚今陛下宫女十人不如文王之一妻者明刑重而無德也臣聞布榖聞於孟夏蟋蟀吟於始秋物有微而至信人有賤而必忠臣雖極賤思效愚誠願賜清間極盡所言上即詔尚書召問揩曰臣聞古者本無宦臣孝武末春秋高數遊後宫始置之耳後稍見任至孝順帝時遂益昌熾也按天市內宦者四星不在太微中而在市中明宦者但當侍坐得預內今乃處古常伯之位決謀於中傾動內外恐非天意也天子以揩章及對下有司尚書奏自古有宦者之官非近世所置漢初張澤為大謁者佐絳侯孝文使趙談參乘而子孫昌盛今揩不陳損益而務析言破律違背經義偽託神靈於是論揩司冦戊寅特進竇武為大將軍武移病洛陽都亭固讓至于數十詔公車勿復通章武惶恐不得已就職在公肅而不猛其所交友若陳仲舉李元禮等皆為之論議而計政事焉妻子惡衣食車馬苟全而巳卑身正己率宗族內外僮僕莫敢違法者六月庚午祀老子濯龍中用夜郊而樂鮮卑烏孫冦邉胸奴中郎將張奐擊降之自是宦者專權在位子弟親屬及苟進之士連結依附以取榮寵乘勢肆意陵暴天下於是善人君子懼人倫虧廢發憤忘難初陽翟令張輿黃門張讓弟也多殺無辜贓餘千金李膺初為河南尹收輿考殺之尚書誥膺曰尹視事無幾而多殺伐乎膺對曰昔孔子為魯司冦七日誅少正卯於兩觀之下今臣列官已積二旬私懼稽留為愆反獲速疾之譏膚受之訴以關聖聽自知罪死期不旋踵然臣愚計乞留五月尅殄元惡然後退就湯鑊始生之願也上不省論輸左校頃之起家為司隸校尉振網直繩多所摧戮河東太守單安河內太守徐盛中常侍單超徐璜之弟也憑寵干紀瀆貨害政沛國朱寓嘗為司隸校尉奏安盛曰此等皆官豎昆叔刀鋸之餘橫蒙恩私剖符三河不能思展命力以答天地敢張豺狼之口吞噬百姓之命罪深璺重人鬼同疾臣銜命操斤翦其凶醜輒考核贓罪事皆伏上詔安盛廷尉治罪汝南人范滂字孟博郡召為功曹即騫衣就車急痛於時也進善退惡風教肅然即中不便者咸共疾之所舉者謂之朋黨後為太尉黃瓊所辟登車攬轡有澄清天下之志受詔兾州百姓聞滂名其有贓汙未發者皆解印綬去滂舉刺史二千石二十餘人罪惡者皆權豪之黨也尚書詰滂曰所舉無乃猥多恐有冤疑其更詳核勿拘於前滂對曰臣之所舉自非叨穢姦罪豈以汙臣簡札臣以會日促迫故先舉所聞其未審者方當參實以除凶類臣聞農勤於除草故榖稼豐茂忠臣務在除姦故令德道長滂覩時方艱難知其志不行乃投刺而去於是人耻懼懷謀害正矣山陽人張儉字元節以正直知州舉秀才刺史非其人謝病不起太守翟超臨郡請為東部督郵儉解巾應之儉舉劾中常侍侯覽前後請奪民田三百餘頃第舍十六區皆高樓四周連閣洞殿馳道周旋類於宫省豫作壽塜石椁雙闕高十餘丈以準陵廟破人家居發掘塜墓及虜掠良人妻婦女皆應沒入儉比上書為覽所遮截卒不得上儉行步至平陵逢覽母乘軒道從盈衢儉官屬呵不避路儉按劒怒曰何等女子干督此非賊邪使吏卒收覽母殺之追擒覽家屬賔客死者百餘人皆僵尸道路伐其園宅井堙木刋雞犬器物悉無餘類覽素佞行稱冤於上曰母及親屬無罪橫為儉所殘害皆大將軍竇武前太尉范滂所諷上以儉郡吏不先請奏擅殺無辜徴付廷尉詔收儉儉乃忘命逃竄吏捕之急儉與魯國孔褒有舊後事發覺儉走至東萊李篤家督郵毛欽操兵至篤家引欽就席曰明廷何為枉駕自屈欽曰張儉負罪入君門是以來耳篤曰儉負罪亡命篤豈得藏之若審在此此人名士明廷寧冝執之欽因起撫篤背曰蘧伯玉耻獨為君子足下為仁義奈何獨專美邪篤曰今欲分之明廷載半去矣欽歎息而去篤道儉經北海戲子然家送入漁陽出塞得免其所經歷子然之徒皆伏誅儉親屬內外並皆滅盡於是佞幸內憾媚上思報矣初河內張成道術士也知當大赦使女殺人李膺之為司隸收成殺之是秋覽等教成弟子牢順上書曰司隸李膺御史中丞陳蕃汝南范滂頴川杜密南陽岑晊等相與結為黨誹謗朝廷迫脅公卿自相薦舉三桓專魯六卿分晉政在大夫春秋所譏九月詔收膺等三百餘人其逋逃不獲者懸千金以購之使者相望於道其所連及死者不可勝數而黨人之議始於此矣上使中常侍王甫治黨事太尉陳蕃曰所考者皆憂國患時當官不橈是何罪而乃爾邪不肯署名上不從遂皆下獄獄吏曰諸人入獄者當祭臯陶酒范滂曰皋陶古之直臣如滂無罪當理滂於天如其有罪祭之何益衆人聞之皆不祭膺等皆三木囊頭伏於階下王甫次在後因越前對問曰合黨連群必有盟誓其所圖謀皆何等邪悉以情對滂曰竊聞仲尼之言見善如不及見不善如探湯欲使善善齊其清惡惡同其汙謂王政之所願聞不悟反以為黨王甫曰卿輩皆相拔舉迭為唇齒其不合則見排擯非黨而何滂乃仰天曰古之修善自求多福今之修善乃陷大戮死之日願賜一畚簿埋滂於首陽山側上不負於皇天下不愧於伯夷叔齊甫為之改容即解桎梏去囊頭尚書霍諝以為黨事無驗表諫赦之皆歸田里滂發京師道路迎者數千人滂謂友人殷仲子黃子敬曰今子相隨是重吾禍也遂逃歸鄉里焉陳留人夏馥字子治貧樂道而不求當世郡內多豪族奢而薄德未嘗過門躬耕澤畔以經書自娛由是為豪勢所非而馥志業逾固為海內所稱諸府交辟天子玄纁徴皆不就嘗奔喪經洛陽歷太學門諸生曰此太學門也馥曰東野生希遊帝主之庭徑去不復顧卿聞而追之不得而見也黨事之興馥名在捕中馥乃髠髭髮易姓名匿迹逺竄為人傭賃馥弟靜駕車馬載絹餉之於滏陽縣客舍見馥顔色毁悴不能復識也聞其聲乃覺之起向之拜馥避之不與言夜至馥所呼靜語曰吾疾惡邪佞不交通以此獲罪所以不耻飢寒者求全身也奈何載禍相餉也明旦各遂别去以獲免於是袁閎築室於庭日於室中東向拜母去前後門戶及母喪亦不制服位如此十五年卒以壽終是時太學生三萬餘人皆推先陳蕃李膺𬒳服其行由是學生同聲競為高論上議執政下譏卿士范滂岑晊之徒仰其風而扇之於是天下翕然以臧否為談名行善惡託以謡言曰不畏強禦陳仲舉天下模楷李元禮公卿以下皆畏莫不側席又為三君八俊八顧八及之目猶古之八元八凱也陳蕃為三君之冠王暢李膺為八俊之首海內諸為名節志義者皆附其風膺等雖免廢名逾盛希之者唯恐不及涉其流者時雖免黜未及家公府州郡爭禮命之申屠蟠嘗遊太學退而告人曰昔戰國之世處士橫議列國之王爭為擁彗先驅卒有坑儒之禍今之謂矣乃絶迹於梁碭之間居三年而滂及難袁宏曰夫人生合天地之道感於事動性之用也故動用萬方參差百品莫不順乎道本乎情性者也是以為道者清淨無為少思少欲沖其心而守之雖爵以萬乘養以天下不榮也為德者言而不華默而有信推誠而行之不愧於鬼神而况於天下乎為仁者博施兼愛崇善濟物得其志而中心傾之然忘己以為千載一時也為義者潔軌迹崇名教遇其節而明之雖殺身糜軀猶未悔也故因其所弘則謂之風節其所託則謂之流自風而觀則同異之趣可得而見以流而尋則好惡之心於是乎區别是以古先哲王必節順群風而導物為流之途而各使自盡其業故能班敘萬物之才以成務經綸王略直道而行者也中古陵遲斯道替矣上之才不能以至公御物率以所好求物下之人不能博通為善必以合時為貴故一方通而群方塞矣夫好惡通塞萬物之情也背異傾同世俗之心也中智且猶不免而况常人乎故欲進之士斐然向風相與矯性違真以徇一時之好故所去不必同而不敢暴則風俗遷矣春秋之時禮樂征伐霸者迭興以義相持故道德仁義之風往往不絶雖文辭音制漸相祖習然憲章軌儀先王之餘也戰國縱橫強弱相陵臣主側席憂在危亡不曠日持久以延名業之士而折節吐誠以招救溺之賔故有開一説而饗執圭起徒步而登卿相而遊説之風盛矣高祖之興草創大倫解赭衣而為將相舍介胄而居廟堂皆風雲豪傑屈起壯夫非有師友淵深可得而觀徒以氣勇武功彰於天下而任俠之風盛矣逮乎元成明章之間尊師稽古賔禮儒術故人重其學各見是其業徒守一家之説以爭異同之辨而守文之風盛矣自兹以降主失其權閹豎當朝佞邪在位忠義之士發憤忘難以明邪正之道而肆直之風盛矣夫排憂患釋疑慮論形勢測虛實則遊説之風有益於時矣然猶尚譎詐明去就間君臣踈骨肉使天下之人專俟利害弊亦大矣輕貨財重信義憂人之急濟人之險則任俠之風有益於時矣然豎私惠要名譽感意氣讎睚眥使天下之人輕犯敘之權弊亦大矣執誠説修規矩責名實殊等分則守文之風有益於時矣然立同異結朋黨信偏學誣道理使天下之人奔走爭競弊亦大矣崇君親黨忠賢潔名行厲風俗則肆直之風有益於時矣然定臧否窮是非觸萬乘陵卿相使天下之人自置於必死之地弊亦大矣古之為政必置三公以論道德樹六卿以議庶事百司針規諷諌閭閻講肄以修明業於是觀行於鄉閭察議於親鄰舉禮於朝廷考績於所蒞使言足以宣彼我而不至於辨也義足以通物心而不至於為佞也學足以通古今而不至於為文也直足以明正順而不至於為狂也野不議朝處不談務少不論長賤不辨貴先王之教也傳曰不在其位不謀其政天下有道庶人不議此之謂矣苟失斯道庶人干政權移於下物競所能人輕其死所以亂也至乃夏馥毁形以免死袁閎滅禮以自全豈不哀哉時諸黃門無功而侯者大將軍竇武上表曰陛下即位以來梁孫鄧毫貴戚專勢侵逼公卿略驅吏民惡熟罪深或誅滅相續以常侍黃門竊弄王命欺罔競行謗讟爭入如忠臣李固杜喬在朝必竭忠奉之節覺其姦萌因造妖言陷之禍門陛下不察加以大戮冤感皇天痛入后土賢愚悲悼小大傷摧固等既殁宦黨受封快凶慝之心張豺狼之口天下咸言直如弦死道邉曲如鉤封公侯謡言之作正為於此陛下違漢舊典謂必可行自造制度妄爵非人今朝廷日衰姦臣専政臣恐有胡亥之難在於不久趙高之變不朝則夕臣實懷愚不憚瞽言使身死名著碎體糞土薦肉狐鼠猶生之年雖尊官厚祿不以易之也謹冒死陳得失之要凡七十餘條伏惟陛下深思臣言束骸候誅武數進忠言辭旨懇惻李膺等𬒳赦由武申救之也元康元年春正月西羌冦三輔夫餘夷王冦玄菟夏四月中郎將張奐以南單于車兒不能治國事上言更立左鹿蠡王都紺為單于詔曰春秋大居正車兒一心同向化何罪而黜其遣還廷攝部落五月壬子晦日有蝕之六月甲寅詔公卿校尉舉賢良方正各一人潁川荀爽對策曰臣聞火生於木故其德孝漢之諡帝稱孝者其義取此也故漢制使天下皆講孝經選吏能舉孝廉蓋以孝為務也夫喪親自盡孝之終也今二千石不得終三年喪恐非所以為孝道而稱火德也頃者㣧嗣數乏本枝不繁其咎未必不由此往者孝文勞謙自約行過乎儉故有遺詔以日易月此謂夷惠激俗適身而巳不可貫之萬世後為嗣德者也雖古今損益未能諒隂可存其禮以示天下又公卿二千石皆輔主宣化政之本也而使不赴父母之喪人義替矣春秋傳曰上之所為民之歸也上使不為民或為之是以加罰假若上之所為而民亦為之向其化也又何誅焉假使大臣皆不行三年之喪何以責之古者臣有大喪則君三年不呼其門可如舊禮以美風俗臣聞有夫婦然後有父子有父子然後有上下有上下然後有禮義故夫婦之始王教之端也孔子曰天尊地卑乾坤定矣書曰釐降二女于媯汭言雖帝堯之女下嫁於虞猶屈體降下婦道於虞氏也春秋之義王姬嫁齊侯使魯主之不以天子之尊加諸侯也今漢承秦法設尚主之儀以妻制夫失陽唱之義以卑臨尊違乾坤之道今誠改尚主之制稱尊卑之性則嘉瑞降天吉符出地是以萬物各得其敘矣書奏爽即棄去之庚于大赦天下秋八月黃龍見巴郡初民就池浴相戲曰此中有黃龍因流行民間太守上言時史以書帝紀是時政治衰缺所居多言瑞應皆此類也本志曰瑞興非時則為妖孽為言雖虛此為龍孽也冬十月壬戌南宫平城內屋壞十二月丁丑帝崩于德陽殿初河間孝王生解瀆亭侯淑淑生萇萇生宏帝崩無嗣大將軍竇武召御史劉倏倏盛稱宏於武武與太后定䇿禁中太后詔曰大行皇帝德配天地光照上下不獲胤嗣之祚早棄萬國朕憂心摧傷追覽前代法王后無適即擇賢六親考德敘才莫若解瀆亭侯宏年十有二嶷然有周成之質春秋之義為人後者為之子其以宏為行皇帝嗣使光祿大夫劉倏持節之國奉迎後漢孝桓皇帝紀下卷第二十二
