body:
  text: 後漢孝靈皇帝紀上卷第二十三袁宏建寧元年春正月己亥上徴至大將軍竇武持節迎于夏門亭庚子即皇帝位以太尉陳蕃為太傅以將軍竇武為司徒胡廣録尚書事詔曰太傅陳蕃輔弼先帝出納為允謇諤之節宣于本朝朕𥘉踐祚親授䇿命忠篤之性老而彌純其封蕃為高陽侯固讓不受章十餘上乃許三月辛丑葬孝桓皇帝于宣陵庚午大赦天下賜男子爵孝悌力田帛各有差夏四月甲午追尊祖解瀆亭侯淑為孝元皇帝考嗣侯萇為孝仁皇帝妃董姬為慎園貴人戊辰以長樂衛尉王暢為司空五月丁未朔日有蝕之六月癸巳録定策功封竇武曹節等十一人為列侯八月司空王暢以災異䇿罷宗正劉寵為司空暢字叔茂太尉龔之子也𥘉暢為南陽太守設禁令明賞罰太守下車之後而故犯法者發屋伐樹塞井移竈豪強戰栗晏開早閉功曹張敞諫曰蓋聞諸經典殷湯開三靣之網而四方歸仁武王除炮烙之刑而天下咸服高祖創業約法三章孝文寬刑號稱太宗若夫卓茂文翁之徒皆去嚴刻務崇溫和夫明哲之君網漏吞舟之魚然後三光明於上民物和於下愚謂舜舉臯陶不仁者逺隨㑹為政晉盜奔秦治民在德不在於刑暢於是崇寬愼刑旌賢表德暢以郡俗奢富欲約己以矯之乃衣大布坐羊皮車厩馬羸弊而不改之同郡劉表時年十七從暢受學進諫曰蓋聞奢不僣上儉不逼下守道行禮貴處可否之間清不暴鱗濁不汙泥蘧伯玉耻獨為君子府君不希孔聖之明訓而慕夷齊之末操無乃皎然自貴於世暢答曰昔公儀休在魯拔園葵去織婦孫叔敖相楚其子披裘刈薪夫以約失之者鮮矣聞伯夷之風者貪夫廉懦夫有立志雖以不德敢慕高風且以矯俗也太后新攝政政之巨細多委陳蕃竇武同心戮力以奬王室徴用天下名士參政事於是天下英雋知其風指莫不人人延頸相望太平其後中常侍曹節與上乳母趙嬈求諂於太后太后信之數出詔命有所封拜蕃武每諫不許會有日蝕之變蕃謂武曰昔蕭望之為石顯所殺李杜禍及妻子有一石顯望之尚為之死況數十人邪趙夫人旦夕亂政其患最甚蕃以餘年請為將軍除之因災之變以除佞臣誰曰不可武亦謀之深納蕃言乃言之於太后曰故事內官但典門戶給事左右而已今乃參政事貴顯朝廷父子兄弟並在列位天下胸胸多以為患今可悉除之太后曰此皆天所生漢元以來世世用事國之舊典何可廢也但誅其惡耳武性詳重疑而未决是時太白犯上將星又入太微侍中劉瑜素善天文與蕃書曰星辰錯亂不利大臣前所謀者事宜速斷之蕃武得書將發於是以朱㝢為司隸校尉劉祐為河南尹武奏收中常侍曹節長樂食監王甫等使侍中劉瑜內其奏謀頗泄漏節等乃竊發瑜奏且知其事節曰前先帝宫人嫁武父子載取之各且十餘人此大罪也身自不正何以正人中黃門朱㝢曰其中放縱者罪當誅耳我曹何罪乃與等輩十餘人結誅武等是夜矯詔以王甫為黃門令持節誅尚書令尹勳因共脅太后取璽綬九月辛亥節請帝御前殿召公卿百官易拜司隸校尉河南尹遣中謁者分守南北宫節稱詔收大將軍竇武武不受詔與子紹將北宫二千人屯洛陽都亭太傅陳蕃聞起兵將官屬諸生八十餘人到承明門使者不內曰公未𬒳詔召何得勒兵入宫蕃曰趙鞅專兵向宫以逐君側之惡春秋義之有使者出開門蕃到尚書門正色曰大將軍竇武忠以衛國黃門常侍無道欲誣忠良邪黃門王甫曰先帝新棄天下山陵未成武有何功兄弟父子並封三侯又設樂飲宴多取掖庭宫人旬日之間資財巨萬大臣若此是為道邪公為宰輔苟相阿黨復何求賊使劒士收蕃蕃聲逾厲辭氣不橈遂送蕃北寺獄節又稱詔以少府周靜行車騎軍與胸奴中郎將張奐王甫持節共以討武等與武陳兵於闕下甫令其軍曰黃門常侍反逆無道何盡隨之反乎先降有重賞中宫執勢久士皆畏之於是免武兵數十人者各為部歸於甫軍自旦至食時兵降且盡武自殺紹等走靖等皆斬紹弟機親族賔客悉誅之蕃亦𬒳害妻子徙日南皇太后遷于雲臺於是自公卿以下嘗為蕃武所舉皆免官禁錮蕃字仲舉汝南平輿人初袁閎為郡功曹舉蕃以自代曰陳蕃有匡弼之才不可久屈宜以禮致之於是為郡功曹舉賢良方正皆不就桓帝初招延俊乂徵拜為議郎起署為尚書稍遷九卿初為豫章太守獨設一榻以候徐孺子餘人不得而接其高簡亮正皆此類也丙辰司徒胡廣為太傅録尚書事司空劉寵為司徒寵字祖榮東萊牟平人初為㑹稽太守正身率下郡中大治徴入為將作大匠山隂縣有數老父年各八十餘居若邪山下去郡十里聞寵當遷相率共往送寵人齎百錢寵見老父曰何乃自苦來邪對曰山谷鄙老生未嘗到郡縣他時吏發不去民間或狗吠竟夕民不得安自明府下車以來吏稀至民間狗不夜吠老值聖化今聞當見棄故自力來送寵曰吾何能及公耶甚勤苦父老為選一大錢受之故會稽號為取一錢其清如此薄衣服弊車馬其與人交恂恂然在朝廷正色不可干以私閉門靜居不接賔客教誨子孫而已故進不見惡退無謗言封曹節十八人為列侯討陳竇之功也十月甲辰晦日有蝕之鮮卑犯幽州殺略吏民自此已後無歲不犯塞陳竇之誅海內冤之曹節善招禮名賢以衛其罪乃言於帝就拜姜肱為犍為太守韋著為東海相招書迫切肱浮海遁逃卒不屈去著不得已遂解巾臨郡為政任威刑妻子放恣為受罰家所告輪輸左校刑音歸鄉里為姦人所殺二年春正月丁丑大赦天下迎愼國董貴人幸南宫嘉德殿二月己巳尊董貴人為孝文皇后后置永宫如匽貴人之禮貴人河間人配解瀆侯萇生帝后兄子重為五宫中郎將夏四月壬辰青蛇見御座殿軒癸巳大風折木詔群臣各上封事靡有所諱議郎謝弼上疏曰蓋聞蛇者女子之祥也皇太后幽隔空宫愁感天心所致于皇太后定䇿帷幄援立陛下雖父兄不軌非皇太后之罪陛下當以其誅滅之故特加慰釋之念而反隔絶靡有朝問之禮大虧孝道不可以示四方昔周襄王不能事母夷狄交侵天命去之遂陵遲不復興禮為人後者為之子今以孝桓皇帝為父豈得不以皇太后為母哉援神契曰天子行孝四夷和平方今邊境斥候兵革鋒起非孝無以濟之願陛下上以堯舜為法下以襄王為戒無令皇后憂愁於北宫一旦有霧露之疾陛下當何靣目以見天下乎又胸奴中郎將張奐上書曰臣聞風為號令動物通氣木者火之本相須乃明蛇者屈伸隱顯似龍順至為休徵逆來為災殃故大將軍竇武忠肅恭儉有援立之功太傅陳蕃敦方抗直夙夜匪懈一旦𬒳誅天下驚怛海內默默莫不哀心昔周公既薨成王葬不具禮天乃大風偃木折樹成王發書感悟備禮改葬天乃立反風其木樹盡起今宜改葬蕃武選其家屬諸𬒳禁錮一宜蠲除則災變可消升平可致也天子雖知奐言是然迫於節等不得從之中官惡謝弼出為陵府丞郡縣承旨以他罪死獄中張奐字然明燉煌酒泉人少與安定皇甫規俱顯當世而奐又與規善𥘉奐為梁冀所辟冀𬒳誅奐廢錮衆人莫敢為言唯規數薦奐由是為武威太守渡遼將軍幽并清淨吏民歌之徵拜大司農賜錢二十萬除家一人為郎奐讓不受願徙戶華隂舊制邊民不得內徙唯奐因功得聽故奐始為弘農人建寧𥘉奐新至未除會陳竇之事中賞侍曹節等承制使奐率五營士圍武武自殺蕃下獄死義士以此非奐然素立清節當可否之間雖禦不敢奪也後以黨事免官禁錮河東太守董卓慕其名使兄遺奐縑百匹奐不受知卓有姦凶之心遂與絶至於朋友之饋雖車馬不辭也時𬒳黨錮者多不守靜或徙或死唯奐杜門不出養徒著書矣六月司徒劉寵為太尉九月江夏丹陽蠻夷反李膺等以赦獲免而黨人之名書在王府詔書每下輒伸黨人之禁陳竇當朝後親而用之皆勤王政而盡心力拔忠賢而疾邪佞陳竇已誅中官逾專威勢既息陳竇之黨又懼善人謀己乃諷有司奏諸鉤黨者請下州郡考治時上年十四問節等曰何以為鉤黨對曰鉤黨者即黨人也上曰黨人何用為而誅之邪對曰皆相舉群輩欲為不軌上曰黨人而為不軌不軌欲如何對曰欲圖社稷上乃可其奏於是故司空王暢太常趙典大司空劉祐長樂少府李膺太僕杜密尚書荀緄朱㝢魏朗侍中劉淑劉瑜左中郎將丁栩潁川太守巴肅沛相荀昱議郎劉儒故掾范滂皆下獄誅皆民望也其餘死者百餘人天下聞之莫不垂泣袁宏曰夫稱至治者非貴其無亂貴萬物得所而不失其情也言善教者非貴其無害也貴性理不傷性命咸遂也故治之興所以道通群心在乎萬物之生也古之聖人知其如此故作為名教平章天下天下既寧萬物之生全也保生遂性久而安之故名教之益萬物之情大也當其治隆則資教以全生及其不足則立身以重教然則教也者存亡之所由也夫道衰則教虧幸免同乎茍生教重則道存滅身不為徒死所以固名教也汙隆者世時之盛衰也所以亂而治理不盡世弊而教道不絶者任教之人存也夫稱誠而動以理為心此情存乎名教者也內不忘己以為身此利名教者也情於名教者少故道深於千載利名教者衆故道顯於當年蓋濃薄之誠異而逺近之義殊也統體而觀斯利名教之所取也鄉人謂李膺曰可逃之乎膺歎曰事不辭難罪不逃刑臣之節也吾年已七十禍自己招復何避乎詔書至汝南督郵吳道悲泣不忍出縣中不知所為范滂聞之曰督郵何泣哉此必為吾也徑詣縣獄縣令郭揖見滂曰天下大矣子何為在此滂曰何敢彰罪於君使禍及老母滂與母訣曰滂承順教訓不能保全其身得下奉亡君於九泉亦其願也母曰爾得李杜齊名吾復何恨三君八雋之死郭泰私為之慟曰人之云亡邦國殄瘁漢室滅矣未知瞻烏爰止于誰之屋泰字林完太原介休人少孤養母年二十為縣小吏喟然嘆曰大丈夫焉能處斗筲之役乃言於母欲就師問母對之曰無資奈何林宗曰無用資為遂辭母而行至成臯屈伯彥精廬并日而食衣不蓋形人不堪其憂林宗不改其樂三年之後藝兼游夏同邑宋仲字雋有高才諷書日萬言與相友善閒居逍遙泰謂仲曰蓋昔之君子會友輔仁夫周而不比群而不黨皆始於將順終于匡救濟俗變教隆化之道也於是仰慕仲尼俯則孟軻周流華夏採禇幽滯泰始中至京師陳留人符融見而嘆曰高雅竒偉逹見清理行不苟合言不夸毗此異士也言之於河南尹李膺與相見曰吾見士多矣未有如郭林宗者也其聰識通朗高雅密博今之華夏鮮見其儔友而親之陳留人韓卓有知人之鍳融見原以己言告之卓曰此太原士也他日又以泰言告之卓曰四海內士也吾將見之於是驟見泰謂融曰此子神氣沖和言合規矩高才妙識罕見其倫陳留蒲亭亭長仇香年已長矣泰見香在而言之明日起朝之曰君泰之師非泰之友陳留茅容年四十矣親耕隴畝避雨樹下衆人悉踐蹲容獨釐膝危坐泰竒其異請問舍所在因寄宿容明旦殺雞作食泰謂之為己也容分半食母餘半度置自與泰素餐泰曰卿賢哉逺矣郭泰猶減三牲之具以供賔旅而卿如此乃我友也起對之揖勸令學問卒成盛德嘗止陳國文孝童子魏昭求入其房供給灑掃泰曰年少當精義書曷為來近我乎昭曰蓋聞經師易遇人師難遭故欲以素絲之質附近朱藍耳泰美其言聽與共止嘗不佳夜後命昭作粥粥成進泰泰一呵之曰為長者作粥不加意敬使不可食以杯擲地昭更為粥重進泰復呵之如此者三昭姿無變容顔色殊恱泰曰吾始見子之面而今而後知卿心耳遂友而善之巨鹿孟敏字叔逹客居太原未有知名叔逹曾至市買甑荷擔墮地徑去不顧時適遇林宗林宗異而問之甑破可惜何以不顧叔逹曰甑既已破視之無益林宗以為有分决與之言知其德性謂必為善士勸使讀書游學十年知名當世其宗人犯法恐至大辟父老令至縣請之叔逹曰犯法當死不應死自活此明理也何請之有父老董敦之曰儻其死者此大事也奈何以宜適而不受邪叔逹不得已乃行見楊氏令不言而退令曰孟徵君高雅絶世雖其不言吾為原之矣初汝南袁閎盛名蓋世泰見之不宿而退汝南黃憲邦邑有聲天下未重泰見之數日乃去薛恭祖曰聞足下見袁奉高車不停軌鑾不輟軛從黃叔度乃彌日信宿非其望也林宗答曰奉高之器譬諸泛濫雖清易挹叔度汪汪如萬頃之波澄之而不清橈之而不濁其器深廣難測量也雖住稽留不亦可乎由是憲名重於海內初泰嘗止陳留學宮學生左原犯事斥逐泰具酒食勞原於路側謂之曰昔顔涿聚梁甫之大盜段干木晉國之大駔卒為齊之忠臣魏之名賢且蘧伯玉顔子淵猶有過誰能無乎愼勿恨之貴躬而已或曰何為禮慰小人泰曰諸君黜人不託以藜蒸無有掩惡含垢之義人而不仁疾之已甚亂也吾懼其致害故訓之後原結客謀構己者至期曰林宗在此負其前言於是去後事發露衆人咸自以蒙更生之賜於泰泰謂濟隂黃元艾曰卿高才絶人足為偉器然年過四十名聲著矣於此際當自匡持不然將失之矣元艾笑曰但恐才力不然至此年矣若如所勑敢自克保庶不有纍也林宗曰吾言方驗卿其愼之元艾聲聞遂隆後見司徒袁隗隗歎其英異曰若索女壻如此善矣有人以隗言告元艾又自生意謂之曰袁公有女得無欲嫁與卿乎元艾婦夏侯氏有三便遣歸家將黜之更索隗女也夏侯氏父母曰婦人見去當分叉斷帶請還之遂還元艾為主人請親屬及賔客二十餘人夏侯氏便於座中攘臂大呼數元艾隱慝穢惡十五事曰吾早欲棄卿去而情所未忍耳今反黜我遂越席而去元艾諸事悉發露由此之故廢棄當世其弘明善惡皆此類也後遭母憂喪過于哀徐孺子荷擔來弔以生芻一束頓廬前既唁而退或問此誰也林宗曰南州高士徐孺子者其人諸生吾不堪其喻也巨鹿孫威直來弔既而介休賈子序亦來弔林宗受之威直不辭而去門人告之林宗遣人追之曰何去之疾也威直曰君天下名士門無雜賔而受惡人之唁誠失其所望是以去耳林宗曰宜先相問何以便去邪鄉里賈子序者實有胸險之行為國人所棄聞我遭喪而洗心來弔此亦未𬒳大道之訓而有修善之志也吾故受之若其遂變化者棄損物更為貴用如其不然不保其往也且仲尼不逆互鄉奈何使我拒子序也子序聞之更自革修終成善人其善誘皆此類也其所提拔在無聞之中若陳元龍何伯求終成秀異者六十餘人其所臨官若陳仲弓夏子治者十餘人皆名德也石雲考從容謂宋子俊曰吾與子不及郭生譬諸由賜不敢望回也今卿言稱宋郭此河西之人疑卜商於夫子者也若遇曾參之詰何辭以對乎子俊曰魯人謂仲尼東家丘蕩蕩體大民不能名子所明也陳子禽以子貢賢於仲尼淺見之言故然有定邪吾嘗與杜周甫論林宗之德也清高明雅英逹瓌瑋學問淵深妙有俊才然其愷悌玄淡格量高俊含弘博恕忠粹篤誠非今之人三代士也漢元以來未見其匹也周甫深以為然此乃宋仲之師表也子何言哉於是勸林宗仕泰曰不然也吾夜觀乾象晝察人事天之所廢不可支也方今卦在明夷爻直勿用之象濳居利貞之秋也猶恐滄海橫流吾其魚也吾將巖棲歸神咀嚼元氣以修伯陽彭祖之術為優哉游哉聊以卒歲者遂辭王公之命闔門教授泰身長八尺儀貌魁岸善談論聲音如鍾宵行幽暗必正其衣服家有書五千卷率多圖緯星曆之事與其等類行晨則在前暮則在後所歷亭傳不處正堂恆止逆旅之下先加糞除而後處焉及宿止冬讓溫厚夏讓清凉如鄉里或有爾者父母諺曰欲作郭林宗邪仇季字香智陳留考城人行至純默鄉黨無知者年四十召為縣吏以科選為蒲亭長勸耕桑合嫁娶農事畢令子弟群居同學喪不辦者躬自助之其孤寡貧窮令宗人相贍之其剽輕無業者宗人亦處業之不從科者罰之以榖代公賦多少有次行之朞月里無盜竊香初到亭民有陳元者獨與母居供養有違母詣香告元不孝香驚曰吁是何謂乎近日過舍廬落整頓耕藝以時此非惡人但教化未至且婦人守寡養孤上欲激貞名於當世中欲不負於黃泉下欲育遺嗣而繼宗也此三節者婦人之妙行也母既若斯華髮矣奈何以旦之忿棄歷年之勤乎且母養人孤遺不能成濟若死者有知百歲之後當何以見亡者母涕泣而起香留為具食囑曰歸勿復言吾方為教之既而之曰里於衆中厲言曰此里當有孝子陳元今何在衆指曰是也香起揖之孝行慰勉之謂衆曰此孝義里當見異以陳元故後諸鄉數日賫酒禮到元家上堂與相對視其食飲之具有異於他日遂復陳孝行以誘其心如是者數焉元卒為孝子鄉邑所稱縣表其閭丞掾致禮是時河內令王奐政尚嚴猛聞香以德化民署香主簿請與相見謂之曰聞在蒲亭陳元不罰而化之得無鷹鸇之志邪香曰以鷹鸇不若鸞凰故不為也奐謝遣曰枳棘之林非鸞所集百里非大賢之路州郡並請皆辭以疾宴居必正衣服妻子有過免冠自責妻子庭謝思過香冠妻子乃敢升堂終不加喜怒聲色妻子事之若事嚴君焉黃憲字叔度汝南愼陽人父為牛醫憲識度淵深時人莫得而測年十四潁川荀季和見而嘆曰足下吾之師也汝南周子居常曰吾旬月之間不見黃叔度則鄙吝之心生矣時汝南戴叔鸞者高邁之士也當時意氣人所推服然每見憲未嘗不悵然自失母問之曰汝何為不樂復從牛醫兒所來邪叔鸞跪曰良每自以才能不減叔度至於靣料其人瞻之在前忽焉在後可為良之師也舉孝廉無就之意其僚輩皆瞻望於憲以為凖的於是俱到京師稱病而歸也陳實字仲弓潁川許人少為縣吏常給厮役時縣吏鄧邵每出候賔見實執書立誦邵嘉之即解録遣使詣太學實推純誠不厲名行然羅居老少皆親而敬之鄉閭訟者輒求正於實實以理喻曲直退無怨者皆曰寧為刑罰所及不為陳君所非實嘗為郡功曹中常侍侯覽屬非其人太守高倫出教教之實固請不可太守曰侯常侍不可違君勿言實乃封教入見必不得已實請自舉之不足以陳明德退而署文學掾於是鄉里咸以實為失舉實晏然自若倫去郡故人送於傳舍乃具言其狀善稱君惡稱巳陳君之謂也由是衆談咸服焉辟黃瓊府除聞喜太丘長其政不嚴而治百姓愛敬之長子紀字元方小子淑字季方皆以儒業德禮稱紀子群名重魏晉文帝嘗問群卿何如父祖群對曰臣祖實不言而治臣父紀言而行之至於臣群有其言而必行是歲爵號乳母趙嬈為平氏君三年春河內婦食夫河南人夫食婦冬濟南盜賊群起冬十月大鴻臚喬玄為司空四年春正月甲子帝加元服大赦天下二月癸卯地震河水清三月辛酉朔日有蝕之太尉劉寵司空喬玄以災異䇿罷夏四月河東地裂十二處各長十餘里秋七月癸丑立皇后宋氏宋隱之從孫也以選掖庭立為皇后父豐為執金吾封不期侯冬十月戊午上率群臣朝皇太后于雲臺初太后有援立之功竇氏雖誅上心知之故率群臣俱朝焉黃門令董萌因上意數為太后怨上深納之供給致養每過於别於是曹節王甫共疾萌以親附竇后謗訕永樂萌下獄死五年春正月車駕上原陵諸侯王公王及外戚家婦女郡國計吏胸奴單于西域三十六國侍子皆會焉如會殿之儀禮樂闋百官受賜爵計吏以次嚮殿前上先帝御座具言俗善惡民所疾苦司徒椽蔡雍慨然歎曰聞古不墓祭而上陵之禮如此其備也察其本意乃知孝明皇帝至孝惻隱不易奪也或曰本意云何對曰西京之時其禮不可得而聞也光武世始葬于此明帝嗣位逾年群臣朝正感先帝不復見此禮乃率公卿百僚就陵而朝焉蓋事亡如事存之意也與先帝有瓜葛之親男女畢會郡計吏各向神坐而言庶幾先帝魂神聞聽之也今者日月久逺非其時人但見其禮不知其哀煩而不省者先帝孝思之心者也僖平元年春三月壬戌太傅胡廣薨贈安鄉侯印綬謐曰文侯廣字伯始南郡華容人初為郡吏在散輩中太守法雄有子曰真善知人言於父雄曰南郡掾吏其民略可知今當舉孝廉為國選士不可不擇寧有其人乎雄曰未有所擬也真求與掾相見獨竒廣廣時年二十六雄舉廣為孝廉至京師廣為天下第一旬月拜尚書郎稍遷九卿公輔屢登三事元老在位國家多難廢立邪正之間以厚重自居不能有所明然年逾八十繼母在堂朝夕定省子道不虧傍無几杖言不稱老居喪盡禮及廣薨故吏自公卿大夫數百人皆縗絰殯泣自漢興以來未嘗有也廣所臨治無粃政世為之諺曰天下中庸有胡公此時公輔者或樹私恩為子孫計其後纍世致公卿而廣子孫無過二千石者夏四月甲午青蛇見御座詔問群臣靡有所諱光祿卿楊賜上書曰臣聞休徴則五福應咎徴則六極至夫善不妄來災不空發必應行而至王者心有所惟意有所想未形顔色則五星推移隂陽乖動以此觀之知天之與人相去不遐蛇者於洪範鱗蟲之象思心不逮之所致也不逮之效時則有龍蛇之孽詩云惟虺惟蛇女子之祥春秋書鄭昭公時兩蛇鬪於南門之外其後昭公殆以女敗昔周王承文王之盛一朝晏超夫人不鳴璜宫門不擊柝關雎之人見機而作夫女謁行則讒夫昌讒夫昌則苞苴通殷湯以此自誡即濟於旱亢之災唯陛下思乾剛之道别內外之宜崇帝乙之制受元吉之祉抑皇后之權割豔妻之愛則蛇變可消禎祥立應殷戊宋景其事甚明上深納之五月己未大赦天下常侍張樂太僕侯覽專權驕恣詔收印綬覽自殺阿黨者皆免六月癸巳皇太后竇氏崩載衣車城南市舍將殯曹節王甫欲用貴人禮上曰太后親立朕身統承大業詩云無言不讎無德不報胡可用貴人禮於是發喪成服將葬節孝以竇氏之誅不用太后禮以馮貴人祔桓帝公卿莫敢諫河南尹李咸執藥上書曰臣聞禹湯聞惡是用無過桀紂聞善以亡其國中常侍曹節張諫王甫等因寵乘勢賊害忠良讒譖故大將軍竇武太傅陳蕃虛遭無形之舋被以滔天之罪陛下不復省覽猥發雷霆之怒海內賢愚莫不痛心武以殁矣無可奈何皇太后親與孝桓皇帝共奉宗廟母養蒸庶繫于天心仁風豐霈四海所宗禮為人後者為人之子陛下仰繼元帝豈得不以太后為母存既未蒙顧復之報殁又不聞諒暗之哀太后未崩武先坐誅存亡各異事不相逮而恚武不已欲貶太后非崇有虞之孝昭蒸蒸之仁八方聞之莫不泣血昔秦始皇后不謹陷幸郎吏始皇暴怒幽閉母后感茅焦之言立駕迎母置酒作樂供養如初夫以秦后之惡始皇之悖尚納茅焦之語不失母子之恩豈况太后不以罪沒陛下之過有重始皇臣謹冒昧陳誠左手賫章右手執藥詣闕自聞唯陛下揆茅焦之諫弘始皇之寤復母子之恩崇皇太后園陵之禮上釋皇乾震動之怒下解黎庶酸楚之情也如遂不省臣當飲鴆自裁下覲先帝具陳得失終不為刀鋸所裁章省上感其言使公卿更議詔中常侍趙忠監臨議者時衆官數百人各相顧望無敢下議廷尉陳球曰皇太后以舊姓盛德選入椒房冝配桓帝是無所疑忠笑曰廷尉冝便下筆球遂下議曰皇太后在椒房有聰明母儀之德遭天不造援立聖明承繼宗廟功烈至重先帝晏駕而遇大獄遷居空宫不幸早世家雖獲罪非太后意今若别葬誠失天下之望且馮貴人塜墓為賊所掘骸骨發露與賊併尸魂靈染汙不冝配至尊忠省球議作色曰陳廷尉此議甚健欲以蚩球球曰陳竇既冤皇太后無辜被幽臣常痛之今日言之退而受罪乃臣宿昔之願也諸公卿皆從球議奏御節甫復言曰竇氏罪深無以為比上曰雖犯惡逆後有大德於朕節甫於是不復言七月甲寅葬桓思竇皇后冬十月丁亥勃海王悝自殺初悝有罪貶為奭陶王悝因黃門王甫求復其國賂以租錢五十萬桓帝不豫詔復悝為勃海王甫以為己功趣責於悝悝知帝意也不與甫錢由是甫謀悝大逆不道諷司隸校尉假潁奏治其獄悝遂自殺乃自稱越王攻破郡縣二年春二月大赦天下夏四月司隸校尉假潁為太尉秋七月光祿勳楊賜為司空三年春二月己巳大赦天下太尉假熲以久疾䇿免河南尹李咸為太尉夏四月立河間王子虎為濟南王奉孝仁皇帝祀冬十二月癸酉日有蝕之司空楊
