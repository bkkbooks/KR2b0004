body:
  text: 後漢孝明皇帝紀卷第十袁宏八年冬十一月丙子上臨辟雍詔天下死罪贖各有差壬寅日有蝕之詔群臣上封事言得失是時北單于外求和親而數為邊害上使越騎司馬鄭衆使胸奴單于欲令衆拜衆不為之屈單于圍守衆欲脅服之衆拔刃以自誓單于恐乃止乃發使隨衆漢議復使衆衆疏諫曰臣伏料北單于所欲致漢使者欲以離南單于令西域諸國耳故汲汲於致漢使使既到偃蹇自若臣愚以為於今冝且勿答南單于本來歸義者望呼韓邪之助故歸心不二烏桓慕化并力保蕃今聞北單于不屈漢復通使不止恐南單于必懷疑而烏桓亦有二心單于久居漢地具知形勢萬分離析規為邊害其憂不輕今幸有渡遼之衆揚威北垂雖勿答不敢為害上不從而卒遣衆衆又上言臣前使胸奴與單于不和而今復往恐其必取勝於臣臣誠不忍持大漢節信對旃裘跪拜令以益胸奴之名損大漢之強詔下聽衆既西道路間連續上書固爭上大怒追還繫廷尉獄會赦歸家其後帝見胸奴使來者問衆使時與單于爭禮狀皆言胸奴中傳以為衆壯勇往時蘇武不能過也上乃復召衆為軍司馬稍遷大司農九年夏四月詔以公田賜貧民各有差長吏居職三年尤異者與計偕封皇子恭為靈壽王黨為重喜王十年春二月廣陵王荆有罪自殺荆上母弟也性急刻喜文法初封山陽王世祖崩荆與東海王強書勸強起兵強恐懼封上其書天子祕其事徙荆為廣陵王荆為相工曰吾貌類先帝先帝三十得天下我今亦三十可起兵未相者告吏荆自繫獄上復不忍考訊詔曰荆數年之間大罪二矣其赦荆罪不得臣其吏民荆猶不悛使巫祝詛上上使長水校尉樊倏任隗雜治荆獄奏荆大惡當誅上怒曰諸卿以我弟故敢請誅之即我子卿等豈敢邪倏曰天下高皇帝之天下非陛下之天下也春秋之義君親無將將而誅之是以周公誅弟季友鴆兄臣等以荆屬託母弟陛下留心故復請之耳如令陛下子臣等專誅之矣荆自殺上憐傷之諡曰思王封荆子元壽為廣陵侯食荆故國不得臣吏民倏字長魚樊宏之子也建武中諸王爭招致賔客好事者皆與之周旋更遣人請倏倏精義於學一無所應及捕諸王客倏不在其中世祖以是器之永平初與公卿雜定郊祀禮儀及五經異義立朝居正多所匡諫上亦敬重焉倏弟鮪為其子賞求楚王英女敬鄉公主倏止之曰建武時吾家並蒙榮寵一宗五侯時特進一言男可以尚主女可以配王但以臣子不當有外心不冝與藩國婚姻貴盛為宗族患故不為也今爾有一子奈何棄於楚乎鮪不從遂與楚婚是時倏卒諡曰哀侯倏病患因猶不忘忠悉條政不便於民者未及言而薨上遣小黃門張音問何遺言音奏焉上為之流涕以倏兩子郴梵謹於言行為郎二十餘年未嘗𬒳奏劾初倏與郎承宮友善薦之于朝拜博士遷左右中郎將數納忠言守正不希苟容朝臣憚其節名聞於胸奴單于遣使來貢求見宫詔勑宮自整頓宫對曰夷狄眩名非識實也聞臣虛稱故欲見臣臣醜陋寢見臣必生輕賤臣不如選長大有威容者示之時以大鴻臚魏應示之夏曰月戊子大赦天下閏月甲午行幸南陽祠章陵祭於舊宅作雅樂奏鹿鳴天子親御塤箎以娛嘉賔十一年春正月沛王楚王濟南王東平王淮陽王中山王郎邪王東海王來朝十二年春正月置永昌郡夏五月丙辰賜天下男子爵人二級三老孝悌力田人三級鰥寡孤獨不能自存者粟人二斛上以天下無事俗頗奢靡乃詔有司甲舊章整車服乙亥司空伏恭以老病罷大司農牟融為司空是時天子勤於萬機公卿數朝會輒延坐論政事融明經術善論議朝廷皆服其能天子數嗟嘆以為良宰相融字子夏北海安丘人也少以名德稱舉茂才為豐令治有異迹司徒范逡薦融忠正公方經行純備宜在本朝并上其治狀由是徴入為司隸校尉多所舉正百僚敬憚之數年擢遷大鴻臚大司農十三年春二月上耕于藉田賜觀者食有一諸生蒙首而言曰善哉太公之遇文王也上使人報之曰生非太公豫亦非文王夏四月辛巳幸榮陽巡河渠作水門遂至太行幸上黨冬十月甲辰晦日有蝕之詔有司陳便宜靡有所諱刺史太守詳理冤獄有恤鰥寡勉思所蒞焉十二月楚王英謀反初郭后生東海恭王疆沛獻王輔濟南王安康阜陵質王延中山簡王焉隂后生明帝東平獻王蒼臨淮王衡廣陵思王荆琅邪孝王京許姬生楚王英號楚太后世祖無寵英最小自帝為太子時英獨歸附上上特親愛之數加賞賜英好遊俠交通賔客晚節喜黃老修浮屠祠八年上臨辟雍禮畢詔天下死罪得以縑贖英遣郎中令詣彭城曰臣託在藩蔽無以率先天下過惡素積喜聞大恩謹上黃縑二十五匹白䊵五匹以贖其愆楚相以聞詔曰楚王誦黃老之微言尚浮屠之仁祠潔齊三月與神為誓有何嫌懼而贖其罪因還其贖男子燕廣告英與顔忠王平等造圖書謀反有司奏英大逆不道請誅上以至親不忍徙丹陽涇縣湯沐邑五百戶英男子為公侯王者食邑如故楚太后留楚宫婢才人鼓吹從英者無限皆乘輜軿帶持兵弩行道射獵極意歡娛遣大鴻臚持節護送英丹陽浮屠者佛也西域天竺有佛道焉佛者漢言覺將悟羣生也其教以修善慈心為主不殺生專務清淨其精者號為沙門沙門者漢言息心蓋息意去欲而歸於無為也又以為人死精神不滅隨復受形生時所行善惡皆有報應故所貴行善修道以錬精神而不巳以至無為而得為佛也佛身長一丈六尺黃金項中佩日月光變化無方無所不入故能化通萬物而大濟羣生初帝夢見金人長大項有日月光以問羣臣或曰西方有神其名曰佛其形長大而問其道術遂於中國而圖其形像焉有經數千萬以虛無為宗苞羅精粗無所不統善為宏闊勝大之言所求在一體之內而所明在視聽之外世俗之人以為虛誕然歸於玄微深逺難得而測故王公大人觀死生報應之際莫不矍然自失是歲胸奴頻犯塞中郎耿秉上書曰中國虛費邊陲不寧其患專在胸奴以戰去戰可也故君不可以怒而興師將不可以愠而合戰鼓之以仁義為國之寶矣天子內有圖胸奴志隂納秉言乃召入見使具陳其狀上善其言以為可任將帥拜謁者僕射每公卿論邊事秉輒預其議頃之太僕祭彤虎賁中郎將馬庚顯親侯竇固下博侯劉張好畤侯耿忠等俱見議兵事秉以為孝武時始事胸奴胸奴援引弓之類並左袵之屬故不可得而制也漢既得河西四郡及居延朔方徙民以充之根據未堅胸奴猶出為冦其後羌胡分離四郡堅固居延朔方不可傾拔虜遂失其肥饒畜兵之地惟有西域俄復內屬呼韓邪單于請𣢾塞是故其勢易乘也今有南單于形勢相似然西域尚未內屬北虜未有舋作臣愚以為當先擊白山得伊吾破車師通使烏孫諸國以斷其右臂未可先擊胸奴也伊吾亦有胸奴南呼衍一部破此復為折其左角觀往者漢兵出胸奴輒為亂五單于爭來必不以五將出之故也今可先擊白山以觀其變擊胸奴未晚也上善秉言議者或以為今兵出白山胸奴必并兵相助又當分其東以離衆與秉計異上更然之十四年夏四月故楚王英自殺以諸侯禮葬之上遣中黃門視英妻子慰勞楚太后悉釋諸與英謀者而封燕廣為折姦侯初英獄起內及京師諸侯外連州郡豪傑坐死及徙者以千數而繫獄者尚數千人顔忠王平辭及隧鄉侯耿建朗陵侯臧信灌澤侯劉鯉曲成侯竇建御史寒朗治其獄奏建等未嘗與忠相見詰驗無實為平所枉疑下無辜者衆上曰建等未嘗見平忠何故引之朗曰所犯不道冀引建等以自明上曰若四侯無事何不出之而輕繫邪朗曰考之無事恐海內發其姦者故未奏之上怒曰吏持兩端巧為其辭將下捶之朗曰願一言而死上曰誰共作章朗曰臣獨作之上曰何以不與三府議朗曰臣自知當族滅不敢多汙良善上曰何故族滅朗曰臣考事一年不能窮盡姦狀不為罪人訟自知無狀雖族滅不恨夫陷人死地復無憂責是以考一連十考十連百公卿每朝陛下問得失皆言天下之惡禍及九族陛下大恩裁止於身天下幸甚歸舍皆仰屋竊嘆雖口不言指揮可知皆謂多冤獄莫敢言者今建等無驗而陛下殺之誠願留神省察得其情實使刑者不怨死者不恨故臣冒死懇言誠不敢為私上深納朗言自幸洛陽寺出者千餘人天下即大雨是時楚獄繫者數千人天子盛怒吏治之急自誣死者甚衆於是有司舉能治劇者以袁安為楚郡太守安之郡不入府舍遙至獄所案驗無實者條上出之府丞掾吏皆叩頭爭之曰不可安曰如有不合太守當坐之不以相及也遂别具奏會帝感悟即報許得出四百餘家頃之徴入為河南尹召入見上問以考楚事名簿甚備安具奏對無所遺失上以為能也問安本自何為官對曰臣本諸生上曰以尹故吏也何意諸生邪安為河南尹十年號為嚴明然未嘗加罪鞫人常稱曰凡士學問上欲望宰相下則牧守錮人於聖代尹所不為也其下聞之皆自激厲名重朝廷安字邵公汝南宛人嚴重有威州里敬之為縣功曹奉檄從事從事因安致書於令安曰公事邪則有郵驛今因功曹是有私也辭不肯受從事瞿然而止舉孝廉為郎謁者隂平長任城令所在吏民畏而愛之夏五月封故廣陵王荆子六人為列侯詔曰執金吾魴侍衛歷年數進忠言其還爵土封為楊邑侯封竇融孫嘉為安豐侯十五年春二月庚子令天下亡命贖各有差行幸彭城止楚王館悲慟左右百官凄然三月行幸琅邪及魯祠孔子及七十二弟子幸東平定陶祠定陶恭王夏四月封皇子暢為汝南王建為千乘王羡為陳留王衍為下邳王昞為常山王長為濟隂王徙重喜王黨為樂城王賜天下男子爵人三級民酺五日上使越騎校尉桓郁郎中張酺授太子經二人朝夕侍講勸以經學是時太子家頗為奢侈酺每正諫甚見嚴憚會平陽公主薨太子同生也哀戚過禮酺以為太子舉措冝動合禮度因是上疏曰臣伏見皇太子仁厚寬明發言高逺卓然絶異非人所能及也今平陽公主薨悲哀發中形體骨立恩愛惻隱世希似是見臣愚淺不識大體以為宜選名儒高行以充師傅問訊起居之日太傅時賜宴所以宣德音以成聖德也侍中丁鴻仁而有讓逹於從政謁者費惲資性敦篤遵令法度如並侍左右必能發起微意增廣徽猷者也乙巳大赦天下冬十一月乙卯太白入于月其占曰大將戮死不出三年人主崩本志稱昔庖犧氏之王天下仰則觀象於天俯則觀法於地然則天地設位而星辰運度備矣易曰天垂象聖人則之星官之書始自黃帝至高陽氏使南正重司天北正黎司地唐虞之時則伏犧氏掌焉夏有昆吾殷有巫咸周有史佚皆職典預覩成敗以佐時政者也秦燔詩書愚百姓六經典籍殘為灰􅖓星官之書全而不毁漢興司馬談父子以世家重黎氏之後著天官書班固序漢書又有天文志乙巳大赦天下胸奴寇河西十六年春天子遂前議遣奉車都尉竇固駙馬都尉耿秉太僕祭􅊮渡遼將軍吳常各將萬騎擊胸奴出燉煌崙塞擊南呼衍王出塞千五百里到蒲類海破白山走呼衍王斬首十餘級秉出張掖居延塞擊胸林王到沐樓山度莫六百里餘絶無水草得生口辭云胸林王轉北逐水草秉欲將輕騎追之都尉秦彭止之而還􅊮嘗與南單于左賢王信出朔方鬲闕塞擊溫禹犢王於涿邪山出塞九百餘里見小山為信所誤云是涿邪王山無所得而還是時秉燭有功吳嘗􅔰罪􅊮下獄免􅊮性剛嚴行道不與信相得故為信所誤􅊮自恨無功出獄數日歐血死勑其子曰吾奉使不稱微功不立身死慙恨義不可以受賞賜汝等齎兵馬詣邊乞效死前行以副吾心其子逢上疏陳􅊮遺言上方任􅊮聞之嗟歎者良久子參從擊車師有功遷遼東太守烏九鮮卑追思􅊮不巳每朝京師輒過拜􅊮塜仰天號泣􅊮字次孫潁陽人少孤值更始之際天下大亂盜賊縱橫野無煙火而􅊮常在墓側盡其哀心賊每過見其號泣不畏死亡皆不犯也後隨從兄遵從世祖世祖以彤為黃門郎常宿衛左右及遵薨無子追傷之以􅊮為偃師長令附近遵墓四時祀之遷襄賁令皆有名迹詔書勉勵增秩一等賜縑百匹及在遼東著績北邊􅊮氣勇過人開弓三百斤多恩信善權略士卒爭為效力永平初胡夷內附野無風塵乃悉罷邊兵而徴􅊮為太僕卿彤在遼東十餘年無十金之資天下知其清拜日賜錢百萬馬三匹衣被刀劒下至居家器物無不備焉每見上輒嗟歎以為可屬以重任嘗謂左右曰太僕吾之禦侮者也竇固之破白山遣從事郭恂假司馬班超使西域超到鄯善鄯善王廣事超禮敬甚備一旦忽踈超謂官屬曰寧覺廣禮意益不如前日乎官屬曰胡人不能久變無他故超曰明者觀於未萌况兆巳見此必有北虜使來故令其疑耳乃召侍胡逆問曰胸奴使到日何故不白侍胡怖恐曰到巳三日去此三十里超使閉侍胡悉會所將吏士三十六人大飲之酒酣超激怒之曰卿曹與我俱在絶域欲成大功以求富貴今虜使到才數日而廣禮意即廢如令鄯善收吾屬送胸奴骸骨棄捐為豺狼食為之奈何官屬咸曰今既在危亡之地死生從司馬超復曰丈夫不入虎穴不得虎子寧我圖人不為人所圖當今之計獨有夜圍虜使放火攻之使不知我多少震驚可盡彌也滅此虜則鄯善破膽功成事立矣不然盡為所擒悔將何及皆曰當與從事議之超怒曰從事文墨吏聞此必恐而謀泄謀泄為鄯善所吞死而無益非壯士也衆曰善超夜將吏士奔之令十人持鼓餘皆兵弩乃順風縱火擊鼓大呼虜驚走超手殺三人吏士斬首數十級餘悉燒死明日具告恂恂大驚又內恐超獨擅其功超曰本與掾俱受任此一家事掾雖不行超何心獨擅之大小當共其禍福恂喜超乃召鄯善王廣示以虜使首舉國怖栗超告以漢家威德自今巳後勿復與北虜通廣叩頭樂屬漢無二心超還入塞奉虜使首詣固固具上超前後功詔以超為司馬賜布二百匹遣超使于填國欲增益其吏士超自請願但將所從三十六人超曰于填大國且逺今欲出萬死立尺寸之功雖將數百人往無益於強如有不虞多益為纍耳遂出塞是時于填王廣德新破車師生得其王胸奴遣節使監護其國超至于填于填俗信巫疑事輒巫決之超到數日廣德以胸奴使在其國禮意不備未有定心會巫言神怒何故向漢屬胸奴者言漢使有馬急取以祠神神怒乃解廣德遣國相私來比白超願請馬以祠神超曰馬可得令巫自來受之有頃巫到超叱吏執之遂斷巫頭收私來比鞭笞數百遣持巫頭往責讓廣德廣德聞超前於鄯善誅虜使納其貢恐怖遂舉兵攻殺胸奴使五十餘人降超超重賜王以鎮撫之因留于填竟冬先是龜兹王建為胸奴所立倚其威功破踈勒殺其王忠誅貴臣因立左候兜題所為踈勒超令廣德發專驛自到踈勒去兜題所治盤囊城九十里遣吏陳憲等往降之勑兜題本非踈勒種人如不降便劫之憲既見兜題無降意又輕其單弱無備憲遂前劫縛兜題左右皆驚走留二人守之憲馳白超超即往悉召踈勒掾吏告以龜兹為胸奴擊踈勒盡殺汝貴人而立兜題兜題非汝本種今漢使來欲立故王種為汝降害無得恐怖衆皆喜超亦求索故王近屬得兄榆勒立之更名忠國中大恱超問忠及官屬當殺兜題邪生遣之邪咸曰當殺之超曰殺之無益於事當令龜兹知漢威德遂解遣之踈勒由是與龜兹結怨專心向漢起守盤彚城忠據踈勒城超字仲升彪之少子也俶儻不修小節而內行甚謹家貧嘗傭寫書投筆而嘆曰丈夫當為傳介子張博望立功絶域以取封侯耳安能久執刀筆乎坐者笑之曰超小子安知壯士之志哉行遇相者謂超曰君布衣諸生耳而相法當封侯萬里之外超問其故相者曰君燕頷虎頸飛而食肉以此知之秋七月淮南王延謀反徙為阜陵王食二縣九月丁卯令罪死囚徒非大逆無道減死一等徙戎邊北海王睦薨諡曰敬王睦少好學世祖器之上為太子時數侍宴會入則談論接席出則遊觀同輿甚見親禮是時法網尚踈諸國得通賔客睦不逺千里交結知識宿德名儒莫不造其門睦虛巳折節以禮接之由是名聲藉甚自為王後法禁益峻睦乃謝絶賔客放心音樂歲終遣使朝京師睦召使者問曰朝廷設問寡人大夫何辭以對使者曰大王忠孝慈仁敬賢樂士臣雖螻蟻敢不實對王曰吁危我哉是乃孤幼時進趨之行也大夫其對以孤寵爵以來志意衰墮聲色是娛犬馬是好使者受命而行其抑絶名迹深識機微如此睦父靖王興薨悉推財産與諸弟雖車服珍寶皆不以介意有要然隨金帛贖之能屬文善史書作春秋指義終始論及賦頌數十篇病臨困帝以驛馬詔睦為草書尺牘十首十七年秋八月丙寅詔宥武威張掖酒泉燉煌囚繫交趾以下冬十月竇固耿秉將萬餘騎師擊車師王請降於是固奏置西域都護戊巳校尉陳穆為都護耿恭為戊巳校尉關寵為戊巳校尉恭屯金蒲城寵屯折中城相去千餘里恭乃移檄烏孫大昆彌宜喻威德皆遣使獻馬求入侍天子恭字伯宗况之孫性慷慨多大略好將帥之事十八年春二月詔固等罷兵還京師三月北胸奴左鹿蟸王將二萬騎率焉蓍龜兹來車師王安得死焉蓍龜兹殺都護陳穆副校尉郭恂遂攻金蒲城耿恭令軍士皆持滿勿得發告胸奴曰漢家神箭所中創中皆沸於是乃發弩皆應弦而倒虜中矢者創中沸大驚曰漢神可畏遂皆遁去恭以踈勒傍有水去王忠所據近引兵居之胸奴後來攻恭恭募先登士四十人出城奔斬首數十級胸奴乃相與議曰前踈勒王守此城攻不能下絶其澗水即降因絶澗水吏士無飲窮困至祚馬糞汁飲之恭於是城中穿井十五丈不得水吏士失色恭嘆曰昔蘇武困於北海猶能奮節况恭擁兵近道而不蒙祐哉聞二師將軍拔佩刀以刺山而飛泉湧出今漢神明豈有當窮者乎乃整衣服向井再拜為吏士禱水身自率士挽籠有頃飛泉湧出大得水吏士驚喜皆稱萬歲於是將水以示虜虜兵大驚而去丁亥令天下亡命者贖罪各有荖夏四月賜天下男子爵人三級鰥寡孤獨不能自存者粟人三斛秋八月壬子帝崩于東宫遺詔不起寢廟藏主於世祖廟更衣臺是日太子即皇帝位年十八壬戌葬孝明皇帝于顯節陵冬十月乙未大赦天下賜男子爵人二級其為人父後者及三老孝悌力田人三級鰥寡孤獨貧不能自存者粟人三斛以衛尉趙喜為太傅司空牟融為太尉録尚書事戊戌蜀郡太守第五倫為司空倫字伯魚京兆長陵人其先齊諸田徙充園陵宗族多故以次第為氏倫好黃老以孝行稱王莽末天下兵起宗族及閭里聞倫勇而有義爭往附之倫相率厲堅壘壁銅馬赤眉數十輩皆不能下時米石萬錢人相食倫獨收養孤子外孫分糧共食死生相守鄉里以此賢之太守鮮于褒見而異之署倫為吏後褒坐事徴把倫臂曰恨相知晚會蓋延為京兆尹事多犯法倫數諫爭不合遂沈滯曹吏頃之鮮于褒左遷為高唐令倫去吏荷簷往候褒褒引倫升堂屬其妻子復歸縣為嗇夫倫以久官不逹乃將家屬客河東變易姓字自稱王伯春常載鹽往來太原上黨每所止客舍輒為掃除而去道上號曰道士久之鮮于褒為謁者從車駕至長安時閻興為京兆尹褒言倫於興興聘求倫倫復出為郡吏倫每讀詔書常嘆曰皆聖主也當何由得一見也等輩笑之曰説將尚不下安能動萬乘邪倫曰未遇知巳道不同故耳舉孝廉除郎中補淮南王醫工長隨王朝京師官屬得會見問世祖因問政事倫具言治道所宜世祖大恱明日復召至日夕世祖謂倫曰聞卿為吏搒婦公不過從兄飯寧有之邪倫對曰臣三娶妻皆無父臣遭飢饉米一石萬錢不敢妄過人飯世祖曰為市掾人有遺卿母一箇餅者卿從外來見之奪母探口中餅出信有之乎倫曰實無此衆人以臣愚蔽故為生此語有詔拜倫為扶夷長至苑遷會稽太守為政清淨不煩化行於民性節儉雖為二千石常衣布𥜗自斬馬草妻子自炊會稽俗信淫祀皆以牛羊請禱是以財盡於鬼神産盡於祭祀或家貧不能以時禱祀至諱言牛不敢食其肉發病且死先為牛鳴其畏懼如此倫乃禁絶之掾吏皆請諫不可倫曰夫建功立事在於為政為政當信經義經言淫祀無福非其鬼而祭之諂也今鬼神而祭之有知不妄飲食於民間使其無知又何能禍人遂移書屬縣曉喻百姓民不得有出門之祀者案論之有屠牛輒行罰民初恐怖頗搖動不安倫勑之逾急後遂斷絶百姓遂以安業永平中坐事徴百姓老小闐府門皆攀車啼呼朝發至日中才行五里倫乃止亭舍密乘船去吏民上書守闕千餘人是時上方案梁松事多為訟冤者上患之有詔公車諸為梁氏及會稽太守書皆勿受倫免歸田里躬耕以自給起家守宕渠令遷蜀郡太守蜀地肥饒民多富實掾吏官屬皆鮮車肥馬倫欲革化之乃舉貧而有志者多至九卿郡守名為知人上新即位倫以遠郡入為三司舉清能也初耿恭𬒳圍明帝怒甚將遣兵救之師未出而帝崩胸奴聞中國有喪遂復圍之糧盡乃煮弩筋食之恭與士卒同厲以恩義皆無二心胸奴遣使謂恭曰空於城中餓死為何不早降降者封為白屋侯妻以子女恭手劒殺其使相拒數月使士消盡戊巳校尉關寵上書求救事下公卿司空第伍倫以為不可救司空鮑昱以為使人於死亡之地有急如棄之外示弱戎夷內傷死難之臣此際若不救之後或邊上有警陛下如何使人也又戊巳校尉才十數人胸奴圍之數十日不下是其弱效兵家先名後實可令燉煌酒泉太守各將精騎多其幡幟倍道兼行以赴其急胸奴疲困之兵必走征西將軍耿秉屯酒泉發燉煌酒泉兵擊車師甲辰晦日有蝕之天子避正殿不聽事詔曰朕以眇年奉承宗祖不能聿修洪業以致災青思惟厥咎在豫一人又羣司百僚其勉修所職各言其封事靡有所諱是歲兖豫徐州民被水旱災害令勿收田租以見榖廩賜貧民焉後漢孝明皇帝紀卷第十
