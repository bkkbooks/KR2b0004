body:
  text: 尊虐流百姓大懼淪喪社稷翦覆四海兖州刺史劉岱豫州刺史孔胄陳留太守張邈東郡太守喬瑁廣陵太守超等糾合義兵並赴國難凡我同盟齊心戮力以致臣節殞首喪元必無二致有渝此盟俾墜其命無克遺育皇天后土祖宗明靈實皆監之洪辭氣慷慨涕泣橫下聞其言者雖卒伍厮養莫不激揚卓兵強紹等莫敢先進曹操曰舉義兵誅暴亂今衆巳合諸君何疑後使董卓聞川東兵起倚王室之尊據二周之險東向以臨天下雖以無道行之猶足以為患今焚燒宮室劫遷天子海內震動不知所歸此天亡之時也一戰而天下定矣不可失也其引軍西戰於滎陽操兵大敗是時靑州刺史焦和亦起兵討卓務及諸將西行不為民人保鄣始濟河黃巾巳入其境靑州殷實軍革和望冦奔北未嘗接風塵交旗鼓也好卜筮信鬼神入見其人淸談干霄出觀其政賞罰靖亂州遂蕭條悉為丘墟頃之和病卒袁紹使臧洪領靑州撫和民衆盜賊奔走紹歎其能徙為東郡太守夏四月以大司馬劉虞為太傅尚書令王允奏曰太史王立説孝經六隱事令朝廷行之消却災邪有益聖躬詔曰聞王者當修德爾不聞孔子制孝經有此而却邪者也允固奏請曰立學深厚此聖人祕奧行之無損帝乃從之常以良日王允與王立入為帝誦孝經一章以文二竹簞畫九宮其上隨日時而出入焉及允被害乃不復行也袁宏曰神實聰明正直依人而行者也王者崇德殷薦以為饗天地可謂至矣若夫六隱之事非聖人之道也匹夫且猶不可而況帝王之命乎五月司空荀爽薨爽字慈明朗陵令淑之子也年十二太尉杜喬師焉舉孝廉賢良黨事禁錮隱於海上又南匿漢濵黨事解辟命交至有道博士徵皆不就獻帝初董卓薦爽為平原相未到官徵為光祿勳至府三日遷司空當是之時忠正者慷慨而懷道者深默爽既解禍於董卓之朝又旬日之間位極人臣君子以此譏之初爽兄弟八人號曰八龍爽最有儒雅稱兄子彧名重於世六月辛未光祿大夫种弗為司空卓發洛陽諸陵及大臣冡墓壞洛陽城中鍾簴鑄以為錢皆不成文更鑄五銖錢文章城郭不可把持於是貨輕而物貴穀一斛至數百萬遼東太守八孫度自號為平州牧立漢世祖廟單于羌渠既為國人所殺其子孫於扶羅應立國人立須卜為單于於扶羅詣闕訟會靈帝崩王室亂於扶羅將數千騎與白波賊冦兾州界百姓皆高壁清野抄掠少有所得欲歸國國人不受遂止河東二年春正月辛丑大赦天下韓馥袁紹自稱大將軍遣使推大司馬劉虞為帝不聽復勸虞承制封拜又不聽然猶與紹連結二月丁丑相國董卓為太師夏四月卓西入關卓使東中郎將董越屯澠池寧輯將軍段猥屯華隂中郎將牛輔屯安邑其餘中郎校尉布在諸縣不可勝紀以禦山東卓將至公卿以下迎之皆謁拜下卓不為禮卓謂御史中丞皇甫嵩曰可以服未嵩曰安知明公乃至於是卓曰鴻鵠固有逺志但燕雀自不知爾嵩曰昔與公俱為鴻鵠但今日復變為鳳皇爾卓乃大笑曰卿早服何得不拜卓既為太師復欲稱尚父以問左中郎將蔡雍雍曰昔武王受命太公為太師輔佐周室以伐無道是以天下尊之稱為尚父今之功德誠為巍巍宜須關東悉定車駕西還為後議之卓乃止於是卓乘金華靑蓋車時人號竿摩車言逼上也卓弟旻為左將軍兄子璜為中軍校尉宗族內外並列朝廷呼召三臺尚書以下皆詣卓府啓事然後得行築郿塢城與長安城等積穀為三十年儲云事成雄據天下不成守此足以畢老嘗行郿塢公卿巳下祖道於橫門外誘北降者三百餘人於坐中先披其舌或斬其手或鑿其眼未死偃轉杯桉之間會者戰栗失匕箸卓飲食自若初卓飲衛尉張溫乃使人誣溫與袁術通謀笞殺之刑罰殘酷愛憎相害冤死者數千人百姓嗷嗷道路歎息孫堅自陽人入洛陽修復諸陵引軍還魯陽卓謂長史劉艾曰關東諸將數敗矣無能為也唯孫堅小敢諸將軍愼之堅昔西征其計䇿略與人同無故從諸袁貌終亦死爾艾曰堅用兵不如李傕郭圯堅前舉羌戰於美陽殆死無能為卓曰堅時將烏合兵且戰有利鈍卿今論關東大勢爾亦終無所至但殺二袁兒則天下自服矣建武初立宗廟於洛陽元帝之於光武父之屬也故光武上繼元帝又立親廟於洛陽祭祀而巳不加名號光武崩以中興之主更為起廟上尊號曰世祖廟以元帝於光武為禰故雖非宗不毀也後遂為常明帝遺詔無起寢廟藏主於世祖廟更衣更衣者帝王入廟之便殿也孝章不敢違命以更衣有小别上尊號曰顯宗章帝崩遺詔如先帝故事和帝上尊號曰肅宗後帝遵承皆藏主於世祖廟積多無别是後顯宗但為陵寢之號和帝崩上尊號曰穆宗殤帝崩鄧太后以尚嬰孩不列於廟就陵寢祭之而巳安帝殺大臣廢太子及崩無上祖宗之奏以建武以來無毀者遂因陵號恭宗順帝崩上尊號曰孝宗沖質帝皆年少早崩依殤帝故事桓帝崩上尊號曰威宗靈帝崩而天下亂故未議祖宗之事於是有司奏議宗廟迭毀左中郎將蔡雍議曰漢承秦滅學之後宗廟之制不用周禮每帝即位輒立一廟不止於七昭穆不定宗廟迭毀孝元皇帝時丞相匡衡御史大夫貢禹始建斯議罷絀典禮孝文帝孝武帝孝宣帝皆功德茂盛為宗不毀初孝昭尊崇孝武廟稱世宗中正大臣夏侯勝猶執異議不應為宗至孝宣皇帝議猶不定太僕王舜中壘校尉劉歆據經傳義處不可毀上從其議古人據正重愼不敢私其君父如此其至者也後遭王莽之亂光武皇帝受命中興廟稱世祖孝明皇帝政參文宣廟稱顯宗孝章皇帝至孝蒸蒸仁恩博大廟稱肅宗比方前世得禮之宜自此巳下政事多釁權稱臣下嗣帝殷勤各欲尊崇至親而臣下懦弱莫敢執正夏侯之議故遂愆濫無有防限今聖朝遵復古禮以求厥中誠合事宜孝元皇帝世在第八武皇帝世在第九故元帝為考廟尊而奉之孝明因循亦不敢毀元帝今於廟九世非宗親盡宜毀比惠昭成哀平帝五年而再殷祭孝安孝桓孝昭孝和孝靈在穆四時常陳孝和以下穆宗恭宗威宗之號皆宜省去以遵先典殊異祖宗不可參並之義從之袁宏曰光武之繫元帝可謂正矣夫君臣父子名教之本也然則名教之作何為者也蓋凖天地之性求之自然之理擬議以制其名因循以弘其教辨物成器以通天下之務者也是以高下莫尚于天地故貴賤擬斯以辨物尊卑莫大於父子故君臣象兹以成器天地無窮之道父子不易之體夫以無窮之天地不易之父子故尊卑永固而不逾名教大定而不亂置之六合充塞宇宙自今及古其名不去者也未有違失天地之性而可以序定人倫矣乎自然之理而可以彰明治體者也末學庸淺不逹名教之本牽於事用以惑自然之性見君臣同於父子謂兄弟可以相傳為體謂友於齊於昭穆違自然之本滅自然之性豈不哀哉夫天地靈長不能無否泰之變父子自然不能無夭絶之異故父子相承至順之至也兄弟相及變異之極也變則求之於正異則本之於順故雖經百世而高卑之位張崇涉變通而昭穆之序不亂由斯而觀則君臣父子之道焉可忘哉董卓問司徒王允曰欲得快司隸校尉誰可者允曰唯有蓋京兆耳卓曰此人明智有餘然則不可假以雄職也乃以勳為越騎校尉卓又畏其司戎復出為潁川太守頃之徴還京都公卿見卓皆拜謁勳獨長揖與卓爭論旁人皆失色而勳意氣自若初河南尹朱俊數為卓陳軍事卓曰我為將百戰百勝卿勿妄説且汙我刀鋸勳曰昔武丁之明猶求針諫明公猶未及武丁也卓謝曰戲之爾勳強直而內懼於卓不得意疽發背卒時年五十一遺令慙無以報先帝易受賻贈卓心雖憾勳然外示寬厚表賜東園祕器送之如禮勳字元固燉煌廣至人舉孝廉為漢陽長史素與武都蘇正和有隙及正和為州從事劾武威太守倚權貴恣行貪橫涼州刺史梁鵠懼其貴戚欲殺正和以自解以訪勳或勸勳曰因此報仇勳曰不可謀事殺良非忠也乘危非仁也忠仁棄之人將不食我餘乃諫鵠曰夫緤食鷹鸇欲其鷙也鷙而烹之何用哉鵠從其言正和喜而求見勳勳曰吾為梁使君謀不為蘇正和也怨之如初黃巾之起故武威太守黃俊被徵失期鵠欲奏誅俊勳為言得免俊以黃金二千斤與勳勳謂俊曰吾以子罪在八議故為子言吾豈賣評哉終辭不受涼州刺史左昌因軍法斷盜數千萬勳諫不聽乃怒勳使屯河陽欲因軍法罪之而勳數有戰功詔書勞勉焉邊章之反圍昌逼急昌以檄召勳勳初與從事辛曾孔常俱屯河陽曾常疑不肯應檄勳怒曰昔莊賈後期穰苴奮鉞今之從事豈重於監軍哉常懼乃從勳至兾親責數章等責以背叛之罪皆曰左使君若早從君言以兵臨我得自分明今我罪巳重不可復降也皆泣涕而去會叛羌圍護羌校尉夏育於畜官勳與州郡并兵救育至孤磐為羌所破勳被三創前陳多死勳使人書木表曰使國家尸我於此羌滇吾素為勳所厚乃以兵扞衆曰蓋長史淸賢汝曹殺之者為負天勳仰罵曰死反虜汝何知促殺我衆相視而驚滇吾以馬與勳勳曰我欲死不去也衆曰金城購君羊萬頭馬千匹欲與君為一勳咄咄曰我死不知也羌遂囚勳勳辭氣不撓羌不敢害送還郡於是以勳為漢陽太守民飢相食勳調穀廩之諸富室或匿不肯出勳曰吾知罪矣乃自出家穀以率之郡中聞之不督而送兾倉者二千餘斛賴勳之得存者千餘人六月丙戌京師地震卓問蔡雍雍對曰地震隂盛大臣逾制之所致也公乘靑蓋車遠近以為非宜卓從之乘金華皂蓋車秋七月司空种弗以地震䇿免癸卯光祿勳淳于嘉為司空董卓既入關袁紹還軍延津使潁川荀諶説兾州刺史韓馥曰公孫瓉乘勝來南而諸郡應之袁車騎引軍東向此其意不可知竊為將軍危之馥曰為之奈何諶曰公孫瓉提燕代之卒其鋒不可當袁氏一時之傑必不為將軍下夫兾州天下之重資也若兩雄并力兵交於城下危亡可立而待也夫袁氏將軍之舊也且已同盟當今為將軍計者莫若舉州以讓袁氏袁氏得冀州則瓉不與之爭必厚德將軍兾州入於親友是將軍有讓賢之名而身安於泰山也願將軍勿疑馥素恇怯因然其計馥長史耿武别駕閔純治中李曆騎都尉沮授諫曰兾州雖鄙帶甲百萬穀支十年袁紹孤客窮軍仰我鼻息譬如嬰兒在股掌之上絶其哺乳立可餓殺奈何欲以兾州與之馥曰吾袁氏故吏且才不如本初度德而讓古人所貴諸君獨何病焉乃遣子送印綬以讓紹紹既有兾州辟授為别駕從事紹謂授曰今賊臣作變朝廷遷移孤歷世受寵欲竭命致死以復漢室然桓公非夷吾不能成霸越王非范蠡無以存國今欲與君戮力同心共安社稷授進曰將軍弱冠登朝播名海內值廢立之際則忠義憤發卓雖凶暴弗能加兵昔相如叱秦晏嬰哭莊方之將軍曷足以喻單騎出奔則卓懷怖懼濟河而北則渤海稽首擁一郡之卒撮兾州之衆威震河朔名重天下雖黃巾散亂黑山跋扈舉軍東向則青州可定還討黑山則張燕可滅回師北首則劉虞必喪震脅戎狄則胸奴順從橫大河之北合四州之地收英雄之用擁百萬之衆迎大駕於長安復宗廟於洛邑號令天下以討未服以此爭鋒誰敢御之比及數年此功不難紹喜曰此孤之本心也即表授為奮武將軍使監護諸將袁紹以曹操為東郡太守初潁川人荀彧字文若舉孝廉為亢父令見天下將亂棄官歸家謂父老曰潁川四戰之地天下今有變常為兵衝密雖有固適可避小冦不足以捍大難宜亟去鄉里人多懷土不能從也韓馥遣騎迎焉會袁紹襲兾州待彧以上賔之禮彧弟諶及同郡辛評郭圖皆為紹任彧知紹不能有成也遂去紹歸曹操操見彧悅曰吾子房也以為司馬時董卓兵強山東震恐彧説操曰董卓暴虐巳甚必以亂終無能為也操善之丙寅太尉趙謙久病䇿罷辛酉太常馬日磾為太尉公孫瓉以劉備為平原相十二月録從入關者功封侯賜爵各有差司徒王允為溫侯食邑五千戶固讓不受尚書僕射士孫瑞説允曰天子裂土班爵所以庸勳也與董太師並位俱封而獨勵高節愚竊不安也允納其言乃受二千戶是歲長沙武陵人有死者經月復活占曰至隂為陽下民為上將有自微賤而起者也後漢孝獻皇帝紀卷第二十六
