front:
  text: 後漢紀孝獻皇帝卷第二十六袁宏初平元年春正月辛亥大赦天下侍中周毖城門校尉伍瓊説董卓曰夫廢立事大非常人所及袁紹不逹大體恐懼出奔非有他志也今購之急勢必為變袁氏樹恩四世門生故吏遍於天下若收豪傑以聚徒衆英雄因之而起山東非公之有也不如赦之拜一郡守則紹喜於免罪必無患矣卓以為然乃以紹為渤海太守癸丑卓殺弘農王卓使郎中令王儒進鴆於王曰服藥可以辟惡王曰我無疾是欲殺我爾不肯強之於是王與唐姬及宫人飲藥王自歌曰天道易兮運何艱棄萬乘兮退守藩逆臣見迫兮命不延逝將去汝兮往幽玄唐姬起舞歌曰皇天崩兮后土頽身為帝王兮命夭摧死生異路兮從此乖悼我焭獨兮心中哀因泣下坐者皆悲王謂唐姬曰卿故王者妃勢不為吏民妻矣自愛從此與卿辭遂飲藥而死帝聞之降坐盡哀是時兾州刺史韓馥豫州刺史孔胄兖州刺史劉岱陳留太守張邈渤海太守袁紹東海太守喬瑁山陽太守袁遺河南太守王匡濟北相鮑信後將軍袁術議郎曹操等並興義兵將以誅卓衆各數萬人推紹為盟主紹自號車騎將軍操行奮武將軍長沙太守孫堅亦起兵誅卓比至南陽衆數萬人卓以堅為破虜將軍兾其和弭堅討卓逾壯進屯陽人卓大怒遣胡軫呂布擊堅戰于建平堅大破之卓以山東兵盛欲徙都關中召公卿議曰高祖都關中十一世後漢中興東都洛陽從光武至今復十二世案石苞室讖宜復還都長安百官無敢應者司徒楊彪曰遷都改制天下大事皆當因民之心隨時之宜昔盤庚五遷殷民胥怨故作三篇以曉諭之往者王莽篡逆變亂五常更始赤眉之變焚燒長安殘害百姓民人流亡百無一存光武受命更都洛陽此其宜也方今建立聖主光隆漢祚而無故捐宗廟宫殿棄先帝園陵百姓驚愕不解此意必糜沸蟻聚以致擾亂石苞室讖妖邪之書豈可信用卓作色曰楊公欲沮國家計邪關東黃巾作亂所在賊起長安崤函險固國之重防又隴右取材木功夫不難杜陵南山下有孝武帝故陶作甎處一朝一夕可辦宫室官府盍何足言百姓小人何足與議若有前却以我大兵驅之豈得自在百寮皆失色太尉黃琬曰此大事楊公語得無可思乎司空荀爽曰相國豈樂遷都邪今山東兵起非可一日禁也而關西尚靜故當遷之以圖秦漢之勢也堅爭不止禍必有所歸吾不為也卓使有司奏免二公二月丁亥太尉黃琬司徒楊彪䇿罷初卓用伍瓊周毖之議選天下名士馥等既出皆舉兵圖卓卓以瓊毖賣巳心怒之及議西遷瓊毖固諫卓大怒曰君言當拔用善士卓從二君計不敢違天下心諸君到官舉兵相圖卓何相負遂斬瓊毖彪琬恐懼詣卓謝曰因小人戀舊非欲沮國事也請以不及為受罪卓不勝當時之忿既殺瓊毖旋亦悔之故表彪琬為光祿大夫卓以河南尹朱俊為太僕以為已副俊不肯受因進曰國不宜遷必孤天下望成山東之釁臣不見其可也有司曰召見君受拜而君拒之不問徙事而君陳之何也俊曰副相國至重非臣所堪遷都非計臣之所急也辭所不堪進其所急臣之宜也有司曰遷都之事初無此計也就有未露何所受聞俊曰相國董卓具為臣説有司不能屈於是朝之大臣及尚書郎華歆等皆稱焉由是止不副卓卓愈恨之懼必為卓所陷乃奔荆州光祿勳趙謙為太僕王允為司徒守尚書令丁亥天子遷都長安卓留屯洛陽盡焚宮室徙民長安壬辰白虹貫日三月己巳車駕至長安遭赤眉之亂宮室焚盡唯有高廟京兆府舍遂就都焉戊午卓殺太傅袁隗及其三子是時袁紹屯河內陳留太守張邈兖州刺史劉岱東郡太守喬瑁山陽太守袁遺屯酸棗後將軍袁術屯南陽豫州刺史韓馥大會酸棗將盟諸州郡更相推讓莫有肯先當廣陵功曹臧洪升壇操血曰漢室不幸王綱失統賊臣董卓乘釁縱害禍加至
