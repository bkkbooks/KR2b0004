body:
  text: 後漢孝獻皇帝紀卷第三十袁宏十二年春曹操上表曰昔袁紹入郊甸戰於官渡時兵少糧盡圖欲還許荀彧乃建進討之規遂摧大逆覆取其衆此彧覩勝敗之機略不出世紹既破敗臣糧亦盡以為河北未易圖也欲南討劉表或復止臣陳其得失臣用反於是遂平四州向使臣退於官渡紹必鼓行而前遂征劉表則河北延其凶訃彧之二䇿以立為存以禍為福臣所不及也是故先帝貴指縱之功薄搏獲之賞古人尚帷幄之規下攻拔之捷原其績效足享高爵而海內未喻其狀所受不侔其功臣誠惜之乞重平議增疇戶邑或深辭讓操報之曰君之䇿謀非但所表二事而巳前後謙沖欲慕魯連先生乎此聖人逹節者所以貴也昔介子推有言竊人之財猶謂之盜況君密謀安衆先於孤者以百數乎以二事相還而復辭何敢謙亮多邪三月癸丑增封守尚書令彧戶一千并前二千戶操欲表為三公或使荀攸深讓至于十數乃止是時曹公世子聰明尊雋宜高選天下賢哲以師保之輔成王德及征行軍宜以為副二使漸明御軍用之道操從之秋八月曹操登白狼山與胸奴冒頓戰大破斬之袁尚熙奔遼東太守公孫康斬尚熙首送京師乙酉封操三子為列侯操不受冬十月星孛于鶉尾乙酉濟南王斌為黃巾所殺劉備屯新野荆州豪傑歸者日衆琅邪陽都人諸葛亮字孔明躬耕隴畝好為梁甫吟身長八尺嘗自比於管仲樂毅時人莫之許也唯博陵崔少平潁川徐元直與亮友善謂之信然於是徐庶見劉備曰諸葛孔明臥龍也將軍豈願見之乎備曰君與俱來庶曰此人宜可以就見不可屈致將軍且枉駕顧之由是備三詣其廬因屛人而言曰漢室傾穨姦臣竊命主上蒙塵孤不量力度德欲信大義於天下而智術淺短遂用猖蹶至于今曰然志猶未巳君為計將安出亮答曰自董卓以來豪傑並起跨州連郡不可勝數曹操比於袁紹則名微而衆寡遂能剋紹以弱為強此非唯天時抑亦人謀也今巳擁百萬之衆挾天子而令諸侯此誠不可與爭鋒孫權據有江東巳歷三世國險而民附賢能為之謀此可與之為援不可圖也荆州北據漢沔利盡南海東連吳會西通巴蜀此用武之國而其主不能殆天將所以資將軍也益州險塞沃野天府之地高祖因之以成帝業劉璋暗弱張魯在北民殷國富而不知存恤智能之士思得明后將軍既帝室之胄信義著於四海總覽英雄思賢如渴若跨有荆益保其巖阻西和諸戎南撫夷越結好孫權內修政治天下有變命一上將將荆州之軍以向宛洛將軍身率益州之衆出於秦川百姓孰不簞食壷漿以迎將軍者乎如是霸業可成漢室復興也備曰善於是與亮情好日密諸將不悅備解之曰孤之有孔明猶魚之得水願諸君勿復言十三年春正月癸未司徒趙溫請置丞相秋七月曹操征劉表八月丁未光祿大夫郤慮為御史大夫初操以榖少禁酒太中大夫孔融以為不可與操相覆疏因以不合意時中州略平惟有吳蜀融曰文德以來之操聞之怒以為怨誹浮華乃令軍咨祭酒路粹傳致其罪壬子太中大夫孔融下獄誅妻子皆棄市融字文舉魯國人孔子二十世孫幼有異才年十餘歲隨父詣京都時河南尹李膺有重名勑門通簡賔客非當世英賢及通家子孫不見也融欲觀其為人遂造膺門曰我是李君通家子孫門者白膺請見曰高明父祖嘗與㒒周旋乎融曰然先君孔子與君李老君同德比義而祖師友則僕纍世通家也衆坐莫不歎息僉曰異童子也太中大夫陳禕後至同坐以告禕曰小時了了者至大亦未能奇也融曰如足下幼時豈嘗惠乎膺大笑謂融曰高明長大必為禕器年十三喪父哀慕毀瘠杖而後起州里稱其至孝初山陽張儉與融兄裒友善亡命來詣裒適出時融年十六儉不告融知儉長者有窘迫色謂曰吾獨不能為君主也因留舍藏之後以人客發泄國相以下密就掩捕儉得脫走收融及裒送獄融曰保內藏舍者融也當坐之裒曰彼來求我求我之由非弟之過我當坐之兄弟爭死郡縣疑不能決乃上讞詔書令裒坐之融由是顯名年二十八為北海太守先是黃巾破青州融收合夷民起兵自守賊張餘等過青州融逆擊為其所敗收餘兵保朱虛稱詔誘吏民復置城邑崇學校庠序舉賢貢士表顯耆儒以彭璆為方正邴原有道王修為孝廉告高密縣為鄭玄特立鄉名曰鄭公鄉又國人無後及四方遊士有死亡皆為棺木而殯葬之使甄子然臨配食縣杜其禮賢如此劉備表融領青州刺史年餘為群賊所攻不能自守建安初徴為將作大匠遷少府每朝會訪對輒為議主諸卿大夫寄名而巳初潁川陳紀論復肉刑書曰惟敬五刑以成三德易著劓刖滅趾之法所以輔政助教懲惡息殺也且殺人償死合於古制至於傷人或殘毀其體而才翦亡髮非其理也若用古刑使淫者下𧖟室盜者刖其足永無淫放穿窬之姦矣融難之曰古者吏端刑清治無過差百姓有罪皆不之濫末世凌遲風化壞亂法侮其民故曰上失其道民散久矣而欲繩之以古制投之以殘棄非所謂與時消息也紂斬一朝涉之脛天下謂之無道九牧之地千八百紂也求世休和不可得巳且𬒳刑之人慮不全生志在思死類多趨惡夙沙亂齊伊戾禍宋趙高英布為世大患雖忠如鬻權信如卞和智如孫臏冤如巷伯才如史遷逹如子政一離刀鋸沒世不齒是太甲之思庸穆公之霸秦陳湯之都賴魏尚之邊功無復悔也曹公將復肉刑以衆議不同乃止袁宏曰夫民心樂全而不能常蓋利用之物懸於外而嗜欲之情動於內也於是有進即陵競之行希求放肆不巳不能充其嗜欲也則苟且僥幸之所生也希求無厭無以踈其欲也則姦僞忿怒之所興也先王知其如此而欲救弊故先以德禮陶其心其心不化然後加以刑辟書云百姓不親五品不遜汝作司徒敬敷五教五教在寬蠻夷猾夏寇賊姦䆒汝作士五刑有服然德刑之設參而用之者也三代相因其義詳焉周禮使墨者守門劓者守閭宮者守內刖者守囿此肉刑之制可得而論也荀卿亦云殺人者死傷人者刑百王之所同未知其所由來者也夫殺人者死而相殺者不巳是大辟可以懲未殺不能使天下無殺傷人者刑而害物者不息是黥劓可以懼未刑不能使天下無刑也故將欲止之莫若先以德禮夫罪過彰著然後入于刑辟是將殺人者不必刑也縱而不死則陷於刑辟矣故刑之所制在於不可移之也禮教則不然明其善惡所以濳勸其情消於未然也示以耻辱所以內其心治之未傷也故過而不至於著罪薄而不及於刑也終入辜辟者非教化之所得也故雖殘一物之生刑一人之體是除天下之害夫何傷哉率斯道也風化可以漸淳刑罰可以漸少其理然也苟不化其心而專任刑罰民失義方動陷刑網求世休和焉可得哉周之成康豈案三千之文而致刑措之美乎蓋德化刑清所致斯有由也漢初懲酷刑之弊務寬厚之論公卿大夫相與耻言人過文帝登庸加以玄默張武受賂賜金以愧其心吳王不朝崇禮以讓其失是以吏民樂業風化篤厚斷獄四百幾于刑措豈非德刑用之效哉世之論者欲言刑罰之用不先德教之益失之遠矣今大辟之罪與古同制免死以下不過五歲既釋鉗鎖復齒於人是以民不耻惡數為盜姦故刑徒多而亂不治也茍教之所去一離刀鋸沒身不齒鄰里且猶耻之而況朝廷乎如此則夙沙趙高之儔無所施其惡則陳紀所謂無淫放穿窬之姦於是全矣古者察言觀行而善惡彰焉然則君子之去刑辟固巳遠矣設而不幸則八議之所宥也若天下和史遷之冤淫刑之所及也苟失其道或不免於大辟而況肉刑哉又相刑之與枉殺人其理不同則死生之論善巳踈矣漢書斬右趾及殺人光自告吏坐受財守官物而即盜之皆棄市此班固所以謂當生而令死者也今不忍截刻之慘而安勦絶之悲此皆治體之所先而有國所宜改者也劉表病死少子琮領荆州九月劉琮降曹操劉備率衆南行曹操以精騎追之及於當陽備與諸葛亮等數十騎邪趣漢津徐庶母見獲庶辭備而指其心曰本與將軍共圖王霸之業以此方寸之地也今失老母方寸亂矣無益於事請從此辭遂詣曹操操既有荆州水軍十萬將順流東伐吳人振恐議者咸勸孫權迎操周瑜曰不然操雖託名漢相其實漢賊將軍以神武雄才兼仗父兄之烈割據江東地方數千里精兵足用英豪樂業尚當橫行天下為漢除殘去害況操自送死何迎之有瑜得精兵三萬保為將軍破之權曰老賊欲廢漢天子自立久矣徒忌二袁劉表與孤耳今數雄巳滅唯孤存孤與老賊勢不兩立君言當擊甚與孤合此天以君授孤也劉備至夏口諸葛亮謂備曰事急矣請求救於孫將軍時權軍於柴桑備使亮說權曰海內喪亂將軍起兵江東豫州亦收衆漢南與曹操並爭天下今操芟夷大難略平矣遂破荆州威振四海英雄無所用武故豫州遁逃至此將軍量力而處之若能以吳越之衆與中國抗行不如早與之絶若不能何不案戈束甲北面而事之乎今將軍外託服從之名內懷猶豫之計事急而不斷禍至無日矣權曰茍如君言劉豫州何不事之乎亮曰田橫齊之壯士耳猶義不辱況豫州王室之胄英才蓋世人之仰慕若水之歸海事之不濟此乃天也安能復為之下權勃然曰吾不能以全吳之地十萬之衆受制於人吾計決矣非劉豫州莫可當曹操者然豫州新敗之後復能抗此難乎亮曰豫州雖敗戰士還者精甲萬人曹操之衆遠來疲弊聞追豫州騎一日一夜行三百里此所謂强弩之末不能穿魯縞者也故兵法忌之曰必蹶上將軍且北方之人不習水戰又荆州之民附操者逼以兵勢耳非心腹也將軍誠能命猛將統兵數萬與豫州協規同契破操必矣操敗必北還如此則荆吳之勢强鼎足之形成成敗之機在於今日權大悅即遣周瑜將水軍三萬隨亮詣備并力拒操冬十月癸未日有蝕之十二月壬午徴前將軍馬騰為衛尉是月曹操與周瑜戰於赤壁操師大敗十四年劉備以孫權行車騎將軍備自領荆州屯公安七月曹操征孫權冬十月晦日有蝕之十五年春二月乙巳日有蝕之十六年春正月辛巳以曹操世子丕為五官中郎將副丞相三月馬超韓遂反秋七月操征超遂大破之是歲劉備入益州十七年春正月加曹操入朝不趨劒履上殿贊拜不名夏五月癸未誅衛尉馬騰超之父也六月庚寅晦日有蝕之秋七月庚戌立皇子臨為濟隂王懿為山陽王邈為濟北王敦為東海王冬十月曹操征孫權侍中尚書令荀彧勞軍於譙初董紹等謂曹操宜進爵郡公九錫備物以彰殊勳密以語彧彧曰曹公本興義兵以匡朝寧國秉忠貞之誠守退讓之實君子愛人以禮不宜如此操由是心不平之是行也操請彧勞軍因留彧以侍中光祿大夫持節丞相軍事次壽春彧以憂死袁宏曰夫默語也賢人之略也政卷舒廢興之間非所謂以智屈伸貴其多算權其輕重而揣難易君子之行巳也必推其心而逹其道信其誠而行其義義不違心故百姓知其無私道不失順則天下以為至當其出也忠著於時君仁及於天下匹夫匹婦莫不咨嗟者以其致功之本義和也若時不我與中道而廢內不負心外不愧物千載之下觀其迹而悲其事以為功雖不就道將何成也及其默也非義而後退讓謀而後止蓋取舍不同故宛龍蟠以求其志雖仁者之心大存兼愛援手而陷於不義君子不為也苟為斯道四體且猶致患而況萬物乎漢自桓靈君失其柄陵遲不振亂殄海內以弱致弊虐不及民劉氏之澤未盡天下之望未改故征伐者奉漢拜爵賞者稱帝名器之重未嘗一日非漢魏之乎亂資漢之義功之剋濟荀生之謀謀適則勳隆勳隆則移漢劉氏之失天下荀生為之也若始圖一匡終與勢乖情見事屈容身無所則荀生之識為不智矣若取濟生民振其塗炭百姓安而君位危中原定而社稷亡於魏雖親於漢巳踈則荀生之功為不義也夫假人之器乘人之權既而以為巳有不以仁義之心終亦君子所耻也一汙猶有慙色而況為之謀主功奮於當年迹聞於千載異夫終身流涕不敢謀燕之徒隸者自巳為之功而巳死之殺身猶有餘愧焉足以成名也惜哉雖名蓋天下而道不合順終以憂卒不殞不與義故曰非智之難處智之難非死之難處死之難嗚呼後之君子默語行藏之際可不愼哉十八年春二月庚寅省幽州并州以其郡國并屬兾州省司隸校尉以其郡國分屬豫州省梁州以其郡國并屬兾州夏五月丙申天子使御史大夫郤慮持節䇿命曹操為公曰朕以不德少遭憫凶越在西土遷在唐衛當此之時殆若綴旒宗廟乏祀社稷無位羣凶覬覦分裂諸夏率土之民朕無獲焉即我高祖之命將墜於地朕用夙興假寐振悼于厥心曰惟考惟祖股肱先正其孰恤朕躬乃誘天衷誕育丞相保乂我皇家弘濟于艱難朕實賴之今將授君典禮其敬聽朕命昔者董卓初興國難羣后釋位以謀王室君則首啓戎行此君之忠於本朝也後及黃巾反易天常侵我三州延及平民君又翦之以寧東夏此又君之功也韓暹揚奉專用威命君則致討克黜其難遂遷許都造我京邑設官兆祀不失舊物天地鬼神於是獲乂此又君之功也袁術僭逆肆于淮南懾憚君靈用丕顯謀蘄陽之伇橋蕤授首稜威南邁術以殞潰此又君之功也回戈東征吕布就戮乘轅將反張陽殂斃睦固伏罪張繡稽服此又君之功也袁紹逆常謀危社稷慿恃其衆稱兵內侮當此之時王師寡弱天下寒心莫有固志君秉大節精貫白日奮其武怒運其神䇿致届官渡大殱醜類俾我國家拯於危墜此又君之功也濟師黃河拓定四州袁談高幹咸梟其首海盜奔迸黑山順軌此又君之功也烏桓三種崇亂二世袁尚因之逼處塞北束馬懸車一征而滅此又君之功也劉表背誕不供貢賦王師首路威風先逝百城八郡交臂屈膝此又君之功也馬超成宜同惡相濟濵據河潼求逞所欲殄之渭南獻馘萬計遂定邊城撫和戎狄此又君之功也鮮卑丁零重譯而至單于白屋請吏率職此又君之功也君有定天下之功重之以明德班序海內宣美風俗旁施勤教表繼絶世舊德前功罔不咸秩雖伊尹格于皇天周公光于四海方之滅如也朕聞先王並建明德祚之以土分之以民崇其寵章備其禮物所以蕃衛王室左右厥世也其在周成管蔡不靜懲難念功乃使邵康公賜齊太公履東至于海西至于河南至于穆陵北至于無棣五侯九伯實得征之世祚太師以表東海爰及襄王亦有楚人不恭王職又命晉文登為侯伯錫以二輅虎賁斧鉞秬鬯弓矢大啓南陽世作盟主故周室之不壞繄二國之是賴今君丕稱顯德明保朕躬奉答天命導揚弘烈綏寧九域莫不率俾功高伊周而賞卑於齊晉朕甚恧焉昳以眇眇之身託于兆民之上永思厥艱若涉泉水非君攸濟朕無任焉今以兾州之河東河內魏郡趙國中山常山巨鹿安平甘陵平原凡十郡封君為魏國公錫君玄土苴以白茅爰契爾龜用建冡社昔在周室畢公毛公入為卿佐周邵師保出為二伯外內之任君實宜之其以丞相領兾州牧如故又加君九錫其敬聽朕命以君經緯禮律為民軌儀使安職業無或遷志是用錫君大輅戎輅各一玄牡二駟君勸分務本穡人昏作粟帛滯積大業惟興是用錫君衮冕之服赤舄副焉君敦尚廉讓俾民興行少長有禮上下咸和是用錫君軒懸之樂八佾之舞君宣翼風化爰及四方遠人回面華夏充實是用錫朱戶以居君研其明哲思帝所難官才任賢羣善必舉是用錫君納陛以登君秉國之鈞正色處中纎毫之惡靡不抑退是用錫君虎賁之士三百人君糾逖天刑章厥有罪犯關于紀莫匪誅殛是用錫君斧鉞各一君龍驤虎視旁眺八維掩討逆節折衝四海是用錫君彤弓一彤矢百玈弓十盧矢千君以溫恭為基孝友為德明允篤誠感千朕思是用錫君秬鬯一鹵圭瓉副焉魏國宜置丞相巳下羣臣百僚皆如漢初諸侯王制往欵哉敬服朕命簡恤爾衆時亮庶工用終爾顯德對揚我高祖之休命六月巳巳徙趙王圭為博陵王十九年春三月癸未改授魏公金璽赤黻遠遊冠夏五月劉備剋成都遂有益州諸葛亮為股肱乃峻刑法自君子小人咸懷怨歎法正諫曰昔高祖入關約法三章秦民知德今君假借威力跨有一州初有其國未垂惠撫且客主之義宜相降下願緩刑㢮禁以慰其望亮曰君知其一未知其二秦以無道政苛民怨一夫掉臂天下土崩高祖因之以成帝業劉璋暗弱自是巳來有纍世之恩支柱羈縻示相承奉德政不修威刑不肅寵之以位位極則賤順之以恩恩竭則慢所以致弊實由此也吾今先威以法法行則知恩限之以爵爵加則知榮恩榮並濟上下有節為治之要於此為著冬十一月丁卯皇后伏氏廢非上意也曹操使人收后后𬒳髮徒跣而出上謂御史大夫郗慮曰郗公天下寧有是乎后見殺之日后父完及宗族死者百有餘人二十年春正月立皇后曹氏操女也初操以二女為貴人大貴人立為皇后三月曹操征張魯秋七月魯遂降二十一年春正月巳丑封魏公子六人為列侯夏四月甲午進魏公爵為王五月巳亥朔日有蝕之二十二年夏四月命魏王建天子旌旗出警入蹕冬十月命魏王冕有十二旒乘金根車設五時副車是歲大疫二十三年春正月甲子太醫令吉平少府耿熙等謀誅曹操發覺伏誅三月有星孛于東井二十四年春三月壬子晦日有蝕之夏五月劉備取漢中秋八月諸葛亮等上言曰唐堯至聖而四凶在朝周成仁賢而四國作難高后稱制而諸吕竊命孝昭幼冲而上官逆謀皆慿世寵藉履國威權窮凶極亂社稷幾危非大舜周公朱虛博陛則不能擒凶討逆扶危定傾伏惟陛下誕姿聖德統理萬邦而遭家運不造之難董卓首亂蕩覆京畿曹操階禍竊執天衡皇后太子鳩殺見害剝畏天下殘毀民物久令陛下蒙塵幽處人神無位遏絶王命厭昧皇極欲佻神器左將軍領司隸校尉豫荆益等州牧宜成亭侯備授朝爵秩念在輸力以狥國難覩其機兆赫然發憤與車騎將軍董承謀共誅操將安國靜難克寧舊都會承不密令操遊魂遂得長惡殘泯海內臣等每懼王室大有閻樂之禍小有定安之變夙夜惴惴戰栗纍息昔在虞書敦序九族周監二代封建同姓詩著其義歷載長久漢興之初割裂疆土尊王子弟是以卒折諸吕之難而成太宗之基亮等以備肺腑枝葉宗子蕃翰心存國家念在弭亂自備破收漢中海內英雄望風蟻附而爵號不顯九錫未加非所以鎮衛社稷光照萬世奉辭在外詔命斷絶昔西河太守梁統等值漢中興限於河山位同權均不能相率咸推竇融以為元帥卒立績效推破隗囂今社稷之難甚於隴蜀操外吞天下內殘羣僚朝廷有蕭牆之危而禦侮未立可謂寒心臣等輒依舊典立備為漢中王拜大司馬董齊六軍糾合同盟掃滅凶逆以漢中巴蜀廣漢犍為為國所置置依漢𥘉立諸侯王故典夫權宜之制苟利國家專之可也然後功成事立臣等退伏矯罪雖死無恨遂於江陽設壇場御王冠于劉備備上言曰臣以具臣之才荷上將之任董督三軍奉辭于外不能除冦靜難以匡王室久使陛下聖教陵遲六合否而不泰惟憂反側疹如疾首曩者董卓造為亂階自是之後羣凶縱橫殘剝海內賴陛下聖德威靈人神同應或忠義奮討或上天降罰暴逆並殪以漸氷消惟獨曹操久未梟除侵擅國威恣心極亂臣等昔與車騎將軍董承同謀討操機事不密承見陷害臣播越失據忠義不果遂得使操窮凶極逆主后戮殺皇子鴆害雖糾合同盟念在奮力懦弱不武歷年無效常恐殞殁孤負國恩假寐永歎夕愓若厲今臣羣僚以為昔在虞書敦叙九族庶明厲翼五帝以來此道不廢周監二代建諸姬姓實賴晉鄭夾輔之福高祖龍興尊王子弟大啓九國卒斬諸呂以安太宗今操惡直醜正實繁有徒包藏禍心篡逆巳顯既王室微弱帝族無位斟酌古式依假權宜上臣大司馬漢中王所獲巳過不宜復忝高位以重罪謗羣臣見逼迫以大義追惟冦賊不梟國難未巳宗廟傾危社稷將墮誠臣深憂碎首之責若應權通變以寧聖主雖越水火所不敢辭常慮於懷以防後悔輒順衆議拜授印璽以崇國威仰惟爵高寵厚俯思自效憂深責重驚悸纍息如臨于谷輒將率六軍順時撲討以寧社稷以報萬分九月丞相掾魏諷謀誅曹操發覺伏誅諷有威名濳結義士坐死者數十人二十五年春正月庚子魏王曹操薨諡曰武王壬寅詔曰魏太子丕昔皇天據乃顯考以翼我皇家遂攘羣凶戡定九州弘功茂績光于宇宙朕用垂拱三十有餘載天不愸遺一老永保余一人早世濳神哀悼切傷丕奕世宣明宜秉文武紹熙前緒今使使持節御史大夫華歆奉䇿詔授丕丞相印授魏王璽黻領兾州牧方今外有遺虜遐夷未賔旗鼓尚在邊境干戈不得韜刃斯乃播揚洪烈立功垂名之秋也豈得修諒暗之禮究曽閔之志哉其敬服朕命抑弭憂懷旁祗厥序時亮天工以稱朕意於戲可不勉乎二月丁未朔日有蝕之冬十月乙卯詔曰朕在位三十有二載遭天下蕩覆幸賴宗廟之靈危而復存然瞻仰天文俯察民心炎精之數既終行運在乎曹氏是以前王既樹神武之績今王又光𥙿明德以應其期是曆數昭明亦可知矣夫人之行天下為公選賢與能故唐堯不私於厥子而名播於無窮朕羡而慕之今其追踵堯典禪位于魏王乃告宗廟使御史大夫張音奉皇帝璽綬禪位于魏王曰咨爾魏王昔者帝堯禪位于虞舜舜亦以命禹天命不于常惟歸有德漢道陵遲世失其序降及朕躬大亂滋昏羣凶肆逆宇宙傾覆賴武王拯兹難于四方惟清區夏以綏我宗廟豈余一人獲乂俾九服實受其賜今王欽承前緒光于乃德恢文武之大業昭爾考之弘烈皇天降瑞人神告徴誕惟亮采師錫朕命僉曰爾禮度克協于虞舜用率我唐典敬遜爾位於戲天之曆數在爾躬允執其中天祿永終君其祗奉大化饗兹萬國以肅天道庚午魏王即皇帝位改年曰黃初魏帝既受禪問尚書陳羣曰朕應天順民卿等以為何如群對曰臣與華歆俱事漢朝雖欣聖化義形于色袁宏曰夫君位萬物之所重王道之至公所重在德則弘濟於仁義至公無私故變通極於代謝是以古之聖人知治亂盛衰有時而然也故大建名教以統群生本諸天人而深其關鍵以德相傳則禪讓之道也暴極則變變則革代之義也廢興取與各有其會因時觀民理盡而動然後可以經綸丕業弘貫千載是以有德之興靡不由之百姓與能人鬼同謀屬于蒼生之類未有不蒙其澤者也其政化遺惠施及子孫微而復隆替而復興豈無僻王賴前哲以免及其亡也刑罰淫濫民不堪命匹夫匹婦莫不憔悴於虐政忠義之徒無由自效其誠故天下囂然新主之望由兹而言君理既盡雖庸夫得自絶於桀紂暴虐未極徒於文王不得擬議於南面其理然也漢自桓靈君道陵遲朝綱雖替虐不及民雖宦豎乘間竊弄權柄然人君威尊未有大去王室世之忠賢皆有寧本之心若誅而正之使各率職則二祖文章之業復陳乎目前雖曰微弱亦可輔之時獻帝幼沖少遭凶亂流離播越罪不由巳故老後生未有過也其上者悲而思之人懷匡復之志故助漢者協從背劉者衆乖此蓋民未忘義異乎秦漢之勢魏之討亂實因斯資旌旗所指則以伐罪為名爵賞所加則以輔順為首然則劉氏之德未泯忠義之徒未盡何言其亡也漢苟未亡則魏不可取今以不可取之實而冒揖讓之名因輔弼之功而當代德之號欲比德堯舜豈不誣哉初魏王欲以楊彪為太尉彪辭曰嘗巳為漢三公遭世衰亂不能立尺寸之益若復為魏氏之臣於義既無所為於國選亦不為榮也遂聽所守及魏受禪乃下詔曰夫先王制几杖之賜所以賔禮黃耉褒崇元老也昔孔光卓茂皆以淑德高年受兹嘉錫公故漢宰臣乃祖巳來世著忠賢公年過七十行不踰距可謂老成人矣所宜寵異以彰舊德其錫公延年杖及伏几延請之日使杖入侍又使著鹿皮帽冠彪上章固讓不聽年八十四以壽終彪字文先幼習祖考之業以孝義稱自為公輔值王室大亂彪流離播越經歷艱難以身衛主不失中正天下以此重之自震至彪四世宰輔皆以儒素名德相承秉賜雖方節不及震然其恭謹孝友篤誠不忝前列也有子曰修少有俊才而德業之風盡矣至魏初坐事誅癸酉魏以河內之山陽封漢帝為山陽公行漢正朔焉明年劉備自立為天子後漢孝靈皇帝紀卷第三十
