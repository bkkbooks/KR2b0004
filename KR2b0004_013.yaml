body:
  text: 後漢孝和皇帝紀上第十三袁宏永元二年夏六月竇憲耿秉自方朔出塞三十里斬首大獲銘燕然山而還即拜憲為大將軍封武陽侯食邑二萬戶耿秉為算陽侯憲讓不受還師京於是竇篤為衛尉景執金吾瓌光祿勳尊太后毋比陽主為長公主益比陽沐邑二千石憲等驕奢不遵法度唯瓌恭儉自守尚書何敝上封事曰臣聞忠臣憂世譏刺貴臣至以殺身滅家而由為之者何誠君臣義重情不能巳也臣見國之將危家之將凶皆有所由較然易知不可不察也昔鄭莊不防段叔之禍也後更滋蔓竇憲兄弟尊朝虐用百姓殺戮盈溢咸曰段叔州吁將生于漢也是臣前連上便宜承陳得失非為嫉妬憲等也誠欲絶其綿綿塞其㳙㳙上不欲皇太后損文母之號况陛下有失教之議下使憲等得保其福然臧獲之謀上安主父下存主毋由不免於嚴怒况臣微末敢竭愚忠哉然臣纍世蒙恩位典機密每念厚德忽然忘生雖知言必夷滅誠不忍目見禍至故敢書寫肝膽舒度愚情駙馬都尉瓌忠孝愛主最自修整聞瓌比自申陳願抑損家權退身避賢宜順其意斯誠宗廟之至計竇氏之大福也敞辭㫖切直深為憲等所怨濟南王康光武之子也最為尊重而驕奢太甚於是左遷敞為濟南王太傳司隸校尉司空蔡河南尹王調洛陽令李阜皆竇氏之黨也秉憲之勢枉法任情尚書僕射樂恢奏免蔡等外以清京都內欲繩外戚由是為憲等所滅瓌常欲往侯恢使人先言恢恢謝而絶之憲兄弟怒其異巳常欲陷害之恢妻諫恢曰古有容身之道何必以言取怒歎曰何忍素餐立人朝乎乃上疏曰臣聞百王之失咸以隂盛凌陽而權移於下大臣專朝而勢去公室未有君德休明而臣下窺𨵦主一其柄而社稷傾危者先帝早棄天下况陛下富於春秋今諸舅執政外戚盈朝非所以寧王室示天下也夫天地不交則衆生夭傷君臣失序則萬民受殃政失不救其弊不測當今所急上宜以義自割下宜以謙自别四舅保爵土於子孫皇太后永無慙於宗廟誠計之上者書御不省恢乃乞骸骨詔授恢為騎都尉憲風郡縣使迫脅恢恢遂飮藥而死天下聞之皆以為怨恢字伯竒京兆長陵人也父為吏得罪於令令將殺之恢年十二伏寺門外啼泣不舍晝夜令嘉其孝赦其父罪恢事博士焦貺貺為河東太守恢隨之官閉廬專精不與掾吏交後况有事𬒳考諸生皆繫獄恢皎然得免恢為人廉潔抗厲衡陽侯隂就聞以禮請之恢絶不答杜陵人楊正嘗毀惡恢然舉正子為孝廉恢善頴川安王王上書得為巴郡太守遣使貽恢書恢不就答之曰干主求祿非平生操也其不念舊惡耻交進趨皆此類也何敞既傳濟南盡心輔道歲餘遷為汝南太守敞常疾俗吏苛刻以要名譽為政務崇寬和立春日乃召督郵還府復遣吏案行屬縣顯孝行舉仁義由是郡中翕然百姓化之其歸飬老母推財相讓者數百人秋七月㑹稽山崩本志稱劉向日山陽君也水臣也君道崩壞百姓失所竇太后攝政竇憲專權之應也二年春正月大赦天下夏耿秉出塞至涿邪山與北單于相遇大戰破之秉字伯初國之子也魁梧有才略善說司馬法為將常為士卒先休息不部陳然逺斤候要誓士卒爭為致死秉薨諡壯侯南單于聞秉薨舉國發喪劈靣流血得外國心如此秉弟䕫壯勇有氣力以軍功拜騎都尉常以精騎八百自漢軍未至封栗邑侯五月丙辰立皇弟惠為北海王開為河間王瑕為城陽王立故淮南聞王昞子惻為常山王故齊王晃子忍為齊王北海王睦子威為北海王車師遣使奉獻六月􅏤辰封竇憲為武陽侯篤偃侯景汝陽侯瓌夏陽侯憲獨不受封辛卯中山王焉薨諡曰簡王光武時諸王皆就國焉以郭后少子故留京師至永平初乃就國詔賜羽林右騎為虎賁又令上官屬子弟以為官騎焉皆上疏辭讓詔曰諸侯出境必有武備夾谷之㑹司馬以從夫有文事必有武備所以重蕃也王無辭焉是夏月氏王謝將七萬騎攻班超超衆大恐超曰月氏兵雖多千里逾葱嶺何足憂哉但當收榖堅守饑窮自降不過數十日決矣謝攻超不能下抄掠無所淂超度其糧盡必從龜兹求食乃遣數千兵伏東界要之謝果遣騎賫金銀珠玉往龜兹伏兵遮擊盡殺之遣持所斬以示謝謝大驚即遣使請罪願得生歸超縱遣之月氏震怖歲歲奉貢秋七月大將軍竇憲出屯涼州九月胸奴北單于遣使􅍁塞願朝見憲中護軍班固迎單于單于為南單于所破逺遁漢北固至私渠海而還於是北單于地空憲欲自為功乃立降者鹿蠡王阿修為單于因置中郎將領護軍如南單于故事事下公卿太尉宋由太常丁鴻少尹睦識以為阿修誅君之子又與鮮卑烏丸為父兄之讐不可立南單于先帝所置今首破北虜新建大功宜令并領降衆以終先帝破北成南之䇿議未定安懼憲計遂行復獨上封事曰臣聞功有難圖不可豫見者事有較然易料不疑者臣謂懼守正執平者臣請以先帝㫖意明之光武皇帝本所以立南單于者欲以安南定北分胸奴之勢也孝明皇帝欲裦成先帝之功故赫然發怒命將征伐陛下奉承洪業大開疆宇大將軍逺出籍勝此誠宣明祖宗餘志之弘勳也自南單于歸德巳來四十餘年矣三帝績以遺陛下孳孳所成也今南單于屯建大謀深入胸奴空盡其廬屯之大功也輟而不圖改立新降以一朝之計違三代之業背先祖棄舊恩非計之長也夫言行君子之樞機賞罰治國之綱紀論語曰言忠信行篤敬雖蠻貃之邦行矣今失信封南一屯則百蠻不敢復保誓矣阿修誅君子於春秋之義所不當立而烏丸鮮卑新殺北單于情莫不忿惡其讐今而立之則失意而懷怒矣兵食可易且漢故事供給南單于費值歲一億九千餘萬今北廬彌逺其費過倍是所以空盡天下也詔下其議於憲更相難十餘條憲負恃貴勢言辭驕慢安終不移上卒從安議三年春正月甲子皇帝加元服儀用新禮賜王公列侯在京師者黃金將大夫郎吏帛及天下男子爵各有差鰥寡孤獨貧不能自存者人帛一匹酺飲五日繫囚亡命贖罪各有差擢曹褒為射聲校尉尚書張敏奏褒擅制禮儀破亂聖術冝加削誅上寢其奏是後衆人不能信褒所制又㑹禮儀轉逮遂寢而不行袁宏曰夫禮也治心軌物用之人道也者其本所由在於愛敬自然發於心誠而揚于事業者聖人因其自然而輔其性情為之節文而宣以禮物於是有尊卑親踈之序焉推而長之觸類而申之天地鬼神之事莫不備矣古者民人淳朴至禮至簡汙樽抔飲可以盡歡於君親蕢桴土鼓可以致敬於鬼神將之以誠雖微物而可重獻之由心雖蒲質而可薦此蓋先王制禮之本也中古損益教行文質范金合土而棟比之制麗矣繪采集色而衣裳之度彰矣比聲諧音而金石之品繁矣夫簡朴不足以周務故備物以致用卑素不足以崇高故富以成業此又先王用禮之意也夫尊卑長幼不得而移者也器服制度有時而變者也小則凶荒殊典大則革伏異禮所以隨用合冝易民視聽者也此又先王變禮之㫖也是故王者之興必先制禮損益隨時然後風教從焉故曰殷因於夏禮所損益可知也周因於殷禮所損益可知也漢興撥亂日不暇給禮儀制度闕如也賈誼曰夫立君臣等上下使綱紀有序六親和睦此非天之所設也人之不修則壞宜定制度興禮樂後諸侯軌道百姓素朴乃草具儀寢而不行後之學者董劉之徒亦言禮樂之用而不能詳備其制度夫政治綱紀之禮哀樂死葬之節有異於古矣而言禮者必證於古古不可用而事各有宜是以人用其心而家殊其禮起而治之不能紀其得失者無禮之弊也曹裒父子慨然發憤可謂得其時矣然褒之所撰多案古式建用失宜異於損益之道所以廢而不修也冬十月幸長安祠園陵詔令大將軍憲與車駕㑹長安時尚書見憲皆欲釋仗稱萬歲尚書令韓稜曰枉道事人臣非所以立身也且禮無為人臣稱萬歲之制左右皆慚遂巳十二月龜兹姑墨溫宿國皆降乃以班超為西域都護徐幹為長史復置戊巳校尉唯焉耆須尉黎以前殺都護陳睦不內附四年春正月龜兹王遣子奉獻三月司徒袁安薨是時天子幼弱外戚擅權安每朝㑹及在朝廷議國家未嘗不慷慨流涕於言色自天子及朝中大臣皆倚安㑹病薨朝野痛惜焉𥘉安妻早卒葬鄉里臨終遺令曰備位宰相當陪山林不得歸骨舊葬若毋先在祖考墳壟若鬼神有知當留供飬也其無知不煩徙也諸子不敢違子賞車騎校尉京屬郡太守敞司空京子湯官至公輔𥘉安辟廬江周榮與語甚器之每預大議及奏論竇憲憲客徐齮脅之曰子為袁公腹心排大夫竇氏刺客今至矣子宜備之榮曰榮乃江淮孤生蒙先帝大恩備宰士正為竇氏所害誠所甘心常敕妻子蒼卒遇飛禍無得殯斂兾以區區腐身以悟朝廷及竇氏敗榮召為顯官至尚書郡守有孫曰景至太尉四月丁丑太常丁鴻上封事曰臣聞日者陽之精守實不虧君之象也月者隂之精盈數有常臣之表也故日蝕者隂陵陽月盛者下驕盈也變不虛生各以類應遠觀往古近察漢興傾危之禍靡不由兹故三桓專魯陳氏擅齊六卿分晉吕族覆漢哀平之末廟不血食此皆失其權柄以勢假人者也故有周公之親無其德不得行其勢伏見大將軍竇憲雖敕身自約不敢僣差然天下逺近皆惶怖承㫖小大望風莫不影從寵極則驕驗見於天雖欲隱諱神昭垂象閒者月滿不虧此大臣驕溢之應也陛下未悟故天重見誡日有蝕之誠宜畏愼以防其禍也詩云畏天之怒不敢戲豫夫疏巖絶崖之水由於㳙㳙干雲蔽日之木起於毫末有前事之不忘後事之明鏡冝因大變匡正其失以塞天意上深納之丙辰京師地震是時竇氏驕橫威震海內其所置樹皆名都大郡乘勢賦斂爭相路遺州郡望風天下騷動競侵陵小民掠奪財物攻亭驅吏略人婦女暴虐日甚百姓苦之又擅檄緣邉郡突騎善射有財力者二千石畏威不敢不送司徒袁安太尉任隗及有司數奏劾皆寢初憲女壻射聲郭舉衛尉鄧疊母兄出入禁中謀圖不軌上漸覺之與清河王慶圖其事使慶求外戚傳因與中官鄭衆密謀之衆勸上亟行其誅上曰憲在外恐變生不可是月憲還京師象由太后帝當謹護璽綬庚申上幸北宮詔公卿百官使執金吾衛南北宫詔收憲大將軍印綬封憲為親軍侯䔍景瓌皆就國郭舉鄧疊下獄誅上以太后故不欲極其獄乃守憲等選能相以逼迫之憲篤景皆自殺宗族免歸本郡河南尹張酺上疏曰臣愚以為竇氏之事宜下理官與天下共平其罪恐後世不見其事竇氏盛時羣臣莫不阿附唯恐在後皆以憲為尹吕比鄧夫人於文毋及陛下發雷電之怒皆以為罪不容誅何前後之相背也賴聖朝明逹析其中伏見夏陽侯瓌前為光祿勳每與臣相見常有勵節竭忠庶幾之心檢敕賔客未常犯法臣聞王政有三宥之義故蔡叔流言周公原本而誅臣愚以為可黜瓌爵關內侯還京師竭忠供飬比陽主以優屬垂示厚德上感酺言徙瓌為長沙侯於是何敞班固免歸家敞子與瓌善固黨於竇氏也𥘉固不教兒子兒子負固勢不遵法度吏民苦之洛陽令种競嘗出固奴干車吁奴辭罵辱競競大怒畏憲不敢發心銜之及憲賔客皆披繫兢因此捕繫固遂死獄中詔遣責兢而主者極罪固字孟堅彪之子也𥘉世祖問竇融在西州時每所上章奏誰與參之融對曰皆班彪所為也世祖雅聞彪名將召之㑹彪舉茂才除令以病免後應三公之命輒謝病去復以司徒掾望都長所歷二縣皆為吏民所愛彪既才髙而專心文史之間司馬遷著史記自太𥘉巳後闕而不録其後好事者或頗綴録其事時然多鄙俗不足以繼其書彪乃採前人遺事旁貫異聞作後傳數十篇因斟酌前史而譏正其失略曰唐虞三代詩書所及世有史官以司典籍至于諸侯國自有史故孟子曰楚之乘晉之檮杌魯之春秋其事一也定哀之間魯君子左丘明論集其文作左傳三十篇又撰異同號曰國語二十篇由是乘檮杌之事遂暗而左氏國語獨彰又有記録黃帝以來至春秋時帝王公侯卿大夫號世本十五篇春秋之後七國並爭秦并諸侯則有戰國䇿三十二篇漢定天下大夫陸賈記録時功作楚漢春秋九篇孝武之世太史令司馬遷采左氏國語删世本戰國䇿據楚漢列國時事上自黃帝下訖獲麟作本紀世家列傳書表凡百三十篇而十篇缺焉遷之所記從漢元至武帝則紀其功至其托經傳分散數家之事甚多踈略務欲以多聞廣博為功論議淺而不篤其論術學則崇黃老而薄五經序貨殖則輕仁義而羞貧窮尊游俠則賤守節而貴俗功此其大弊傷道所以遇極刑之咎也然善述事辨而不華質而不野文質相稱蓋良史之才也誠令遷依五經之法言同聖人之是非意亦庶幾矣夫百家之書猶可法也若左氏國語世本戰國䇿楚漢春秋太史公書今之所以知古後之所由觀前聖人之耳目也焉可闕哉固九歲能屬文五經百家之言無不究覽其學無常師又不為章句訓詁通而巳性多愛不以所長傲物人皆重之弱冠早孤固以唐虞三代詩書所及世有典籍故雖堯之盛必有典謨之篇然後冠德百王漢紹堯運以建帝業六世史臣乃追述功德私作本紀編於百王之末厠於秦項之列太初以後闕而不録故采撰前紀綴集所聞以述漢書元起高祖終于孝平王莾之誅十有二世二百三十年綜其行事旁貫五經上下洽通凡百篇未成明帝初人有上書言固私改史記者詔收固京兆獄悉斂家書封上是時扶風人蘇朗僞言圖䜟事下獄死固弟超為郡所誣乃詣關上書具陳固著述意㑹郡亦封上固書天子甚竒徴詣校書部除蘭臺令史舉睢陽令陳宗故長陵令尹敏司隸從事孟異共作世祖本紀及世祖功臣平林新市公孫述二十八篇奏之帝乃復使成前書自永平始研精積思二十餘年至建初中其書乃成世甚重其書學者靡不諷誦焉自為郎後遂見親近賞賜恩寵優渥章帝好文章逾益進幸數入讀書禁中或連日逮夜每行巡狩輒獻上賦頌朝廷時有大議令固問難於前然位不過郎固雖篤志於學以述作為務然好傅㑹權寵以文自通其序事不激詭不抑亢贍而不穢詳而有體使讀之者亹亹而不厭亦良史之才也至於排死節否正直以苟免為通傷名教也史遷之作皆推之於談彪經序其謀略以舉矣而固盡有功豈不勝哉竇氏既廢天子追覽前議嘉袁安之忠知宋由之不正也乃䇿免由秋七月巳丑太尉宋由有罪自殺八月司空任隗薨字仲和光之子初光濟世祖於信都封陵侯光薨隗襲爵隗好黃老清靜少欲以功臣子行異於衆擢為勇賁中郎將稍遷九卿三公隗玄默守直不求名譽然內行仁義世人以此服之帝亦雅重焉竇憲之專政朝臣莫違隗與袁安屢抗異議於是天子追思隗忠擢子屯為步兵校尉辛丑大司農尹睦為太尉太傅鄧彪以老病罷太尉睦代録尚書事冬十月己亥宗正劉方為司空五年春正月巳亥大赦天下辛卯立皇弟萬歲為宋王二月戊戍詔有司省內外廄馬及上林池圃悉以假貧民甲寅太傅鄧彪薨竇氏之專權彪守巳而已御史中丞周紆國之司直也屢忤竇氏彪常以事奏免紆世以此譏之然修禮教二月戊午隴西地震三月庚寅遣使分行貧民開倉振廪夏六月丁酉郡國雨雹大如鴈子冬十月辛未太尉尹睦薨十一月巳丑太僕張酺為太尉六年春正月永昌夷獻犀象司徒丁鴻字孝公頴川定陵人也父綝從世祖征伐有功封頴陽侯鴻年十二事太常桓榮十六而章句通布衣荷擔不逺千里質問異義是以能成其名初綝從上時鴻獨與弟盛居困苦飢寒帝憐盛有委國志及綝薨既葬鴻挂縗絰於冢廬而逃去留書與盛曰鴻貪經書不顧恩義生不供養死不飯唅皇天先祖並所不祐身𬒳大病上不任為蕃輔下不言守土先上病狀辭爵封於仲公章寢不報謹身放棄求良醫如遂不瘳永歸溝壑始鴻與九江人鮑俊友善俊遇於東海鴻佯狂不識俊俊乃止而誚讓之曰有昔伯夷吳札亂世權行故得申志漢有舊制春秋不以家事廢王事故與衛輒之子今以兄弟私恩而絶父不滅之基未可謂智也鴻感悟垂泣歎息而還就國教授楊州稱之鮑俊亦上書具言鴻至行明帝甚言之詔徴鴻召見說文候一篇賜御衣及綬廪食公車與博士同禮頃之拜侍中徙封魯陽侯華嶠曰論語稱夫子溫良恭儉讓以得之行首乎故嘗請論之孔子曰太伯其可謂至德也巳矣三以天下讓民無德而稱焉孟子曰聞伯夷之風者貪夫廉懦夫有立志然則太伯出於不苟得未始有於讓也是以太伯稱賢人後之人慕而殉之夫有殉則激詭生而取與妄矣故夫鄧彪劉愷讓其弟以取義使弟非服而巳享其名其於義不亦薄乎又况乎于有國之紀而使將來者妄舉措哉古之君子立言非將以啓天下之方悟者立行非獨善其身將以訓乎哉原丁鴻之心其本主於忠愛何其終悟而從義也以此殆知其殉尚異於數世也二月乙未司空劉方為司徒太常張奮為司空三月丙寅舉賢良方正直言極諫之士各一人六月初伏日間關秋七月京都旱司空張奮上疏曰歲比不登人食不足今復旱秋稼未立陽氣垂盡日月迫促夫國以民為本以榖為命政之急務憂之重者也臣恩尤深厚受職過任夙夜憂惶章奏不能序心願封中常侍口陳得失上即引見明日車駕親幸洛陽寺省録囚徒於是大雨三月南單于安國為左賢王次當為單于時數輕兵出塞斬獲有功故國中皆敬師子而不附安國安國由是內病師子胸奴降者異時居塞外數為師子所掠故亦怨之安國乃委計降者使圖師子安國既為嚴于師子為左賢王覺知安國之謀乃隂為之備每㑹議事召師子輒稱病不往安國益忿是時中郎將杜崇使安國安國心不平因上書告崇崇敕西河太守令斷安國欲自訴不得而崇與度遼將軍朱徽上言南單于安國疏遠舊胡親近新降欲殺左賢王師子冝徴西河定上郡兵以為之備公卿處議聽崇遂發郡兵南單于聞漢兵起因舉兵誅師子聞之悉將衆入曼柏城單于圍守之殺傷甚多於是杜崇朱徽將兵而單于為其胥都侯所殺師子為單于既而天子知杜崇朱徽之侵擾胸奴也乃誅崇徽七年春三月班超發龜兹等八國兵七萬人討焉耆尉黎二國超遣人慰諭二國欲改過向善者當遣大人來迎焉耆王廣與國中議曰先王前殺陳都護今超都護將大兵來故且作降重獻遺令無入國北鞬支本胸奴人舉國敬信之乃遣奉牛酒迎超超聞焉耆取信北鞬支遂反縛責曰汝胸奴侍子恃焉耆擁今都護來王不以時迎皆汝罪也悉斬之或謂超曰可便殺超曰非汝所及此人權重於王今未入其國而殺之疑遂令自設備守險遑得到其城哉因責讓加賞賜遣北鞬支還曰都護不疑我國矣廣乃與大人迎超於尉黎奉上金銀奴婢牛馬超受馬以給軍餘總悉還之超到焉耆去城二十里大澤中超乃掦聲欲重賜王以下明日置酒悉召諸國王焉耆王廣尉黎王况與鞬支等四十一人詣超其國相腹久等十七人逃不至超怒曰腹久何故不到焉耆欲復反邪遂叱吏收廣况等於都護陳睦故城斬之更立為王持廣泛首詣京師因大縱兵抄掠超留焉耆半歲西域遂平上嘉超封超為定逺侯夏四月辛亥朔日有蝕之秋九月辛卯京都地震八年春三月巳丑立皇后隂氏賜天下男子爵各有差鰥寡孤獨貧下不能自存者粟人五斛后原庶侯識曾孫也祖父永明帝時為侍中親幸左右異寵后近故有異寵父綱為屯騎校尉八月辛酉令天下死罪减一等徙邉戍亡命贖罪各有差九月京都蝗蟲冬十月北海王有罪自殺國除十二月丁巳南宫宣室災後漢孝和皇帝紀上第十三
