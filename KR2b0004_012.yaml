body:
  text: 後漢孝章皇帝紀下卷第十二袁宏八年春正月壬辰東平王蒼薨初蒼疾病上憂念蒼使道上置驛馬以知疾之增損薨問至上悲不自勝詔東平傳録王建武以來所上章奏及作詞賦悉封上不得妄有闕司空第五倫見上悼愴不已求依東海王故事自請護喪事上東海王行天子禮舊制無三公出者乃遣大鴻臚持節護喪事詔諸王及公主京師諸侯悉詣東平王葬哀䇿日咨王丕顯勤王室親命受䇿昭于前世出作蕃輔克愼明德昊天不弔不報上仁使屏余一人焭焭靡有所終今詔有司加賜鸞輅車乗龍旂九旒虎賁百人謚曰獻王秋即擇班超爲將兵長史以徐幹爲司馬遣衛侯李邑使烏孫到于闐上言西域功不可成盛毁超云擁愛妻抱愛子安樂外國無内顧心超聞邑言歎曰身非曾參而有三至之䜛恐見疑於當世遂去其妻上知超無二心乃詔責邑遣邑將烏孫侍子還京師徐幹謂超曰邑前親毁君欲敗西域今可縁詔留之遣他吏送侍子超曰是言之狹也以邑毁超故遣之内省不疚何恤邑言今留之一時快意然非忠臣也於是踈勒王忠反保烏即城超乃立其府丞成大爲踈勒王其後忠設詐僞降願棄前罪爲殺新王超内知其謀而僞許之忠大喜將輕騎三百詣超超密勒兵待酒數行超叱吏執忠斬之放擊其衆大破之冬十二月行幸陳留梁國淮陽潁川戊申詔曰五經剖判去聖彌逺章句傳說難以正義恐先師道䘮微言遂絶非所以稽古求道也其令諸儒學古文尚書毛詩榖梁左氏傳以扶明學教網羅聖旨古文尚書者出孔安國武世魯恭王壞孔子宅欲廣其宫得古文尚書及禮論語孝經數十篇皆古字也恭王入其宅聞琴瑟鐘磬之音瞿然而止孔安國者孔子之後也盡得其書尚書多於伏生所傳六十篇安國獻之毛詩者出於魯人毛萇自謂子夏所傳河間獻王好之榖梁者瑕丘江公受之魯申公武帝時董仲舒善說公羊江公訥於口辯義不如董仲舒故榖梁學浸微唯衛太子善榖梁宣帝即位聞衛太子好榖梁乃求能爲榖梁學者得沛人蔡子秋與公羊家並說上善榖梁後大儒蕭望之等廷論二家同異多從榖梁由是榖梁學復興漢初張蒼賈誼張敞皆修春秋左傳誼爲左氏訓故御史張禹與蕭生同官數言左氏於望之望之善之及翟方進賈誼劉歆並傳左氏學故言左氏者本之賈誼劉歆此四學雖傳於世官建武初議立左氏學博士范舛議譏毁左氏以爲不冝立愍帝即位左氏學廢乃使郎中賈逵叙明左氏大義逵又言古文尚書多與經傳爾雅相應於是古文尚書毛詩周官皆置弟子學者益廣逵字景伯右扶風平陵人身長八尺二寸弱冠能誦五經左傳兼通榖梁諸家之說沈深有司其所學者可爲人師明帝時爲郎使與班固校書帝即位雅好古學詔逵入講白虎觀使說左氏傳上善其說逵母嘗病上以逵居貧欲賜之以校書比例多乃以錢二十萬使潁陽侯馬防與逵逵讓曰逵母病甚子貧無事於外屢空王從孤竹於首陽矣其恩厚若此遷衛士令逵才學該通其所著論爲學者所宗性佚不修小節當世以此譏焉故不至大官袁宏曰堯舜之傳賢夏禹殷湯授其子此趣之不同者也夏后氏賞而不罰殷人罰而不賞周人兼而用之此德刑之不同者殷人親盡則婚周人百世不通此婚姻之不同也立子以長三代之典也文王廢百邑考而立武王廢立之不同者也君親無將將而必誅周之制也春秋殺君之賊一㑹諸侯遂得列於天下此褒貶之不同者彼數聖者受之哲王也然而㑹通異議質文不同其故何邪所遇之時異夫奕者之思盡于一局者也聖人之明周於天下者也苟一局之勢未嘗盡同則天下之事豈必相襲哉故記載廢興謂之典謨集叙歌謡謂之詩頌擬議吉凶謂之易象撰録制度謂之禮儀編述名迹謂之春秋然則經籍者寫載先聖之軌迹者也聖人之迹不同如彼後之學者欲齊之如此焉可得哉故曰詩之夫愚書之失誣易之失賊禮之失煩春秋之失亂不可不察聖人所以存先代之禮兼六籍之文將以廣物慣心通于古今之道今去聖人之幾將千年矣風俗民情治化之術將數變矣而漢初諸儒多案春秋之中復有同異其後殷書禮傳徃徃間出是非之倫不可勝言六經之道可得詳而治體云爲遷易無度矣昔仲尼没而微言絶七十子䘮而大義乖諸子之言紛然散亂太史公談泮而定之以爲六家班固演其所而明九流觀其所由皆聖王之道也支流區别各成一家之說夫物必有宗事必有主雖治道彌綸所明殊方舉其綱契必有所歸㝷史談之言以道家爲統班固之論以儒家爲高二家之說未知所辯常試論之曰夫百司而可以緫百司非君道如何情動動而非巳也虚不以應其變變而非爲也夫以天下之事而以一人即精神内竭禍亂外作故明者爲之視聦者爲之聽能者爲之使雖三者爲之慮不行而可以至不爲而可以治精神平粹萬物自得斯道家之大㫖而人君目處之術也夫愛之者非徒筭其車服厚其滋味必將導之訓典輔其正性納之義方閑其邪物故仁而欲其通愛而欲其濟仁愛之至於是兼善也然則百司弘宣在於通物之方則儒家之筭先王教化之道居極則玄黙之以司契運通則仁愛之以教化故道明其本儒言其用其可知也矣夫大道行則仁愛直逹而無傷及其不足則抑叅差而並陳患萬物之多惑故推四時以順此明隂陽家之所生也懼天下擾擾竟故辯加位以歸眞此名家之所起表衆寡之相犯故立法制以止殺此法家之所興也慮有國之奢弊故則節儉以示人此墨家之所因也斯乃隨時之迹揔而爲治者也後之言者各演一家之理以爲天下法儒道且猶紛然而況四家者乎夫爲棺椁遂有厚葬之弊䘮欲速朽亦有棄尸之患因聖人之言迹而爲支辯之說者焉可數哉故自此以徃略而不論元和元年春正月日南獻白雉夏四月巳卯封東平王子尚爲成都王六月辛酉沛王輔薨謚曰獻王輔好經書矜嚴有法度在國終始可觀稱爲賢王秋八月甲子太尉鄧彪以老病罷大司農鄭弘爲太尉彪字智伯南陽新野人父以孝行稱及薨讓國與異毋弟明帝高其節詔聽之辟府掾稍遷太僕卿遭後母喪固疾乞身以光禄大夫行服服竟遷大司農數月爲太尉彪以禮讓師下在位爲百寮規誡以疾上書乞骸骨䇿曰惟君以曾閔之行禮讓之高故慕君德禮以屬黎民貪與君意其上太尉印綬賜錢三十萬俸二千石禄終厥身君專精養和以輔天年詔太常四時致祭宗廟之胙河南尹常以八月旦奉羊酒癸酉令天下繫囚減罪一等死罪徙邉戍九月行幸陵祠舊宅園廟御故臨淮太守朱暉爲尚書僕射暉字文秀南陽人也少以節操聞初堂舅信陽侯隂就方貴慕暉名自徃候之暉避不見後遣家丞致禮暉閉門不受後爲郡吏太守阮況常以事干暉暉不從及卒暉厚送其家左右咸怪之暉曰前阮君有求於我恐以貨汚君故不與言今重送者欲以明吾心驃騎將軍蒼聞而辟之甚禮敬焉正月朔旦蒼應奉璧入賀故事少府給璧隂就驕貴吏傲不奉法求璧不可得蒼坐朝堂漏且盡而璧不至不知所爲顧謂掾屬曰若之何暉望見府主簿持璧即徃紿之曰我聞璧而未曾見試觀之主簿以璧授暉暉顧召令史奉之主簿驚曰少府當以朝暉叱之曰將歸暉獨不朝也主簿遽以白就就曰朱掾義士勿復求更以他璧朝蒼罷謂暉曰屬者掾自視孰與藺相如邪明帝幸長安欲嚴宿衛以暉爲衛士令稍遷臨淮太守暉好節槩其所投用厲行士其諸報怨以義犯法者率皆爲求門戸而生宥之其不義者即時僵仆不以汙獄門故吏民畏愛之暉剛於爲吏見忌於上故所在數被劾去臨淮屏居野澤布衣𬞞食不與邑里通鄕黨譏其介南陽人大饑暉盡其家貨分宗族故舊不問餘焉初同縣張堪素有名見暉甚重之接以友道暉以其先逹未敢當也後俱爲二千石絶不復通及南陽饑而堪已卒暉聞其妻子貧窮乃自徃候視贍賑之其子頡怪而問之暉曰吾以信心也其信義愼終皆此類也冬十月行幸江陵十二月除諸禁固不得仕者令得仕二年春正月初令婦人懷胎者當以二月賜榖三斛復夫勿筭一歳二月鳯皇集于肥行幸太山丙子大赦天下復改轉高羸三縣無出租賦三月行幸魯祠東海恭王庚寅祠孔子及七十二弟子壬辰行幸東平幸王蒼宫謂諸子曰思其人至其鄉其處存其人亡因泣下沾襟上幸蒼陵爲備虎賁鸞輅龍旂以章顯之賜御劒于陵前初蒼所將驃騎時吏丁周栩以蒼敬賢下士不忍去爲王家大夫數十年事祖及孫引見嗟歎之擇爲議郎遂幸魏郡河内登太行五月丙戍詔曰鳯皇黃龍鸞鳥比集七郡神雀甘露降自京都祖宗舊事或班恩施其賜百官錢各有差天下吏爵人三級高年鰥寡孤獨帛人一匹令天下大酺五日鳳皇黃龍所集亭皆無出今年租賦見者及太守令長丞尉帛各有差冬十一月壬辰詔曰余末小子託於君位曷以恢崇仁濟天下三代推益優劣殊軌況于頑陋無以易民視聽雖欲從之末由也已博士曹褒覩兹詔也知上有制作意乃上䟽曰昔聖人受命而王莫不制禮作樂以著功德功成作樂治定制禮所以協和天人示人軌則也故御應見瑞乃作今皇天降禮嘉瑞並臻制作之符甚於言語冝定諸議以成漢禮章下太常巢堪以爲不可許是歳班超發諸國兵歩騎二萬擊莎車莎車求救於龜兹王遣左將軍發温宿姑墨尉頭兵合五萬人助之超召部曲及于闐踈勒王議曰兵少不敵計莫若各散去于闐從此西吾亦從此東夜半聞鼓聲使發衆以爲然乃隂緩所得莎車生口龜兹聞之喜使左將軍將萬騎於西界欲遮于闐王人定後超乃召諸司馬勒兵厲衆雞鳴馳赴莎車營奄覆之莎車驚怖斬首五千餘級大獲其馬畜財物分兵收其榖莎車遂降自是威震天下西域恐三年三月丙寅太尉鄭弘薨丁卯大司馬宗由爲太尉鄭弘字巨君㑹稽山隂人也曾祖自齊徙山隂事博士焦貺門徒數百人當舉明經其妻勸貺曰鄭生有卿相才應此舉也從之楚王英之謀反誣天下知名者貺爲河東太守以楚事御疫病道死妻子閉詔獄考掠連年諸故人皆易姓名以避禍弘獨髠首負鑕訟貺罪昭帝感憤乃原免家屬弘送貺䘮及妻子於陳留畢葬旋鄉里爲鄉嗇夫太守第五倫行部見弘問民得失弘對甚明倫甚奇之擢爲督郵舉孝廉稍遷尚書僕射上問弘欲三河三輔選尚書御史孝廉茂才餘郡不得選弘對曰虞舜出於姚墟夏禹生於石紐二聖豈復出於三輔乎陛下但當明勑有司使得人爾上善其言是時烏孫王遣子入侍上問弘當答其使不弘對曰烏孫前爲大單于所攻陛下使小單于徃救之尚未賞今如答之小單于不當怨乎上以弘議問侍中竇憲對曰曰禮有徃來易曰無徃不復天地際也弘章句諸生不逹國體上遂答烏孫使小單于忿悉攻金城郡殺太守任昌上謂弘曰朕前不從君議果如此弘對曰竇憲姦臣也有少正卯之行未𬒳兩觀之誅陛下前何用議遷大司農太尉數陳竇憲勢太盛放權海内言苦切爲憲不容奏弘漏泄奏事坐詰讓收印綬弘乞骸未許疾篤上書曰臣東野頑闇本無尺寸之功橫蒙大恩仍登上司中夜怵惕懼有折足之戒自揆愚薄無益國家之事雖有殺身焉可謝責是以不敢雷同指陳竇憲姦不慣漏露言出患入竇憲之姦惡貫天逹地毒流八荒虐聞四極海内疑惑賢愚疾惡憲何術以迷主上流言噂􅊱深可歎息昔田氏篡齊六卿分晉漢事不逺炳然可見陛下處天子之尊自諸保萬世之祚無復累卵之危信䜛佞之臣不計存亡之機臣雖弱疾命在移晷身没之日死不忘忠願陛下爲堯舜之君誅四凶之罪以素厭人鬼憤結之望章省上遣太醫占弘疾臨薨悉皆還賜物勑妻子葛巾布衣殯以素棺初弘爲第五倫舉吏其後並爲三公當世以爲榮是時歳比不登而諸王皆留京師賞賜過厚太尉掾何敞說太尉宗由曰禮一榖不登則損服徹膳五榖不登則廢祭祀乗馬就牧天下有饑寒者若已使然今比年傷於水旱民不收縁邉方外域捐妻子流離道路中州内郡公私屈謁此宜損徹節用之時國恩覆載賞賜過度但聞臘賜王主巳下傾竭帑藏夫明君行賜以制忠臣受賞盡度明公位尊任重責深負天上當匡正綱紀下當安元元豈容無違而巳哉冝先正已率奉亦還所得賜因陳得失條奏王侯就國孔僖孫駰同習春秋語吳王夫差時事僖廢書而歎曰若是所謂畫龍不成反爲狗者駰曰昔者孝武皇帝始爲天子方年十八崇信聖道師則先王五六年間號勝文景及後放恣忘其前善僖曰書傳若此者多矣鄰房生梁郁遥和之曰如武帝亦爲畫龍不成復是狗邪僖駰黙然不荅郁怒恨之隂上書告駰僖誹謗先帝譏刺世事下有司駰詣吏受詰僖上書曰言凡誹謗者謂無事而虚加誣罔也至如孝武之政善惡顯在漢史明如日月是爲直說實事非虚謗也夫帝王爲善則天下爲善咸歸焉其不善則天下之惡亦萃焉斯皆有以致之不可以責人也陛下即位巳來政敎未過德澤有加天下所共見也臣等獨何譏刺哉假使所言是也則朝廷所冝改所言非也亦王者所宜含容陛下不推其原茍肆私忿臣等即死顧天下必廻視易聽以此窺陛下心矣上始無罪駰等意及得僖奏下制勿問僖以才學爲郎校書東觀上言圖䜟非聖人書駰子瑗瑗子寔皆以才文顯冬十月西羌㓂張掖隴西金城護羌校尉傅育將兵擊之章和元年春正月詔曰朕以不德受祖宗弘烈夙夜祗畏無以章于先王漢遭莽弊禮壊樂崩因循故事多非經典知其說者之於天下豈不逺乎曹襃喟然歎曰昔奚斯頌魯考甫詠殷竭忠顯主之美者當仁不讓奈何疑焉遂復上䟽陳制禮意事下三公未奏上曰諺言作舎道邉三年不成乃使襃於南宫東觀差序禮事依舊儀參五經驗以䜟記自天子至于庻人百五十篇襃字叔通魯國薛人也父充建武中爲博士議定封禪七郊三雍大射養老禮儀明帝即位充上言漢家再受命乃有封禪之事禮樂崩闋不可爲後嗣法五帝不相遵樂三王不相襲禮大漢冝制禮樂襃少有大度結髮傳充學尤多好禮事常慕叔孫通爲漢制儀晝夜研精當其屬不覺旁之有人舉孝廉除郎遷陳留圉令捕得他郡盜徒五人守馬嚴風縣殺之襃曰夫絶人命者天亦絶之臯陶不爲盗制死刑昔管仲遇盗而升諸公今承㫖而殺之是逆天心俯順人意其罰重矣如得全此而身坐之願也遂不爲殺嚴奏襃軟弱免官百姓號泣送之三月護羌校尉博育追虜出塞遇塞夏四月丙子令天下死罪囚減死一等徙戍邉廷尉郭躬上䟽曰聖恩所以減天下死罪使戍邊者欲實壃境而重人命也去死就生與老弱復相見莫不懽喜自丙子巳來犯罪者甚多應入重今已牢獄者蒙更生之恩也而始𬒳執録者獨受大辟之刑示不均也書曰王道蕩蕩無偏無黨均大恩以令民上善之即詔悉赦焉躬字仲孫頴川陽翟人也父弘及㓂恂等時爲决曹掾諸罹文爲弘所決者無恨治獄三十餘年郡中稱之比之東海于公躬復以明法稱稍遷尚書廷尉其決斷在哀矜所免者甚衆悉條諸文致重者四十餘事奏除之躬弟子鎭知名後至廷尉封侯子孫皆修家業以名理相待爲公者一人廷尉者八人爲刺史二十餘人六月戊辰司徒桓虞䇿免司空袁安爲司徒光禄勲任隗爲司空自元和巳來鳳凰麒麟白虎黃龍鸞鳥嘉禾朱草三足烏木連理爲異者數百不可勝紀咸曰福祥以爲瑞應何敞辟太尉宋由府乃言於宋由袁安曰瑞應依政而生昔海鳥止魯文仲祀之君子譏焉鴝鵒來巢奪陽之象孔子睹麟而泣曰吾道窮矣其後季氏有逐君之變孔子有兩楹之殯今非常鳥獸品物非一似鳯翔屋怪草生庭不可不察也由安不敢應秋七月齊王晃坐事母不孝貶爲無湖侯壬戍令無罪囚減戍邉八月行幸九江戊子行幸湘祠沛獻王九月行幸彭城及夀春詔阜陵侯延與車駕㑹夀春帝見延及妻子愴然傷之乃下詔曰蓋周封千八百而姬姓居半所以楨榦王室也朕廵狩望江淮意在阜陵與王相見志意衰落形體非故一則以懼今復阜陵侯爲阜陵王增封四縣并前爲五縣以阜陵下濕徙都夀春加賜錢千萬安車一乗夫人及諸子賞賜各有差冬十月北匈奴爲鮮卑所殺降者十餘萬南單于上言宜及北虜分爭人民離散出兵破北城南兵爲一國令漢家長無北顧之憂臣素愚淺兵衆單少不足以防外内願與執金吾耿秉度遼將軍鄧弘縁邊諸郡太守并力兾因天時乗聖帝威神一舉平定上將許之尚書宗意上䟽曰匈奴處北種分以沙漠間賤禮儀衣食殊俗此乃天一種民也自漢興已來數發兵攻之所得輙不足以復所害呼韓邪單于奉蕃然中國亦疲攻送迎之勞矣光武皇帝躬擐金甲之難深明天地之明故因其來降寵立以爲單于羇縻畜養邊民得以休息迄今四十餘年令鮮卑奉順威靈斬獲北單于名巳下萬計中國坐功而百姓不知其勞漢興功烈於斯爲盛令南單于還塞外所謂虎出於檻也必興兵要利内持於漢其事得浸滋不􅒚而設費不得巳無故以萬安之計而徴不可必之功未見其聖也詔問執金吾耿秉言可聽師未出而帝寢疾元年春二月壬辰帝崩于章德殿遺詔無起寢廟如光武帝故事是日太子即位年十歳太后臨朝袁宏曰非古也易稱地道無成而代有終禮有婦人三從之義然則后妃之在於欽承天敬恭中饋而巳故雖人母之尊不得令於國必有從於臣子者則柔之性也夫男女之别自然之理君臣酬咨通物所因也故百司並在相與率職必祠焉而後行故有朝㑹享讌之禮造膝請問之事此蓋内外之分不可得而同者也古之王者必闢四門開四聰兼親賢而聽受焉所以通天下之才而示物至公也自母后臨朝必舅氏專權非踈賢而樹親暱也蓋管其號令者必寄外氏是實違天封而訓民以私政之所階家制敎關諸盛衰建百司修廢官設冡卿以任權重收王君薨㓜百官執事揔巳思齊聽於冡宰所以大明公道人自爲用上下竟業而名器巳固三代之道也三月癸卯葬孝章皇帝于敬陵庚戍太后詔曰皇帝㓜年惸惸在疚朕且佐助德政守文之際必有内輔故太尉鄧彪三讓彌高海内歸仁其以彪爲太傅賜爵關内侯録尚書事百官揔已以聽於是侍中竇憲管掌機宻三弟羅列並據大位上㓜小太后當朝憲以外戚秉政欲以經學爲名乃上䟽曰天下之命懸於天子善在於所習習與智長則功而不對化與心成則忠道若性昔周成王㓜在襁褓周公在前史佚在後太公在左召公在右中外聽政朝四聖維之是以慮無遺計舉孝昭皇帝八歳即位大臣輔政亦選名儒韋賢蔡義夏侯勝入授詩書于禁中伏惟皇帝惟天然之資不肅而成然以至尊之德獨對小臣非所以揄揚聖心增益輝光者竊見屯騎校尉桓郁結髪受學白首不倦經爲人師行爲儒宗昔侍帷幄入授先帝父子奕世並爲帝師愚以爲可長樂少府入授帝經於是以郁爲長樂少府傅講禁中歳餘遷太常郁授二帝恩寵甚篤厚焉傳家業至太傅憲性𥚹急數自困輔政之後遂作威福睚眦之怨無不報初憲恨尚書陳寵欲因事毁傷之使與䘮事黃門郎鮑德與憲弟瓌厚善懼寵不能自免說瓌曰寵奉事先帝深見委任若以歳月言之冝蒙功勞之報以才量言之應受噐用之賞不可以機微之故以傷輔政之德於是憲出寵爲廣漢太守抑強扶弱人無訟者先時廣漢城南有鬼哭聲聞於府中積數年寵案行有骸骨不葬者多乃歎曰儻在是乎使縣收歛埋藏之由是遂止時齊殤王子郁鄕侯暢奔章帝哀上書來報憲使客刺殺暢太尉掾何敞請自徃問變狀太尉宗由不聽敞固謂曰春秋稱三公爲宰者言無不統也暢宗室胏腑茅土蕃臣來即國憂上書未報而於城内見害千國之紀擅殺列侯罪惡之次於大逆奉憲之吏莫敢追捕明公處宰相之位亦復不恤四方聞之謂京師何昔陳平之言宰相曰外鎮四夷内撫諸夏使卿大夫各得其冝今列侯私刃不可謂撫京尹廢職不可謂冝綱紀虧壞責不小遂驅而去司徒司空聞之亦遽追掾吏詔書疑暢弟陽遣御史之齊考劾尚書令韓陵以爲姦在京師不宜舎近問遠詔書遣陵陵固執不從後事發覺憲懼誅自請擊匈奴功以贖死夏五月京都旱冬十月侍中竇憲爲車騎將軍與執金吾耿秉三萬騎征匈奴司徒袁安與諸公卿詣朝堂諌曰今國用度不足匈奴不犯塞而勞軍逺攻經沙漠之難徼功萬里非社稷計也兵凶噐聖王之所重不從大尉宋由不署名公卿稍亦止安獨與司空任隗固爭前後且十上不從是時諌者甚衆尚書僕射郅夀下獄御史何敞上䟽諫曰臣聞聖主開直言之路有不諱之詔猶恐下情不逹復聽歌謡之詞故天人並應傳福無窮臣伏見尚書僕射郅夀坐與諸尚書論擊匈奴下獄奏劾大不敬臣愚以爲夀備機密近臣以匡輔爲職若朝廷有失黙而不言悖義背恩其罪當誅今夀違衆正議欲以安宗廟爲國永福也豈有私心如夀𬒳誅臣恐天下以夀忠直之故橫加誹謗之誅殺傷和氣忤逆隂陽此誠不可所以敢犯嚴威不避夷滅觸死瞽言爲夀也乃免夀夀郅惲之子也憲遂出師侍御史魯恭上䟽諌曰夫天愛人猶父之封子也一物有不得其所則天氣爲之錯亂而況人乎故愛民者天下愛之夷狄者四方之異氣也蹲夷踞肆與烏鳥無異雜居中國則錯亂天氣是以聖王之制夷狄覉縻不絶而巳不以傷害中國也今邊境幸無事宜當修仁行義尚於無爲令家給人足各安産業天人遂得於下則隂陽和於上然後祥風時雨覆𬒳逺方則夷狄慕德重譯而至矣惟陛下留聖恩徴還二將休罷士卒以順天下心於是竇氏橫甚司徒袁安輒舉奏之上雖不從而權戚嚴憚焉後漢孝章皇帝紀下卷第十二
