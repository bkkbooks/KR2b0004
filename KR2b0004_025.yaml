body:
  text: 後漢孝靈皇帝紀下卷第二十五袁宏中和二年春二月丁卯故太尉劉寬薨贈車騎將軍諡曰郡烈侯寬字文饒弘農華隂人也少好學博通群書稍遷東海南陽太守遇民如子口無惡言吏民有罪以蒲鞭鞭之示耻辱而巳其善政歸之於下有不善輒自剋責庶民愛敬之好與諸生論議行縣使三老學生自隨到亭傳輒復講論教化流行不嚴而治嘗有客遣奴酤酒久而不還及其還也客不堪之罵詈曰畜産寬須臾遣人視之曰此人也罵言畜産恐其自殺夫人欲試寬一恚伺當朝會裝嚴巳訖使婢奉肉羮一盂寬手未得持放羮衣上婢急收羮寬言徐徐羮爛汝乎其寬裕如此內外稱為長者上深悼之袁宏曰在溢則激處平則恬水之性也急之則擾緩之則靜民之情也故善治水者引之使平故無衝激之患善治人者雖不為盜終歸刻薄矣以民心為治者下雖不時整終歸敦厚矣老子曰古之為道者不以明民將以愚之故以智治國國之賊也羌胡冦三輔車騎將軍皇甫嵩征之巳酉南宮雲臺災庚戌樂城門災延及北闕嘉德殿和歡殿本志曰雲臺者乃周家之所造也圖書珍寶之所藏京房易傳曰君不思道厥妖火燒宮夫戒若曰刑濫賞淫何以舊典為故焚其祕府也收天下田畝十歲以治宮室州縣送材及石貴戚緣賤買入巳官皆先經貴戚然後得中宮室連年不成天下騷擾起為盜賊司徒袁隗久病罷三月廷尉崔烈為司徒邊章韓約冦三輔中郎將董卓副皇甫嵩討之於是關隴擾攘發役不供司徒崔烈欲棄涼州議郎傅燮進曰斬司徒天下乃安有司奏燮廷辱大臣有詔問本意對曰昔冒頓至逆也樊噲為上將云願得十萬衆橫行胸奴中憤激奮勵未失臣節也不顧計之當與不當耳季布猶廷斥曰噲可斬前朝是之今涼州天下之衝要國家之蕃衛也堯舜時禹貢載之殷周之世列為侯伯高祖平海內使酈商别定隴右世宗拓境列置四郡議者以為斷胸奴之右臂今牧御者失理使一州叛逆天下騷動陛下不安寢食烈為宰相不念思所以緝之之䇿乃欲棄一方萬里之士臣竊惑之左袵之虜得此地為患數世今以徑士堅甲利兵姦雄因之為亂此社稷之深憂也且無涼州則三輔危三輔危則京都薄矣若烈不知憂之是極弊也知而欲棄是不忠也二者擇而處之烈必有之遂從燮議亦不罪烈由是朝廷益重燮每公鄉缺議輒歸􅝂夏五月太尉鄧盛久病罷太僕張延為太尉六月以討張角功封中常侍張讓等十二人為列侯秋七月車騎將軍皇甫嵩征邉章韓約無功免八月司空張溫為車騎將軍討章約九月特進臨晉侯楊賜受司空冬十月司空楊賜薨䇿曰司空臨晉侯賜華嶽所挺九德純備三葉宰相輔國以忠昔朕初載受道帷幄遂階成勳以陟大猷師範之功既昭於內弼亮之勤亦著于外雖受茅土未答厥勳哲人既沒將誰咨度朕甚悼焉今使左中郎將郭儀持節追贈特進司空驃騎將軍印綬諡曰文烈侯賜字子獻篤志於學間居教授不應州郡之命辟梁兾府非其好也因謝病去舉高弟稍遷越騎校尉光祿大夫靈帝初與劉寬張濟侍講于華德殿初張角等誑耀百姓天下惑之襁負至者數十萬人賜時居司徒謂劉陶曰聞張角等黨輩熾盛稍益滋蔓今若下州郡捕討恐驚動醜類遂成反亂今欲切勑刺史二千石採别流民咸遣讂送各歸本郡以孤弱其黨然後乃誅其渠帥可不勞衆而定何如陶曰此孫子所謂不戰而屈人之兵廟勝之術也賜衆上書言之會賜去位事留中後帝徙南宮閲故事得賜所上奏及講時注籍乃感悟遂下詔曰大司馬楊賜敦德允元中受恭懿親以尚書侍講纍評張角始謀禍亹未彰賜陳便宜欲緩誅夷令德既光嘉謀怛然詩不云乎無德不報無言不讎故褒城君孔霸故太尉黃瓊侍講先帝並宜受茅土之封賜上言曰臣前與故太尉劉寬司徒張濟並被侍講俱受三事張角謀亂又共陳便宜而獨蒙師傅之澤茅土之祚而寬濟不蒙雲雨之潤乞減賜戶以封寬濟上雖不聽嘉其至誠乃封寬為遂鄉侯濟子根為蔡陽侯賜子彪忠厚有孝行復纂其家業光祿勳許相為司空十一月張溫董卓擊張約破之約走金城是歲於後園造萬金堂以為私藏門司農金錢繒帛積之於中又還河間置田業起第觀上本侯家居貧即位常曰桓帝不能作家曾無私錢故為私藏復寄小黃門常侍家錢至數千萬由是中官專朝奢僣無度各起第宅擬則宫室上嘗登永安樂侯臺黃門常侍惡其登高望見居處樓殿乃使左右諫曰天子不當登高登高則百姓虛自是之後遂不敢復登臺榭三年春二月太尉張延久病罷庚戌大赦天下三月車騎將軍張溫為太尉夏五月壬辰晦日有蝕之詔公卿舉直言四年春正月已卯大赦天下二月滎陽盜賊起三月河南尹何苗擊破之以苗為車騎將軍封濟陽侯夏狄道人王國反自黃巾之後盜賊羣起殺刺史二千石者往往而是夏四月太尉張溫以冦賊未平罷司徒崔烈為太尉五月司空許相為司徒光祿勳丁宮為司空秋九月大長秋趙忠為車騎將軍執金吾甄舉為太僕因謂忠曰傅南容有古人之節前在軍有功不封天下失望今將軍當其任宜進賢理枉以副衆望忠納其言遣弟延齎書致殷勤曰南容少答我常侍萬戶侯不足得也燮正色拒之曰遇與不遇命也有功不論時也傅􅝂豈無功而求私賞哉遂不答其書忠愈恨燮然憚其高明不敢害出為漢陽太守冬十月零陵盜賊冦長沙太守孫堅討破之封堅為烏程侯十一月太尉崔列久病罷大司農曹嵩為太尉是歲漁陽人張純反初發幽州烏桓以討涼州故中山相張純請將之不聽使涿令公孫瓉純忿不得將因説故太山太守張舉曰烏桓數被徵發死亡略盡今不堪命皆願作亂國家作事如此漢祚衰亡之徵天下反覆率豎子故若英雄起則莫能禦吾今欲率烏桓奉子為君何如舉曰漢祚終訖故當有待之者吾安可以若是純曰王者網漏鹿走則智多者得之子勿憂也遂共率烏桓作亂故人喜悅歸純日十餘萬五年春正月丁酉大赦天下太尉曹嵩罷二月有星孛於紫宮三月少府樊陵為太尉夏五月涼州刺史耿鄙擊王國敗績初鄙合六郡兵將欲討國漢陽太守傅燮諫之曰使君統政日淺民未知化孔子曰不教民戰是謂棄之今率不教之民越大隴之危賊聞大軍將至必萬人同心其鋒難當也萬一內變悔何及也不若息軍養德明賞罰以教民戰賊得寬容必為我怯羣惡爭勢其離可必然後率巳教之民討離隟之賊其功可立今不為萬全之福而就危敗之禍不為使君取也鄙不從臨陳前鋒果敗鄙為别駕所害國遂圍漢陽太守傅燮時北胡騎數千在城外皆叩頭流涕欲令燮棄郡歸鄉里燮子幹進曰國家昏亂賢人斥逐大人以正不容於朝今天下以叛兵不足以守鄉里羌胡被大人恩者欲令棄郡而歸願大人計之徐歸鄉里率賢士大夫子弟而輔之言未終燮歎曰汝知吾必死邪蓋聖逹節次守節且殷紂之暴伯夷之不食周粟而死仲尼以為賢今朝廷不甚殷紂吾德不及伯夷吾何行之乎王國使故酒泉太守黃衍説燮曰天下事巳可知矣先起者上有霸王之業下成伊呂之勳天下非復漢有府君寧有意為吾屬師乎􅝂按劒叱之曰若非國家剖符之臣邪求利焉逃其難且諸矦死社稷者正也遂麾左右出戰臨陳而死上甚悼惜之策諡曰壯節侯燮字南容北地靈州人身長八尺嚴恪有志操威容性剛直履正不為權貴改節六月丙寅風大起折木太尉樊陵䇿罷射聲校尉馬日磾為太尉秋八月置西園三軍及典軍助軍以小黃門蹇碩為上軍校尉虎賁中郎將袁紹為中軍校尉屯騎校尉鮑洪為下軍校尉議郎曹操為典軍校尉初黃巾起上留心戎事碩壯健有武略故親任之使為元帥典護諸將大將軍巳下皆令屬焉九月司徒許相䇿免司空丁宮為司徒光祿勳劉弘為司空特進董卓為驃騎將軍己未詔曰頃選舉失所多非其人儒法雜揉學道浸微處士荀爽陳紀鄭玄韓融李楷耽道樂古志行髙潔清貧隱約為衆所歸其以爽等各補博士皆不至融字元長潁川人博學不為章句皆究通其義屢徵聘皆不起晚乃拜河南尹時鴻臚太僕卿年七十餘弟兄同居閨庭怡怡至于沒齒也楷字公超河南人以至孝稱棲遲山澤學無不貫徵聘皆不就除平陵令視事三日復棄官隱居學者隨之所在城市華隂南土遂有公超市頻煩䇿命就拜光祿大夫固疾不起乃命河南弘農致玄纁束帛欲必致之楷終不屈袁宏曰布衣韋帶白首不仕者有矣結髮纓冠老而不退者有矣此二途者古今之所同也久而安之故無中立之地焉語曰山林之士往而不能反朝廷之士入而不能出往而不反則能執意入而不出失之遠矣古之為士將以兼政可則進不可則止量分受官分極則身退矣故於仕與不仕之間有止足焉不仕則枯稿矣遂仕則負纍矣若仕能止者在於可否之間不同心乎是時大將軍何進多辟海內名士以為巳佐鄭玄稱疾不到州郡迫脅不得巳玄幅巾詣進進設几杖之禮一宿而退莫知其所初申屠蟠隱於梁碭之間免於黨人之禍亦為進所辟逾年不至進恨之欲脅以威刑使同郡黃忠與蟠書曰大將軍幕府初開辟海內並延英俊雖有高名盛德不獲異遇至如先生特加殊禮優而不名設几杖之坐引領東望日夜以兾彌秋歷冬經邁二載深拒以疾無惠然之顧重令爰中郎昭暢殷勤至于再三而先生抗志彌高所執益固將軍於是憮然失望而有愧色自以德薄深用咎悔僕竊論之先生高則有餘智則不足當今西戎作亂師旅在外軍國異容動有刑憲今潁川荀爽輿病在道北郡鄭玄北面受署彼豈樂羇牽者哉知時不可佚豫也且昔人之隱雖遭其時猶放聲絶迹巢棲茹薇其不遇也則裸身大笑被髮狂歌今先生處平壤遊人間吟典籍襲衣裳行與昔人謬而欲蹈其迹擬其事不亦難乎僕願先生優遊俯仰貴處可否之間孔氏可師何必首陽備託臭味庶同休戚是以假飛書以喻左右蟠不答其書亦無懼色蟠字子龍陳留外黃人同縣大女侯玉為父報讎殺夫之從母兄姑怒執玉送吏時縣令梁配將斷其獄蟠年十五自精舍詣縣奏記曰伏聞大女侯玉為父報讎獄鞠以法不勝感悼已情敢陳所聞昔太原周黨感春秋之義辭師復讎當時論者猶高其節況玉女弱內無同生之謀外無交遊之助直推父子之情手刀莫大之讎當時聞之人無勇怯莫不張膽增氣輕身重義攘臂高談稱羡其美今聞玉幽執牢檻罪名巳定皆心低意阻惆悵悲歎蟠以玉之節義歷代未有足以感無耻之孫激忍辱之子若其在昔尚當旌閭表基以顯後嗣況事在淸聽不加以義於是縣令具以狀聞得減死一等蟠學無常師博覽無不通初在太學濟隂王子居病困臨卒託蟠致喪蟠即自負其尸遂致濟隂道遇司隸從事嘉蟠志義愍其負重為封過所傳蟠不受投地而去舉有司公車徵諸所聘禮皆不就董卓初徵天下賢雋皆起家登宰相蟠得徵書時人皆勸之行蟠笑而不答居無何而王室大亂蟠年七十餘以壽終十月甲子上觀耀兵於平樂觀先是望氣者以為京師當有大兵流血兩宮或説何進曰太公六韜有天子將兵事以示四方進以為然乃言於上太發兵講武於平樂觀下天子親擐甲胄臨軍三匝既罷以兵屬大將軍進初漢陽太守蓋勳著績西州知耿鄙之必敗也自免歸家於是徵為武都太守詔大將軍何進上軍校尉蹇碩為勳祖道京師榮之未至武都徵為討虜校尉上問勳曰天下何以反勳對曰幸臣子弟擾之使然時碩子弟尤甚天子顧而問碩碩不能對帝又謂勳曰吾以陳師於平樂觀多出中藏以餌戰士何如勳曰臣聞昔者先王耀德而不觀兵今冦在逺而設陳於近不足以昭果毅秖足以瀆威武耳帝曰善恨見卿晚羣臣初無是言也勳與劉虞袁紹等並典禁軍勳謂虞紹曰吾見上上甚聰明但擁於左右耳勇力誅嬖幸然後徵拔英俊以興漢室功遂身退豈不快邪虞紹亦有宿謀因共相結未發而司隸校尉張溫舉勳為京兆尹帝方倚勳欲親近之而碩等心憚並勸帝從溫議遂拜京兆尹小黃門高望皇子愛之辨臣也因碩屬望子於勳欲以為孝廉勳不肯或謂勳曰皇子副主也望其保也碩帝之寵臣也三怨成府豈可救也勳曰選賢所以報國也非賢不舉雖死可悔乎是時王國衆十餘萬三輔震勳自請發兵萬人分屯三輔每有密事帝呼詔問勳勳雖身在外甚見信重乃著琴詩十二章奏之帝善焉數加賞賜十二月左將軍皇甫嵩前將軍董卓屯右扶風討王國六年春正月王國攻陳倉董卓將救之謂王甫嵩曰智者不後時勇者不留決速救則城全不救則城滅復何疑哉嵩曰不然善用兵者全軍為上破軍次之百戰百勝不如不戰而屈人之兵也上兵伐謀故見可而進知難而退故速戰為下是以先為不可勝以待敵之可勝不可勝在我可勝在彼彼守不足我攻有餘有餘者在於九天之上不足者陷於九地之下陳倉雖小城守備固非九地之陷也國兵雖攻我所不拔非九天之勢也夫勢非九天攻者受害陷非九地守者不拔國今巳陷受害之地而陳倉保不拔之城我可不煩兵而取全勝之功將何救不從國圍陳倉八十餘日城中堅守竟不能拔賊衆疲弊果自解去嵩欲進兵擊之卓曰不可兵法窮冦勿迫歸衆勿追今我追國是追歸衆迫窮冦也困獸猶鬪蜂蠆有毒況大衆乎嵩曰不然前吾不擊避其鋭也今而擊之待其衰也所擊疲墮非歸衆也國衆且走其有鬪志以整擊亂非窮冦也使卓為殿嵩自與國戰大破斬之由是卓恨嵩隂與嵩有隙徵卓為少府卓不肯就上書輒行前將軍事既而以卓為并州牧以兵屬皇甫嵩卓又上書請將兵之官嵩從子邐諫嵩曰本朝失政能安危定傾者惟大人與卓耳今怨隙巳結二人不俱存先人之言兵家所重卓被詔當放兵而諷將士上書自請此逆命也彼度京師政亂故敢躊躇此懷姦也二者刑所不赦卓凶虐無親將士不附公為元帥仗國威以討之上顯忠義下除姦凶此桓文之舉也嵩曰專命亦罪也不如顯奏使朝廷裁之天子以責讓卓不受詔選五千騎將自河津渡上軍校尉蹇碩惡大將軍進兵強欲進在外因而間之乃與常侍通謀説上使進征邊章韓約帝從之賜進戎車百乘虎賁斧鉞進亦知其謀請中軍校尉袁紹東發徐兖兵以稽其行三月己丑光祿劉虞為司馬領幽州牧張純虞使公孫瓉擊純太戰破之純客王政斬純首降封虞為襄賁侯瓉為都亭侯並鎮北邊夏四月太尉馬日磾罷丙午朔日有蝕之丙辰帝崩于嘉德殿時蹇碩在省中欲誅大將軍何進使人迎進欲與計事進即駕往司馬潘隱出迎進因而逆之進馳去屯百郡邸稱疾不入戊午皇子辨即帝位太后臨朝大赦天下封皇弟協為渤海王初帝數失皇子何太后生皇子辨養於史道人家故號為史侯王貴人生皇子協養於董太后宮號為董侯初大臣請立太子辨輕佻無威儀不可以為宗廟主然何后有寵大將軍進權重故久而不決帝將崩屬協於上軍校尉蹇碩協疏幼少在喪哀感百官見者為之感慟壬戌詔曰朕以眇身君王海內夙夜憂懼靡知所濟夫天地人道其用在三必須輔佐以昭其功後將軍袁隗德量寬重奕世忠恪今以隗為太傅録尚書事朕且諒暗委成羣后各率其職稱朕意焉上軍校尉蹇碩以帝輕佻不德二舅好修虛名無股肱之才懼不能安社稷也欲誅進等立渤海王與常侍趙忠宋典書曰大將軍兄弟秉國威權欲與天下黨人共誅內官以碩有兵尚且沈吟觀其旨趣必先誅碩次及諸君今欲除私讐以輔公家是時上新崩大行在前殿左右悲哀念在送終碩雖用有謀䇿其事未可知也忠典以碩書告大將軍進進誘諸常侍共誅碩或曰碩先帝所置所嘗倚仗不可誅中常侍郭脈與進同郡素養育進子弟遇之曰進我所成就豈有異乎可卒聽之庚午上軍校尉蹇碩下獄誅兵皆屬進中軍校尉袁紹説進曰黃門常侍秉權日久永樂太后與之通謀禍將至矣將軍宜立大計為天下除患於是進紹謀共圖中官進厚遇紹及虎賁中郎將術因以招引天下奇士陳紀荀攸何顒等上同腹心𥘉驃騎將軍董重與大將軍何進權勢相害中官協重以為黨助永樂亦欲與政事何后不聽永樂后怒曰汝怙大將軍邪勑驃騎斷大將軍頭如反手耳何后聞之以告進五月進與三公奏故事蕃后不同居京師請永樂宮還太國於是驃騎將軍董重下獄死永樂后怖暴崩衆以為何后殺之紹復説進曰前竇氏之敗但坐語言漏泄以五營兵士故也五營皆畏中官而竇后反用之兵皆叛走自取破滅今將軍既有元舅之尊二府並領徑兵部曲將吏皆英俊之士樂盡死力事在掌握天贊之時也功著名顯垂之後世雖周之申伯何足道哉進言之太后太后曰中官領禁兵自漢家故事不可廢也且先帝新棄天下我奈何楚楚與士人對共事乎進承太后意但欲誅其放縱者紹以中官近至尊今不廢滅後益大患𥘉進寒賤依諸中官得貴幸內嘗感之而外好大名復欲從紹等計久不能決太后母舞陽君及弟車騎將軍苗謂進曰始從南陽來依內宫以致富貴國家亦不容易深思之覆水不可收悔常在後進入復言於太后曰大將軍專欲誅左右以擅朝權太后疑焉紹聞之懼復説進曰形勢巳露將軍何不早決事久變生復為竇氏矣於是進以紹為司隸校尉王允為河南尹乃召武猛都尉丁原并州刺史董卓將兵向京師以脅太后尚書盧植以為誅中官不足外徵兵且董卓凶捍而有精兵必不可制進不從原將數千人冦河內燒宫府及居人以誅中官為言太后猶未寤六月辛酉葬孝陵皇帝于文陵秋七月徙渤海王協為陳留王董卓到澠池上書曰中常侍張讓等竊幸乘寵汨亂海內昔趙鞅興晉陽之甲以逐君側之惡以鳴鐘鼓以如洛陽進謂諸黃門曰天下胸胸正患諸君耳今董卓欲至諸君何不各就國於是黃門各就里舍是時進謀頗泄諸黃門皆懼而思變張讓子婦太后之娣也讓叩頭向子婦曰老臣得罪當與新婦俱歸私門惟受恩纍世今當離宮殿情懷戀戀願一復入直得暫奉望太后陛下顔色然後退就溝壑死且不恨讓子婦言於舞陽君入白乃詔諸常侍皆復入直八月庚寅太白犯心星戊辰大將軍何進白太后將決其事謀欲盡誅諸常侍選三署郎輔其處中常侍張讓段圭相謂曰大將軍常稱疾不臨喪葬今忽入省此意何為竇氏意復起邪使侍者聽之冥聞進言出坐省戶下讓謂進曰天下憤憤亦非獨我曹也又先帝嘗與太后不快幾至成敗我曹泣涕救解各出家財且千萬共為禮和悅上意但欲託門戶於卿耳今卿云何欲滅我曹種族不亦太甚乎卿言省內濁穢公卿巳下忠清為誰乎於是尚方監渠穆拔劒斬進圭讓偽詔以故太尉樊陵為司隸校尉故司空許相為河南尹尚書得詔疑焉請大將軍出議之中黃門以進首與尚書曰何進謀反以伏誅進部曲將吳匡將兵在外聞進𬒳誅欲將兵入宫門閉虎賁中郎將袁術燒南宫靑瑣門欲以迫出圭等圭等不出持太后天子陳留王幸北宫崇德殿苗聞進死陳兵朱雀闕下進苗素不相友善進死匡恐為苗所害乃言曰大將軍欲誅諸常侍車騎不欲今大將軍死車騎在殺大將軍者即車騎也吏士能為大將軍復讎也進遇吏兵素有恩皆涕泣曰願致死匡乃唼血為誓引兵攻苗戰於闕下兵破斬苗首於是司隸校尉袁紹斬偽司隸校尉樊陵河南尹許相勒兵捕諸中官無少長皆誅之死者二千餘人引兵入宫圭等迫急復將天子陳留王夜至小平津六璽不自隨是時宫中亂百官無從者惟河南部掾閔貢將十餘人從會尚書盧植至按劒責圭圭等涕泣謝罪又追兵至圭等白上曰臣等死天下大亂矣乃自投于河辛未帝還宮公卿百姓迎於道并州牧董卓適至聞帝在外單騎迎于北芒上卓與帝言不能對與陳留王言及禍亂之事卓以王賢有廢立之意是日幸崇德殿大赦天下得六璽失傳國璽武猛都尉丁原將河內救何氏拜執金吾何進兄弟既死其部曲無所屬皆歸卓卓使原部曲司馬呂布盡并其衆京師兵權惟卓為盛先是進遣騎都尉太山鮑信募兵亦適至信謂紹曰卓擁強兵有異志今不早圖將為所制及𥘉至疲勞襲之可擒也紹畏卓不敢發信遂還鄉里六月雨至于九月乃止卓諷有司以久雨免司徒丁宫司空劉弘卓代為司徒假節鉞虎賁癸酉卓謂司隸校尉袁紹曰人主宜立賢明天下豈有常每念靈帝使人憤毒今當立董侯不知能勝史侯否為當且爾劉氏種不足復遺紹曰今上未有不善害於天下若明公違禮任意廢嫡立庶四海恐不從明公議也卓叱紹曰豎子天下事豈不在我我欲為之誰敢不從紹橫刀長揖曰天下健者豈唯董公既出遂奔兾州卓以廢帝議示太傅袁隗隗報如議九月甲戌卓大會羣臣于崇德殿卓曰大者天地其次君臣所以為治也今皇帝暗弱不可奉宗廟為天下主今欲依伊尹霍光故事立陳留王何如公卿巳下皆惶恐不敢對盧植按尚書太甲既立不明伊尹放之桐宮又昌邑王立二十七日罪過千條是以霍光廢之今上富於春秋行未有失此前事之比也卓大怒欲誅植議郎彭伯諫曰盧尚書海內大儒天下之望也今先害之恐天下震怖卓乃止是日卓脅太后與羣臣廢帝為弘農王讀策太后流涕羣臣莫敢言丁宮曰天禍漢室喪亂弘多昔祭仲廢忽立突春秋善之今大臣量宜為社稷計誠合天心請稱萬歲太傅袁隗解帝璽綬立陳留王為皇帝年九歲太后遷于永安宫袁宏曰丁宮可謂非人矣以為雖遇伊尹之事猶將涕泣而從之而況陵虐其君而助讃其惡夫仁義者人心之所有也濃薄不同故有至與不至焉當其至者在君親之難若身首之相衛也其不至者猶有兒女之愛焉無情於斯者不得豫夫人倫矣盧植稱病而退從近關出卓遣人殺之不及隱於上谷數年後疾卒植字子幹涿人也師事扶風馬融與北海鄭玄友善所學不守章句皆研精其旨身長八尺二寸剛毅多大節常喟然有濟世之志不苟合取容言論切直不好文辭飲酒至一石而不亂融妃后家絲竹歌舞者不絶於前植侍坐數年目未嘗一眄融以是尤敬異之學終辭歸闔門教授不應州郡之命建寧中徴為博士補九江廬江太守為政務在淸淨弘大體而已病去官徵拜議郎與蔡雍楊彪等並在東觀補續漢紀植將終勑其子斂其單衣葬以土穴其子從之丙子太后何氏崩董卓殺之也乙酉司空董卓為太尉丙申太中大夫楊彪為司空豫州牧黃琬為司徒冬十一月乙巳葬靈思何皇后白波賊冦河東十月太尉董卓為相國爵卓母為池陽君司徒黃琬為太尉司空楊彪為司徒光祿勳荀爽為司空卓雖無道而外以禮賢為名黃琬荀爽之舉從民望也又任侍中周毖城門校尉伍瓊沙汰穢惡顯拔幽滯於是以尚書韓馥為兾州侍中劉岱為兖州陳留孔胄為豫州潁川張咨為南陽太守東平張邈為陳留太守𥘉卓將兵東也京兆尹蓋勳曰貪人敗類京師其必有變乃為之備及卓廢帝勳與卓書曰昔伊尹霍光權以立功人猶寒心足下小醜何以堪之賀者在門弔者在廬可不愼哉卓得書甚憚之時皇甫嵩尚三萬餘人在扶風勳乃密語嵩欲討卓卓亦深忌勳使人安喻之因徵勳為議郎後漢靈帝紀卷第二十五
