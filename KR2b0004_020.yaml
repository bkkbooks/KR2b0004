body:
  text: 後漢孝質皇帝紀卷第二十桓帝附袁宏元嘉元年春正月戊戌帝崩于玉堂是時徐揚州盜賊起太后畏懼欲徵諸國王侯到乃發喪太尉李固曰帝雖幼弱乃天下之君也今日崩亡百神感動豈有臣子反共掩匿不舉哀邪昔始皇崩於沙丘胡亥趙高隱而不發詐定璽書以賜扶蘇斂裹尸載鮑魚二千餘里近安帝崩於葉阿母王聖耿珍閻顯等遂倍濟隂更議平原載尸驅馳還宫乃發北鄉侯薨閻后兄弟及江京等亦共隱祕卒有孫程手刃之變三主崩沒臣子掩蓋日不移晷旋受大禍此天下之至忌不可之至甚者也太后從之即暮發喪時淸河王䔉年二十餘最有名德大臣歸心固意欲立謂兾曰今當立帝宜擇長年明德付以政事願將軍審詳大計陳平周勃之引代王霍光安世之立宣帝可以為法初章帝生千乘貞王伉伉生樂安夷王胡胡生嗣王鴻鴻生建平侯續梁兾欲立幼主而專其權與太后定䇿禁中丙寅詔曰先帝早棄天下胤嗣幼沖何悟倉卒仍遭不造惟太后定之考人神之誠唯建平侯續幼而岐嶷師傅不煩年已八歲克昌化之形于體貌春秋之義為人後者為之子其以續為孝順皇帝嗣使帝持節迎續於都亭是日即皇帝位太后臨朝於是䔉罷歸國太尉固言於太后曰今東面有事役費方興新有獻陵之役百姓疲矣大行皇帝尚幼可於憲陵塋中造陵依康陵之制三分減一以舒人力從之太后以頻遭大憂政之大小悉委冡宰是以固得盡心多所匡正數與梁兾違忤由是踈之己未葬孝沖帝于懷陵二月乙酉大赦天下賜男子爵各有差鰥寡孤獨癃貧不能自存者粟人三斛貞婦帛人二匹三月揚州盜賊馬勉自稱皇帝伏誅夏五月丙辰太后詔曰孝殤皇帝雖不永祚即位踰年君臣禮成孝安皇帝承襲統業而前世命恭陵為康陵之上追覽前代位第之宜先後相踰昔定公追順禮春秋善之其令恭陵次康陵憲陵次恭陵六月鮮卑冦代郡殺掠民吏秋九月庚戌太傅趙岐薨冬十二月九江盜賊華蓋自稱黑帝伏誅本初元年春正月詔曰昔堯命四子以欽天道洪範九疇休咎有象夫瑞以和降異以逆感休徵應天前聖所重頃州郡輕慢競逞殘暴陷人無罪民罹其害惡氣傷和以致災青書曰明德愼罰方春東作育養敬始其勑有司罪非殊死且勿案驗以崇在寬三月庚申詔曰九江廣陵二郡俱罹冦害殘夷最甚民失農業生者飢乏死者委棄昔之為政一物不得其所若己有之今我元元嬰此飢饉方春賑貸掩骼之時其調比郡見穀出廩大小口各有差收葬骸骨悉心經營以稱朕意夏四月令將軍以下至六百石遣子詣太學試受業滿歲課試以高第五人補郎次第五人太子舍人六月丁巳大赦天下賜天下異子爵各有差鰥寡孤獨貧不能自存者粟人三斛貞婦帛人三匹閏月甲申帝崩于玉堂初帝雖幼知梁兾專權頗以為言兾懼後不免因行鴆毒帝暴不預太尉固入問疾帝曰食煮餅今腹中悶得水尚可活兾曰吐利不可飲水語未絶而崩固號哭欲推醫兾不聽固復欲立淸河王䔉與大鴻臚杜喬言之於朝衆皆同焉初章帝生河間王開開生蠡吾侯翼翼生志梁兾以女弟配志徵至京師會帝崩兾欲立志逼于李固之議至日暮而不定中常侍曹騰聞之恐夜見大將軍兾曰將軍纍世攝政賔客縱橫多有過差淸河王嚴明若即位將軍受禍不久矣若立蠡吾侯則富貴可保兾因言太后定策禁中先策免太尉李固袁宏曰若李固者幾古之善人也將立昏暗先廢李固李固若存則明必建而天下弗違也嘗試言之曰夫稱善人者不必無一惡言惡人者不必無一善故惡惡極有時而然善惡不絶善中人皆是也善不絶惡故善人務去其惡惡不絶善故惡人猶貴於善夫然故惡理常賤而善理常貴今所以為君子者以其乘善理也苟善理常貴則君子之道存也夫善殊積者物逾重義殊多者世逾貴善義之積一人之身耳非有萬物之助而天下莫敢違豈非道存故也古之帝王恐年命不長懼季世之陵遲故辨方設位明其輕重選羣臣之善以為社稷之寄蓋取其道存能為天下正嗚呼善人之益豈不大哉於是司空胡廣為太尉司空趙誡為司徒太僕袁陽為司空太后詔曰孝質皇帝胤嗣不遂奄忽天昏社稷之重考宗室之賢莫若蠡吾侯志年已十五嘉姿卓茂又近為孝順皇帝嗣庚寅大將軍持節迎于夏門亭是日即皇帝位太后臨朝太尉胡廣録尚書事封帝弟名為都鄉侯悝為蠡吾侯秋九月尊河間孝王曰孝穆皇帝趙姬曰孝穆皇后蠡吾先侯曰孝崇皇匽姫曰孝崇博園貴人是歲梁兾第池中船無故自覆兾以問掾朱穆穆對曰易稱利涉大川乘木舟虛災異記曰利涉大川濟渡萬民也舟船所以濟渡萬民不絶遊戲船覆者天誡將軍以為有德宰相當濟渡萬民於難不可長念樂身務遊戲而已及帝即位太后臨朝穆素善推災異欲輔道兾以扶王室乃奏記於兾曰宜專心公門廣能斥逐邪惡明年丁亥之歲刑德合於乾位易稱龍戰之會其文曰龍戰于野其道窮也謂陽將勝而隂道負也今年九月天氣鬱冒五位四候連失正氣此互相明也天地大驗善道屬陽惡道屬隂若修正守陽折隂類則福從之矣穆每事不逮所好唯學傳行師言時有可試願將軍少察言申納諸家而親其忠正絶其姑息夫人君不可不學當以天地順道漸淸其心宜為皇帝選置師傅及侍講者得小心忠篤敦禮之士將軍與之俱入參觀講授師賢法古此猶倚南山而坐平原也誰能傾之穆意欲言宦官恐兾漏泄之狀不能已復附以密記曰今年夏月運房星明年又有小厄當急誅姦臣為天下所怨毒者以塞天咎議郎大夫之位本以試儒術高行之士今多非其人九卿之中又非任者穆又薦名士种皓欒巴等而其後劉文等謀反事起有黃龍見沛國於是兾以穆龍戰之言為然乃請皓為從事中郎薦巴為議郎舉穆高第為侍御史穆自以兾故吏數奏記諫曰今宦官俱用螽水為害而京師之費十倍於前河內一郡嘗調縑素綺縠才八萬餘匹今乃十五萬匹官無見錢皆出於民民多流亡皆虛張戶口戶口既少而無資者多當復割剝公賦重斂二千石長吏遇民如虜或賣用田宅或絶命捶楚大小無聊朝不保暮又有浮遊之人稱矯賈販不良長吏望為驅使令家人詐乘其勢此類交錯不可分别輒以託名尊府結怨取譏昔秦之末不恤四方近親市人數如此故以其安穩一旦瓦解陳項並起至於土崩近永和之末人有離心興徒發使不復應命懷糧廩兵云當向雜幸賴順烈皇后初政清淨乃獲安寧今民心事勢復更戚戚困於永和撫安之急誠在大將軍先易二千石長吏非其人者廬第園池之作距絶州郡貢獻內以明己外以解人之厄今日行之則今日從矣兾既貪放而復納賂遺承事國家左右宦者與之通為姦利任其子弟賔客以為刺史二千石穆又奏記曰大將軍內有貴親之固外有功業之重誠不可復枉道散財以事左右近臣宦者還舉刑賞有干典制輒率公卿詣朝堂按其罪咎則改節從訓猶影響也今反越津逾序以大事小以明事暗從其過言隨其失行天下之事受其枉戾傷損財物壞亂綱紀左右近官並以私情干擾天下雖大而民無所容足也尚可忍官位之事尤不可毒害流布日夜廣遠願大將軍省廢他事十刻之間考案古今官民之極度數作趣較然可見之如不早悟舟中之人皆敵國也若以穆輕愚不信其言可呼所親識古今者請徵核其實不可一日誡懼有後恨兾終不悟報書云如此僕亦無一可也其言雖切然不甚罪也初大將軍商獻美人於順帝美人姓友字通期順帝以歸商商不敢留而出嫁之兾即遣客盜通期還會商薨兾行服於城西廬常與之居兾妻孫壽伺兾出即多從倉頭篡通期歸治掠之因言當上書告之兾大恐頓首請之於壽母壽亦不得已而止之遂幽閉通期兾復私召往來生子伯玉匿不敢出壽知之使其子河南尹徹滅友氏家兾恐壽害伯玉常置復壁中至年十五兾被誅乃出孫壽甚美而善萬妖惑性鉗忌能制禦兾兾不敢違兾愛監奴秦官官至太倉令得出入壽所每往來屏御者而私語遂與官通威振百寮刺史二千石皆謁辭之兾用壽言多斥奪諸梁在位者外以為謙讓唯孫氏宗親相冒名為侍中中郎校尉守長吏者十餘人皆貪叨凶淫使私客籍屬縣豪富大家披以誹謗之罪閉獄掠笞使出錢自贖不滿意者至於死徒哀號之聲滿天下四方調發貢獻半入兾家先輸上第而乘輿乃問其次又競上禮奉贄及吏民賫貨求官請罪者道路相望多遣賔客車騎出塞交通外國致汗血馬奇珍異物因行道路發取妓女御者而所使人又乘勢橫暴略人妻妾弄人婦女毆撾吏卒與盜賊無異兾於洛陽城門內起甲第而壽於對街起宅競與兾相高作隂陽殿連閣通房魚池釣臺梁柱門戶銅沓紵漆靑瑣丹墀刻鏤為靑龍白虎畫以丹青雲氣又採土築山十里九坂以象二殽窮極工匠之巧積玉金明珠充仞其中起家盧周環亦如之又多規苑囿西到弘農東至滎陽南及魯陽北徑河渠周旋千里諸有山藪丘荒皆樹旗大題云民不得犯又起苑於南城西繚繞數十里大興樓觀發屬縣卒徒繕治數年乃成移檄發生兔刻其毛以為識犯者罪至死又發鷹犬於邊郡部民護送驅羊傳㕑其食募人求名馬至數千匹西域嘗有賈客來不知禁誤殺一兔轉相告言死者十餘人而災害長者及諸弟不欲令與己同其不疑及蒙私遣人出獵上黨兾聞追捕其追客一時殺三十餘人無生還者兾又起别第於城西以納姦亡命者置其中或取良民以為奴婢名曰自賣民至千人因負勢放縱道市莫敢聞者兾與壽共乘輦張羽蓋飾以金銀遊戲第中賔
