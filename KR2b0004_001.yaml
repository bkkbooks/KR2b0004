body:
  text: 後漢灮武皇帝紀卷苐一袁宏孝景帝生長沙定王發武帝世諸侯得分封子弟以冷道縣舂陵封發中子買為舂陵節侯買生鬱林太守外外生巨鹿都尉回回生南頓令欽欽生灮武皇帝元帝時節侯之孫孝侯以南方卑濕請徙南陽於是以蔡陽白水鄉為舂陵侯封邑而與從昆弟巨鹿君及宗親俱徙焉湖陽人樊重女曰歸都自為童兒不正容不出於房南頓君聘焉生齊武王縯魯哀王仲世祖新野寧平公主世祖諱秀字文叔初南頓君為濟陽令而世祖生夜有赤灮室中皆明使卜者筮之曰貴不可言是嵗嘉禾生縣界大熟因名曰秀為人隆準日角大口美鬚睂長七尺三寸樂施愛人勤於稼穯嘗之長安受尚書大義略舉兄縯字伯升慷慨有大節王莽篡漢劉氏抑廢常有興復之志不事産業傾身以結豪傑豪傑以此歸之新野人鄧晨字偉卿家冨於財晨少受易好節義世祖與之善以姊妻之是為新野公主世祖與晨遊宛穰人蔡少公道術之士也言劉秀當為天子或曰是國師公劉子駿也世祖笑曰何知非僕耶坐者皆笑當是時莽行一切之法犯罪輒斬之名曰不順時令晨謂世祖曰王莽暴虐盛夏斬人此天亡之時宛下言儻能應也世祖笑而不應宛人李通字次元父守為王莽宗卿師守身長八尺容貌絶異治家與子孫如官府少事劉歆好星曆讖記之言云漢當復興李氏為輔私竊議之非一朝也通嘗為吏有能名見王莽政令凌遲挾父守所言又居家冨佚為閭里豪自免歸從弟軼亦好事者謂通曰今四方兵起王氏且亡劉氏當興南陽宗室獨有劉伯升兄弟泛愛衆可以謀大事通甚然之世祖常避吏於宛通遣軼候世祖初通同母弟申屠臣善為醫術以其難使也縯殺之故世祖不欲見軼軼輒來不止世祖乃強見之軼徐逹通意殊不以申屠臣為恨世祖不得巳乃許之往時通病臥室內世祖與通兄倏弟寵及軼語倏等喜悅並言天下兵起王氏亡敗之狀世祖初以士君子道相慕故往答之及聞其語大驚不敢應起入室候通通握手極歡移日復言其兵起及讖文世祖微難通曰即如是當如宗卿師何通曰巳自有度世祖深知通意遂相結初琅邪呂母之子為縣長所殺呂母家産數百金志欲報怨乃治酒多買刀兵少年隨其所之而與之如此數嵗財産單盡少年相與償母母涕泣曰所以相待非治産求利也欲以為子報怨耳諸君寧能相哀也少年壯之又素被恩皆許諾聚衆數百人母自號將軍攻縣長及掾吏既而解掾吏曰諸卿無罪唯欲報長耳諸吏叩頭為長請母曰吾子犯小罪不當死長殺之殺人當死又何請乎母遂手殺之以其首祭子墓自是莒人樊崇東宛人逄安東海人徐宣謝祿並為盜賊一嵗間衆各數萬人王莽沐陽侯田況大破之遂殘州郡所過抄掠百姓初崇等以困窮為賊無攻城略地之心結聚浸盛乃相與為約殺人號令最尊者稱三老其次從事卒吏王莽遣平均公廉丹大師王匡東擊之軍至定陶莽詔丹曰倉廩盡矣府庫空矣可以怒矣可以戰矣丹惶恐夜召掾馮衍以書示之衍因説丹曰張良以五世相韓椎秦始皇於博浪之中勇冠乎貫育名髙乎泰山將軍之先為漢信臣新室之興英俊不附今海內潰亂百姓塗炭民之思漢甚於詩人之思邵公也愛其甘棠況其子孫民所歌舞天必從之方今為將軍計莫若先據大郡鎮撫吏士百里之內牛酒日賜納雄傑之士詢忠智之謀興社稷之計除萬民之害則福流於無窮勳著於不朽與其軍覆於中原身分於草野功敗名滅所及先祖者哉聖人轉禍而為福智士因敗而為功願明公深計而無與俗同丹不能從進及睢陽復説丹曰蓋聞明者見於無形智者慮於未萌况其昭晢者乎凡患生於所忽禍發於細微敗不可悔時不可失公孫鞅曰有髙人之行負非於世有獨見之慮見疑於人故信庸庸之論破金石之策襲當世之操失髙明之德夫決者智之君也疑者事之役也時不重至公勿再計丹不聽衍奉世曾孫也崇等欲戰恐其衆與莽兵亂乃皆朱眉以相識别由是號曰赤眉赤眉别校董憲等衆數萬人在梁郡匡丹攻拔無鹽莽遣中郎將奉璽書勞匡丹進爵為公王匡故進擊憲廉丹以為新拔城罷勞當且休士養威匡不聽引兵獨進丹隨之合戰成昌兵敗匡走丹使吏持其印韍符節付匡曰小兒可走吾不可遂止戰死校尉汝雲王隆等二十餘人别鬪聞之皆曰廉公已死吾誰為生馳奔賊皆戰死莽傷之下書曰惟公多擁選士精兵衆郡駿馬倉穀帑藏皆得自調忽於詔策離其威節騎馬呵譟為狂刃所害嗚呼哀哉賜諡曰果公國將褒章謂莽曰皇祖考黃帝之時中黃直為將破殺蚩尤今臣居中黃直之位願平山東莽遣章馳東與太師匡並力又遣大將軍陽浚守敖倉司徒王尋將十餘萬屯雒陽填南宮大司馬董忠養士習射中軍北壘大司空王邑兼三公之職司徒尋初發長安宿霸昌廄亡其黃鉞尋士房揚素狂直乃哭曰此經所謂喪其齊斧者也自劾去莽擊殺揚四方盜賊往往數萬人攻城邑殺二千石以下太師王匡等戰數不利莽知天下潰畔事窮計迫乃議遣風俗大夫司國憲等分行天下除井田奴婢山澤六管之禁即位以來詔令不便於民者皆收還之待見未發會世祖與通定謀議期以材官都試騎士日欲劫前隊大夫甄阜及屬正梁丘賜因以號令大衆乃使世祖與軼歸舂陵舉兵以相應遣從兄子季之長安以事報父李守季於道病死守密知之欲亡歸素與邑人黃顯相善時顯為中郎將聞之謂守曰今關門禁嚴君狀貌非凡將以此安之不如詣闕自歸事既未然脫可免禍守從其計即上書歸死章未及報留闕下會事發覺通得士走莽聞之乃繫守於獄而黃顯為請曰守聞子無狀不敢逃亡守義自信歸命宮闕臣顯願質守俱東曉説其子如遂悖逆令守北向刎首以謝大恩莽然其書會前隊復上通起兵之狀莽怒欲殺守顯爭之遂並被誅及守家在長安者盡殺之南陽亦誅通兄弟門宗六十四人皆焚尸宛市時劉縯召諸豪傑計議曰王莽暴虐百姓分崩今枯旱連季兵革並起此亦天亡之時復髙祖之業定萬世之秋也衆皆然之於是分遣親客使鄧晨起新野世祖與李通李軼起於宛伯升自發舂陵子弟諸家子弟恐懼皆亡逃自匿曰伯升殺我及見世祖絳衣大冠皆驚曰謹厚者亦復為之乃稍自安凡得子弟七八千人部署賓客自稱柱天都部使宗室劉嘉往誘新市平林兵與其帥王鳳陳牧等合軍而進西擊長聚世祖初乘牛殺新野尉乃得馬進屠唐子鄉殺湖陽尉軍中分財物不均衆恚恨欲反攻諸劉世祖斂宗人所得物悉與之衆乃悅進拔棘陽與莽前隊大夫甄阜屬正梁丘賜戰於小長安漢軍大敗還保棘陽阜賜乘勝留輜重藍鄉弘兵南渡伯升饗士設盟潛師夜襲藍鄉盡獲其輜重十一月有星孛于張東南行五日不見孛星者惡氣所生或謂之彗星張為周分其後世祖都洛陽除穢布新之象更始元年正月斬阜賜死者萬餘人嚴尤陳茂聞阜賜死馳欲據宛伯升乃焚積聚破釜甑與茂戰於育陽大破之斬首二千餘級尤茂走汝南漢兵遂圍宛伯升自號柱天將軍聖公稱更始將軍王莽惡之購伯升五萬戶黃金十萬斤使長安中諸宮署及天下鄉亭皆畫伯升像使旦起射之自阜賜死後降者十餘萬無所統一諸將請立君南陽英雄及王常皆投歸伯升然漢兵以新市平林為本其將帥起草野苟樂放縱無為國之略皆憚伯升而狎聖公二月辛巳朱鮪等於濟水上設壇場立聖公為天子議示諸將伯升曰諸公妄尊宗室甚厚無益然愚竊有所難聞赤眉垍青徐衆數十萬其中必有諸劉若南陽有所立此必將內爭王莽未滅而宗室相攻是疑天下而自損權非所以破莽之道也且首兵唱號鮮有能遂陳涉項羽是也舂陵去宛才三百里功德未有所施遽自尊立為天子凖的後人將得承吾弊非計之善者也為將軍計不如且稱王王勢亦足以斬諸將今赤眉所立者賢相率而往從之必不奪吾爵位如無所立破莽降赤眉然後舉尊號亦未晚也諸將多曰善可且為更始王將軍張斤拔劒擊地曰疑事無功今日之議不得有二乃立聖公聖公素懦弱流汗不敢言以次拜諸將劉良為國三老王匡為定國上公王鳳為成國上公朱鮪為大司馬劉縯為大司徒陳牧為大司空世祖為太常卿餘皆九卿將軍改元為更始元年於是豪傑失望劉稷擊魯陽聞更始立怒曰本宗室謀討王莽復社稷者伯升兄弟也更始何為者不肯詣宛更始大臣不悅世祖惡之謂伯升曰事欲不善伯升笑曰恆如是耳李軼初與世祖善後諂新貴而疏世祖世祖誡伯升曰此人不可親也伯升不從平林兵圍新野不能下其宰潘臨登城曰願得劉公一信伯升降之伯升威名日盛更始君臣內不自安頃時詔示縯七尺寶劒申屠建隨獻玉玦示樊宏曰昔鴻門之會范曾舉玦示項羽指在髙祖建得無不善乎而縯不應及世祖將至頴川復深誡伯升三月世祖與諸將略地頴川父城人馮異內鄉人銚期頴陽人王霸襄城人傅俊棘陽人馬成皆從世祖異字公孫通左氏春秋好孫子兵法為郡功曹監五縣事與父城令苗萌共守異出行屬縣為漢兵所得異曰老母在城中且一夫之用不足為強願據五城以效功世祖善之異歸謂萌曰觀諸將皆壯士屈起如劉將軍非庸人也可以歸身死生同命萌曰願從公計期字次況身長八尺二寸容貌壯異父卒期行喪三年鄉里義之世祖聞其氣勇有志義召為掾霸字元伯家世獄官霸為獄吏不樂文法慷慨有大志其父奇之使學於長安數年歸會世祖過潁陽以賔客見世祖曰聞將軍興義兵誅篡逆竊不自量貪慕威德願充行伍故敢求見世祖曰今天下散亂兵革並興得士者昌失士者亡夢想賢士共成功業豈有二哉霸父謂霸曰吾老矣不任軍旅汝往勉之俊字子衛成字君遷以縣吏亭長從夏五月王莽遣大司徒王尋大司空王邑將四十萬兵號百萬衆至潁川嚴尤陳茂復與二公遇莽之遣二公也欲盛威武以震山東至賫猛獸車甲攻戰之具輜重千里世祖與下江新市平林兵數萬人擊之於陽關二公兵反走世祖入昆陽諸將惶怖各欲歸保所得城世祖曰昆陽即破一日之間諸將亦滅不同力救之反欲歸守妻子財物耶諸將怒曰劉將軍何以敢如此世祖乃笑而去唯王常然世祖之計會候還上大兵來長數百里不見頭尾頗至城北矣諸將乃遽更請劉將軍計之世祖復為陳相救之勢諸將素輕世祖及迫急世祖為畫成敗皆從所言時漢兵在城中者八九千人世祖留王鳳王常守昆陽夜與宗佻李軼鄧晨十三騎出城時二公至城下者且十萬人世祖幾不得出嚴尤説王邑曰昆陽城小而堅今稱尊號者在宛然進大兵向宛彼必奔走宛下兵敗昆陽自服邑不聽遂環昆陽作營圍之數重雲車十餘丈旗幟蔽野金鼓之聲聞數十里或為地窟或作衝車弩射城中如雨城中負戶以汲二公自以功在刻漏校尉司馬請託郡縣取受賄賂不以軍事為憂有流星墮營中正晝有雲氣若壞山直於營而墮不及地尺而滅吏士皆壓仆世祖既至定陵晨悉發諸營精兵救昆陽諸將戀輜重欲留兵守之世祖曰今同心併力以破二公珍寶萬倍大功可成如為所敗身首無餘何財物之有諸將聞二公兵盛皆震懼世祖為陳天命曆數説其意請為前行諸將不得巳皆從世祖世祖將步騎千餘人居諸將前二公遣步騎千餘人來合戰斬首數十級諸將喜曰劉將軍平生見小敵怯今見大敵勇甚可怪世祖復進諸將乘之斬首數百級連戰輒勝諸將益奮棘陽人岑彭字君然以郡吏共嚴説守宛城伯升攻之數月城中相食是月岑彭嚴説舉城降諸將欲誅之伯升曰彭為郡吏執心堅守是其節也舉大事當表義士不如封之以勸後人更始乃封彭為歸德侯更始入都太守府封宗室諸將皆為列侯者百餘人宛城之拔昆陽未知也世祖為書與城中言宛下兵復至昆陽墜其書二公得書恐六月巳卯世祖選精兵三千從城西水上奔二公陳二公兵走北殺司徒王尋而昆陽城中兵亦鼓譟而出中外並擊會大風雷雨滍水盛二公大衆遂潰奔走赴水溺死以數萬滍水為之不流王邑嚴尤陳茂輕騎逃去漢軍獲其輜重車甲連月不盡或焚燒其餘於是劉稷詣宛李軼等共譖之更始乃陳兵收稷伯升固爭之遂並殺伯升以灮祿勳劉賜為大司徒時世祖在父城乃詣宛謝之不伐昆陽之功更始以是慙拜世祖為破虜大將軍封武信侯秋八月故鍾武侯劉望據汝南自立為定漢王嚴尤陳茂皆歸之王莽遣太師王匡國將褒章守洛陽以距更始更始遣西屛將軍申屠建司直李松攻關定國王匡攻洛陽三輔震動長安中兵起共攻莽九月丙子東海公孫賔就斬莽首會申屠建李松至傳莽首及璽綬詣宛更始視之曰莽不如是當與霍灮等更始韓夫人言云不如此者帝當那得之是月王匡亦拔洛陽執太師公王匡國將褒章至宛斬之冬十月劉望自立為天子嚴尤為大司馬陳茂為丞相更始使劉信擊之望兄子回殺望降嚴尤陳茂走朗陵為故吏所殺更始欲北之洛陽以世祖為司􅘗校尉初三輔官府吏東迎者見更始諸將數十輩皆冠幘而衣婦人衣大為長安所笑智者或亡入邉郡及司􅘗官屬至衣冠制度皆如舊儀父老舊吏見之莫不垂涕悲喜曰何幸今日又見漢官威儀更始至洛陽遣使降樊崇等樊崇等與渠帥二十餘人至洛陽降皆封為列侯其留者相率叛之崇等即皆亡去復領其衆分為二隊崇自開封出南陽徐宣謝祿等從陽翟擊河南是時豪傑並起廬江張步起琅邪劉芳起安定董憲起東海秦豐起黎丘其餘赤眉銅馬青犢高湖董逹等衆各數萬旬月之間天下皆遍隗囂字季孟天水成紀人少為郡吏著名涼州季父崔豪俠能得衆情聞莽兵敗昆陽更始立於宛謀起兵以應漢囂止之曰兵凶事也宗族何辜崔不從收兵得數千人攻莽鎮夷大尹李育殺之既而推囂為主不得巳乃聘平陵人方望為軍帥望説囂曰今欲承天順民輔漢而立者乃在南陽莽尚據長安言為漢無所受命何以見信於衆乎宜急立漢高廟稱臣奉祠所謂神道設教求助民神者也且禮有損益質文無常茅茨土階致其肅也敬雖未備物神明其捨諸囂從其言遂立漢祖宗廟祀畢相與盟曰凡我同盟允承天道興輔劉宗或懷姦慮神明殛之囂乃勒兵十萬將攻安定安定太守王向莽從弟談之子威行郡中屬縣未敢叛囂喻向以天命向不從囂復為言重頓兵血刃傷害吏士終不聽乃進兵虜向以徇百姓然後行戮安定悉降而長安中亦起兵誅莽囂遂分遣諸將徇隴西武都金城武威張掖酒泉燉煌皆下之公孫述字子陽茂陵人成帝時為清水長兼治五縣姦不得發郡中謂有神王莽時守導江卒正復有能名更始之立南陽人宗成自稱將軍收兵漢中衆數萬人遂至成都是時導江治臨卭述召縣中豪傑謂之曰天下同苦新室思劉氏矣故聞漢將軍至馳迎道路今百姓無辜父子俘獲室家燒燌此冦賊非義兵也吾欲執郡自守以待真主諸公併力者即留不欲者即去豪傑皆叩頭願效死乃發城中兵千餘人述使人詐稱漢使者自東方來拜受印綬因號曰輔漢將軍兼益州牧北至成都衆數千人遂攻宗成大破之盡有益州李憲潁川人王莽時於廬江賊起衆至十餘萬莽以憲為偏將軍連年擊平之莽敗憲據郡守自稱淮南王張步琅邪人漢兵起步亦聚衆千餘人擊攻傍縣數十城劉芳安定三川人本姓盧王莽末天下咸思漢芳由是詐自稱武帝後變姓名為劉文伯及莽敗芳與三川屬國羌胡起兵北邉董憲字僑卿東海朐人父為人所殺憲聚客報冤衆稍多遂攻屬縣秦豐南郡黎鄉人少時受律令為縣吏漢兵起與同鄉蔡張趙京等起兵衆數千人攻宜城襄陽諸縣下之自稱黎丘王更始封劉永為舉王永故梁王子也王莽時廢為家人更始立詣洛陽故得封更始將使大將平河北劉賜諸宗室無可使者獨有世祖也朱鮪等以為不可而左丞相曹竸父子用事馮異勸世祖厚結焉由是以世祖為大司馬遣平河北於是馮異銚期堅談祭遵臧宫王霸皆以為掾吏從至河北賔客多去者世祖謂霸曰潁川從我者皆已亡矣疾風知徑草爾其勉之堅談字子汲襄城人也以縣吏從世祖祭遵字弟孫潁陽人家冨給而遵惡衣服不自修飾又好經學母死負土成墳以孝謹聞常為亭長所侵辱遵結客殺亭長縣中稱其儒而有勇也世祖破二公於昆陽還潁陽遵以縣吏數進見上愛其姿容謂遵曰欲從我乎曰願從因署門下吏臧宫字君翁郟人為縣亭長率賓客入下江兵中昆陽之戰諸將稱其勇世祖察宫勤力少言獨親納之初伯升之遇害世祖不敢制服飲食笑言語如平常馮異見世祖獨居不御酒肉被席有涕泣處異獨寬解世祖世祖曰卿勿妄言何有是乎異因曰天下同苦王氏思漢家今下江諸將縱橫恣意所至虜掠財物略人婦女百姓已復失望無所戴矣今公專命方面廣施恩德有桀紂之亂乃見湯武之功民之飢渴易為飲食時也宜急分遣官屬理冤結施恩惠於是乃遣異與銚期乘傳撫循百姓所至二千石長吏三老皆具食宥囚徒除苛政反漢官申舊章吏民大喜牛酒盈路皆辭而不受南陽新野人鄧禹字仲華少以德行稱嘗遊學長安見世祖知非常人也更始立人多薦舉禹不肯從聞世祖平河北乃杖策追之及世祖於鄴世祖見禹甚喜謂禹曰欲仕乎曰不願世祖曰即如是欲何為對曰使明公威德加於海內禹得效其尺寸之功垂名竹素此其願也世祖留禹宿禹因進説曰古人有言聖人不得違時時亦不可失也歷觀往古聖明之興因時立功二科而巳天事與人事也今以天事觀之更始既立而變方興人事觀之帝王大業非凡夫所任更始既是庸才而其輔佐無有忠良明智深謀遠慮欲尊主安民者也以古人度觀之今敗可見也公推誠接士揔覽英雄天下之人皆樂為驅馳公之德衆所歸也初戰昆陽破王莽四十萬衆天下聞之莫不震靡公之武衆所服也軍政齊肅少長有禮賞善如不及討惡如慮遙公之文衆所安也聰明神武所謂天下聖人也民之歸治如水趍海以公之威德應民之望收天下英雄而分授之河內被山帶河足以為固其土地冨貴殷之舊都公之有此猶髙祖之有關中也進兵定冀州北取幽並胡馬之用東舉青徐引負海之利三州既集南面以號令天下天下不足定也上笑曰且相隨北去因勑左右號禹曰鄧將軍巨鹿宋子人耿純字伯山説李軼曰將軍以龍虎之姿風雲之時奮迅而起期月之間兄弟冨貴德信不聞於士民功勞未施於百姓而寵祿暴興此智者之所忌也兢兢自危猶懼不終而況沛然自足可以成功者乎軼奇之乃授純節令安集趙魏是時世祖在邯鄲純見世祖長者官屬齊肅遂求自納焉南陽宛人朱祐字仲先世祖之舊也伯升之起以祐為護軍伯升敗祐常獨怨望世祖每短絶之祐自洛陽將之河北劉嘉問祐曰子將何之祐曰將之長安嘉素奇世祖知祐有舊謂祐曰子與劉公善胡不北乎嘉有勞苦吏欲託之劉公祐曰若是願與之俱乃給其車馬使賈復陳俊與祐俱北及世祖於柏人世祖復以祐為護軍常居中親幸祐從容問世祖曰更始政亂公有日角之相天之所命也世祖怒將收之乃不敢言賈復字君文南陽冠軍人初事武陰李生李生奇之謂門人曰賈生容貌志氣如此而勤於學將相之器也嘗為縣吏迎鹽河東會盜賊起同輩十餘人皆棄鹽去復獨送至縣縣中稱其信及漢兵起復聚衆數百人於羽山既而將其兵屬劉嘉為校尉復見更始綱紀日替令嘉遠為之慮乃説嘉曰臣聞圖堯舜之事而不能至者湯武是也圖湯武之事而不能至者桓文是也圖桓文之事而不能至者六國是也圖六國之事而不能至者亡六國是也今漢氏中興大王以親戚為輔天下未定而安所保所保得無不可保乎嘉曰公言大非吾任也大司馬劉公在河北可往投之去見上上復奇之又鄧禹亦稱有將帥才於是署復為都督解左驂以賜之陳俊字子昭南陽西鄂人也少學長安歸為郡吏漢兵起為劉嘉長史既遇世祖調補曲陽長謂世祖曰欲與君為左右小縣長何足以留之俊即解印綬去世祖以俊為強弩將軍將中堅士俊教習進退皆應旗鼓臨敵奮擊所向皆破世祖曰諸將皆如此復何憂哉王昌字郎邯鄲人初河間赤眉大衆將至百姓騷動郎明星曆以為河北有天子氣素與趙繆王子林善豪俠於趙欲因此起兵初王莽時或稱成帝子子輿為莽殺之郎於是詐稱子輿以誑動林等林等亦欲以為亂乃與趙國大豪李育張參先宣言赤眉將至立劉子輿以動衆心遂率車騎數百晨入邯鄲止王宮十二月壬辰郎自立為天子外遣將帥徇幽冀曰朕孝成皇帝子子輿者也遭趙氏之禍王莽篡弒賴知命者將護朕躬解形河濵削迹趙魏王莽竊位獲罪于天天命祐漢故使東郡太守翟義嚴鄉侯劉信擁兵征討出入胡漢普天率土知朕隱在人間今也南嶽諸劉為朕先驅朕觀天文乃興干斯而聖公未知故且持帝號今巳詔聖公及翟太守驟與功臣詣行在所荆州刺史太守皆聖公翟義所置強者負力弱者疑惑頓兵傷士元元喪氣朕甚悼焉故遣使者頒下詔書是時百姓思漢言翟義不死故郎稱之從民望也於是自趙國巳東至干遼左皆從風而靡矣茂陵人耿弇字伯昭父况王莽時為朔調連率更始立諸將略地者前後非一弇乃辭况至京師因獻貢以自固弇時年二十一矣至宋子會王郎反從縣吏孫倉衛苞勸弇降邯鄲弇按劒叱之曰所以涉難至長安者欲以輔劉氏也今我至京師陳上谷漁陽兵馬之用還出太原代郡反覆數十日歸發突騎以奔烏合之衆如摧枯折腐耳觀公等族滅不久孫倉衛苞不從皆亡去弇聞世祖在盧奴乃北謁之世祖置弇門下吏弇因護軍朱祐求歸發兵世祖壯之弇亦書與况盛陳世祖度略宜速來相見况乃馳至昌平遣小子舒獻馬焉後漢灮武皇帝紀卷第一
