body:
  text: 後漢孝獻皇帝紀卷第二十八袁宏二年春正月癸酉大赦天下即拜袁紹為後將軍使持節兾州牧封邟鄉侯沮授說紹曰公纍世輔弼世濟忠義今朝廷播越宗廟毀壞觀諸州郡外託義兵內懷相擒未有存主恤民者也今且州域粗定宜迎大駕安宫鄴都挾天子而令諸侯畜士馬以討不庭誰能禦之紹說將從之郭圖淳于瓊曰漢室陵遲為日久矣今欲興之不亦難乎且今英雄據有州郡動衆萬計所謂秦失其鹿先得者王今迎天子以自近動輒表聞從之則權輕違之則拒命非計之善也授曰今迎朝廷至義也又於時宜大計也若不早圖必有先之者權不失機功在速捷其孰圖之紹不能從是時以年不豐民食不足詔賣厩馬百餘匹御府大司農出雜繒二萬匹與馬直賜公卿巳下及貧民不能自存者李傕曰我邸閣儲跱少乃不承詔悉載置其營賈詡曰此乃上意不可拒也不從李傕郭汜樊稠各自以有功爭權欲鬪者數矣賈詡每以大體責之雖內不能善外相含容初樊稠擊馬騰等李利戰不甚用力稠叱之曰人欲截汝父頭何敢如此我不能斬卿邪利等怒共譖之於傕催見稠勇而得衆心亦忌之二月李傕殺右將軍樊稠撫軍中郎將李象由是諸將皆有疑心傕數設酒請汜或留汜止宿汜妻懼傕與汜婢妾而奪已愛思有以離間之會傕送饋妻乃以豉為藥汜將食妻曰食從外來儻或有故遂摘藥示之曰一捷無兩雄我固疑將軍信李公也他日傕復請汜大醉汜疑傕藥之絞糞汁飲之乃解於是遂相疑治兵相攻矣上使侍中尚書和傕汜不從乃謀迎天子幸其營夜有亡者告傕三月丙寅傕使兄子李暹將數千兵圍宫以車三乘迎天子太尉楊彪曰自古帝王無在人家者舉事當合天心諸君作此非是也暹曰將軍計定矣於是天子一乘貴人伏氏一乘黃門侍郎賈詡左靈一乘其餘諸臣皆步司徒趙溫司空張喜聞有急自其府出隨乘輿既出兵入殿中掠宮人御物是日天子幸傕宫又徙御府金帛乘輿器服置其營遂放火燒宫殿宫府居民悉盡天子復使公卿和傕汜汜又留太尉楊彪司空張喜尚書王隆光祿勳劉淵衛尉士孫瑞太僕韓融廷尉宣璠大鴻臚榮邰大司農朱雋將作大匠梁邵屯騎校尉姜宣等夏四月郭汜饗公卿議攻李傕楊彪曰羣臣共鬬一人劫天子一人質公卿此可行乎汜怒欲刃之中郎將楊密諌汜乃止朱雋素剛直遂發病死雋字公偉會稽上虞人少好學為郡功曹太守徐圭為州所誣奏郡吏謀賂宦官雋曰明府為州所枉不思奮命而欲行賂以穢清政是有君無臣也今州自有贓汙而求郡纎介抱罪誣人雋具知之請詣京都無以賂為也圭曰卿之智情我所知也今州奏巳去恐無及也雋曰操曰作章疾馬兼追足以先州且尋郵推之州書可得矣圭曰善雋即夜發輕騎數十人分伺州書果得而鈔絶之雋得獨至京師上書告刺史罪章即下乃徴刺史圭事得解刺史家聞使刺客分遮道欲殺雋雋知乃從洛陽尉司馬珍自匿變服而去圭大悅雋由是顯名舉孝廉為尚書郎遷蘭陵令先和初交址賊梁龍等攻郡縣以雋治蘭陵有名即拜交址刺史雋上書求過本郡募兵天子許之得以便宜從事將家兵二千人并郡所調合五千人分兩道至州界斬蒼梧太守陳紹遣使喻以利害降者數萬人乃勒兵擊斬龍旬月盡定封都亭侯賜黃金五十斤甲午立皇后伏氏后琅邪東武人也父完深沉有大度舉孝廉稍遷五官中郎將侍中以選尚陽安長公主主桓帝女也生五男一女長男德次雅次后次均次尊次朗后以選入掖庭為貴人完遷執金吾於是李傕召羌胡數千人先以御物繒綵與之許以宫人婦女欲令攻郭汜羌胡知非正不為盡力郭汜與傕中郎將張苞張寵等謀攻傕丙申兵交及帝殿前又貫傕左耳楊奉於外距汜汜兵退張苞張寵因以所領兵詣汜是日傕復移乘輿幸北塢門內外隔絶諸侍臣皆有飢色帝求米五斛牛骨五具以賜左右傕曰御脯上飯何用米為乃與腐牛骨皆臭不可食帝大怒欲責之詰侍中楊琦上封事曰傕邊鄙之人習於夷風今又自知所犯悖逆常有怏怏之色欲轉車駕幸黃白城以舒其憤臣願陛下宜恕忍之未可顯其罪也上納之初傕屯黃白城故謀欲徙傕以司徒趙溫不與巳同乃內溫塢中溫聞傕欲移乘輿黃白城與傕書曰公前託為董公報仇然實屠陷王城殺戮大臣天下不可家見而戶喻也今爭睚眦之隙以成千金之讐民在塗炭各不聊生曽不改悟遂成禍亂朝廷仍下明詔欲令和解詔命不行恩澤日損而復欲轉乘輿黃白城此老夫所不解也於易一過再為涉三而弗改滅其頂凶不如早共和解引軍還屯上安萬乘下全生民豈不幸甚傕大怒欲遣人害之其弟應溫故吏也諫之數日乃止帝聞溫與傕書問侍中當洽曰傕不知臧否溫言大切可為寒心洽曰李應以解之矣上乃悅傕信鬼神晝夜祭祀為董卓設坐三牲祠之祠畢過問帝起居因求入見傕帶三刀執一刀侍中見傕亦帶刀入侍值傕數汜之罪上面答之傕出喜曰陛下賢主也傕曰侍中皆持刀欲圖我乎侍中曰軍中自爾國家之故事也傕乃安閏月巳卯遣謁者僕射皇甫麗和傕汜麗先詣汜汜從命又詣傕傕不聽曰我有誅吕布之功輔功四年三輔清淨國家所知也郭多盜馬虜耳何敢欲與吾等邪必誅之君觀吾方略士衆足辨郭多不多又劫質公卿所為如是而君苟欲左右之邪汜一名多麗曰昔有窮后羿恃其善射不思患難以至於斃近者董公強將軍所知也內有三公以為主外有縱橫以為黨吕布受恩而反圖之斯須之間身首異處此有勇而無謀也今將軍身為上將抱鉞持節子孫親族荷國寵榮今汜質公卿而將軍脅之誰輕重乎張濟與郭多楊定有謀又為冠帶所附楊奉白波師耳猶知將軍所為非是將軍雖寵之猶不輸力也傕不從呵遣麗麗曰傕不從詔亂語不順侍中胡邈傕所薦也謂麗曰李將軍於卿非常也又皇甫公為太尉將軍力也是言何謂乎麗曰吾纍世受恩又常在帷幄君辱臣死就為李傕所殺志無顧也上懼傕聞麗言勑麗令去傕遣虎賁王昌呼麗欲殺之昌諷麗令去還曰臣追之不及辛巳車騎將軍李傕為大司馬是夏陶謙病死劉備在徐州曹操欲襲之荀彧曰昔高祖保關中光武據河內皆深根固本以制天下進可以勝敵退足以堅守雖有困敗而終濟大業將軍本以袞州首事平山東之難百姓歸心悅服且河濟天下之要地也人雖殘壞猶易以自保是亦將軍之關中河內也若不先定之根本將何寄乎今破李封薛簡若兵東擊陳宫宫必不敢西顧乘其間而收熟麥約食畜榖一舉而布可破也布破然後南結楊州兵討袁術臨淮泗若捨布而東多留兵則不足用少留兵則民皆保城不得樵採布乘虛冦暴民心益危雖甄城范衛可全其餘非公之有是無兗州也若徐州不定將軍安所歸乎且陶謙雖死徐州未易忘彼懲往年之敗將愧而結親相為表裏今東方皆巳收麥必堅壁清野以待將軍將軍攻之不拔掠之無所獲不出十日則十萬之衆未戰而自困也前討徐州威罰實行其子弟念父兄必人人自守而無降心就道破之尚不可有也事故有棄此取彼者以大易小可也以安易危可也唯一時之勢不患本之不固可也今三者莫利願將軍熟慮之操乃止復定兗州六月侍中楊琦黃門侍郎丁沖鍾繇尚書左丞魯充尚書郎韓斌與傕將楊奉軍吏楊帛謀共殺傕會傕以他事誅帛奉將所領歸汜庚午鎮東將軍張濟自陜至欲和傕汜遷乘輿幸他縣使太官令狐篤綏民校尉張裁宣喻十反汜傕許和質其愛子傕妻愛式和計未定而羌胡數來闕省問曰天子在此中邪李將軍許我宫人美女今皆何所在帝患之使侍中劉艾謂宣義將軍賣詡曰卿前奉職公忠故仍升榮寵今羌胡滿路冝思方略詡乃召大帥飮食之許以封賞羌胡乃引去傕由此單弱於是尚書王復言和解之意計以士衆轉少從之不以男各女為質封為君食邑復以汜從弟濟從子繡傕從弟桓為質秋七月甲子車駕出宣平門汜兵數百人前曰此天子非也左右皆將㦸欲交侍中劉文前曰是天子也使參乘高舉帷諸兵何敢逼至尊邪汜兵乃却士衆皆稱萬歲夜到霸陵從者皆飢張濟賦給各有差傕出屯河陽丙寅以張濟為驃騎將軍封平陽侯假節開府如三公郭汜為車騎將軍假節楊定為後將軍封列侯董承為安集將軍追號乳母吕貴為平氏君郭汜欲令車駕幸高陵公卿及濟以為宜幸弘農大會議之不決詔尚書郭浦喻汜曰朕遭艱難越在西都感惟宗廟靈爽何日不歎天下未定厥心不革武夫宣威儒德合謀今得東移望逺若近視險如夷弘農近郊廟勿有疑也汜不從上曰祖宗皆在洛陽靈懷皇后宅兆立未遑謁也夢想東轅日夜以兾臨河誰謂其廣望宋不謂其遠而泛復欲西乎遂終日不食浦曰可且幸近縣八月甲辰車駕幸新豐張濟諷尚書徴河西太守劉玄欲以所親人代之上曰玄在郡連年若有治理逮遷之若無異效當有召罰何緣無故徴乎尚書皆謝罪上既罪濟所諷也詔曰濟有拔車駕之功何故無有表而私請邪一切勿問濟聞之免冠徒跣謝後將軍楊定請侍中尹忠為長史詔曰侍中近侍就非其宜必為關東所笑前在長安李傕專政今朕秉萬機豈可復亂官爵邪時上年十五每事出於胸懷皆此類也丙子郭汜等令車駕幸郿侍中科輯城門校尉衆在汜營密告後將軍楊定安集將軍董承興義將軍楊奉令會新豐定等欲將乘輿還洛陽郭汜自知謀泄乃棄軍入南山是月曹操圍張超於雍丘超曰救我者唯臧洪乎衆曰袁曹方穆而洪為紹所用必不敗好招禍遠來赴此超曰子源天下義士大不背本也但恐見禁制不相及耳逮洪聞之果徒跣號泣並勒所令又從袁紹請兵欲救超而紹終不聽超遂族滅洪由是怒紹絶不與通紹興兵圍之下能下紹使洪邑人陳琳以書喻洪洪答曰隔濶相思發於寤寐幸相去步武之間耳而以趣舍異規不得相見其為悵恨難為心哉㒒小人也本因行役遂竊大州恩深分厚寧樂今日自還接刃每登城勒兵望主人之旗鼓感故友之周旋撫弦搦矢不覺流涕之覆靣也當受任之𥘉自謂䆒竟大事共尊王室也豈寤天下不悅本州見侵郡將遘厄請師見下辭行波拘使洪故君有羑之厄洪棲遲求忠孝之名杖䇿擕背虧孝之不名孤揆此二者與其不得巳輕重殊塗親踈異盡故便收淚告絶用命此城正以君子之違不適讐國故也吾聞之義不背親忠不違君昔晏嬰不降志於直刃南史不曲筆以求生故身著圖篆名垂後世況僕據金城之固驅士民之力散三年之畜以為一年之資但懼秋風揚塵伯圭馬首南向北鄙告倒懸之急股肱奏乞歸之記耳主人宜反旌退師治兵鄴垣何久辱盛怒暴威於吾城下哉行矣孔璋足下徼利於境外臧洪投命於君親吾子託身於盟主臧洪䇿名於長安子謂余身死而名滅僕亦笑子生而無聞焉悲哉本同而末異努力努力夫復何言紹見洪書知無降意增兵急攻之城中榖盡外無强救洪自度必不免呼吏士謂曰袁氏無道所圖不軌且不救洪郡將義不得不死念諸軍無事宜與此禍可先城未敗將妻子出吏士皆垂泣曰明府與袁氏本無怨隙今一朝為郡將之故自致殘困吏民何忍當舍明府去也男女七八千人相枕而死莫有離叛城陷紹素親洪施帷幔大會諸將見洪謂曰臧洪何相負若此今日服未洪據地暝目曰諸袁事漢四世五公可謂受恩今王室衰弱無輔翊之急欲因際會希兾非望多殺忠良以立姦威洪親見呼張陳留為兄則洪府君亦宜為弟同共戮力為國除害何有擁衆而觀人屠滅惜力不能推刃為天下報讐何謂服乎紹本愛洪意欲服而原之見洪辭切終不為用乃殺之冬十月戊戌汜黨夏育高碩等欲共為亂脅乘輿西行侍中劉艾見火起不止曰可出幸一營以避火難楊定董承將兵迎天子幸楊奉營上將出夏育等勒兵欲止乘輿楊定楊奉力戰破之斬首五千級壬寅行幸華隂寧輯將軍假煨具服御及公卿巳下資儲欲上幸其營煨與楊定有隙迎乘輿不敢下馬侍中种輯素與定親乃言假煨欲反上曰煨屬來迎何謂反對曰迎不至界拜不下馬其色變也必有異心於是太尉楊彪司徒趙溫侍中劉艾尚書梁紹等曰假煨不反臣等敢以死保車駕可幸其營董承楊定言曰郭汜來在畏營詔曰何以知之文禎左靈曰弘農督郵知之因脅督郵曰今郭汜將七百騎來入煨營天子信之逐路次於道南丁未楊奉董承楊定將攻煨使种輯左靈請帝為詔上曰王者攻代當上參天意下合民心司寇行刑君為之不舉而欲令朕有詔邪不聽輯固請至夜半猶弗聽奉乃輒攻煨營是夜有赤氣貫紫宮定等攻煨十餘日不下煨供給御膳百官無有二意司隸校尉管邰以為不宜攻煨急應解圍速至洛陽定等患之使楊奉請為巳副欲殺之帝知其謀不聽詔使侍中尚書告喻之定等奉詔還營李傕郭汜悔令車駕東聞定攻假煨相招共救之因欲追乘輿楊定聞傕汜至欲還藍田為汜所遮單騎亡走是時張濟復與傕汜合謀欲留乘輿於弘農十二月行幸弘農濟汜傕追乘輿衛將軍楊奉射聲校尉俎雋力戰乘輿僅得免雋被創墜馬傕謂左右曰尚可活否雋罵之曰汝等凶逆逼劫天子使公卿𬒳害宫人流離亂臣賊子未有此也傕乃殺之雋時年二十五其督戰訾置負其尸而瘞之濟等抄掠乘輿物及祕書典籍公卿巳下婦女死者不可勝數壬申行幸曹陽傕汜濟并力來追董承楊奉間使至河東招故白波帥李樂韓暹胡才及胸奴右賢王去卑率其衆來與傕等戰大破之斬首數千級詔使侍中史恃太㒒韓融告張濟曰朕惟宗廟之重社稷之靈乃心東都日夜以冀洛陽丘墟靡所庇廕欲幸弘農以漸還舊諸軍不止其競遂成禍亂今不為足民在塗炭濟宿有忠亮乃心王室前之受命來和傕汜元功既建豈不惜乎濟其廪給百官遂究前勳昔晉文公為踐土之會垂勳周室可不勉哉於是董承等以新破傕等可復東引詔曰傕汜自知罪重將遂唐突為吏民害可復待韓融還乃議進退承等固執宜進庚申車駕發東董承李樂衛乘輿胡才楊奉韓暹胸奴右賢王於後為距傕等來追王師敗績殺光祿勳鄧淵廷尉宣璠少府田芬御史鄧聘大司農張義是時司徒趙溫太常王絳衛尉周忠司隸校尉管郃為傕所遮欲殺之賈詡曰此皆大臣卿奈何害之也傕乃止李樂曰事急矣陛下宜銜馬上曰不可舍百官而去此何辜哉弗聽是時虎賁羽林行者不滿百人傕等統營叫喚吏士失色各有分散之意李樂懼欲令車駕御船過砥柱出孟津詔曰千金之子坐不垂堂孔子愼慿河之危此所謂安居之道乎大尉楊彪曰臣弘農人也自此東有三十六難非萬乘所登也宗正劉父曰臣前為陜令知其險舊故有河師猶有傾危況今無師太尉所慮是也董承等以為宜令劉太陽使李樂夜渡具船舉火為應上與公卿步出營臨河欲濟岸高十餘丈不得下議欲續馬轡繫帝腰時后兄伏德扶后一手挾絹十四董承使荷令孫儼從人間所后左靈曰御是何等人也以刀捍之殺旁侍者血濺后衣伏德以馬轡不可親腰以絹為輦下校尉向弘居前負帝下至河邉餘人皆匍匐下或有從岸上自投冠幘皆壞既至河邉士卒爭赴舟董承李樂以戈擊破之帝乃御船同舟渡者皇后貴人郭趙二宫人太尉楊彪宗正劉艾執金吾伏完侍中种輯羅邵尚書文楨郭浦中丞楊衆侍郎趙泳尚書郎馮碩中官僕射伏德侍郎王稠羽林郎侯折衛將軍董承南郡太守左靈府史數十人餘大官及吏民不得渡甚衆婦女皆為兵所掠奪凍溺死者不可勝數衛尉士孫瑞為傕所殺傕見河北有火遣騎候之適見上渡河呼曰汝等將天子去邪董承懼射之以被為幔既渡幸李樂營河東太守王邑來貢獻勞百官丁亥幸安邑王邑賦公卿以下綿絹各有差封邑為列侯庚子拜胡才為征北將軍領并州牧李樂為征西將軍領凉州牧韓暹為征東將軍領幽州牧皆假節開府如三公遣太㒒韓融至弘農與傕汜連和還所掠宫人公卿百官及乘輿車駕數乘是時蝗蟲大起歲旱無榖後宫食棗菜諸將不能相率上下亂糧食盡於是安東將軍楊奉衛將軍董承征東將軍韓暹謀以乘輿還洛陽乙卯建義將軍張陽自野王來與董承謀迎乘輿還洛陽安國將軍封晉陽侯假節開府如三公袁術自以依據江淮帶甲數萬加纍世公候天下豪傑無非故吏以為袁氏出陳舜之後以黃乘赤得運之次時沛相陳圭故太尉球之子也術與圭俱公族子孫少交遊書與圭曰昔秦失其政天下羣雄爭而取之兼智勇者卒受其福今世紛擾復有瓦解之勢誠英人有為之時也與足下舊交豈肯左右之乎若集大事子為吾心膂圭答書曰若秦末世肆暴志情虐流天下毒被生民民不堪命故遂土崩今雖季世未有秦苛暴之亂也曹將軍神武應期興復典刑掃平凶慝清定海內有徴矣足下當戮力同心匡翼漢室而隂謀不軌以身試禍豈不痛哉若迷而知反尚可以免吾備舊知請陳至情雖逆於耳骨肉之恩也天子之敗於曹陽術會其衆謀曰劉氏微弱海內鼎沸吾家四世公輔百姓所歸欲應天順民於諸君意何如衆莫敢對主簿閻象進曰昔周自后稷文王積德纍功三分天下猶服事殷明公雖奕世克昌未有若周之盛漢室雖微未有殷紂之暴術默然不悅遂造符命置百官焉後漢孝獻皇帝紀卷第二十八
