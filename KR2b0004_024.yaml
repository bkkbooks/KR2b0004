body:
  text: 後漢孝靈皇帝紀中卷第二十四袁宏嘉平四年春三月五經文字刻石立于太學之前夏五月丁卯大赦天下延陵園災冬十月改平凖為中凖使中官為之令列為內署令丞悉用中官𥘉虞大家以選入掖庭生沖帝陳夫人生質帝沖帝早崩政在梁氏故未有諡號議郎畢整上疏曰孝沖皇帝母虞大家質帝母陳夫人皆誕育聖明而未有諡號今當以母氏序列于外戚雖在薨歿猶宜爵贈况二母見存而無寵榮者乎即違母以子貴之義又不可示以後世上感其言以虞大家為貴人陳夫人為孝王妃使中常侍持節告憲懷二陵大鴻臚袁隗為司徒五年夏四月癸丑大赦天下五月太尉李咸久病罷光祿劉寬為太尉閏月永昌太守曹鸞下獄誅𥘉鸞上書訟黨人曰夫黨人者或耆年淵德或衣冠英賢皆宜股肱王室左右大猷者也而久𬒳禁錮辱在泥塗謀反大逆尚蒙赦宥黨人何罪獨不開恕乎所以災異屢見水旱荐臻皆由於斯宜加沛然以副天心有司奏檻車徴鸞棄市鸞年九十本郡閔其辜於是申黨人之例父兄子弟門生故吏皆免官禁錮冬十月司徒袁隗久病䇿罷隗字次陽纍世三公貴傾當時兄弟逢及隗並喜人事外結英俊內附宦官中常侍袁朗隗之宗人用事於中以逢隗家世宰相推而崇之以為援故袁氏寵貴當世富侈過度自漢公族未之有也逢兄子紹好士著名賔客輻輳紹折節下之所擇賢愚逢子術亦任俠好士故天下好事之人爭赴其門輜軿柴車常有千兩寵臣中官皆患之十二月丙戌光祿大夫楊賜為司徒是時拜爵過差游觀無度賜歎曰吾世受國恩又備宰相安得拱默哉復上疏曰臣聞天生蒸民不能自牧故立君長使司牧之是以文王日夜不食以立雍熙之化頃聞拜爵過多每𬒳尚書劾非衆所歸或不知何人昔堯用舜猶尚先試考績以成厥功今之所用無他名德旬月之間纍遷高位守道之徒歷載不轉勞逸無别善惡同流又聞微行數出諸苑囿觀鷹犬之勞極般游之樂政事日隳大化陵遲忘乾乾不息忽屢省之欽哉陛下不顧二祖之勤止追慕五宗之高蹤殆非所謂光昭之美而欲以望太平是由曲表而求直影却行而求反前人惟陛下絶慢游之戲念官人之重割超越之恩愼貫魚之次以慰遐邇憤怨之望臣受恩偏厚特忝師傅之任不敢自同凡臣括囊解咎謹自手書早囊密上六年春正月辛丑大赦天下二月武庫東垣自壞夏鮮卑冦邉烏丸校尉夏育上言鮮卑仍犯塞百性怨苦自春以來三十餘人發請幽州諸郡兵出塞討之時故護羌校尉田晏以他事論刑因中常侍王甫求為將甫建議當出軍與育併力詔書遂用晏為鮮卑中郎將與胸奴中郎將臧旻南單于三道並出時大臣多以為不便議郎蔡雍議曰周有獫狁之役漢有瀚海之事征罰四夷所由來尚矣然而時有同異勢有可否不可一也天設山河秦築長城漢起塞垣所以分别內外異殊俗也其外則分之夷狄其內則任之良吏後嗣遵業順奉所守苟無戚國之幾豈與蟲蟻之虜校往來之所傷哉乃欲度塞出攻雖破之不可彌盡而本朝必為之旰食昔淮南王安諫伐越曰天子之兵有征無戰言其莫敢校也如使蒙死僥幸以逆執事厮養之卒有不備而歸者雖得越王之首猶為大漢羞之而育欲以齊民易醜虜射乾沒以要功就如其言猶己危矣况其得失不可知也昔朱提郡反孝元皇帝納賈捐之言割而棄之夫恤民救急雖成郡列縣猶尚棄之况鄣塞之外未嘗為民居者乎臣愚以為宜止出攻之計今諸郡修垣屯守衝要以堅牢不動為務若乃守邊之術李牧發其䇿嚴尤申其要遺業猶在文章具存循二子之䇿守先帝之規臣曰可矣育下邳淮浦人以忠直稱所歷皆有名迹八月鮮卑中郎將田晏胸奴中郎將臧旻護烏九校尉夏育各將步卒萬餘人擊鮮卑三軍敗績士馬死者萬數冬十月癸丑朔日有蝕之趙相以聞京師地震十一月太尉劉寬司空陳球以災異罷十二月太常孟郁為太尉太僕陳耽為司空司徒楊賜以辟黨人免光和元年春二月辛亥朔日有蝕之己未京師地震初置鴻都門生本頗以經學相招後諸能為尺牘詞賦及工書鳥篆者至數千人或出典州郡入為尚書侍中封賜侯爵三月癸丑光祿勳袁滂為司徒辛未大赦夏四月丙辰京師地震侍中寺雌雞一身皆成雄惟頭冠未變五月壬午無何白衣人入德陽門入自稱梁伯夏又復曰伯夏教我上殿為天子中黃門桓覽收之遂亡失不見蔡雍以為類之不恭則有雞禍頭為元首人君之象今雞一身巳變未至於頭而上知之是將有事而不遂之象又云成帝時男子王褒衣絳衣入宫上殿曰天帝令我居此後王莽篡位今與此成帝相似而𬒳服不同又未入雲龍門以往方今將有王氏之謀其事不成其後張角作亂尋𬒳誅滅是月太尉孟郁司空陳耽以災異罷太常袁豔為司空六月丁丑溫明殿庭中有黑氣長十餘丈形貌似龍詔問光祿楊賜議郎蔡雍曰祥異禍福吉凶所在以賜博學碩儒故密詔問宜極其意靡有所隱賜仰嘆曰臣每讀張禹傳何嘗不憤恚乎吾以微學充先師之末纍世見寵尚當上疏陳情况今猥見訪問乎乃手書對曰臣聞經傳所載或得神以興或得神以亡國家休明則降鍳其德邪辟昏亂則示其禍今嘉德殿所見黑氣考之經傳應虹霓妖邪之氣不正之象也春秋䜟曰天投虹霓天下怨海內亂加四百之期亦復垂至易曰天垂象見吉凶聖人則之疑妾媵之中有因愛放縱左右嬖人共專國朝欺罔日月又鴻都門下招會群小旬月之間並各拔擢縉紳之徒委伏畎畝冠履倒易陵谷代處從小人之邪意順無知之私欲殆哉之危莫過于今幸賴皇天垂象譴告周書曰天子見怪則修德唯陛下愼經典之誡圖變復之道斥逺佞巧之臣速徴鶴鳴之士內親張仲外任山甫抑止􅦼游留思庶政冀天還威衆變可彌老臣受師傅之任數蒙寵異之恩豈敢愛惜垂沒之年而不盡其慺慺之心哉雍對曰天于大漢殷勤不巳故屢出祅變讉責欲令人君感悟災眚之發不于它所逺則門垣近在寺署其為監戒可謂切至虹霓墮雌雞化皆婦人姦政之所致也自踐祚巳來中宫無他逸寵而乳母趙嬈貴重赫赫生則資冨侔於帑藏死則丘墓逾於園陵續為永樂門吏霍玉依阻城社大為姦猾侮惑之罪晚乃發露虹霓集庭雌雞變化豈不為此今者道路所言復云有程夫人者宜深以趙霍為戒近者不治無以正逺長水校尉趙玹屯騎校尉蓋延其貴巳足其富巳甚當以見私之故早自引身以解易傳小人在位之咎廷尉郭僖敦龎純厚國之老成光祿大夫橋玄聰逹方直有山甫之姿故太尉劉寵忠實守正剛直不曲宜為謀主數見訪問宰臣大臣君之四體不宜復聽納小吏雕琢大臣願陛下忍而絶之思惟萬機以答天望朝廷既自約厲左右亦宜從化天道惡滿鬼神好謙但臣愚戇感激忘身觸冒忌諱手書具對夫君臣不密上有漏言之禍願寢臣表無使臣筆所及者得佐陛下盡忠書奏趙玹程黃聞之共譖雍下獄當棄市中常侍吕強愍雍無罪從上請雍减死罪一等徙朔方遇赦還本郡秋八月有星孛于天市冬十月太尉張皓司空袁豔久病罷太常陳球為太尉射身校尉袁􅑮為司空十一月皇后宋氏廢后無寵宫人幸姬衆共譖訴誣后以呪咀上遂收后璽綬后以憂死父母兄弟皆𬒳誅諸常侍小黃門憐宋氏無辜乃共葬后及父母兄弟於臯門亭宋氏舊塋也丙子晦日有蝕之太尉陳球以災異罷十二月丁巳光祿勳橋玄為太尉是歲馬生人京房易傳曰上亡太子諸侯相伐厥妖馬生人二年春二月丁巳司徒袁滂以災異罷大鴻臚劉郡為司徒滂字公熙閎之孫也純素寡欲終不言人之短當權寵之盛或以同異致禍滂獨中立於朝故愛憎不及焉乙丑太尉槗玄司空袁逢久病罷太中大夫假潁為太尉太常張濟為司空橋玄字公祖梁國睢陽人初為梁州刺史值梁州大饑玄開倉以廪之主者以舊典宜先表聞玄曰民以死矣廪訖乃上奏詔書以玄有汲黯憂民之心復不得以為常玄有才明長於知人初見魏武帝於凡庸之中玄甚異之謂曰今天下將亂非命世之才不能定也定天下者其在君乎夏四月丙戌日有蝕之辛巳太尉假潁有罪下獄誅初黃門令王甫大長秋曹節專權任勢潁阿附甫等尚書令楊球撫髀歎曰使球為司隸此等何得爾俄而球為司隸既拜明日詣闕謝恩會甫沐下舍球因奏曰中常侍冠軍將軍王甫奉職多邪姦以事上其所彈紏皆由睚眦勃海之誅宋后之廢甫之罪也太尉假潁以征伐微功位極人臣不能竭忠報國而諂佞幸宜並誅戮以示海內於是收潁甫下獄球親考之甫子萌先為司隸遷永樂少府亦併見收萌謂球曰父子今當伏誅亦以先後之義少假借老父球罵萌曰若以權勢為官無忠等者司隸云以先後之義乎萌曰若臨於坑相濟憂汝獨不見隨吾後死邪於是球操捶杖之甫萌皆前死杖下球勑都官從事曰先舉權貴大猾乃議其餘耳公卿豪右若袁氏兒輩從事自辨之何須校尉邪於是權門股栗京師肅然球既誅甫後欲收曹節節等不敢出沐會順帝虞貴人葬百寮會葬還入夏城門曹節見謁於道旁球大罵曰賊臣曹節節收淚於車中曰我自相食肉何宜使犬䑛其汁乎語諸常侍且便入省勿過里舍也節入譖球酷暴益甚不為百姓所安上乃徙球為衛尉球叩頭自陳曰臣無清高之行橫蒙犬鷹之任前誅常侍王甫太尉假潁皆狐狸小醜未足以宣示天下今鴟梟翔於園林豺狼噬於圉藪臣誠耻之願追詔書叩頭殿下上呵曰衛尉拒詔邪至于再三乃受丁酉大赦天下秋七月胸奴中郎將純修擅收斬單于呼演更立右賢王羌深為單于修抵罪冬十月永樂少府陳球下獄死𥘉球與司徒劉邵書曰公出自宗室據台鼎之位天下所望今曹節等放縱為天下害而久今在左右賢兄侍中常為節所害可表從尚書令楊球為司隸以收節等誅之政出聖主天下太平可翹足而待楊球小妻程黃女黃宫中用事所謂程夫人也節等頗聞知乃重賂黃且迫脅之惶怖告節等以球謀因與節讒邵於上曰邵等常與陳竇交通又受取狼籍步兵校尉劉納永樂少府陳球交通並通謀議上大怒䇿邵陳球楊球劉納皆下獄死楊球字方正漁陽泉州人有勇氣郡吏嘗辱球母球合年少數十人殺吏滅其家由是知名九江山賊起劫刺史球以太尉掾為九江太守設方略即時摧破誅鋤豪強郡中纍足遷甘陵相時天下旱司空張皓奏郡守長吏嚴酷貪汗者皆罷免之球以嚴酷徴詔書以九江時功拜議郎遷將作大匠尚書令十一月太常楊賜為司徒三年春正月癸丑大赦天下夏虎見平樂觀下又見憲陵上詔問司徒楊賜賜對曰虎者金行參代之精狼戾之獸也今在位率多奢暴貪殘酷虐乎中郎將張均上言曰虎見憲陵又見平樂觀下隸皆訛言也洪範之論言之不從則毛蟲之孽虎者西方之獸為禽剛猛強梁之物也居而穴處不可覩見今於先帝園陵為害又言見於城下皆在位者仁恩不著有苛尅殺戮之意乎此乃大兵劇賊之徵不可不防也秋七月大長秋曹節為車騎將軍九月辛酉日有蝕之詔羣臣上封事靡有所諱郎中審忠上書曰臣聞治國之要得賢則安失賢則危故舜有五臣天下治湯舉伊尹不仁者逺故太傅蕃尚書令尹勳知中官姦亂考其黨與華容侯朱瑀知事覺露禍及其身乃與造逆謀迫脅陛下聚會羣臣因共割裂城社以相賞父子兄弟𬒳蒙尊榮素所親厚布在州郡皮剝小民甚於狼虎多畜財貨繕治殿舍車馬服飾擬於大家羣公卿士杜口吞聲州郡承風順指故蟲蝗為之生夷狄為之起天意憤盈積十餘年矣故頻年日有蝕之於上地震於下所以譴戒人主欲令覺悟今瑀等並在左右陛下春秋富盛懼惑佞諂以作不軌願陛下留漏刻之聽以省臣表掃滅醜類以答天怒章寢有星孛于狼狐初作靈泉單圭苑司徒楊賜上書曰臣聞使者並出規度城南民田欲以為菀者昔先王制囿裁足取牲以備三驅薪採芻牧者往焉故詩曰王在靈囿􅝤鹿攸伏傳曰吾王不游吾何以休皆𬒳其德政而樂何為如此是六國之際取獸者有罪傷槐者𬒳誅孟軻謂梁惠王極陳其事先帝之制左開洪池右作上林不儉不泰禮以合中今猥規都城之側以畜禽獸之物非所保養民庶赤子之義築郎不時春秋有譏盤于游田周公作戒具城外之苑以有五六足用逞情意順四節何必變革舊制以罷民力楚興章華郢人乖叛秦作阿房黎氓憤怨宜思夏后卑室之意太宗露臺之費慰此下民勞止之歌上欲止侍中任芝樂松等曰昔宣王囿五十里民以為大文王百里民以為小今造二菀與百姓共之不妨於政民蒙其澤上遂從之閏月司徒楊賜久病罷冬十月太常陳耽為司徒十一月立皇后何氏南陽苑人以良家子選入掖庭有寵自貴人為皇后父真早卒異母兄進為河南尹進弟苗越騎校尉十二月車騎將軍曹節罷四年春初置騄驥廏丞領受郡國調馬而豪右辜榷馬一匹至二百萬夏四月庚午大赦天下司徒陳耽不堪其任罷太常袁隗為司徒六月追爵諡皇后父何真為車騎將軍舞陽宣懷侯秋七月五色鳥見于新城衆鳥隨之民謂之鳯皇九月庚寅朔日有蝕之冬十月太尉許郁辟召錯謬罷太常楊賜為太尉車駕幸廣城是歲於後宫與人為列肆販買使相偷盜爭著進賢冠又於西園駕四驢上躬自操轡馳驅周旋以為歡樂於是公卿貴戚轉相放效至乘輜軿以為騎從牙相請奪驢價與馬齊本志曰行天者莫如龍行地者莫如馬詩云四牡騤騤載是常服驢乃服重致逺野人之所用非帝王君子之所宜驂服遲鈍之蓄而今貴之天意若曰國且大亂賢愚倒植執政者皆如驢也五年春正月辛未大赦天下二月大疫三月詔三公以謡言舉刺史二千石貪汙濁穢為蠧害者夏旱五月庚申永樂宫署災秋七月星孛于太微六年春三月辛未大赦天下夏爵號皇后母為舞陽君秋金城河水溢出二十餘里中平元年春正月巨鹿人張角謀反初角弟良弟寶自稱大醫事善道疾病者輒跪拜首過病者頗愈轉相䛘耀十餘年間弟子數十萬人周遍天下置三十六坊各有所主期三月五日起兵同時俱發角弟子濟隂人唐客上書告角天子遣使者捕角角等知事巳露因晨夜勑諸坊促令起兵二月角等皆舉兵往往屯聚數十百輩大者萬餘人小者六七千人州郡倉卒失據二千石長吏皆棄城遁走京師振動角黨皆著黃巾故天下號曰黃巾賊初司徒楊賜衛尉劉寬司空張濟御史劉陶並陳角反謀宜時捕討以絶亂原上不從及角作亂天子思陶言封為中陵侯陶字子竒潁川潁隂人沈勇有大謀不修威儀不拘小節與人交志好不同雖富貴不顧也所行齊趣雖貧賤必尊貴之疾惡太甚以此見憎辟司徒府遷尚書侍中以數直諫為權臣所惡徙為京兆尹上素重陶才徴為諫議大夫諸中官讒陶與張角通情上遂疑之收陶考黃門北寺中官諷考楚毒極至陶對使者曰朝廷前封臣云何不恆其德反用佞邪之譖臣恨不與伊吕同儔而與三人同輩今上殺忠謇之臣下有憔悴之民亦在不久然後悔於冤臣將復何逮不食而死三月戊申河南尹何進為大將軍帥師次于都亭自函谷伊闕大谷轘轅盟津皆置都尉備張角也於是考諸與角連及官省左右死者數千人上內憂黃巾問掖庭令吕強何以靜冦對曰誅左右姦猾者中常侍丁肅徐演李延趙𥙿郭耽朝廷五人號為忠清誠可任用赦黨人簡選舉何憂於賊上納其言壬子大赦黨人皆除之強字漢盛河南成臯人忠貞奉公不與佞幸同是時權邪怙寵政以賄成郡國貢獻皆先饋賂然後得行左右羣臣好上私禮強諫曰陛下物出天下然而所輸之府輒有導行之財皆出於民今發十而貢一費多而獻少無為使姦吏用巧私門致富也又阿媚之臣好獻其私容諂姑息進入其所奉獻皆御府所有無為使從諫之臣得自媟黷也舊選舉委任三府尚書受奏御而巳各受試用責以成功功無可察以事付尚書尚書乃覆案虛實行其罪罰於是三公每有所選參議掾屬咨其行狀度其器能然猶有職廢官荒穢不治今但任尚書或有詔用三公得免選舉之負尚書又無考課之勤陛下虛自勞苦有廢亂之負無所責也書奏上以示中常侍夏惲趙忠忠惲曰此言是也然強自負清潔常快快有外心及赦黨人中官疾之於是諸常侍人人求退忠惲共構㑹強云與黨人謀數讀霍光傳強兄弟所在亦皆貪穢上聞強讀霍光傳意不恱使中黃門持兵召強強聞上召怒曰吾死亂兵起矣大丈夫欲書忠國史無為復對獄吏也遂自殺詔公卿百官出馬弩各有差中郎將盧植左中郎將皇甫嵩右中郎將朱雋各持節征黃巾護軍司馬傅燮討賊形勢燮上書諫曰臣聞天下之禍所由於外皆興於內是故虞舜升朝先除四凶然後用十六相明惡人不去則善人無由進張角起於趙魏黃巾亂於六州此皆釁發蕭牆而禍延四海臣受戎任奉辭伐罪始到潁川戰無不尅黃巾雖遏其釁由內作耳陛下仁德寬容多所不忍中官弄權忠臣之憂愈深耳何者夫邪正之在國猶氷炭不可同器而並存也彼知正人之功顯而危亡之兆見皆將巧詞飾說共長虛僞孝子疑於屢至市虎惑於三人陛下不詳察之臣恐白起復賜死於杜郵而盡節效命之臣無所陳其忠矣唯陛下察虞舜四罪之舉使讒佞受放殛之罰萬國知邪臣之為誅首忠正時得竭其誠則善人思進姦凶不討而自滅矣臣聞忠臣之事君猶孝子之事父子之事父焉得不盡情以言使臣伏鐵鉞之戮陛下少用其言國之福也書奏中常侍趙忠見而怨焉夏四月太尉楊賜以冦賊罷太僕鄧盛為太尉司空張濟久病免大司農張溫為司空初賣官自關內侯以下至虎賁羽林入錢各有差皇甫嵩朱雋連戰失利遣騎都尉曹操將兵助嵩等五月乙卯黃巾馬元義等於京都謀反皆伏誅皇甫嵩朱雋擊黃巾波才於潁川大破之斬首數萬級詔行車騎將軍封都鄉侯雋西鄉侯於是傅燮功多應封為趙忠所譖上識燮不罪之然不得封左中郎將盧植征張角不剋徵詣廷尉減死罪一等中郎將董卓代植既受命纍破黃巾角等保廣宗植圍塹修梯垂當拔之上遣小黃門左豐觀賊形勢或勸植以賂送豐植不從豐言於上曰廣宗賊易破耳盧中郎固壘息軍以待天誅上怒植遂抵罪六月中郎將張均上書曰張角所以能興兵作亂萬民樂附之者原皆由十常侍多放父子兄弟婚親賔客典據州郡辜榷財利侵冤百姓百姓之冤無告訴因起從角學道謀議不軌相聚為賊今悉斬十常侍懸其頭於南郊以謝天下即兵自消可一戰而克也上以章示十常侍皆免冠頓首乞自致雒陽獄家財助軍糧子弟為前鋒上曰此則直狂子也十常侍內有一人不善者耳天子使御史考諸為角道者御史奏均學黃巾道收均死獄中秋八月皇甫嵩擊黃巾卜巳於東郡大破之斬首萬餘級中郎將董卓征張角不克徴詣廷尉減死罪一等以皇甫嵩代之朱雋攻黃巾趙弘於南陽自六月至八月不拔有司奏徴雋司空張溫議曰昔秦用白起無信樂毅亦曠歷年載乃能剋敵雋討潁川有效引師南指方略巳設臨軍易將兵家所忌可以少假日月責其功效上從之詔切責雋雋懼誅乃急擊弘大破斬之封雋上虞侯賊復以韓忠為帥衆號十萬據宛拒雋雋兵力不敵然欲急攻乃先結壘起土山以臨之因僞修攻具耀兵於西南雋身自𬒳甲將精卒乘其東北遂得入城忠乞降議郎蔡雍司馬張超皆欲聽之雋曰兵有形同而勢異者昔秦項之際民無定主故有賞以勸來者今海內一統惟黃巾造冦降之無可勸罰之足以懲惡今若受之更開逆意利則進戰鈍則降服縱敵長冦非良計也因勒兵攻之連戰不剋雋登土山望之顧謂雍曰吾知之矣今外圍周固內營逼急忠故乞降降又不受所以死戰也萬人同心猶不可當况十萬人乎其害多矣不如徹圍解弛勢當自出出則意散必易破之即解圍入城忠果自出雋因自擊之大破斬忠乘勝逐北斬首萬餘級即拜雋為車騎將軍封錢唐侯徴入為光祿大夫冬十月皇甫嵩攻張角弟良於廣宗大破之斬首數萬級角先病死破棺戮尸拜嵩為車騎將軍封槐里侯嵩既破黃巾威振天下故信都令漢陽閻忠說嵩曰夫難得而易失者時也時至而不旋踵者機也故聖人常順時而動智者必見機而發今將軍遭難得之時蹈之而不發將何以權大名乎嵩曰何謂也忠曰天道無親百姓與能故有高人之功者不受庸主之賞今將軍受鈇鉞於暮春收成功於末秋兵動若神謀不再計攻堅易於折枯摧敵甚於湯雪旬月之間神兵電掃封戶刻石南靣以報威振本朝聲馳海外是以羣雄回首百姓企踵雖湯武之舉未有高將軍者也身立高人之功乃北靣以事庸主何以圖安也嵩曰夙夜在公心不忘忠何故不安忠曰不然昔韓信不忍一餐之遇棄三分之利拒蒯通之說忽鼎峙之勢利劒揣其喉乃嘆息而悔何以見烹於女子也今主勢弱於劉項將軍權重於淮隂指麾足以震風雨叱咤足以興雷電赫然奮發因危抵頽崇恩以綏前附振武以臨後伏徴冀方之士勒七州之衆羽檄先馳於前大軍嚮振於後蹈流漳河飲馬盟津誅中官之罪除羣怨之積如此則無交兵守無堅城不招必影從雖童兒可使奮空拳以致力女子可使褰裳以用命况厲熊羆之卒因迅風之勢哉功業巳就天下巳順乃請呼上帝喻以大命混齊六合南靣稱制移神器於將興推亡漢於巳墜實神機之至會風發之良時夫既朽不雕衰世難佐將軍雖欲委忠於難佐之朝雕朽敗之木猶逆坂走丸必不可得也方今權官羣居同惡如市上不自由政出左右庸主之下難以久居不賞之功讒人側目如不早圖後悔無及嵩懼曰黃巾小孽非秦項之敵也新結易散非我功䇿之能民未忘主而子欲逆求之是虛造不冀之功以速朝夕之禍非移祚之時也孰與委忠本朝雖有多讒不過放廢猶有令名死且不朽逆節之論吾所不敢也忠知計不用乃佯狂為巫十一月嵩又進兵擊張寶於下曲陽斬之於是黃巾悉破其餘州所誅一郡數千人十二月金城人邊章韓約反後漢孝靈皇帝紀中卷第二十四
