body:
  text: 後漢光武皇帝紀卷第六袁宏七年春正月丙申詔天下繫囚非殊死者切勿治是時海内新安民得休􅒚皆樂吏職而勸農桑風俗和同人自修飾上惟王莽僞薄之化思有以改其弊於是黜虗華進淳朴聽言觀行明試以功名實不相冐而能否彰矣又念前世園陵太盛王侯吏人轉相倣競乃下詔曰世俗不以厚薄爲鄙陋富者過奢貧者殫財刑法不能禁禮儀不能止倉卒以來乃知其咎布告天下令知忠臣孝子薄葬送終之義癸亥晦日有蝕之詔曰隂陽䥘謬日月薄蝕百姓有過在予一人其赦天下公卿百寮各上封事無有所諱舉賢良方正各一人於是馮衍上書陳事一曰顯文德二曰褒武烈三曰修舊功四曰招俊傑五曰明好惡六曰簡法令七曰差禄秩八曰撫邉境書奏上將召見之後以䜛不得入袁宏曰夫讒之爲害天下之患也闇主則理固然矣賢君而讒言不絕者豈不哀哉夫人君之情不能不形於外夫好惡是非之情形於外則愛憎毁譽之變應於事矣故因其所好而進之因其所惡而退之因其所是而美之因其所非而疾之惡而於無嫌之地而人主不必悟者讒人之所資也夫讒人之心非專在傷物處之不以忠信其言多害也何以知其然夫欲合主之情必務求其所欲所惡者一人所害者萬物故其毁傷不亦衆乎若夫聲色喜怒之際虗實利害之間以微售其言焉可數哉是以古之明君知視聽之所屬不能不關於物也知一巳之明不能不滯於情也求忠信之人而置之左右故好惡是非之情未嘗宣於外而愛憎毀譽之言無由而至矣二月癸亥晦日有蝕之是時宰相多以功舉官人率由舊恩天子勤吏治俗頗奇刻因是變也太中大夫鄭興上疏曰臣聞國無政不用善則取謫于日月之災故政不可不慎也其道務三而巳一曰擇人二曰因民三曰從時此應變之要也昔在帝堯洪水滔天帝求俾乂嶽曰鯀哉帝知鯀不可然猶屈巳之是從嶽之非重違衆也昔齊桓公避亂於莒鮑叔從焉旣反國鮑叔舉管仲桓公從之遂立九合之功晉文公奔翟從者五人旣得晉國將謀元帥趙衰以郄縠爲閱禮樂敦詩書使將中軍而五子下之故能伏強楚於城濮納天子於王城今袞職有闕朝論輒議功臣功臣用則鮑趙之舉息矣願陛下上師陶唐下覽齊晉以成屈巳從衆之德以濟群臣舉善之美臣聞上竭聦明則下懼其罪故日者君象也月者臣象也君威亢急則臣道迫促願陛下留神寬恕以崇柔克之德不從興字少贛河南開封人嘗從劉歆學講議歆美其才學者皆師之興旣之凉州坐事免㑹赤眉作亂東道不通興乃歸隗囂囂貳於漢興毎匡諌言辭懇至囂雖内不能悅而外相崇禮興求歸葬父母囂不聽而徙舎益禄興見囂曰昔嘗同僚故歸骸骨非敢爲用也求爲先人遺類耳幸蒙覆載得自保全今乞骸骨而徙舎益禄興聞事親之道生事之以禮死葬之以禮祭之以禮奉以周旋不敢失墜今爲父母乞身得益禄而止是以父母爲請也無禮甚矣將軍焉用之囂曰幸甚乃爲辦裝使與妻子俱上聞興歸徴爲太中大夫光禄勲杜林上書薦興曰執義堅固敦於詩書好古博物見疑不惑宜侍帷幄以益萬分於是敬異焉毎朝有大議輒訪問興上嘗以郊祀事問曰欲以䜟決之何如興對曰臣不爲䜟上怒曰卿不言䜟非之邪興曰臣於書有所未學而無敢非上乃解曰言不當若是邪興數言事文辭温雅然以不合㫖又不善䜟故不得親用有子曰衆以才學知名其後皇太子及山陽王因虎賁將梁松束帛聘衆衆謂松曰太子儲君無外交之義漢有舊制蕃王不得私通賔客遂辭不受松曰長者意不可逆也衆曰犯禁得罪不如守正而死太子及王聞之嘉而不強及梁氏敗賔客多坐之衆不染於辭夏五月前將軍李通爲大司空秋隗囂遣歩騎三萬侵三輔耿弇遣數百騎與戰爲囂所破囂將分兵取栒邑馮異聞之馳據其城諸將皆曰虜兵乗勝不可爭鋒異曰若虜得栒邑則三輔動矣攻者不足守者有餘今先據栒邑以逸待勞非所謂爭鋒也遂馳入栒邑閉城偃旗皷囂將不知直來攻城異擊皷建旗成列而出囂軍亂遁異大破之追奔數十里於是北地諸豪帥相率而降諸將多有言功者異獨黙然上璽書勞異曰栒邑孤危亡在旦夕諸將狐疑莫有先發將軍獨决竒筭摧敵殄冦功如丘山猶若不足雖孟反後入無以過也今遣太中大夫賫毉藥殯殮之具以賜吏士其死傷者大司馬巳下親弔問之以崇謙讓於是三軍之士莫不感悅袁宏曰謙尊而光於是信矣馮異能讓三軍賴之善乎王之言謙也楊朱有言行賢而去自賢之心無所往而不美因斯以談聖莫盛於唐虞賢莫高於顏回虞書數德以克讓爲首仲尼稱顔回之仁以不伐爲先郄至矜善兵在其頸處父上人終䘮其族然則克讓不伐者聖賢之上美矜善上人者小人之惡行也司馬法曰苟不伐則無求無求則不争不争則不相掩由此言之民之所以和下之所以順功之所以成名之所以立者皆好乎能讓而不自賢矣夫人君者必量材任以授官參善惡以毀譽課功過以賞罰者也士苟自賢必貴其身雖官當才斯賤之矣苟矜其功必蒙其過雖賞當事斯薄之矣苟伐其善必忘其惡雖譽當名斯少之矣於是怨責之情必存於心希望之氣必形於色此矜伐之士自賢之人所以爲薄而先王甚惡之者也君子則不然勞而不伐施而不德致恭以存其德下人以隱其功處不避汙官不辭卑唯懼不任唯患不能故力有餘而智不屈身遠咎悔而行成名立也且天道害盈而鬼神福謙凢有血氣必有爭心功之高者自伐之責起焉故宋公三命考父傴僂晉帥有功士爕後歸孟側殿軍筞馬而入三卿謀冦冉有不對其所以降身匿迹如此之甚也何誠知民惡其上衆不可蓋也夫逆旅之妾惡者自以爲惡主忘其惡而貴焉美者自以爲美主忘其美而賤焉夫色之美惡定於妾之面美惡之情變於主之心况君子之人有善不敢識有過不敢忘者乎其爲美亦以弘矣故揚子之言足師逆旅之妾足誡也八年春正月來歙自陽城將二千人斬山開道徑至畧陽襲囂將金梁等殺之因保其城上聞之喜甚左右怪上數破大敵今得小城何足以喜上以畧陽囂之所阻腹心巳壞則制其支體先是呉漢諸將在長安者兵雖盛以梁屯守不得上隴及梁死歙㩀畧陽乃爭馳赴之上以爲囂失所恃矣亡其要城勢必悉以精銳來攻曠日久圍而城不拔士卒頓弊乃可乗危而進皆追漢等還囂果自將數萬人攻略陽激水灌城晝夜攻歙歙率勵吏士同心固守數月不㧞囂衆疲弊夏閏四月上西征至漆議者以爲車駕不宜入險且遣諸將觀虗實議未定㑹馬援夜至勸上曰囂衆瓦解兵進必破以米爲山谷於上前指衆軍所入處上笑曰虜在吾目中矣車駕遂進竇融與五郡太守將歩騎數萬輜重五千两與上㑹第一上置酒引見融等待以殊禮囂衆大潰城邑皆降囂將妻子保西州呉漢岑彭引兵追守之囂將王元入蜀上嘉融功以四縣封融爲安豐侯融弟友爲顯親侯於是以次封笁曾爲助義侯梁綂爲歸義侯史苞爲褒義侯厙均爲輔義侯辛彤爲扶義侯旣而皆遣還西融兄弟竝受爵位久專方面懼不自安數上書求代上不許蜀人聞隗囂敗百姓震動成都郭外有秦時舊倉王莽以來常空公孫述乃詐使人言下倉出穀積如山陵百姓空市廛往觀之述乃㑹百官問曰下倉竟出榖乎對曰無有述曰言隗王敗亦復如此矣欲以此安衆心者也蜀人荆邯說述曰兵者帝王之大器古今所不能廢也昔秦失其政豪傑竝起漢祖無前人之遺迹立錐之地起於行陣之間身自奮擊與項羽戰小大百餘軍破身困者數矣然猶不止故軍敗復合創愈復往何則前死成功愈於就滅亡也隗囂遭遇運㑹割有雍州兵強士附威加山東時漢更始復失天下衆心引領四方瓦解囂不及此時以爭天命而退欲爲西伯之事尊師章句賔友處士偃武息兵卑辭事漢喟然自以爲文王復生也今漢帝釋西顧之憂專精東伐四分天下而有其三則西州豪俊咸居心於山東間使相聞至於五分而有其四則舉兵伐之遂以屠潰是則然矣若天水巳平漢九分天下而有其八陛下以梁州之地内奉萬乗外給三軍百姓愁困不堪上命將有王氏自潰之變臣之愚計以爲宜與漢和親不者當及天下之望未絕豪傑尚可驅動急以時悉發國内精兵令田戎據江陵臨江南之㑹築壁堅守傳檄呉楚則長沙以南必隨風而靡令延岑出漢中定三輔天水隴西拱手自得如此海内震揺兾有大利也述欲從其言蜀人及述兄弟以爲不可述遂止延岑等數請兵願立功終疑而不聽由是皆怨唯公孫氏任政述性酷急數誅殺察於小事如治清水而巳少爲郞習漢家制度出入法駕鸞旗旄騎置陳陛㦸輦出房闥又立其兩子爲王食犍爲廣漢各數縣或諫曰成敗未可知戎士暴露而王愛子示無大志述不勝情卒皆王之穎川盗賊起京都騷動秋八月上還洛陽謂執金吾冦恂曰卿著威信於頴川獨卿能平之從九卿復爲二千石以憂國可也恂對曰頴川聞陛下西征以爲隴蜀未定故狂狡乗間相詿誤耳如陛下升輿南面臣願執銳在前賊必惶恐歸死即日車駕南轅至頴川盗賊悉降百姓遮道曰願從陛下復借冦君一年上乃留恂頴川撫吏民受餘降冬十一月公孫述將救囂乗高卒至漢兵未及陣囂得逃出入冀漢軍食盡呉漢岑彭燒輜重歸長安天水諸縣復反爲囂十二月髙句麗王遣使奉貢東郡濟隂盗賊起大司空李通橫野將軍王常率舟師擊之上以耿純威信著於衞地即拜純爲太中大夫與兵㑹於東郡東郡聞純入界盗賊九千餘人降兵不戰而還璽書復以純爲東郡太守九年春正月征虜將軍祭遵薨遵忠藎廉潔毀巳財爲國賞賜皆以賑吏士身寢布被妻子惡衣食上以是重焉雖在軍旅其所進禮皆儒術之士讌㑹遊處必雅歌投壺遵䘮至河南詔遣百官詣䘮所上乃素服臨之望城舉音哀慟左右旣還復幸城門過其車騎涕泣不能巳詔河南尹護䘮事大司農給其費䘮禮成復臨祠以太牢如孝宣帝臨霍光故事贈以將軍侯印綬諡曰威侯賜朱輪容車介士遵引旣葬車駕復親臨墳墓問其室家上歎曰安得憂國奉公之臣如祭征虜者乎衞尉銚期進曰陛下念祭遵不巳羣臣皆内懷慙懼遵之見思若此是春隗囂病死囂將皆降唯髙峻不下峻嘗降漢巳復歸囂故懼誅不降立囂小子純初王莽末天水童謡曰出呉門望緹雲見一蹇人言欲上天令可上地安得民囂少病蹇呉門者即冀郭門也來歙說上曰隗囂雖死西州未平公孫述以隴西天水爲蕃蔽故得延其軀命如二郡旣平則述計窮矣昔趙以賈人爲將高祖懸以重賞今隴右新破百姓饑饉可以利動時也宜益資軍實以誘未附令誠知國用不足民勞於内然天下未定不得休息上從之於是糧糓器物不絕於道冬來歙馮異入天水破述將王匡田弇諸縣悉降自王莽末西羌冦隴西金城入塞内隗囂不能討因撫集以爲強歙奏言非馬援莫能定乃以援爲隴西太守援至擊先零大破之降者萬餘人援上疏曰亢吾以西數十里一城城皆完堅舊制置塞因山阻毎其蹊徑輒有侯尉故虜不得妄動即棄亢吾以西北爲殖養虜根内自迫促宜及兵威疾往除之金城諸縣皆田地肥美漑灌流通自有本民易還充實誠不宜有所斷棄若二郡平定流民還本業不復爲國家憂於是詔竇融悉還金城客民三千餘戶援爲置長吏繕治城郭起塢候勸耕田郡未樂業羌虜悉降援以郡新復務開寛信舉大體而已賔客故人滿門下諸曹時白事輒曰此丞掾之任何足相煩若大姓侵小民黠羌不從令此乃太守事耳旁縣嘗有報怨者吏民驚言羌反百姓奔城郭狄道長請閉城門發兵援時方與賔客飲大笑曰羌虜何敢復犯我曉狄道長令歸寺良怖急者各牀下伏後稍定郡中乃服三月封楚王子般爲菑丘侯頃之徙封杼秋侯上幸沛詔問郡中諸侯有事行者太守言般至行爲諸侯師天子嘉之恩禮甚厚呉漢王霸諸將征劉芳於高柳匈奴救芳漢兵不利引軍還璽書以霸爲上谷太守十年夏征西大將軍馮異攻洛門未下薨諡曰節侯異謙退不伐毎軍行止舍諸將争功異嘗屏處大樹下軍中號爲大樹將軍上嘗分諸營吏士問曰屬誰營邪皆曰願屬大樹將軍上以此重之非合戰受敵異嘗處衆營後與諸將相逢引車避之士卒不得争功進止皆有旗幟號爲嚴整子彰嗣上追思異功封小子訢爲祈鄊侯秋八月己卯幸長安祠高祖廟上將討高峻冦恂諌曰車駕止長安隴西足以震懼且去關東不遠此從容一處而制四方今士馬勞倦遠履險阻非萬乗之固也前年頴川之役可以爲戒上不從進及汧高峻不降上謂恂曰公前止吾今爲吾行矣恂至第一峻遣軍師皇甫文詣恂辭禮不屈恂怒將斬之諸將曰高峻兵精今欲降之而斬其使不可恂遂斬之遣其副歸峻即日開城與隗純等降諸將皆賀因曰敢問殺其軍師何以反降恂曰皇甫文峻之腹心所取也今來觀望其意不屈是不欲降殺之峻亡其半以是動心故知其必降諸將皆曰非所及也峻與諸隗徙關東頃之隗純將數十騎亡入匈奴追斬之呉漢王霸擊劉芳芳將胡騎㑹平城下連戰大破之是時芳與匈奴連兵烏丸數爲冦盗縁邉愁苦霸乃築塢候起亭郼自代郡至平城三百餘里霸數上書言邉事宜與匈奴和親又言委輸可從温水以省陸轉之勞後皆施行霸愛士卒死者解衣以歛之傷者輟食以哺之在上谷二十餘年與匈奴數十百戰士卒皆爭爲効力是嵗執金吾冦恂衞尉銚期薨恂居九卿位饗大國租皆以施朋友賑給故人常曰吾所以自至於此者士大夫之力也可不共乎恂學行竝修名重朝廷議者稱其有宰相器㑹恂早薨莫不痛惜諡曰威侯恂兄弟及兄子姊子以軍功侯者八人恂數言閔業之忠上以爲關内侯官至遼西太守袁宏曰夫世之所患患時之無才也雖有其才患主之不知也主旣知之患任之不盡也彼三患者古今之同而御世之所難也觀冦恂之才足居内外之任雖蹔撫河内再綏頴川未足展其所能也及在汝南延儒生受左氏何其閑也晚節從容不得預於治體夫以世祖之明如冦生之智能猶不得自盡於時況庸主乎期爲將嘗先登䧟陣手自斬獲軍毎不利賴期得振者甚數爲人重信義雖破邑降城未嘗虜掠在朝見不善必犯主之顔上嘗與期門近出期頓首車前曰臣聞古今之戒變生不意臣誠不願陛下微行數出天子爲之迴輿期疾病其毋問嗣者期曰受國重恩常懷慙負若死不知何以報國何議嗣乎上親自臨襚諡曰忠侯十一年春三月巳酉上幸南陽過章陵祠園廟初公孫述遣大司徒任滿翼江王田戎將數萬人據荆門浮橋橫江以絕水道營壘跨山以塞陸路上遣呉漢岑彭臧宮將六萬兵擊荆門詔岑彭曰大司馬習用騎兵不曉水戰荆門之事一由征南而巳閏月呉漢岑彭率師攻之時天東風吹舩逆流直衝浮橋因放火燒之風怒火盛短兵接戰蜀兵驚怖大軍遂順風並進所擊無前任滿溺死者數千人田戎退保江州岑彭遂長驅入江關令兵無得鹵掠所過不受牛酒見耆老陳漢恩德百姓無不欣恱開門請降呉漢臧宮自後而進六月來歙葢延入武都攻述將王元破之乗勝遂進蜀人震恐遣刺客刺歙刀未出歙召蓋延延至見歙涕泣不能仰視歙叱延曰虎牙何以敢爾今使者中刺客無以報國故呼巨卿欲相屬以軍事而反効兒女子啼泣乎刀雖在身不能勒兵斬卿邪延拭淚具受所勑辭畢抽刀而卒立聞之悼痛無巳贈中郞將印綬諡曰節侯喪還洛陽車駕臨弔送葬哀慟㱆欷所褒顯賞賜甚厚長子褒嗣上嘉歙忠節封歙弟由爲宜西侯歙爲人信厚言行不相違雖銜命數年出以喻囂然徃來之言皆可復也上之臨喪趙玉良與張邯相逢城門中道迫狹叱邯旋車頃良怒召門候岑遵困辱之司􅘗校尉鮑永奏良大不敬良尊重莫貳上雖不從而羣臣嚴憚焉永辟平陵人鮑恢爲都官從事恢亦抗直不避強禦詔曰貴戚且歛手以避二鮑其見重如此永字君長上黨屯留人父宣守正不虧爲王莽所誅莽欲滅其子孫上黨都尉路平承㫖欲害永太守苟諌嘉宣忠節置永府中護全之永數爲諫陳安漢室禽姧臣之策諌戒永曰機事不密則害生禍倚人門㑹諌喪路平復收永弟升㑹新太守趙興至歎曰我受漢茅土不能致身立節鮑宣之死豈可害其子邪勑縣出升復召永爲功曹時有稱侍中止傳舍者興欲出謁永以爲非真不宜興遂駕徃永當州門㧞佩刀截鞅興爲還車數日詔書下捕之果矯稱使者由是知名自魯郡太守爲司隷行縣至霸陵過更始塜引車將下從事諌止之永曰北面事人忍不過其墓雖以獲罪司􅘗不避也遂下車盡哀至右扶風上苟諫冡上曰奉使如此可乎太中大夫張湛對曰仁者百行之宗忠者禮義之主仁不遺舊忠不忘君行之髙者也上悅𥘉雲陽人宣秉字巨卿爲御史中丞遷司隷校尉務舉大體闊畧微細其政嚴而不苛百僚亦敬憚之上幸其府見秉布被瓦器食則魚飡歎曰雖楚之二龔不能過也即賜幃帳器物拜爲司徒司直俸禄皆以分九族家無擔石之儲東海王良字仲子亦爲司徒司直行大司徒事居貧守約妻子不之官司徒掾鮑恢嘗以事至蘭陵過良家見一婦人負柴而入不知是良妻也恢謂曰我司徒掾也將歸京師夫人得無有書乎婦人曰苦掾無書旣而問焉乃良之妻也恢歎息而去故良之清貧聞於天下良謝病歸天子備禮徴不得已載病至京師道過友人友人闔門不内曰不有忠言竒謨以取大位是無其德也曷爲徃來屑屑不憚煩邪謝而不見良遂稱病篤而歸終身不起冬岑彭以江州城固而粮多留馮俊守之彭引軍從涪江擊平曲述遣汝寧王延岑大司空公孫恢將軍王元距廣漢大司徒侯丹距黄石彭令臧宫擊岑等自泝都江擊侯丹破之時岑等盛兵沆水官兵則千餘人降附者四五萬口軍食不足蜀民各堅壁觀形勢宫欲還恐爲虜所制㑹謁者將數百兵詣岑彭宮乃矯制取謁者兵踈行陣而多旗皷蜀人聞漢兵卒至登山望之旌旗滿谷呼聲動山莫不震懼宫因其懼縱兵大破之斬公孫恢死者萬餘人王元降即遂乗勝而前所至皆降岑彭旣破侯丹晨夜兼行二千餘里徑赴武陽别遣精騎馳廣都去成都數十里所至皆奔散遂大驚以杖擊地曰是何神也彭所營地名彭亡彭惡之欲徙㑹日暮其夜蜀遣刺客刺彭彭死彭首破荆門長驅武陽將兵齊整爲巴蜀所稱百姓思之爲立廟武陽諡曰壯侯上思彭功封其庻子淮爲穀陽侯上爲書喻公孫述示以成敗述得書歎息以示光禄勲張隆隆勸述降述曰廢興命也豈有降天子哉左右莫敢言岑彭之死呉漢將精兵二萬自夷陵出犍爲十二年春呉漢到南安擊述弟永於魚涪津破之遂降武陽初漢入犍爲界諸縣多城守詔令漢直到廣都據其心腹諸城自下漢意難之旣進兵廣都諸城皆降又詔漢曰廣都去成都五十里述若來攻待其困弊而攻之勿與爭鋒述若不來轉營逼之彼必堅壁漢以連戰輒勝便進兵去成都十里漢自將歩騎二萬餘人水北作營遣副將劉尚將萬餘人於南爲營相去二十餘里上聞之大驚讓漢曰如述出兵連綴副營副營破即公營亦破矣恐公不能自還自天也幸尚無他者急還廣都三月癸酉詔曰巴蜀民爲人所掠者免爲庻人夏六月黃龍見于河東秋七月馮駿破江州殺田戎九月述遣司徒謝豐執金吾袁吉將十餘萬人攻呉漢分兵守劉尚漢力戰不利漢謂諸將曰吾與諸軍逾越險阻轉戰千里今深入敵地在其城下勝則成功敗則無餘成敗在一舉矣前夾江爲營戰數不利今欲徙水北營合於水南同心一力人自爲戰何有不克哉饗士秣馬潛軍夜合水南營述不知乃分兵距水北營自將攻水南營漢迎擊大破之斬謝豐袁吉㑹臧宫至兵馬甚盛遂進軍城下述自將數萬人出戰呉漢縱銳士奔之刺述洞胷輿至營以兵屬延岑其夜述死明旦岑舉城降呉漢悉滅公孫氏幷誅延岑漢燔燒百姓縱兵大掠上聞之詔讓呉漢劉尚曰城中老母嬰兒口以萬數兵火大縱可爲酸痛甚違古人弔民之義公等戴天履地何忍行此邪初漢軍糧盡具舟將退謂蜀郡太守張堪曰禍將至矣軍有七日糧而轉運不至必爲虜擒不如退也堪乃止漢使毀軍以挑述述果出戰遂以破述成都旣平堪先入其城府藏珍寳皆有簿券秋毫無所取慰撫吏民蜀人喜悅後遷漁陽太守匈奴嘗以萬騎入漁陽堪以數千騎擊破之威震北邉漁陽大治堪字君遊南陽宛人明帝時問蜀郡計掾樊顯曰前後太守誰最賢顯曰漁陽太守張堪仁足以惠下威足以擒姦前公孫述破時珍寳山積捲握之物足富十世而堪獨乗折轅車布被囊而已上聞顯言歎息良久方徴堪㑹病卒天子悼惜之大司空李通以疾罷通以布衣唱謀有佐命之功又尚寧平公主甚見親重通性謙恭常欲避權勢自爲宰相謝病不視事連年乞骸骨上輒優喻之以三公歸第養疾通後固請罷相以特進侯奉朝請常與髙密膠東侯參議大事車駕毎幸南陽遣使使祠通父守冡竇融與五郡太守還京師官屬賔客轉轂千餘兩融至上凉州牧張振屬國都尉安豐侯印綬上遣使還侯印綬引見就諸侯位賞賜恩寵傾京師以梁綂爲太中大夫數月拜竇融爲冀州牧俄拜大司空融以非國家舊臣而爵位與呉公竝毎朝㑹進見辭禮甚恭上愈親厚之融久不自安數辭讓爵位因侍中金遷口逹至誠又上疏曰臣融年五十三有子年十五質性頑鈍臣朝夕敎以經藝不得令見天文䜟記誠欲令肅恭畏事恂恂修道不願其才能何况乃當傳以連城王侯故國哉毎請間求見上輒不許融嘗罷朝逡廵席後上知融欲讓使左右扶出之他日將㑹先詔融曰曩者知公欲讓今相見宜論他事勿復言其殷勤若此梁綂在朝數言便宜上書陳法令輕重宜遵舊典曰臣聞人君之道仁義爲主仁者愛人義者治理愛人故爲之除殘治理則爲之去亂是以五帝有流殛之誅三王有大辟之刑所以經世敎民除殘去亂也故孔子曰理財正辭禁民爲非曰義高帝受命奄有天下制法定律傳之後世不易之科也文帝寛柔省去肉刑他皆率由舊章幾致刑措武帝因資財冨多出兵命將征伐遠方軍没民疲豪傑犯禁故增其二科懲不盡節宣帝聦明親覽萬機臣下奉憲不失繩墨元帝法令少所改更而天下稱治至於成帝繼體哀平即位日淺丞相嘉等猥以數年之間虧除先帝舊律百有餘事咸不厭人心尤妨政事伏見陛下權時撥亂博施濟民功逾文武德侔高皇而反循季世末節襲秉衰微之軌非所以還初反本據元更始也願陛下擇其善者而從之其不善者而改之定不易之典垂無窮之制天下幸甚事下公卿光禄勲杜林諫曰夫人情挫辱則節義之心損刑網繁密則苟免之行生聖帝明王知其如此故深識遠慮動居其厚故湯去三面之網易著三驅之義所以德刑叅用而示民有耻漢德寛厚民無二心軍士左袒樂爲劉氏多恩之所致也至其後世不能以德而勤於法故有吹毛求疵詆欺無限桃李之饋集以成事於是家無全行國無廉夫上下相循法不能止而仁義之風替矣陛下覽得失之要深知其原故破觚爲圎建斵爲樸法簡易遵網疏易從海内頌政不勝其喜宜如舊制上從林議綂徙封陵鄕侯出爲九江太守治甚有迹吏民畏愛之綂有子九人而松最知名次竦弱冠能敎授善屬文袁宏曰自古在昔有治之始聖人順人心以濟亂因去亂以立法故濟亂所以爲安而兆衆仰其德立法所以成治而民氓悅其理是以有法有理以通乎樂治之心而順人物之情者豈可使法逆人心而可使衆兆仰德治與法違而可使民氓悅服哉由是言之資大順以臨民上言之道也通分理以綂物不易之數也降逮中世政繁民弊牧之者忘簡易之可以致治御之者忽逆順之所以爲理遂隳先王之大務營一時之私議於是乎變詐攻奪之事興而巧僞姦吏之俗長矣陵遲至於戰國商鞅設連坐之令以治秦韓非論捐灰之禁以敎國而修之者不足以濟一時持之者不能以經易世何則彼誠任一切之權利而不通分理之至數也故論法治之大體必以聖人爲凖格聖人之所務必以大道通其法考之上世則如彼論之末世則如此然則非理分而可以成治者未之聞也若乃變詐攻奪之事興而飾智謀權冊以勝之巧僞姦利之俗長而設禁網䧟穽以餌之患時世之莫從懸財賞行罰以驅之毒爲下之訐逆厚威網殺伐以服之斯所謂勢利苟合之末事焉可論之以治哉先王則不然匡其變奪則去其所爭救其巧僞則塞其淫情人心安樂乃濟其難以悅之又何不從之有焉人之情惡侵則正其分以齊之乂何訐逆之有焉推此以治則雖愚悖凶戾者其於身也猶知法治所以使之得所而安其性者也故或犯治逆順亂倫反性者皆衆之所疾而法之所以加是警一人而千萬人悅則法理之分得也夫然則上下安和天下悅服又何論於法逆於理理與法違哉後漢灮武皇帝紀卷第六
