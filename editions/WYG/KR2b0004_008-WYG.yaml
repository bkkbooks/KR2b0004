front:
  text: 第八二十二年春閏月丙戌上幸長安祠園邑夏五月乙未晦日有蝕之六月伏波將軍馬援還京師是時梁松貴幸百僚憚之援嘗小病松來候見援獨拜牀下援安然受之松意不平諸子曰梁伯孫貴重將軍宜為之禮援曰我乃其父友也雖貴何得失禮由是不為權貴所愛援外坦蕩而内備禮事寡嫂不衣冠不入閨其於人汎愛多容然見爵位而無實者笑曰力不應齒士不聞耳何足畜乎有竒異於衆者雖在少賤必異待之援有籌䇿世祖曰伏波論兵常與吾合初援交阯還書戒其兄子嚴敦曰吾欲汝曹聞人過失如聞父母之名耳可得聞口不可得言也如論議人長短是非此吾所大惡也寧死不願聞子孫有此行也汝曹知吾惡之甚矣所以復言欲汝曹不忘之爾龍伯髙敦厚周慎口無擇言謙約節儉廉公有威吾重之愛之願汝曹效之杜季良豪俠好義憂人之急父䘮致客數郡畢至吾愛之重之不願汝曹效之效龍伯髙之正不就猶為謹敕士所謂刻鵠不成尚類鶩者也效杜季良而不成陷為天下輕薄子所謂畫虎不就反類狗者也迄今季良尚未可知郡將下車輙切齒州郡以為言吾常為之寒心是以不願子孫效也季良名保為越騎司馬保怨家上書言保所在惑衆伏波將軍萬里還書以戒其兄子今在京師與梁松竇固等交上召責松松叩頭流血乃召問援因取所與嚴敦書即日免保官時龍伯高為山都長擢為零陵太守秋九月地震詔南陽郡勿輸今年田租南陽繫囚減死罪一等是嵗匈奴國中亂諸將皆言可擊者上以問朗陵侯臧宫宫曰願得五千騎足以立功上笑曰常勝之家難與慮敵吾方自思之遂不出師匈奴之族由來尚矣其在殷周則有山戎獫狁之難逮於秦漢而有匈奴彊弱之勢前書載之詳矣王莽時欲分匈奴匈奴大怒縱兵犯塞傷殺吏民莽乃盛兵以擊匈奴嚴尤諫曰臣聞匈奴為害所從來久矣周秦漢征之然皆未有得上䇿者周得中䇿漢得下䇿秦無䇿也當周宣王時獫狁内侵至於涇陽命征之盡境而還視戎狄之侵譬猶蚊虻之蟲驅之而已故天下稱明是為中䇿武帝選將練兵深入逺戍雖有尅獲之功胡輙報之兵連禍結三十餘年中國疲耗匈奴亦困而天下敝是為下䇿秦始皇不忍小恥而輕民力長城之固延袤萬里轉輸之行起於負海疆境既完中國内竭以喪社稷是為無䇿也莽不從匈奴遂叛北邊大擾世祖之初方憂中國未遑外事也初匈奴右日逐王比單于知牙斯之長子也自呼韓邪單于死後更令兄弟相傳知牙斯死傳弟臧咸臧咸死傳弟輿輿立欲傳其子然其弟知牙帥川次當為單于者也比曰以兄弟言之知牙帥當立以子言之我前單于長子也輿疑之輿死子焉鞮立鞮死弟滿奴立比遂失次怨恨而匈奴國中旱蝗連年草木皆盡人畜死者過半比乃遣人奉匈奴圖詣西河求和親盡收南邊諸部呼衍日逐等叛匈奴匈奴遣萬餘騎擊比不勝呼衍日逐等共立比為呼韓邪單于孝宣時其大父呼韓邪歸漢得成故襲其號於是有南北單于二十三年春正月南郡蠻夷反武威將軍劉尚擊破之置江夏郡三月南單于遣使稱藩願修舊約天子議於公卿咸以為蠻夷猾夏情偽難知不可許大司農耿國以為今天下初定尤宜受之令東撫烏桓北拒匈奴邊陲永息干戈之役萬世之䇿也上善而從之使中郎將段柳使匈奴於是單于拜伏受詔遣弟左賢王將兵擊北單于連破之北單于震怖却地千里單于既稱臣入居塞内上書遣子貢獻漢賜單于冠帶衣裳黃金龜璽什物各有數單于乃分部諸帥以鄣北邊北單于惶恐願還所略漢人數遣使詣武威求使者皇太子以為南單于新立今若遣使恐阻南單于意故但報其書不遣使者冬十二月武谿蠻夷反遣劉尚擊之尚軍没驃騎大將軍杜茂鬲侯朱祐祝阿侯陳俊薨朱祐貴儒學論議常依古法為將帥受降追奔逐北以破敵為功不問斬首多少軍吏以不得鹵掠故或有怨者徙封鬲侯食邑七千餘戸自陳功薄而賞大願受南陽五百戸足矣上不許初上學長安嘗過祐祐方講留上須講竟乃共讌語及上幸祐第語及平生上曰主人得無捨我講乎二十四年春正月乙亥大赦天下大司空杜林薨太僕張純為大司空林字伯山右扶風茂陵人父業以文章顯林少有俊才好學問沈深好古家既多書又外家張竦父子善文章林從竦受書漸漬内外為當世通儒王莽敗盜賊並起林與弟成俱至河西隗嚻聞林名故深敬待之以為治書後以病去嚻欲超用之遂稱痼疾嚻心恨林曰杜伯山天子所不能臣諸侯所不能友盖伯夷叔齊恥食周粟也今且從師友之位以從其志焉林雖困乏終不為屈林嘗得漆書古文尚書一卷獨寶愛之每遭困阨自以不能濟於難也猶握抱此經獨歎息曰古文之學將絶於此邪至建武初弟成死故林持喪東歸嚻既遣林後悔令刺客楊賢於隴遮刺林賢見林自推車載弟喪歎曰當今之世誰能行義者我雖小人何忍殺義士亡去上聞林已還乃徵林拜侍御史引見問經書故舊及西州事上甚恱賜車馬衣被嵗餘遷司馬司直百僚知林以名德用甚敬憚之林既至京師與英俊集㑹咸敬林之博雅洽聞河南鄭興東海衛宏等皆長於古學從劉歆受左氏春秋定三統厯及見林皆推服焉濟南徐兆始事衛宏後皆更受林學林以前所得一卷古文尚書示宏曰林危阨西州時常以為此道將絶也何意東海衛宏濟南徐生復得之邪是道不墜於地矣二十五年春正月烏桓大人郝且等率衆貢獻封其渠帥為侯王烏桓者東胡也漢初匈奴冒頓伐其國餘類保烏桓山因以為號焉其俗善騎射隨水草放牧居無常處刻木為信無文字而衆不敢違犯其先為匈奴中亂烏桓始盛鈔擊匈奴匈奴為之轉徙數千里漠南遂空戊申晦日有食之初劉尚軍没議復遣將帥時馬援年六十二矣上憫其老方内選擇未有所定援自請曰臣尚能披鎧上馬上試焉援既據鞍左右顧乃下遂遣之冬十月伏波將軍馬援揚虚侯馬武東牟侯耿舒擊武谿援謂所親杜愔曰吾受恩深厚常恐不得死國事也今得所甘心瞑目但畏長者家兒或在左右或與共事殊難得調獨惡是爾南鄉侯鄧晨薨初晨為常山汝南太守皆有名跡為吏民所愛在汝南起鴻陂溉灌田數千頃百姓於今利之徵為光禄大夫數與宴見陳説平生晨從容白上曰僕竟辦之上大笑晨疾病天子手書慰問中宫及寕平公主皆為垂泣既薨使謁者招新野主魂備官屬合𦵏於北邙山上與皇后親臨送𦵏賞賜甚厚謚曰惠侯二十六年春正月増吏俸自三公至於佐史各有差二月馬援至臨鄉大破蠻軍斬首千餘級蠻有二道一曰壺頭二曰充中壺頭徑近而多險充中逺而運糧難初上與諸將議所先擊因以疑而未决軍至長沙中郎將耿舒上言先擊充中賊援以為延日費糧不如進攻壺頭賊乗髙守隘船不得進㑹夏暑熱吏士疫死者多援亦病困穿㟁為室以避暑氣賊每乘高鼓譟援輙扶人觀之左右壯其意皆為之流涕耿舒與兄好畤侯弇書言舒前上言擊充中賊糧雖難致兵馬得用軍人數萬爭欲奮擊今壺頭竟不得上又大軍疾疫皆如舒言弇奏舒書上遣梁松驛責問援因代監軍松未至而援已死松與馬武等毁惡援於上上大怒收援將軍侯印綬是時軍士死者大半謁者宋均軍不得返與諸將議欲承制降賊諸將莫敢應均曰夫忠臣出境有可安國家專之可也均勒兵成列稱詔降之蠻夷震怖即共斬其大帥降均均為置長吏而還均自請矯制罪天子嘉其功賜以金帛其後每有四方異議數訪問焉於是援家屬惶怖不敢歸舊墓買城西數畝地𦵏其中賓客故人不敢送𦵏故雲陽令朱勃詣闕上書曰臣聞王徳聖政不忘人之功采其䇿不求備於衆故髙祖赦蒯通以王禮𦵏田橫令大臣曠然咸不自疑夫大將在外䜛言在内㣲過輒記大功不計誠為國之所慎也故章邯畏誅而奔楚燕將據聊而不下豈其甘心末規哉悼巧言之傷類也竊見故伏波將軍新息侯馬援以四年冬始歸正朔當此之時虜述矯號於益州隗嚻擁兵於隴冀豪傑盱睢各自為政援拔自西州慕徳效死孤立貴人之間曽無一言之佐自知當要七郡之使徼封侯之福邪八年車駕西征衆議狐疑援深建西州可破之䇿隗嚻尅定援有力焉及隴右未清羌虜擾邊援奉使隴西奮不顧身間行山谷之中揮戈先零之野兵動有功師進輒克徵在虎賁則有忠䇿嘉謀於國用之南征交阯克平一州使王府納越裳之貢邊境無兵革之憂間者使南立陷臨鄉師已有業未竟而卒吏士雖疫援不獨存夫戰或以久而立功或以速而没師深入未必為是不退未必為非人情豈樂久在逺地不生歸哉惟援得事朝廷二十二年北征出塞再南渡江觸冒害氣僵尸軍中名滅爵絶國土不傳海内不知其過衆庶不聞其罪卒遇三夫之言被誣㒺之䜛家屬杜門𦵏不歸墓怨隙並攻宗親怖慄死者不能自列生者莫為之訟臣竊傷之夫操孤危之忠而不能自免於䜛此義士之所悲也惟陛下思豎儒之言無使功臣懷恨於黃泉也書奏不報歸田里時梁松竇固等在中上問知朱勃乎對曰故雲陽令也以所上章使讀之松固驚相謂曰如是陛下不甚罪伏波也袁宏曰馬援才氣志略足為風雲之器躍馬委質編名功臣之録遇其時矣天下既定偃然休息猶復垂白據鞍慷慨不亦過乎嘗試言之所以保才者智也才智之用通物為貴茍才大者濟衆小者獨善則涉乎通方者其智彌廣矣夫觀雲梯之功則知班匠之巧覩太平之業則悟聖人之明降斯以還參差百品雖智效一官功覆一簣亦才力之所㑹也古之君子遇有為之時不能黙然而止擊節驅馳有事四方者盖為斯也然自非賢達不能量也遭命世之君傍日月餘光廢興指授稟其規略故功名保全身有餘地若不值其主而獨任其心得一旅而志一邑得一邑而圖一國故事捷而攻之者衆勲立而日就於難又况顛沛嶮巇不測之慮哉夫才智有餘功名不足者有矣事業未半而勲過者有矣所乘之勢異而難易之功殊也而有為之人幸而要之雖徼一時之功暴居視聽之右外有駭物之患内懷思慮之憂爾乃中路悵然欲退無途其勢然也善為功者則不然不遇其主則弗為也及其不得已必量力而後處力止於一戰則事易而功全勞足於一邑則慮少而身安推斯以往焉有毁敗之禍哉馬援親遇明主動應銜轡然身死之後怨謗並興豈非用過其才為之不已者乎夏四月初營夀陵依孝文故事務從省約使迭興之後與丘隴同體凡帝即位必營夀陵具終器漢之制也上常聽朝至於日昃講經至於夜分或與羣臣論政事或説古今言行鄉黨舊故語及忠臣孝子義夫節婦侍對之臣莫不悽愴激揚欣然自得雖非大政進止之宜必遣問焉所以勸羣能也皇太子從容言曰陛下有禹湯之明而失黃老養性之道今天下乂安願省思慮養精神優游以自寛上答曰吾自以為樂矣二十七年夏太僕趙喜為太尉是時南單于新稱藩焉桓始入朝上命喜思安邊之䇿為久長之計喜乃議復代郡朔方五原雲中定襄雁門郡遣諸王之國喜字伯陽宛人也喜從兄為人所殺無子喜年十五結客為報讎更始初舞陰大姓李氏擁兵自守更始遣將降之不下曰聞趙氏有孤孫喜信義著聞願降之更始乃徵喜時未二十更始笑曰繭栗犢能服重致逺乎即以為偏將軍詣舞陰降李氏因入潁川轉擊諸未下者更始大喜曰卿名家駒也努力勉之昆陽之戰喜頗有功拜為中郎將封勇功侯更始敗喜歸鄉里初喜與鄧奉善奉之叛也喜數與書切責之時有言喜為鄧奉計䇿以毁惡之者詔喜屬建威將軍以功自贖喜不自言奉死後上得喜書驚曰趙喜真長者也即徵喜待公車時江南未通以喜守簡陽侯相將給兵騎之官喜自請不願請單騎馳徃度其形勢臨敵制宜若將兵騎往彼必為吏民所疑上許之喜至簡陽民閉城門不肯納喜便止城門外問國中大夫素為百姓所親信者乃召問之對曰夫擁兵欲以自守而至於為賊恐懼不能自反耳喜因告以倉卒之時非國家所疾無自疑阻懇為陳恩信賊遂自縛詣喜降後為平原太守甚有治迹百姓歌誦之二十八年春正月遣諸王就國三月臧宫上書勸上征匈奴詔曰有徳之君以所樂樂民無徳之君以所樂樂身樂民者其祚延長樂身者不久而亡故曰地廣者荒徳廣者彊今無善政災變不息憂念民艱論語云吾恐季孫之憂不在顓㬰而在蕭牆之内也而欲復逺征乎冬十月癸酉詔死罪下蠶室其女子宫上會羣臣問曰誰可傅太子者皆曰執金吾隂識可也博士張佚正色曰今陛下立太子為隂氏乎為天下乎即為隂氏則陰侯可為天下則固宜用天下之賢上曰善欲置傅者以輔太子令博士不難正朕况太子乎即拜佚為太子太傅而以桓榮為少傅賜以輜車乘馬乃大㑹子弟陳其車馬印綬曰此皆稽古之力也可不勉邪於是皇太子經學始成少傅桓榮上疏曰臣幸得侍帷幄經學淺短無所補益聖質夙夜慙愧今太子經學已通自有識以來儲君副主莫能傳之令太子獨能傳之此誠萬國之福也臣師道已盡皆在太子矣謹遣掾臣汜再拜歸道太子報曰陽以童䝉承訓九載不深達師意而猥見褒奬非其實也夫五經之道廣大非天下之至精其孰能與於此自宰予之徒親事孔門閑邪以度猶尚怠懈晝寢况於不才者乎茍非其人道不虚受冉求曰非不恱子之道力不足也歸道受謝非所敢聞是時禁􅃠踈闊王侯貴人多通賔客夀光侯劉悝更始少子也得幸於沛王輔悝怨盆子殺其父因輔結客報殺盆子兄故式矦恭輔坐繫獄三日由是捕諸王賔客死者千餘人初馬援謂其司馬吕种曰建武初名為天地始開從今已後海内日當安樂耳顧我嘗獨有所憂國家諸子並壯皆不防微廣通賔客門庭如市吾恐自此大獄起矣卿其慎之援兄女壻王礱故平阿矦子也好施愛士名振江淮間後遊京師交結諸侯援謂所親曰王子石傑士也今若京師在長者間用氣自行陵折者多必用亡身於是吕种王礱馮衍皆以諸王賔客下獄种歎曰馬生之言其神乎种礱死獄中衍被赦出廢于家上言曰臣伏念帝王大體古今通論常獨慨然夫以髙祖之略而陳平之謀毁之則疎與之則親以文帝之明而魏尚之忠繩之以法則為罪施之以徳則為功逮至晚世董仲舒言道徳見妬於公孫𢎞李廣奮節於匈奴見排於衛青此忠臣所為流涕也臣衍自惟上無無知之薦下無馮唐之說乏董生之才寡李廣之勞而欲免䜛口於當世豈不難哉臣之先祖以忠貞之故成私門之禍而臣值兵革之際不敢囘行茍容以求世利事君無傾邪之謀將帥無虜掠之心今幸遭清明之世飭躬自行之秋而怨讎叢雜譏議橫世盖富貴易為善貧賤難為工也疎逺隴畝之臣無望髙闕之日惶恐自陳以救罪過書奏天子不用猶以前過也衍字敬通馮奉世之後有竒才博通無所不覽王莽時諸公多薦之者衍辭不肯仕衍有大度自度其才不能耦世取容故遂坎壈失志居常慷慨庶幾名賢之風家貧年老常為司𨽻從事全椒侯馬成薨二十九年春二月丁巳朔日有食之遣使者舉寃獄問鰥寡庚申賜天下男子爵各二級鰥寡孤獨貧不能自存者粟人五斛夏四月乙丑詔天下繫囚自殊死已下減本罪各一等不孝不道不在此書三十年春二月甲子上幸魯國濟南夏四月徙左馮翊公焉為中山王五月旱賜天下男子爵人二級鰥寡孤獨貧不能自存者粟人五斛冬十月丁酉上幸魯國太尉喜司空純上書曰自古帝王治道之隆未嘗不登封太山以告成功書曰二月東巡狩至于岱宗封禪之義也陛下受命中興順天行誅修復祖宗撫寕萬國天下曠然咸蒙更生夷狄慕義符瑞並應詩云受天之祜四海來賀誠宜封禪告成以順天心詔曰是何言也當今日月薄蝕災異並臻吏失其職百姓怨讟吾誰欺欺天乎於是羣臣不敢言膠東侯賈復薨諡曰剛侯復嘗戰被創甚上大驚曰我所不令復别將者為其輕敵也果然失吾名將聞復婦孕上曰女邪我取之男也我與之女勿憂妻子復數從征伐未嘗破敗數為諸將潰圍解陣身被十二創上以復敢深入稀令逺征欲自將之故少方面之功諸將每論功人人自伐復獨黙不言上曰賈君之勲我自知之功臣中最見親禮左將軍官罷以列侯就第加位特進為人剛毅方直慷慨有大節闔門守静朱祐等薦復宜為宰相世祖方以吏事責三公故遂不用功臣是時列侯唯膠東侯賈復髙密侯鄧禹固始侯李通與公卿參議國事三十一年夏五月戊辰賜天下男子爵人二級鰥寡孤獨貧不能自存者粟人五斛癸酉晦日有食之秋九月甲辰詔死罪下蠶室其女子宫鮮卑大人於仇賁率其種人貢獻封賁為王鮮卑亦東胡之餘也别居鮮卑山因號焉其言語習俗與烏桓同自為冒頓所破逺竄遼東未有名通於漢而與烏桓接當是時南單于更相攻伐而鮮卑遂以彊盛中元元年春正月天子覽河圖㑹昌符而感其言於是太僕梁松復奏封禪之事乃許焉二月辛卯上登封于太山事畢乃下是日山上雲氣成宫闕百姓皆見之甲午禪於梁父袁宏曰夫天地者萬物之宫府山川者雲氣之丘墟萬物之生遂則宫府之功大雲雨施其潤則丘墟之徳厚故化洽天下則功配於天地澤流一國則徳合于山川是以王者經略必以天地為本諸侯述職必以山川為主體而象之取其陶育禮而告之歸其宗本書云東巡狩至于岱宗柴傳曰郊祀后稷以祈農事夫巡狩觀化之常事祈農撫民之定業猶潔誠殷薦以告昊天況創制改物人神易聽者乎夫揖讓受終必有至德於萬物是故王者初基則有封禪之事盖以其成功告於神明者也夫東方者萬物之所始山嶽者靈氣之所宅故求之物本必於其始取其所通必於所宅崇其壇場則謂之封明其代興則謂之禪然則封禪者王者開務之大體也德不周洽不得擬議斯建功不𢎞濟不得髣髴斯禮曠代一有其道至髙故自黃帝堯舜至于三代各一封禪未有中修其禮者也雖繼體之君時有功徳此盖率復舊業增修前政不得仰齊造國同符改物者也夫神道貞一其用不煩天地易簡其禮尚質故藉用白茅貴其誠素器用陶匏取其易從然則封禪之禮簡易可也若夫石函玉牒非天地之性也三月丙辰司空張純薨純字伯仁京兆杜陵人父放襲爵昌平侯成帝時以遊讌得幸而純以學行稱哀平世為侍中諸曹校尉王莽時為九卿遭亂世保全侯爵建武初以先詣闕復封故國拜太中大夫遷五官中郎將有司奏列侯非宗室不宜復國上以純宿衛久弗奪也更封武始侯食富平之半純厯事先朝明習故事是時朝廷草創舊典多闕每有疑議輒訪問純自郊廟冠婚之禮多所正定純重慎固密時有上書輒削藳草上甚重之一日至數引見及為宰相務存無為慕曹參之迹所辟召皆當世通儒純臨薨勅家丞曰司空無功勞於國猥䝉大恩爵不當及子孫其勿紹嗣純長子根常被病大行問嗣家上小子奮奮辭讓曰先臣遺令臣兄弟不得襲爵故臣不即拜命猥聞詔書驚愕惶怖臣兄哀臣幼小故託稱疾病不聽奮字穉通謙約節儉闔門雍睦租稅賑給宗族常自困乏官至司空夏四月己卯大赦天下復梁父奉髙嬴勿出今年田租戊子上幸長安祀長陵是時醴泉出京師百姓痼疾飲者皆愈又有赤草生於泉側郡國三十一上言甘露降有司奏曰孝宣帝時每有嘉瑞輒為之改元故有神雀五鳯之號所以奉答神祗表彰徳信也天子拒而不納是以史官不得而記焉六月衛尉馮魴為司空賜爵關内侯冬十月甲申使司空魴告禮髙廟曰髙帝與羣臣約非劉氏不得王吕太后王諸吕滅亾三趙賴神靈諸吕伏誅國家永寕吕后不宜配食地祗髙廟薄太后慈仁孝文皇帝賢明子孫頼之福延至於今宜配食地祗髙廟今上薄太后尊號為髙皇后遷吕后尊號為髙后袁宏曰夫越人而臧否者非憎於彼也親戚而加譽者非優於此也處情之地殊故公私之心異也聖人知其如此故明彼此之理開公私之塗則隱諱之義著而親尊之道長矣古之人以為先君體猶今為君之體推近以知逺則先後之義均也而況彰其大惡以為貶黜者乎是嵗起明堂辟雝靈臺初議靈䑓位上問議郎桓譚曰吾欲以讖決之何如譚黙然良久曰臣不讀讖上問其故譚復言䜟之非上大怒曰桓譚非聖人無法將下斬之譚叩頭流血良久乃解譚以屢不合㫖出為六安太守丞失意忽忽不樂道病卒時年七十餘南陽人尹敏字幼季才學深通能論議以司空掾與校圖讖敏言於上曰讖書聖人所作然其中多近鄙别字頗類俗人之辭虚實難識恐誤後生上不然其言敏因書之闕文增之曰君無口為漢輔上讀怪之召敏問其故敏曰臣見前人多増損圖書是以因自著罪無狀上深非之而不罪但令削去之然以是沈滯官止長陵令敏性恬淡不慕功名專好聖哲之書初與班彪相善每相與談常日晏不食晝即至夜夜即至旦彪曰相與久語為俗人所怪然鍾子期死伯牙破琴惠施沒莊周杜門相遇之難也二年春正月辛未初起北郊祀后土丁丑倭奴國王遣使奉獻二月戊戌帝崩南前殿遺詔曰朕無益百姓如孝文帝制度務從省約刺史二千石長吏皆無離城郭無遣使因督郵奉奏是日太子即皇帝位年二十四尊皇后曰皇太后凡帝妃稱皇后帝母稱皇太后祖母稱太皇太后妾臣昭儀已下至中家人子二十等漢之制也光武中興悉闕昭儀家人之號唯有貴人金印紫綬自美人宫人綵女皆無秩祿四時賞賜而已是時諸王皆徵還國遭大憂新承王莽之亂國失舊典嗣帝與諸王居止同席時上下沿襲莫之與正太尉趙喜橫劒正色扶諸王下以正尊卑乃申宫衛整禮儀百官肅然三月丁卯𦵏光武皇帝於原陵慎侯劉隆薨夏四月丙辰詔曰予末小子奉承聖業夙夜祗畏不敢荒寕先帝受命中興德侔五帝朕繼體守文不知稼穡之艱懼有廢失以墮先業公卿百僚將何以輔朕之不逮特進高密侯禹明允篤誠元功之首其以禹為朕之太傅進見東向以明殊禮東平王蒼寛博有謀可以託六尺之孤臨大節而不可奪也以蒼為驃騎將軍其賜天下男子爵人二級三老孝悌力田人三級鰥寡孤獨粟人十斛上新即位欲崇引親賢優寵大臣乃以山林之勞封太尉喜為節鄉侯司空訢為安鄉侯司徒魴為揚邑侯蒼上䟽讓曰陛下慈恩哀臣蒼臨朝之日以為命首舉負薪之才升君子之器令勸賞之士怠於力行臣誠内廹頑愚辱汙輔將之位必被詩人赤紱之刺今方域晏然要荒無警將遵上徳無為之時也文官猶宜并省武官尤不宜建昔虞舜克諧君象有鼻不及以政誠不忍揚其惡也前事之不忘後事之師也自漢已來子弟無得在公卿位者唯陛下逺遵舊典終畜養之恩不勝至願願上驃騎將軍印綬上不聽蒼以母弟輔政盡心王室其所賔禮皆當世名士初太原人郇恁隱居山澤不求於世匈奴嘗入太原素聞其名乃不入郇氏舉宗頼之建武中徵恁不至於是蒼復辟恁而敬禮焉嘗朝㑹上戲恁曰先帝徵君不至驃騎辟君反來何也對曰先帝秉德以惠下故不得來驃騎執法以檢下臣不敢不至月餘辭去終於家秋九月隴西羌反冬十一月中郎將竇固揚虚侯馬武征羌十二月甲寅詔自殊死已下聽贖罪各有差
