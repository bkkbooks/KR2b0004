  text: 第三第三建武元年春正月鄧禹攻安邑王匡成丹劉均等合兵十餘萬共擊禹禹與戰不利驍騎将軍樊崇臨陣死㑹日暮兵疲韓歆及諸将見戰敗而敵盛皆諫禹欲夜去禹不聴明旦癸亥匡等以六甲窮日不出禹得益治兵敕軍中曰匡等雖出無妄動令至營下乃擊匡等悉至禹鼔而竝進大破之斬劉均河東太守楊寳遂定河東禹承制拜軍祭酒李文為太守悉更置令鎮撫之王擊銅馬於元氏使耿弇吳漢将精兵在前大破之追至順水北漢兵乗勝薄之賊皆殊戰漢軍大壊王親揮刃以禦賊未交鋒耿弇射之賊不得前㟁髙不得上王自投馬下值突騎王豐豐以馬授王王撫豐肩曰幾為賊所突馬武在後戰甚用力故賊不得進軍士奔散者先保范陽或言王已沒矣軍中恐懼不知所為吳漢曰王兄子在南陽何憂有頃王至衆乃復振夜賊引去王進入漁陽破之吳漢别追至右北平斬首三千餘級更始遣廪丘王田立大司馬朱鮪白虎公陳僑将三十萬衆助李軼守洛陽馮異與李軼書曰愚聞明鏡所以照形往事所以知今也昔微子去殷而入周項伯叛楚而歸漢周勃迎代王而黜少帝霍光尊孝宣而廢昌邑彼皆畏天知命重祖宗而憂萬民覩存亡之符效見廢興之必然故能成功於一時垂業於萬世今長安壊亂赤睂在郊王侯搆難大臣分離朝無紀綱而四方分崩異姓竝起此劉氏之憂也故蕭王跋涉霜雪躬當矢石經營河北英俊雲集百姓歸往豳岐見慕不足為喻今馬子張皆復親幸爵位如此謝躬違戾伏辜如彼又明效也季文誠能覺悟亟斷大計論功古人轉禍為福在此時矣如猛将長驅嚴兵圍城雖有悔恨亦無及已矣初軼譛殺伯昇欲降而不自安冀王開納之乃報異書曰軼本與蕭王首謀造漢約結死生不幸中道别離今軼守洛陽将軍鎮孟津俱據機軸千載一㑹思成斷金唯有深達蕭王冀得進愚策以得佐國安人異奏軼書王報異曰季文多詐人不能得其要領今移其書告守尉當警備之衆以軼擁大衆據名都欲有降意怪上露之也軼書既布朱鮪得其書使人殺軼雒陽大衆乖離多出降者蕭王之北朱鮪使蘇茂将三萬人渡河襲温鮪自將數萬人攻平陰寇恂乃𤼵屬縣兵令與恂㑹温軍吏皆諫曰洛陽兵渡河前後不絶宜待衆兵畢至乃可擊之恂曰温者郡之藩蔽如失温郡不可得守也遂馳赴之明旦陳兵未合而馮異適至恂乃令士卒乗城鼓噪曰公兵至茂陣動因奔擊大破之茂兵自投河死者過半斬其副将賈彊遂乗勝渡河環洛陽城乃還自是洛陽震恐城門晝閉初傳聞朱鮪破河内有頃恂檄至上大喜曰吾知寇子翼可任也三月李松與赤眉戰於蓩鄉松大敗李熊説公孫述曰山東饑饉人民相食百姓塗炭城邑丘墟今蜀土豐沃稼穡嘗熟果實所生不穀而飽女工之業覆衣天下陸有器械之用水浮轉漕之便北據漢中杜褒斜之險東守巴郡拒扞闗之口地方數千里戰士百萬見利則出兵而略地無利則堅守而力農東浮漢水以闚秦地南順江流以震荆揚所謂用天因地成功之資也今君王之聲聞於天下號位不定志士狐疑宜即大位使逺人有知述然其言有龍出府殿中夜有光述以為符瑞夏四月公孫述自立為天子廣漢人李業字巨卿嘗為郎王莽居攝謝病去不應辟召隠迹山谷述素聞業名欲以為博士因辭病起述羞不致業乃遣大鴻臚尹融奉詔持鴆曰業起則授大位不起則賜鴆融喻業曰今天下三分孰非孰是何為區區身投不測之泉朝廷慕名徳於子厚矣宜上奉知已下為妻子計之身名俱全不亦優乎今阻疑衆心凶禍立加非計之得者也業乃歎曰危邦不入亂邦不居盖為此也君子見危授命何可誘以髙位哉融見持心彌堅復曰宜呼室家計之業曰丈夫内斷於心乆矣何妻子之為乎遂仰鴆而死袁宏曰夫名者心志之標牓也故行著一家一家稱焉徳播一鄉一鄉舉焉故博愛之謂仁辨惑之謂智犯難之謂勇因實立名未有殊其本者也太上遵理以修實理著而名流其次存名以為已故立名而物懟最下託名以勝物故名盛而害深故君子之人洗心行道唯恐徳之不修義之不髙崇善非以求名而名彰於外去惡非以邀譽而譽宣於外夫然故名盛而人莫之害譽髙而世莫之争末世凌遲大路巇險雖持誡行已不求聞達而讒勝道消民怨其上懼令名之格物或伐賢以示威假仁義以濟欲或禮賢以自重於是有顛沛而不得其死屈辱而不獲其所此又賢人君子所宜深識逺鑒退藏於密者也易曰无咎无譽衰世之道也若夫潔已而不汙其操守善而不遷其業存亡若一滅身不悔者此亦貞操之士也嗚呼大道之行萬物與聖賢並通及其衰也君子不得其死哀哉更始諸将懼赤睂至申屠建等御史大夫隗囂共勸更始讓帝位更始不應建等謀劫更始未行其計侍中劉能卿知其謀告之更始召申屠建斬之張卬廖湛胡殷於是自為王勒兵燒宫門隗囂将賔客奔天水更始與三王戰宫中不勝将妻子車騎百餘人東至新豐從大司馬趙萌萌以為王匡陳牧成丹皆與三王有謀可收斬之更始乃召陳牧成丹即斬之王匡不應召因并将牧丹兵歸長安從三王於太子宫趙萌李松亦将其衆從更始於太倉中五月蕭王自漁陽過范陽命收葬士卒死者至中山羣臣上尊號曰大王初征昆陽則王莽敗亡後服邯鄲則北州平定此豈人力哉三分天下而有其二跨州據土帶甲百萬武功論之無所與争文徳論之無所與讓宜正號位為社稷計王不聴諸将固請王曰寇賊未平四面受敵何遽欲正位號乎諸将出耿純進曰天下士大夫捐親戚棄土壤從大王於矢石之間者其計固望攀龍鱗附鳯翼以成其志耳今功業已定天時人事已可知矣而大王留時逆衆不正位號純恐士大夫望絶計窮則有去歸之思無從大王也王感其言召馮異問以羣臣之議異至曰三王背叛更始敗亡天下無主宗廟之憂在於大王宜從衆議上以安社稷下以濟百姓王曰我昨夢乗赤龍上天覺悟心中悸動此何祥也異再拜賀曰此天帝命𤼵於精神心中悸動大王重慎之至也㑹諸生彊華自長安奉赤伏符詣鄗羣臣復請曰受命之符人應為大今萬里合信周之白魚焉足比乎符瑞昭晳宜答天神以光上帝六月己未即皇帝位於鄗改年為建武元年大赦天下改鄗為髙邑袁宏曰夫天生蒸民而樹之君所以司牧羣黎而為謀主故權其所重而明之則帝王之略也因其所𢎞而申之則風化之本也夫以天下之大羣生之衆舉一賢而加於民上豈以資其私寵養其厚大将開物成務正其性命經綸㑹通濟其所欲故立君之道有仁有義夫崇長推仁自然之理也好治惡亂萬物之心也推仁則道足者宜君惡亂則兼濟者必王故上古之世民心純朴唯賢是授揖讓而治此盖本乎天理君以徳建者也夫愛敬忠信出乎情性者也故因其愛敬則親疎尊卑之義彰焉因其忠信而存本懐舊之節著焉有尊有親則名器重矣有本有舊則風教固矣是以中古之世繼體相承服膺名教而人心不二此又因於物性君以義立者也然則立君之道唯徳與義一民之心莫大於斯先王所以維持天下同民之極陳之千載不易之道昔周秦之末四海鼎沸義心絶於姬氏干戈加於嬴族天下無君六合無主将求一時之傑以成撥亂之功必推百姓所與以執萬乗之柄雖名如義帝彊若西楚焉得擬議斯事乎由是觀之則髙祖之有天下以徳而建矣逮於成哀之間國嗣三絶王莽乗權竊有神器然繼體之政未為失民劉氏徳澤實繫物心故立其寝廟百姓覩而懐舊正其衣冠父老見而垂泣其感徳存念如此之深也如彼王郎盧芳臧獲之儔耳一假名號百姓為之雲集而況劉氏之胄乎于斯時也君以義立然則更始之起乗義而動號令稟乎一人爵命班乎天下及定咸陽而臨四海清舊宫而饗宗廟成為君矣世祖經略受節而出奉辭征伐臣道足矣然則三王作亂勤王之師不至長安猶存建武之號已立雖南面而有天下以為道未盡也初赤睂二道入闗至𢎞農復大合分其衆萬人為一營軍中嘗有齊巫祠城陽景王巫言景王大怒當為縣官則可何故為盜賊有笑巫者輒病方望弟陽怨更始殺其兄乃説樊崇等曰更始荒亂政令不行将軍擁百萬之衆西向帝城而無稱號且為羣賊不可以乆不如挾宗室以行誅伐不敢不服崇等然之又迫於巫言乃求景王後得七十餘人唯盆子最親是月赤睂立盆子為天子盆子年十五被髮徒跣見衆人拜恐怖欲啼崇等自相署置崇本先起有勇力方略自徐宣等皆宗之然不能書徐宣故獄吏通易經於是推宣為丞相崇為御史大夫盆子者故式侯萌子王莽時廢為家人更始過式略盆子與二兄恭茂俱在軍中更始之詣洛陽恭隨見南宫恭前頓首曰故式侯世子大漢復興聖主在堂不勝歡喜願上夀有詔引上殿稱夀曰九族既睦平章百姓更始悦之即封為式侯恭通尚書以明經幸數言事擢為侍中從更始入闗茂與盆子留赤睂中嘗為劉俠卿牧牛盆子既立猶朝夕拜俠卿俠卿為之跪後祠景王於郭北使盆子乗鮮車大馬草中牧皃皆隨車觀曰盆子在是中至祠所盆子拜崇等皆為之拜祠罷復歸俠卿所時欲出從牧兒戲俠卿怒乃止崇等亦不復候視也秋七月辛未前将軍鄧禹為大司徒封鄼侯野王令王梁為大司空封武彊侯初赤伏符曰王良徙衛作𤣥武上以野王衛主也𤣥武水神也大司空水土之官也乃以梁為大司空又以䜟言以平狄将軍孫臧行大司馬事衆大不悦僉曰吳漢景丹應為大司馬上曰景将軍舊将是其人也然吳将軍有建䇿之謀又誅苗曾收謝躬其功大於是以吳漢為大司馬封武陽侯景丹為驃騎大将軍袁宏曰夫天地之性非一物也致物之方非一道也是以聖人仰觀俯察而備其法象所以開物成務以通天下之志故有神道焉有人道焉微顯闡幽逺而必著聰明正直遂知来物神之所為也智以周變仁以博施理財正辭禁民為非人之所為也故将有疑事或言乎逺必神而明之以一物心此應變適㑹用之神道者也辯物設位官方授能三五以盡其性黜陟以昭其功此經綸治體用之人道者也故求之神物則蓍策存焉取之人事則考試陳焉是善為治者必體物宜參而用之所以作而無過各得其方矣若夫䜟記不經之言竒怪妄異之事非聖人之道世祖中興王道草昧格天之功實賴台輔不慎選賢而信䜟記之言拔王梁於司空委孫臧於上将失其方矣茍失其方則任非其人所以衆心不悦民有疑聴豈不宜乎梁實負罪不暇臧亦無所聞焉易曰鼎折足覆公餗此之謂也上璽書勞鄧禹曰将軍與朕謨謀帷幄決勝千里孔子曰自吾有回門人益親平定山西功效尤著爾作司空敬敷五教禹遂渡汾陰入夏陽更始中郎将公乗歙将十萬衆拒禹於衙禹擊破之時赤睂入闗三輔擾亂民無所歸聞禹至衙軍兵整齊百姓喜悦相隨迎禹降者日以千數號百萬衆禹時年二十四所止住車節勞来之白首耆老及諸將在車下莫不感悦名震闗西八月壬子初祠社稷于懐是時上新即位軍食不足寇恂轉運不絶百官賴焉以給廩食上數璽書勞怐茂陵人董崇説恂曰上新即位四方未定而以此時據大郡内得人民外破蘇茂威震逺近此讒人所因怨禍之時也昔蕭何守闗中悟鮑生之言而髙祖悦今君所将皆宗族兄弟也無乃以前人為鏡戒哉宜從功遂身退之計恂然其言稱病不親事自請從上征上曰河内未可離也固請不聴恂乃遣兄子寇張姊子谷崇願為前鋒上悦以為偏将軍廩丘王田立降趙萌李松攻三王三王敗走更始徙居長信宫三王降赤睂别兵出戰李松拒之赤睂生得松時松弟汎為城門校尉赤睂使人誘汎曰開城活汝兄汎遂開城門九月赤睂入長安更始出渭濵式侯恭以盆子之立自繫有司赤睂入吏民奔式侯從獄中出帶械見定陶王劉祉解其械言帝在渭濵遂相隨見更始於舟中𢎞農太守公乗歙謂京兆尹解惲曰送帝入𢎞農我自保之惲曰長安已敗吏民不可信右輔都尉嚴本恐失更始為赤睂所誅即曰髙陵有精兵可往時虎牙将軍劉順定陶王劉祉尚書任延君侍中劉恭步将更始至髙陵嚴本将軍兵城守外如宿衛内實圍之上聞更始失城守未知所在詔封更始為淮陽王敢有害及妻子者罪大逆其送詣吏者封列侯赤睂更始降者以為長沙王過二十日者不受更始知為嚴本所守恐其自盡即遣劉恭請降赤睂遣大司徒謝祿受之坐更始於庭下議殺之式侯與謝祿共請不聴逐更始去式侯舉刃欲自刎崇等共止之乃舍更始封為畏威侯式侯復守崇求本約竞封更始為長沙王常依謝祿式侯擁䕶之頗得與故人賔客相見故人有欲盜更始去者事𤼵皆繫獄於是祿閉更始自是式侯不得見也赤睂諸将日㑹争功各言所欲封拔劍斫柱稍得王莽時中黄門數十人皆曉故事頗得差整數日輒復亂初三輔畏赤睂兵彊又見更始降諸縣營長皆遣使奉獻絡繹道路赤睂兵輒遮殺取其物吏民由是皆城守上書封拜者不闗盆子盆子日夜號泣詣黄門中共臥起登諸臺榭諸黄門皆哀憐之式侯知赤睂必敗自恐兄弟俱死即勸盆子歸璽綬教習為辭讓語後崇等大㑹式侯先於衆中跪言諸君共立恭弟為君徳誠深厚立且一年散亂益甚誠不足以相成恐死而無益願得兄弟退為庶人宜更求賢聖今有君而更求恐賢人不出不如空其位而博選賢聖唯諸君省察崇等謝曰皆某等罪也盆子因下牀解璽綬叩頭曰今設為縣官而為盜賊如故流聞四方莫不怨恨不復信向此皆非其人之所致也願乞骸骨以避賢兄弟備行伍必欲殺盆子以塞事者無所離死誠冀諸君相哀之耳因涕泣㱆欷崇等及郎吏數百人無不感慟崇等下座頓首曰無状負陛下請自今已後相檢敕不敢放縱因共扶盆子帶以璽綬盆子號泣不得自已崇等既罷各閉門不出鹵掠三輔聞之翕然百姓争入長安中市里且滿後二十餘日赤睂貪其財物因大放兵虜掠因縱火燒宫室三王謂謝祿曰三輔營長多欲得更始者一朝失之必合兵攻赤睂不如殺之也於是謝祿使兵殺更始式侯夜往葬之諸将勸鄧禹取長安禹曰璽書每至輒曰無與窮赤睂争鋒今吾衆雖多能戰者少前無可仰之積後無轉運之饒赤睂新拔長安財賦日盛鋒鋭不可當也盜賊羣居無終日計財貨雖多變故萬端非能堅守長安也上郡北地饒穀多畜吾且休兵北道就糧養士觀其弊乃可圖也於是引軍北行所至郡縣皆降頃之積弩将軍馮愔與車騎将軍宗歆在栒邑争權愔殺歆與禹相攻上聞之遣尚書宋廣持節喻降馮愔及更始諸将王匡胡殷成丹等廣至安邑盡誅之隗囂之奔天水復聚其衆自稱西州大将軍長安既壊士人多奔隴西囂虚已接之以谷恭范逡為師友趙秉鄭興為祭酒申屠剛杜林為治書王遵周宗楊廣王元為将帥於是竇融始據河西融字周公右扶風平陵人也融家貧少時為驃騎将軍王舜令史汎愛好交游女弟為大司空王邑小婦出入貴戚結交豪傑以任俠為名然事母兄養弱弟内行修整漢兵起融從王邑敗昆陽漢兵得新豐邑薦融可任用莽拜融為波水将軍賜金千斤引兵新豐㑹三輔内潰融降大司馬趙萌萌以融為校尉絶重之薦融於更始拜為鉅鹿太守融見更始立東方擾攘融祖父為張掖太守從祖父為䕶羌校尉從弟又嘗為武威太守累世在河西知其土俗融心樂之獨謂兄弟曰天下安危未可知河西人民殷實帶河為固張掖屬國精兵萬騎欲求為之且以避世一旦有緩急杜絶河津足以自守此真遺種處也兄弟皆勸之融乃辭讓鉅鹿求張掖屬國都尉萌為言竟得之融大喜遂将家屬而西撫養吏民結雄傑懐集羌胡河西翕然而治是時酒泉太守梁統金城太守厙鈞張掖都尉史苞酒泉都尉竺曾燉煌都尉辛彤皆州郡英俊與融有舊更始欲敗融與統等議皆以為天下擾亂未知所統河西斗絶在羌胡中不同心并力則不能自守權均力齊又不相率當推一人為将軍共全五郡觀世變動皆曰善以梁統為太守先共推之統固辭曰昔陳嬰不受王者以有老母今統内親老又徳能鮮薄不足以當督帥也竇融典兵馬又家世為河西二千石吏民所向即共推融行河西五郡大将軍事統字仲寧安定烏氏人少治春秋好法律更始時為中郎将安集涼州因為酒泉太守是時武威太守馬期張掖太守任仲二人孤立無黨融等議定移書告喻之即時解印綬避位於是梁統為武威太守史苞為張掖太守竺曽為酒泉太守辛彤為燉煌太守庫鈞為金城太守融居屬領都尉如故置従事監察而太守各治其郡尊賢養士務欲得吏民心修騎射明烽燧羌胡犯塞融躬自擊之諸郡相應莫不富殖初更始遣将軍鮑永撫河東北及并州永好文徳雖為将帥常儒服從事素重杜陵人馮衍以為謀主同心戮力以奉更始上使諫議大夫儲伯持節徴永時或傳更始猶存永奪伯節執而梏之遣使至長安知更始審被害乃哭泣盡哀罷兵與衍幅巾詣上上問永衆所在永離席曰臣事更始不能令全豈可以衆獲貴故悉罷之上不悦時魯郡多盜賊以永為魯郡太守降者數千人唯彭豐虞休各将千人稱将軍不肯降永數以恩禮曉喻之猶不移孔子闕里荆棘自除從講堂至里門外永異之召府丞魯令告曰方今世道艱難而闕里無故荆棘自除意者豈非夫子欲令太守行饗禮而誅姦惡耶乃求民好學者修學校之禮召豐等觀禮豐等持牛酒因謀欲害永永覺之手刃殺豐等擒破黨與封闗内侯於是馮衍未得官永謂之曰昔髙祖賞季布之罪誅丁公之功今遭明主亦何憂哉衍曰人有挑其鄰之妻者挑其長者長者罵之挑其少者少者報之俄而其夫死而娶其長者或謂之曰非罵汝邪曰在人之所即欲罵我在我之所即欲其罵人夫天命難知人道易守守道之臣何患死乎頃之衍為曲陽令誅劇賊郭勝等降五千餘人論功當封以讒不行甲申以故密令卓茂為太傅封褒徳侯茂字子康南陽人温而寛雅恭而有禮其行已處物在於可否之間不求備於人鄉黨老少雖行不逮茂皆受而容之常有認茂馬者茂問亡馬幾時曰有日月矣茂解馬與之曰若非公馬幸即歸我後馬主得馬詣門謝之茂以徳行舉為侍郎給事黄門遷為密令其治視民如子舉善而教口無惡言民常有言亭長受米肉者茂問之曰亭長從汝求之乎汝有事囑之受取乎将平居以恩意遺之乎民曰往遺之而受茂曰遺之而受何故言耶民曰聞君賢明使民不畏吏吏不敢取民不敢與茂曰汝為敝民矣凡人所以貴於禽獸者以其仁愛相敬也鄰伍長老嵗時致禮人道如此乃能勸愛即不如是側目相視怨憎忿怒所由生也吏固不當乗威力彊請求耳誠能禁備盜賊制禦彊暴使不相侵民有事争訟為正曲直此大功也嵗時修禮敬往相見之不亦善乎民曰茍如是律何故禁之茂曰律設大法禮順人情今我以禮教汝汝必無所怨以律治汝汝無所措手足一門之内小者可論大者可殺也且歸念之民曰誠如君言也茂教民制法皆此類也初茂到官吏民皆笑之鄰縣及府官以為下治河南太守為置守令茂治自若數年教化大行路不拾遺天下嘗蝗河南二十縣皆傷蝗獨不入密境是時王莽為安漢公置大司農六部丞勸課農桑茂遷京部丞吏民老小皆啼泣道路王莽居攝茂以病免常為郡門下掾不肯為職吏更始立以茂為侍中從至長安知更始政亂以老乞骸至是年七十餘矣袁宏曰夫帝王之道莫大於舉賢舉賢之義各有其方夫班爵以功歴試而進經常之道也若大徳竒才可以光昭王道𢎞濟生民雖在泥塗超之可也傅巗磻溪之濵頃居宰相之任自古之道也卓公之徳既已洽於民聴光武此舉所以宜為君也吳漢率耿弇等十将軍圍朱鮪於洛陽數月不下世祖以岑彭常隷於鮪也使彭説之鮪在城上彭在城下相勞如平生彭因説鮪曰赤睂已得長安更始為三王所反今公為誰守乎陛下受命平定燕趙盡有幽冀之地百姓歸心賢俊雲集誅討羣賊所向破滅今北方清靜振大兵来攻洛陽正使公有連城之守猶不足當今保一城欲何望乎鮪曰大司徒被害時鮪與其謀誠自知罪深故不敢降世祖曰夫建大事者不思小怨今降官爵可保況誅罰乎河水在此吾不食言彭以告鮪辛夘鮪降以為平狄将軍扶溝侯冬十月癸丒上都洛陽宫十一月蘇茂降既而奔劉永永以為淮陽王十二月赤睂去長安西略郡縣
