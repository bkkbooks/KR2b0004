body:
  text: 後漢紀卷二十晉袁宏撰孝質皇帝紀第二十永嘉元年春正月戊戌帝崩于玉堂是時徐揚州盜賊起太后畏懼欲徵諸國王侯到乃𤼵喪太尉李固曰帝雖幼弱乃天下之君也今日崩亡百神感動豈有臣子反共掩匿不舉哀邪昔始皇崩于沙丘胡亥趙髙隠而不發詐定璽書以賜扶蘇斂裹尸載以鮑魚二千餘里近安帝崩於葉阿母王聖耿珍閻顯等遂倍濟陰更議平原載尸驅馳還宫乃發北鄉侯薨閻后兄弟及江京等亦共隠秘卒有孫程手刃之變三主崩没臣子掩葢日不移晷旋受大禍此天下之至忌不可之至甚者也太后従之即暮發喪時清河王蒜年二十餘冣有名徳大臣歸心固意欲立謂冀曰今當立帝宜擇長年明徳付以政事願將軍審詳大計陳平周勃之引代王霍光安世之立宣帝可以為法初章帝生千乗貞王伉伉生樂安夷王胡胡生嗣王鴻鴻生建平侯續梁冀欲立幼主而専其權與太后定䇿禁中丙寅詔曰先帝早棄天下𦙍嗣幼沖何悟倉卒仍遭不造惟太后定䇿考人神之誠唯建平侯續幼而岐嶷師傅不煩年已八嵗克昌之形著于體貌春秋之義為人後者為之子其以續為孝順皇帝嗣使使持節迎續於都亭是日即皇帝位太后臨朝於是蒜罷歸國太尉固言於太后曰今東面有事役費方興新有獻陵之役百姓疲矣大行皇帝尚幼可於憲陵塋中造陵依康陵之制三分減一以舒人力従之太后以頻遭大憂政之大小悉委冢宰是以固得盡心多所匡正數與梁冀違忤由是疎之己未𦵏孝沖帝于懐陵二月乙酉大赦天下賜男子爵各有差鰥寡孤獨癃貧不能自存者粟人三斛貞婦帛人二匹三月揚州盜賊馬勉自稱皇帝伏誅夏五月丙辰太后詔曰孝殤皇帝雖不永祚即位踰年君臣禮成孝安皇帝承襲統業而前世令恭陵在康陵之上追覽前代位第之宜先後相踰昔定公追順祀禮春秋善之其令恭陵次康陵憲陵次恭陵六月鮮卑寇代郡殺掠吏民秋九月庚戌太傅趙峻薨冬十二月九江盜賊華孟自稱黒帝伏誅本初元年春正月詔曰昔堯命四子以欽天道洪範九疇休咎有象夫瑞以和降異以逆感休徵應天前聖所重頃州郡輕慢競逞殘暴陷人於罪民罹其害惡氣傷和以致災眚書曰明徳慎罰方春東作育養敬始其勅有司罪非殊死且勿案驗以崇在寛三月庚申詔曰九江廣陵二郡俱罹寇害殘夷冣甚民失農業生者饑乏死者委棄昔之為政一物不得其所若已有之今我元元嬰此饑饉方春賑貸掩骼之時其調鄰郡見穀出廪大小口各有差收𦵏骸骨悉心經營以稱朕意夏四月令將軍以下至六百石遣子詣太學試受業滿嵗課試以髙第五人補郎次第五人太子舎人六月丁巳大赦天下賜天下男子爵各有差鰥寡孤獨貧不能自存者粟人三斛貞婦帛人三匹閏月甲申帝崩于玉堂初帝雖幼知梁冀専權頗以為言冀懼後不免因行鴆毒帝暴不豫太尉固入問疾帝曰食煮餅今腹中悶得水尚可活冀曰吐利不可飲水語未絶而崩固號哭欲推醫冀不聴固復欲立清河王蒜與大鴻臚杜喬言之於朝衆皆同焉初章帝生河間王開開生蠡吾侯翼翼生志梁冀以女弟配志徵至京師㑹帝崩冀欲立志逼於李固之議至日暮而不定中常侍曹騰聞之恐夜見大將軍冀曰將軍累世攝政賔客縦横多有過差清河王嚴明若即位將軍受禍不久矣若立蠡吾侯則富貴可保冀因言太后定䇿禁中先䇿免太尉李固袁宏曰若李固者幾古之善人也將立昬闇先廢李固李固若存則明必建而天下弗違也嘗試言之曰夫稱善人者不必無一惡言惡人者不必無一善故積惡之極有時而善惡不絶善中人皆是也善不絶惡故善人務去其惡惡不絶善故惡人猶貴於善夫然故惡理常賤而善理常貴今所以為君子者以其秉善理也茍善理常貴則君子之道存也夫善殊積者物逾重義殊多者世逾貴善義之積一人之身耳非有萬物之助而天下莫敢違豈非道存故也古之帝王恐年命不長懼季世之陵遲故辨方設位明其輕重選羣臣之善以為社稷之寄葢取其道存能為天下正嗚呼善人之益豈不大哉於是司徒胡廣為太尉司空趙誡為司徒太僕袁湯為司空太后詔曰孝質皇帝𦙍嗣不遂奄忽夭昬以社稷之重考宗室之賢莫若蠡吾侯志年已十五嘉姿卓茂其立為孝順皇帝嗣庚寅大將軍持節迎于夏門亭是日即皇帝位太后臨朝太尉胡廣錄尚書事封帝弟名為都鄉侯悝為蠡吾侯秋九月尊河間孝王曰孝穆皇帝趙姬曰孝穆皇后蠡吾先侯曰孝崇皇匽姬曰孝崇博園貴人是嵗梁冀第池中船無故自覆冀以問掾朱穆穆對曰易稱利涉大川乗木舟虚災異記曰利涉大川濟渡萬民也舟舩所以濟渡萬民不絶遊戲船覆者天誡將軍以為有徳宰相當濟渡萬民於難不可長念樂身務游戲而已及帝即位太后臨朝穆素善推災異欲輔道冀以扶王室乃奏記於冀曰宜専心公門庶能斥逐邪惡明年丁亥之嵗刑徳合於乾位易稱龍戰之㑹其文曰龍戰于野其道窮也謂陽將勝而陰道負也今年九月天氣鬱冒五位四候連失正氣此互相明也天地大驗善道屬陽惡道屬陰若修正守陽摧折陰類則福従之矣穆每事不逮所好唯學傳行師言時有可試願將軍少察愚言申納諸儒而親其忠正絶其姑息夫人君不可不學當以天地順道漸漬其心宜為皇帝選置師傅及侍講者得小心忠篤敦禮之士將軍與之俱入㕘勸講授師賢法古此猶倚南山而坐平原也誰能傾之穆意欲言宦官恐冀漏泄之然不能已復附以宻記曰今年夏月暈房星明年又有小厄當急誅姦臣為天下所怨毒者以塞天咎議郎大夫之位本以試儒術髙行之士今多非其人九卿之中有非任者穆又薦名士种暠欒巴等而其後劉文等謀反事起有黄龍見沛國於是冀以穆龍戰之言為然乃請暠為従事中郎薦巴為議郎舉穆髙第為侍御史穆自以冀故吏數奏記諫曰今宦官俱用水螽為害而京師之費十倍於前河内一郡嘗調縑素綺穀纔八萬餘匹今乃十五萬匹官無見錢皆出於民民多流亡皆虚張戸口戸口既少而無貲者多當復割剥公賦重斂二千石長吏遇民如虜或賣用田宅或絶命捶楚大小無聊朝不保暮又有浮游之人矯稱賈販不良長吏妄為驅使令家人詐乘其勢此類交錯不可分别輒以託名尊府結怨取譏昔秦之末不恤四方近親市人數如此故以為安穩一旦瓦解陳項並起至於土崩近永和之末人有離心興徒𤼵使不復應命荆揚之間幾成大患幸賴順烈皇后初政清浄乃獲安寜今民心事勢復更戚戚困於永和撫安之急誠在大將軍先易二千石長吏非其人者減廬第園池之作距絶州郡貢獻内以自明外以解人之厄今日行之則今日従矣冀既貪放而復納賂遺承事國家左右宦者與之通為姦利任其子弟賔客以為刺史二千石穆又奏記曰大將軍内有貴親之固外有功業之重誠不可復枉道散財以事左右近臣宦者選舉刑賞有干典制輒率公卿詣朝堂案其罪咎則改節従訓猶影響也今反越津逾序以大事小以明事闇従其過言隨其失行天下之事受其枉戾傷損財物壊亂綱紀左右近官並以私情干擾天下雖大而民無所容足也餘尚可忍官位之事尤不可私毒害流布日夜廣逺願大將軍省廢他事十刻之間考案古今官民之極度數作趣較然可見如不早悟舟中之人皆敵國也若以穆輕愚不信其言可呼所親識古今者請徵核其實不可不誡懼有後恨冀終不悟報書云如此僕亦無一可也其言雖切然不甚罪也初大將軍商獻美人於順帝美人姓㕛字通期順帝以歸商商不敢留而出嫁之冀即遣客盜通期還㑹商薨冀行服於城西廬常與之居冀妻孫夀伺冀出即多従倉頭簒通期歸掠治之因言當上書告之冀大恐頓首請之於夀母夀亦不得已而止之遂幽閉通期冀復私召徃来生子伯玉匿不敢出夀知之使其子河南尹徹滅㕛氏家冀恐夀害伯玉常置複壁中至年十五冀被誅乃出孫夀甚美而善為妖惑性鉗忌能制禦冀冀不敢違冀愛監奴秦宫官至太倉令得出入夀所每徃来屏御者而私語遂與宫通威振百寮刺史二千石皆謁辭之冀用夀言多斥奪諸梁在位者外以為謙讓唯孫氏宗親相冒名為侍中中郎校尉守長吏者十餘人皆貪叨凶淫使私客籍屬縣豪富大家被以誹謗之罪閉獄掠笞使出錢自贖不滿意者至於死徙哀號之聲滿天下四方調發貢獻半入冀家先輸上第而乗輿乃用其次又競上禮奉贄及吏民齎貨求官請罪者道路相望多遣賔客車騎出塞交通外國致汗血馬奇珍異物因行道路發取妓女御者而所使人又乗勢横暴略人妻妾㺯人婦女毆撾吏卒與盜賊無異冀於洛陽城門内起甲第而夀於對街起宅競與冀相髙作陰陽殿連閣通房魚池釣臺梁柱門戸銅沓紵漆青瑣丹墀刻鏤為青龍白虎畫以丹青雲氣又採土築山十里九坂以象二殽窮極工匠之巧積金玉明珠充仭其中起室廬周環亦如之又多規苑囿西到𢎞農東至滎陽南及魯陽北徑河渠周旋千里諸有山藪丘麓皆樹旗大題云民不得犯又起苑於南城西繚繞數十里大興樓觀發屬縣卒徒繕治數年乃成移檄發生兔刻其毛以為識犯者罪至死又發鷹犬於邊郡部民護送驅使傳㕑具食募人求名馬至數千匹西域嘗有賈客来不知禁誤殺一兔轉相告言死者十餘人又妒害諸梁長者及諸弟不欲令與已同其不疑及蒙私遣人出獵上黨冀聞追捕其賔客一時殺三十餘人無生還者冀又起别第於城西以納姦亡命者寘其中或取良民以為奴婢名曰自賣民至千人因負勢放縦道市莫敢問者冀與夀共乗輦張羽葢飾以金銀遊戲第中賔客
