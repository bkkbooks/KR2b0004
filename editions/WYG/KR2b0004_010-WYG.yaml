front:
  text: 第十八年冬十一月丙子上臨辟雍詔天下死罪贖各有差壬寅日有蝕之詔羣臣上封事言得失是時北單于外求和親而數為邉害上使越騎司馬鄭衆使匈奴單于欲令衆拜衆不為之屈單于圍守衆欲脅服之衆拔刃以自誓單于恐乃止乃𤼵使隨衆還漢朝議復使衆報之衆䟽諫曰臣伏料北單于所欲致漢使者欲以離南單于來西域諸國耳故汲汲於致漢使使既到偃蹇自若臣愚以為於今宜且勿答南單于本來歸義者望呼韓邪之助故歸心不二烏桓慕化并力保塞今聞北單于不屈漢復通使不止恐南單于必懐疑而烏桓亦有二心單于久居漢地具知形勢萬一離析規為邉害其憂不輕今幸有渡遼之衆揚威北垂雖勿答不敢為害上不從而卒遣衆衆又上言臣前使匈奴與單于不和而今復往恐其必取勝於臣臣誠不忍持大漢信節對旃裘跪拜令以益匈奴之名損大漢之强詔不聴衆既西道路間連續上書固争上大怒追還繋廷尉獄㑹赦歸家其後帝見匈奴使來者問衆使時與單于争禮狀皆言匈奴中傳以為衆壯勇往時蘇武不能過也上乃復召衆為軍司馬稍遷大司農九年夏四月詔以公田賜貧民各有差長吏居職三年尤異者與計偕封皇子恭為靈夀王黨為重喜王十年春二月廣陵王荆有罪自殺荆上母弟也性急刻喜文法初封山陽王世祖崩荆與東海王彊書勸彊起兵彊恐懼封上其書天子秘其事徙荆為廣陵王荆謂相工曰吾貌類先帝先帝三十得天下我今亦三十可起兵未相者告吏荆自繫獄上復不忍考訊詔曰荆數年之間大罪二矣其赦荆罪不得臣其吏民荆猶不悛使巫祝詛上上使長水校尉樊鯈任隗雜治荆獄奏荆大惡當誅上怒曰諸卿以我弟故敢請誅之即我子卿等豈敢邪鯈曰天下髙皇帝之天下非陛下之天下也春秋之義君親無將將而誅之是以周公誅弟季友鴆兄臣等以荆屬託母弟陛下畱心故復請之耳如令陛下子臣等専誅之矣荆自殺上憐傷之諡曰思王封荆子元夀為廣陵侯食荆故國不得臣吏民鯈字長魚樊宏之子也建武中諸王争招致賔客好事者皆與之周旋更遣人請鯈鯈精詣於學一無所應及捕諸王客鯈不在其中世祖以是器之永平初與公卿雜定郊祀禮儀及五經異義立朝正色多所匡諫上亦敬重焉鯈弟鮪為其子賞求楚王英女敬鄉公主鯈止之曰建武時吾家並䝉榮寵一宗五侯時特進一言男可以尚主女可以配王但以臣子不當有外心不宜與藩國婚姻貴戚為宗族患故不為也今爾有一子奈何棄於楚乎鮪不從遂與楚婚是時鯈卒諡曰哀侯鯈病患困猶不忘忠悉條政不便於民者未及言而薨上遣小黄門張音問何遺言音奏焉上為之流涕以鯈兩子郴梵為郎謹于言行二十餘年未嘗被奏劾初鯈與郎承宫友善薦之于朝拜博士遷左右中郎將數納忠言守正不希茍容朝臣憚其節名聞於匈奴單于遣使來貢求見宫詔敕宫自整頓宫對曰夷狄眩名非識實也聞臣虚稱故欲見臣臣醜陋貌寢見臣必生輕賤臣不如選長大有威容者示之夏四月戊子大赦天下閏月甲午行幸南陽祠章陵祭於舊宅作雅樂奏鹿鳴天子親御塤箎以娛嘉賔十一年春正月沛王楚王濟南王東平王淮陽王中山王瑯琊王東海王來朝十二年春正月置永昌郡夏五月丙辰賜天下男子爵人二級三老孝弟力田人三級鰥寡孤獨不能自存者粟人二斛上以天下無事俗頗奢靡乃詔有司申舊章整車服乙亥司空伏恭以老病罷大司農牟融為司空是時天子勤於萬幾公卿數朝㑹輒延坐論政事融明經術善論議朝廷皆服其能天子數嗟歎以為良宰相融字子夏北海安丘人也少以名徳稱舉茂才為豐令治有異迹司徒范逡薦融忠正公方經行純備宜在本朝并上其治狀由是徵入為司𨽻校尉多所舉正百僚敬憚之數年擢遷大鴻臚大司農十三年春二月上耕于籍田賜觀者食有一諸生䝉首而言曰善哉太公之遇文王也上使人報之曰生非太公予亦非文王夏四月辛巳幸滎陽巡河渠作水門遂至太行幸上黨冬十月甲辰晦日有蝕之詔有司陳便宜靡有所諱刺史太守詳理寃獄存䘏鰥寡勉思所涖焉十二月楚王英謀反初郭后生東海恭王彊沛獻王輔濟南安王康阜陵質王延中山簡王焉隂后生明帝東平獻王蒼臨淮王衡廣陵思王荆琅邪孝王京許姬生楚王英號楚太后無寵于世祖英最小自帝為太子時英獨歸附上上特親愛之數加賞賜英好逰俠交通賔客晚節喜黄老修浮屠祠八年上臨辟雍禮畢詔天下死罪得以縑贖英遣郎中令詣彭城曰臣託在藩蔽無以率先天下過惡素積喜聞大恩謹上黄縑二十五匹白紈五匹以贖其愆楚相以聞詔曰楚王誦黄老之㣲言尚浮屠之仁慈潔齊三月與神為誓有何嫌懼而贖其罪因還其贖男子燕廣告英與顔忠王平等造圖書謀反有司奏英大逆不道請誅上以至親不忍徙丹陽涇縣湯沐邑五百户英男子為公侯王者食邑如故楚太后留楚宫婢才人鼔吹從英者無限皆乘輜軿帶持兵弩行道射獵極意歡娛遣大鴻臚持節護送英丹陽浮屠者佛也西域天竺有佛道焉佛者漢言覺將悟羣生也其教以修善慈心為主不殺生專務清浄其精者號為沙門沙門者漢言息心盖息意去欲而歸於無為也又以為人死精神不滅隨復受形生時所行善惡皆有報應故所貴行善修道以鍊精神而不已以至無為而得為佛也佛身長一丈六尺黄金色項中佩日月光變化無方無所不入故能化通萬物而大濟羣生初帝夢見金人長大項有日月光以問羣臣或曰西方有神其名曰佛其形長大乃問其道術遂於中國而圖其形像焉有經數千萬以虚無為宗苞羅精麤無所不統善為宏闊勝大之言所求在一體之内而所明在視聽之外世俗之人以為虚誕然歸於𤣥㣲深逺難得而測故王公大人觀死生報應之際莫不矍然自失是嵗匈奴頻犯塞中郎耿秉上書曰中國虚費邉陲不寧其患專在匈奴以戰去戰可也故君不可以怒而興師將不可以愠而合戰鼓之以仁義為國之寳矣天子内有圖匈奴志隂納秉言乃召入見使具陳其狀上善其言以為可任將帥拜謁者僕射每公卿論邉事秉輒預其議頃之太僕祭彤虎賁中郎將馬庾顯親侯竇固下博侯劉張好畤侯耿忠等俱見議兵事秉以為孝武時始事匈奴匈奴援引弓之類并左衽之屬故不可得而制也漢既得河西四郡及居延朔方徙民以充之根據未堅匈奴猶出為寇其後羌胡分離四郡堅固居延朔方不可傾拔虜遂失其肥饒畜兵之地惟有西域俄復内屬呼韓邪單于請款塞是故其勢易乘也今有南單于形勢相似然西域尚未内屬北虜未有舋作臣愚以為當先擊白山得伊吾破車師通使烏孫諸國以㫁其右臂未可先擊匈奴也伊吾亦有匈奴南呼衍一部破此復為折其左角觀往者漢兵出匈奴輒為亂五單于争來必不以五將出之故也今可先擊白山以觀其變撃匈奴未晩也上善秉言議者或以為今兵出白山匈奴必并兵相助又當分其東以離衆與秉計異上更然之十四年夏四月故楚王英自殺以諸侯禮𦵏之上遣中黄門視英妻子慰勞楚太后悉釋諸與英謀者而封燕廣為折姦侯初英獄起内及京師諸侯外連州郡豪傑坐死及徙者以千數而繫獄者尚數千人顔忠王平辭及隧鄉侯耿建朗陵侯臧信灌澤侯劉鯉曲成侯竇建御史寒朗治其獄奏建等未嘗與忠相見詰驗無實為平所枉疑下無辜者衆上曰建等未嘗見平忠何故引之朗曰所犯不道冀引建等以自明上曰若四侯無事何不出之而輕繫邪朗曰考之無事然恐海内發其姦者故未奏之上怒曰吏持兩端巧為其辭將下捶之朗曰願一言而死上曰誰共作章朗曰臣獨作之上曰何以不與三府議朗曰臣自知當族滅不敢多汙良善上曰何故族滅朗曰臣考事一年不能窮盡姦狀反為罪人訟自知無狀雖族滅不恨夫陷人死地復無憂責是以考一連十考十連百公卿每朝陛下問得失皆言天下之惡禍及九族陛下大恩裁止於身天下幸甚歸舎皆仰屋竊歎雖口不言指揮可知皆謂多寃獄莫敢言者今建等無驗而陛下殺之誠願留神省察得其情實使刑者不怨死者不恨故臣冒死懇言誠不敢為私上深納朗言自幸洛陽寺出者千餘人天下即大雨是時楚獄繋者數千人天子盛怒吏治之急自誣死者甚衆於是有司舉能治劇者以袁安為楚郡太守安之郡不入府舎遥至獄所案騐無實者條上出之府丞掾吏皆叩頭争之曰不可安曰如有不合太守當坐之不以相及也遂别具奏㑹帝感悟即報許得出四百餘家頃之徵入為河南尹召入見上問以考楚事名簿甚備安具奏對無所遺失上以為能也問安本自何為官對曰臣本諸生上曰以尹故吏也何意諸生邪安為河南尹十年號為嚴明然未嘗加罪鞠人常稱曰凡士學問上欲望宰相下則牧守錮人於聖代尹所不為也其下聞之皆自激厲名重朝廷安字邵公汝南宛人嚴重有威州里敬之為縣功曹奉檄從事從事因安致書於令安曰公事邪則有郵驛今因功曹是有私也辭不肯受從事瞿然而止舉孝亷為郎謁者隂平長任城令所在吏民畏而愛之夏五月封故廣陵王荆子六人為列侯詔曰執金吾魴侍衛歴年數進忠言其還爵土封為楊邑矦封竇融孫嘉為安豐侯十五年春二月庚子令天下亡命贖各有差行幸彭城止楚王館悲慟左右百官凄然三月行幸琅邪及魯祠孔子及七十二弟子幸東平定陶祠定陶恭王夏四月封皇子暢為汝南王建為千乘王羨為陳畱王衍為下邳王昞為常山王長為濟隂王徙重喜王黨為樂城王賜天下男子爵人三級民酺五日上使越騎校尉桓郁郎中張酺授太子經二人朝夕侍講勸以經學是時太子家頗為奢侈酺每正諫甚見嚴憚㑹平陽公主薨太子同生也哀戚過禮酺以為太子舉措宜動合禮度於是上疏曰臣伏見皇太子仁厚寛明發言髙逺卓然絶異非人所能及也今平陽公主薨悲哀發中形體骨立恩愛惻隠世希是見臣愚淺不識大體以為宜選名儒髙行以充師傅問訊起居之日太傅時賜讌語所以宣徳音以成聖徳也侍中丁鴻仁而有讓達於從政謁者費惲資性敦篤遵守法度如並侍左右必能𤼵起㣲意增廣徽音者也乙巳大赦天下冬十一月乙夘太白入于月其占曰大將戮死不出三年人主崩本志稱昔庖犠氏之王天下仰則觀象於天俯則觀法於地然則天地設位而星辰運度備矣易曰天垂象聖人則之星官之書始自黄帝至髙陽氏使南正重司天北正黎司地唐虞之時則羲和氏掌焉夏有昆吾殷有巫咸周有史佚皆職典預覩成敗以佐時政者也秦燔詩書愚百姓六經典籍殘為灰燼星官之書全而不毁漢興司馬談父子以世家重黎氏之後著天官書班固序漢書又有天文志乙巳大赦天下匈奴寇河西十六年春天子遂前議遣奉車都尉竇固駙馬都尉耿秉太僕祭彤渡遼將軍吳常各將萬騎撃匈奴固出燉煌崑崙塞擊南呼衍王出塞千五百里到蒲類海破白山走呼衍王斬首千餘級秉出張掖居延塞擊匈林王到沭樓山渡漠六百里餘絶無水草得生口辭云匈林王轉北逐水草秉欲將輕騎追之都尉秦彭止之而還彤常與南單于左賢王信出朔方髙闕塞擊温禹犢王於涿邪山出塞九百餘里見小山為信所誤云是涿邪王山無所得而還是時秉獨有功吳常抵罪彤下獄免彤性剛嚴行道不與信相得故為信所誤彤自恨無功出獄數日歐血死敕其子曰吾奉使不稱㣲功不立身死慙恨義不可以受賞賜汝等齎兵馬詣邉乞效死前行以副吾心其子逢上疏陳彤遺言上方任彤聞之嗟歎者良久子㕘從擊車師有功遷遼東太守烏丸鮮卑追思彤不已每朝京師輒過拜彤塚仰天號泣彤字次孫潁陽人少孤值更始之際天下大亂盜賊縱横野無煙火而彤常在墓側盡其哀心賊每過見其號泣不畏死亡皆不犯也後隨從兄遵從世祖世祖以彤為黄門郎常宿衛左右及遵薨無子追傷之以彤為偃師長令附近遵墓四時祀之遷襄賁令皆有名迹詔書勉勵增秩一等賜縑百匹及在遼東著績北邉彤氣勇過人開弓三百斤多恩信善權略士卒争為効力永平初胡夷内附野無風塵乃悉罷邉兵而徵彤為太僕卿彤在遼東十餘年無十金之資天下知其清拜日賜錢百萬馬三匹衣被刀劍下至居家器物無不備焉每見上輒嗟嘆以為可屬以重任嘗謂左右曰太僕吾之禦侮者也竇固之破白山遣從事郭恂假司馬班超使西域超到鄯善鄯善王廣事超禮敬甚備一旦忽疎超謂官屬曰寧覺廣禮意益不如前日乎官屬曰胡人不能久變無他故超曰明者觀於未萌況兆已見此必有北虜使來故令其疑耳乃召侍胡逆問曰匈奴使到日何故不白侍胡怖恐曰到已三日去此三十里超使閉侍胡悉㑹所將吏士三十六人大飲之酒酣超激怒之曰卿曹與我俱在絶域欲成大功以求富貴今虜使到纔數日而廣禮意即廢如令鄯善收吾屬送匈奴骸骨棄捐為豺狼食為之奈何官屬咸曰今既在危亡之地死生從司馬超復曰丈夫不入虎穴不得虎子寧我圖人不為人所圖當今之計獨有夜圍虜使放火攻之使不知我多少震驚可盡殄也滅此虜則鄯善破膽功成事立矣不然盡為所擒悔將何及皆曰當與從事議之超怒曰從事文墨吏聞此必恐而謀泄謀泄為鄯善所呑死而無益非壯士也衆曰善超夜將吏士奔之令十人持鼔餘皆兵弩乃順風縱火擊鼓大呼虜驚走超手殺三人吏士斬首數十級餘悉焚死明日具告恂恂大驚又内恐超獨擅其功超曰本與掾俱受任此一家事掾雖不行超何心獨擅之大小當共其禍福恂喜超乃召鄯善王廣示以虜使首舉國怖慄超告以漢家威徳自今以後勿復與北虜通廣叩頭樂屬漢無二心超還入塞奉虜使首詣固固具上超前後功詔以超為司馬賜布二百匹遣超詣于寘國欲增益其吏士超自請願但將所從三十六人超曰于寘大國且逺今欲出萬死立尺寸之功雖將數百人往無益於彊如有不虞多益為累耳遂出塞是時于寘王廣徳新破車師生得其王匈奴遣節使監䕶其國超至于寘于寘俗信巫疑事輒巫決之超到數日廣徳以匈奴使在其國禮意不備未有定心㑹巫言神怒何故向漢背匈奴又言漢使有馬急取以祠神神怒乃解廣徳遣國相私來比白超願請馬以祠神超曰馬可得令巫自來受之有頃巫到超叱吏執之遂㫁巫頭收私來比鞭笞數百遣持巫頭往責讓廣徳廣徳聞超前於鄯善誅虜使納其貢恐怖遂舉兵攻殺匈奴使五十餘人降超超重賜王以鎮撫之因留于寘竟冬先是龜茲王建為匈奴所立倚其威攻破疎勒殺其王忠誅貴臣因立左候兜題為疎勒王超令廣徳發專驛自到疎勒去兜題所治盤槖城九十里遣吏陳憲等往降之敇兜題本非疎勒種人如不降便刼之憲既見兜題無降意又輕其單弱無備憲遂前刼縛兜題左右皆驚走留二人守之憲馳白超超即往悉召疎勒掾吏告以龜茲為匈奴擊疎勒盡殺汝貴人而立兜題兜題非汝本種今漢使來欲立故王種為汝除害無得恐怖衆皆喜超亦求索故王近屬得兄榆勒立之更名忠國中大悦超問忠及官屬當殺兜題邪生遣之邪咸曰當殺之超曰殺之無益於事當令龜茲知漢威徳遂解遣之疎勒由是與龜茲結怨専心向漢超守盤槖城忠據疎勒城超字仲升彪之少子也俶儻不修小節而内行甚謹家貧嘗傭寫書投筆而歎曰丈夫當為傅介子張博望立功絶域以取封侯耳安能久執刀筆乎坐者笑之超曰小子安知壯士之志哉行遇相者謂超曰君布衣諸生耳而相法當封侯萬里之外超問其故相者曰君燕頷虎頸飛而食肉以此知之秋七月淮南王延謀反徙為阜陵王食二縣九月丁夘令罪死囚徒非大逆無道減死一等徙戍邉北海王睦薨諡曰敬王睦少好學世祖器之上為太子時數侍讌㑹入則談論接席出則逰觀同輿甚見親禮是時法􅃠尚疎諸國得通賔客睦不逺千里交結知識宿徳名儒莫不造其門睦虚已折節以禮接之由是名聲籍甚自為王後法禁益峻睦乃謝絶賔客放心音樂嵗終遣使朝京師睦召使者問曰朝廷設問寡人大夫何辭以對使者曰大王忠孝慈仁敬賢樂士臣雖螻螘敢不實對王曰吁危我哉是乃孤幼時進趨之行也大夫其對以孤寵爵以來志意衰墮聲色是娛犬馬是好使者受命而行其抑絶名迹深識機㣲如此睦父靖王興薨悉推財産與諸弟雖車服珍寳皆不以介意有要然後隨以金帛贖之能屬文善史書作春秋指意終始論及賦頌數十篇病臨困帝以驛馬詔睦為草書尺牘十首十七年秋八月丙寅詔宥武威張掖酒泉燉煌囚繫右趾以下冬十月竇固耿秉將萬餘騎出擊車師王請降於是固奏置西域都護戊巳校尉陳穆為都護耿恭為戊校尉闗寵為己校尉恭屯金蒲城寵屯栁中城相去千餘里恭乃移檄烏孫大昆彌宣喻威徳皆遣使獻馬求入侍天子恭字伯宗況之孫性慷慨多大略好將帥之事十八年春二月詔固等罷兵還京師三月北匈奴左鹿蠡王將二萬騎率焉耆龜茲擊車師王安得死焉耆龜茲殺都護陳穆副校尉郭恂遂攻金蒲城耿恭令軍士皆持滿勿得發告匈奴曰漢家神箭所中創中皆沸於是乃發弩皆應弦而倒虜中矢者創中沸大驚曰漢神可畏遂皆遁去恭以疏勒傍有水去王忠所據近引兵居之匈奴後來攻恭恭募先登士四十人出城奔斬首數十級匈奴乃相與議曰前疏勒王守此城攻不能下絶其澗水即降因絶澗水吏士無飲窮困至笮馬糞汁飲之恭於是城中穿井十五丈不得水吏士失色恭歎曰昔蘇武困於北海猶能奮節況恭擁兵近道而不䝉祐哉聞貳師將軍拔佩刀以刺山而飛泉湧出今漢神明豈有當窮者乎乃整衣服向井再拜為吏士禱水身自率士挽籠有頃飛泉湧出大得水吏士驚喜皆稱萬嵗於是將水以示虜虜兵大驚而去丁亥令天下亡命者贖罪各有差夏四月賜天下男子爵人三級鰥寡孤獨不能自存者粟人三斛秋八月壬子帝崩于東宫遺詔不起寢廟藏主于世祖廟更衣臺是日太子即皇帝位年十八壬戌𦵏孝明皇帝于顯節陵冬十月乙未大赦天下賜男子爵人二級其為人父後者及三老孝弟力田人三級鰥寡孤獨貧不能自存者粟人三斛以衛尉趙喜為太傅司空牟融為太尉錄尚書事戊戌蜀郡太守第五倫為司空倫字伯魚京兆長陵人其先齊諸田徙充園陵宗族多故以次第為氏倫好黄老以孝行稱王莽末天下兵起宗族及閭里聞倫勇而有義争往附之倫相率厲堅壘壁銅馬赤眉數十軰皆不能下時米石萬錢人相食倫獨收養孤子外孫分糧共食死生相守鄉里以此賢之太守鮮于褒見而異之署倫為吏後褒坐事徵把倫臂曰恨相知晩㑹蓋延為京兆尹事多犯法倫數諫争不合遂沈滯曹吏頃之鮮于褒左遷為髙唐令倫去吏荷擔往候褒褒引倫升堂屬其妻子復歸縣為嗇夫倫以久宦不達乃將家屬客河東變易姓字自稱王伯春常載鹽往來太原上黨每所止客舎輒為埽除而去道上號曰道士久之鮮于褒為謁者從車駕至長安時閻興為京兆尹褒言倫於興興聘求倫倫復出為郡吏倫每讀詔書常歎曰此真聖主也當何由得一見也等輩笑之曰説將尚不下安能動萬乘邪倫曰未遇知己道不同故耳舉孝亷除郎中補淮南王醫工長隨王朝京師官屬得㑹見世祖因問政事倫具言治道所宜世祖大恱明日復召至日夕世祖謂倫曰聞卿為吏榜婦公不過從兄飯寧有之邪倫對曰臣三娶妻皆無父臣遭饑饉米一石萬錢不敢妄過人飯世祖曰為市掾人有遺卿母一笥餅者卿從外來見之奪母探口中餅出信有之乎倫曰實無此衆人以臣愚蔽故為生此語有詔拜倫為扶夷長至苑遷㑹稽太守為政清浄不煩化行於民性節儉雖為二千石常衣布襦自斬馬草妻子自炊㑹稽俗信淫祀皆以牛羊請禱是以財盡於鬼神産盡於祭祀或家貧不能以時禱祀至諱言牛不敢食其肉發病且死先為牛鳴其畏懼如此倫乃禁絶之掾吏皆請諫不可倫曰夫建功立事在於為政為政當信經義經言淫祀無福非其鬼而祭之諂也今鬼神而祭之有知不妄飲食於民間使其無知又何能禍人遂移書屬縣曉喻百姓民不得有非分之祀違者案論之有屠牛輒行罰民初恐怖頗揺動不安倫敕之愈急後遂㫁絶百姓遂以安業永平中坐事徵百姓老小闐府門皆攀車啼呼朝發至日中才行五里倫乃止亭舎宻乘船去吏民上書守闕千餘人是時上方案梁松事多為訟寃者上患之有詔公車諸為梁氏及㑹稽太守書皆勿受倫免歸田里躬耕以自給起家守宕渠令遷蜀郡太守蜀地肥饒民多富實掾吏官屬皆鮮車肥馬倫欲革化之乃舉貧而有志者多至九卿郡守名為知人上新即位倫以逺郡入為三司舉清能也初耿恭被圍明帝怒甚將遣兵救之師未出而帝崩匈奴聞中國有喪遂復圍之糧盡乃煮弩筋食之恭與士卒同厲以恩義皆無二心匈奴遣使謂恭曰空於城中餓死為何不早降降者封為白屋侯妻以子女恭手劍殺其使相拒數月吏士消盡戊巳校尉闗寵上書求救事下公卿司空第五倫以為不可救司徒鮑昱以為使人於死亡之地有急而棄之外示弱戎夷内傷死難之臣此際若不救之後或邉上有警陛下如何使人也又戊巳校尉纔十數人匈奴圍之數十日不下是其弱效兵家先名後實可令燉煌酒泉太守各將精騎多其幡幟倍道兼行以赴其急匈奴疲困之兵必走乃使征西將軍耿秉屯酒泉發燉煌酒泉兵擊車師甲辰晦日有食之天子避正殿不聴事詔曰朕以眇年奉承宗祖不能聿修洪業以致災眚思惟厥咎在予一人又羣司百僚其勉修所職各貢忠誠其上封事靡有所諱是嵗兖豫徐州民被水旱災害令勿收田租以見穀廩賜貧民焉
