body:
  text: 後漢紀卷二十二晉袁宏撰孝桓皇帝紀第二十二四年春正月辛丑南宫嘉徳殿火二月壬申武庫火夏四月甲寅河間孝王開子博為任城王五月有星孛于大辰丁夘源陵長夀門火六月羌寇金城安定漢陽武威殺吏民中郎將皇甫規討羌大破之先是涼州刺史郭宏漢陽太守趙喜安定太守孫俊皆不任職倚恃貴戚有司不敢糺規悉條奏其罪羌人聞之翕然乃喜一時降者二十餘萬口徵拜議郎論功未畢常侍左悺私求于規規執正不許悺遂以餘寇不絶收規下獄學生張鳳等三百餘人守闕訟規終不省規竟坐論㑹赦復徵為尚書頃之復為中郎將討梁益叛羌有功封喜城侯固讓不受規字威明安定朝那人初譏切梁氏謝病歸教授十餘年冀既誅旬月之間禮辟五至皆不就公車徵乃起為泰山太守規好推賢達士太傅陳蕃太尉楊秉長樂少府李膺太守張奐皆規所教授致顯名于時秋八月占賣闗内侯羌冦張掖酒泉尚書令陳蕃薦五處士曰臣聞善人者天地之紀治之所由也詩云思皇多士生此王國天誕俊乂為陛下出當輔明時左右大業者也處士豫章徐穉彭城姜肱汝南袁閎京兆韋著潁川李曇徳行純偹著于民聽宜登論道協亮天工終能翼宣威徳増光日月者也詔公車偹禮徵皆辭疾不至穉字孺子豫章南昌人也家貧嘗自耕稼非其衣不服非其力不食恭儉義讓非禮不言所居服其徳化道不拾遺陳蕃嘗為豫章太守以禮請署功曹穉為之起既謁而退蕃歸之粟受而分諸隣里舉有道起家拜太原太守皆不就諸公所辟雖不就其有死䘮者負笈徒步千里赴弔斗酒隻雞藉以白茅酹畢便退䘮主不得知也初穉少年逰國學中江夏黄瓊敎授于家故穉從之諮訪大義瓊後仕進位至三司穉絶不復交及瓊薨當葬穉乃往赴弔進酹哀哭而去人莫知者時天下名士四方逺近無不㑹者各言聞豫章徐孺子来何不相見推問䘮宰曰頃寧有書生來邪對曰先時有一書生來衣麤薄而哭之哀不記姓字僉曰必孺子也于是推選能言語者陳留茅季偉候相相見酤酒市肉穉為飲食季偉請國家之事穉不答更問稼穡之事穉乃答之季偉還為諸君說之或曰孔子云可與言而不與言失人穉其失人乎郭林宗曰不如君言也孺子之為人也清潔髙㢘饑不可得食寒不可得衣而為季偉飲酒食肉此為已知季偉之賢故也所以不答國事者是其智可及其愚不可及也何不知之乎是時宦豎専政漢室寖亂林宗周旋京師誨誘不息穉以書誡之曰大木將顛非一繩所維何為棲棲不遑寧處林宗感悟曰謹拜斯言以為師表姜肱字伯淮彭城廣戚人隠居静處非義不行敬奉舊老訓導後進常與小弟季江俱行為盜所劫欲殺其弟肱曰弟年穉弱父母所矜又未聘娶願自殺以濟家弟季江復言曰兄年徳在前家之英俊何可害之不如殺我我頑闇生無益于物沒不損于数乞自受戮以代兄命二人各争死于路盜戢刃曰二君所謂義士棄物而去肱車中尚有數千錢在席下盜不見也使從者追以與之盜感之亦復不取肱以物已歴盜手因以付亭長委去舉有道方正皆不就袁閎字夏甫太傅安之𤣥孫自安至閎四世三公貴傾天下閎𤣥静履貞不慕榮宦身安茅茨妻子御糟糠父為彭城太守䘮官閎兄弟五人常步行随柩車號泣晝夜從叔逢隗並為公輔前後贈遺一無所受二公忿之至于州府辟召州郡禮命皆不就韋著字休明京兆杜陵人隠居講授不修世務李曇字子雲潁川陽翟人少䘮父事繼母繼母酷烈曇奉逾謹率妻子執勤苦不以為怨曇身耕農以奉供養得四時珍玩未嘗不先拜而後進母鄉里有父母者宗其孝行以為法度徵聘不應唯以奉親為歡夏四月戊辰虎賁掖門火五月康陵園火武陵蠻夷反車騎將軍馮緄討之緄上書曰夫勢得容姦伯夷可疑不得容姦盜跖可信樂羊伐中山反而語功文侯示以謗書一箧願請中常侍一人監軍財費尚書朱穆奏曰臣聞出郊之事將軍制之所以崇威信合事宜也即緄有嫌不當荷任即緄無嫌義不見疑樂羊戰國陪臣猶賴見信之主以全其功況唐虞之朝而有猜嫌之事哉緄設虚端以自阻衞為臣不忠帝寢其奏穆又上書言漢故事中常侍或用士人建武以来乃悉用宦者延平已来寖益貴盛假貂璫之飾任常伯之職天朝政事一更其手權傾天下寵逼人主子弟親戚並荷職任放濫驕逸莫能禁禦無行之徒媚求官爵恃勢驕寵漁食百姓臣以為可皆遣罷率由舊章博選天下清純之士達國體者以補其虚即陛下可為堯舜之君衆僚皆為稷卨之臣矣上不從穆後復見口陳奏上不悦穆伏不起左右叱穆出于是宦者更共稱詔以詰讓穆憤激發疽而卒公卿以穆立節忠清守死善道宜䝉旌寵以勸忠勤乃追贈益州刺史穆字公叔南陽宛人初為冀州刺史始濟河長史解印去者四十餘人中常侍趙忠䘮父斂為璵璠玉匣穆下郡考正乃至發墓視尸其家稱寃自訴穆坐徵詣廷尉髠輸左校後得原歸家頃之朝臣多為穆訟寃由是徵命議郎尚書十一月武陵蠻夷降六年春正月戊午司徒种暠薨大鴻臚許栩為司徒暠字景伯河南洛陽人父早亡有財三千萬暠皆以賑鄉里貧者當時豪貴莫不遂識知之年四十四縣始召為門下吏時河南尹田歆外甥王諶名知人歆謂之曰河南當舉六孝㢘皆得貴人書命不宜相違欲以五副之自舉一清名堪成就者上以報國下以託子孫汝助我索之諶答曰知臣莫若君君為二千石當清察郡中詢于賢良諶安得知之歆曰郡中所送固凡庸耳欲因汝之明求人之所不知而有奇者耳明日諶東出送客駐車太陽郭裏見暠還語歆曰為君得孝㢘矣問居何山答曰洛陽門下吏也歆笑曰當得隠滯之夫乃洛陽吏邪答曰夫異士必居山谷但其居處異耳徳未必有也處人間而有異而人不知已獨知之乃奇耳若不相信可召而與之言歆便于府召見于庭中詰問職事長吏所施行暠分别具對皆有條理乃署主簿功曹舉孝亷由是知名二月戊戌大赦天下夏四月辛亥康陵東署大火秋七月甲午平陵園寢火十月上廣城校獵光禄勲陳蕃上書諫曰臣聞人主有事于苑囿唯西郊順時講武以殺屬助祭盡孝敬之道也違是則為逸逰肆樂情意故臯陶誡舜曰無敢逰佚周公誡成王曰無盤逰于田虞舜成王猶有此誡況徳不及二主者哉當今兵戈未戢是陛下焦心坐而待旦之時也而不以是乃揚旌旗之耀騁輿馬之觀非聖賢恤民之意者也上不納七年春二月太尉黄瓊薨瓊字世英江夏安陸人清貞守正進止必以禮居宰相位㢘平公正數納讜言為朝廷所重上亦愍惜焉贈車騎將軍邟鄉侯印綬諡曰昭侯有孫曰琬三月癸亥殞石於右扶風太常楊秉為太尉是時中常侍侯覽具瑗驕縱最甚選舉不實政以賄成秉奏覽等佞諂便辟竊國權柄召樹姦黨賊害忠良請免官理罪奏入尚書詰秉曰夫設官分職各有司存三公統外御史察内今越左右何所依據其開公具對秉便對曰除君之惡惟力是視鄧通失禮申屠嘉召而責讓文帝從而請之漢故事三公鼎司無所不統尚書不能詰上不得已乃免覽官瑗削國秉於是奏免刺史郡守以下二十餘人皆民之蠧也夏四月乙丑封皇后弟鄧庾為育陽侯秋九月武陵蠻夷叛寇掠數郡荆州刺史度尚討之將戰尚召治中别駕曰今後無轉輸前有彊敵吏士捷獲已多緩之則不肯力戰急之則事情切迫􅅗有逃竄今與諸君俱處虎口勝則功成敗則無餘為之奈何諸從事者莫知所出尚宣言曰今兵實少未可進當復須諸郡兵至且各休息聽其射獵軍中喜踊大小皆出尚密呼所親燔其積聚獵者還莫不涕泣尚使人慰勞曰蠻人多寶足富數世諸卿但不并力耳所亡何足介意其明旦秣馬蓐食徑赴屯城賊見尚晏然不圗其吏士憤激遂克殄之封尚右鄉侯除一子為郎尚字博平山陽湖陸人也初為上虞長糾摘姦伏縣中謂之神明擢門下書佐朱俊謂之幹世之才俊後顯名終如尚言縣有孝女曹娥年十四父旴溺于江不得尸娥號慕不已遂赴江而死前後長吏莫有紀者尚至官改葬娥樹碑表墓以彰孝行縣民故洛陽市長淳于翼學問淵深大儒舊名常隠于田里希見長吏尚往候之晨到其門翼不即相見主簿曰還不聽停車待之翼晡乃見尚尚宗其道徳極談乃退其優賢表善皆類此也冬十月行幸章陵祠舊宅遂有事于陵廟戊辰行幸于雲夢臨水祠湖陽新野公主張敬侯魯哀公廟是時勃海王悝驕慢僣侈不奉法度見上無子隂有嗣漢之望北軍中候史弼上疏曰臣聞帝王之於親戚愛之雖隆必示之以威禮寵之雖貴必示之以法度如是則和親之道興骨肉之情固昔襄王恣甘昭公孝景皇帝驕梁孝王二弟階寵卒用悖慢周有播蕩之禍漢有袁盎之變竊聞勃海王悝恃至親之屬藉偏私之愛有僣慢之心頗不用制度外聚輕薄不逞之徒内荒酒色出入無常所與羣居皆家之棄子朝之斥臣有口無行必有羊勝伍被之類州司不敢彈糾𫝊相不能匡輔陛下寛仁隆於友于之義不忍遏絶恐遂滋蔓為害彌大乞露臣奏宣示百僚使議于朝明言其失然後詔公卿平處其法法決罪定乃下不忍之詔臣下固執然後少有所許如是則聖主無傷親之議勃海長有享國之祚不然懼大獄將興使者相望于道矣上以至親不問其事弼字公謙陳留考城人歴職忠謇無所傾撓自尚書為平原太守詔書下諸郡察黨人時所在怖懼皆有所舉多至數千人弼獨上言無黨人從事主者坐問責曰詔書憎嫉黨人極懇至諸郡皆有平原何獨無弼對曰先王疆理天下畫為九壤物土不同風俗亦異他郡自有平原自無胡可相比若趨諾詔書誣陷忠良平原之人皆為黨乎從事大怒奏弼罪以贖免遷河東太守弼初至郡敕門下有請一無所通常侍侯覽遣諸生齎書求假鹽税及有所屬門長不為通生詐稱自言者以見弼弼怒收付獄即日考殺之覽後以誣弼謗誹朝政徵詣廷尉論棄市平原吏民走詣闕訟弼得減死一等刑竟歸田里後數為公卿所薦拜彭城相為政務抑豪强雖有縦放然豪右斂手小民有罪率多恩貸八年春正月使中常侍左悺之苦祠老子上始好神仙之事勃海王悝謀反徙為定陶王丙申晦日有食之詔公卿校尉舉賢良方正各一人河南劉淑對曰臣聞立天之道曰隂與陽立人之道曰仁與義故夫婦正則父子親父子親則君臣通君臣通則仁義立仁義立則隂陽和而風雨時矣夫吉凶在人水旱由政故勢在臣下則地震坤裂下情不通則日月失明百姓怨恨則水旱暴興主上驕淫則澤不下流由此觀之君其綱也臣其紀也綱紀正則萬目張君臣正則萬國理故能父慈子孝夫信婦貞兄愛弟順如此則隂陽和風雨時萬物得所矣癸未廢皇后鄧氏后驕忌嘗與上所幸郭貴人更相譖訢由是故以廢憂死親屬皆免歸本郡三月辛巳大赦天下夏四月丁巳壊諸淫祀壬戌河水清五月丙戌太尉楊秉薨秉字叔節少𫝊父業隠居教授三十餘年乃應司空之辟稍遷刺史二千石所歴皆有政績雖二公之子經歴州郡嘗布衣蔬食老而不改在公卿位朝廷每有得失便盡心正諫退而削草雖子弟不知也秉不飲酒早䘮夫人遂不復娶所在以神明稱嘗曰我有三不惑財酒色有子曰賜亦顯名儒行六月匈奴寇邊郎將度尚撃之九月京師地震冬十月丙寅太中大夫陳蕃為太尉蕃讓曰不僭不忘率由舊章臣不如太常胡廣齊七政訓五典臣不如議郎王暢文武兼資折衝萬里臣不如弛刑司𨽻李膺上不許蕃又上書曰臣聞昔齊桓公任管仲將正諸侯先治政令今寇賊在外四肢之疾耳臣竊寢不能寐食不能飽憂陛下内政未治忠言日疎前梁冀五侯弄權天啓陛下收而戮之當時天下號為小清其前監未逺旋起覆車之軌矣往年地動日蝕火災皆隂盛之應願陛下割塞左右豫政之原引納尚書朝省之事簡練髙潔斥退佞邪如此則天和于上地洽于下矣從陛下踐祚以来大臣誰敢舉左右之罪往者申屠嘉召鄧通文帝遣詣嘉府乃從而請之三公之職何所不統但今左右驕忿欲令三公不得舉筆臣蕃今擢自閭閻特為陛下日月所照奈何受恩如臣而當避難茍生不敢正言陛下雖厭臣毒言人臣有自勉强書奏上不悦愈以疾蕃辛巳立皇后竇氏初憲之誅家屬廢為庶民武字㳺平少有學行常閒居大澤不交世務諸生自逺方來授業百餘人名聞闗西武生五男二女長男紹次機次恪長女妙即后也上以武三輔大族武有盛名后入掖庭逾月立為皇后武甚不樂輿疾至京師拜武為特進城門校尉封槐里侯紹為虎賁中郎將武乃稱疾篤固辭爵位勃海盜賊盖登自稱太上皇帝伏誅十二月使中常侍管霸之苦祀老子九年春正月沛國盜賊戴異自稱上皇帝伏誅辛酉太常胡廣為司徒三月辛巳京師夜有火光轉相驚譟夏四月庚午河水清平原人襄楷詣闕上書曰臣聞天不言者以文象設教臣竊見往年五月熒惑入紫微犯帝座其閏月太白犯房心於占天子凶三月洛陽城中夜無故有火光人聲正喧於占皆不出三年天子當之春夏已來皆有繁霜皆用刑酷急不當罪使之然也自陛下即位以來誅寇氏孫氏鄧氏其從坐者非一李雲之死天下知其寃也自漢興以來未有諫主被誅用刑太深如今者也昔文王能以一妻享十子之祚今陛下宫女千人不如文王之一妻者明刑重而無徳也臣聞布穀聞於孟夏蟋蟀吟於始秋物有微而至信人有賤而必忠臣雖極賤思效愚誠願賜清閒極盡所言上即詔尚書召問楷曰臣聞古者本無宦臣孝武末春秋髙數逰後宫始置之耳後稍見任至孝順帝時遂益昌熾也案天市内宦者四星不在太微中而在市中明宦者但當侍不得預内今乃處古常伯之位決謀扵中傾動内外恐非天意也天子以楷章及對下有司尚書奏自古有宦者之官非近世所置漢初張澤為大謁者佐絳侯孝文帝使趙談參乗而子孫昌盛今楷不陳損益而務析言破律違背經義偽託神靈扵是論楷司寇戊寅特進竇武為大將軍武移疾洛陽都亭固讓至于數十詔公車勿復通章武惶恐不得已就職在公肅而不猛其所交友若陳仲舉李元禮等皆為之議論而訪政事焉妻子惡衣服車馬茍全而已卑身正己率宗族内外僮僕莫敢違法者六月庚午祀老子濯龍中用夜郊而樂鮮卑烏孫寇邊匈奴中郎將張奐撃降之時自宦者専權在位子弟親屬及茍進之士連結依附以取榮寵乗勢肆意陵暴天下扵是善人君子懼人倫虧廢發憤忘難初陽翟令張輿黄門張讓弟也多殺無辜贓餘千金李膺初為河南尹收輿考殺之尚書詰膺曰尹視事無幾而多殺伐乎膺對曰昔孔子為魯司寇七日誅少正卯于兩觀之下今臣列官已積二旬私懼稽留為􅄽反獲速疾之譏膚受之愬以闗聖聼自知罪死期不旋踵然臣愚計乞留五月尅殄元惡然後退就湯鑊始生之願也上不省論輸左校頃之起家為司𨽻校尉振綱直䋲多所摧戮河東太守單安河内太守徐盛中常侍單超徐璜之弟也憑寵干紀瀆貨害政沛國朱寓嘗為司𨽻校尉奏安盛曰此等皆宫豎昆叔刀鋸之餘横䝉恩私剖符三河不能思展命力以答天地敢張豺狼之口吞噬百姓之命罪深璺重人鬼同疾臣銜命操斤翦其兇醜輒考核􅂍罪事皆伏上詔安盛廷尉治罪汝南人范滂字孟博郡召為功曹即褰衣就車急於救時也進善退惡風教肅然郎中不便者咸共疾之所舉者謂之朋黨後為太尉黄瓊所辟登車攬轡有澄清天下之志受詔使冀州守令聞滂名其有􅂍汙未發者皆解印綬去滂舉刺史二千石二十餘人罪惡者皆權豪之黨也尚書詰滂曰所舉無乃猥多恐有寃疑其更詳核勿拘于前滂對曰臣之所舉自非饕穢姦罪豈以汚臣簡札臣以㑹日促迫故先舉所聞其未審者方當參實以除凶類臣聞農勤于除草故穀稼豐茂忠臣務在除姦故王道肅清滂覩時方艱難知其志不行乃投刺而去扵是中人恥懼懐謀害正矣山陽人張儉字元節以正直知州舉秀才刺史非其人謝病不起太守翟超臨郡請為東部督郵儉解巾應之儉舉劾中常侍侯覽前後請奪民田三百餘頃第舍十六區皆髙樓四周連閣洞殿馳道周旋類于宫省豫作夀冢石椁雙闕髙十餘丈以準陵廟破人家居發掘冢墓及虜掠良人妻婦女皆應沒入儉比上書為覽所遮截卒不得上儉行歩至平陵逢覽母乗軒道從盈衢儉官屬呵不避路儉按劒怒曰何等女子干督此非賊邪使吏卒收覽母殺之追擒覽家屬賓客死者百餘人皆僵尸道路伐其園宅井堙木刋雞犬器物悉無餘類覽素佞行稱寃于上曰母及親屬無罪横為儉所殘害皆大將軍竇武前太尉掾范滂所諷上以儉郡吏不先請奏擅殺無辜徵付廷尉詔收儉儉乃亾命逃竄吏捕之急儉與魯國孔襃有舊後事發覺儉走至東萊李篤家督郵毛欽操兵至篤家引欽就席曰明廷何為枉駕自屈欽曰張儉負罪入君門是以來耳篤曰儉負罪亡命篤豈得蔵之若審在此此人名士明廷寧宜執之欽因起撫篤背曰蘧伯玉恥獨為君子足下為仁義奈何獨専美邪篤曰今欲分之明廷載半去矣欽嘆息而去篤道儉經北海戲子然家送入漁陽出塞得免其所經歴子然之徒皆伏誅儉親屬内外並皆滅盡于是佞幸内憾媚上思報矣初河内張成道術士也知當大赦使女殺人李膺之為司𨽻收成殺之是秋覽等教成弟子牢順上書曰司𨽻李膺御史中丞陳蕃汝南范滂潁川杜宻南陽岑晊等相與結為黨誹謗朝廷廹脅公卿自相薦舉三桓専魯六卿分晉政在大夫春秋所譏九月詔收膺等三百餘人其逋逃不獲者懸千金以購之使者相望于道其所連及死者不可勝數而黨人之議始于此矣上使中常侍王甫治黨事太尉陳蕃曰所考者皆憂國患時當官不撓是何罪而乃爾邪不肯署名上不從遂皆下獄獄吏曰諸人入獄者當祭臯陶酒范滂曰臯陶古之直臣如滂無罪乃理滂于天如其有罪祭之何益衆人聞之皆不祭膺等皆三木嚢頭伏于階下王甫次在後因越前對問曰合黨連羣必有盟誓其所圗謀皆何等邪悉以情對滂曰竊聞仲尼之言見善如不及見不善如探湯欲使善善齊其清惡惡同其汙謂王政之所願聞不悟反以為黨王甫曰卿軰皆相㧞舉迭為脣齒其不合則見排擯非黨而何滂乃仰天曰古之修善自求多福今之修善乃陷大戮死之日願賜一畚薄埋滂于首陽山側上不負于皇天下不媿于伯夷叔齊甫為之改容即解桎梏去嚢頭尚書霍諝以為黨事無驗表諫赦之皆歸田里滂發京師道路迎者數千人滂謂友人殷仲子黄子敬曰今子相随是重吾禍也遂逃歸鄉里焉陳留人夏馥字子治安貧樂道不求當世郡内多豪族奢而薄徳未嘗過門躬耕澤畔以經書自娱由是為豪勢所非而馥志業逾固為海内所稱諸府交辟天子𤣥纁徵皆不就嘗奔喪經洛陽歴太學門諸生曰此太學門也馥曰東野生希逰帝王之庭徑去不復顧公卿聞而追之不得而見也黨事之興馥名在捕中馥乃髠髭髮易姓名匿迹逺竄為人傭賃馥弟静駕車馬載絹餉之於滏陽縣客舍見馥顔色毁瘁不能復識也聞其聲乃覺之起向之拜馥避之不與言夜至静所呼静語曰吾疾惡邪佞不與交通以此獲罪所以不恥饑寒者求全身也奈何載禍相餉也明旦各遂别去以獲免於是袁閎築室於庭日于室中東向拜母去前後門户及母䘮亦不制服位如此十五年卒以夀終是時太學生三萬餘人皆推先陳蕃李膺被服其行由是學生同聲競為髙論上議執政下譏卿士范滂岑晊之徒仰其風而扇之於是天下翕然以臧否為談名行善惡託以謡言曰不畏彊禦陳仲舉天下模楷李元禮公卿以下皆畏莫不側席又為三君八俊八顧八及之目猶古之八元八凱也陳蕃為三君之冠王暢李膺為八俊之首海内諸為名節志義者皆附其風膺等雖免廢名逾盛希之者惟恐不及涉其流者時雖免黜未及家公府州郡爭禮命之申屠蟠嘗逰太學退而吿人曰昔戰國之世處士横議列國之王争為擁彗先驅卒有坑儒之禍今之謂矣乃絶迹于梁碭之間居三年而滂及難袁宏曰夫人生合天地之道感于事動性之用也故動用萬方參差百品莫不順乎道夲乎情性者也是以為道者清浄無為少思少欲沖其心而守之雖爵以萬乗養以天下不榮也為徳者言而不華黙而有信推誠而行之不媿于鬼神而况于天下乎為仁者博施兼愛崇善濟物得其志而中心傾向之欣然忘己以為千載一時也為義者潔軌迹崇名教遇其節而明之雖殺身糜軀猶未悔也故因其所𢎞則謂之風節其所託則謂之流自風而觀則同異之趣可得而見以流而尋則好惡之心于是乎區别是以古先哲王必節順羣風而因物之流導之而各使自盡其業故能班叙萬物之才以成務經綸王畧直道而行者也中古陵遲斯道替矣上之才不能以至公御物率以所好求物下之人不能博通為善必以合時為貴故一方通而羣方塞矣夫好惡通塞萬物之情也背異傾同世俗之心也中智且猶不免而況常人乎故欲進之心斐然向風相與矯性違真以徇一時之好故所趨不必同而不相非則風俗遷矣春秋之時禮樂征伐霸者迭興以義相持故道徳仁義之風往往不絶雖文辭音制漸相祖習然憲章軌儀先王之遺也戰國縱横强弱相陵臣主側席憂在危亡無不曠日持乆以延名業之士而折節吐誠以招救溺之賓故有開一説而饗執珪起徒歩而登卿相而逰説之風盛矣髙祖之興草創大倫解赭衣而為將相舍介胄而居廟堂皆風雲豪傑崛起壯夫非有師友淵源可得而觀徒以氣勇武功彰于天下而任侠之風盛矣逮乎元成明章之間尊師稽古賔禮儒術故人重其學各自是其業徒守一家之説以争異同之辨而守文之風甚矣自兹以降主失其權閹豎當朝佞邪在位忠義之士發憤忘難以明邪正之道而肆直之風盛矣夫排憂患釋疑慮論形勢測虚實則逰説之風有益于時矣然猶尚譎詐明去就間君臣疎骨肉使天下之人專制利害弊亦大矣輕貨財重信義憂人之急濟人之險則任侠之風有益于時矣然樹私恵要名譽感意氣讐睚眦使天下之人輕執政之權弊亦大矣執誠説修規矩責名實殊等分則守文之風有益于時矣然立同異結朋黨信偏學誣道理使天下之人奔走争競弊亦大矣崇君親黨忠賢潔名行厲風俗則肆直之風有益于時矣然定臧否窮是非觸萬乗陵卿相使天下之人自置于必死之地弊亦大矣古之為政必置三公以論道徳樹六卿以議庻事百官箴規諷諫閭閻講肄以修明業於是觀行于鄉閭察議于親鄰舉禮于朝廷考績于所涖使言足以宣彼我而不至扵辯也義足以通物心而不至扵為佞也學足以通古今而不至于為文也直足以明正順而不至于為狂也野不議朝處不談務少不論長賤不辯貴先王之教也𫝊曰不在其位不謀其政天下有道庻人不議此之謂矣茍失斯道庻人干政權移于下物競所能人輕其死所以亂也至乃夏馥毁形以免死袁閎滅禮以自全豈不哀哉時諸黄門無功而侯者多大將軍竇武上表曰陛下即位以来梁孫鄧亳貴戚専勢侵逼公卿略驅士民惡稔罪深或誅滅相屬以常侍黄門竊弄王命欺㒺競行謗讟争入如忠臣李固杜喬在朝必竭忠奉之節覺其姦萌因造妖言陷之禍門陛下不察加以大戮冤感皇天痛入后土賢愚悲悼小大傷摧固等既沒宦黨受封快兇慝之心張豺狼之口天下咸言直如弦死道邊曲如鈎封公侯謡言之作正為于此陛下違漢舊典謂必可行自造制度妄爵非人今朝廷日衰姦臣専政臣恐有胡亥之難在于不久趙髙之變不朝則夕臣實懐愚不憚瞽言使身死名著碎體糞土薦肉狐䑕猶生之年雖尊官厚禄不以易之也謹冒死陳得失之要凡七十餘條伏惟陛下深思臣言束骸候誅武數進忠言辭㫖懇惻李膺等被赦由武申救之也永康元年春正月西羌寇三輔夫餘夷王寇𤣥菟夏四月中郎將張奐以南單于車兒不能治國事上言更立左鹿蠡王都紺為單于詔曰春秋大居正車兒一心向化何罪而黜其遣還廷攝部落五月壬子晦日有食之六月甲寅詔公卿校尉舉賢良方正各一人潁川荀爽對䇿曰臣聞火生于木故其徳孝漢之諡帝稱孝者其義取此也故漢制使天下皆講孝經選吏能舉孝㢘皆以孝為務也夫喪親自盡孝之終也今二千石不得終三年喪恐非所以為孝道而稱火徳也頃者𦙍嗣數乏本枝不繁其咎未必不由此往者孝文勞謙自約行過乎儉故有遺詔以日易月此謂夷恵激俗適身而已不可貫之萬世為後嗣徳者也雖古今損益未能諒隂可存其禮以示天下又公卿二千石皆輔主宣化政之本也而使不赴父母之䘮人義替矣春秋𫝊曰上之所為民之歸也上使不為民或為之是以加罰假若上之所為而民亦為之向其化也又何誅焉假使大臣皆不行三年之䘮何以責之古者臣有大䘮則君三年不呼其門可如舊禮以美風俗臣聞有夫婦然後有父子有父子然後有上下有上下然後有禮義故夫婦之始王教之端也孔子曰天尊地卑乾坤定矣書曰釐降二女于媯汭言雖帝堯之女下嫁于虞猶屈體降下婦道于虞氏也春秋之義王姬嫁齊侯使魯主之不以天子之尊加諸侯也今漢承秦法設尚主之義以妻制夫失陽唱之義以卑臨尊違乾坤之道今誠改尚主之制稱尊卑之性則嘉瑞降天吉符出地是以萬物各得其叙矣書奏即棄去之庚子大赦天下秋八月黄龍見巴郡初民就池浴相戲曰此中有黄龍因流𫝊民間太守上言時史以書帝紀是時政治衰缺所居多言瑞應皆此類也本志曰瑞興非時則為妖孽為言雖虚此為龍孽也冬十月壬戌南宫平城内屋壊十二月丁丑帝崩于徳陽殿初河間孝王生解瀆亭侯淑淑生萇萇生宏帝崩無嗣太將軍竇武召御史劉鯈鯈盛稱宏于武武與太后定䇿禁中太后詔曰大行皇帝徳載天地光照上下不獲𦙍嗣之祚早棄萬國朕憂心摧傷追覽前代法王后無適即擇賢近親考徳敘才莫若解瀆亭侯宏年十有二嶷然有周成之質春秋之義為人後者為之子其以宏為大行皇帝嗣使光禄大夫劉鯈持節之國奉迎後漢紀卷二十二
