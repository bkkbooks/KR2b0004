front:
  text: 第二二年春正月公到薊王郎購公十萬户薊中驚恐言郎使者方至太守已下皆出城迎公見官屬議耿弇曰今兵從南方来不可南行上谷太守耿況漁陽太守彭寵公邑人也𤼵此兩都控弦彊弩萬騎所向無前邯鄲不足平也公曰卿言善時公官屬盡南方人莫有欲北者皆曰死南首奈何北行公指弇曰是我北道主人公駕出官屬不盡相及弇與公相失道路擾攘皆欲擊公銚期奮㦸在前嗔目叱之至城門已閉矣攻之得出兼晨夜䝉霜雪所過城邑不敢入或絶食不食至饒陽蕪蔞亭馮異進豆粥公曰得公孫豆粥饑寒俱解公将出或曰閉之亭長曰天下詎可知何閉長者為遂南行至呼沱河導吏還言河水流澌無舩不可渡官屬皆失色公遣王霸視之信然霸恐驚衆不可渡且前依水為阻即言冰堅可渡士衆大喜比至冰合可涉既渡公謂霸曰安吾衆令渡者卿力也霸曰此明公至徳神靈之佑雖武王渡河白魚之應無以加也公曰王霸權時以安衆是天瑞也為善不賞無以勸後以霸為軍正賜爵闗内侯於是未知所之有老翁在道傍曰信都為長安城守去此八十里乃至信都太守任光都尉李忠聞世祖至開門出迎世祖見光喜曰伯卿兵少不足用如何光曰可發奔命攻旁縣不降者掠之兵貪財物可大致也以光為左大将軍封武成侯忠為右大将軍封武固侯光字伯卿南陽宛人好黄老言為人純厚鄉里愛之及漢兵至宛或見光衣服鮮明欲殺之解衣未已㑹安成侯劉賜適至見光容貌長者救全之因率黨與從賜為偏将軍與世祖共破二公於昆陽後更始拜光為信都太守李忠字仲卿東莱人以好禮稱王莽時為信都都尉更始立以忠為郡中所敬信即拜忠為都尉兼璽書勞勉焉王郎起光與忠𤼵兵固守廷掾有持郎檄詣府者光斬之以令百姓邳彤字偉君信都人王莽時分鉅鹿為和成郡以彤為郡卒正公之平河北彤舉城降復以彤為太守是時郡縣得王郎檄皆望風嚮應唯信都和成二郡不降彤聞公来失衆使五官掾張萬将精騎二千詣公所彤與公㑹信都議者或言可因信都兵自送入闗彤庭對曰議者之言皆非也何者吏民思漢乆矣故更始之立天下響應當此之時一夫大呼無不捐城遁逃虜伏請降自上古已来用兵之盛未有如此者也邯鄲劉胡子等假此威勢惑亂吏民詐以卜者王郎為成帝子擁而立之其衆烏合無有根本之固明公奮二郡之兵揚響應之威以攻則何城不剋以戰則何軍不服今釋此而西歸非徒亡失河北又驚動三輔其隳損威重安可量也明公審無征伐之計則雖信都之衆難可合也何者明公西則邯鄲和成民不肯捐棄親戚而千里送公其離散逃亡誠可必見以彤為後大将軍世祖使宗廣守信都李忠邳彤従征伐耿純率宗族二百餘人老者載棺而隨之及賔客二千人并衣􅃭迎公於貫鉅鹿人劉植亦率賔客數十人開城門迎公大悦以純為前将軍植為驍騎将軍衆益盛乃渡呼沱攻中山所過郡縣望風影附耿純使從弟訢歸燒宗室廬舍公以問純純曰竊見明公單車臨河北非有府藏之畜重賞甘餌以聚人者也接下以至誠待之以恩徳是以士衆旁来思樂降附今邯鄲自立北州疑惑純雖舉宗歸命老弱充行猶恐宗人賔客卒有異心無以自固燔燒廬舍絶其反顧之望公善之更始将相皆山東人也咸勸更始都洛陽丞相長史鄭興説更始曰陛下起自荆楚無施於民舉號南陽而雄傑已誅王莽開門而迎者何也苦王氏思髙祖之舊徳也今不入撫之臣恐百姓心動盜賊復起議者欲平赤睂而後入闗是不守其本而争其末也恐國家之守轉在函谷雖卧洛陽得安枕邪更始曰朕西決矣乃以興為梁州刺史二月更始西至長安自王莽之敗西宫燔燒東宫府市里太倉武庫皆如故更始居於東宫郎吏以次侍更始媿不能視諸将後至者更始勞之曰掠得幾何左右大驚李松趙萌説更始宜立諸功臣為王以報其功朱鮪以為髙祖之約非劉氏不得王更始乃先封宗室劉祉為定陶王劉賜為宛王劉慶為燕王劉歙為元氏王劉嘉為漢中王後遂立王匡為比陽王王鳯為宜城王朱鮪為膠東王張卬為淮陽王王常為鄧王廖湛為殷王申屠建為平氏王胡殷為隨王李通為西平王李軼為武陰王成丹為襄邑王陳茂為隂平王宋佻為潁陰王以李松為丞相趙萌為大司馬隗囂為御史大夫即拜張步為輔漢大将軍步弟𢎞為衛将軍藍𤣥武将軍夀髙密太守步乃分兵略地盡得琅邪泰山城陽東莱髙密膠東北海齊郡濟南拜董憲為臨淮太守憲還東海攻利城耿況攻曲陽皆下之拜劉芳為騎都尉使鎮撫安定以西更始以趙萌女為夫人有寵委政於萌更始日在後宫與婦女飲酒諸将欲言事更始醉不能見請者數来不得已令侍中於帷中與語諸将又識非更始聲皆怨曰天下未可知欲見不得而韓夫人尤嗜酒手自酌酒謂常侍曰帝方為我樂飲閒時多正用飲時即事来為起抵書桉破之議郎有諫者言萌放縱縣官但用趙氏家語署耳更始怒拔劍斫議郎時御史大夫隗囂在旁起謂左右曰無漏泄省中事萌嘗以私事扶侍中下斬之侍中呼曰陛下救我更始言大司馬哀縱之萌曰臣不奉詔遂斬之如是者數李軼等擅命於外所置牧守交錯州郡不知所從彊者為右王匡張卭之屬横暴長安三輔苦之又所署官爵多羣小長安為之語曰竈下養中郎将爛羊胃騎都尉由是四方不信豪傑離心博士李淑諫曰方今賊臣始誅王化未行百官有司宜得其人陛下本因下江平林之勢假以成業斯亦臨時之宜事定之後宜釐改制度更延英俊以匡王國今者公卿尚書皆戎陣亭長凡庸之隸而當輔佐之任望其有益猶緣木求魚終無所獲海内望此知漢祚未興臣非有憎疾以求進也但為陛下惜此舉措願陛下更選英彦以充廊廟永隆周文濟濟之盛更始怒收淑繫之詔獄歴年至更始之敗乃免初隗囂被徴将行方望止之曰更始未可保且觀百姓所歸囂不聴以書謝囂曰足下将建伊吕之業任存亡之權大事草創雄傑未集以望異域之人疵瑕未暴於衆可且依託亦有所宗望知大指順風不讓幸賴将軍尊賢廣謀動有功𤼵中權基業已定英傑雲集思為羽翮比肩是也望乆以羇旅抱空資託賔客之上誠自媿也雖望懐介然之節潔去就之分終不貳其志也何則范蠡收績於姑蘇狐犯謝罪於始入夫以二子之勤從君二十餘年蠡苞七術之機犯為舅氏之親然至際㑹猶釋罪削迹請命乞身盖亦宜也望聞烏氏有龍池之山微徑南通與漢相連其旁有竒人聊及閒暇廣求其真願将軍勉之而已囂固留望遂去囂詣長安更始以囂為右将軍季父崔為白虎将軍義為左将軍既而崔義謀叛西歸囂懼其并誅即求見而告其謀二人誅死更始以囂為忠故以為御史大夫方望既去隗囂遂説安陵人弓休曰更始必敗劉氏真人當受命劉嬰本當嗣孝平帝王莽以嬰為孺子依託周公以奪其位以為安定公今在民間此當是也林等信之於長安求得嬰将至臨涇聚黨數千人立嬰為天子望為丞相林為大司馬更始遣李松蘇茂等擊皆斬之公之擊趙國引兵入鉅鹿降廣阿更始初立遣使徇諸國曰先降者復爵位上谷太守耿況出迎使者上印綬使者無還意功曹寇恂勒兵入請印綬使者曰天王使者功曹欲脅之耶恂曰非敢脅使君竊傷計之不詳也今天下初定國信未宣使君立節銜命以臨四方郡國莫不延頸傾耳望風歸命今至上谷而隳阻向化之心生離叛之隙何以復令他郡乎且耿況在上谷乆為吏民所親今易之得賢則造次未安不賢則為亂為使君計莫若復况以安上谷外以宣恩信使者不應恂因顧叱左右以使者教召況況至恂前取印綬帶況使者不得已承詔授之況遂拜受而出恂字子翼上谷昌平人也家世為郡縣之著姓恂好學為郡功曹耿況甚重之時王郎使上谷𤼵兵恂與門下掾閔業議邯鄲拔起不可信王莽末時所難伯昇今聞大司馬伯昇親弟尊賢下士所至見説可歸附也況曰邯鄲兵彊不能獨距如何對曰今據大郡悉舉其衆控弦萬騎可以詳擇去就恂請東約漁陽太守與合為一邯鄲不足圖也耿弇之與公相失也間行歸上谷㑹適至勸況發兵乃遣寇恂至漁陽説太守彭寵初吳漢説寵曰漁陽上谷突騎天下所聞也君何不率勉上谷共遣精鋭以詣劉公并力擊邯鄲此一時之功也䕶軍盖延狐奴令王梁亦勸寵寵欲從之其官屬不聴漢知寵不得自専乃辭去城外思所以調其衆者時道多饑民見一諸生漢使人召之乃問所聞見此生具説劉公所過為郡縣所稱言邯鄲劉子輿非劉氏也漢乃偽為檄𤼵漁陽兵使此生奉檄詣寵寵官屬皆疑會恂至寵遂𤼵兵以漢行長史事與都尉嚴宣䕶軍盖延王梁等将步騎三千人共攻薊誅王郎大将趙閎等所過攻下郡邑誅其将帥将及廣阿聞城中車騎甚衆漢乃勒兵問曰此何兵曰大司馬公也時王郎亦遣大司馬略地漢復問曰大司馬為何公也對曰劉公也漢聞之喜即進兵城下初聞二郡兵且至或云王郎来甚憂之及聞外有大兵公親乗城勒兵𫝊問之漢等荅曰上谷兵為劉公来諸部英不喜躍耿弇得所歸附矣耿弇拜於城下具言𤼵兵状公迺悉召入笑曰邯鄲将帥數言我發漁陽上谷兵吾聊應一言我亦𤼵之何意二郡良為吾来方為士大夫共此功名耳乃皆以為偏将軍加況寵為大将軍封列侯漢為人質厚少文造次不能以辭自達然沉勇有智略鄧禹及諸將多知之數相薦舉乃得召見遂見親信常居門下更始遣尚書令謝躬率六将軍討王郎不能下王郎遣將攻信都信都大姓馬寵等開城内之收太守宗廣及武固候李忠母妻而令親屬招呼忠時寵弟従忠為校尉忠即時召見責數以背恩反城因格殺之諸将皆驚曰家屬在人手中殺其弟何猛也忠曰若縱賊不誅則二心也公聞而美之謂忠曰今吾兵已成矣将軍可歸救老母妻子宜自募吏民能得家屬者賜錢千萬来從我取忠曰䝉明公大恩思得效命誠不敢内顧宗親郎所置信都王捕繫後大将軍邳彤父弟及妻子使為手書呼彤曰降者封爵不降族滅彤涕泣報曰事君者不得顧家彤親屬所以至今得安於信都者劉公之恩也公方争國事彤不得復念私也公乃使左大将軍任光将兵救信都光兵於道散降王郎無功而還㑹更始所遣將攻拔信都敗走王郎兵忠彤家屬悉全公因使忠行太守事還歸信都誅郡中反者數百人公東擊鉅鹿未下耿純説公曰守鉅鹿士衆疲弊雖屠其城邯鄲存不如以精鋭擊邯鄲若王郎已誅鉅鹿不戰自服矣公從之夏四月攻邯鄲王郎使杜威持節詣軍威曰實成帝遺體子也公曰設使成帝復生天下亦不可得也況詐子輿者乎威固請降求萬户侯公曰一戸不可顧得全身耳威曰邯鄲雖鄙并力城守尚曠日月終不君臣俱降但欲全身也乃辭去少傅李立反開城門五月甲辰破邯鄲誅王郎公得文書謗毁公者皆燒之曰令反側子自安也更始遣使封公為蕭王令罷兵将有功者詣行在所遣幽州牧苖曾之部王幸温明殿耿弇請間曰吏士死傷者多願歸上谷益兵王曰王郎已破河北略平國家今都長安天下大定復用兵何為弇曰王郎雖破天下兵革乃始耳今使者来欲罷兵不可聴也銅馬赤睂之屬數千萬人所向無前聖公不能辦也敗必不乆王曰卿勿妄言我告斬卿弇曰大王哀厚弇如父子故敢披赤心王曰我戲卿耳何以言之弇曰百姓患苦王莽復思劉氏聞漢兵起莫不歡喜從風如去虎口得歸慈母倒㦸横矢不足以喻更始未都長安時百姓未責望也今都長安正位紫宫成其為天子而大臣專權貴戚縱横其政令不出城諸將虜掠甚於賊盜百姓愁怨天下失望是以知必敗也明公首事南陽破昆陽下百萬衆今復定河北以義征伐表善懲惡躬自尅薄𤼵號嚮應望風而至天下至重公可自取無令他姓得之王曰卿得無為人道之弇曰此重事不敢為人道於是王謂鄧禹曰吾欲取幽州突騎誰可使者禹曰吳漢文能柔未附武足斷大事可用也乃以漢為大将軍持節與耿弇𤼵幽州十郡兵幽州牧苖曾不肯調漢将二十騎至無終曾以漢無備出迎漢漢麾騎收曾即誅之遂取其軍威振北州漢将兵詣王所諸将望見漢還兵馬甚盛皆曰此欲自将之何肯與人及漢至上公簿請所付諸将各多請之王曰屬者恐其不與人今所請又何多也諸将由是服焉秋王擊銅馬於清陽破之又擊髙湖重連大破之衆十餘萬悉降皆封其渠帥諸将未能信賊賊頗懐二心王敕降賊各勒兵王将輕騎入其營渠帥曰王推赤心置人腹中安得不投死由是遂安悉以賊配諸将營更始柱功侯李寳益州刺史張忠徇益州公孫述使弟将兵要之緜竹大破寳忠由是威振益州功曹李熊説述曰方今四海震盪匹夫横議将軍割據千里地十湯武奮𤼵威徳以投天隙王霸之業成矣宜改名以鎮百姓述以為然乃自立為蜀王遣将軍侯丹守白水闗任滿據扞闗蜀地肥饒民彊兵實逺方多歸之卭長任貴殺王莽越巂太守自立為卭穀王稱臣於述塞外君長皆貢述更始武陰王李軼據洛陽尚書謝躬據鄴各十餘萬王患焉将取河内以迫之謂鄧禹曰卿言吾之有河内猶髙祖之有闗中闗中人非蕭何誰能使之一方晏然髙祖無西顧之憂者矣吳漢之能卿之舉矣復為吾舉蕭何禹曰寇恂才兼文武有御衆才非恂莫可安河内也王至河内太守韓歆將謀城守脩武人衛文多竒計馮異素知之異言於王使衛文説歆令降岑彭亦勸歆遂從之王以歆不即降置之鼓下将斬之彭在城内使人召彭初彭賴伯昇獲免因以兵屬伯昇被害更為朱鮪校尉後為潁川太守将之官道不通乃将麾下數百人從邑人韓歆於河内彭見王曰赤睂入闗更始危殆四方􅑣起羣雄競逐竊聞大王開拓河北此誠皇天佑漢士民之福也彭賴司徒公得全濟今復遇大王誠願出身自效以報恩施王深納之因言歆南陽人可以為用乃赦之於是以馮異為孟津将軍寇恂為河内太守王謂恂曰河内富實帶河為固北通上黨南迫洛陽吾将因是以濟髙祖留蕭何守闗中吾今委卿以河内恂乃伐淇園竹以為兵矢收其租賦以給軍糧養馬二千匹以供軍用劉隆字元伯王之宗人更始初為偏将軍預於昆陽之戰更始入闗請迎妻子至洛陽聞王在河北隆單身歸王王以為騎都尉使與馮異守洛陽李軼聞隆歸王乃盡殺隆妻子河北既定遣吳漢岑彭擊謝躬時拒五校於隆慮令大将軍劉慶守鄴城漢説魏郡太守陳康曰上智處危以求安中智因危以為功下愚安危以自亡危亡之至在人所由不可不察今京都敗亂四方雲擾劉公所向輒平之公所見也謝尚書不量力内與蕭王違戾外失河北之心公所知也公據孤危之城堅守自安以待滅亡義無所立節無所成不若開門内軍轉禍為福免下愚之危收中智之功此計之至者也於是陳康乃收劉慶及躬妻子開門内漢軍躬聞漢等至将輕騎歸不知漢已得其城與數百騎夜至鄴時漢在城外彭在城中開門内躬脅将詣𫝊斬之初更始遣躬将馬武等六将軍與世祖俱定河北及王郎平躬與世祖復俱共在邯鄲中分居城内躬所領諸将多放縱為百姓所苦躬不能整又數與王違戾常欲襲之以為兵彊故止然躬勤於吏事每至所在理寃結決詞訟王常稱之曰謝尚書真吏也躬由此不自疑躬妻子常誡之曰終為劉公所制焉馬武字子張南陽湖陽人少時避怨緑林中起隨擊甄阜二公兵故王常親引之邯鄲既平王登臺從容謂武曰吾得漁陽上谷突騎欲令将軍主之何如武讓不敢當然由是歸心王既降置之帳下每饗諸将武斟酌於前自以新屬也甚卑恭不敢與南陽時等王善之冬十二月赤睂西入闗更始定國上公王匡襄邑王成丹抗威王劉均據河東丞相李松大司馬朱鮪據𢎞農拒之王度長安必危方憂山東闗西未有所屬乃以鄧禹為前将軍中分軍西入闗以韓歆為軍帥李文程憲李春為祭酒馮愔為積弩将軍樊崇為驍騎将軍宗歆為大将軍鄧尋為建武将軍耿訢為赤睂将軍左于為軍師戎士二萬王送鄧禹於野王王反而獵扵道見二人者即禽王曰禽何向二人舉手西指曰此中多虎臣每即禽虎亦即臣大王勿往也王曰茍有備虎何患二人曰何大王之謬也昔湯即桀於鳴條而大城於亳其備非不深也武王即紂而殺之故即人者人亦即之雖有重備豈能自守乎王不自得顧謂左右曰此隠者也将用之乃不辭而俱去
