front:
  text: 第五五年春二月丙午大赦天下周建兄子誦以垂惠降劉紆周建蘇茂走下邳建道死封孔子後孔安為殷紹嘉公初彭寵徵書至潞縣有火自城中飛出城外燔千餘家殺人甚多寵堂上聞蝦蟇聲在爐火下鑿地求之無所得數有變怪卜筮及望氣者皆言兵當從中起寵以其從弟子后蘭卿本上所使来故不相親也令將屯於外寵奴子密等三人謀共刼寵寵齋於便室晝卧三奴共縛著牀告外吏大王齋禁吏皆休旦乃白事乃從次呼諸奴婢以寵教責問便收縳各置空室中以寵聲呼其妻妻入室見寵縛驚曰奴反邪奴格妻頭擊頰寵曰趣為諸將軍辦裝兩奴將妻入取物一奴守寵寵謂守奴曰若小兒我素所愛也為子密逼刼耳解我縳出閣則活矣用女珠妻汝家中財物皆以與汝奴欲解之視户外見子密聽其語遂不解子密將妻入取寵男女悉閉室中收金珠衣物至寵所裝之被馬六匹使妻縫縑囊昬夜後解寵手令作記告城門將軍今遣子密等至子后蘭卿所開城門出勿稽留書成斷寵及妻頭置縑囊中馳詣闕封子密為無義侯寵尚書韓立高宣等共立寵子午為燕王子后蘭卿為將軍數日寵國師韓利斬午首詣祭遵遵將兵誅寵支黨漁陽遂平上嘉耿况之功以其久勞於邊使光祿大夫樊密持節徵况還京師賜以大第甚見尊重况年老多病天子親數臨問徵弇視疾弇舒並封列侯國為射聲校尉復除二子廣舉為郎諸子侍疾並垂青紫當世以為榮及薨贈賜甚厚諡曰烈侯子國以當嗣辭曰先侯愛少子霸上疏讓天子許焉國有籌策數言邊事天子器之官至大司農三月徙廣陽王良為趙王山陽人龎萌為更始冀州牧與世祖謝躬俱平邯鄲萌謂躬曰劉公不可信也躬以告世祖世祖喻而安之及上誅謝躬而萌率衆降上奪其衆謂萌曰前在邯鄲知之何速邪萌曰知之久矣萌為人婉順上親愛之以為侍中嘗對諸將曰可以託六尺之孤寄百里之命龎萌是矣使萌為平狄將軍與蓋延俱定梁楚地萌與延爭權懼延譛已遂勒兵反夏四月平狄將軍龎萌反襲蓋延破楚相孫萌自號東平王引兵與董憲蘇茂合上嗟歎曰人不可知乃如是下詔曰吾嘗於衆人中言萌可為社稷臣將軍等得無笑吾言老賊當族其厲兵馬會雎陽六月上幸䝉龎萌董憲蘇茂等將三萬人攻桃城桃城告急上將輕騎二千步兵數萬晨夜至亢父百官疲倦欲且宿上不聽復行十里宿任城明旦諸將欲攻賊賊亦勒兵待戰上令諸將不得出是時呉漢兵在東郡馳使召之萌等驚曰數百里晨夜行以為到當戰而堅坐任城致人城下真不可測也積二十餘日呉漢到乃進擊大破之萌憲茂復將數萬人屯昌慮以兵拒新陽呉漢進擊破之遂守昌慮是時河西隔逺世祖都洛陽未能自通以隗嚻稱漢年號竇融等從受正朔嚻外順民望内圖異計遣説客張𤣥游説河西言一姓不再興今豪傑競逐雌雄未分宜與隴蜀合從高為六國之勢下成尉佗之事融乃聚其衆而議之曰漢承堯運厯數延長上之姓號具見於天文自前博物道術之士言之久矣故劉子駿改易名字以應其占此皆近事暴著所共見也以人事言之今稱天子者數人而洛陽甲兵最彊號令最明加以祖宗之重百姓所歸服天人之應如此他姓未能爭也衆皆以為然梁統恐衆惑其言乃刺殺𤣥是夏竇融及五郡太守遣使詣闕上先聞五郡全實在隗嚻公孫述之間常欲招引之會得其表甚恱遣使拜融為涼州牧璽書襃納之秋八月呉漢破昌慮軍士高扈斬梁王紆降蘇茂奔張步董憲龎萌走之朐漢復守之冬十月上幸魯使大司空祠孔子使耿弇諸將擊張步步盛兵祝阿列營鍾城弇攻祝阿拔之開其角令奔鍾城皆空壁走將軍費敢以精兵守巨里弇令軍中益治攻具將攻巨里步濟南王費邑聞之將兵救巨里弇告諸將曰此即所求者野兵不擊何以城為所以治攻具者欲以誘致邑耳弇分兵守巨里自與邑戰大破之弇乃收所斬級以歸示巨里城中城中恟懼夜空城走弇收其積聚縱兵擊諸未下者平三十餘營時張步都劇使弟藍將兵守西安西安距臨淄三十里弇引營居臨淄西安之間西安城小而兵精臨淄名大而不實弇令軍中曰後五日攻西安藍聞之晨夜為守備至其夜半令軍皆食㑹明至臨淄城軍吏爭之以為攻臨淄而西安必救攻西安臨淄不能救弇曰然吾故攻西安今自憂城守而吾攻臨淄一日必拔何救之有吾得臨淄則西安孤藍與劇斷絶必復亡去所謂擊一而得兩者也且西安城堅兵精攻之未可卒下衆必多死傷正使得其城張藍引兵奔臨淄如是臨淄更彊勒兵憑城觀人虚實吾深入敵境後無轉輸旬日之間不戰而困諸君適不見是耳弇遂攻臨淄拔之張藍聞臨淄拔果將其衆走劇去臨淄九十里弇令軍中無得掠劇下須步至臨淄乃擊之步聞弇言大笑曰以尤來大彤十餘萬衆吾皆破之今大兵少於彼又皆疲勞何足破乎弇上書曰臣據臨淄深壍壘張步必自來攻臣以逸待勞以實擊虚旬日之間步首自可獲上然其計步果與三弟故大彤帥重異將二十萬衆至臨淄弇令都尉劉歆太山太守陳俊勒兵城上分陣城下賊至北門歆俊兵皆交步等乗虚並入攻弇營弇登臺望之見其營擾乃下臺安之既而將精兵擊步於東城下大破之飛矢中弇股引刀截之軍中無知者弇欲以疲步兵明日將戰陳俊曰步兵多且可須上至弇曰上至臣子當擊牛釃酒以待百官反欲以賊遺君父邪遂縦兵合戰復大破之城中溝塹皆滿弇度步已困乃罷兵置左右翼步夜果引去伏兵夾擊得輜重二千餘兩弇縱兵追擊至鉅昧水上八十餘里僵尸相屬後數日上至臨淄勞軍百官列坐上謂弇曰將軍正韓信也韓信擊厯下以著名今將軍攻祝阿以發迹此非齊西界邪弇曰厯下即厯城在祝阿東五十里皆齊西界也上曰將軍嘗為吾言因上谷兵以擊涿郡漁陽進擊富平獲索因東攻張步平齊地以為落落難合今皆如將軍策有其志者事竟成也將軍有定齊之功功出大司馬上明如日月也張步既破走還劇而蘇茂適至讓步曰我南陽兵精不可待茂邪步曰負卿何言兄弟走平夀上曰能相斬降者封之步乃斬蘇茂肉袒軍門降弇勒兵入城樹十二郡旗各以本郡詣旗下衆尚十餘萬輜重七千餘兩封步為安丘侯於是琅邪未平徙陳俊為琅邪太守齊地素聞俊名始入界盜賊大散頃之張步兄弟謀反亡歸琅邪俊擒討盡誅之上美其功賜俊璽書曰將軍元勲大著威振青徐兩州有警實得征之俊撫貧弱悉有義令行郡中百姓歌之數上書自請擊隴蜀上報曰東州新平大將軍之功也負海猾夏盜賊之處國家以為重憂且勉鎮撫之初起太學宫十二月盧芳自稱天子入居九原略有數郡初上問來歙曰今西州未附子陽稱帝吾方務靜關東西略未知所任計將何如歙因自請曰臣嘗與隗嚻相遇關中其人始建為漢之計今陛下聖德隆興臣願得奉一節開以丹青之信嚻必歸命則公孫自亡勢不足圖也上然之使歙持節喻指往來數年矣於是歙復與馬援使喻隗嚻嚻與馬援共卧起問京師善惡援答曰前到京師凡數十見毎侍對夜至天明援事主未嘗見也材德驚人勇略非人敵開心見誠好醜無所隱圖畫天下事良備量敵決勝濶達多大略與高帝等經學博覽政事文辯未覩其比也嚻曰必如卿言勝高帝邪援曰不如也高帝大度無可無不可今上好吏事動循軌度又不飲酒所不如也嚻大笑曰若是反不勝邪嚻雖内不信不得已遣太子恂入侍拜為胡騎校尉封鑴羌侯援亦將家至京師上書求將賔客屯田上林中因宣揚國威招來豪傑以立尺寸之功上許焉是冬大司徒伏湛免尚書令侯霸為司徒霸字君房河南密人也矜嚴有威容家累千金不事産業篤志詩書成哀間仕為郎王莽時厯職有稱為臨淮太守莽敗霸保郡自守吏民安之更始初遣謁者徵霸百姓老弱相攜啼泣遮使者車或當道卧皆曰願乞復留侯君期年民至戒乳婦勿舉子侯君當去俱不能全耳謁者恐霸就徵失亡臨淮於是不敢受璽書具以狀聞㑹更始敗世祖即位徵霸為尚書令是時朝廷新立制度草創政令有不便於民者霸輒奏省之霸辟太原人閔仲叔既至霸勞問之不及政事叔對曰始得明公辟且喜且懼何者喜於為明公所知懼於虚薄不能宣益拾遺今未越府閫喜懼纔半親知政教已見掾吏及見明公喜懼皆去何則望明公問僕何以明政美俗調隂陽訓五品令宇内乂安也以叔為不足問邪不當辟也如以為任用而不使陳之則為失人智者不私人以位亦不失人是以喜懼皆去因自劾去後博士徴不至終於家太子少傅王丹被徴將至侯霸遣子昱迎拜之丹下車答拜昱曰家公欲與公俱定恩分何為拜子弟邪丹曰君房有是言丹未許也丹常受人言有所薦及舉者有罪丹坐免官終不言客甚慙自絶於丹丹俄為太子太傅使人呼客見之曰何遇丹之薄也客自安如故其子有同門生遭親喪白丹欲奔之丹撻之五十或問其故丹曰世稱鮑叔管夷吾次則百里奚蹇叔近則王陽貢禹厯載彌久如此其難也張陳凶其終蕭朱隙其末故敕子孫友道難立非保慎不惑焉能終乎丹字仲回京兆下邽人王莽時連徵不至避世隴西隱居養志家累千金好施周急毎歲時農畢察彊力多收者載酒肴而勞之其惰懶不收者恥不獲勞無不力田者聚落化之遂以殷富閭里犯罪者喻其父兄而致之法喪憂者量其資財為之制度丹親任其事行之十年民皆敦厚陳遵者豪傑之士也遵友人喪親賻縑百匹丹獨送縑一匹曰如丹是縑皆出機杼也遵有慚色欲與丹相結丹末之許也更始時遵北使匈奴過辭於丹丹謂遵曰俱遭亂世唯我二人為天地所遺今子使絶域無以相贈贈子以不拜其高抗不屈皆此類也衞尉銚期執金吾寇恂亦慕而友之名重當世頃之遜位卒于家是歲徵會稽嚴光太原周黨光字子陵少與世祖同學世祖即位下詔徵光光變名姓漁釣川澤至是復以禮求光光不得已舁疾詣京師上就見光曰子陵不可相助邪光卧而應曰士固有執節者何至相逼乎天子欲以為三公光稱病而退不可得而爵也黨字伯况舉動必以禮赤眉之亂所在殘破至太原聞黨德行不入其邑由是名重天下三徵然後至黨著短布單衣穀皮綃頭見於尚書欲令黨改冠服黨曰朝廷本以是故徵之安可復更邪遂見自陳願守所志上聽之詔曰許由不仕有唐帝德不衰夷齊不食周粟王道不虧不忍使黨久逡巡于汙君之朝其賜帛四十匹遣歸田里博士范升奏毁黨曰臣聞堯不須許由巢父而天下治周不待伯夷叔齊而王道成巍巍蕩蕩至今不絶臣伏見太原周黨使者三聘乃肯就車及陛見帝庭黨伏而不謁偃蹇自高逡巡求退釣采華名以誇主上臣愚以為黨等不達政事未足進用臣願與黨並論雲臺之上考試圖國之道不如臣言請伏虚誣之罪書奏天子示公卿詔曰自古堯有許由巢父周有伯夷叔齊自朕高祖有南山四皓自古聖王皆有異士非獨今也伯夷叔齊不食周粟太原周黨不食朕祿亦各有志焉黨既退著書上下篇終於沔池百姓賢而祠之是時太原王霸北海逢萌亦隱居養志俱被聘霸到尚書拜不稱臣問其故答曰天子有所不臣諸侯有所不友遂以疾歸茅屋蓬户不厭其樂萌少給事亭長慨然歎曰大丈夫焉能為人役哉遂去就師聞王莽居攝子宇諫莽殺之萌會友人曰三綱絶矣禍將及人即解衣冠挂東都城門將家屬客於遼東天下定乃還琅邪不其山中以德讓導鄰里聚落化之詔書徵萌上道迷不知東西萌曰朝廷所以徵我者以吾聰明睿智有益於政耳今方面尚不知安能濟政即歸後連徵不起袁宏曰夫金剛水柔性之别也員行方止器之異也故善御性者不違金水之質善為器者不易方員之用物誠有之人亦宜然故肆然獨往不可襲以章服者山林之性也鞠躬履方可屈而為用者廟堂之材也是以先王順而通之使各得其性故有内外隱顯之道焉末世凌遲治亂多端隱者之作其流衆矣或利競滋興靜以鎮世或時難迍邅處以全身或性不和物退以圖安或情不能嘿卷以避禍凡此之徒有為而然非真性也而有道之君皆禮而崇之所以抑進取而止躁競也嗚呼世俗之賔方抵掌而擊之以為譏笑豈不哀哉自王莽末天下旱蝗稼穀不成至建武之初一石粟直黄金一斤而人相食二年秋野穀旅生野蠶成繭民收其實以為衣糧是歲野穀生漸少南畝益墾矣六年春正月丙辰改舂陵為章陵復比豐沛劉隆等破舒城斬李憲二月呉漢拔朐城董憲龎萌逃出漢執其妻子憲流涕謝吏士曰妻子皆已得矣久苦諸公將十餘騎欲從間道詣上降追兵至皆斬之於是天下麤定唯隴蜀未平上乃休諸將於洛陽分軍士於河内數置酒會諸將輒加賞賜毎幸郡國見父老掾吏問數十年事吏民皆驚喜令自以見識各陳所宜焉初軍旅間賊檄日以百數上猶以餘暇講誦經書自河圖洛書讖記之文無不畢覽王元説隗嚻曰天下成敗未可知天水完富士馬最彊宜北取西河東收關中按秦舊迹表裏河山元請以一丸泥為大王東封函谷關此萬世之一時也既不能為此且畜養士馬據隘自守曠日持久以待四方之變圖王不成其敝猶足以霸要之魚不可以脱於泉一失權柄神龍還與螾同前更始都長安四方嚮應以為真定也一朝壊敗大王幾無所據今南有公孫北有文伯江湖海濵王公十數而欲信儒生之語棄千乘之基羇旅危國以求安全是猶覆車之軌計之不可者也嚻心然之是時公孫述遣兵出江關敗南郡上因欲從天水伐蜀從褒斜江關路逺而多阻莫若從西州因便以舉則兵彊財富嚻雖遣子入侍而心懐兩端常思王元之言欲據一方不欲早定乃復上書盛言蜀道危險棧閣敗絶丈尺之地騎不得通述性嚴酷上下相患須其罪惡暴著大呼嚮應之勢也來歙素剛聞嚻有異議遂發憤責嚻曰國家以君為知臧否曉興廢故為手書以暢聖意既遣伯春復用邪惑之言族滅之計叛主負子背忠信傷仁義吉凶之決在於今日欲前刺嚻而左右兵多嚻欲害歙歙持節就車嚻逾怒欲殺歙王遵諫曰愚聞為國者慎名與器為家者畏怨重禍名器俱慎則下伏其令怨禍不輕即家受其福今將軍遣子質漢而外懐他心名器逆矣既違其命又殺其使輕怨禍矣古者列國兵交不絶其使所以重兵貴和而不任戰也春秋傳曰交兵使通可也何况持王命而犯之哉上不合於正義内不周於長利茍行盜賊之短䇿又何是非之能識加以伯春委身已在闕庭而屠漢使此踐機試劒授刃於頸也君叔雖單居陛下之外兄也屠之未損於漢而隨以族敗昔宋執楚使遂有易子之禍小國猶不可辱况萬乘之主乎歙知黨多在西州救助非一遂得免王遵亦豪傑士也既而降漢封上雒侯初嚻問班彪曰往者周亡戰國並爭天下分裂數世然後始定意者縱橫之事復起於今日乎將承運迭興在一人也願先生論之對曰周之興廢與漢不同周立爵五等諸侯從政本根既㣲枝葉彊大故其末流有縱横之事其勢然也漢家乘秦之制郡縣治民臣無百年之柄至成帝假借外家哀平短祚國嗣三絶危自上起傷不及下故王氏之貴傾擅朝廷能竊號位而不根於民是以即真之後天下莫不引領而思漢十餘年間天下中外騷擾逺近俱發假號雲合咸稱劉氏不謀而同辭方今雄傑跨州城者皆無七國世業之資詩云皇矣上帝臨下有赫監視四方求民之莫今民謳吟思漢嚮仰劉氏已可知矣嚻曰先生言周漢之勢可也至於但見愚民習識劉氏姓號之故而謂漢家復興疎矣昔秦失其鹿劉季逐而得之時民復知漢乎彪既疾嚻言又愍狂狡之不息迺著王命論以救時難曰昔在帝堯之禪曰咨爾舜天之厯數在爾躬舜亦以命禹洎于稷契咸佐唐堯光濟四海奕世載德至於湯武而有天下雖遭遇異時而禪代不同至於應天順民其揆一也故劉氏承堯之祚氏族之世著乎春秋唐據火德而漢紹之始起沛澤則神母夜號以彰赤帝之符由是言之帝王之祚必有明聖顯懿之德豐功厚利積累之業然後精誠通乎神明流澤加乎生民故能為鬼神所福饗天下所歸往未見運世無本功德不紀而得崛起在此位者也世俗見高祖興於布衣不達其故以為適遭暴亂得奮其劒遊説之士至比天下於逐鹿捷者幸而得之不知神器有命不可以智力求悲夫亂世所以多亂臣賊子者也若然者豈獨闇於天道哉又不覩之於人事矣夫饑饉流隸單寒道路思有短褐之襲擔石之蓄所願不過一金然終不免轉死溝壑何則貧窮亦有命也况乎天子之貴四海之富神明之祚可得而妄處哉故遭罹厄會竊其權柄勇如信布彊如梁籍成如王莽然卒潤鑊伏鑕烹俎分裂又况么麽不及數子而欲闇奸天位者乎是故駑蹇之乗不騁千里之路鷰雀之儔不奮六翮之用楶梲之材不荷棟梁之任斗筲之子不秉帝王之重易曰鼎折足覆公餗言不勝其任也當秦之末豪傑共推陳嬰而王之其母止之曰自吾為子家婦而世貧賤今卒富貴不祥不如以兵屬人事成少受其利不成禍有所歸嬰從其言而陳氏以寧王陵之母亦見項氏之必亡劉氏之將興也是時陵為漢將而母獲於楚有漢使來陵母見之謂曰願告吾子漢王長者必得天下子謹事之無有二心遂對漢使伏劒以固勉陵其後果定於漢陵為宰相封侯夫以匹婦之明猶能推事理之致探禍福之機全宗祀於無窮垂冊書於春秋而况大丈夫之事乎是故窮達有命吉凶由人嬰母知廢陵母知興審此二者帝王之分決矣蓋在高祖其興也有五一曰帝堯之苗裔二曰體貌多竒異三曰神武有徵應四曰寛明而仁恕五曰知人善任使加以信誠好謀達於聽受見善如不及用人如由已從諫如順流趨時如響赴當食吐哺納子房之䇿濯足揮洗揖酈生之説悟戍卒之言斷懐土之情高四皓之名割肌膚之愛舉韓信於行陣收陳平於亡命英雄陳力羣䇿畢舉此高祖之大略所以成帝業也若乃靈瑞符應又可略聞矣初劉媪姙高祖而夢與神遇震電晦㝠有龍蛇之怪及長而多靈有異於衆是以王武感物而折契吕公觀形而進女秦始皇東遊以厭其氣吕后望雲而知其所處始受命則白蛇分西入關則五星聚故淮隂留侯謂之天授非人力厯古今之得失驗行事之成敗稽帝王之世運考五者之所謂趣舍不厭斯位符應不同斯度而茍昧權利越次妄據外不量力内不知命必喪保家之主失天年之夀遇折足之凶伏斧鉞之誅英雄誠知覺寤畏若禍戒超然逺覽淵然深識收陵嬰之明分絶信布之覬覦拒逐鹿之瞽説審神器之有授無貪不可幾為二母之所笑則福祚流於子孫天祿永終矣嚻不寤彪乃轉之河西大將軍竇融諮訪焉彪字叔皮右扶風安陵人成帝時彪姑為婕妤諸父昆弟貴幸當世父稚王莽時為廣平太守莽攝政欲文致太平使使者分行風俗采頌聲稚無所上被劾為延陵園郎由是班氏不顯莽朝彪幼好學家有賜書内足於財好古之士父黨揚子雲已下莫不造其門年二十而天下亂因避地西州及嚻將背漢竇融與書責讓之曰將軍當厄會之際乗不利之時承事本朝委身於國忠孝冠周霍德讓配呉札融等所以服高義願為役者也忿悁之間改節易圖百年累之一朝毁之豈不惜乎殆執事者貪功建謀以至於此融竊痛之融聞智者不危衆以舉事仁者不違義以要利初事本朝稽首北面忠臣節也及遣伯春垂涕相送慈父恩也俄而背之謂吏士何忍而出之謂留子何自起兵以來轉相攻擊城郭皆為丘墟生民轉於溝壑今其存者非鋒刃之餘則流亡之孤今傷痍之體未愈哭泣之聲未絶幸賴天運少還而大將軍復重其難是使瘡痍不得遂瘳幼孤復見流離庸人且為流涕况仁者乎惟將軍省察之嚻不納融乃與五郡太守請師期世祖嘉美之夏四月上幸長安謁園陵諸將議欲延嚻日月之期許爵其將帥以散其謀祭遵曰嚻姦計久矣今若案兵引日則其謀益深而公孫得固其姦謀不如遂進上從之遣呉漢耿弇諸將從隴道擊蜀隗嚻使王元據隴坻伐樹木以塞隴道諸將與戰不利還屯三輔馬援上書曰援自念事陛下本無公輔之薦左右之助臣不自陳陛下何因聞之故臣不復避瞽言昧死陳誠臣與嚻往為知交今聞與來歙書深更怨臣自計無負於嚻遣臣東謂臣曰僕北面稱臣加以本欲為漢足下往觀其政於汝意可即專心矣臣還報以赤心欲嚻善耳非欲陷於非義也嚻自挾姦心盜憎主人反欲歸怨於臣臣欲遂退不言則無以報陛下願詣行在所得露心腹陳滅西州之術然後退就壟畝飯蔬飲水隨四民之職死無所恨上報許援東詣京師具言擊嚻之計上大悅謂援曰吾方西誅隗嚻待詔勉卒所志是時建威將軍耿弇屯漆征虜將軍祭遵屯汧征西將軍馮異屯上林大司馬呉漢在長安中郎將來歙統領衆軍在安定援始將突騎五千匹諸將毎疑議更請呼援咸敬重焉而來歙深與援善嚻復上疏曰吏民聞大兵卒至驚恐自救臣嚻不能禁止兵雖有大利不敢廢臣子之節親自追還昔虞舜事父大杖則走小杖則受臣雖不敏不敢不勉今臣之在本朝如遂䝉恩更得洗心死骨不朽有司以嚻慢誅其子恂上不忍復使歙至汧賜嚻書曰昔柴將軍與韓信書云陛下寛仁雖有亡叛而後歸輒復位號不誅也故復賜書深言則似不遜略言則事不決今若束手復遣恂弟詣闕有全爵祿之福吾年已五十餘在甲兵中十年厭浮語虚辭即不欲勿報嚻知世祖籌之明乃遣使稱臣於蜀公孫述以嚻為朔寧王數遣兵助嚻太原人温序為護羌校尉行步至襄武為嚻將茍宇所執欲生降之謂序曰并勢力天下可圖也序曰受國重任本當効死義不貪生宇復曉喻序序怒叱之曰虜何敢脅漢將左右欲殺之宇止之曰義士欲死節賜劒令自裁序受劒銜鬚歎曰既為賊所廹無令鬚汙土遂伏劒上聞而憐之賜洛陽城旁塚地穀千斛縑五百匹除序子夀為郎遷鄒平侯相夀夢序告之曰久客思鄉里夀即棄官上書乞將序骸骨葬舊塋詔許焉冬十二月癸巳詔曰間者以軍旅未解用度不足故行十一之稅今往往屯田其令郡國田租三十稅一如舊制焉馮異在關中久求還京師上不聽有人上書言馮異專制關中威福自由號咸陽王上以章示異惶恐謝曰臣本諸生遇受命之會過䝉顧盼充備行伍位大將爵為通侯雖受任方面豫有㣲功此皆國家謨謀非臣所及也臣伏自思惟奉承詔㫖則戰無不尅率臣私心則未嘗不悔陛下獨見之明久而益逺乃知性與天道不可得而聞也當兵革始起豪傑競逐臣在傾側之中尚無過差之志况天下平定上尊下卑者乎誠宜謹守愚忠以自終始伏願明主知臣素心詔曰將軍之於國家義則君臣恩猶父子何嫌何疑而有懼意是冬馮異岑彭朝京師上謂公卿曰馮將軍是我兵起時主簿也使中黄門賜異珍寳衣服詔曰報倉卒蕪蔞亭豆粥呼沱河麥飯也異謝曰臣聞管仲謂桓公曰願君無忘射鉤臣無忘檻車齊國賴之臣願陛下無忘河北之難則百寮䝉恩天下幸甚後遣異將妻子西彭亦數宴見厚加賞賜既而還南使過家上先人冢詔大長秋朔望問夫人起居詔諸侯就國耿純上書願奮擊公孫述又陳前在東郡誅涿郡太守朱英親屬涿郡誠不自安乃更封純為東光侯上曰文帝謂周勃曰丞相吾所重也君為我率諸侯就國今亦然哉純遂就國弔死問傷國中愛之袁宏曰夫萬物云為趣舍不同愛惡生殺最其甚大者也縱而不一亂亡之道故明王制設號令所以一物心而治亂亡也今誅惡之臣内懼私憾不慮其弊從而易之是下用情而法不一也不一則多變多變則害生故王者之所保在於法一而不變乎靈夀侯邳彤薨世祖既平邯鄲遣任光還信都更封陵鄉侯李忠為中水侯遷丹陽太守治甚有稱為天下第一
