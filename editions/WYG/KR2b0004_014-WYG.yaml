body:
  text: 後漢紀卷十四晉袁宏撰孝和皇帝紀下第十四九年春三月癸巳濟南王康薨諡曰安王康不修法度通賔客人有上書告康使中郎將張陽董臣招來州郡姦猾顔忠劉子産等案圖書謀議不軌有司舉奏明帝以至親不忍窮竟削祝阿隰陰東朝陽安德西平昌五縣康殖財貨治宫室奴婢至千餘人廏馬千餘匹田八百餘頃何敞之為傅上疏諫曰蓋聞諸侯之義以制節謹度為忠然後能保其社稷和其民人昔管仲相齊九合之功而孔子譏其器小以奢侈逼上不知禮也今大王以骨肉之親享蕃國之尊當率先天下以為化首今國家制度王侯車服采章事有其科不可越也夫文緐者質枯木勝者人亡經傳所載也且君國者以道德仁義為營豈飾宫室充實廏馬為尊哉楚作章華以凶卒亡景公千駟民無所稱其效也如大王數游諸第出入無節或渉晨夜非所以逺防未然臨深履薄垂示後嗣之法也願大王修恭儉遵古制以法自治以禮率下省奴婢之數減乗馬之費以禮起居則敞之願藥酒苦於口而利於病至言逆於耳而便於行惟大王深察愚言王甚敬禮而不能改夏五月封皇后父隂綱為吳房侯綱上疏辭位以特進侯就第綱弟鳯謁為郎中子軼敞皆黄門郎陰氏自建武以來縁戚屬之故世為卿校外典禁兵内侍帷幄賞賜恩寵貴重當世秋七月蝗蟲飛過京都閏月辛巳皇太后竇氏崩太尉張酺與司空司徒共上奏依呂太后故事貶竇太后尊唬勿葬敬陵百官言之者亦多上手報酺曰禮臣子無貶親之義今皇太后家雖不遵法度然常欲自減損奉事十年恩不忍虧案前世上官太后亦無降黜其勿復議丙申葬章德竇皇后隴西羌犯塞執金吾劉尚將三萬騎擊平之九月庚申司徒劉方有罪自殺初梁貴人生和帝竇后以為己子養而隱之貴人者梁竦女也永平初竦兄陵鄉侯松因事徙邊後詔書聽還本郡闔門不出作經書數篇名曰七序班固見而稱之曰昔孔子作春秋而亂臣賊子懼梁竦作七序而竊位素餐者慙輕財好施不治産業兄嫂舞陰長公主振施諸梁親疎有序然猶獨敬異竦衣裘品物事各殊别竦未嘗獨饗常與宗族共之竦少長京師逮父兄時遊士林故不樂歸鄉里雅有大志每登高望逺未曾不歎息曰大丈夫居世生當封侯死當廟食不然詩書足以自娛州郡之職但勞人耳竦生二男三女長男棠及翟長女嫕及二貴人初肅宗選良家女貴人與姉以選入宫得幸於帝生和帝竦不勝喜與舞陰長公主私相慶語泄聞於竇氏竇氏欲專名太子外家心惡梁氏欲毁貶之乃誣以惡逆詔郡縣考竦死獄中家屬徙九真舞隂公主居新野使者䕶守之貴人與姉以憂死葬禮有闕竇后崩舞陰公主長子梁扈遣從兄䄠奏記三府曰春秋之義母以子貴漢家舊典也今梁貴人親育聖躬而不䝉尊號請得申議三府得記謝遣䄠太尉張酺獨見䄠具問之曰此公之職而梁氏之福也㑹以蝗飛過京師召見對説因具言䄠記上曰君意云何不知葬禮有闕也對曰陵上宜置長史加祠祭之禮收録諸舅以明親親上復曰於義如何酺曰春秋之義今漢家猶行之梁竇並為名姓保守河西以忠獲封竇憲兄弟不軌太后謗議藉藉聞於天下姓族無以逾梁氏加以親外家誠宜尊顯上曰非君孰為朝廷思之家事藉藉君所知也上深納酺言㑹貴人姉嫕上書曰同産女弟貴人前充後宫䝉先帝厚恩得見寵幸皇天所授誕育陛下為竇憲兄弟譖虐妾父竦寃死牢獄骸骨不掩老母孤弟逺徙萬里獨妾遺脱逃伏草野常恐没命無由自達值陛下神聖之德統覽萬機憲兄弟皆已伏誅海内曠然各得其所妾得蘇息拭目更視乃敢昧死自陳妾竊悲死父既寃不可復生母年七十逺在絶域不知死生願乞母弟還本郡收葬竦骨妾聞文帝既立薄氏䝉榮宣帝繼統史氏復興妾自悲有薄史之親獨不䝉外戚餘恩辭甚悲切上惻然感悟使中常侍掖庭令雜訊問嫕辭證明審甲子改殯梁貴人于承光宫追尊為皇太后諡曰恭懐葬於西陵上乃别見嫕嫕具自陳説上歔欷流涕留嫕宫中連日不出賞財物第宅旬月之閒貲累千萬嫕素有行遂寵之加號梁貴夫人擢奬嫕夫調為羽林左監追加諡竦為親愍侯遣中謁者迎竦喪于京師改殯之賜東園畫棺玉匣冢葬于西陵旁上親臨送徵竦妻子還京師宋貴人遇竇氏之譖葬禮有闕清河王慶涕泣不敢言常私祭于室及梁后改葬慶乃上書求上貴人冢詔聽許悲喜交集曰生雖不得供養終得奉祭祀私願畢矣太尉張酺上疏乞骸骨上使中黄門問疾加以珍羞酺稱篤詔曰元首不明黎民困窮朕與君同其憂責豈可引退邪其勿復言是時酺子蕃以郎侍講上復詔蕃曰陰陽不調朝廷望公以為憂託病自退潔已而已誰當與朕同心者非所望於公也酺惶恐詣闕謝因起視事酺自為三公父尚在酺每遷父輙自田里來適㑹歲臘公卿罷朝共詣酺舉酒為酺父夀極歡移日當時以為榮冬十月癸卯光禄勲吕蓋為司徒十一月丙寅司空張奮老病致仕壬申太僕韓稜為司徒奮在家上疏曰安上治民莫善於禮移風易俗莫善於樂又曰揖譲而治天下者禮樂之謂也先王之道於斯為盛故曰禮樂不興刑罰不中民無所措手足漢既受命禮樂宜作圖讖明文是以先帝逺監前朝每志存禮樂衆儒不達多生駭異臣累世輔位而漢禮樂未定誠切以為憂負臣犬馬齒盡誠冀先死及見禮樂之定上善之十年夏五月封梁堂為樂平侯雍為乗氏侯翟為單父侯位特進堂等自九真還過長沙迫促竇瓌令自殺秋九月庚戌初復廩犧官冬十二月戊辰梁王暢薨諡曰節王母陰貴人有寵於明帝暢尤愛幸國土租入倍於諸國章帝立縁明帝意賞賜恩寵務加篤厚乃封暢舅陰棠為西陵侯暢性聦慧然少驕貴頗不遵法度暢常夢見星宿從官下忌自言善占夢又能使六丁神暢使卜筮言王當為天子暢心喜永元初豫州刺史舉奏暢考訊辭不服有司請徵暢詣獄天子以加恩不忍聽復奏徙九真有詔削城武單父二縣暢懼上疏辭謝曰臣天性狂愚少長深宫從官侍史利臣財物暢無所照見與相然諾不自知陷死罪自負自悔無所復及陛下聖德𢎞裕枉法赦臣上念以負先帝而令陛下為臣牧恥天下誠無氣以息筋骨不相連臣暢知大貸不可再得束身不敢復出入乞裁食雎陽穀熟虞䝉寧陵五縣還餘所食四縣臣暢小妻三十七願還其無子者選擇謹敕奴婢三百人其餘所受虎賁官騎鼓吹蒼頭兵弩廏馬皆上還本署陛下加大恩開臣自悔之門假臣小善之路令天下知臣得去死就生頗能自悔若不聽許臣實無顔以久生下入黄泉無以見先帝詔曰唯王至親之屬純淑之美傅相不良不能防邪至令有司紛紛彰于内外今王深思悔過以自克責朕惻然傷之傳曰克已復禮天下歸仁其安心靜意茂休厥德强食自愛其何譲哉暢固請章數十上卒不許十一年春三月遣使行郡國水旱災貧不能自存者廩貸穀食令山林池澤勿收假税夏四月丙寅大赦天下十二年春三月賜天下男子爵各有差鰥寡孤獨不能自存者粟人二斛博士弟子布三疋夏閏四月戊辰南郡秭歸山崩壓殺百餘人秋七月辛亥朔日有蝕之初太尉張酺與司𨽻晏稱㑹于朝堂酺從容謂稱曰三府掾史多非其人既罷稱奏令三府長吏各擇其掾史酺以恨稱㑹復共謝以責稱稱辭色不順酺怒廷叱之稱乃奏酺以為怨望上以酺先帝師優游不斷詔公卿廷議之司徒吕蓋以為酺知公門有儀不屏氣鞠躬而作色大言不可示四方乃䇿免酺曰詩云節彼南山惟石巖巖赫赫師尹民具爾瞻今君在位八年于兹康哉之歌既無聞焉而於兩觀之下有醜慢之音傷南山之體虧穆穆之風將何以宣示四方儀刑百寮履霜知氷朕甚懼焉君其上太尉印綬君自取之靡有後言九月太尉張酺䇿免歸里舍謝遣門生闔門不通賔客中郎將敞等多言酺公直忠正不宜久棄草廬上亦雅重之數年復以酺為光禄勲丙辰大司農張禹為太尉冬西域䝉竒兜勒二國内屬十三年秋九月詔曰水旱不節蝗螟滋生令天下田租皆半入被災者除之貧民受貸種食皆勿收責冬十月安息國獻師子大雀班超上書求代曰臣聞太公封齊五世葬周故狐死首丘代馬依風夫周齊同在中土千里之間爾況於萬里絶域小臣能無依風首丘之思哉蠻夷畏壯侮老自其天性臣犬馬齒殲常恐奄忽僵仆孤魂棄捐臣義不營私竊恐後世以臣為没西域不敢望到酒泉郡但願生入玉門闗以示邊境威外夷臣老病衰困冒死瞽言謹先遣子勇隨獻物入塞以臣生在令勇見中土超妹昭懼超遂死於邊上書曰妾同産兄西域都䕶超捐軀為國以功自効賴陛下神靈得待罪沙漠至今積三十年矣骨肉妻子生不復相識随出士衆皆已死亡超年至七十衰老被病扶杖而行雖欲竭盡其力以報大恩迫於歲暮犬馬齒盡蠻夷之性悖逆侮老恐開姦宄之源生逆亂之心而公卿大夫咸懐一切而莫肎逺慮如有卒暴超之氣力不能從心即恐上損國家累世之功下棄忠臣竭力之用以榮為辱誠可痛也故超萬里歸誠自陳苦急延頸逾望三年于兹超有書與妾生訣恐不復相見妾誠傷超以壯年竭忠孝於沙漠罷老則使捐棄於曠野誠可哀憐如不䝉救䕶超後有一旦之變冀幸超家得䝉趙母衛姬先請之貸書奏上感其言乃徵超還以校尉任尚代超超到拜射聲校尉數月薨朝廷愍惜之賵贈甚多子勇復有功西域初尚與超書曰君侯在外國三十餘年而小人猥承君後任重慮淺宜有以誨之超曰任君數當大位豈班超所能及哉必不得已願進愚言塞外吏士本非孝子順孫皆以過補屯部蠻夷獸心難養易動今君性嚴急清水無大魚將軍宜寛小過緫大綱而已尚私謂所親曰我以班君當贈以竒䇿今所云平平耳尚後竟遭邊禍如超所言袁宏曰古之有天下者非欲御制之也貴在安靜之故修已無求於物治内不務於外自小至大自近及逺猶之有本枝之有葉故邦畿固而九服寧中國實而四夷賔夫唐虞之盛德澤之濃正朔所及五千而已自此以外羈縻而弗有也三代建國弗勤逺畧岐邠江淮之間習其故俗朔野遼海之域戎服不改然而冕旒端委南面稱王君臣泰然不以區宇為狹也故能天下乂安享國長久至於秦漢開其土宇方于三五之宅固以數倍矣然顧瞻天下未厭其心乃復西通諸國東略海外故地廣而威刑不制境逺而風化不同禍亂薦臻豈不由斯當世之主好為身後之名有為之人非能守其貧賤故域外之事興徼倖之人至矣夫聖人為治貴得鎮静之才以安天下故徼倖之人王制之所去也班超之功非不謂竒也未有以益中國止足以服四夷故王道所不取也戊辰司徒吕蓋老病致仕十二月丁丑光禄勲魯恭為司徒恭字仲康右扶風平陵人也父為武陵太守卒官時恭年十二弟丕年七嵗晝夜號泣哀動路人郡吏贈送一皆不受處喪如禮鄉里竒之年十五與弟俱居太學詣博士受業閉門講誦不隨儔黨兄弟知名為學者所宗扶風數以禮請謝而不應母强遣之不得已而去同業隨之者前後盈路恭乃始為新豐教授以丕年小欲就其名常託病不仕及丕舉方正乃始為郡吏辟太尉掾遷中牟令民李勉為母所言恭召就責問因為陳從母恩德勉慙悔返恭為政專以德化不任刑罰亭長從人借牛而不肯還牛主訟於恭恭勅令亭長還牛亭長不還如是者三遂不還恭涕泣曰德化不行也欲解印綬去掾吏涕泣固争亭長即還牛詣獄受罪恭貫出不問於是吏民敬信皆不忍欺是時天旱蝗獨不入中牟界河南尹袁安恐有不實使部掾肥親案行之皆如所言恭隨親行阡陌坐桑下雉過止其側旁有小兒親曰兒何不擊雉小兒曰雉方將雛親黙然而起曰今來考君之短耳蟲不犯境此一異也化及鳥獸此二異也豎子有仁心此三異也府掾久留但擾賢因還府以狀白安安美其治是年嘉禾生縣庭中安具以狀上㑹詔舉賢良方正恭薦中牟人王方天子徵方公車禮之與公卿舉賢者同上即位徵為博士侍中車駕每出郊廟恭常陪乗上顧問之語及政治有便於民者無所隱諱十四年春二月修故西海郡三月戊辰上臨辟雍享射大赦天下夏六月封中常侍鄭衆為列侯賞討竇氏之謀也衆南陽人明帝時以謹慎事太子家章帝即位為中常侍竇憲専權内外螘附衆獨不交結一心王室竇氏既誅遷大長秋天子常與謀國事閹官専權自衆始焉辛卯皇后陰氏廢初后與外祖母鄧祀咒詛詔中常侍張禎尚書陳襃於掖庭窮治其獄父綱自殺兄軼等徙合浦母及后二姨母徙日南祀等内外親皆免歸本郡冬十月辛卯立皇后鄧氏后鄧訓女也訓閨庭甚嚴諸子進見未嘗賜席至於后事無大小每輙咨之弟邠曰平生不與諸男語今豈年衰邪訓曰我不衰是女也雖小諸兒無及者必有益於我家是以竒之初鄧禹佐命位冠諸臣常言曰我常將百萬衆秋毫不犯未嘗妄殺一人子孫必當大興訓嘗為謁者治石臼河甚有方活數千人謂弟邠曰吾聞活千人者有封子孫豈其然乎訓生五男三女長男隲次京次悝次𢎞次闓長女燕次綏即后也次容后年五歲祖母為翦髮老人目𡨕并中后額忍痛不言一額盡傷左右怪而問之后曰太夫人慈恩為斷髮難傷老人意故忍之耳后姉燕早卒有遺腹女娥在襁褓后年十二傷娥早孤躬自養撫遂為閨門所敬與叔父邠及諸兄語常問祖父禹為布衣佐命時事邠為説結髮殖業著名鄉閭遭世祖龍飛杖䇿歸德征伐四方天下大定功成之後閉門自守事寡姉盡禮敬訓子孫有法遭光武皇帝憂悲哀吐血因發病薨后未嘗不歎息流涕言立德之苦乃至於斯后通論語志在經書不問家事后母非之曰女人書足記注通一孝經而已今不務女工長大寧舉博士邪后不欲重違母意晝則修女工夜則讀經傳宗族皆號曰諸生初相工蘇文徧相家人至后大驚曰此成湯之骨法也貴不可言室家乃竊喜而不敢傳后長七尺二寸年十六以選入掖庭為貴人承事陰后夙夜兢兢撫接同列常克己以下之遂有寵每疾上輙令母兄入侍醫藥不拘以日數后輙言外家久在省中上令陛下有私妾之譏下令妾被内顧不知足之謗上下有損誠不願也上曰他人以數入為榮而鄧貴人反為憂誠難及也諸貴人競自修飾后獨衣不貳采常令侍者齎素衣設與陰氏同服即時解易不欲同服避正適也上乃歎曰修德之苦乃如是也上每訪問政事謙退不敢對欲令陰后得進不獲已然後塞所問陰后短小舉止時失儀左右掩口而笑后獨愴然不樂為之隱諱若已之失及與陰后進止不敢正立坐則為之僂所以苦心曲體勞謙甚至上愈重之后每當進見輙以疾退御左右常為上言繼嗣不多當普施恩惠以獲子孫發言懇惻形于顔色陰后素妒見后寵甚多設方巧欲以危后上嘗病陰后曰我得意之後皆當夷滅之后恐舉宗受禍流涕曰竭節以事陰后可謂至矣竟不為所祐而當獲罪於天無所禱婦人雖無從死之節然越姬有必死之志上可以報上厚恩次可解宗親之禍下不令陰氏有人豕之譏即欲飲藥㑹宫人救止因詐言屬有來者陛下病已差信以為然故止其后宫人告陰后巫蠱事后涕泣救䕶無所不至自陰后之廢上歎曰聖后之尊與帝同體承宗廟母天下誰能當之唯鄧貴人德冠後庭為能充之耳初陰后時諸家四時貢獻以奢侈相高器物皆飾以金銀后不好玩弄珠玉之物不過於目諸家歲時裁供紙墨通殷勤而已后自入宫後遂博覽五經百家圖讖無不畢覽善易及隂陽占候希有者上每欲官秩后諸兄后輒推誠固譲自抑為務故隲終帝世不過虎賁中郎隲為虎賁郎時京悝𢎞闓黄門郎京早卒贈以騎尉印綬丁酉司空韓稜薨大司農徐防為司空稜字伯師潁川舞陽人幼失父母與孤弟居壯大推家財數百萬與從昆弟鄉里高之仕郡至功曹太守葛興疾錯亂稜輔助經年政令無闕興子嘗出教轉吏稜封還不聽因訟稜以掩蔽興疾専郡事遂致禁錮後解禁網辟司空府稍遷至尚書令在機密數有忠言進用良吏章帝以稜憂國忘家夙夜匪懈數賞賜之是時郅壽陳寵俱為尚書皆以才能見重帝賞三人寳劒手自題其名韓稜龍泉郅壽漢文陳寵鍛成論者以為稜淵深有謀故得龍泉壽明達有章故得漢文寵敦朴無華故得鍛成防字謁卿沛國銍人也矜嚴有容貌初為郎明帝見而異之權為尚書郎在臺閣十餘年未嘗有過稍遷至少府大司農憂勤於政事所在著名迹十五年春二月出廩貸郡國被災貧民各有差夏四月甲子晦日有蝕之冬十月戊申行幸章陵祠舊宅園廟戊午行幸雲夢是時廣漢人王渙為洛陽令治有異迹初渙游俠尚氣晩節好儒術為治循名責實抑彊扶弱并官職吏輙兼書佐小史無事皆令讀孝經病卒官百姓無老幼皆叩心泣涕相賦斂為祭者數千人渙喪當還鄉里新安道以西道旁往往㑹聚設祭吏問其故咸言平常到洛為吏卒所抄奪王君到洛不復侵擾故欲報恩後民思其德為立祠安陽亭西每有酒食輙弦歌薦之十六年二月以兖豫徐冀民穀不登遣三府掾分行貧民勸民盡地利貧無以耕者為雇犁牛直夏客星入紫微宫秋七月辛酉司徒魯恭䇿免庚午光禄勲張酺為司徒八月己酉司徒張酺薨酺病困敕其子曰顯節陵埽地露祭欲率天下以儉也吾為三公不能使從制豈可犯之乎無起祠堂露祭而已上聞酺薨愍焉服縞素即賜以印綬冢塋恩寵加隆於相酺字孟侯汝南細陽人永平中崇尚儒術學自皇太子諸王侯及大臣子弟莫不受經又為外戚樊氏郭氏隂氏馬氏諸子弟立學號曰四姓小侯置五經師酺以明經充焉除為郎每朝㑹進見輒講於上前辭義髙亮音動左右肅宗即位出為東郡太守酺以出為外郡内不自得上疏願留左右上不聴賜錢三十萬亟發之官酺雖儒者剛而有斷下車擢用賢俊挫擊豪彊旬月之間郡中肅然酺既出上見諸王師傅曰東郡太守張酺講授畢輙諫正誾誾人有小善稱之不已忠言謇謇有史魚之風初賈逵明古學曹襃制漢禮酺常非之及為太尉上疏陳其不可書五奏上知酺守學不通寢其奏冬十月辛卯司空徐防為司徒太鴻臚陳寵為司空徵鉅鹿太守魏霸為將作大匠霸濟陰人也少失父母兄弟同居數十年躬執勤苦動則推讓及為郡妻子不之官霸以兄嫂勤而已獨榮樂常衣布蔬食敕妻子親執耕蠶與兄弟子姪同勞逸為政尚寛恕不求備於一人掾吏有過輙私責使改不改罷之終不暴揚其惡吏有相譖者輙歎息曰某甲賢者也不及人短太守以是重之其人慚責自引退郡中化之皆和睦後拜太常以病致仕為光禄大夫霸妻死長兄伯為霸取妻送至官舍霸笑曰年老兒子備具何養他家婦邪自入拜其妻曰夫人視老夫室中何蔵而空逺来謀生計義不相屈即拜而出妻慚求去遂送還之匈奴北單于遣使奉獻元興元年春二月追爵諡皇后父鄧訓為平壽敬侯司空陳寵以非舊典也太尉張禹司徒徐防以為宜封爭之連日乃從禹防議由是虎賁中郎将有恨於寵夏四月封鄧禹馮異後為列侯丙午大赦天下五月癸酉扶風雍地震十二月辛未帝崩于嘉德殿初數失皇嗣太子養於民間羣臣無知者莫不惶懼鄧后乃收皇太子於民間皇子勝長有疾皇子隆生百餘日后養之太后乃引兄等定䇿禁中立隆為皇太子是日即皇帝位太后攝朝賜天下男子爵各有差鰥寡孤獨篤癃貧不能自存者粟人三斛封皇子勝為平原王詔曰昔唐虞之盛猶待四輔周文之寧實在多士漢興舊制咸立保傳並建左右以參聽斷太尉禹三世在位黄髮罔愆司徒防竭力致身先帝嘉之其以禹為太傅防為太尉參録尚書事百官緫已以聽政初郡國言符瑞八十餘品和帝恐虛妄抑而不宣後漢紀卷十四
