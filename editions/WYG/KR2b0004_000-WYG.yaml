body:
  text: 周贍近乎通人之作然因藉史遷無所甄明荀悦才智經綸足為嘉史所述當世大得治功已矣然名教之本帝王髙義韞而未叙今因前代遺事畧舉義教所歸庶以𢎞敷王道補前史之闕古者方今不同其流亦異言行趨舍各以類書故觀其名跡想見其人丘明所以斟酌抑揚寄其髙懐末吏區區注疏而已其所稱美止於事義疏外之意歿而不𫝊其遺風餘趣蔑如也今之史書或非古之人心恐千載之外所誣者多所以悵怏躊躇操筆悢然者也
