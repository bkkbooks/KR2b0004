body:
  text: 後漢紀卷十二晉袁宏撰孝章皇帝紀下第十二八年春正月壬辰東平王蒼薨初蒼疾病上憂念蒼使道上置驛馬以知疾之增損薨問至上悲不自勝詔東平傅録王建武以來所上章奏及作詞賦悉封上不得妄有闕司空第五倫見上悼愴不已求依東海王故事自請䕶喪事上以東海王行天子禮舊制無三公出者乃遣大鴻臚持節䕶喪事詔諸王及公主京師諸侯悉詣東平王葬哀策曰咨王丕顯勤王室親命受策昭于前世出作蕃輔克慎明德昊天不弔不報上仁使屏余一人煢煢靡有所終今詔有司加賜鸞輅車乗龍旂九旒虎賁百人諡曰獻王秋八月拜班超為將兵長史以徐幹為司馬遣衛候李邑使烏孫到于闐上言西域功不可成盛毁超云擁愛妻抱愛子安樂外國無内顧心超聞邑言歎曰身非曾參而有三至之䜛恐見疑於當世遂去其妻上知超無二心乃詔責邑超遣邑将烏孫侍子還京師徐幹謂超曰邑前親毁君欲敗西域今可縁詔留之遣他吏送侍子超曰是言之狹也以邑毁超故遣之内省不疚何恤邑言今留之一時快意然非忠臣也於是疎勒王忠反保烏即城超乃立其府丞成大為疎勒王其後忠設詐偽降願棄前罪為殺新王超内知其謀而偽許之忠大喜將輕騎三百詣超超密勒兵待酒數行超叱吏執忠斬之因擊其衆大破之冬十二月行幸陳留梁國淮揚潁川戊申詔曰五經剖判去聖彌逺章句傳説難以正義恐先師道喪微言遂絶非所以稽古求道也其令諸儒學古文尚書毛詩穀梁左氏𫝊以扶明學教網羅聖㫖古文尚書者出孔安國武帝世魯恭王壞孔子宅欲廣其宫得古文尚書及禮論語孝經數十篇皆古字也恭王入其宅聞琴瑟鐘磬之音瞿然而止孔安國者孔子之後也盡得其書尚書多於伏生所𫝊六十篇安國獻之毛詩者出於魯人毛萇自謂子夏所傳河間獻王好之穀梁者瑕丘江公受之魯申公武帝時董仲舒善説公羊江公訥於口辯義不如董仲舒故穀梁學寖微唯衛太子善穀梁宣帝即位聞衛太子好穀梁乃求能為穀梁學者得沛人蔡千秋與公羊家竝説上善穀梁後大儒蕭望之等廷論二家同異多從穀梁由是穀梁學復興漢初張蒼賈誼張敞皆修春秋左傳誼為左氏訓故御史張禹與蕭生同官數言左氏於望之望之善之及翟方進賈䕶劉歆竝傳左氏學故言左氏者本之賈䕶劉歆此四學雖傳於世至建武初議立左氏學博士范升議譏毁左氏以為不宜立明帝即位左氏學廢乃使郎中賈逵叙明左氏大義逵又言古文尚書多與經傳爾雅相應於是古文尚書毛詩周官皆置弟子學者益廣逵字景伯右扶風平陵人身長八尺二寸弱冠能誦五經左傳兼通穀梁諸家之説沈深有用其所學者可為人師明帝時為郎使與班固校書帝即位雅好古學詔逵入講白虎觀使説左氏傳上喜其説逵母常病上以逵居貧欲賜之以校書比例多乃以錢二十萬使潁陽侯馬防與逵逵讓帝曰逵母病此子貧無事於外屢空且從孤竹於首陽矣其恩厚若此遷衛士令逵才學皆通其所著論為學者所宗性佚不修小節當世以此譏焉故不至大官袁宏曰堯舜之傳賢夏禹殷湯授其子此趣之不同者也夏后氏賞而不罰殷人罰而不賞周人兼而用之此徳刑之不同也殷人親盡則婚周人百世不通此婚姻之不同也立子以長三代之典也文王廢伯邑考而立武王廢立之不同者也君親無將將而必誅周之制也春秋殺君之賊一㑹諸侯遂得列於天下此褎貶之不同也彼數聖者受之哲王也然而㑹通異議質文不同其故何耶所遇之時異夫奕者之思盡於一局者也聖人之明周於天下者也茍一局之勢未嘗盡同則天下之事豈必相襲哉故記載廢興謂之典謨集叙歌謡謂之詩頌擬議吉凶謂之易象撰録制度謂之禮儀編述名迹謂之春秋然則經籍者寫載先聖之軌迹者也聖人之迹不同如彼後之學者欲齊之如此焉可得哉故曰詩之失愚書之失誣易之失賊禮之失煩春秋之失亂不可不察聖人所以存先代之禮兼六籍之文將以廣物貫心通於古今之道今去聖人之世幾將千年矣風俗民情治化之術將數變矣而漢儒各執一説春秋之中復有同異其後殷書禮傳徃徃間出是非之倫不可勝言六經之道不可得詳而治體云為遷易無度矣昔仲尼没而微言絶七十子喪而大義乖諸子之言紛然殽亂太史公談判而定之以為六家班固演其説而明九流觀其所由皆聖王之道也支流區别各成一家之説夫物必有宗事必有主雖治道彌綸所明殊方舉其綱契必有所歸尋史談之言以道家為統班固之論以儒家為高二家之説未知所辯嘗試論之曰夫百司而可以縂其綱因物而制其動動而非已也虛無以應其變變而非為也夫以天下之事而為以一人即精神内竭禍亂外作故明者為之視聦者為之聽能者為之使惟三者為之用不行而可以至不為而可以治精神平粹萬物自得斯道家之大㫖而人君自處之術也夫愛之者非徒美其車服厚其滋味必將導之訓典輔其正性納之義方閑其邪物故仁而欲其通愛而欲其濟仁愛之至於是兼善也然則百司𢎞宣在於通物之方故儒家之算乃先王教化之道居極則秉𤣥黙以司契運通則本仁愛以教化故道明其本儒言其用其可知也矣夫大道行則仁愛直達而無傷及其不足則法參差而並陳患萬物之多惑故推四時以順其性此隂陽家之所生也懼天下擾擾故辨名正位以歸其真此名家之所起也畏衆寡之相犯故立法制以止殺此法家之所興也慮有國之奢敝故明節儉以示人此墨家之所因也斯乃隨時之迹緫而為治者也後之言者各演一家之理以為天下法儒道且猶紛然而况四家者乎夫為棺椁遂有厚葬之弊喪欲速朽亦有棄尸之患因聖人之言迹而為支離之説者焉可數哉故自此以往略而不論元和元年春正月日南獻白雉夏四月己卯封東平王子尚為成都王六月辛酉沛王輔薨諡曰獻王輔好經書矜嚴有法度在國終始可觀稱為賢王秋八月甲子大尉鄧彪以老病罷大司農鄭𢎞為太尉彪字智伯南陽新野人事父以行孝稱及薨譲國與異母弟明帝髙其節詔聽之辟府掾稍遷太僕卿遭後母喪辭疾乞身以光禄大夫行服服竟遷大司農數月為太尉彪以禮譲帥下在位為百寮規式以疾上書乞骸骨策曰惟君以曾閔之行禮譲之高故慕君德禮以屬黎民重違君意其上太尉印綬賜錢三十萬俸二千石禄終厥身君專精養和以輔天年詔太常四時致祭宗廟之胙河南尹常以八月旦奉羊酒癸酉令天下繫囚減罪一等死罪徙邊戍九月行幸陵祠舊宅園廟徵故臨淮太守朱暉為尚書僕射暉字文秀南陽人也少以節操聞初帝舅信陽侯陰就方貴慕暉名自往侯之暉避不見復遣家丞致禮暉閉門不受後為郡吏太守阮況嘗以事干暉暉不從及卒暉厚送其家左右咸怪之暉曰前阮君有求於我恐以貨汚君故不與言今重送者欲以明吾心驃騎將軍蒼聞而辟之甚禮敬焉正月朔旦蒼應奉璧入賀故事少府給璧陰就驕貴吏傲不奉法求璧不可得蒼坐朝堂漏且盡而璧不至不知所為顧謂掾屬曰若之何暉望見府主簿持璧即往紿之曰我聞璧而未曾見試觀之主簿以璧授暉暉顧召令史奉之主簿驚曰少府當以朝暉叱之曰罪歸暉不及爾也主簿遽以白就就曰朱掾義士勿復求更以他璧朝蒼罷謂暉曰屬者掾自視孰與藺相如邪明帝幸長安欲嚴宿衛以暉為衛士令稍遷臨淮太守暉好節概其所㧞用皆厲行士其諸報怨以義犯法者率皆為求門户而生宥之其不義者即時僵仆不以汙獄門故吏民畏愛之暉剛於為吏見忌於上故所在數被劾去臨淮屏居野澤布衣蔬食不與邑里通鄉黨譏其介南陽人大饑暉盡其家貨分宗族故舊不問餘焉初同縣張堪素有名見暉甚重之接以友道暉以其先達未敢當也後俱為二千石絶不復通及南陽饑而堪已卒暉聞其妻子貧窮乃自往候視贍賑之其子頡怪而問之暉曰吾以明素志也其信義慎終皆此類也冬十月行幸江陵十二月除諸禁錮不得仕者令得仕二年春正月初令婦人懷胎者當以二月賜穀三斛復夫勿算一歲二月鳯皇集于肥行幸太山丙子大赦天下復博奉高嬴三縣無出租賦三月行幸魯祠東海恭王庚寅祠孔子及七十二弟子壬辰行幸東平王幸蒼宫謂諸子曰思其人至其鄉其處存其人亡因泣下霑襟上幸蒼陵為備虎賁鸞輅龍旂以章顯之賜御劒於陵前初蒼為驃騎將軍時吏丁牧周栩以蒼敬賢下士不忍去為王家大夫數十年事祖及孫引見嗟歎之擇為議郎遂幸魏郡河内登太行五月丙戌詔曰鳯皇黄龍鸞鳥比集七郡神雀甘露降自京都祖宗舊事或班恩施其賜百官錢各有差天下吏爵人三級高年鰥寡孤獨帛人一匹令天下大酺五日鳯皇黄龍所集亭皆無出今年租賦見者及太守令長丞尉帛各有差冬十一月壬辰詔曰余末小子託於君位曷以恢崇祖宗仁濟天下三代損益優劣殊軌況於頑陋無以易民視聽雖欲從之末由也已博士曹褎覩兹詔也知上有制作意乃上疏曰昔聖人受命而王莫不制禮作樂以著功德功成作樂治定制禮所以協和天人示人軌則也故瑞應見天乃作今皇天降禮嘉瑞並臻制作之符甚於言語宜定諸議以成漢禮章下太常巢堪以為不可許是歲班超發諸國兵歩騎二萬擊莎車莎車求救於龜兹王遣左將軍發温宿姑墨尉頭兵合五萬人助之超召部曲及于闐疎勒王議曰兵少不敵計莫若各散去于闐從此西吾亦從此東夜半聞鼓聲便發衆以為然乃陰緩所得莎車生口龜兹聞之喜使左將軍將萬騎於西界欲遮于闐王人定後超乃召諸司馬勒兵厲衆雞鳴馳赴莎車營奄覆之莎車驚怖斬首五千餘級大獲其馬畜財物分兵收其穀莎車遂降自是威震天下西域恐怖三年三月丙寅太尉鄭𢎞薨丁卯大司馬宋由為太尉鄭𢎞字巨君㑹稽山陰人也曾祖自齊徙山陰事博士焦貺門徒數百人當舉明經其妻勸貺曰鄭生有卿相才應此舉也從之楚王英之謀反誣天下知名者貺為河東太守以楚事遇疫病道死妻子閉獄中考掠連年諸故人皆易姓名以避禍𢎞獨髠首負鑕訟貺罪明帝感悟乃原免家屬𢎞送貺喪及妻子於陳留畢葬旋鄉里為鄉嗇夫太守第五倫行部見𢎞問民得失𢎞對甚明倫甚竒之擢為督郵舉孝亷稍遷尚書僕射上問𢎞欲三河三輔選尚書御史孝亷茂才餘郡不得選𢎞對曰虞舜出於姚墟夏禹生於石紐二聖豈復出於三輔乎陛下但當明敕有司使得人爾上善其言是時烏孫王遣子入侍上問𢎞當答其使不𢎞對曰烏孫前為大單于所攻陛下使小單于往救之尚未賞今如答之小單于不當怨乎上以𢎞議問侍中竇憲對曰禮曰禮有往來易曰無往不復天地際也𢎞章句諸生不達國體上遂答烏孫使小單于忿悉攻金城郡殺太守任昌上謂𢎞曰朕前不從君議果如此𢎞對曰竇憲姦臣也有少正卯之行未被兩觀之誅陛下前何用其議遷大司農太尉數陳竇憲勢太盛刧持海内言苦切為憲所不容奏𢎞漏泄奏事坐詰譲收印綬𢎞乞骸未許疾篤上書曰臣東野頑闇本無尺寸之功橫䝉大恩仍登上司中夜怵惕懼有折足之戒自揆愚薄無益國家之事雖有殺身焉可謝責是以不敢雷同指陳竇憲姦惡幸漏露言出患入竇憲之姦惡貫天達地毒流八荒虐聞四極海内疑惑賢愚疾惡憲何術以迷主上流言噂􅊱深可歎息昔田氏簒齊六卿分晉漢事不逺炳然可見陛下處天子之尊自謂保萬世之祚無復累卵之危信䜛佞之臣不計存亡之機臣雖弱疾命在移晷身没之日死不忘忠願陛下為堯舜之君誅四凶之罪以素厭人鬼憤結之望章省上遣太醫占𢎞疾臨薨悉皆還賜物敕妻子葛巾布衣殯以素棺初𢎞為第五倫舉吏其後並為三公當世以為榮是時歲比不登而諸王皆留京師賞賜過厚太尉掾何敞説太尉宋由曰禮一穀不登則損服徹膳五穀不登則廢祭祀乗馬就牧天下有饑寒者若已使然今比年傷於水旱民不收穫邊方外域捐妻子流離道路中州内郡公私屈竭此宜損徹節用之時國恩覆載賞賜過度但聞臘賜王主已下傾竭帑藏夫明君行賜以制忠臣受賞有度明公位尊任重責深負大上當匡正綱紀下當安利元元豈容無違而已哉宜先正已率下奉還所得賜因陳得失條奏王侯就國孔僖崔駰同習春秋語吳王夫差時事僖廢書而歎曰若是所謂畫龍不成反為狗者駰曰昔者孝武皇帝始為天子方年十八崇信聖道師則先生五六年間號勝文景及後放恣忘其前善僖曰書傳若此者多矣鄰房生梁郁遥和之曰如武帝亦為畫龍不成復是狗邪僖駰黙然不答郁怒恨之陰上書告駰僖誹謗先帝譏刺世事下有司駰詣吏受詰僖上書曰凡言誹謗者謂無事而虛加誣罔也至如孝武之政善惡顯在漢史明如日月是為直説實事非虚謗也夫帝王為善則天下之善咸歸焉其不善則天下之惡亦萃焉斯皆有以致之不可以責人也陛下即位已來政教未過德澤有加天下所共見也臣等獨何譏刺哉假使所言是也則朝廷所宜改所言非也亦王者所宜含容陛下不推其原茍肆私忿臣等即死顧天下必廻視易聽以此窺陛下心矣上始無罪駰等意及得僖奏下制勿問僖以才學為郎校書東觀上言圖讖非聖人書駰子瑗瑗子實皆以才文顯冬十月西羌寇張掖隴西金城䕶羌校尉傅育將兵擊之章和元年春正月詔曰朕以不德受祖宗𢎞烈夙夜祇畏無以章于先王漢遭莽弊禮壞樂崩因循故事多非經典知其説者之於天下豈不逺乎曹襃喟然歎曰昔奚斯頌魯考甫詠殷竭忠顯祖行之美者當仁不讓奈何疑焉遂復上疏陳制禮意事下三公未奏上曰諺言作舍道邊三年不成乃使襃於南宫東觀差序禮事依舊儀參五經驗以䜟記自天子至於庶人終始制度以為百五十篇襃字叔通魯國薛人也父充建武中為博士議定封禪七郊三雍大射養老禮儀明帝即位充上言漢家再受命乃有封禪之事禮樂崩闋不可為後嗣法五帝不相遭樂三王不相襲禮大漢宜制禮樂襃少有大度結髮傳充學尤多好禮事常慕叔孫通為漢制儀晝夜研精當其屬思不覺旁之有人舉孝亷除郎遷陳留圉令捕得他郡盜徒五人守馬嚴風縣殺之襃曰夫絶人命者天亦絶之臯陶不為盜制死刑昔管仲遇盜而升諸公今承㫖而殺之是逆天心俯順人意其罰重矣如得全此而身坐之願也遂不為殺嚴奏襃軟弱免官百姓號泣送之三月䕶羌校尉傅育追虜出塞戰殁夏四月丙子令天下死罪囚減死一等徙戍邊廷尉郭躬上疏曰聖恩所以減天下死罪使戍邊者欲實疆境而重人命也去死就生與老弱復相見莫不歡喜自丙子已来捕得亡命者甚多應入重刑前已在牢獄者䝉更生之恩也而始被執録者獨受大辟之刑示不均也書曰王道蕩蕩無偏無黨宜均大恩以便民上善之即詔悉赦焉躬字仲孫潁川陽翟人也父𢎞及寇恂等時為決曹掾諸罹文為𢎞所決者無恨治獄三十餘年郡中稱之比之東海于公躬復以明法稱稍遷尚書廷尉其決斷在哀矜所免者甚衆悉條諸文致重者四十餘事奏除之躬弟子鎮知名後至廷尉封侯子孫皆修家業以法律相𫝊為公者一人廷尉者八人為刺史二十餘人六月戊辰司徒桓虞策免司空袁安為司徒光禄勲任隗為司空自元和已來鳳皇麒麟白虎黄龍鸞鳥嘉禾朱草三足烏木連理為異者數百不可勝紀咸曰福祥以為瑞應何敞辟太尉宋由府乃言於宋由袁安曰瑞應依政而生昔海鳥止魯文仲祀之君子譏焉鴝鵒來巢奪陽之象孔子覩麟而泣曰吾道窮矣其後季氏有逐君之變孔子有兩楹之殯今非常鳥獸品物非一似鳳翔屋怪草生庭不可不察也由安不敢應秋七月齊王晃坐事母不孝貶為蕪湖侯壬戌令死罪囚減戍邊八月行幸九江戊子行幸湘祠沛獻王九月行幸彭城及壽春詔阜陵侯延與車駕㑹壽春帝見延及妻子愴然傷之乃下詔曰蓋周封千八百而姬姓居半所以楨榦王室也朕巡狩望江淮意在阜陵與王相見志意衰落形體非故一則以懼今復阜陵侯為阜陵王增封四縣并前為五縣以阜陵下濕徙都壽春加賜錢千萬安車一乗夫人及諸子賞賜各有差冬十月北匈奴為鮮卑所殺降者十餘萬南單于上言宜及北虜分爭人民離散出兵破北城南北共為一國令漢家長無北顧之憂臣素愚淺兵衆單少不足以防外内願與執金吾耿秉度遼將軍鄧𢎞縁邊諸郡太守并力冀因天時乗聖帝威神一舉平定上將許之尚書宋意上疏曰匈奴處北極介以沙漠簡賤禮儀衣食殊俗此乃天生别種也自漢興以來數發兵攻之所得輙不足以償所失呼韓邪單于奉藩然中國亦疲於送迎之勞矣光武皇帝躬擐金甲之難深明天地之界故因其來降寵立以為單于羈縻畜養邊民得以休息迄今四十餘年今鮮卑奉順威靈斬獲北單于名王已下萬計中國坐享其功而百姓不知其勞漢興功烈於斯為盛今南單于還塞外所謂虎出於檻也必興兵要利内恃於漢其事必浸滋不息而設費無已夫無故棄萬安之計而徵不可必之功未見其聖也詔問執金吾耿秉言可聽師未出而帝寢疾二年春二月壬辰帝崩於章德殿遺詔無起寢廟如光武故事是日太子即位年十歲太后臨朝袁宏曰非古也易稱地道無成而代有終禮有婦人三從之義然則后妃之職在於欽承天道敬共中饋而已故雖人母之尊不得令於國必有從於臣子者則柔之性也夫男女之别自然之理君臣酬咨通物之情也故百司並在相與率職必辭焉而後行故有朝㑹享燕之禮造膝請問之事此蓋内外之分不可得而同者也古之王者必闢四門開四聦兼親賢而聽受焉所以通天下之才而示物至公也自母后臨朝必舅氏專權非疎賢而樹親暱也蓋管其號令者必寄外氏是實違天命而訓民以私也夫國家制教闗諸盛衰建百司修廢官設冢卿以任權重君薨太子幼百官執事各守其職聴扵冢宰所以大明公道人自為用上下盡力而名器已固三代之道也三月癸卯葬孝章皇帝于敬陵庚戌太后詔曰皇帝幼年惸惸在疚朕且佐助德政守文之際必有内輔故太尉鄧彪三讓彌高海内歸仁其以彪為太傅賜爵闗内侯録尚書事百官緫已以聽於是侍中竇憲管掌機宻三弟羅列並據大位上幼小太后當朝憲以外戚秉政欲以經學為名乃上疏曰天下之命縣於天子善在於所習習與智長則㘦而不勤化與心成則中道若性昔周成王幼在襁褓周公在前史佚在後太公在左召公在右中立聽朝四聖維之是以慮無遺計昔孝昭皇帝八歲即位大臣輔政亦選名儒韋賢蔡義夏侯勝入授詩書於禁中伏惟皇帝躬天然之資不肅而成然以至尊之德獨對小臣非所以揄揚聖心增益輝光也竊見屯騎校尉桓郁結髮受學白首不倦經為人師行為儒宗昔侍帷幄入授先帝父子奕世並為帝師愚以為可任長樂少府授帝經於是以郁為長樂少府侍講禁中歲餘遷太常郁授二帝恩寵甚篤厚子焉𫝊家業至太傅憲性褊急好自用輔政之後遂作威福睚眦之怨無不報初憲恨尚書陳寵欲因事毁傷之使與喪事黄門郎鮑德與憲弟瓌厚善懼寵不能自免説瓌曰寵奉事先帝深見委任若以歲月言之宜䝉功勞之報以才量言之應受器用之賞不可以幾微之故以傷輔政之德於是憲出寵為廣漢太守抑强扶弱人無訟者先時廣漢城南有鬼哭聲聞於府中積數年寵案行有骸骨不葬者多乃歎曰儻在是乎使縣收斂埋藏之由是遂止時齊殤王子郁鄉侯暢奔章帝哀上書未報憲使客刺殺暢太尉掾何敞請自往問變狀太尉宋由不聽敞固謂曰春秋稱三公為宰者言無不統也暢宗室肺腑茅土藩臣來䘏國憂上書未報而於城内見害于國之紀擅殺列侯罪惡次扵大逆奉憲之吏莫敢追捕明公處宰相之位亦復不恤四方聞之謂京師何昔陳平之言宰相曰外鎮四夷内撫諸夏使卿大夫各得其宜今列侯私刃不可謂撫京尹廢職不可謂宜綱紀虧壞責係不小遂驅而去司徒司空聞之亦遽遣掾吏詔書疑暢弟陽遣御史之齊考劾尚書令韓陵以為姦在京師不宜舍近問逺詔書遣陵陵固執不從後事發覺憲懼誅自請擊匈奴以功贖死夏五月京都旱冬十月侍中竇憲為車騎將軍與執金吾耿秉將三萬騎征匈奴司徒袁安與諸公卿詣朝堂諫曰今國用度不足匈奴不犯塞而勞軍逺攻輕沙漠之難徼功萬里非社稷計也兵凶器聖王之所重不從太尉宋由不署名公卿稍亦止安獨與司空任隗固爭前後且十上不從是時諫者甚衆尚書僕射郅壽下獄御史何敞上疏諫曰臣聞聖主開直言之路有不諱之詔猶恐下情不達復聽歌謡之詞故天人並應傳福無窮臣伏見尚書僕射郅夀坐與諸尚書論擊匈奴下獄奏劾大不敬臣禺心以為壽備機宻近臣以匡輔為職若朝廷有失黙而不言悖義背恩其罪當誅今夀違衆正議欲以安宗廟為國永福也豈有私心如壽被誅臣恐天下以夀忠直被誅咸結舌而不言下傷和氣忤逆陰陽此誠不可所以敢犯嚴威不避夷滅觸死瞽言非為夀也乃免壽壽郅惲之子也憲遂出師侍御史魯恭上疏諫曰夫天愛人猶父之愛子也一物有不得其所則天氣為之錯亂而况人乎故愛民者天亦愛之夷狄者四方之異氣也蹲夷踞肆與内域絶異雜居中國則錯亂天氣是以聖王之制夷狄羈縻不絶而已不以傷害中國也今邊境幸無事宜當修仁行義尚於無為令家給人足各安産業夫百姓和於下則陰陽和於上然後祥風時雨覆被逺方則夷狄慕德重譯而至矣惟陛下留聖恩徵還二將休罷士卒以順天下心於是竇氏横甚司徒袁安輙舉奏之上雖不從而權戚嚴憚焉後漢紀卷十二
