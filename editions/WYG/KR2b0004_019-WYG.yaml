front:
  text: 第十九四年春二月乙亥京師地震初上之立閹官之力也由是寵之始専政事争執權勢中常侍張逵等乃讒中常侍􅔟騰孟賁與將軍商召諸王子請收之上曰將軍父子我所親必是共嫉之耳乃誅逵等辭及在位大臣商上表曰春秋之義功在元帥罪在首惡賞不僣溢刑不淫濫五帝三王所以致康乂也竊聞考故中常侍張逵等語多及大臣大獄一起無辜者衆非所以達和氣平政化也宜早決竟以息逮捕之煩上従之二月以商少子虎賁中郎將不疑為步兵校尉商上書曰不疑童孺猥處成人之位是以寢不安席食不甘味昔者晏平仲辭邶殿以守其富公儀休不愛魚食以定其位臣雖不才亦願固福祿於聖世故敢布腹心觸罪歸誠上許之以不疑為侍中奉車都尉商疾邊吏失和使羌戎不静并州刺史来機涼州刺史劉康當之官商親喻之曰戎狄荒服蠻夷要服言其荒忽無常統領之道亦無常法臨事制宜略依其俗二君皆表素疾惡欲分明黒白孔子曰人而不仁疾之已甚亂也况戎狄乎宜防其大惡忍其小過機康不従羌戎擾動機康皆坐事徵夏四月戊午賜天下男子爵各有差鰥寡篤癃不能自存者人粟五斛貞婦帛人三匹九十以上人二匹是時良二千石初有任峻蘇章後有陳琦吳祐第五訪之徒海内稱之峻字叔髙渤海蓚人也為劇令洛陽自王奐之後連詔三公特選皆不稱職峻以公能召拜選文武吏各盡其用𤼵剔姦盜不得旋踵民間皆畏之斷獄嵗不過數十人其威禁猛於王奐而文理政教不如也後為太山太守蘇章字孺父京兆杜陵人也為冀州刺史勤䘏百姓摧破豪侠坐免歸養髙於鄉里時天下不治民多悲苦論者日夜稱章朝廷竟不能復用之陳琦字公魯陳留人也為徐州刺史時有盜賊與吏士同寒苦争為用後遷琅邪相天大旱用功􅔟伏禹之言條前相所賊殺無辜齋戒設壇而祭之數日天下大雨第五訪字仲謀京兆人也初為新都令恩化大行二年之間鄰縣歸之戸口十倍遷張掖太守民饑米石數千訪開倉廩賑之不待上詔謂掾吏曰民命在溝壑太守權以救之由此一郡得全朝廷降璽書嘉之既而従輕騎循行田畞勸民耕農其年穀石百錢後為南陽太守護羌烏桓校尉邊境服其威信五年春二月戊申京師地震夏四月南單于寇河西天子開以恩信喻而降之單于脫帽避帳謝罪中郎將陳龜以單于不能制下迫切令自殺龜下獄五月己丑晦日有蝕之秋七月羌寇金城及三輔將遣西師謀元帥僉曰護羌校尉馬賢大將軍梁商曰賢本西方斗筲之子雖有割雞之效然齒以老矣不如太中大夫宋漢不従丁丑赦死罪以下及亡命贖罪各有差八月以𢎞農太守賢為征西將軍稽久不進馬融知其將敗上疏乞自效曰今雜種諸羌轉相鈔盜宜及其未并亟遣深入破其支黨而馬賢等處處留滯羌胡百里望塵千里聴聲乃飲酒高㑹不以為慮坐食穀米未聞所擊臣竊惑之夫事不復校而可收名獲實斯乃征討者之私便非國家之公利也臣聴輿人之頌云賢欲目前受降使譁聲東聞臣懼士卒將不堪命有髙克潰叛之變也臣又聞吳起為將暑不張葢寒不披裘戎事不邇女器今賢野次垂幕珍肴雜遝侍妾盈側事與古反臣兄弟受恩誠私憤悒鉛錫之刀以效一割之用臣願請兵五千纔加部隊之號庶自率勵與之齊勇昔毛遂願處嚢中趙之厮養欲說燕將初為衆笑後效其功臣託儒者不便武職猥陳此言訪之羣司知當受虚誕之辜唯加裁省不聴融字季長援兄子嚴之子也兄續博覽古今同郡班固著漢書缺其七表及天文志有録無書續盡踵而成之融少篤學多所通覽大將軍鄧隲聞其才學召為舎人非其好也避地至梁州㑹羌戎擾攘邊穀踴貴困厄甚乃歎曰古人有言左手據天下圖右手刎其喉愚夫不為也何則生貴於天下今以咫尺之恥而喪千金之軀非老莊之意也乃還應隲命轉為中郎校書東觀十餘年窮覽典籍稍遷尚書南郡太守坐事髠徙朔方遇赦還為議郎融美才貌解音聲學不師受皆為之訓詁弟子自逺方来受業者常千餘人融本外戚家雖好儒術而服飾甚麗坐絳紗帳侍婢數十聲妓不乏於前弟子以次相授鮮有覩其面者十一月遣匈奴中郎將將兵討南匈奴叛者斬首二千餘級叛者乞降是時朝政多僻競崇侈靡侍中張衡上書曰臣伏惟陛下宣哲克明繼體承天中遭傾覆之變以應潜龍之徳及乗雲髙濟盤桓天位誠所謂將隆大任必先倥偬之也親履艱難尤知物情故能一貫萬機無所疑惑宜獲神祇之應受黎庶之譽而陰陽未和災眚屢見天道幽逺成敗易覩近世鄭蔡江樊周廣王聖皆為效矣恭儉畏忌必䝉福祉奢淫慆慢鮮不夷戮前事不忘後事之師也夫情勝其性流遁忘返豈惟不肖中才皆然茍非大賢不能思義故過結罪成向使能瞻前顧後援鏡自戒則何陷於凶患乎貴寵之臣衆所屬仰其有􅄽尤上下知之襃美戒惡有心皆同故怨讟溢乎四海神明降其禍孽頃年雨常不足思求所失則洪範所謂僣恒𤾉若也懼羣臣奢泰昬迷典式自下逼上用速咎徵又前年京都地震土裂土裂者威分地震者民擾也君以静唱臣以動和威自上出不趣於下禮之正也竊懼君有厭倦制不専已恩不忍割與衆共威威不可分徳不可共洪範曰臣有作福作威玉食其害于而家凶于而國天監孔明雖疎不失災異示人前後數矣未見所革以復往悔自非聖人不能無過願陛下思惟所見稽古率舊勿令刑徳大柄不由天斷懲忿窒欲事依禮制禮制修奢僣息事合宜則無凶咎然後神聖允塞災沴不至矣衡雅好墳籍惟不信圗緯以為自漢取秦用兵力戰功成業遂可謂大事當此之時莫或稱䜟若夏侯勝睦孟之徒其所著述無䜟一言劉向父子領校祕書閲定九流復無讖書讖書出於哀平之際皆虚偽之徒以矯世取容不可信也衡乃上書具陳讖不可用衡字平子南陽鄂人也和帝世為尚書郎是時承平日久天下奢泰自王公至於庶人莫不逾制故衡作二京賦諷焉衡精微有文思善於天文陰陽之數由是遷太史令衡作地動儀以銅為器圓徑八尺形似酒樽合蓋充隆􅎖以山龜鳥獸樽中有都柱傍行八道施關𤼵機外有八方兆龍首銜銅丸蟾蜍承之其牙機巧制皆隠樽中張訖覆之以葢周宻無際若一體焉地動搖樽所従来龍機𤼵則吐丸蟾蜍張口受之丸聲震揚伺者覺知即省龍機其餘七首不發則知地震所起従来也合契若神自此之後地動史官注記記所従方起来觀之者莫不服其竒又作渾天儀衡深歎揚雄太𤣥經謂崔瑗曰觀太𤣥經知子雲殆盡陰陽之數也非特記𫝊之屬實與五經相擬漢得天下二百嵗之書也所以作者之數必顯一世常然之符也太𤣥四百嵗其興乎竭已之精思以揆其義更使人難論陰陽之事久之出為河間相衡所著述皆傳於世九月太尉王龔以疾罷初龔患宦官之亂上疏言其罪宜罷遣逐之宦官乃使客作飛章欲陷龔以罪詔太尉龔亟自實従事中郎李固説大將軍梁商曰王公束修勵節而受讒佞之患夫三公尊重舊典不有大罪不至輕問也王公沈静内明若有他變朝廷獲害忠良之名語曰善人在患饑不及餐宜救其艱商従之由是得免龔字伯宗山陽髙平人安帝時為司𨽻校尉京邑肅然有髙名於天下初龔夫人卒龔與諸子並扶杖行服是時山陽太守薛勤喪妻不哭將殯臨之曰幸不為夭復何恨哉議者兩譏焉六年春正月丙子征西將軍馬賢討羌到射姑山迴三月庚午司空郭䖍久病䇿罷丙午太僕趙誡為司空秋八月丙午大將軍梁商薨初商㑹於洛水請従事中郎周舉舉稱疾不行商親昵皆㑹焉倡樂既畢終以薤露之歌坐中皆流涕舉聞而歎曰此所謂哀樂失時非其所也懼將有禍俄商疾困移歸舊第敕冀不疑曰吾以無徳受恩深厚生無補益朝廷死必耗費帑藏衣食飯含玉珠神物無益朽骨但増塵埃我生平所不願雖有聖人定制亦有權時之宜方今邊境未寜盜賊未息朝廷用度常若不足氣絶之後便斂以時服殯已便關關畢便𦵏上無損於國下従我本意孝子善述人之志忠臣每事依先公必従吾言使魂神有知無恨於黄泉冀不疑欲奉行朝廷不聴車駕親臨諡曰忠侯以河南尹冀為將軍不疑為河南尹九月羌寇武威辛亥晦日有蝕之冬十一月行車騎將軍執金吾張喬屯兵三輔漢安元年春正月癸巳大赦天下二月丙辰詔大將軍公卿舉賢良方正探賾索隱者各一人夏六月以匈奴立義王兜樓儲為南單于立於京師公卿備位使大鴻臚授印綬引上殿賞賜閼氏以下各有差初商病篤上親臨幸問以遺言商對曰人之將死其言也善臣従事中郎將周舉清髙忠正可重任也由是上拜舉諫議大夫及是之時連有變異上思商言召舉於顯親殿問之舉對曰陛下初即位遵修舊典逺近肅然頃年以来稍違於前朝多寵幸禄不原徳府藏空匱有瓦解之心觀天察人方古準今誠可危懼書曰僣恒𤾉若夫僣差無度則言不従而下不治陽無以制則上擾下竭宜宻嚴敕州郡察彊豪大姦以時擒討於是下不循法盜賊並起殺長吏二千石横行州郡不能禁歸罪刺史二千石上乃召舉與羣議遣八使秋八月遣光祿大夫張綱侍中杜喬等八人持節循行天下表賢良顯忠勤貪汙有罪者雖刺史輒收以聞喬等奉命而行唯綱獨埋車輪於都亭不動曰豺狼當道安問狐狸遂上書曰大將軍梁冀河南尹不疑蒙外戚之援荷過厚之恩以芻蕘之姿居阿保之任不能敷揚五教翼賛日月而専為封豕長虵肆其貪饕甘心貨賄縦恣無厭多結諂䛕以害忠良誠天威所不赦大辟所宜加也謹條其無君之心一十五事於左皆忠臣之所切齒也書奏京都振竦時皇后内寵方盛冀兄弟權重於主諸梁姻族冠冕盈朝上雖信綱言然卒不罪冀侍中杜喬奏免陳留太守梁讓濟陽太守汜宫濟北太守崔瑗贓罪狼藉梁氏親黨也薦泰山太守李固在郡忠能徵固為將作大匠固亦方直不撓好推賢士上疏曰臣聞氣之清者為精人之清者為賢治身者以積精為寳治國者以積賢為道昔秦欲謀楚遣使觀寳楚王乃列其賢臣以為國寳秦使懼之遂為寢兵魏文侯師子夏友田子方軾段干木之閭羣俊競至名過齊桓斯誠積賢之符效也陛下撥亂龍飛初登大位聘南陽樊英徵江夏黄瓊廣漢楊厚㑹稽賀純䇿書嗟歎待以優位是以巖穴幽人肥遯之士莫不彈冠振衣樂為時用四海歡然歸服聖徳自頃以来漸更陵遲諸侍中皆膏粱之餘勢家子弟無宿徳名儒可顧問者愚以為瓊等久處郎署已且十年誠恨陛下隆崇於始而棄之於末也光禄大夫周舉侍中杜喬深沈正直當世名臣宜登常伯豫聞國政者也天子納焉大將軍梁冀怨張綱之奏已也㑹廣陵賊張嬰殺刺史二千石冀以綱為廣陵太守若不為嬰所殺則欲以法繩之前太守往多輒請兵及綱受拜詔問當須兵幾何對曰無用兵為遂單車之官徑詣嬰壘門嬰大驚劇走閉壘綱又於門外罷遣吏兵獨留所親者十餘人以書喻其長老素為嬰所信者請與相見問以本變因示以詔恩使還告嬰嬰見綱推誠即出見綱綱延置上坐問所疾苦禮畢乃喻之曰前後二千石多非其人杜塞國恩肆其私求鄉郡逺天子不能朝問之也故民相聚以避害也二千石信有罪矣為之者又非義也忠臣不虧君以求榮孝子不損父以求富天子仁聖欲文徳以来之故使太守来思以爵禄相榮不願以刑罰也今誠奉詔則轉禍為福若聞義不服天子赫然發怒大兵雲合豈不危乎今不料强弱非明也棄福取禍非智也去順效逆非忠也身絶無嗣非孝也背正従邪非直也見義不為非勇也六者禍福之機也宜深計其利害嬰聞泣曰荒裔愚臣不能自通王室數為二千石所枉不堪困苦故遂相聚偷生若魚遊釡中知其不可久且以喘息須㬰耳明府仁及草木乃嬰等更生之澤也愚戇自陷不義實恐投兵之日不免孥戮也綱曰豈其然乎要之以天地􅊎之以日月方當相顯以爵位何禍戮之有嬰曰茍赦其罪得全首領以就農畝則抱戴没齒爵位非望也嬰雖為大賊起於狂暴自分必及禍得綱言曠若開明乃辭還營明日遂將所部萬餘人與妻子面縛謁綱綱悉釋縛慰納單車將嬰入營置酒為樂大㑹月餘撫循以意莫不委心謂嬰曰卿諸人積年為害一旦解散方垂蕩然當條名上必受封賞嬰曰乞歸故業不願復以穢名汙明時也綱以其至誠乃各従其意親悉為安處居宅子弟欲為吏者聴之不欲不彊為吏則隨才任職為民則勸以農桑四業並興南州晏然論綱功當封為冀所遏絶故不侯天子美其功徵用之疾病卒官時年四十六朝廷甚惜之嬰等三百餘人皆衰杖送喪哀同考妣封中常侍鞏順為列侯冬十月辛未太尉桓焉司徒劉夀以災異罷十一月司隷校尉趙峻為太尉大司農胡廣為司徒十二月封故征西將軍馬賢孫承光為列侯以賢死王事也二年冬十月辛丑令郡國中都官死罪繋囚犯大逆以下出縑贖罪禁吏民無酤酒十二月辛丑死罪不能入贖者遣詣臨羌居二嵗匈奴中郎將馬寔有功於邊詔書襃奬賜錢十萬寔字伯騫扶風茂陵人也晝誦經書夜習弓兵希慕名流交結豪傑荷擔徒走不逺千里山陽王暢知名當時寔慕其名故往之暢欲觀其舉措不即見敕門曰行經日未還寔留住彌日而故云未還寔謂従者曰夫孝子事親行不逾日而至今不歸非孝子也暢聞之即引俱入知其異士也既入見其母結好而退寔臨退執暢手曰太上立徳其次立功幸俱生盛明之世當垂名千載不可徒存天壤之間各遇當仁之功勿相忘也歸舉孝亷補尚書郎西羌之難王暢薦寔於執事由是為匈奴中郎將建康元年春尚書僕射黄瓊上疏曰臣聞古之帝王莫不敬恭神明劬勞農事必躬郊廟之禮親籍田之勤所以率先羣萌勉勸農功昔宣王不籍千畝虢公以為大譏伏惟陛下遵稽古之鴻業體䖍肅以應天順時奉元懐柔百神雖詩詠成湯書美文王誠不能加今廟祀適訖而祈穀方至恐左右忠孝不欲屢勞聖躬以為親耕可廢臣聞先王制典籍田有日司徒咸戒司空除壇所以迎氣東郊以應時風伏願陛下率羣后冕旒三推則和澤滂流蒼生有賴上従之夏四月辛巳立皇子炳為皇太子大赦天下賜男子爵各有差上使中常侍髙梵迎太子不齎詔書直詣承光宫以車載太子出太子太傅杜喬不能止不知所為御史种暠適至横劍當車曰太子國之儲貳巨命所繫常侍来無詔書何得將太子去安知常侍非姦邪今日之事有死而已梵不敢争遣詣尚書得報乃聴太子既至上嘉暠持重稱善者良久秋八月徐揚州盜賊羣起遣御史中丞馮放督州郡兵討之庚午帝崩于玉堂遺詔無起寢廟衣皆以故珠玉玩好皆不得下是日太子即皇帝位年二嵗太后臨朝以太尉趙峻錄尚書事九月丙午𦵏孝順皇帝于憲陵尚書欒巴坐諫作陵不欲壊民冢下獄免為庶人丙午京師地震詔公卿特進校尉舉賢良方正能直言極諫者各一人皇甫規對䇿曰陛下聖徳欽明聞災責躬咨詹羣僚招延敢諫臣得踐天庭承大問此誠臣寫憤畢命之期也臣伏見孝順皇帝初勤王事綱紀四方天下欣然幾以獲治自後中常侍小黄門凡數十人同氣相求如市賈焉競思作變導上以非因縁嬖幸受賂賣爵分􅂍解罪以攘天威公卿以下至於佐吏交私其門終無紀極頑凶子弟布列州郡並為豺狼暴虐羣生天下擾擾従亂如歸至令風壊俗敗招災致寇今宜庭問百寮常侍以下尤無狀者亟便絀遣與衆共之披埽其黨蕩滌其賄以荅天誡大雅曰敬天之怒無敢戲豫此之謂也大將軍河南尹處周卲之任為社稷之鎮加與王室舊有姻族今日立號雖尊可也而天下區區願其霈然増修謙節省去游娱不急之費減廬第無益之飾近儒術考論經書輔佐日月宜有至效夫朝者舟也民者水也朝之羣臣乗舟人也大將軍兄弟操楫者也雖曰衆也在所欲之茍能卒志畢力守遵常軌以度元元所謂福也或乃怠弛中流而捐棹放楫將淪波濤歸咎受愆可不慎乎臣生長邊逺希步紫庭怖慴失守言不盡心梁冀忿其間己以規對下第拜郎中託疾免歸冬十一月九江盜賊徐鳳稱上將軍殺略吏民己酉令郡國死罪繫囚減死一等徙邊戍於是殤帝廟次在順帝下鴻臚周舉議曰春秋魯閔公無子庶兄僖公代立躋僖公於閔公上孔子譏之經書曰大事于太廟躋僖公傳曰逆祀也至定公正而下之孔子是之經曰従祀先公為萬代法也殤帝在先於親為父順帝在後於親為子先後之義不可改昭穆之序不可亂上不従舉字宣光汝南汝陽人也聦敏多識善屬文學者為之頌曰五經縦横周宣光初辟司徒掾稍遷州刺史尚書令左雄薦舉為尚書俄而雄為司隷詔書選武猛任將帥者選故冀州刺史馮直直卒坐罪減死又無武猛驗舉劾奏雄後復為尚書令雄謂舉曰詔書使我選武猛不使選清髙舉曰詔書選武猛不使君選貪汙也雄曰進君適所以自伐也舉曰昔趙宣子任韓厥為司馬厥以軍法戮宣子僕宣子謂大夫曰可賀我矣選厥也任其事今君不以舉之不才誤升諸朝不敢阿君以為君羞不悟君之與宣子殊也雄謝而服之舉公亮不撓皆此類也
