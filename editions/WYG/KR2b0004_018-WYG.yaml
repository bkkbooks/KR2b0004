body:
  text: 後漢紀卷十八晉袁宏撰孝順皇帝紀第十八永建元年春正月甲寅大赦天下賜男子爵各有差鰥寡孤獨篤癃不能自存者粟人五斛貞婦人帛三匹辛未皇太后閻氏崩辛巳太傅馮石太尉劉喜以阿黨權臣免司徒李郃以疾疫策罷二月甲申葬安思閻皇后丙戌太常桓焉為太傅大鴻臚朱寵為太尉長樂少府朱倀為司徒凡三公居位或不書史失之也封尚書郭鎮為定顛侯是時司隷校尉虞詡糾正邪枉無所迴避中常侍張防等専權縱肆詡奏免之防遂譖訴詡等作威福帝怒下詡獄浮陽侯孫程祝阿侯張賢等知詡以忠獲罪乃相率訟詡寃上引見之程賢曰陛下始與臣等造事之時常疾姦臣知其傾國今即位而自為何以非先帝乎司隷校尉虞詡為陛下盡忠無所迴避反拘繫常侍張防􅂍罪明正陷搆忠良今星守羽林其占宫中有姦臣宜急出詡收防送獄以塞天變時防直上後程叱防曰姦臣張防何不下殿即趨東廂上召問諸尚書尚書賈服素與防善遂諷尚書奏詡㑹赦以贖罪免死秋九月有司奏浮陽侯孫程祝阿侯張賢為司隸校尉虞翻訶叱左右謗訕大臣妄造不祥干亂悖逆王國等皆與程黨乆留京師益其驕溢詔免程等徙為都梁侯程怨恨封還印綬更封為宜城侯冬十月辛巳天下囚減死一等徙戍邊亾命贖罪各有差丁亥司徒朱倀以疾疫罷司空陶敦有罪免光禄勲許敬為司徒廷尉張晧為司空甲辰詔曰朕以不徳統承大業虐氣流行厲疾為災重以水潦秋稼漂沒每州郡所出惻然自傷其令當輸今年租者一切勿責二年春二月鮮卑寇遼東三月戊申詔徵南陽樊英江夏黄瓊㑹稽賀純廣漢楊厚英字季齊南陽魯陽人也隠居教授受業者自四方至安帝時博士公車徵皆不至及於是時又固辭疾篤乃詔郡縣禮致之英既至天子為設壇席延問得失拜五官中郎将遂稱疾篤賜告歸復追下詔以光禄大夫家居所在縣賜穀千斛常以八月存問髙年時致羊酒如前世故事英辭讓不受有詔喻㫖勿聴英居家有法度篤於鄉里自陳寔之徒少時從英英嘗臥病便坐妻遣婢拜問疾英下牀答拜寔問之英曰妻齊也共奉祭祀禮無不答又有鄰人子止英家每醉呴呼英曰其父臨死以相委屬故收養之寔常以此稱焉公卿大臣多薦江夏黄瓊之賢於是公車徵瓊至即稱疾不進有司劾以不敬詔下縣次引致瓊不得已前就徵拜侍中賀純楊厚亦篤行士夏六月乙酉改殯皇妣李氏追尊曰恭愍皇后初皇妣以宫人得幸於安帝而生上閻后妒之賜鴆死於城北上即位左右以聞上歔欷𤼵哀乃親到瘞所號咷斷絶秋七月丙戌朔日有蝕之西域長史班勇請兵擊焉耆漢𤼵河西四郡兵三千人詣勇燉煌太守張朗有罪欲以功自贖即便宜領諸郡兵出塞初勇𤼵諸國兵使龜兹鄯善自南道入勇将諸郡兵率車師六國兵自北道入㑹張朗乃要徑自尉黎入焉耆王請降於朗既而不出漢兵罷還焉耆王卒不加誅漢以兩将不和皆徵免故勇不論三年春正月丙子京師漢陽地震屋壓殺人乙未詔曰京都地動漢陽尤甚加以比年民饑饉夙夜祇懍羣公卿士其深思古典有以消災復異救此下民忠信嘉謀靡有所諱其勿收漢陽今年田租秋七月丁酉茂陵園火九月鮮卑寇漁陽十二月乙亥太傅桓焉以辟召非其人免四年春正月丙寅大赦天下丙子帝加元服賜公卿已下天下男子爵各有差鰥寡孤獨篤癃不能自存者帛人一匹五月漢陽都尉獻大珠詔曰海内有災太官減膳都尉不宣揚本朝徳化而獻珠求媚今其封還袁宏曰夫飢而思食寒而欲衣生之所資也遇其資則粳糧緼袍快然自足矣然富有天下者其欲彌廣雖方丈黼黻猶曰不足必求河海之珍以充耳目之玩則神勞於上民疲於下矣夫萬物之性非能自止者也上之所為民之凖的也今以不止之性而徇凖的於上是彌而開之使其侈競也古之帝王不為靡麗之服不貴難得之貨所以去華競以嘿止喧也夫上茍不欲則物無由貴物無由貴則難得之貨息難得之貨息則民安本業民安本業則衣食周力任全矣夫不明其本而禁其末不去其華而密其實雖誅殺日加而奢麗逾滋矣秋八月丁巳太尉朱寵司空張皓以陰陽不和免癸酉大鴻臚龎參為太尉太常王龔為司空冬十一月司徒許敬策免宗正劉俊為司徒朱寵字仲威京兆杜陵人也初為潁川太守表孝弟儒義理寃獄撫孤老功曹主簿皆選明經有髙行者每出行縣使文學祭酒佩經書前驅頓止亭舍輒復教授周旋阡陌觀課農桑吏安其政民愛其禮所至縣界父老迎者常數千人寵乃使三老御車問人得失百姓翕然治甚有聲寵以正月嵗首宴賜羣吏問公曹吏鄭凱曰聞貴郡山川多産竒士前賢往哲可得聞乎對曰鄙郡炳嵩山之靈受中岳之精是以聖賢龍蟠俊乂鳯集昔許由巢父耻受堯禪洗耳河濵重道輕帝遁世髙跱樊仲父者志潔心遐耻受山河之封賤天下之重抗節參雲公儀許由俱出陽城留侯張良竒謀輔世𤣥算入微濟生民之命恢帝王之略功成而不居爵厚而不受出於輔成胡元安體曾參之至行履樂正之純業喪親泣血骨立形存精誠洞於神明雉集其左右出於潁陽趙義山英姿秀偉逸才挺出究孔聖之房奥存文武於将墜文麗春華辭蔚藻繢出於昆陽杜伯夷經學稱於師門政事熙於國朝清身不茍有於陵之操損已存公有公儀之節以榮華為塵埃以富貴為厚累草廬蓬門藜藿不供出於定陵寵曰太原周伯況汝南周彦祖皆辭徵聘之寵隠林藪之中清邁夷齊徳擬古人恐貴郡之士未有如此者也凱對曰此二賢但讓公卿之榮耳若許由不受堯位樊仲父不屈當世以此凖之不以逺乎寵徵入為大鴻臚拜太尉自為宰相數抗直言雖為三公臥布被僅能覆身食脱粟米藜藿不厭子弟同衣而出并日而食将薨遺其子曰吾本寒賤諸生才非周幹横受朝恩位過其任不能竭身報國負責深重身沒之後百僚所賻贈一無所受素棺殯斂疏布單衣無設紱冕斂畢便以所有牛車夜載喪還鄉里勿告羣僚以宻静為務許敬字鴻卿汝南平輿人也為吏有誣君者㑹於縣令坐敬拔刀斷席曰敬不忍與惡人連席由是知名舉茂才除南昌令以土地卑濕不可迎親親老則棄官歸供養辟司徒府稍遷江夏沛相自光祿勲入為司徒敬以臧否為己任仕於和安之間當竇鄧閻氏之盛直道而進無所屈撓三家既敗多有染汙者敬居然自適引謗不及已當世以此竒之五年春正月疎勒大宛莎車王遣使貢獻夏四月京都旱冬十月丙寅天下繫囚皆免死一等徙邊戍六年無事陽嘉元年春正月乙丒立皇后梁氏賜天下男子爵各有差鰥寡孤獨篤癃貧不能自存者粟人三斛后梁商女也初梁竦中子雍生商商襲父爵為乗氏侯商生三男四女長曰冀次曰不疑次曰䝉長女田次姬即后也次阿重后生有光影之祥及長好史書治韓詩大義略舉以列女圖常在左右宗族中外咸敬異焉商謂諸弟子曰我先人鎮撫西河全濟生民使免虎口之害所活者不可勝數而大位不究夫積徳之報不及其身必流福子孫當因此女興邪選入掖庭相工茅通見之驚曰此所謂日角偃月相之極貴臣未嘗見之於是以為貴人拜商侍中屯騎校尉貴人有寵從容言於上曰陽以博施為徳陰以不専為義盖螽斯之福則百祚之興也願陛下思天行之普達均貫魚之次序使小妾得免罪謗之累於是上愈嘉之親寵益固三月庚辰大赦天下夏四月有司依舊制加梁商位特進增國土商上書讓曰祿命過厚受祖考多福又託日月末光以斗筲之材乗君子之器懼有負乗之累不守歴世之榮誠不如舊制與左賢同科書十餘上帝輒敦喻之商又上書讓校尉曰臣託椒房被䝉榮寵兼官二職非材所堪受寵戰慄驚懼惶戚不遑寧處披露赤誠敢遂狂狷謹上屯騎校尉印綬上乃許焉以特進就第賜安車駟馬頃之拜執金吾冬十月望都狼食數十人本志曰言之不從則有毛蟲之業京房易曰君無道害将及人去之深山全身厥災狼食人辛酉詔天下死罪囚減罪一等亡命贖罪各有差鮮卑寇遼東十一月丁未東平王敞薨敞有孝行喪母三年如禮詔書增戸五千是時長吏數易去就煩費尚書左雄上疏曰臣聞柔逺能邇莫大寧民寧民之務莫重用賢是以臯陶對禹貴在和人安人則恵黎民懐之昔三代垂統封建侯伯世位親親民用和睦宗周既滅六國并秦坑儒泯典革除五等郡縣設令封豕黎民大漢受命蠲其苛政寛以三章撫以因循至於文景天下康乂誠由𤣥靖淵黙使萬民不擾也宣帝興於側陋知世所疾綜名核實賞罰必行刺史守相初拜輒親見問之觀其所由退而考察以質其言常歎曰民所以安而無愁者政平吏良也與我共此者其唯良二千石乎以為吏數變易則下不安業民知不乆則詐以求過故二千石有治能者輒以璽書勉勵增秩賜金爵至封侯公卿時缺則以次用之是以吏稱其職民安其業故能降来儀之瑞建中興之功漢元至今三百餘載俗浸彫弊巧偽滋萌下飾其詐上肆其殘列城百里轉動煩數以殺害為賢以循理為劣以聚斂為辦以修己為弱髠鉗之戮生於睚眦覆尸之禍成於喜怒視民如寇税之如狼監司相望見非不舉觀政於亭傳責成於耳目言善不稱徳論功不核實虚誕者獲祐束修者見黜或因罪而致髙或處危以成名所以天災屢降治道未寧皆由於此也臣愚以為長吏理績有顯效者可就增秩勿使移徙非父母喪不得去官其不從王制錮之終身雖赦令不在齒列必競修善政親撫百姓率土之民各寧其所追配文宣中興之軌流光垂祚永世不刋於是復申無故去官之禁閏月壬子恭陵廟災北海人郎顗上書曰臣聞天垂誡地見災異所以譴告人主克已修徳也故應天以誠而不以言導下以躬而不以刑頃者宫殿官府多所治飾昔盤庚遷殷去奢即儉夏后卑宫盡力以致美愚以為諸所繕治事可減省以恤貧民以賑孤寡天之意也人之願也陛下躬親庶事詔書每下廣開不諱之路以天下為憂百姓為念而不數見公卿責以政事誠優游養徳之道也然三公者調和陰陽儀刑百寮今水旱連年五穀不登不能憂也官失其序庶事不治不能正也但遲迴偃仰稱病自逸忘天下之憂甘宴安之樂豈不謬哉尚書問状顗對多言數術占候之事大㫖以三公非其人将有饑饉水旱地震盜賊之變其後海賊攻㑹稽而青徐盜賊起西羌反明年四月京師地震其夏大旱略如其言華嶠曰漢之十葉王莽簒位聞道術之士西門君恵李守等多稱䜟云劉秀為天子自光武為布衣時數言此及後終為天子故甚信其畫鄭興以忤意見疎桓譚以逺斥憂死及明章二帝祖述此意故後世争為圖緯之學以矯世取資是以通儒賈逵馬融張衡朱穆崔寔荀爽之徒忿其若此奏皆以為虚妄不經宜悉收藏之惟斯事深奥善言古者必有驗於今善言天者必有驗於人而托云天之厯數陰陽占候今所宜急也占候術數能仰瞻俯察參諸人事禍福吉凶既應引之教義亦有著明此盖道術之有益於後世為後人所尚也二年夏四月丁丒封虎賁中郎将冀為襄邑侯執金吾商上書陳讓辭意惻至書十餘上上遂聴許爵阿母宋娥為山陽君尚書左雄諫曰臣聞髙帝約非劉氏不王非功臣不封孝安皇帝封江京王聖等皆有地震之異永建二年封陰謀之功又有日蝕之變通道術之士咸歸於封爵不時之咎方今青徐饑饉盜賊未息陛下乾乾勞思以濟民宜清浄無為以求天意誠不應追錄小恩以虧大典上不從雄復諫曰臣聞君莫不好忠正惡讒䛕而臣莫不以忠得罪以讒得幸盖忠言難入讒言順耳易從也夫刑罪人情之所甚惡也是以世俗為忠者少而習䛕者多故令人主數聞其美稀知其過迷而不悟至於危亡臣伏見尚書故事無乳母賜爵之制唯先帝時阿母王聖為野王君造生殘賊廢立之禍生則為天下所咀嚼死則為海内所共快桀紂貴為天子而庸僕惡以為比以其富而無義也夷齊賤於匹夫而王侯争與為類以其貧而有徳也今阿母躬蹈儉約以身率下羣僚蒸庶莫不向風而與王氏並同爵號懼違本操失其常願愚以為人心不相逺其所不安逺近一也王聖之禍未絶於口傾覆之勢危於壘卵臣請嵗以錢千萬給阿母内可以盡恩愛之親外可以不為吏民之所怪也上卒不從雄字伯豪南郡沮陽人也居貧好學經常以服勤不足學足學者懈怠宜崇經術繕治太學既為尚書而陳之帝從其言更增弟子科除儒者為郎百餘人雄上言曰郡國孝亷古之貢士出則宰民宣協風教若其面牆無以施化招災致禍為害不細孔子曰四十而不惑禮四十彊而仕請自今孝亷不滿四十不得察舉皆先詣公府諸生試家法文吏試牋奏覆之端門練其虚實以觀異能以美風俗有不承科正其罪法帝從之詔郡國孝亷年四十已上考徳行試其經奏其茂才異行如顔淵子竒不拘年齒今舉孝亷徐淑年未滿限臺郎詰之對曰詔書有顔淵子竒不拘年齒是以本郡以臣充選郎不能屈雄詰之曰昔顔淵子竒聞一知十孝亷門一知幾耶淑無以對乃却歸郡守坐免時郡國守相坐舉者百餘人初明帝時政嚴事峻九卿皆鞭杖雄上言曰九卿位亞三等班在大臣行有佩玉之節動有庠序之義加以鞭杖誠非古典上即除之袁宏曰夫謀事作制令以經世訓物使必可為也古者四十而仕非謂彈冠之㑹必将是年也以為可仕之時在於彊盛故舉大限以為民表且顔淵子竒曠代一有而欲以斯為格豈不偏乎己亥京都地震五月庚子詔曰朕以不徳統奉洪業無以承順乾坤協和陰陽災眚屢見咎徵仍彰羣公卿士将何以匡輔朕之不逮奉荅災異災異不空設必有所應其各舉敦朴士一人直言厥咎靡有所諱漢中李固對曰愚以為天不言以災異為譴告政之治亂主之得失皆上帝所伺而應以災祥者也王者父天母地體其山川今日蝕地動山崩晝晦主将安立物将安寄昔江京之姦禍及骨肉至令陛下幽廢親履艱難天誘其衷陛下龍興海内莫不忻悦實有沛然改圖抑退權臣詢求善政以順天意夜而得之坐而待旦今則不然政令紛紜以復倣蹈前軌矣臣伏在草澤痛心疾首誠以陛下聖徳應期實當嘉㑹反衰弊之政𢎞中興之美其功甚易譬猶指掌臣聞善罰不如善政善賞不如善教善教之道宜從内起昔周宣孝文中興之主也皆改華服霈然易規乃能移風易俗及之於古今封阿母恩賞太過常侍近臣威權太重臣案圖書災異之𤼵亦以為然今宜斥退邪佞投之四裔引納方直令在左右陛下親𤼵徳音以招羣俊臨御座見公卿言有稱意即時施行顯拔其人以旌忠善則陛下日有所聞忠臣日有所獻君臣相體上下交泰阿保雖有大功勤勞之恩可賜以貨賄傳之子孫列土分爵實非天意漢興已来賢君相繼豈無保乳之養非不寵貴之然上畏天威俯案經典知義不可故不封也梁氏子弟羣從徵為列侯永平建初故事殆不如此妃后之家所以少有存全者非天性皆然但坐權寵太過天道惡盈也天有北斗所以斟酌元氣帝有尚書所以出納王命若賦役平均則百姓以安萬機不治則天下以亂今陛下所共治天下者外則公卿尚書内則常侍黄門譬猶一門之内一家之事安則共其福危則同其禍由是觀之權柄不可不慎號令不可不詳夫人君之有政猶水之有隄防隄防完全雖遭雨水霖潦不能為變政教一立暫遭凶年不足為憂誠令隄防穿漏萬夫同力不復能救政教一壊賢智馳騖不能復還今隄防雖堅漸有孔穴譬之一人之身本朝者心腹也州郡者四支也心腹痛則四支不舉故臣之所憂在腹心之疾非四支之患臣以為堅隄防務政教先安心腹釐理本朝雖有寇賊水旱之變不足介意也誠令隄防壊陋心腹有疾雖無水旱之災天下固不可不憂矣臣父故司徒臣郃受先帝厚恩子孫不敢自比於餘隸故敢依圖書悉心以對不敢虚造扶風馬融獨對曰臣聞立天之道曰陰與陽立地之道曰柔與剛夫陰陽剛柔天地所以立也取仁於陽資義於陰柔以施徳剛以行刑各順時月以厚羣生帝王之法天地設位四時代序王者奉順則風雨時至嘉禾繁植天失其度則咎徵並至饑饉薦臻今科條品制禁令所以承天順民者備矣悉矣不可加矣然而不平之效猶有咨嗟之怨者百姓屢聞恩澤之聲而未見恵和之實也今從政者變忽法度以殺戮威刑為能咸問其國守相及令長何如其稱之也曰太急其毁之也曰太緩夫急致寒緩致燠二者罪同而論者許急此陰陽所以不和也復之之道審察緩急之謗譽鈞同寒燠之罪罰以崇王政則陰陽和也好惡既明則宰官之吏知所避就又正身以先之不嚴以涖之不變則刑罰之夫知為善之必利為惡之必害孰能不化則官良矣臣聞洪範八政以食為首周禮九職以農為本民失耕桑飢寒并至盜賊之原所由起也古之足民仰足以養父母俯足以畜妻子然後敦五教宣三徳則休嘉之化可致也夫足者非能家給而人足量其材用為其制度故嫁娶之禮儉則昬姻以時矣喪制之禮約則終者掩藏矣不奪其時則農夫不失矣夫妻子以累其心産業以重其志舍此而為非者雖有必不多矣今則不然此盜賊所以不息誠使制度必行禁令必止則仕者不溢法式之外百工不作無用之器商賈不通難得之貨農夫不失三時之務各安所業則盜賊消除災害不起矣太史張衡對曰臣聞政善則休祥降政惡則咎徵見茍非聖人或有失誤昔成王疑周公而大風拔樹木開金縢而反風至天人之應速於影響故稱詩曰無曰髙髙在上日監在兹間者京都地震雷電赫怒夫動静無常變改正道則有奔雷土裂之異自初舉孝亷迄今二百嵗矣皆先孝行行有餘力始及文法辛夘詔以能宣章句奏案為限雖有至孝猶不應科此棄本而就末曾子長於孝然實魯鈍文學不若游夏政事不若冉季今欲使一人兼之茍外可觀内必有闕則違選舉孝亷之制矣且郡國守相割符寧境為大臣一旦免黜十有餘人吏民罷於送迎之役新故交際公私放濫或臨政涖民為百姓取便而以小過免之是為奪人父母使詹號也又察選舉一任三府臺閣秘密振暴於外貨賂多行人事流通今真偽渾淆昬亂清朝此為下陵上替分威共徳災異之興不亦宜乎易不逺復論不憚改朋友交接且不宿過況於帝王承天理物以天下為公者乎中間以来妖星見於上震裂著於下天誡詳矣可為寒心明者消禍於未萌今既見矣修政恐懼則轉禍為福矣上覽衆對以李固對為第一諸常侍悉叩頭謝罪朝廷肅然拜固為議郎權臣皆切齒於固将加之罪朝中名臣黄瓊等深救解之嵗中梁商請為從事中郎商以后父輔政柔和自守内豎亂政不能有所裁固奏記於商曰今四海雲擾背義趨利父勸其子兄勉其弟皆先論價而後定位夫致一賢則國賴其功招一惡則天下被其害數年已来妖怪屢起宫省之中必有陰謀将軍位尊勢重誠令王政一整必享不朽之福商不能用戊午太尉龎參司徒王龔以災異免六月太常孔扶為司空丁丒洛陽宣徳亭地坼八十五丈本志稱李固曰陰類専恣将有分坼之象其後中常侍専權忿争之應也八月己巳大鴻臚施延為太尉冬十月初隨月律作應鍾三月夏戊戌大赦天下賜民爵八十已上米人一斛九十已上帛人一匹絮三斤秋七月羌寇濮陽冬十一月羌寇武都壬寅司徒劉愷司空孔扶以災異免己巳大司農黄尚為司徒光祿勲王卓為司空四年春二月丙子詔曰自今中官得以養子為後夏四月甲子太尉施延以選舉貪汙免戊寅執金吾梁商為大将軍故太尉龎參為太尉商推誠實不為華飾嘗病多藏厚亡為子孫累故衣裘車馬供用而已租俸賞賜分與昆弟故舊虚心下士門無停賔檢約宗族親戚莫敢犯禁朝廷由是敬憚之在位所辟召皆四海英俊其所招引推進如李固周舉等數十人時魏郡霍諝舅宋光為人所誣引刋定詔書繫洛陽獄考訊楚毒諝年十五奏記於商曰諝聞春秋之義原情定罪傳曰人心不同其若面焉斯盖謂其上下窊隆廣狹髙卑之形耳至於鼻從目横睂在眼上未有不然者人心異者剛柔舒急倨敬之間至於趨利避害畏死樂生亦復同也諝與光骨肉之親義有相隠言光寃結未有可信請以人情平之光衣冠子孫徑路平易位極州郡日望徵辟亦無瑕穢纎介之累無故刋定詔書欲何救解就有所疑當以道理質正安能冒觸死禍以解微細譬諸附子療饑鴆毒止渴未入腹胃咽㗋已絶豈可為哉光不定制書情既可原臺閣執事知而不治吁嗟紫宫之門泣血兩觀之下傷和致災為害滋甚明将軍徳盛位尊人臣無二言行動天地舉措移陰陽誠肯留神省察沛然信理必有于公髙門之福和氣立應天下幸甚商嘉諝辭意即奏原光罪閏月丁亥日有蝕之十二月甲寅京都地震詔百寮上封事靡有所諱永和元年春正月己巳大赦天下詔問公卿北鄉侯宜加諡列昭穆與木主否羣僚皆謂宜加諡司𨽻校尉周舉議曰北鄉侯本非正統姦臣所立立未逾嵗年號未改皇乾不祐大命夭昬孔子作春秋為制王子猛不稱崩魯子野不書葬北鄉無他功徳以王禮葬於事已崇不宜稱諡上從之夏四月壬寅追號皇后母開封君冬十月丁未永福殿火丙子太尉龎參以乆病策罷故司空王龔為太尉十月武陵太守奏蠻夷望上恩請入貢比漢民議者以為可聴尚書令虞詡曰自古聖王不臣異俗非徳不能及威不能加以蠻夷獸心貪婪難整是故羈縻撫綏受而不逆叛而不追今賦而税之必有怨叛叛而伐之必復興士衆計其所得不償所費必有後患悔之不追上不從詡字昇卿陳國武平人祖父經為獄吏常效于公之治獄及詡之生經曰吾雖不能及于公子孫可至九卿故字曰昇卿少失父母與祖父母居年十三通尚書國相見而竒之欲以為吏詡曰祖母年九十居貧非詡無以自養乃止二年春武陵蠻夷以貢非舊約叛三月乙夘司空王卓薨丁丒光祿勲郭乾為司空夏四月丙申地震五月癸丒山陽君宋娥有罪歸里舍秋七月日南蠻反交阯刺史樊演出討失利寇遂攻掠郡縣上甚憂之議者謂宜遣大将軍𤼵荆揚兖豫四萬人赴救大将軍從事中郎李固議曰荆揚安穏發其吏救之可也今荆揚盜賊盤結武陵南郡蠻夷未集長沙桂陽數被徵𤼵難復擾動其不可一也兖豫之民聞萬里征役無有還期恐十五萬户不得一士郡縣迫促懼有叛亡其不可二也南州水土温暑如有瘴氣恐死者十四五必道路奔散不能禁其不可三也士卒比到萬里疲勞不可復鬬其不可四也軍行三十里為程而去日南九千餘里三百日乃到計人日五升用米六十萬斛不計将吏驢馬之食但負甲自致費便若此其不可五也設使軍到死亾者衆不足當復益𤼵此為刻割心腹而樂四支其不可六也今二郡徒叛還自相攻但坐徵發之故何況乃𤼵四州赴萬里哉其不可七也前中郎将尹就使益州益州諺曰虜来尚可尹来殺我後就徵還以兵付刺史張喬因其民力旬月破滅殄盡此𤼵将無益之效州郡不可任之驗也可但選有勇略仁恵以為刺史太守勿與争鋒以恩信招来赦殺傷之罪以息𤼵軍故并州刺史祝良性多勇決及張喬前在益州實有破虜之功皆可任用也文帝遣馮唐即赦魏尚拜為雲中太守哀帝就拜龔舍為泰山太守祝良等可用皆宜即拜便道之官於是拜祝良九真太守張喬為交阯太守二郡即安冬十月行幸長安祀陵廟丁夘京師地震三年春二月乙亥京師地震夏閏月乙酉京都地震秋八月乙夘太白晝見本志以為太将軍梁商父子貴盛之象也己未司徒黄尚以災異罷九月癸酉光禄劉夀為司徒十二月戊申日有蝕之㑹稽九郡以聞京師不見後漢紀卷十八欽定四庫全書後漢紀卷十九晉袁宏撰孝順皇帝紀
