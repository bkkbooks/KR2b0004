body:
  text: 後漢紀卷二十六晉袁宏撰孝獻皇帝紀第二十六初平元年春正月辛亥大赦天下侍中周毖城門校尉伍瓊說董卓曰夫廢立事大非常人所及袁紹不達大體恐懼出奔非有他志也今購之急勢必為變袁氏樹恩四世門生故吏徧於天下若收豪傑以聚徒衆英雄因之而起山東非公之有也不如赦之拜一郡守則紹喜於免罪必無患矣卓以為然乃以紹為渤海太守癸丑卓殺𢎞農王卓使郎中令李儒進酖於王曰服藥可以辟惡王曰我無疾是欲殺我爾不肯强之於是王與唐姬及宫人飲藥王自歌曰天道易兮運何艱棄萬乗兮退守藩逆臣見迫兮命不延逝將去汝兮往幽𤣥唐姬起舞歌曰皇天崩兮后土頽身為帝王兮命夭摧死生異路兮從此乖悼我煢獨兮心中哀因泣下坐者皆悲王謂唐姬曰卿故王者妃勢不為吏民妻矣自愛從此與卿辭遂飲藥而死帝聞之降坐盡哀是時冀州刺史韓馥豫州刺史孔伷兖州刺史劉岱陳留太守張邈渤海太守袁紹東郡太守喬瑁山陽太守袁遺河内太守王匡濟北相鮑信後將軍袁術議郎曹操等竝興義兵將以誅卓衆各數萬人推紹為盟主紹自號車騎將軍操行奮武將軍長沙太守孫堅亦起兵誅卓比至南陽衆數萬人卓以堅為破虜將軍冀其和弭堅討卓逾壯進屯陽人卓大怒遣胡軫吕布擊堅戰於建平堅大破之卓以山東兵盛欲徙都闗中召公卿議曰髙祖都闗中十一世後漢中興東都洛陽從光武至今復十二世案石苞室讖宜復還都長安百官無敢應者司徒楊彪曰遷都改制天下大事皆當因民之心隨時之宜昔盤庚五遷殷民胥怨故作三篇以曉諭之往者王莽篡逆變亂五常更始赤眉之變焚燒長安殘害百姓民人流亡百無一存光武受命更都洛陽此其宜也方今建立聖主光隆漢祚而無故捐宗廟宫殿棄先帝園陵百姓驚愕不解此意必糜沸螘聚以致擾亂石苞室讖妖邪之書豈可信用卓作色曰楊公欲沮國家計邪闗東黃巾作亂所在賊起長安崤函險固國之重防又隴右取材木功夫不難杜陵南山下有孝武帝故陶作甎處一朝一夕可辦宫室官府此何足言百姓小人何足與議若有前却我以大兵驅之豈得自在百寮皆失色太尉黃琬曰此大事楊公語得無可思乎司空荀爽曰相國豈樂遷都邪今山東兵起非可一日禁也而闗西尚靜故當遷之以圖秦漢之勢也堅爭不止禍必有所歸吾不為也卓使有司奏免二公二月丁亥太尉黃琬司徒楊彪策罷初卓用伍瓊周毖之議選天下名士馥等既出皆舉兵圖卓卓以瓊毖賣已心怒之及議西遷瓊毖固諫卓大怒曰君言當拔用善士卓從二君計不敢違天下心諸君到官舉兵相圖卓何相負遂斬瓊毖彪琬恐懼詣卓謝曰因小人戀舊非欲沮國事也請以不及為受罪卓不勝當時之忿既殺瓊毖旋亦悔之故表彪琬為光禄大夫卓以河南尹朱儁為太僕以為己副儁不肯受因進曰國不宜遷必辜天下望成山東之釁臣不見其可也有司曰召見君受拜而君拒之不問徙事而君陳之何也儁曰副相國至重非臣所堪遷都非計臣之所急也辭所不堪進其所急臣之宜也有司曰遷都之事初無此計也就有未露何所受聞儁曰相國董卓具為臣說有司不能屈於是朝之大臣及尚書郎華歆等皆稱焉由是止不副卓卓愈恨之懼必為卓所陷乃奔荆州光禄勲趙謙為太僕王允為司徒守尚書令丁亥天子遷都長安卓留屯洛陽盡焚宫室徙民長安壬辰白虹貫日三月己巳車駕至長安長安遭赤眉之亂宫室焚盡唯有髙廟京兆府舍遂就都焉戊午卓殺太傅袁隗及其三子是時袁紹屯河内陳留太守張邈兖州刺史劉岱東郡太守喬瑁山陽太守袁遺屯酸棗後將軍袁術屯南陽豫州刺史韓馥大㑹酸棗將盟諸州郡更相推讓莫有肯先者廣陵功曹臧洪升壇操血曰漢室不幸王綱失統賊臣董卓乗釁縱害禍加至尊虐流百姓大懼淪喪社稷翦覆四海兖州刺史劉岱豫州刺史孔伷陳留太守張邈東郡太守喬瑁廣陵太守張超等糾合義兵竝赴國難凡我同盟齊心勠力以致臣節殞首喪元必無二致有渝此盟俾墜其命無克遺育皇天后土祖宗明靈實皆監之洪辭氣慷慨涕泣橫下聞其言者雖卒伍厮養莫不激揚卓兵強紹等莫敢先進喟然曰舉義兵誅暴亂今衆已合諸君何疑而後使董卓聞山東兵起倚王室之尊據二周之險東向以臨天下雖以無道行之猶足以為患今焚燒宫室劫遷天子海内震動不知所歸此天亡之時也一戰而天下定矣不可失也乃引軍西戰於滎陽諸軍敗散是時青州刺史焦和亦起兵討卓和及諸將西行不為民人保鄣始濟河黃巾已入其境青州殷實軍強和望宼奔北未嘗接風塵交旗鼓也好卜筮信鬼神入見其人清談干霄出觀其政賞罰潰亂州遂蕭條悉為丘墟頃之和病卒袁紹使臧洪領青州撫和民衆盜賊奔走紹歎其能徙為東郡太守夏四月以幽州牧劉虞為太傅尚書令王允奏曰太史王立說孝經六隱事令朝廷行之消却災邪有益聖躬詔曰聞王者當脩德爾不聞孔子制孝經有此而却邪者也允固奏請曰立學深厚此聖人秘奥行之無損帝乃從之常以良日王允與王立入為帝誦孝經一章以丈二竹簞畫九宫其上隨日時而出入焉及允被害乃不復行也袁宏曰神實聰明正直依人而行者也王者崇德殷薦以為饗天地可謂至矣若夫六隱之事非聖人之道也匹夫且猶不可而況帝王之命乎五月司空荀爽薨爽字慈明朗陵令淑之子也年十二太尉杜喬師焉舉孝亷賢良黨事禁錮隱於海上又南匿漢濱黨事解辟命交至有道博士徵皆不就獻帝初董卓薦爽為平原相未到官徵為光禄勲至府三日遷司空當是之時忠正者慷慨而懷道者深嘿爽既解禍於董卓之朝又旬日之間位極人臣君子以此譏之初爽兄弟八人號曰八龍爽最有儒雅稱兄子彧名重於世六月辛未光禄大夫种拂為司空卓發洛陽諸陵及大臣冢墓壞洛陽城中鐘虡鑄以為錢皆不成文更鑄五銖錢文章輪郭不可把持於是貨輕而物貴穀一斛至數百萬遼東大守公孫度自號為平州牧立漢世祖廟單于羌渠既為國人所殺其子孫於扶羅應立國人立須卜為單于於扶羅詣闕訟㑹靈帝崩王室亂於扶羅將數千騎與白波賊宼冀州界百姓皆髙壁清野抄掠少有所得欲歸國國人不受遂止河東二年春正月辛丑大赦天下韓馥袁紹自稱大將軍遣使推幽州牧劉虞為帝不聽復勸虞承制封拜又不聴然猶與紹連結二月丁丑相國董卓為太師夏四月卓西入闗卓使東中郎將董越屯澠池寧輯將軍段煨屯華隂中郎將牛輔屯安邑其餘中郎校尉布在諸縣不可勝紀以禦山東卓將至公卿以下迎之皆謁拜下卓不為禮卓謂御史中丞皇甫嵩曰可以服否嵩曰未知明公乃至於是卓曰鴻鵠固有逺志但燕雀所不知爾嵩曰昔與公俱為鴻鵠但今日復變為鳳皇爾卓乃大笑曰卿早服可得不拜卓既為太師復欲稱尚父以問左中郎將蔡邕邕曰昔武王受命太公為太師輔佐周室以伐無道是以天下尊之稱為尚父今之功德誠為巍巍宜須闗東悉定車駕西還然後議之卓乃止於是卓乗金華青蓋車時人號竿摩車言逼上也卓弟旻為左將軍兄子璜為中軍校尉宗族内外並列朝廷呼召三臺尚書以下皆詣卓府啟事然後得行築郿塢城與長安城等積穀為三十年儲云事成雄據天下不成守此足以畢老嘗行郿塢公卿已下祖道於橫門外誘北降者三百餘人於坐中先披其舌或斬其手或鑿其眼未死偃轉杯案之間㑹者戰慄失匕箸卓飲食自若初卓飲衛尉張温乃使人誣温與袁術通謀笞殺之刑罰殘酷愛憎相害寃死者數千人百姓嗸嗸道路歎息孫堅自陽人入洛陽脩復諸陵引軍還魯陽卓謂長史劉艾曰闗東諸將數敗矣無能為也唯孫堅小戇諸將軍慎之堅昔西征其計策略與人同無故從諸袁兒終亦死爾艾曰堅用兵不如李傕郭汜堅前與羌戰於美陽殆死無能為卓曰堅時將烏合兵且戰有利鈍卿今論闗東大勢爾亦終無所至但殺二袁兒則天下自服矣建武初立宗廟於洛陽元帝之於光武父之屬也故光武上繼元帝又立親廟於洛陽祭祀而已不加名號光武崩以中興之主更為起廟上尊號曰世祖廟以元帝於光武為爾故雖非宗不毁也後遂為常明帝遺詔無起寢廟藏主於世祖廟更衣更衣者帝王入廟之便殿也孝章不敢違命以更衣宜小别上尊號曰顯宗章帝崩遺詔如先帝故事和帝上尊號曰肅宗後帝遵承皆藏主於世祖廟積多無别是後顯宗但為陵寝之號和帝崩上尊號曰穆宗殤帝崩鄧太后以尚嬰孩不列於廟就陵寢祭之而已安帝殺大臣廢太子及崩無上尊號之奏以建武以來無毁者遂因陵號恭宗順帝崩上尊號曰敬宗沖質帝皆年少早崩依殤帝故事桓帝崩上尊號曰威宗靈帝崩而天下亂故未議祖宗之事於是有司奏議宗廟迭毁左中郎將蔡邕議曰漢承秦滅學之後宗廟之制不用周禮每帝即位輒立一廟不止於七昭穆不定宗廟迭毁孝元皇帝時丞相匡衡御史大夫貢禹始建斯議罷絀羣廟孝文帝孝武帝孝宣帝皆功德茂盛為宗不毁初孝昭尊崇孝武廟稱世宗宗正大臣夏侯勝猶執異議不應為宗至孝宣皇帝議猶不定太僕王舜中壘校尉劉歆據經傳議定不可毁上從其議古人據正重慎不敢私其君父如此其至者也後遭王莽之亂光武皇帝受命中興廟稱世祖孝明皇帝政叅文宣廟稱顯宗孝章皇帝至孝烝烝仁恩博大廟稱肅宗比方前世得禮之宜自此已下政事多釁權移臣下嗣帝殷勤各欲尊崇至親而臣下懦弱莫敢執正夏侯之議故遂僭濫無有防限今聖朝遵復古禮以求厥中誠合事宜孝元皇帝世在第八光武皇帝世在第九故元帝為考廟遵而奉之孝明因循亦不敢毁元帝今於廟九世非宗親盡宜毁比惠昭成哀平帝五年而再殷祭孝安孝桓孝昭孝和孝靈在穆四時常陳孝和以下穆宗恭宗威宗之號皆宜省去以遵先典殊異祖宗不可叅竝之義從之袁宏曰光武之繫元帝可謂正矣夫君臣父子名教之本也然則名教之作何為者也蓋準天地之性求之自然之理擬議以制其名因循以𢎞其教辯物成器以通天下之務者也是以髙下莫尚於天地故貴賤擬斯以辨物尊卑莫大於父子故君臣象兹以成器天地無窮之道父子不易之體夫以無窮之天地不易之父子故尊卑永固而不逾名教大定而不亂置之六合充塞宇宙自古及今其名不去者也未有違夫天地之性而可以序定人倫失乎自然之理而可以彰明治體者也末學庸淺不達名教之本牽於事用以惑自然之性見君臣同於父子謂兄弟可以相傳為體謂友于齊於昭穆違天地之本滅自然之性豈不哀哉夫天地靈長不能無否泰之變父子自然不能無夭絶之異故父子相承正順之至也兄弟相及變異之極也變則求之於正異則本之於順故雖經百世而髙卑之位常崇涉變通而昭穆之序不亂由斯而觀則君臣父子之道焉可忘哉董卓問司徒王允曰欲得快司隷校尉誰可者允曰唯有蓋京兆耳卓曰此人明智然則有餘不可假以雄職也乃以勲為越騎校尉卓又畏其司戎復出為潁川太守頃之徵還京都公卿見卓皆拜謁勲獨長揖與卓爭論旁人皆失色而勲意氣自若初河南尹朱儁數為卓陳軍事卓曰我為將百戰百勝卿勿妄說且汙我刀鋸勲曰昔武丁之明猶求箴諫明公猶未及武丁也卓謝曰戲之爾勲強直而内懼於卓不得意疽發背卒時年五十一遺令慙無以報先帝勿受賻贈卓心雖憾勲然外示寛厚表賜東園秘器送之如禮勲字元固燉煌廣至人舉孝亷為漢陽長史素與武都蘓正和有隙及正和為州從事劾武威太守倚權貴恣行貪橫涼州刺史梁鵠畏懼貴戚欲殺正和以自解以訪勲或勸勲曰因此報仇勲曰不可謀事殺良非忠也乗危非仁也忠仁棄之人將不食我餘乃諫鵠曰夫緤食鷹鸇欲其鷙也鷙而烹之何用哉鵠從其言正和喜而求見勲勲曰吾為梁使君謀不為蘓正和也怨之如初黃巾之起故武威太守黃儁被徵失期鵠欲奏誅儁勲為言得免儁以黃金二千斤與勲勲謂儁曰吾以子罪在八議故為子言吾豈賣評哉終辭不受涼州刺史左昌因軍法斷盜數千萬勲諫不聴乃怒勲使屯河陽欲因軍法罪之而勲數有戰功詔書勞勉焉邊章之反圍昌逼急昌以檄召勲勲初與從事辛曾孔常俱屯河陽曾常疑不肯應檄勲怒曰昔莊賈後期穰苴奮鉞今之從事豈重於監軍哉曽常懼乃從勲至冀親責數章等責以背叛之罪皆曰左使君若早從君言以兵臨我得自分明今我罪己重不可復降也皆泣涕而去㑹叛羌圍䕶羌校尉夏育於畜官勲與州郡并兵救育至狐槃為羌所破勲被三創前陣多死勲乃手指木表曰使國家尸我於此羌滇吾素為勲所厚乃以兵扞衆曰蓋長史清賢汝曹殺之者為負天勲仰罵曰死反虜汝何知促殺我衆相視而驚滇吾以馬與勲勲曰吾欲死不去也衆曰金城購君羊萬頭馬千匹欲與君為一勲咄咄曰我死不知也羌遂囚勲勲辭氣不撓羌不敢害送還郡於是以勲為漢陽太守民饑相食勲調穀廩之諸富室或匿不肯出勲曰吾知罪矣乃自出家穀以率之郡中聞之不督而送冀倉者二千餘斛賴勲以得存者千餘人六月丙戌京師地震卓問蔡邕邕對曰地震隂盛大臣逾制之所致也公乗青蓋車逺近以為非宜卓從之乗金華皁蓋車秋七月司空种拂以地震策免癸卯光禄勲淳于嘉為司空董卓既入闗袁紹還軍延津使潁川荀諶說冀州刺史韓馥曰公孫瓚乗勝來南而諸郡應之袁車騎引軍向東此其意不可知竊為將軍危之馥曰為之柰何諶曰公孫瓚提燕代之卒其鋒不可當袁氏一時之傑必不為將軍下夫冀州天下之重資也若兩雄并力兵交於城下危亡可立而待也夫袁氏將軍之舊也且已同盟當今為將軍計者莫若舉州以讓袁氏袁氏得冀州則瓚不與之爭必厚德將軍冀州入於親友是將軍有讓賢之名而身安於泰山也願將軍勿疑馥素恇怯因然其計馥長史耿武别駕閔純治中李厯騎都尉沮授諫曰冀州雖鄙帶甲百萬穀支十年袁紹孤客窮軍仰我鼻息譬如嬰兒在股掌之上絶其哺乳立可饑殺柰何欲以冀州與之馥曰吾袁氏故吏且才不如本初度德而讓古人所貴諸君獨何病焉乃遣子送印綬以讓紹紹既有冀州辟授為别駕從事紹謂授曰今賊臣作變朝廷遷移孤厯世受寵欲竭命致死以復漢室然桓公非夷吾不能成霸越王非范蠡無以存國今欲與君勠力同心共安社稷授進曰將軍弱冠登朝播名海内值廢立之際則忠義憤𤼵卓雖凶暴弗能加兵昔相如叱秦晏嬰哭莊方之將軍曷足以喻單騎出奔則卓懷怖懼濟河而北則渤海稽首擁一郡之卒撮冀州之衆威震河朔名重天下雖黃巾散亂黑山跋扈舉兵東向則青州可定還討黒山則張燕可滅迴師北首則劉虞必喪震脅戎狄則匈奴順從橫大河之北合四州之地收英雄之用擁百萬之衆迎大駕於長安復宗廟於洛邑號令天下以討未服以此爭鋒誰敢禦之比及數年此功不難紹喜曰此孤之本心也即表授為奮武將軍使監䕶諸將袁紹以曹操為東郡太守初潁川人荀彧字文若舉孝亷為亢父令見天下將亂棄官歸家謂父老曰潁川四戰之地天下令有變常為兵衝密雖有固適可避小寇不足以扞大難宜亟去鄉里人多懷土不能從也韓馥遣騎迎焉㑹袁紹襲冀州待彧以上賓之禮彧弟諶及同郡辛評郭圗皆為紹任彧知紹不能有成也遂去紹歸曹操操見彧悅曰吾子房也以為司馬時董卓兵強山東震恐彧說操曰董卓暴虐已甚必以亂終無能為也操善之丙寅太尉趙謙久病策罷辛酉太常馬日磾為太尉公孫瓚以劉備為平原相十二月録從入闗者功封侯賜爵各有差司徒王允為温侯食邑五千户固讓不受尚書僕射士孫瑞說允曰天子裂土班爵所以庸勲也與董太師竝位俱封而獨勵髙節愚竊不安也允納其言乃受二千户是歳長沙武陵人有死者經月復活占曰至隂為陽下民為上將有自微賤而起者也後漢紀卷二十六欽定四庫全書後漢紀卷二十七晉袁宏撰孝獻皇帝紀
