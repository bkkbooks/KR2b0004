body:
  text: 後漢紀卷十五晉袁宏撰孝殤皇帝紀第十五延平元年春正月癸夘光禄勲梁鮪為司徒三月甲申葬孝和皇帝于順陵初賜周馮貴人歸園太后詔曰朕與貴人託配后庭十有餘年上天不弔先帝早棄天下孤心煢煢無所瞻仰貴人當以舊典分歸外園相戀之情感憎悲歎燕燕之詩曷能喻焉其賜貴人青盖車驂馬各一駟黄金四十斤雜綵三千匹初和帝宫人吉成成御者志恨成乃為桐人書太后姓字埋之事下掖庭考驗皆以吉成所為太后獨念吉成我待之有恩雖下賤侍人無賴上在時未嘗聞有惡言今我遇過於平常何縁生此不合人情即自呼見反復實劾果其御者所為夏四月虎賁中郎将鄧隲為車騎将軍初隲與同郡袁良為布衣之交及隲當路欲延良共議世事良謝而絶之司空陳寵薨寵字昭公沛國洨人也曾祖父咸成哀間以律令為尚書常誡子曰為人議法當依於輕雖有百金之利慎無案人也王莽之誅何武鮑宣咸乃歎曰易稱君子見㡬而作不俟終日吾可逝矣即乞骸骨歸莽簒位召咸為掌寇大夫謝病不肯應時咸三子皆在位乃悉令去官父子相與歸田斂家中律令文書壁藏之建武初寵父躬復以律令為廷尉監寵少習家法辟太尉鮑昱府是時三府掾屬以不肯親事為髙専務交遊寵嘗以事君之義當供所職以佐政治何得但出入養髙故獨勤心於事數為昱陳當世治化昱髙其能使掌天下獄訟所平決無不厭服寵以律訟多錯不良吏得因縁生輊重乃為撰科條辭訟比例使事類相從以塞姦源其後公府奉以為法寵雖傅文法然兼通經籍奏議温粹號為名相子忠字伯始傳家業以才能甚有聲五月辛夘大赦天下壬辰河東恒山崩六月丁未太常尹勤為司空詔曰自夏已来陰雨過節思唯僭失深自克責新遭大憂接以未和徹膳擯服庶有益焉其減太官上方諸服御靡麗難成之物丁夘詔免掖庭宫人六百餘人皆為庶人尚敏上疏陳興廣學校曰臣聞五經所以治學為人五經不修則世道凌遲學校不𢎞則人名行不廣故秦以坑儒而滅漢以崇學而興所以㒺羅天下統理陰陽彌綸治道而示民軌則也光武中興修繕太學博士得具五經五經各叙其義故能化澤沾洽天下和平自頃以来五經頗廢後進之士趣於文俗宿儒舊學無與傳業由是俗吏繁熾儒生寡少其在京師不務經學競於人事争於貨賄太學之中不聞談論之聲黌序之下不覩講説之士臣恐五經六藝浸以陵遲儒林學肆於是廢失中國所以制御四夷者以有道徳仁義也𫝊曰王者之臣其實師也言其道徳可師也今百官閥閲皆以通經為名無一人能稱孔子曰無而為有虚而為盈難乎有恒矣自今官人宜令取經學者公府孝亷皆應詔則人心専一風俗可淳也於是詔曰易稱天垂象聖人則之又云聖人之情見於辭然則文章之作将以幽讚神明通暢萬物秦燔詩書禮毁樂崩大漢之興拾而𢎞之至乎元康五鳯之間英豪四集文章焕炳六經之學于斯為盛自頃以来學者怠惰遂以陵遲宜令公卿中二千石各舉隠逸大儒碩學髙操以勸後進初陳留李充三徵不至由是徵充為博士俄遷侍中車騎将軍鄧隲屈已禮之嘗設酒饌請充及朝大夫酒酣隲曰幸得託椒房位上将幕府初開欲延天下英俊君其舉所未聞充曰将軍誠能招延俊乂以光本朝不為難矣但患不為耳因説海内隠士頗不合隲舉炙啖充曰君宜及温食之充受炙擲地曰説士之樂甘於啖炙遂拂衣而出侍中張孟諫曰聞足下面折鄧将軍以讜言責之過矣非所以光祚子孫誠不為足下取此充曰大丈夫居世貴行其志耳我躬不閲遑恤我後復何能為子孫計由是不為權貴所容遷左中郎将年八十三後為三老五更天子賜几杖訪以國政秋七月辛亥帝崩崇徳殿初清河王慶子祐生而有神光赤虵之異年十嵗善史書喜經傳和帝甚器之號曰祐賞賜恩寵異於諸子和帝崩殤帝在抱太后詔留清河邸以為儲副及殤帝崩羣臣皆為屬意平原王勝太后以前不立勝恐為患與車騎将軍隲虎賁中郎将悝等定策禁中其夜使持節以青盖車以迎祐於清河邸癸丒立為長安侯太后詔曰先帝聖徳淑茂早棄天下朕撫育幼帝日月有望遭家不造仍罹凶禍朕惟平原王素被錮疾念宗廟之重思繼嗣之統長安侯祐禀性忠孝小心翼翼年已十三嶷然有成人之體禮昆弟之子猶子也其以祐為孝和皇帝嗣即皇帝位自延平初鄧隲兄弟常在禁中至是乃就第丙寅葬孝殤皇帝於康陵己亥隕石於陳留冬西域諸國反都䕶任尚上書求救遣騎都尉班勇校尉梁慬将五千人出塞㑹尚自疏勒還與慬共保龜兹温宿姑墨二國将數萬人圍慬月餘慬擊破之斬首數萬級道不通慬送留龜兹初西域自武帝時始通三十六國其俗頗土著城郭田畜地在匈奴之西烏孫之南北有大山中央有河東西六千餘里東則接漢阨以玉門陽闗出西域有兩道從鄯善傍南山北渡河西行至莎車為南道南道西逾葱嶺則出大月氏安息自車師前王庭隨北山陂河西行至疎勒為北道北道西逾葱嶺則出大宛康居奄蔡焉耆匈奴彊盛常屬役匈奴宣帝神雀中漢置西域都䕶王莽時數遣五威將軍出西域車師諸國貧困由是故叛而諸都䕶李宗抄暴南道改其國號以疎勒為世善姑墨為積善或易置王侯於是西域與中國遂絶和帝永元中西域都䕶班超遣掾甘英臨大海而還具言葱嶺西諸國地形風俗而班勇亦嘗記其事或與前史異然浸已審矣自燉煌西出玉門陽闗涉鄯善北通伊吾千里自伊吾通車師前部髙昌壁千二百里北通後部五百里是西域之門也伊吾地宜五穀桑麻蒲萄其北有栁中皆膏腴之地故漢嘗與匈奴争車師伊吾盧之地以制西域焉鄯善國治驩泥城去洛陽七千一百里北通車師前後王及東且彌卑陸蒲類移支是為車師六國北與匈奴接前部西通焉耆北道後部西通烏孫漢欲隔絶西域匈奴必得車師屯田伊吾焉耆治河南城去洛陽八千二百里東南與山離國接其餘危須尉黎龜兹姑墨温宿疎勒條支大宛康居大月氏安息大秦烏弋罽賔莎車于闐且彌諸國轉相通是名為西域大月氏城去洛陽萬六千三百七十里其東南數千里通天竺天竺一名身毒俗與月氏同臨大水西通大秦從月氏南至西海東至盤越國皆身毒地又有别城數十置王而皆總名身毒其俗修浮圖道不殺伐弱而畏戰本傳曰西域國俗造浮圖本佛道故大國之内衆數萬小國數千而終不相兼并及内屬之後漢之姦猾與無行好利者據守其中至東京時詐謀滋生轉相吞滅習俗不可不慎所以動之哉西域之逺者安息國也去洛陽二萬五千里北與康居南與烏弋山離相接其地方數千里西至條支馬行六十日臨海暑熱卑濕出師子犀牛犎牛孔雀大雀卵大如甕地與西海接自安息西闗西至阿蠻國三千四百里自阿蠻西至斯賔國渡河西南至于羅國有九百六十里安南西界乃極其南乗海乃通大秦或數嵗月云大秦國一名黎軒在海西漢使皆自烏弋還莫能通條支者甘英踰懸度烏弋山離抵條支臨大海欲渡人謂英曰海水廣大鹹苦不可食往来者逢善風時三月而渡如風遲則三嵗故入海者皆賫三嵗糧海中善使人思土戀慕數有死亡者英聞之乃止具問其風俗焉大秦地方數千里四百餘城小國役屬者數十石為城郭列置郵亭皆堊塈之有松柏諸木百草民俗力田作種植樹蠶桑國王髠頭而衣文繡乗輜軿白盖小車出入擊鼓有旌旗旙幟起宫室以水精為柱食器亦然王所治城周環百餘里王有五宫各相去十里平旦至一宫聴事止宿明旦復至一宫五日一遍而復還常使一人持囊隨王車民欲有言事者即以書投囊中王至宫發省分理其枉直各有官曹又置三十六相皆㑹乃議事王無常人國中有災異風雨不時輒放去之而更求賢人以為王者終無怨多金銀真珠珊瑚琥珀琉璃金縷罽雜色綾火浣布又有細布或言水羊毛野蠶繭所作㑹諸香煎以為蘇合凡外國諸珍異皆出焉以金銀為錢銀錢十當金錢一與天竺安息交市於海中其利十倍其民質直市無二價穀食常賤國内富饒鄰國使到其界首者乗驛詣王都至則廩以金錢及安帝元初中徼南塞外檀國獻幻人能變化吐火自支解又善跳丸能跳十丸其人曰我海西人出自大秦國自交州外塞檀國諸蠻夷相通也又有一道與益州塞外通大秦人皆長大平正若中國人故云外國之大秦而其國人常自言與中國無别其王常欲通使於漢奉貢獻而安息欲以漢繒綵與之交市故遮不得令通及桓帝延熹中王安都遣使者奉獻象牙犀角瑇瑁始一通焉其長老或𫝊言其國西有弱水近日入所矣又云從安息陸道繞海北行出海西至大秦人相連屬十里一亭三十里一置終無盜賊驚而有猛虎獅子遮食行者不有百餘人賫其器輒害之不得過又言渡海飛橋數百里至旁國所出竒異玉石諸物多譎怪不經故不述云西南極於山離道自條支東北通烏弋山離可百餘日行而烏弋山離罽賔莎車于寘拘彌諸國相接逺者去洛陽二萬一千里近者萬餘里焉十二月甲子清河王慶薨諡曰孝王慶善為威容進止可觀自被廢黜常務慎宻在宫省語不及外和帝為太子與慶相親入則共室出則同輿及即位政之大小與慶議之慶逾益畏慎夙夜戰慄每當朝㑹輒盛服待明且常謂左右曰我為一國王車馬器物亦已足矣内以誡敕外以諭左右其儉約逺名皆此類也初宋貴人冢上無祠堂慶每露祭未嘗不流涕和殤二帝崩慶常居倚廬哭泣哀慟遂以發病病困謂舅宋衍曰清河土地下濕欲乞骸骨於貴人冢傍下棺而已朝廷大恩猶當有屋宇子母并食魂靈不暴露死復何恨乃上書求葬於樊濯中貴人冢旁不聴慶将薨歎曰不惜死也但恨不見上為貴人報讐耳因泣不能自勝左右皆流涕既薨使司空持節䕶喪事賜龍旗九旒虎賁百人儀比東海恭王分清河封慶小子為廣川王後漢紀卷十五
