body:
  text: 後漢紀卷十七晉袁宏撰孝安皇帝紀第十七建光元年春正月髙麗寇𤣥菟二月辛亥大赦天下三月辛巳皇太后鄧氏崩癸未大斂封大将軍騭為上蔡侯丙子葬和熹鄧后初上少號聦明故太后立之後有不可意上乳母王聖知之見太后久不歸政恐有廢置意中常侍黄門郎李閏為上伺候及后崩因言鄧悝兄弟嘗從尚書鄧防取廢帝故事謀欲立平原王為帝五月庚申有司奏故金吾悝屯騎校尉𢎞歩兵校尉闓大逆無道宜追奪爵土以明襃貶遂免悝子廣宗𢎞子廣徳等爵宗族皆免歸本郡以隲不豫謀徙封沙羅侯行道為郡縣所逼騭與鳳自殺廣宗隲從弟遵約皆自殺唯廣徳母與閻后同産故得免以樂安侯康賢而有行徴為太僕卿初河間孝王子蠡吾侯翼與諸王子朝京師鄧太后善翼之為人也封翼為平原王因留京師及太后崩上以翼謀圖不軌竊闚神器乃貶翼為蠡吾侯封中常侍李閏江京為列侯賞發鄧氏之謀也大司徒朱寵騭之所舉乃肉袒輿櫬上疏曰和熹皇后聖善之徳為漢文母兄弟忠厚同心憂國宗廟有主王室是賴功成身退讓國遜位厯世外戚無與為比當享積善之祐宜䝉謙約之報横以宫人單辭事不可信騭等父母羣從不以夀終尸喪流離逆天感人宜皆還葬寵其遺孤以荅亾魂安帝初天降災疫百姓饑饉死者相望盜賊羣起四夷反叛騭等崇節儉罷力役推賢進能盡心王室故天下賴以復安乃被誅責其事闇昧衆庶多稱其冤上既聞之又感寵之言乃切詔州郡還騭等喪葬于舊塋使使祠以中牢諸從兄弟歸京師袁宏曰夫吉凶由人而存亾有地擇地而處君子所以無咎也長木之剽其勢必顛勢極故也勢極則受患故無全物焉然則貴盛之極傾覆之所由也外戚則尤甚焉得之不以至公宰割之日久也夫人君之勢非不髙且極也置君於無過之地萬人莫之計人臣則不然比肩而立相與一體也操大權於天下萬物之所惡也周公且猶狼狽而況其餘乎夫憑寵作威以取傾覆理固然矣若乃推心向善而不免闇昧之誅所處之地危也死而不異二者自處之道然均未達擇地之方昔楚人三世殺其君将立王子搜搜逃之丹穴楚人承以玉輿熏之以薪乃出故曰王子搜非惡為王惡其為己患也然則外戚之患也非徒一已焦爛而厯代貴寵未有不同其患者豈不哀哉戊申有司奏尊清河王為孝徳皇帝左姬為孝徳皇后宋貴人為敬隠皇后左姬犍為武陽人父坐事姬與姉妹俱入掖庭和帝時詔分宫人賜諸王以姬為清河孝王姬有令色王絶重之生孝安帝於是天子始親萬機尚書陳忠以為首政之初宜徵天下隠逸乃詔公車以𤣥纁徵南陽馮良汝南周夑皆稱疾不至良字君卿少為縣吏從尉迎督郵良恥厮役因毁其車馬壊其衣冠絶迹逺遁妻子見敗車壊衣皆以猛獸所食遂發喪制服良至犍為從師受業十餘年還鄉里雖處幽闇必自整頓非禮不動鄉里以為師舉賢良方正敦朴皆不行燮字彦祖敦詩書非法不言所與交游者不過三四人室家相待如賔客化行鄉黨舉孝廉茂才公車再徵皆不就上新聽政開諫諍路尚書陳忠以直言日至恐人主不能容乃上書通廣帝意曰臣聞人君廣山藪之大納切直之言忠臣盡蹇蹇之節不畏逆耳之誅是以髙祖舎周昌桀紂之譬孝文嘉袁盎人豕之喻世宗納東方朔宣室之正孝元容薛廣徳自刎之諫陛下崇寛厚之徳推宋景之誠引咎責躬咨訪羣吏言事者新䝉採録顯列二臺必承風而靡争效切直如有管闚愚見妄陳得失雖苦口逆耳不得事實宜優游寛容以遵四帝之緒也秋七月己亥大赦天下八月甲子故司徒劉愷為太尉九月戊子上幸衛尉馮石府賞寳劒玉玦冬十二月丙申乃還宫己丑郡國三十五地震壊城郭壓殺人本志以為安帝不明官人與王聖專權之應也鮮卑寇𤣥菟庚子絶大臣服三年喪尚書陳忠上疏曰昔先王孝治天下始於愛親終於哀戚上自天子至於庶人尊卑貴賤其義一也夫人生三年乃免父母之懐先聖縁情著其節制故曰臣有大喪君三年不呼其門周室陵遲禮制衰廢蓼莪之人作詩自傷曰缾之罄矣惟罍之恥言已不得終竟子道者亦上之恥也髙祖受命蕭何創制大臣有寜告之科合於致憂之義建武初撥亂之世國政草創人倫未厚鮮循三年之喪以報顧復之恩禮義之廢實由於此然仁道無逺𢎞之即是故籍田之科起於太宗孝㢘之貢彂於孝武郊祀之禮定于元成三雍之序備於永平大臣送終于今乃章聖功美業於是乎在孟子有言老以及老幼以及幼天下可運於掌臣願陛下登髙北望以甘陵之思揆臣子之心則海内羣生各得其所上不從袁宏曰古之帝王所以篤化美俗率民為善者也因其自然而不奪其情民猶有不及而況毁禮止哀滅其天性乎冬十月羌寇張掖武威十二月髙句麗圍𤣥菟延光元年春夫餘王遣兵助𤣥菟使貢獻三月丙午大赦天下賜天下男子爵各有差鰥寡孤獨篤癃不能自存者粟人三斛貞婦人帛三匹夏四月京師地震癸巳司空陳襃以災異免於是猶有風雷之變有司復以追咎三公尚書僕射陳忠上書曰臣聞君使臣以禮臣事君以忠故天子三公入則參議政事出則司察羣后然王者虚已待以殊禮在輿為軾在坐為起漢典舊事丞相所緫靡有不聴今之三公有古之名而無其實選舉誅賞一由尚書尚書之任重於三公凌夷已来其漸乆矣近以地震䇿免司空今言者復欲切讓三公以解天意臣愚闇竊信宋景克已之誠孝成皇帝時妖星守心納賁麗之說令丞相方進自裁䘚不䝉其福以此況之是非之分具可詳見今尚書奏事有所請造及決天下罪法不依故事者宜使左右責求其意割而勿聴上順古典之義下防威福之專置方圎於規矩審輕重於權衡誠國家之典萬世之法也忠意在褎崇大臣待下以禮九卿疾病使者臨問加賜錢帛皆忠之議也遷尚書令司隷校尉初忠父太尉寵守正不事諸鄧故忠不得志於其門及鄧氏被誅衆庶多冤之而忠數上書陷成其惡奏劾司農朱寵太子之廢諸名臣来厯等守闕固争忠又劾奏當世以此譏忠五月庚戌宗正劉授為司空秋七月癸夘京師地震庚辰髙句麗王乞降八月羌宼涼州戊子陽陵寝殿火本志曰棄法律逐大臣殺太子以妾為妻則火不炎上為火失其性而為災也今彂於先陵此天子将變象也若曰不當廢太子以自翦如火不當害先陵之寝也辛夘黄龍見九真九月戊申郡國二十七地震冬十月鮮卑宼鴈門定襄十一月鮮卑攻九原二年春正月燉煌太守張璫上書陳邊事曰臣在京師亦以為西域宜棄今親踐其土地乃知棄西域則河西不能自存謹陳西域三䇿今北虜呼衍王等展轉蒲類秦海左右可彂張掖酒泉屬國之吏士義從合三千五百人集崑崙塞先擊呼衍王絶其根本因彂鄯善兵五千人脅車師後部此上計也若不能出兵可置軍司馬将士五百人四部供其穀食出據栁中此中計也如亦不能則棄交河城收鄯善等悉使入塞此下計也尚書陳忠上疏曰臣聞八蠻之宼莫甚北虜漢興髙祖窘平城之圍太宗屈供奉之恥故孝武忿怒深惟久長之計命遣虎臣浮河絶漠窮破虜庭當斯之時黔首隕於狼望之北財幣縻於盧山之壑府庫殫竭杼軸空虚算至車船貲及六畜夫豈不懐慮久故也遂規酒泉燉煌四郡以隔南羌開三十六國妻以公主以斷其右臂是以單于孤特竄遁逺藏至於宣元遂備蕃臣闗徼不閉羽檄不行由此察之戎狄可以威服難以化洽西域内附日久區區東望叩闗者數矣此其不樂匈奴慕漢之效也今北虜已破車師勢必南攻鄯善棄而不救則諸國從矣若然則北虜財賄益増膽勢益殖威臨南羌與之交連如此河西四郡危逼不得不救則百倍之役興不貲之費發矣今議者但念西域絶逺恤之煩費不見先世苦心勤勞之意方今邊郡守禦之具不精内郡武衛之備不修燉煌孤危逺来告急復不輔助内無以慰勞民吏外無以威示百蠻蹙國減土經有明戒臣以為燉煌宜置校尉案舊増四郡屯兵以西撫三十六國建屯益兵宣揚雷風冀以折衝萬里震怖匈奴於是從之夏四月戊子爵乳母王聖為野王君聖女婿劉瓌為朝陽侯司空楊震詣闕上書曰臣聞髙祖與羣后約非功臣不得封攻城野戰棄身沙漠降服百蠻不羈之虜然後得受茅土故經制父死子繼兄亾弟及所以别親疎殊適庶尊國體重繼嗣防淫簒絶姦謀百王不易之道天子不專封封有功諸侯不專爵爵有徳今瓌無他功徳但以配阿母女既忝位侍中一時之間超至封侯稽之舊制不合經義行人喧譁百寮不安臣誠知言與罪俱辭與辜㑹忝當台翰之任故不敢不盡言之上不從又為阿母起第舎震復上疏曰臣聞古者三年耕有一年之儲九年耕有三年之儲故堯之遭洪水民無菜色𫝊曰國無三年之儲非其國也故豐年加禮凶年減除臣伏念災害發起彌以滋甚百姓空虚不能自贍重以羌虜抄掠二邊雲擾戰鬭之役至今未息兵甲軍糧恒不足給殆非社稷安寧之術伏見興起津城門内第舎雕繕之飾窮極巧妙使者将作轉相逼促盛夏土王攻山採石百姓布野農民廢業臣聞上之所取財盡則怨力盡則叛怨叛之民不可復使故曰百姓不足君孰與足上不從冬十月辛未太尉愷乆病罷司徒楊震為太尉是時京都郡國三十七地震三年春二月丙寅上與太子行幸泰山復濟陽今年田租戊子鳳皇集濟陽賜見者帛二十匹鳳皇所過亭部無出今年租賜天下男子爵二級壬辰祠五帝于汶上明堂戊戌祠孔子于闕里及七十二弟子遂幸東平魏郡河内壬戌太尉楊震䇿免初河内人趙騰詣闕上書陳得失詔收下獄考治震隠其狂直上疏曰臣聞堯舜之朝設直諫之鼓誹謗之木盖欲闢廣四門開直言之路轉采負薪盡賢愚之情也乞全騰性命以納芻蕘之言不從騰竟死於都市中常侍樊豐等由是共稱譛震騰死之後深用怨懟乃䇿免收震印綬遣歸本郡到洛陽沈亭震顧諸子謂門生曰人非金石死者士之常吾䝉恩居上司疾姦臣樊豐之狡猾而不能誅惡嬖女王聖之傾亂而不能禁知帑藏虚竭賞賜不節而不能實何面目見日月身死之日但雜木為棺勿漆布單衣才足盖形勿歸冢次勿設祭祀遂仰鴆而死震字伯起𢎞農華隂人也博學無所不究數十年不應州郡之命衆人謂晚暮而震志業愈篤年過五十乃應州郡之命大将軍鄧隲聞而辟之以為賢舉茂才累遷荆州刺史東莱太守當之郡道經昌邑故茂才王宻為昌邑令謁見至夜懐金十斤遺震震曰故人知君君不知故人也宻曰暮夜無知者震曰君知我知天知地知何故無知宻慙愧而出震言行不媿於心皆此類也子孫常蔬食歩行故舊長者或諫令為開産業震曰使後世稱清白吏子孫以此遺之不亦貴乎及為公卿敦古守朴推其誠心每言事不為文辭意在匡主絶姦而已子秉以義正知名袁宏曰夫生而樂存天之性也困而思通物之勢也愛而效忠情之用也故生茍宜存則四體之重不可輕也困必宜通則天下之欲不可去也愛必宜用則北面之節不可廢也此三塗者其於趣舎之分則有同異之辨矣統體而觀亦各天人之理也是以君子行已唯心所託焉古之道術有在於此者明夷隠困而不恥箕子之心也甯俞聞其風而悅之舎否之通利見大人微子之趣也叔孫通聞其風而行之諫以弼君死而不貳比干之志也楊震聞其風而守之此數賢者雖行其所聞殉託不同皆終始之道而不内媿於心者也是以聖人知天理之區别即物性之所託混衆流以𢎞通不有滯於一方然後品類不失其所而天下各遂其生矣然君子之動非謀於衆也求之天地之中款之胸懐之内茍當其心雖殺身糜軀未為難也茍非其志雖舉世非之而不沮也夏四月戊辰光禄勲馮石為太尉五月南單于左日逐王燒當部扶渠當等反秋八月辛巳大鴻臚耿珍為大将軍戊子麒麟一白虎二同見陽翟九月丁酉廢皇太子保為濟隂王太子嘗有疾避于野王君王聖第太子乳母王男㕑監邴古與中常侍江京樊豐及聖永等争言相是非遂誣譖男等皆幽死獄父母妻子徙日南太子思戀男等數為歎息聖永懼有後患乃與京豐共譖搆太子是時閻后寵盛京豐媚於閻顯等信之遂與后共助毁太子上召大将軍公卿議太子應廢大将軍耿珍等曰是不宜奉適嗣太常桓焉太僕来厯廷尉張皓曰邴古等所議謀太子不知經說年未十五過惡不在身太子少宜選忠良師㕛輔以禮義廢置重事此誠聖思所宜詳審上使中常侍奉詔脅諸大臣大臣皆失色来厯獨固争之上乃免厯官削爵土是日太子廢於是光禄勲祝諷中郎将閭丘𢎞符節令張敬太中大夫第五頡中散大夫曹成諫議大夫李泰羽林右監孔顯治書侍御史龍調衛尉丞樂闈城門司馬徐崇開封人鄭安世等守闕上書訴太子之冤癸巳令天下死罪減一等徙邊戍亾命贖罪者各有差辛亥黄龍見厯城庚申晦日有蝕之冬十月壬午鳳皇見新豐本志曰皇之不極是謂不建時則有龍蛇之孽又曰視之不明是謂不哲時則有羽蟲之孽鳳皇者陽明之應也故非明王則隠而不見凡五色大鳥似鳳皇者多為羽蟲之孽是時上信讒免楊震廢太子不哲之異也丁亥行長安祠陵廟十二月乙未黄龍見琅邪是嵗京師郡國二十二地震四年春正月壬午黄龍二麒麟一見濮陽三月戊午朔日有蝕之庚申上幸宛當祠章陵覺體不安乙丑疾篤自宛還徵濟北河間王子年十四已下七嵗已上詣京師進號皇后母宜春夫人為滎陽君丁卯帝崩於葉不發喪庚午還宫辛未乃發喪皇后與兄閻顯謀以所徵濟北王子北鄉侯懿為帝嗣以閻顯為車騎将軍乙酉北鄉侯即皇帝位太后臨朝夏四月丁酉太尉馮石為太傅司徒劉喜為太尉參録尚書事故司空李郃為司徒有司奏大将軍耿珍中常侍樊豐野王君王聖女永下獄誅己酉葬孝安皇帝於恭陵六月乙巳大赦天下冬十月丙午蜀郡越嶲山崩殺四百餘人辛亥北鄉侯薨車騎将軍閻顯中常侍江京等謀曰前不用濟北王今立之後必怨人乃言於太后徵濟北王河間王子将以為嗣初太子之廢居於徳陽殿西鐘下中常侍黄門孫程王成王國等常懐憤懣謀欲立之以告濟隂王謁者長興渠殺中常侍江京陳達劉安于省門之外王成以劒脅李閏曰太子之廢天下咸怨今北鄉早薨安帝無嗣太子聦明天将啟之從我乎閏許諾成乃與閏召尚書令僕射已下到西鐘下立濟隂王為皇帝時年十一升雲臺詔百官顯聞帝立懼不知所為小黄門樊登曰何不發兵擊之顯以太后詔越騎校尉馮詩虎賁中郎将閻景将兵屯平朔門登引詩等入省顯謂詩曰濟隂王立非皇太后意壐綬在此茍盡力效功封侯可得太后使授詩等曰能得濟隂王者封萬户侯李閏者五千户侯詩等皆許諾卒被召所将吏士少顯使詩與登迎吏士于左掖門外詩因歸營知事将敗乃格殺登閻景歸衛府收兵将欲作亂是時尚書郭鎮勒兵詣闕遇景於公車門鎮下車詔景景以刃斫鎮鎮抽劒斬景戊午使御史詣崇徳殿收顯等親族下獄誅妻子徙日南初上之廢閻后豫焉議郎陳禪議以為太后與上無母子之恩當廢羣臣咸以為宜司徒掾周舉說司徒李咸曰昔瞽瞍常欲殺舜舜事之逾謹鄭武姜謀殺莊公秦始皇與母隔絶感考叔茅焦之言修復子道斯皆前世之迹書𫝊之所美也今諸閻新誅太后不悦恐悲生疾如從禪讓若有變異後世歸咎明公不刋之事也以聞上從之丁夘以王禮葬北鄉侯辛巳封孫程王國等十九人為列侯司空劉授以阿附惡逆免十二月詔曰朕以不徳纂承洪緒今隂陽不和疾疫為害思聞忠正以匡不逮其令三公卿士舉賢良方正能直言極諫之士各一人楊震門下人訟震之冤天子嘉震之忠除二子為郎賜錢二十萬以禮改葬之是日有大鳥翼廣一丈三尺集于柩前低頭淚出衆人莫不驚覩葬畢飛而沖天甲申少府陶敦為司空後漢紀卷十七
