body:
  text: 後漢紀卷九晉袁宏撰孝明皇帝紀第九永平元年四月癸夘封故衛尉陰興子慶為鮦陽侯博為隠彊侯楚王舅子許昌為龍舒侯東海恭王彊建武二年立母郭氏為后彊為皇太子十七年而郭后廢彊常戚戚不自安數因左右及諸王陳其懇誠願備藩國光武不忍遲迴者數嵗乃許焉十九年封為東海王二十八年就國帝以彊去就有禮故優以大封兼食魯郡合二十九縣賜虎賁旄頭宫設鐘鼓之懸擬於乗輿彊臨之國數上書讓還東海又因皇太子固辭帝不許深嘉歎之以彊書宣示公卿初魯共王好宫室起靈光殿甚壮麗是時猶存故詔彊都魯中元元年入朝従封岱因留京師明年春帝崩冬歸國永平元年彊病顯宗遣中常侍鉤盾令将太醫乗驛視疾詔沛王輔濟南王康淮陽王延詣魯五月戊寅彊病困臨命終上疏謝曰臣䝉恩得備藩輔特受二國榮寵巍巍無量訖無報稱自修不謹連年被病為朝廷憂皇太后陛下慈憫惻至動𤼵中心臣内省視氣力羸劣日夜寝劇終不望復見闕庭奉承帷幄辜負重恩銜恨黄泉言之絶腸惟皇太后陛下加供養數進御食避風氣終始天道臣彊困劣言不能盡意願悉謝諸王不意長不復相見臣特䝉大恩兼大國政小人也猥當襲臣封非所以全利之也如皇太后陛下深為規度誠願還東海以臣無男之故則處臣三女小國侯此臣夙夜之願也彊薨問至上與皇太后悲慟不自勝乃詔諸王京師親家皆詣東海奔喪遣司空魴持節視喪事賜旄頭鸞輅龍旗虎賁榮寵之盛無與為比諡曰恭王詔東海傅相曰王謙恭好禮以徳自終其葬送之具務從省約以彰王卓爾之美子政嗣淫慾無行故彊以為言秋七月西羌破走餘衆悉降徙三輔羌之先三苖之裔也其俗以父名母家姓為號出十二世相與㛰姻妻後母報嫂無鰥男寡婦故種類繁息其為兵長於山谷短於平地男子兵死有名且以為吉病終謂之劣又以為不祥婦人産乳丈夫被創不避霜雪得西方金氣焉夏后氏衰戎狄在邠岐之間殷衰周太王自邠之岐周衰幽王為西戎所滅故羌之為患自三代然也袁宏曰夫民之性也各有所禀生其山川習其土風山川不同則剛柔異氣土風乖則楚夏殊音是以五方之民厥性不均阻險平易其俗亦異況乃殊類絶域不賔之旅以其所禀受有異於人先王知其如此故分其内外阻以山川戎狄蠻夷即而序之夫中國者先王之桑梓也徳禮陶鑄為日乆矣有一士一民不行先王之道必投之四裔以同殊類今承而納之以亂大倫違天地之性錯聖人之化不亦敝乎昔伊川之祭其禮先亡識者觀之知其必戎況西戎北狄雜居華土嗚呼六夷之有中國其漸乆矣八月戊子徙山陽王為廣陵王是嵗太傅鄧禹好畤侯耿弇薨諡禹曰元侯弇曰愍侯禹疾病天子親數問除二子為郎分禹國封三子為列侯禹内文明外温恭不事産業常欲避權勢十有三男各命通一經其閨門之訓皆可為後世法長子震為髙密侯次襲為昌安侯次鴻為車騎将軍坐出塞追叛胡下獄死第六子訓不好文學禹以此非之然好施愛士濟人之急士無貴賤見之如舊以謁者使外國為烏丸校尉徙杼秋侯股為居巢侯揚州刺史詔以股口無擇言行無怨惡宜䝉褒顯以勸天下乃徴股行執金吾事二年春正月辛未祀光武皇帝於明堂始服冕珮玉禮畢登靈臺觀雲物大赦天下自三代服章皆有典禮周衰而其制漸微至戰國時各為靡麗之物秦有天下收而用之上以供至尊下以賜百官而先王服章於是殘毁矣漢初文學既闕時亦草創輿服旗幟一承秦制故雖少改所用尚多至是天子依周官禮記制度冠冕衣裳珮玉乗輿擬古式矣袁宏曰昔聖人興天下之大利除天下之大患躬親其事身履其勤使天下之民各安性命而無夭昬之災是以天下之民親而愛之敬而尊之夫親之者欲其閒敞平懌而無疾苦之患也故為之宫室衛以垣牆重門擊柝以待暴客敬之者欲其崇髙榮顯殊異於衆故為之旗旌表以服章陛級懸絶不可得而逾也後之聖人知其如此自民之心而天下所欲為故因而作制為之節文始自衣裳至于車服棟宇垣牆各有品數明其制度盡其器用備物而不以為奢適務而不以為儉大典既載陳於天下後世因循守其成法故上無異事下無移業先王之道也末世之主行其淫志耻基堂之不廣必壮大以開宫恨衣裳之不麗必美盛以修服崇屋而不厭其髙𤣥黄而未盡其飾於是民力殫盡而天下咸怨所以敝也故有道之主覩先王之規矩察秦漢之失制作營建務求厥中則人心悦固而國祚長世也二月甲子立皇后馬氏皇子坦為皇太子賜天下男子爵各有差鰥寡孤獨不能自存者人粟五斛后馬援女也后有四兄二姉長兄廖及防光二姉與后同母兄客卿幼而岐嶷初援南定百越北征匈奴謀議之士集於門下客卿年六嵗能應接諸公専對賔客嘗有死罪亡命者客卿蔵匿之不令人知援甚竒器之以為壮大必任将相故以秦時官號字焉援薨後客卿早死太夫人悲傷𤼵疾恍惚昬亂后時年十嵗幹治家事敕制僮僕昆弟親屬各得其宜諸家皆以為太夫人所為也後問之咸驚異焉嘗疾令卜者筮之曰此女當為帝妃貴不可言乆之太夫人亾珠直數萬錢問相者相者指一御婢此人盜之果如其言太夫人竒之乃令相諸女見后驚曰我必為此女稱臣貴而少子太夫人曰得無無子乎相者曰有一子遽失得人子力愈於自生子也年十三以選入太子家接侍同列如承貴尊先人後已發於至誠由是見寵及有司奏立長秋宫太后曰馬貴人徳冠後宫即其人也嘗從容問以政事后輙推心以對無不當意時後宫未有妊育者嘗言繼嗣當以位薦達左右如恐不及其見寵者與之恩隆未嘗與侍御者私語其防閑慎微皆此類也性不喜出入遊觀上時幸苑囿離宫輙諍諫辭意甚美上納焉誦易經習詩論語春秋略記大義聴言觀論摘𤼵其要讀光武本紀至於獻千里馬寳劍賜騎士手不持珠玉未嘗不歎息也后志在克己不以私家干朝廷兄廖為虎賁中郎防光為黄門郎訖明帝世不易官三月上初禮於學臨辟雍行大射禮使天下郡國行鄉飲酒禮於學校秋九月沛王濟南王淮南王東海王来朝冬十月壬子上臨辟雍初養三老五更於是士效禮樂三雍儀制備矣詔曰五更桓榮以尚書教朕十有餘年周頌曰視我顯徳又曰無徳不報其賜榮爵闗内侯食邑五千戸榮病篤上疏謝恩讓還爵土上憫傷之臨幸其家入巷下車擁經趨進躬自撫循賜以牀帳衣服於是諸侯大夫問疾者皆拜於牀下及終贈賜甚厚上親變服臨送賜冢塋初榮為太常上幸其府令榮東面坐設几杖之禮而百官能通經義者及榮門下生數百人上親自下説時有問難者上謙而不答曰太師在是也供御畢悉以饌賜榮字春卿沛國亢人少給事郡縣長師事九江朱文家貧常賃自供食夜誦讀無懈怠十五年不歸家京師以此稱之父卒榮奔喪九江負土成墳因留教授徒衆數百人王莽末天下擾攘兵革之間窮厄絶糧然抱持經書與諸生逃匿山谷講授不輟建武中大司徒辟榮年已六十餘矣時虎賁中郎将豫章何湯榮門下生也以選授皇太子經世祖問湯何所師對曰桓榮世祖即召榮令説尚書善其説拜郎賜錢十萬入授皇太子甚見尊重每朝㑹世祖輙令榮於公卿前説因問長安時舊事世祖曰得卿幾晩善博士也榮叩頭曰臣經學淺薄不如同門生揚州從事臯𢎞郎中彭閔世祖曰俞汝諧因除榮為博士榮謙恭有藴籍每論難於前常持禮讓以義理相喻不茍以言辭取勝儒者以此髙之少子郁字仲恩𫝊父業以任為郎榮卒郁當襲爵上書讓孤兄子上不許遷侍中上以郁先師子有禮讓甚親厚焉常居中論經問以政事甲子幸長安祠陵廟遣使者祠蕭何霍光車駕過軾墓所賜二千石令長已下各有差十月䕶羌校尉竇林有罪下獄死三年春二月太尉趙喜司徒李訢坐事免左馮翊郭丹為司徒南陽太守虞延為太尉延陳留東昬人初為細陽令信行於民棄官還家太守傅宗聞其名署功曹宗輿服出入擬於王侯延每常進諫曰晏嬰相齊裘不補公儀相魯拔園葵去織婦夫以約失之者鮮矣宗勃然不悦曰昔者諸侯今之二千石也延以陪臣喻諸侯豈其謂也延以不合意退去宗後果以奢麗得罪臨當伏刑世祖使小黄門往視之宗乃仰天歎曰恨不用功曹虞延之諫後車駕過外黄詔問陳留太守寧有功曹虞延邪太守對曰今為南部督郵乃引見問諫前太守時事延具以状對詔問延外黄園陵寝殿祭器俎豆悉曉其禮由是遂見重焉賜錢百萬郡中聞之易視聴辟司徒府遷洛陽令是時隂皇后家客馬成嘗為姦宄延收繫之陰将軍書請之前後不絶延得一書輙加笞二百隂氏知延必殺之乃言於世祖以延多所枉濫世祖親臨御道敕延出獄中囚其已論者居東罪未决者居西成自以罪已決欲起就東延前撃其頭曰此民之蠧也乆依城社不畏煙燒今方考實姦未窮盡成大呼稱寃㦸郎以㦸承延頸叱使置之世祖知延不移因謂成曰汝犯法身自取之何以為寃後數日遂伏誅上即位遷南陽太守新野功曹鄧衍以外戚小侯得朝會趨過殿庭姿容甚麗上顧謂左右曰朕之儀容豈能若此左右曰陛下天子此凡人何足比焉雖然上心好之特賜輿馬衣服南陽計吏歸具白延延知衍行不配容積三年而不用於是上乃敕衍令稱南陽功曹詣闕拜郎中後為𤣥武司馬不為父行服上聞之慨然曰知人則哲惟帝難之虞延之言信哉衍慙懼遂退位上益竒延甲子賜天下男子爵人二級三老孝悌力田三級鰥寡孤獨貧不能自存者粟人五斛夏四月辛酉立皇子建為千乗王當為廣平王秋八月有司議世祖廟樂東平王蒼議曰漢制舊典宗廟各奏其樂不必相襲以明其徳也髙帝受命龍興誅暴秦天下各得其所作武徳之舞孝文皇帝躬行節儉澤施四海制盛徳之舞光武皇帝受命中興撥亂反正登封告成功徳巍巍夫歌所以詠徳舞所以象功廟樂宜曰大武之舞從之初起北宫尚書僕射鍾離意諫曰陛下以天旱不雨每自刻責避正殿損常膳而天猶不雨豈舉動失所而政違天心者邪昔湯遇旱以六事自責曰政不節邪使民疾邪宫室崇邪女謁盛邪苞苴行邪讒夫昌邪今百姓須雨而天乆旱竊以為北宫大作是宫室崇政不節之類也自古已来非患宫室小但患民之不安詩曰雨我公田遂及我私言君臣相濟上下同憂也今天下疲弊衣食不充可謂憂矣食祿於朝備在近列敢不以聞時詔賜降胡子縑尚書案事誤以十為百上大怒詔即欲鞭之意曰過誤者人所有也若以懈慢為罪臣居大官皆在臣臣請先受坐解衣就撻上意解皆原之上性急好以小察為明公卿大臣數被誣毁尚書近臣尤甚由是朝廷悚慄事為多茍且以避誅責意獨犯顔論事數封還詔書羣臣獲怒者輒救請之意薦彭城劉平徴為議郎上數引見遷侍中宗正平薦舉承宫郇恁皆名士也以老病乞骸骨歸鄉里平字公子始以孝行稱為郡吏守菑丘長政教大行每屬縣亂輒令平守之所至皆治更始時天下亂平弟仲為賊所害平抱仲女棄已子而走母欲還取之平曰力不能兩全仲不可以絶類也遂去不顧平嘗出為母求食賊得平将食之平叩頭涕泣曰今旦為老母採莒母饑待平為命願得反食母而還就死賊見其至誠哀而遣之平還既食母即白曰屬與賊期義不可欺遂復還賊皆大驚相謂曰常聞烈士今乃見之矣吾不忍食子建武初平狄将軍龎萌反攻太守孫萌平為主簿冒白刃伏萌上身被七創嘷泣曰願以身代明府賊乃相顧曰義士也勿殺遂解去萌絶而復蘇因涕泣相抱後數日萌竟死後太守嘉其節義舉孝亷為全椒長使掾吏卒五日一来治所餘日令各就農桑官閒事簡民人懐感盜賊屏息財賦增益為諸邑最刺史太守行部獄無囚徒民各自以得職不知所問沛人趙孝亦以義行獲寵孝字長平初天下亂人相食孝弟禮為賊所得孝聞之則自縛詣賊曰禮乆餓羸痩不如孝肥飽賊大驚不忍食兩放之謂曰歸持米糧来孝不能得即復往願就烹賊義之不害建武初天下新定民皆乏食孝每炊待熟輒使禮夫婦出有所役自在後與妻共食蔬菜及禮還告以食而以糧飯食之如此者乆禮心怪之微察悵恨獨然遂不肯復出兄弟怡怡鄉黨服其義州郡召進退必以禮天子素聞其行詔拜為諫議大夫長樂衛尉後復徵弟為御史中丞禮亦以恭謙有禮讓上嘉孝兄弟篤行欲寵異之率常十日使禮至衛尉府太官供食令其相對盡歡其見優若此數年禮卒贈賻甚厚令孝以長樂衛尉從官屬送喪葬於家壬申日有蝕之是時刑法嚴峻人懐憂懼因是變也鍾離意上疏曰陛下躬行孝道修明經術敬畏天地之禮勞恤黎元之恩然而天氣未和日月不明水泉湧溢漂殺人民咎在羣臣不能宣化理職人懐恐急故百官不親吏民不和至於骨肉相殘以逆和氣雖加殺伐猶不能止故百姓可以徳勝不可以刑服願陛下緩刑罰順時氣以調陰陽垂之無極上雖不能用然知其忠直故不得乆留中出為魯國相為治存大體不求細過百姓愛之将終遺言上書陳刑法太峻宜少寛假上感其言賜錢二十萬意之出也遂就北宫及徳陽殿成㑹百官上曰鍾離尚書在不得成此殿也意字子阿㑹稽山陰人少為督郵亭長有受民酒禮者府下記案治意答曰詩曰刑于寡妻至于兄弟以御于家邦明政化之本由近及逺今明府宜由内以及諸外且闕略逺縣細微事太守甚賢之遂任以屬縣事㑹稽大疾疫死者以萬數獨身自隠視經給醫藥全濟者甚多辟司徒府為掾遷堂邑令視民如子百姓懐之邑民防廣遺腹子也為父報讎繫獄其母病死廣哭泣不飲食意憐傷之解遣廣歸家使得殯斂丞掾皆以為不可意曰自得罪非丞掾也廣殮母訖即還入獄意以状聞竟得以減死論冬十月有事于世祖廟初獻大武之舞改大樂曰大予樂袁宏曰樂之為用有自来矣大章簫韶於唐虞韶濩大武於殷周所以殷薦上帝饗祀宗廟陳之朝廷以穆人倫古之道也末世制作不達音聲之本悖理乖化失序乎情性之宜故雖鐘鼓不足以動天地金石不足以感人神因輕音聲之用以忽感導之方豈不惑乎善乎嵇生之言音聲曰古之王者承天理物必崇簡易之教師無為之理君静於上臣順於下大化潛通天下交泰羣臣安逸自求多福黙然化道懐忠抱義而不覺其所以然盖和心足於内則美言發於外故歌以叙志舞以宣情然後文之以采章昭之以風雅播之以八音感之以太和導其神氣引而宣之迎其悦情致而明之使心與理相順言與聲相應合乎㑹通以濟其美故凱樂之情見於金石含𢎞光大顯於音聲也若此已往則萬國同風芳榮齊茂馥如秋蘭不期而信大道之隆莫盛於兹太平之業莫顯於此故曰移風易俗莫善於樂然樂之為體以心為主故無聲之樂民之父母也夫音聲和此人情所不能已者也是以古人知情不可放故抑其所通知慾不可絶故因以致殺故為可奉之禮制可遵之聲也口不盡味耳不極音揆始要終為之檢則使逺近同風而不竭亦所以結忠信著不遷也故鄉教庠序莫不修之使絲竹與俎豆並存羽旄與揖讓俱用正言與和聲同發使将聴是聲也必聞此言将觀是容也必崇此禮猶賔主升降然後酬酢行焉於是言行之節音聲之度揖讓之宜動止之叙進退相須共為一體君臣用之於朝士庶用之於家少而習之長而不怠心安志固從善日遷此先王用樂之意也故朝宴聘享嘉樂必存是以國史採風俗之盛衰寄之樂工宣之以管絃使言之者無罪聞之者足以自戒此先王用樂之意也上與皇太子后幸南陽章陵周觀舊廬召見陰鄧故人賞賜各有差四年春二月辛亥上親耕于藉田将獵河内驃騎将軍王蒼諫曰臣聞盛春農事始興於時令不聚民興功𫝊曰田獵不宿食飲不享出入不節則木不曲直此失春令故也臣知車駕至約省所過吏民諷誦甘棠之徳雖然動之不以禮非示四方規凖也陛下因行田野見稼穡經覽河山逍遙駐留弭節而旋至秋冬乃振威靈整法駕備周衛設羽毛詩云抑抑威儀惟徳之隅敬慎威儀惟民之則不勝至心謹手書陳愚上從之秋九月戊寅千乗王建薨隴西太守鄧融下獄死初融在職不稱功曹亷范知其必獲罪乃謝病去融甚望之范改姓名求為廷尉卒無何融果徵下獄范衛侍有異於常融不意是范也怪而問之曰卿何類我功曹范曰君誤耳非是也融疾病及死范養視甚篤終不自言身自将車送喪至南陽葬畢而去范字叔度杜陵人祖父丹王莽時為大司馬范父遭亂客死于蜀范與母流離西州天下定乃歸鄉里范年十五辭母入蜀迎父喪母憐其小謂曰汝家惟汝一身遭世亂恐滅絶不得奉宗祀今僅得全奈何復棄我逺去范固自請母不能止遂與客俱西入蜀蜀郡太守張穆丹之故吏也聞范迎喪遣吏資車馬布帛送范范還不受與客步負喪經渉塗險至葮萌下喪載船船觸石破沒范抱持骸骨人前拯范不動遂沒石間衆傷其義相與共鉤求一日乃得共抱懸良乆乃蘇穆聞之大驚復馳使将前資追與范范曰前後相違范所不行也遂辭不受歸葬行服闗中髙其行袁宏曰古之人明救䘏之義開取與之分所以周急拯難通乎人之否泰也亷范卓然獨行以任所重其身殆亡而親柩幾喪非全義之道也范既歸事博士薛漢初范家之入蜀以良田百餘頃屬故吏毛仲范歸仲子叔奉仲遺命以田歸范范以物無常主在人即有悉推田與之辟公府掾㑹薛漢坐楚事誅故人門生莫敢哭視范獨往收之吏以聞帝大怒召入詰責范曰楚王無道交亂天下范公府掾不與朝廷同心而反收斂罪人何邪范叩頭曰臣無状以為漢等皆已伏誅故不勝師資之情罪當萬死上怒稍解問范為亷頗後邪范對曰臣本趙人亷頗之後大父丹為王莽大司馬上乃曰怪范能若此因釋之舉茂才為温令數月遷雲中太守㑹胡虜反故事虜人入塞過五千人移書旁郡救至乃出范聞警即自以精兵赴之虜盛漢兵不能敵范乃令軍士皆持炬晨奔虜軍大炬如星虜見之驚走追擊大破之自此後虜震怖不敢犯雲中累遷武都蜀郡太守所在有名迹蜀郡好文學喜相長短范以寛厚化下人民懐之坐事免歸家多散財物以賑宗族與洛陽亭長慶鴻為刎頸之交時人稱曰前有管鮑後有慶亷鴻官至琅邪太守所在有異迹十月乙夘司徒郭丹司空馮魴免丹字少卿南陽穰人少事淮陽公孫昌西入闗棄符歎曰不乗𫝊車終不出闗是時昌為王莽講學大夫門下生甚衆而昌獨禮異丹由是嚴尤王尋更辟請皆不就莽亦徵之逃避十餘年而更始立以丹為諫議大夫持節出闗安集南陽初世祖即位諸将悉降受爵邑丹獨城守不下乃裹節荷檐經歴險阻謁更始妻子還其節𫝊然後歸田里後舉髙第稍遷并州牧左馮翊皆有政績及在相位清亷公正與侯霸杜林相善亦齊名迹十二月陵鄉侯梁松下獄死松有才能明習漢家故事以選尚舞陰公主為虎賁中郎将世祖時貴幸用事上即位遷太僕卿數為私書請託郡縣事𤼵覺免官由是怨望下獄誅安豐侯竇融薨融子穆尚内黄公主封顯親侯及子固尚沮陽公主穆長子勲尚東海恭王女北陽公主穆為城門校尉固為中郎将監羽林融從兄子林為䕶羌校尉竇氏一公兩侯三公主四二千石自祖及孫官府邸第相望奴婢千餘人於親戚功臣中莫與為比融年老子孫放縱多不法度帝不能容數下詔比以竇嬰田蚡故事融惶懼乞骸骨上賜牛酒策罷穆以國在安豐欲以女妻六安侯遂假作太后詔令六安侯劉旴去婦娶穆女事聞帝大怒乃盡免穆等官諸竇為郎吏者皆遣歸故郡留融京師㑹融病薨諡曰戴侯穆居大第富於財天子使謁者監䕶其家欲以全之居數年穆父子自以失勢出怨言使者奏焉乃遣歸故郡坐賂遺小吏為郡所考穆及勲皆死獄中詔融夫人與一孫還洛陽固有才能世祖時貴顯用事及穆得罪固亦廢于家東平王蒼以輔政乆固請歸藩五年春二月詔曰東平王比上書願歸藩上将軍印綬謙讓日聞至誠懇惻盖君子成人之美今其聴焉以驃騎長史為東平王太傅掾吏為中大夫令史為王家郎勿上将軍印綬蒼體貌長大進止有禮好古多聞儒雅有識度上嘗問蒼在家何者最為樂對曰為善最樂上嗟歎之冬十一月上幸鄴六年春正月沛王楚王濟南王東平王淮陽王琅邪王中山王東海王来朝廬江獲寳鼎納于太廟冬十一月行幸魯祠東海恭王沛王楚王濟南王東平王淮陽王琅邪王皆㑹於魯十二月還過陽城遣使者祠中岳太尉虞延為司徒延立朝正色多所匡弼陰氏憾延欲毁傷之使人告延與楚王英謀反延以英帝親以為不然不受其言後英事𤼵覺上切讓之七年春正月癸酉皇太后陰氏崩二月庚申葬光烈隂皇后徵東海相宋均為尚書令嘗有疑事上大怒召尚書郎執之諸尚書皆叩頭謝均獨正色曰夫忠臣守正敢有二心均雖死不易上聞而善之即舍之遷司隷校尉河南大守政化大行每疾百姓耆老皆為禱請旦夕至府問訊起居天子方欲以為相㑹有痼疾上召入自視其疾均見上流涕謝曰天罰有罪所苦浸篤不復奉望幄幄上甚傷之賜錢三十萬卒於家初上好用能吏卒多暴虐殘刻終皆毁敗均罷朝相與言曰今選舉不及幽隠側陋但得見長吏耳太始時京兆則趙廣漢尹翁歸蕭望之丞相則魏相黄霸此數公者治皆致平今二千石殊無此國家喜文法吏以足止姦也然文吏習為欺謾而亷吏清在一已無益百姓流亡盜賊所由而作也均自欲叩頭争之時未可改也乆将自苦之乃可言耳未及言遷為司隷校尉後上聞其言追而悲之均字叔庠南陽安衆人初為上蔡長誅鉏豪右姦猾震慄府下記禁葬不得過制均不行督郵以讓縣均曰夫送終踰制過之厚也國有不義之民而罰其過禮者恐非政治之先遷九江太守五日一聴事悉省掾吏閉督郵府内令與諸曹分休屬縣無事百姓安業九江多虎數傷民先時常募吏民設檻餌捕之均曰夫虎豹在山黿鼉在淵物性之所託也江淮之間有猛獸猶北土之有雞豚也今數為民害咎在貪殘居職使然也而令吏捕虎非憂民之本也今務退貪殘進忠良去窞餌勿復課其後民𫝊言虎皆去東渡江北海王薨諡曰静王後漢紀卷九欽定四庫全書後漢紀卷十晉袁宏撰孝明皇帝紀
