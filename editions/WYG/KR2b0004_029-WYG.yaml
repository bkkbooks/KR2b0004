front:
  text: 第二十九建安元年春二月執金吾伏完為輔國將軍開府如三公是時董承張陽欲天子還洛陽楊奉李樂不欲尚書上官洪言還洛之議李樂斬洪由是諸將錯亂更相疑貳董承奔野王韓暹屯聞喜胡才楊奉之塢鄉欲攻韓暹上使人喻止之夏五月丙寅遣使至楊奉李樂韓暹營求送至洛陽奉等從詔六月乙未車駕幸聞喜楊奉胡才悔令乗輿去乃與李樂議欲還大駕詐言當遊澠池東以避匈奴上不從庚子車駕從北道出傍山而東無匈奴寇李樂媿其言懼而辭還是時糧食乏盡張陽自野王迎乗輿賑給百官丙辰行至洛陽幸故常侍趙忠宅張陽治繕宫殿丁丑大赦天下是月孫策入會稽太守王朗與策戰敗績八月辛丑天子入南宫陽安名陽以為己功故因以名陽謂諸將曰天子當與天下共之幸有公卿大臣陽當扞外難何事京都遂還野王楊奉赤屯梁癸夘張陽為大司馬楊奉為車騎將軍韓暹為大將軍領司𨽻校尉皆假節鉞是時州郡各擁兵自為莫有至者百官窮困朝不及夕尚書已下自出采樵或餓死牆壁間為吏兵所殺暹等各矜其功任意恣睢干亂政事於是曹操議欲迎乗輿或曰山東未定韓暹楊奉親與天子還京北連張陽未可䘚制司馬荀彧勸之曰昔髙祖東征為義帝縞素而天下歸心自天子播越將軍首唱義兵徒以山東擾亂未能逺赴闗右然猶分遣將帥䝉險通使雖禦難於外乃心無不在王室是將軍匡天下之素志也今車駕旋軫義士有存本之思百姓懷感舊之哀誠因此時奉主上以從民望大義也下雖有逆節必不能為累明矣韓暹楊奉其敢為害若不時定四方生心後雖慮之無能及也操從之辛夘操詣關貢獻廩公卿以下操陳韓暹張陽之罪暹怖單騎奔走上以暹陽有翼駕還洛之功一切勿罪於是誅羽林郎侯祈尚書馮碩侍中壼崇討有罪也封衞將軍董承輔國將軍伏完侍中种輯尚書僕射鍾繇尚書郭浦御史中丞董芬彭城相劉艾左馮翊韓斌東郡太守楊衆議郎羅邵伏徳趙蕤為列侯賞有功也追贈射聲校尉沮儁為𢎞農太守矜死節也符節令董昭説曹操曰將軍興義兵以誅暴亂朝天子輔翼王室此五伯之功也已下諸將人人殊異未必服從今留匡弼事勢不便唯有移車駕幸許耳然朝廷播越新還舊都逺近企望冀一獲安今復徙車駕不厭衆心夫行非常之事乃有非常之功願將軍策其多者操曰此孤之本志也遂言幸許之計上從之庚申車駕東楊奉自梁欲要車駕不及己巳車駕到許幸東營甲戌鎮東將軍曹操為大將軍更封武平侯操固讓不許太尉楊彪司空張喜以疾遜位冬十月戊辰右將軍袁紹為太尉紹恥班在操下不肯受操乃辭大將軍丙戌以操為司空領車騎將軍辛夘曹操征楊奉於梁奉奔袁術吕布襲徐州劉備奔曹操初陳郡人袁渙為劉備茂才避地江淮之間為吕布所拘布令渙作書罵辱備涣曰不可再三強之不許布大怒以兵脅之曰為之則生不為則死涣顔色不變笑而應曰渙聞唯徳可以辱人不聞以罵使彼固君子也且不恥將軍之言彼誠小人也將復將軍之意則辱在此不在於彼且渙他日之事劉備猶今日之事將軍也如一旦去此復罵辱將軍可乎布慙而止渙字曜卿司徒滂之子也渙少與弟㣲俱以徳行稱是時漢室衰㣲天下將亂渙與㣲閒居從容謀安身避亂之地渙慨然歎曰漢室陵遲亂無日矣茍天下不靖逃將安之若天將喪道民以義存唯強而有禮可以庇身乎㣲曰古人有言知幾其神乎見幾而作君子所以元吉也天理盛衰漢其已矣夫有大功必有大事此又君子之所深識退藏於密者也且兵革之興外患衆矣㣲將逺蹈山海以求免乎天下殽亂各行其所志㣲避地至交州涣展轉劉備袁術吕布之間晩乃遇曹公涣説操曰夫兵者凶器也不得已而用之鼓之以道徳征之以仁義兼撫其民而除其害夫然故可與之死可與之生自大亂以來十數年矣民之欲安甚於倒縣然而暴亂未息者何也豈政失其道歟伏聞明君善於救世亂則濟之以義偽則鎮之以樸世異事變治國不同不可不察也夫制度損益此古今之不必同者也若夫惠愛天下而反之於正雖以武平禍亂而濟之以徳誠百王不易之道也公明哲超世古之所以得其民者公既勤之矣今所以失其民者公既戒之矣海内賴公得免於危亡之禍然而民未知義唯公所訓之則天下幸甚操重涣言以為軍諮祭酒涣常謂人曰夫居兵亂之間非吾所長每讓不敢處也張濟自關中走南陽為飛矢所中死從子繡領其衆屯宛天子既免張陽賈詡去李傕託於段煨頃之復歸張繡二年春正月曹操征張繡繡降其季父濟妻國色也操以為妾繡由是謀叛襲操七軍大破之殺其二子自曹操之迎乗輿也袁紹内懷不服紹既兼河朔天子畏其強操方東憂吕布南距張繡及繡敗操軍紹益自驕而與操書悖慢操大怒動止變於常衆皆以為失利於繡故也僕射鍾繇以問尚書令荀彧彧曰公以明哲必不追咎往事也殆有他慮乎遂見操以問焉操以紹書示之且曰今將征不義而力不敵如何彧對曰古之成敗誠有其材雖弱必強茍非其人其強易弱劉項之事足以觀矣今與公爭天下者唯袁紹紹貌外寛内忌任人而疑其心公明達不拘唯材所宜不問疎賤此度勝也紹遲重少決失在後機公能斷大事應變有方此謀勝也紹御軍寛緩法令不一士卒雖衆而實難用公法令嚴明賞罰必行士卒雖寡皆爭致死此武勝也紹憑世資從容飾智収名譽故士之寡能好聞者歸之公以至仁待士又推誠心不為虚美行己謙恭儉約而與有功者無吝故忠正殺身之士咸願為用此德勝也夫以此四勝仗義征伐誰敢不從紹以四失背忠自專強何能為操悦秋七月即拜太尉袁紹為大將軍於是馬日磾喪還京師將欲加禮少府孔融議曰日磾以上公之尊秉旄節之使銜命直指寧輯東夏而曲媚賊臣為所牽率章表署用輒使首名附下罔上姦以事君昔國佐當晉軍而不撓宜僚臨白刃而正色王室大臣不得以見脅為辭鄭人討幽公之亂斲子家之棺聖人哀矜未忍追治不宜加禮冬十月謁者僕射裵茂督三輔諸軍討李傕也三年春正月破傕斬之夷三族郭汜為其將伍習所殺李樂病死胡才為怨家所殺張陽為其將眭固所殺馬騰韓遂涼州自相攻擊五月韓暹楊奉死秋七月曹操征張繡破之荀彧説曹操曰不先取吕布河北未易圖也操曰若袁紹侵擾關中西羌南誘蜀漢是我獨以兖州抗天下五分之一也為之柰何彧曰關中將帥以十數莫能久相一唯韓遂馬騰最強彼見山東之敗必各擁衆自保全若撫以恩徳使連和相推雖不能久要公定山東足以不動鍾繇可屬以西事公無憂也操從之九月􅔟操征吕布是歲袁術自立為天子術與楊彪婚親也操忌彪忠正收彪付獄將殺之孔融聞之不及朝服往見操曰楊彪累世清徳四葉重光周書父子兄弟罪不相及況袁氏之罪乎易稱積善餘慶但欺人耳操曰國家之意也融曰假使成王欲殺召公則周公可得言不知邪今天下纓緌搢紳之士所以仰瞻明公者以輔相漢室舉直措枉致之雍熙也今横殺無辜則海内觀聽誰不解體孔融魯國之男子明日便當拂衣而去不復朝也操意解乃免彪彪覩漢祚將㣲自以累世公輔恥事異姓遂稱疾不行徵鄭𤣥為大司農不至𤣥字康成北海髙密人也為嗇夫隱恤孤苦閭里安之家貧雖得休假常詣校官誦經太守杜密異之為除吏録使得極學𤣥之右扶風事南郡太守馬融融門徒甚盛弟子以次相授至三年不得見𤣥講習彌篤晝夜不倦融見奇之引與相見自篇籍之奥無不精研歎曰詩書禮樂皆以東矣㑹黨事起而𤣥教授不輟弟子數百人中平初悉解禁固𤣥已六十餘矣始為王公辟命一無所就者𤣥身長八尺秀睂朗目造次顚沛非禮不動黄巾賊數萬人經𤣥廬皆為之拜髙密一縣不被抄掠袁紹嘗遇𤣥而不禮也趙融聞之曰賢人者君子之望也不禮賢是失君子之望夫有為之君不失萬民之歡心況於君子乎失君子之望難乎有為也四年春􅔟操獲吕布斬之二月司空􅔟操讓位於太僕趙岐不聽三月衞將軍董承為車騎將軍封操三千户討吕布之功也固讓不受三月袁紹討公孫瓚六月拜孫䇿為㑹稽太守討逆將軍封呉陽侯初彭城人張昭避亂淮南策賓禮之及策東略遂為之謀主聞袁術僭號昭為策書諫術曰昔者董卓無道陵虐王室禍加太后暴及𢎞農天子播越宗廟焚毁是以豪傑發憤赫然俱起元惡既斃幼主東顧乃使王人奉命宣明朝恩偃武修文與之更始而河北異謀黑山不順劉表僭亂於南公孫叛逆於北劉繇阻兵劉備爭盟是以未獲承命櫜弓戢戈也常謂使君與國同規舍是不卹睆然有自取之志懼非海内企望之意昔湯伐桀稱有夏多罪武王伐紂曰殷有重罰此二王者雖有聖徳假使時無失道之過何由逼而取之也今主上豈有惡於天下徒以幼小脅於僭臣異於湯武之時也又聞幼主明智聦敏有夙成之徳天下雖未被恩咸以歸心焉若輔而興之旦奭之美率土之所望也使君五世相承為漢宰輔榮寵之盛莫與為比宜效忠守節以報漢室世人多惑圖緯之言妄牽非類之文茍以悦主為美不顧大義成敗之計古今所慎也忠言逆耳駁議致憎茍有益於使君則無所敢辭術始自以為有淮南之衆料䇿之必與己合及得其書遂愁沮發疾袁紹自破公孫瓚貢御希慢私使主簿耿苞宻白曰赤徳運衰厯數將改宜順天意以應民望紹以苞白事咨於軍府議者咸以苞為妖妄宜誅紹殺苞以恱衆然遂有逆謀於是紹將南出師以攻曹操沮授田豐諫曰師出歴年百姓疲弊倉庫無積賦役方殷此國之深憂也宜遣使獻㨗天子務農逸民若不得通乃表曹操隔我王路然後進屯黎陽漸營河南益作船舫繕治器械分遣精騎抄掠邉鄙令彼不得安我取其逸三年之中事可坐定也審配郭圖曰兵書之法十圍五攻敵則能克今以明公之神武跨河朔之人衆以伐曹氏譬若覆手今不時取後難圖也授曰蓋救亂誅暴謂之義兵恃衆憑強謂之驕兵兵義無敵驕者先滅曹氏迎天子建宫許都今興師南向於義則違且廟勝之䇿不在強弱曹氏法令既行士卒精鍊非公孫瓚坐而受圍者也今棄萬安之術而興無名之兵竊為公危之圖曰武王伐紂不為不義况伐曹師而云無名且公師武臣勇將士憤怒人思自騁而不及時早定大業慮之失者夫天與不取反受其咎此越之所以霸呉之所以亡也監軍之計蓋非見時知機之䇿紹從之圖等因是譖授曰授監統内外威震三軍若其浸盛何以制之夫臣與主同者昌主與臣同者亡黄石之所忌也且御衆於外不宜知内紹疑焉乃分監軍為三都督使授及郭圖淳于瓊各典一軍遂南冬十一月張繡賈詡降曹操十二月甲辰司𨽻校尉鍾繇持節鎮撫關中庚辰曹操率師拒袁紹於官渡孔融謂荀彧曰紹地廣兵強田豐許攸智計之士也為之謀審配逢紀盡忠之臣也任其事顔良文醜勇冠三軍統其兵殆難克乎彧曰紹兵雖強而法不整田豐剛而犯上許攸貪而不治審配專而無謀逢紀果而自用此二人留知後事若攸犯法必不能宥也不宥攸必為變顔良文醜一夫之勇耳可一戰而擒也袁術欲北至青州曹操使劉備要擊之㑹術病死操悔遣備追之不及備遂據下邳五年春正月壬午車騎將軍董承偏將軍王服謀殺曹操發覺伏誅初承與劉備同謀未發而備出謂服曰郭汜有數百兵壞李傕數萬人但足下與吾同不耳昔吕不韋之門須子楚而後髙今吾與子猶是也服惶恐不敢當曰兵少奈何承曰第興事奪得曹公兵何憂不足耶服曰今京師豈有可任者乎承曰長水校尉种輯議郎呉碩是吾腹心辦事者輯碩皆被誅曹操攻劉備備奔袁紹二月紹遣沮授郭圖淳于瓊顔良等攻劉延於白馬紹引兵至黎陽沮授臨發㑹其宗族散貲財以與之曰夫勢存則威無不行勢亡則不保一身哀哉其弟宗曰曹公士馬不敵兄何懼焉授曰以曹兖州之明略又挾天子為資我雖克伯珪衆實疲敝而主驕將汰軍之破敗在此舉矣揚雄有言曰六國蚩蚩為嬴弱姬今之謂矣夏四月曹操救劉延大戰斬顔良秋七月辛巳立皇子馮為南陽王壬午南陽王薨八月袁紹將濟河沮授諫曰勝負變化不可不詳今宜留屯延津分兵官渡若剋獲還迎不晩設其有難衆不可還紹不從授臨濟歎曰上盈其志下務其功悠悠黄河吾其濟乎遂以疾辭紹恨之乃省其所部并屬郭圖遂軍官渡紹衆盛操軍大懼與荀彧書議欲還許以引紹彧報曰紹聚官渡欲與決勝負公以至弱當至強若不制必為所乗是天下之大機也且紹布衣之雄能聚人而不能用也以公神武明哲而奉以大順何向而不濟今軍食雖少未若楚漢在滎陽成皋間也是時劉項莫肯先退先退者勢屈也公以十分居一之衆畫地而守之扼其喉而不能進已半年矣情見勢竭必將有變此用奇之時不可失也操從之劉備去袁紹南奔汝南九月庚子朔日有蝕之詔公卿各上封事靡有所諱袁曹相持於官渡孫策欲襲許迎乗輿部署未發為許貢客所害先是呉郡太守許貢為策所殺其小子與客謀報曰孫策勇鋭若多殺人於道策必自出則可擒也客從之乃殺人於江邊策聞之怒單騎自出客刺傷之將死謂張昭曰中國亂以呉越之衆三江之固足可觀成敗公等善輔吾弟呼權佩以印綬曰舉江東之衆决機於兩陣之間與天下争衡卿不如我任賢使能各盡其力以保江東我不如卿初策在呉與張昭論曰今四海未定當以武平之耳呉人陸績年少在坐末大聲言曰昔管夷吾相齊桓公九合諸侯一匡天下不用兵車孔子曰逺人不服則修文徳以來之今諸君不務道徳懷取之術而唯尚武績雖童䝉竊所未安也昭等異焉績容貌雄壯博學多識星厯算數無不該覽及權綂事奏辟曹掾以直道見憚出為鬱林太守加偏將軍績意在儒雅非其志也雖在軍旅著述不廢作渾天圖注易釋𤣥皆傳於世預自知亡日乃為辭曰有漢士人吳郡陸績幼敦詩書長翫禮易受命南征遘疾逼厄遭命不永嗚呼悲隔又曰從今已去六十年之外車同軌書同文恨不及見也十一月甲子曹操與袁紹戰於官渡紹師大潰沮授為操軍人所執授大呼曰授不降也為所執耳操與之有舊逆謂之曰分野殊異遂用阻絶不圖今日乃相擒也授對曰兾州失策以取奔北授智力俱困宜其見擒操曰本初無謀不相用計今喪亂過紀國家未定當相與圖之授曰叔父母弟懸命袁氏若䝉公靈速死為福操歎曰孤早相得天下不足慮也遂舍而厚遇之頃之謀歸袁氏操殺之六年春三月曹操以袁紹新敗欲悉軍以征劉表以問尚書令荀彧彧曰今紹之敗其衆離心宜因而定之而欲逺背兖豫南軍江漢夫困獸猶鬬况在紹乎若紹収其遺燼承虗以出則公之事去矣四月曹操將兵於河上八月辛夘侍中郗慮尚書令荀彧司𨽻鍾繇侍講于内冬十一月曹操征劉備備奔劉表屯新野七年夏五月庚戌袁紹發病死初紹有三子譚熈尚譚長而惠尚少而美紹妻愛尚數稱其才紹以奇其貌欲以為後乃出譚為青州刺史沮授諫曰世稱一兎走衢萬人逐之一人獲之貪者悉止分定故也且年均以賢徳均則卜古之制也願上推前代成敗之誡下思逐兎分定之義紹曰孤欲令三子各據一州以觀其能授出曰禍其始此矣及紹未命而死其别駕審配䕶軍逢紀宿以驕侈為譚所疾於是紀外順紹妻内慮私害乃矯言遺命奉尚為嗣譚至不得立自稱車騎將軍由是有隙譚軍黎陽九月曹操征譚尚越巂男子化為婦人周羣曰將有易代之事八年春操破譚尚秋七月曹操上言守尚書令荀彧自在臣營叅同計畫周旋征伐每皆尅捷竒策宻謀悉皆共决及彧在臺常私書徃來大小同策詩美腹心傳貴廟勝勲業之定彧之功也而臣前後獨荷異寵心所不安彧與臣事通功並宜進封賞以勸後進者於是封彧為萬歲亭侯八月曹操征劉表軍次西平譚尚争兾州九月公卿迎氣北郊始用八佾冬十月曹操至黎陽九年夏四月操㧞邯鄲秋八月曹操破鄴袁尚袁熈奔奴辛巳封蕭何後為安衆侯九月太中大夫孔融上書曰臣聞先王分九圻以近及逺春秋内諸夏而外夷狄詩云邦畿千里惟民所止故曰天子之居必以衆大言之周室既衰六國力征授賂强秦割裂諸夏鎬京之制商邑之度歴載彌久遂以闇昧秦兼天下政不遵舊革剗五等掃滅侯甸築城萬里濱海立門欲以六合為一區五服為一家關衛不設家庭臨海遂使陳項作難擊柝不救聖漢因循未之匡改猶依古法潁川南陽陳留上黨三河近郡不封爵諸侯臣愚以為千里國内可略從周官六鄉六遂之文分取北郡皆令屬司𨽻校尉正以王賦以崇帝室役自近以寛逺華夏貢獻外薄四海揆文奮武各有典書帝從之戊辰以司空曹操領兾州牧或説操曰宜復古制置九州則所制者廣大天下服矣操將從之荀彧言於操曰兾州求公領牧以要民心甚善至於分改九州竊有疑焉若是兾州當取河東馮翊扶風西河并幽之地所奪者衆前日公破袁尚擒審配海内震駭人人自恐不保其土地守其兵衆也今便分屬兾州將皆動心且人多説關右將士以動心之計今聞此必以為次第見奪一旦生變有善守者轉相脅為非則袁尚得寛其死而袁譚懷貳劉表遂保江漢之間天下未易圖也願公引兵先定河北然後修復舊京南臨荆州黄王貢之不入則天下咸知其意人人自安天下大定乃議古制操曰㣲足下失之者多矣遂寢九州之議十月有星孛於東井分涼州四郡為梁州十年春正月曹操攻袁譚於南皮大破斬之丁丑増封操萬三千户平幽兾之功也八月侍中荀悦撰政治得失名曰申鑑既成而奏之曰夫道之本仁義而已五典以經之羣籍以緯之詠之歌之絃之舞之前監既明後復申之致治之術先屏四患乃崇五政一曰偽二曰私三曰放四曰奢偽亂俗私壞法放越軌奢敗制四者不除則政末由行矣其致也俗亂則道荒雖天地不得保其性也法壞則世傾雖人主不得守其度也軌越則禮亡雖聖人不得全其道矣制敗則欲肆雖四表不能充其求矣是謂四患修農桑以飬其生審好惡以正其俗宣文教以章其化立武備以秉其威明賞罰以統其法是謂五政民不畏死不可懼以罪人不樂生不可勸以善雖使契布五教咎繇作士政不行矣故在上者先豐民財以定其志帝耕籍田后桑蠶宫國無遊民野無荒業財不虚用力不妄加以周民事是謂養生君子之所以動天地感神明正萬物而成至治者必乎真實而已故在上者審定好惡好惡既定乎功罪毁譽亦終於凖騐聽言責事舉名察實無或作詐偽淫巧以蕩衆心故事無不核物無不切善無不顯惡無不彰俗無姦詐民無淫風百姓上下覩利害之存乎已也故肅敬其心内不囘惑外無異望則民志平矣是謂正俗君子以情用小人以刑用榮辱者賞罰之精華也故禮教榮辱以加君子化其情也桎梏鞭扑以加小人治其刑也君子不犯辱況於刑乎小人不忌刑況於辱乎若其在中人之倫則禮刑兼焉教化之廢推中人而墮於小人之域教行之行引中人而納於君子之塗是謂章化小人之情緩則驕驕則怠怠則怨怨則叛危則謀亂安則思欲非威強無以懲之故在上者必有武備以戒不虞以遏宼虐安居則寄之内政有事則用之軍旅是謂秉威賞罰政之柄也賞明罰審信順令行賞以勸善罰以懲惡人主不妄賞非徒愛其財也賞妄行則善不勸矣不妄罰非徒矜其人也罰妄行則惡不懲矣賞不勸謂之止善罰不懲謂之縱惡在上者能不止下為善不縱下為惡則國法立矣是謂統法四患既蠲五政既立行之以誠守之以固簡而不怠疎而不失無為為之使自施之無事事之使自安之不肅而成不嚴而治垂拱揖讓而海内平矣古者天子諸侯有事必告於廟廟有二史左史記言右史記事事為春秋言為尚書君舉必記善惡成敗無不存焉下及士庶茍有茂異咸在載籍或有欲顯而不得欲隱而名彰得失一朝榮辱千載善人勸焉淫人懼焉可備史官掌其典常上覽而善焉悦字仲豫潁川人也少有才理兼綜儒史是時曹公專政天子端拱而已上既好文章頗有才思以漢書為繁使悦刪取其要為漢紀三十篇冬十一月并州刺史髙幹反十一年正月有星孛于北斗占曰人主易位曹操征髙幹斬之己丑增封操并前三萬户食柘城陽夏四縣比鄧禹呉漢故事秋七月武威太守張猛殺涼州刺史商邯
