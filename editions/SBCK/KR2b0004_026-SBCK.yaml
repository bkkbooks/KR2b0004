front:
  text: 後漢紀孝獻皇帝卷第二十六􅀽宏初平元年春正月辛亥大赦天下侍中周毖城門校尉伍瓊說董卓曰夫廢立事大非常人所及􅀽紹不逹大體恐懼出奔非有他志也今購之急勢必爲變􅀽氏樹恩四世門生故吏徧於天下􅀂收豪傑以聚徒衆英雄因之而起山東非公之有也不如赦之拜一郡守則紹喜於免罪必無患矣卓以爲然乃以紹爲渤海太守癸丑卓殺弘農王卓使郞中令王儒進酖於王曰服藥可以辟惡王曰我無疾是欲殺我爾不肯強之於是王與唐􅁎及宫人飲藥王自歌曰天道易􅀆運何艱棄萬乗􅀆退守藩逆臣見迫兮命不延逝將去汝兮徃幽玄唐􅁎起舞歌曰皇天崩兮后土頽身爲帝王兮命夭摧死生異路兮從此乖悼我焭獨兮心中哀因泣下坐者皆悲王謂唐􅁎曰卿故王者妃勢不爲吏民妻矣自愛從此與卿辭遂飲藥而死帝聞之降坐盡哀是時兾州刺史韓馥豫州刺史孔伷兖州刺史劉岱陳留太守張邈渤海太守袁紹東海太守喬􅈘山陽太守袁遺河南太守王匡濟北相鮑信後將軍􅀽術議郞曹操等並興義兵將以誅卓衆各數萬人推紹爲盟主紹自號車􅀐將軍操行奮武將軍長沙太守孫堅亦起兵誅卓比至南陽衆數萬人卓以堅爲破虜將軍兾其和弭堅討卓逾壯進屯陽人卓大怒遣胡軫呂布擊堅戰于建平堅大破之卓以山東兵盛欲徙都關中召公卿議曰高祖都關中十一世後漢中興東都洛陽從光武至今復十二世案石苞室䜟宜復還都長安百官無敢應者司徒楊彪曰遷都改制天下大事皆當因民之心隨時之宜昔盤庚五遷殷民胥怨故作三篇以曉諭之徃者王莽篡逆變亂五常更始赤眉之變焚燒長安殘害百姓民人流亡百無一存光武受命更都洛陽此其宜也方今建立聖主光隆漢祚而無故捐宗廟宫殿棄先帝園陵百姓驚愕不解此意必糜沸螘聚以致擾亂石苞室䜟妖邪之書豈可信用卓作色曰楊公欲沮國家計邪關東黃巾作亂所在賊起長安崤函險固國之重防又隴右取材木功夫不難杜陵南山下有孝武帝故陶作甎處一朝一夕可辦宫室官府盍何足言百姓小人何足與議􅀂有前却以我大兵驅之豈得自在百寮皆失色太尉黄琬曰此大事楊公語得無可思乎司空荀爽曰相國豈樂遷都邪今山東兵起非可一日禁也而關西尚靜故當遷之以圖秦漢之勢也堅爭不止禍必有所歸吾不爲也卓使有司奏免二公二月丁亥太尉黃琬司徒楊彪䇿罷初卓用伍􅌦周毖之議選天下名士馥等旣出皆舉兵圖卓卓以􅌦毖賣巳心怒之及議西遷􅌦毖固諫卓大怒曰君言當抜用善士卓從二君計不敢違天下心諸君到官舉兵相圖卓何相􅀒遂斬瓊毖彪琬恐懼詣卓謝曰因小人戀舊非欲沮國事也請以不及爲受罪卓不勝當時之忿旣殺􅌦毖旋亦悔之故表彪琬爲光禄大夫卓以河南尹朱儁爲太僕以爲已副儁不肯受因進曰國不宜遷必􅀌天下望成山東之釁臣不見其可也有司曰召見君受拜而君拒之不問徙事而君陳之何也儁曰副相國至重非臣所堪遷都非計臣之所急也辭所不堪進其所急臣之宜也有司曰遷都之事初無此計也就有未露何所受聞儁曰相國董卓具爲臣說有司不能屈於是朝之大臣及尚書郞華歆等皆稱焉由是止不副卓卓愈恨之懼必爲卓所䧟乃奔荆州光禄勲趙謙爲太僕王允爲司徒守尚書令丁亥天子遷都長安卓留屯洛陽盡焚宮室徙民長安壬辰白虹貫日三月己巳車駕至長安遭赤眉之亂宮室焚盡唯有高廟京兆府舍遂就都焉戊午卓殺太傅􅀽隗及其三子是時􅀽紹屯河内陳留太守張邈兖州刺史劉岱東郡太守喬􅈘山陽太守􅀽遺屯酸􅀥後將軍􅀽術屯南陽豫州刺史韓馥大會酸􅀥將盟諸州郡更相推讓莫有肯先當廣陵功曹臧洪升壇操血曰漢室不幸王綱失統賊臣董卓乗釁縱害禍加至
