body:
  text: 後漢孝殤皇帝紀卷第十五􅀽宏延平元年春正月癸卯光禄勲梁鮪爲司徒三月甲申葬孝和皇帝于順陵初是周馮貴人歸園太后詔曰朕與貴人託配后庭十有餘年上天不弔先帝早棄天下􅀌心焭焭無所瞻仰貴人當以舊歸典分園外相戀之情感增悲歎燕燕之詩曷能喻焉其賜貴人青蓋車驂馬各一黃金四十斤雜綵三千匹初和帝宫人吉成成御者志恨成乃爲桐人書太后姓字埋之事下掖庭考驗皆以吉成所爲太后獨念吉成我待之有恩雖下賤猶人託頼上在時甞未聞有惡言今我遇過於平常何縁生此不合人情即自呼見反覆實劾果其御者所爲夏四月虎賁中郞將鄧隲爲車􅀐將軍初隲與同郡􅀽良爲布衣之交及隲當路欲延良共議世事良謝而絕之司空陳寵薨寵字昭公沛國佼人也曾祖父咸成哀間以律令爲尚書常誡子曰爲人議法當依於輕雖有百金之利愼無案人也王莽之誅何武鮑宣咸乃歎曰易稱君子見機而作不俟終日吾可逝矣即乞骸骨莽簒位召咸爲掌㓂大夫謝病不肯􅀿時咸三子皆在位乃悉令去官父子相與歸田歛家中律令文書壁藏之寵父躬復以律令爲廷尉監寵少習家法辟太尉鮑昱府是時三府􅁺屬以不肯親事爲高專務交游寵甞以事君之義當供所職以佐政治何得但出入養虚故獨勤心於事數爲昱陳當世治化昱髙其能使掌天下獄訟所平決無不壓伏寵以律訟多錯不良吏得生因縁致重乃爲撰科條辭訟比例使事􅀋相從以塞姦源其後公府奉以爲法寵雖傳文法然兼通經籍奏議温􅃉號爲名相子忠字伯傳家業才能甚有聲譽五月辛卯大赦天下壬辰河東􅁪山崩六月丁未太常尹勤爲司空詔曰自夏巳來隂雨過節思惟􅄽失深自克責新遭大憂接以未和徹膳擯服庶有益焉其減太官上方諸服御靡麗難成之物丁卯詔免掖庭宮人六百餘人皆爲庶人尚敏上疏陳興廣學校曰臣聞五經所以治學爲人三經不修世道陵遲學校不弘則人名行不廣故秦以坑儒而滅漢以崇學而興以苟羅天下絕理隂陽彌綸治道而示民軌則也光武中興修膳太學博士得其五人五經各叙其義故能化澤沾洽天下和平自頃以來五經頗廢後進之士趣於交俗􅀫儒舊學無與傳業是俗吏繁熾儒生寡少其在京師不務經學競於人事爭於貨賄太學之中不聞談論之聲從横之下不覩講說之士臣恐五經六藝浸以陵遲儒林學肆於是廢失所以制御四夷者以有道德仁義也傳曰王者之臣其實師也言其道德可師也今百官伐閱皆以通經爲名無一人能稱孔子曰無而爲有虚而爲盈難乎有恒矣自今官人宜令取經學者公府孝廉皆應詔則人心專一風化可淳也於是詔曰易稱天垂象聖人則之又云聖人之情見於辭然則文章之作將以幽讃神明變暢萬物秦燔詩書禮毀樂崩大漢之興拾而弘之至乎元康五鳳之間英豪四集文章煥炳六經之學于斯爲盛自頃巳來學者怠惰遂以陵遲宜令公卿中二千石各舉隱逸大儒碩德高操以勸後進初陳留李充三徵不至由是徵充爲博士俄遷侍中軍騎將軍鄧隲屈巳禮之甞設酒饌請充及朝大夫酒酣隲曰幸得託椒房位上將幕府初開欲延天下英俊君其未聞充曰將軍誠能招延俊乂以光本朝不爲難矣但患不爲耳因說海内隱士頗不合隲舉䏑充曰君宜及温食之充受䏑擲地曰說士之樂甘於啖䏑遂拂衣而出侍中張孟諫曰聞足下面折鄧將軍以護言責之過矣非所以光祚子孫誠不爲足下取此充曰大丈夫居世貴行其志耳我躬不閱遑恤我後何能爲子孫計由是不爲權貴所容遷左中郞將年八十三後爲三老五更天子賜机杖訪以國政秋七月辛亥帝崩崇德殿初淸河王慶子祐生而有神光赤虵之異年十歲善史書喜經傳和帝甚器之號日請賞賜恩寵異於諸子和帝崩殤帝在抱太后詔留清河邸以爲儲副及殤帝崩羣臣皆爲屬意平原王勝太后以前不立勝恐爲患與車騎將軍隲虎賁中郞將悝等定策禁中其夜使持節以靑車蓋以迎祐於淸河邸癸丑立爲長安侯太后詔曰先帝聖德淑茂早棄天下朕撫育幼帝日月有望遭家不造仍罹凶禍朕惟平原王素被錮疾念宗廟之重思繼嗣之統長安侯祐稟性忠孝小心翼翼年巳十三嶷然有成人之體禮昆弟之子猶子也其以祐爲孝和皇帝嗣即皇帝位自延平初鄧隲兄弟常在禁中至是乃就第丙寅葬孝殤皇帝于康陵巳亥隕石於陳留冬西域諸國反都護任上尚書求救遣騎都尉班雄校尉梁慬將五千人出塞㑹尚自䟽勒還與慬共保􅀛兹温􅀫姑墨二國將數萬人圍慬月餘慬擊破之斬首數萬級道不通慬遂留􅀛兹初西域自武帝時始通三十大國其俗頗率著城郭田畜地在匈奴之西烏孫之南北有太山中央有河東西六十餘里東則接漢阨以玉門陽關出西域有兩道從鄯善傍南山北渡河西行至莎車爲南道南道西逾葱嶺則出大月氏安息車師前王庭隨北山陂河西行至疎勒爲北道北道西逾葱嶺則出大宛康奄蔡焉耆匈奴強盛常屬伇匈奴宣帝神雀中漢置西域都護王莽時數遣五威德軍出西域覃師諸國貧困由是故叛而諸都護李宗抄􅁀南道攻其國號以踈勒爲世善姑墨爲積善或易置王侯於是西域與中國遂絕和帝永元中西域都護班超遣􅁺甘英臨大海而還具言葱嶺西諸國地形風俗而班勇亦見記其事或與前史然近以審矣自燉煌西出玉門陽關渉鄯善通伊吾五千里自伊吾通車師前部高昌壁北通後部五百里是匈奴西域之門也伊吾地宜五穀桑麻蒲萄其北有柳中皆膏􅃾之地故與匈奴爭車師伊吾虚之地以制西域故自鄯善國治驩泥城去洛陽七千一百里北通車師前後王及車且彌旱陸蒲􅀋條支是爲車師六國北與匈奴接前部西通􅂄北道後部西通烏孫漢欲隔絕西域匈奴必得車師屯田伊吾焉耆治河南城去洛陽八千二百里東南與山離國接其餘危須尉黎􅀛兹姑墨温􅀫踈勒休修大宛康居大月氏安息大秦烏弋罽賔莎車于闐且彌諸國轉相通是秦爲西域大月城去洛陽萬六千三百七十里其東南數千里通天笁天笁一名身毒俗與月氏同臨大水西通大秦從月氏南至西海東至盤越國皆身毒地又有别城數十置王而皆揔名身毒氏俗修浮圖道不伐殺弱而畏戰本傳曰西域郭俗造浮圖本佛道故大國之衆内數萬小國千而終不相兼并及内屬之後漢之姦猾與無行好利者守其中至東京時作謀兹生轉相吞滅習俗不可不慎所以動之哉西域之遠者安息國也去洛陽二萬五千里北與康居南與烏弋山離相接其地方數百西至條支馬行六千日臨海暑熱卑温出師子犀牛犎牛孔雀卵大如瓮與西海接自安息西關西至阿蠻國三千四百里自阿蠻西至斯賔國渡河西南至于羅國有九百六十里安息西界極其南乘海乃通大秦或數月歲云大秦國一名黎軒在海西漢使皆自烏弋還莫能通條支者甘英踰懸度烏弋山離扺條支臨大海欲渡人謂英曰漢廣大水鹹苦不可食徃來者逢善風時三月而渡如風遲則三歲故入海者皆賫三歳粮海中善使人思土戀慕數有死亡者英聞之乃止具問其土風俗大秦地方數千四百餘城小國役屬者數千戶爲城郭别置郵亭皆堊墍之有松栢諸木百草民俗力田作種植樹􅅙桑國土髠頭而衣文繡乗輜軿白蓋山中出入擊皷有旌旗旛幟起宫室以水精爲柱及餘食器王所治城周環百餘里王有五宮各相去十里平旦至一宮聽事止􅀫明旦復至一宮五日一遍而復還常使一人持嚢隨王車民欲有言事者即以書投囊中王至宫散省分理其枉直各有官曹又置三十六相皆㑹乃議事王無常人國中有災異風不時節輒放去之而更求賢人以爲王者終無怨多金銀眞珠珊瑚琥魄琉璃金縷罽繡雜色綾塗布又有細布或言水羊毛野􅁞繭所作㑹諸香煎以爲蘇合凡外國諸珍異皆出焉以金銀錢十當金錢一與天笁安息交市於海中其利十倍其民質直市無二價穀食常賤國内富饒鄰國使到其界首者乗驛詣王都至則廩以金錢及安帝元初中日南塞外檀國獻幻人能變化吐火自支解又善跳丸能跳十丸其人曰我海西人則是大秦也自交州外塞檀國諸蠻夷相通也又有一道與益州塞外通大秦人皆麤長大平正􅀂中國人故云外國之大秦而其中國常自言是國一别其王常欲通使於漢奉貢獻而安息欲以漢繒綵與之交市故遮不得令通及桓帝建初中王安都遣使者奉獻象牙犀角瑇瑁始一通焉其長老或傳言其國西有弱水近日入所矣又云從安息陸道繞海北行出西至大海人相連屬十里一亭三十里一署終無盗賊驚而有猛虎師子遮食行者不有百餘人賫其器輒害之不得過又言旁國渡海飛橋數百里所出奇異玉石諸物多譎恠不經故不述云西南極矣山離還自條支東北通烏弋山離可百餘日行而烏弋山離罽賔莎車于寘寧彌諸國相接遠者去洛陽二萬一千里近者萬餘里焉十二月甲子清河王慶薨謚曰孝王慶善爲威容進止可觀自被廢黜常居愼密在宫省語不及外和帝爲太子與慶相親入則共室出則同輿及即位政之大小與慶議之慶逾益畏愼夙夜戰慄每當朝㑹輒服候且常謂左右曰我誠一國王車馬器物亦足巳矣内以論議外與說左右其一絕名此皆此􅀋也初宋貴人􅃁上無祠堂慶毎露祭未甞不流涕和殤二帝崩慶常居倚廬哭泣哀慟遂以發病病困謂舅宋衍曰清河上地下濕欲乞骸骨於貴人􅃁傍下棺而巳朝廷大恩猶當有屋宇子母并食魂靈不暴露死復何恨乃上書求葬於樊濯中貴人􅃁旁不聽慶將薨歎曰不惜死也但恨不見上爲貴人報讎耳因泣不能自勝左右皆流涕旣薨使司空持節護喪事賜龍旗九旒虎賁百人儀比東海恭王分淸河封慶小子爲廣川王後漢孝殤皇帝紀卷第十五
