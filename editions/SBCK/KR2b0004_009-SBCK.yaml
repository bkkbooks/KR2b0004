body:
  text: 後漢孝明皇帝紀上卷第九􅀽宏永平元年四月癸卯封故衛尉隂興子慶爲鯛陽侯博爲隱強侯楚王舅子許昌爲龍舒侯東海恭王彊建武二年立母郭氏爲后彊爲皇太子十七年而郭后廢彊常戚戚不自安數因左右及諸王陳其懇誠願備藩國光武不忍遲㢠者數歲乃許焉十九年封爲東海王二十八年就國帝以彊去就有禮故優以大封兼食魯郡合二十九縣賜虎賁旄頭宮設鐘鼓之懸擬於乗輿彊臨之國數上書讓還東海又因皇太子固辭帝不許深嘉歎之以彊書宣示公卿初魯共王好宮室起靈光殿甚壯麗是時猶存故詔彊都魯中元元年入朝徙封岱因留京師明年春帝崩冬歸國永平元年彊病顯宗遣中常侍鉤盾令將太醫乘驛視疾詔沛王輔濟南王康淮陽王延詣魯五月戊寅彊病因臨命終上䟽謝曰臣蒙恩得備藩輔特受二國榮寵巍巍無量訖無報稱自修不謹連年被病爲朝廷憂皇太后陛下慈愍惻至動發中心臣内省視氣力羸劣日夜􅐛劇終不望復見闕庭奉承帷幄辜􅀒重恩銜恨黃泉言之絕腸惟皇太后陛下加供養數進御食避風氣終始天道臣彊困劣言不能盡意願悉謝諸王不意長不復相見臣特蒙大恩兼大國政小人也猥當襲臣封非所以全利之也如皇太后陛下深爲規度誠願還東海以臣無男之故則處臣三女小國侯此臣夙夜之願也彊薨問至上與皇太后悲慟不自勝乃詔諸王京師親家皆詣東海奔䘮遣司空魴持節視䘮事賜旄頭鸞輅龍旗虎賁榮寵之盛無與爲比謚曰恭王詔東海傅相曰王謙恭好禮以德自終其葬送之具務從省約以彰王卓爾之美子政嗣淫慾無行故彊以爲言秋七月西羌破走餘種悉降徙三輔羌之先三苗之裔也其俗以父名母家姓爲號出十二世相與婚姻妻後母報㛐無鰥男寡婦故種􅀋繁息其爲兵長於山谷短於平地男子兵死有名且以爲吉病終謂之劣又以爲不祥婦人産乳丈夫被創不避霜雪得西方金氣焉夏后氏襄戎狄在邠岐之間殷襄周太王自邠之岐周㐮幽王爲西戎所滅故羌之爲患自三代然也􅀽宏曰夫民之性也各有所稟生其山川習其土風山川不同則剛柔異氣土風乖則楚夏殊音是以五方之民厥性不均阻險平易其俗亦異況乃殊􅀋絕域不賔之旅以其所禀受有異於人先王知其如此故分其内外阻以山川戎狄蠻夷即而序之夫中國者先王之桑梓也德禮陶鑄爲日久矣有一士一民不行先王之道必投之四裔以同殊􅀋今承而内之以亂大倫違天地之性錯聖人之化不亦弊乎昔伊川之祭其禮先亡識者觀之知其必戎況西羌北狄雜居華土嗚呼六夷之有中國其漸久矣八月戊子徙山陽王爲廣陵王是歲太傅鄧禹如畤侯耿弇薨謚禹曰元侯弇曰愍侯禹疾病天子親數問除二子爲郞分禹國封三子爲列侯禹内文明外温恭不事産業常欲避權勢有十三男各命通一經其閨門之訓皆可爲後世法長子震爲高密侯次襲爲昌安侯次爲車騎將軍坐出塞追叛胡下獄死第六子訓不好文學禹以此非之然好施愛士濟人之急士無貴賤見之如舊以謁者使外國爲烏九校尉徙杼秋侯股爲居巢侯楊州刺史詔以股口無擇言行無怨惡宜􅀩褒顯以勸天下乃徴股行執金吾事二年春正月辛未祀光武皇帝於明堂始服冕珮玉禮畢登雲臺觀雲物大赦天下自三代服章皆有典禮周衰而其制漸微至戰國時各爲靡麗之服秦有天下收而用之上以供至尊下以賜百官而先王服章於是殘毀矣漢初文學旣􅆙時亦草創輿服旗幟一承秦制故雖少改所用尚多至是天子依周官禮記制度官冕衣裳珮玉乗輿擬古式矣􅀽宏曰昔聖人興天下之大利除天下之大患躬親其事身履其勤使天下之民各安性命而無夭昏之災是以天下之民親而愛之敬而尊之夫親之者欲其閒敞平懌而無疾苦之患也故爲之宮室衛以垣墻重門擊柝以待􅁀客敬之者欲其崇高榮顯殊異於衆故爲之旗旌表以服章陛級懸絕不可得而逾也後之聖人知其如此自民之心而天下所欲爲故因而作制爲之節文始自衣裳至于車服棟宇垣牆各有品數明其制度盡其器用備物而不以爲奢適務而不以爲儉大典旣載陳于天下後嗣因循守其成法故上無異事下無移業先王之道也末世之主行其淫志耻基堂之不廣必壯大以開宮恨衣裳之不麗必美盛以修服崇屋而不厭其高玄黃而未盡其飾於是民力殫盡而天下咸怨所以弊也故有道之主覩先王之規矩察秦漢之失制作營務求厥中則人心恱固而國祚長世也二月甲子立皇后馬氏皇子坦爲皇太子賜天下男子爵各有差鰥寡􅀌獨不能自存者粟人五斛后馬援女也后有四兄二姊長兄廖及防光二姊與后同母兄客卿幼而奇嶷初援南定百越北征匈奴謀議之士集於門下客卿年六歲能應接諸公專對賔客嘗有死罪亡命者客􅀸逃匿之不令人知援甚奇器之以爲壯大必任將相故以秦時官號字焉援薨後客卿早死太夫人悲傷發疾恍惚昏亂后時年十歲幹治家事勑制僮僕昆弟親屬各得其宜諸家皆以爲太夫人所爲也後問之咸驚異焉嘗疾令􅁲者筮之曰此女當爲帝妃貴不可言久之太夫人亡珠直數萬錢問相者相者指一御婢此人盗之果如其言太夫人奇之乃令相諸女見后驚曰我必爲此女稱臣貴而少子太夫人曰得世無子乎相者曰有一子遽失得人子力愈於自生子也年十三以選入太子家接侍同列如承貴尊先人後已發於至誠由是見寵及有司奏立長秋宮太后曰馬貴人德冠後宮即其人也嘗從容問以政事后輒推心以對無不當意時後宮未有姙育者嘗言繼嗣當以位薦逹左右如恐不及其見寵者與之恩隆未嘗與侍御者私語其防閑愼微皆此􅀋也性不喜出入遊觀上時幸􅁐囿離宮輒諫諍辭意甚美上納焉誦易經習詩論語春秋略記大義聽言觀論摘發其要讀光武本紀至於獻千里馬寳劒賜騎士手不持珠玉未甞不歎息也后志在克已不以私家干朝廷兄廖爲虎賁中郞防光爲黃門郞訖明帝世不易官三月上初禮于學臨辟雍行大射禮使天下郡國行鄕飲酒禮于學校秋九月沛王濟南王淮南王東海王來朝冬十月壬子上臨辟雍初養三老五更於是士效禮樂三雍儀制備矣詔曰五更栢滎以尚書教朕十有餘年周頌曰視我顯德又曰無德不報其賜榮爵關内侯食邑五千戶榮病篤上疏謝恩讓還爵土上憫傷之臨幸其家入巷下車擁經趨進躬自撫循賜以牀帳衣服於是諸侯大夫問疾者皆拜於牀下及終贈賜甚厚上親變服臨送賜冡塋初榮爲太常上幸其府令榮東面坐設几杖之禮而百官能通義者及榮門下生數百人上親自下說時有問難者上謙而不答曰太師在是也供賜畢悉以饌賜榮字春卿沛國亢人少給事郡縣長師事九江朱文家貧常賃自供書夜誦讀無􅈈怠十五年不歸家京師以此稱之父卒榮奔䘮九江􅀒土成墳因留教授徒衆數百人王莽末天下擾攘兵革之間窮厄絕糧然抱持經書與諸生逃匿山谷講授不輟建武中大司徒辟榮年巳六十餘矣時虎賁中郞將豫章何湯榮門下生也以選授皇太子經世祖問湯何所師對曰􅁊榮世祖即召榮令說尚書善其說拜郞賜錢十萬入授皇太子甚見尊重毎朝會世祖輒令榮於公卿前說因問長安時舊事世祖曰得卿幾晚善博士也榮叩頭曰臣經學淺薄不如同門生揚州從事臯弘郞中彭閔世祖曰俞汝諧因除榮爲博士榮謙恭有藴藉毎論難於前常持禮讓以義理相喻不苟以言辭取勝儒者以此高之少子郁字仲恩傳父業以任爲郞榮卒郁當襲爵上書讓􅀌兄子上不許遷侍中上以郁先師子有禮讓甚親厚焉常居中論經問以政事甲子幸長安祠陵廟遣使者祠蕭何霍光車駕過軾墓所賜二千石令長巳下各有差十月護羌校尉竇林有罪下獄死三年春二月太尉趙喜司徒李訢坐事免左馮翊郭丹爲司徒南陽太守虞延爲大尉延陳留東昏人初爲細陽令信行於民棄官還家太守傅宗聞其名署功曹宗輿服出入擬於王侯延毎常進諫曰晏嬰相齊裘不􅀘公儀相魯㧞園葵去織婦夫以約失之者鮮矣宗勃然不悅曰昔者諸侯今之二千石也延以陪臣喻諸侯豈其謂也延以不合意退去宗後果以奢麗得罪臨當伏刑世祖使小黃門徃視之宗乃仰天歎曰恨不用功曹虞延之諫後車駕過外黃詔問陳留太守寜有功曹虞延邪太守對曰今爲南部督郵乃引見問諫前太守時事延具以狀對詔問延外黃園陵寢殿祭器俎豆悉曉其禮由是遂見謝焉賜錢百萬郡中聞之易視聽辟司徒府遷洛陽令是時隂皇后家客馬成嘗爲姦宄延收繫之隂將軍書請之前後不絕延得一書輒加笞二百隂氏知延必殺之乃言於世祖以延多所枉濫世祖親臨御道勑延出獄中囚其巳論者居東罪未决者居西成自以罪巳決欲起就東延前擊其頭曰此民之蠧也久依城社不畏煙燒今方考實姦未窮盡成大呼稱􅁈㦸郎以㦸承延頸叱使置之世祖知延不移因謂成曰汝犯法身自取之何以爲􅁈後數日遂伏誅上即位遷南陽太守新野功曹鄧衍以外戚小侯得朝會趨過殿庭姿容甚麗上顧謂左右曰朕之儀容豈能􅀂此左右曰陛下天子此凡人何足比焉雖然上心好之特賜輿馬衣服南陽計吏歸具白延延知衍行不配容積三年而不用於是上乃勑衍令稱南陽功曹詣闕拜郞中後爲玄武司馬不爲父行服上聞之􅁣然曰知人則哲惟帝難之虞延之言信哉衍慙懼遂退位上益奇延甲子賜天下男子爵人二級三老孝悌力田三級鰥寡􅀌獨貧不能自存者粟人五斛夏四月辛酉立皇子建爲千乗王當爲廣平王秋八月有司議世祖廟樂東平王倉議曰漢制舊典宗廟各奏其樂不必相襲以明其德也高帝受命龍興誅暴秦天下各得其所作武德之舞孝文皇帝躬行節儉澤施四海制盛德之舞光武皇帝受命中興撥亂反正登封告成功德巍巍夫歌所以詠德舞所以象功廟樂宜曰大武之舞從之初起北宮尚書僕射鍾離意諫曰陛下以天旱不雨毎自刻責避正殿損常膳而天猶不雨豈舉動失所而政違天心者邪昔湯遇旱以六事自責曰政不節邪使民疾邪宮室營邪女謁盛邪苞苴行邪讒夫昌邪今百姓須雨而天久旱竊以爲北宮大作是宮室營政不節之􅀋也自古巳來非患宮室小但患民之不安詩曰雨我公田遂及我私言君臣相濟上下同憂也今天下疲弊衣食不充可謂憂矣食禄於朝備在近列敢不以聞時詔賜降胡子縑尚書素事誤以十爲百上大怒召即欲鞭之意曰過誤者人所有也􅀂以懈慢爲罪臣居大官皆在臣臣請先受坐解衣就撻上意解皆原之上性急好以小察爲明公卿大臣數被誣毀尚書近臣尤甚由是朝廷悚慄事爲多苟且以避誅責意獨犯顔論事數封還詔書羣臣獲怒者輒救請之意薦彭城劉平徵爲議郞上數引見遷侍中宗正平薦舉承宮郇恁皆名士也以老病乞骸骨歸鄕里平字公子始以孝行稱爲郡吏守菑丘長政教大行毎屬縣賊輒令平守之所至皆治更始時天下亂平弟仲爲賊所害平抱仲女棄巳子而走母欲還取之平曰力不能兩全仲不可以絕􅀋也遂去不顧平嘗出爲母求食賊得平將食之平叩頭涕泣曰今旦爲老母採苕母飢待平爲命願得反食母而還就死賊見其至誠哀而遣之平還旣食母即白曰屬與賊期義不可欺遂復還賊皆大驚相謂曰常聞烈士今乃見之矣吾不忍食子建武初平狄將軍龐萌反攻太守孫萌平爲主簿冒白刃伏萌上身被七創噑泣曰願以身代明府賊乃相顧曰義士也勿殺遂解去萌絕而復蘇因涕泣相抱後數日萌竟死後太守嘉其節義舉孝廉爲全椒長使􅁺吏卒五日一來治所餘日令各就農桑官閒事簡民人懷感盗賊屏息資賦增益爲諸邑最刺史太守行部獄無囚徒民各自以得職不知所問沛人趙孝亦以義行獲寵孝字長平初天下亂人相食孝弟禮爲賊所得孝聞之則自縛詣賊曰禮久餓羸痩不如孝肥飽賊大驚不忍食兩放之謂曰歸持米糧來孝不能得即復徃願就烹賊義之不害建武初天下新定民皆乏食孝毎炊待熟輒使禮夫婦出有所役自在後與妻共􅂼菜食及禮還告以食而以糧飯食之如此者久禮心怪之微察悵恨獨然遂不肯復出兄弟怡怡鄉黨服其義州郡召進退必以禮天子素聞其行詔拜爲諫議大夫長樂衛尉後復徵弟爲御史中丞禮亦以恭謙有禮讓上嘉孝兄弟篤行欲寵異之率常十日使禮至衛尉府太官供食令其相對盡歡其見優􅀂此數年禮卒贈賻甚厚令孝以長樂衛尉從官屬送䘮葬于家壬申日有蝕之是時刑法嚴峻人懷憂懼因是變也鍾離意上疏曰陛下躬行孝道修明經術敬畏天地之禮勞䘏􅀺元之恩然而天氣未和日月不明水泉湧溢漂殺人民咎在羣臣不能宣化理職人懷恐急故百官不親吏民不和至於骨肉相殘以逆和氣雖加殺罰猶不能止故百姓可以德勝不可以刑服願陛下緩刑罰順時氣以調隂陽垂之無極上雖不能用然知其忠直故不得久留中出爲魯國相爲治存大體不求細過百姓愛之將終遺言上書陳刑法大峻宜少寛假上感其言賜錢二十萬意之出也遂就北宮及德陽殿成㑹百官上曰鍾離尚書在不得成此殿也意字子阿㑹稽山隂人少爲督郵亭長有受民酒禮者府下記案治意答曰詩曰刑于寡妻至于兄弟以御于家􅀖明政化之本由近及逺今宜明府内以及諸外且闕略遠縣細微事太守甚賢之遂任以屬縣事㑹稽大疾疫死者以萬數獨身自隱視經給醫藥全濟者甚多辟司徒府爲耿憲堂邑令視民如子百姓懷之邑民防廣遺腹子也爲父報讎繫獄其母病死廣􅂘泣不飲食意憐傷之解遣廣歸家使得殯殮丞􅁺皆以爲不可意曰自令罪非丞􅁺也廣殮母訖即還入獄意以狀聞竟得以減死論冬十月有事于世祖廟初獻大武之舞改太樂曰宜􅀽宏曰樂之爲用有自來矣大章簫韶於唐虞韶􅇴大武於殷周所以殷薦上帝饗祀宗廟陳之朝延以穆人倫古之道也末世制作不逹音聲之本感物乖化失序乎情性之宜故雖鐘鼓不足以動天地金石不足以感人神因輕音聲之用以忽感導之方豈不惑乎善乎嵇生之言音聲曰古之王者承天理必崇簡易之教仰無爲之理君靜於上臣順於下大化潜通天下交泰羣臣安逸自求多福黙然化道懷忠抱義而不覺其所以然也和心足於内則美言發於外故歌以敘志舞以宣情然後文之以采章昭之以風雅播之以八音感之以大和導其神氣養而就之迎其悅情致而明之使心與理相順言與聲相應合乎㑹通以濟其美故凱樂之情見於金石含弘乎大顯於音聲也􅀂此巳徃則萬國同風芳榮齊茂馥始秋蘭不期而信大道之隆莫盛於兹太平之業莫顯於此故曰移風易俗莫善於樂然樂之爲體以心爲主故無聲之樂民之父母也夫音聲和此人情所不能已者也是以古人知情不可放故抑其所通知慾不可絕故因以致殺故爲可奉之禮制可遵之聲也口不盡味耳不極音揆始之中爲之檢則使逺近同風而不竭亦所以結忠信著不遷也故鄕教庠序革不修之使絲竹與俎豆並存羽旄與揖讓俱用正言與和聲同發使將聽是聲也必聞此言將觀是容也必崇此禮猶賔主升降然後酬酢行焉於是言語之節音聲之度揖讓之宜動止之致進退相須共爲一體君臣用之於朝士庶用之於家少而習之長而不怠心安志固從善日遷此先王用樂之意也故朝宴聘享嘉樂必存是以國史採風俗之盛衰寄之樂工宣之以管絃使言之者無罪聞之者足以自戒此先王用樂之意也上與皇太子后幸南陽章陵周觀舊廬召見隂鄧故人賞賜各有差四年春二月辛亥上親耕于藉田將獵河内驃騎將軍王蒼諫曰臣聞盛春農事始興於時令不聚民興功傳曰田獵不􅀫食飲不享出入不節則木不曲直此失春令故也臣知車駕至約省所過吏民諷誦甘棠之德雖然動之不以禮非示四方規凖也陛下因行田野見稼穡經覽河川逍遥駐留弭節周旋至秋冬乃振威靈整法駕備周衛設羽旄詩云抑抑威儀惟民之隅敬愼威儀惟民之則不勝至心謹手書陳愚上從之秋九月戊寅千乗王建薨隴西太守鄧融下獄死初融在職不稱功曹廉范知其必獲罪乃謝病去融甚望之范改姓名求爲廷尉卒無何融果徵下獄范衛侍有異於常融不意是范也怪而問之曰卿何􅀋我功曹范曰君誤耳非是也融疾病及死范養視甚篤終不自言身自將車送䘮至南陽葬畢而去范自叔度杜陵人祖父丹王莽時爲大司馬范父遭亂客死於蜀范與母流離西州天下定乃歸鄕里范年十五辭母入蜀迎父䘮母憐其小謂曰汝家惟汝一身遭世亂恐滅絕不得奉宗祀今僅得全奈何復棄我逺去范固自請母不能止遂與客俱西入蜀蜀郡太守張穆丹之故吏也聞范迎䘮遣吏資車馬布帛送范范還不受自客歩􅀒䘮經渉塗險至葭萌下䘮載舩舩觸石破沒范抱持骸骨人前接范不動遂没石間衆傷其義相與共鉤求一日乃得共抱懸良久乃蘇穆聞之大驚復馳遣將前資追與范范曰前後相違范所不行也遂辭不受歸葬行服關中高其行􅀽宏曰古之人明救䘏之義開取與之分所以周急拯難通乎人之否泰也廉范厲然獨行以任所重其身殆亡而親柩幾䘮非全通之道也范旣歸事博士薛漢􅀄范家之入蜀以良田百餘頃屬故吏毛仲范歸仲子叔奉仲遺命以田歸范范以物無常主在人即有悉推田與之辟公府􅁺會薛漢坐楚事誅故人門生莫敢哭視范獨徃收之吏以聞帝大怒召入詰責范曰楚王無道救亂天下范公府􅁺不與朝廷同心而反收歛罪人何人范叩頭曰臣無狀以謂漢等皆巳伏誅故不勝師資弟子之情當萬死上怒稍解問范爲廉頗後邪范對曰臣本趙人廉頗之後大父丹爲王莽大司馬上乃曰怪范能􅀂此因釋之舉茂才爲温令數月遷雲中太守會胡虜反故事虜人入塞過五千人移書旁郡救至乃出范聞警即自以精兵赴之虜盛漢兵不能敵范乃令軍士皆持炬晨奔虜軍大炬如星虜見之驚走追擊大破之自此後虜震怖不敢犯雲中累遷武侯蜀郡太守所在有名迹蜀部好文辯喜相長短范以寛厚化下人民懷之坐事免歸家多散財物以賑宗族與洛陽亭長慶鴻爲刎頸之交時人稱曰前有管鮑後有慶廉鴻官至琅邪太守所在有異迹十月乙卯司徒郭丹司空馮魴免丹字少􅀸南陽穰人少事淮陽公孫昌西入關棄符歎曰不乗傳車終不出關是時昌爲王莽講學大夫門下生甚衆而昌獨禮異丹由是嚴尤王尋更辟請皆不就莽亦徵之逃避十餘年而更始立徵丹爲諫議大夫持節出關安集南陽初世祖即位諸將悉降受爵邑丹獨城守不下乃褁節荷擔經歷險更始妻子還其節傳然後歸田里後舉高第稍遷并州牧左馮翊皆有稱績及在相位淸廉公正與侯霸杜林相善亦齊名迹十二月陵鄕侯梁松下獄死松有才能明習漢家故事以選尚舞隂公主爲虎賁中郞將世祖時貴幸用事上即位遷太僕卿數爲私書請託郡縣事發覺免官由是怨望下獄誅安豐侯竇融薨融子穆尚内黃公主而顯親族及子固尚沮陽公主穆長子勲尚東海恭王女北陽公主穆爲城門校尉固爲中郞將監羽林融從兄子林爲護羌校尉竇氏一公兩侯三公主四二千石自祖及孫官府邸第相望奴婢千餘人於親戚功臣中莫與爲比融年老子孫放縱多不法度帝不能容數下詔比以竇嬰田蚡故事融惶懼乞骸骨上賜牛酒策罷穆以國在安豐欲以安六侯歸遂假作故六安王國矯稱長公主家上書自言帝大怒乃盡免穆等官諸竇爲郎吏者皆遣歸故郡留融京師㑹融病薨謚曰戴侯穆居大第富於財天子使謁者監護其家欲以全之居數年穆父子自以失勢出怨言使者奏焉乃遣歸故郡坐賂遺小吏爲郡所考穆及勲皆死獄中詔融夫人與一孫還洛陽固有才能世祖時貴顯用事及穆得罪固亦廢于家東平王蒼以輔政久固請歸蕃五年春二月詔曰東平王比上書願歸藩上將軍印綬謙讓日聞至誠懇惻蓋君子成人之美今其聽焉以驃騎長史爲東平王太傅􅁺吏爲中大夫令史爲王家郞勿上將軍印綬蒼體貌長大進止有禮好古多聞儒雅有識度上甞問蒼在家何者最爲樂對曰爲善最樂上嗟歎之冬十一月上幸鄴六年春正月沛王楚王濟南王東平王淮陽王琅邪王中山王東海王來朝廬江獲寳鼎納于太廟冬十一月行幸魯祠東海恭王沛王楚王濟南王東平王淮陽王瑯邪王皆㑹於魯十二月還過陽城遣使者祠中岳太尉虞延爲司徒延立朝正色多所匡弼隂氏憾延欲毀傷之使人告延與楚王英謀反延以英帝親以爲不然不受其言後英事發覺上切讓之七年春正月癸酉皇太后隂氏崩二月庚申葬光烈隂皇后徵東海相宋均爲尚書令甞有疑事上大怒召尚書郞執之諸尚書皆叩頭謝均獨正色曰夫忠臣守正敢有二心均雖死不易上聞而善之即捨之遷司隷校尉河南太守政化大行毎疾百姓􅂄老皆爲禱請旦夕至府問訊起居天子方欲以爲相㑹有痼疾上召入自視其疾均見上流涕謝曰天罰有罪所苦浸篤不復奉望帷幄上甚傷之賜錢三十萬卒於家初上好用能吏卒多暴虐殘刻終皆毀敗均罷朝相與言曰今選舉不得幽隱側陋但得見長吏耳太始時京兆則趙廣尹翁歸蕭望之丞相則魏相黃霸此數公者治皆致平今二千石殊無此國家喜文法吏以足止姦也然文吏習爲欺謾而廉吏淸在一巳無益百姓流亡盜賊所由而作也均自欲叩頭爭之時未可改也久將自苦之乃可言耳未及言遷爲司隷校尉後上聞其言追而悲之均字叔庠南陽安衆人初爲上蔡長誅鉏豪右姦猾震慄府下禁民葬不得過制均不行督郵以讓縣均曰夫送終踰制過之厚也國有不義之民而罰其過禮者恐非政治之先遷九江太守五日一聽事悉省􅁺吏閉督郵府内令與諸曹分休屬縣無事百姓安業九江多虎數傷民先時常募吏民設檻餌捕之均曰夫虎豹在山黿鼉在淵物性之所託也江淮之間有猛獸猶江北之有雞肫也今數爲民害咎在貪殘居職使然也而令吏捕虎非憂民之本也今務退貪殘進忠良去窞餌勿復課其後民傳言虎皆去東渡江北海王薨謚曰靜王後漢孝明皇帝紀上卷第九
