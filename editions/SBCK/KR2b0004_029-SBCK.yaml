body:
  text: 後漢孝獻皇帝紀卷第二十九􅀽宏建安元年春二月執金吾伏完爲輔國將軍開府如三公是時董承張陽欲天子還洛陽楊奉李樂不欲尚書上官洪言還洛之議李樂輔洪由是諸將錯亂更相疑貳董承奔野王韓暹屯聞喜胡才楊奉之塢卿欲攻韓暹上使人喻止之夏五月丙寅遣使至楊奉李樂韓暹營求送至洛陽奉等從韶六月乙未車駕幸聞喜楊奉胡才悔令乗輿去乃與李樂議欲還大駕詐言當遊澠池東以避匈奴上不從庚子車駕從北道出傍山而東無匈奴冦李樂愧其言懼而辭還是時糧食乏盡張陽自野王迎乗輿賑給百官丙辰行至洛陽幸故常侍趙忠宅張陽治繕宮殿丁丑大赦天下是月孫䇿入會稽太守王朗與䇿戰敗績八月辛丑天子入南宮陽安殿陽以爲巳功故因以名陽謂諸將曰天子當與天下共之幸有公􅀸大臣陽當捍外難何事京都遂還野王楊奉亦屯梁癸卯張陽爲大司馬楊奉爲車騎將軍韓暹爲大將軍領司隷校尉皆假節鉞是以州郡各擁兵自爲莫有至者百官窮困朝不及夕尚書巳下自出採樵或餓死牆壁間爲吏兵所殺暹等各矜其功任意恣睢干亂政事於是曹操議欲迎乗輿或曰山東未定韓暹楊奉親與天子還京北連張陽未可卒制司馬荀彧勸之曰昔高祖東征爲義帝縞素而天下歸心自天子播越將軍首唱義兵徒以山東擾亂未能逺赴關右然猶分遣將帥蒙險通使雖禦難於外乃心無不在王室是將軍匡天下之素志也今車駕旋軫義士有存本之思百姓懷感舊之哀誠因此時奉主上以從民望大義也秉至公以服雄傑大略也扶弘義以致英儁大德也天下雖有逆節必不能爲累明矣韓暹楊奉其敢爲害􅀂不時定四方生心後雖慮之無能及也操從之辛卯操詣關貢獻廩公􅀸以下操陳韓暹張陽之罪暹怖單􅀐奔走上以暹陽有翼駕還洛之功一切勿罪於是誅羽林郞侯折尚書馮碩侍中臺崇討有罪也封衛將軍董承輔國將軍伏完侍中丁种輯尚書僕射鍾繇尚書郭浦御史中丞董芬彭城相劉艾左馮翊韓斌東萊太守楊衆羅邵伏德趙􅅋爲列侯賞有功也追贈射聲校尉沮儁爲弘農太守矜死節也符節令董昭說曹操曰將軍興義兵以誅暴亂朝天子輔翼王室此五霸之功也巳下諸將人人殊異未必服從今留匡弼事勢不便唯有移車駕幸許耳然朝廷播越新還舊都逺近企望兾一獲安今復徙車駕不厭衆心夫行非常之事乃有非常之功願將軍䇿其多者操曰此􅀌之本志也遂言幸許之計上從之庚申車駕東楊奉自梁欲要車駕不及巳巳車駕到許幸東營甲戌鎭東將軍曹操爲大將軍更封武平侯操固讓不許太尉楊彪司空張喜以疾遜位冬十月戊辰右將軍􅀽紹爲太尉紹耻班在操下不肯授操乃辭大將軍丙戌以操爲司空領車􅀐將軍辛卯曹操征楊奉於梁奉奔􅀽術呂布襲徐州劉備奔曹操初陳郡人􅀽渙爲劉備茂才避地江淮之間爲吕布所拘布令渙作書罵辱備渙曰不可再三強之不許布大怒以兵脅之曰爲之則生不爲則死渙顔色不變􅀏而應曰渙聞唯德可以辱人不聞以罵使彼固君子也且不耻將軍之言彼誠小人也將復將軍之意則辱在此不在於彼且渙他日之事劉備猶今日之事將軍也如一旦去此復罵辱將軍可乎布慙而止渙字曜卿司徒滂之子也渙少與弟微俱以德行稱是時漢室襄微天下將亂渙與微閑居從容謀安身避亂之地渙􅁣然歎曰漢室陵遟亂無日矣茍天下不靖逃將安之􅀂天將䘮道民以義存唯強而有禮可以庇身乎微曰古人有言知機其神乎見機而作君子所以元吉也天理盛襄漢其已矣夫有大功必有大事此又君子之所深識退藏於宻者也且兵革之興外患衆矣微將逺蹈山海以求免乎天下淆亂各行其所志微避地至交州渙展轉劉備􅀽術呂布之間晚乃遇曹公渙說操曰夫兵者凶器也不得巳而用之鼓之以道德征之以仁義兼撫其民而除其害夫然故可與之死可與之生自大亂以來十數年矣民之欲安甚於倒懸然而􅁀亂未息者何也政失其道歟復聞明君善於救世亂則濟之以義僞則鎭之以樸世異事變治國不同不可不察也夫制度損益此古今之不必同者也􅀂夫惠愛天下而反之於正雖以武平禍亂而濟之以德誠百王不易之道也公明哲超世古之所以得其民者公旣動之矣今所以失其民者公旣戒之矣海内頼公得免於危亡之禍然而民未知義唯公所訓之則天下幸甚操重渙言以爲軍諮祭酒渙常謂人曰夫居兵亂之間非吾所長毎謙不敢處也張濟自關中走南陽爲飛矢所中死從子繡領其衆屯宛天子旣免曹陽賈詡去李傕託于段煨頃之復歸張繡二年春正月曹操征張繡繡降其季弟濟妻國色也操以爲妾繡由是謀叛襲操七軍大敗之殺其二子自曹操之迎乗輿也􅀽紹内懷不服紹旣兼河朔天下畏其強操方東憂呂布南距張繡及繡敗操軍紹益自驕而與操書悖慢操大怒動止容變於常衆皆以爲失利於繡故也僕射鍾繇以問尚書令荀彧彧曰公以明哲必不追咎徃事也殆有他慮乎遂見操以問焉操以紹書示之且曰今將征不義而力不敵如何彧對曰古之成敗誠有其材雖弱必強茍非其人其強易弱劉項之事足以觀矣今與公爭天下者唯袁紹紹貌外寛内忌任人而疑其心公明逹不拘唯材所宜不問踈賤此度勝也紹遟重少決失在後機公能斷大事應變有方此謀勝也紹御軍寛緩法令不一士卒雖衆而實難用公法令嚴明賞罰必行士卒雖寡皆爭致死此武勝也紹憑世資從容􅅚智收名譽故士之寡能好聞者歸之公以至仁待士又推誠心不爲虚美行已謙恭儉約而與有功者無吝故忠正殺身之士咸願爲用此德勝也夫此四勝仗義征伐誰敢不從紹以四失背忠自專強何能爲操悅秋七月即拜太尉􅀽紹爲大將軍於是馬日磾喪還京師將欲加禮少府孔融議曰日磾以上公之尊乗旄節之使銜命直指寧輯東夏而曲媚賊臣爲所牽率章表署用輔俠首名附下罔上姦以事君昔國佐當晉軍而不撓宜僚臨白刃而正色王室大臣不得見脅爲辭鄭人討幽公之亂斲子家之棺聖人哀矜未忍追治不宜加禮冬十月謁者僕射裴茂督三輔諸軍討李傕也三年春正月破傕斬之夷三族郭圯爲其將伍習所殺李樂病死胡才爲怨家所殺張陽爲其將眭固所殺馬騰韓遂凉州自相攻擊五月韓暹楊奉死秋七月曹操征張繡破之荀彧說曹操曰不先取呂布河北未易圖也操曰􅀂􅀽紹侵擾關中西羌南誘蜀漢是我獨以兖州抗天下五分之一也爲之奈何彧曰關中將帥以十數莫能久相一唯韓暹馬騰最強彼見山東之敗必各擁衆自保全􅀂撫以恩德使連和相推雖不能久要公定山東足以不動鍾繇可屬以西事公無憂也操從之九月曹操征呂布是歲􅀽紹自立爲天子術與楊彪婚親也操忘彪忠正收彪付獄將殺之孔融聞之不及朝服徃見操曰楊彪累世清德四葉重光周書父子兄弟罪不相及况􅀽氏之罪乎易稱積善餘慶但欺人耳操曰國家之意也融曰假使成王欲殺召公則周公可得言不知耶今天下纓緌縉紳之士所以仰贍明公者以輔相漢室舉􅀡措枉致之雍熈也今橫殺無辜則海内觀聽誰不解體孔融魯國之男子明日便當拂衣而去不復朝也操意解乃免彪覩漢祚將微自以累世公輔耻事異姓遂稱疾不行徵鄭玄爲大司農不至玄字康成北海高宻人也爲嗇夫隱恤􅀌苦閭里安之家貧雖得休假常詣校官誦經太守杜密異之爲除吏録使得極學􅀇之右扶風事南郡太守馬融融門徒甚盛弟子以相次受至三年不得見􅀇講習彌篤晝夜不倦融見竒之引與相見自篇籍之奥無不精研歎曰詩書禮樂皆以東矣會黨事起而玄教授不輟弟子數百人中平初悉解禁固玄巳六十餘矣始爲王公所命一無所就者􅀇身長八尺秀眉朗目造次顚沛非禮不動黃巾賊數萬人經􅀇廬皆爲之拜高密一縣不被抄掠袁紹甞遇􅀇而不禮也趙融聞之曰賢人者君子之望也不禮賢是失君子之望夫有爲之君不失萬民之歡心況於君子乎失君子之望難乎有爲也四年春曹操獲呂布斬之二月司空曹操讓位於太僕趙岐不聽三月衛將軍董承爲車􅀐將軍封操三千戶討呂布之功也固讓不受三月袁紹討公孫瓉六月拜孫䇿爲會稽太守討逆將軍封吳陽侯初彭城人張昭避亂淮南䇿賔禮之及䇿東略遂爲之謀主聞袁術􅆫號昭爲䇿書諫術曰昔者董卓無道陵虐王室禍加太后􅁀及弘農天子播越宗廟焚毀是以豪傑發憤赫然俱起元惡旣斃幼主東顧乃使王人奉命宣明朝恩偃武修文與之更始而河北異謀黑山不順劉表􅆫亂於南公孫叛逆於北劉繇阻兵劉備爭盟是以未獲承命囊弓戢戈也當謂使君與國同規舍是不䘏完然有自取之志懼非海内企望之意昔湯伐桀稱有夏多罪武王伐紂曰殷有重罰此二王者雖有聖德假使時無失道之過何由逼而奪之也今主上豈有惡於天下徒以幼小脅於􅆫臣異於湯武之時也又聞幼主明智聦敏有夙成之德天下雖未被恩咸以歸心焉􅀂輔而興之旦奭之美率土之所望也使君五世相承爲漢宰輔榮寵之盛莫與爲比宜効忠守節以報漢室世人多惑圖緯之言妄牽非􅀋之文茍以悅主爲美不顧成敗之計今古所愼也忠言逆耳駁議致憎苟有益於尊明則無所敢辭術始自以爲有淮南之衆料䇿之必與巳合及得其書遂愁沮發疾􅀽紹自破公孫瓉貢御希慢私使主簿耿苞密白曰赤德運衰曆數將改宜順天意以應民望紹以苞白事咨於軍府議者咸以苞爲妖妄宜誅紹殺苞以悅衆然遂有逆謀於是紹將南出師以攻曹操沮授田豐諫曰師出歷年百姓疲􅁦倉庫無積賦役方殷此國之深憂也宜遣使獻捷天子務農逸民􅀂不得通乃表曹操隔我王路然後進屯黎陽漸營河南益作舩舫繕治器械分遣精騎抄掠邊鄙令彼不得安我取其逸三年之中事可坐定也審配郭圖曰兵書之法十圍五攻敵則能戰今以明公之神武跨河朔之人衆以伐曹氏譬􅀂覆手今不時取後難圖也授曰蓋救亂誅暴謂之義兵恃衆憑強謂之驕兵兵義無敵驕者先滅曹氏迎天子建宮許都今興師南向於義則違且廟勝之䇿不在強弱曹氏法令旣行士卒精鍊非公孫瓉坐而受圍者也今棄萬安之術而興無名之兵竊爲公危之圖曰武王伐紂不爲之義况曹氏而云無稱且公師武臣勇將士憤怒人思自騁而不及時早定大業慮之失者夫天與不取反受其咎此越之所以霸吳之所以亡也監軍之計而非見時知機之變紹從之圖等因是􅉲授曰授監統内外威震三軍􅀂其浸盛何以制之夫臣與主同者昌主與臣同者亡黃石之所忌也且御衆於外不宜知内紹疑焉乃分監軍爲三都督使授及郭圖淳于瓊各典一軍遂南冬十一月張繡賈詡降曹操十二月甲辰司隷校尉鍾繇持節鎭撫􅀜中庚辰曹操率師拒袁紹於官渡孔融謂荀彧曰紹地廣兵強田豐許攸智計之士也爲之謀審配逢紀盡忠之臣也任其事顔良文醜勇冠三軍統其兵殆難剋乎彧曰紹兵雖強而法不整田豐剛而犯上許攸貪而不治審配專而無謀逢紀果而自用此二人留知後事者攸犯其法必不能從也攸必爲變顔良文醜一夫之勇耳可一戰而擒也􅀽術欲北至靑州曹操使劉備要擊之會術病死操悔遣備追之不及備遂據下邳五年春正月壬午車􅀐將軍董承偏將軍王服謀殺曹操發覺伏誅初承與劉備同謀未發而備出謂服曰郭圯有數百兵壞李傕數萬人但足下與吾同不耳昔呂不韋之門須子楚而後高今吾與子猶是也服惶恐不敢當然兵又少承曰興事訖得曹公成兵不足邪服曰今京師豈有所任者乎承曰長水校尉种輯議郞吳碩是吾腹心辦事者輯碩皆被誅曹操攻劉備奔袁紹二月遣沮授郭圖淳于瓊顔良等攻劉延於白馬紹引兵至黎陽沮授臨發會其宗族散資財以與之曰夫勢存則威無不行勢亡則不保一身哀哉其弟宗曰曹公士馬不敵兄何懼焉授曰以曹兖州之明略又挾天子爲資我雖剋伯珪衆實疲􅁦而將校主銳軍之破敗在此舉矣楊雄有言曰六國蚩蚩爲羸弱􅁎今之謂矣夏四月曹操救劉延大戰斬顔良秋七月辛巳立皇子馮爲河陽王壬午南陽王薨八月袁紹將濟河沮授諫曰勝􅀒變化不可不詳今宜留屯延津分兵官渡􅀂剋獲還迎不晚設其有難衆不可還詔不從授臨濟歎曰上盈其志下務其功悠悠黃河吾其反乎遂以疾辭紹恨之乃省其所部倂屬郭圖遂軍官渡紹衆盛操軍大懼與荀彧書議欲還許以引紹彧報曰紹聚官渡欲與決勝􅀒公以至弱當至強􅀂不制必爲所乗是天下之大機也且紹布衣之雄能聚人而不能用也以公神武明哲而􅆢以大順何向而不濟今軍食雖少未􅀂楚漢在滎陽成臯間也是時劉項莫肯先退先退者勢屈也公以十分居一之衆畫地而守之扼其喉而不能進巳半年矣情見勢竭必將有變此用竒之時不可失也操從之劉備去袁紹南奔汝南九月庚子朔日有蝕之詔公卿各上封事靡有所諱袁曹相持於官渡孫䇿欲襲許迎乗輿部署未發爲許貢客所害先吳郡太守許貢爲䇿所殺其小子與客謀報曰孫䇿勇銳􅀂多殺人於道䇿必自出則可擒也客從之乃殺人於江邊䇿聞之怒單騎自出客刺傷之將死謂張昭曰中國亂以吳越之衆三江之固足可觀成敗公等善輔吾弟呼權佩以印綬曰舉江東之衆決機於兩陣之間與天下爭衡卿不如我任賢使能各盡其力以保江東我不如卿初䇿在吳與張昭論曰今四海未定當以武平之耳吳人陸績年少在坐末大聲言曰昔管夷吾相齊桓公九合諸侯一匡天下不用兵車孔子曰逺人不服則修文德以來之今諸君不務道德懷取之術而唯尚武績雖童蒙竊所未安也昭等異焉績容貌雄壯博學多識星曆算數無不該覽及權統事辟奏曹掾以􅀡道見憚出爲鬰林太守加偏將軍績意在儒雅非其志也雖在軍旅著述不廢作渾天圖注易釋􅀇皆傳於世預自知亡日乃爲辭曰有漢志人吳郡陸績幼敦詩書長翫禮易受命南征遘疾逼厄遭命不永嗚呼悲隔又曰從今巳去六十年之外車同軌書同文恨不及見也十一月甲子曹操與􅀽紹戰於官渡紹師大潰沮授爲操軍人所執授大呼曰授不降也爲所執耳操與之有舊逆謂之曰分野殊異遂用阻絕不圖今日乃相擒也授對曰兾州失䇿以取奔北授智力俱困宜其見擒操曰本初無謀不相用計今喪亂過紀國家未定當相與圖之授曰叔父母弟懸命袁氏􅀂蒙公靈速死爲福公歎曰􅀌早相得天下不足慮也遂舍而厚遇之頃之謀歸􅀽氏操殺之六年春三月曹操以􅀽紹新敗欲悉軍以征劉表以問尚書令荀彧彧曰今紹之敗其衆離心宜因而遂定而欲逺背兖豫南軍江漢夫困獸猶􅃲況在紹乎􅀂紹收其餘燼承虚以出則公之事去矣四月曹操將兵於河上八月辛卯侍中郗慮尚書令荀彧司隷鍾繇侍講于内冬十一月曹操征劉備奔劉表屯新野七年夏五月庚戌􅀽紹發病死初紹有三子譚熈尚譚長而惠尚少而美紹妻愛尚數稱其才紹以竒其貌欲以爲後乃出譚爲靑州刺史沮授諫曰世稱一兎走衢萬人逐之一人獲之貪者悉止分定故也且年均以賢德均則􅁲古之制也願上推先代成敗之誠下思逐兔分定之義紹曰􅀌欲令三子各據一州以觀其能授出曰禍其始此矣及紹未命而死其别駕審配護軍逢紀宿以驕侈爲譚所疾於是紀外順紹妻内慮私害乃矯詔遺命奉尚爲嗣譚至不得立自稱車騎將軍由是有隙譚軍黎陽九月曹操征譚尚越嶲男子化爲婦人周羣曰將有易代之事者八年春操破譚尚秋七月曹操上言守尚書令荀彧自在臣營叅同計畫周旋征伐毎皆剋捷竒䇿宻謀悉皆共決及彧在臺常思書徃來大小同䇿詩美腹心傳貴廟勝勲業之定彧之功也而臣前後獨荷異寵心所不安彧與臣事通功並宜進封賞以勸後進者於是封彧爲萬歳亭侯八月曹操征劉表軍次西平譚尚爭兾州九月公卿迎氣北郊始用八佾冬十月曹操至黎陽九年夏四月操拔邯鄲秋八月曹操破鄴􅀽尚熈奔匈奴辛巳封蕭何後爲安衆侯九月太中大夫孔融上書曰臣聞先分九圻以遠及近春秋内諸夏而外夷狄詩云封畿千里惟民所止故曰天子之居必以衆大言之周室旣㐮六國力征授賂割裂諸夏鎬京之制商邑之度歷載彌人遂以闇昧秦兼天下政不遵舊革剗五等掃滅侯甸築城萬里濵海立門欲以六合爲一區五服爲羌關衛不要遂使陳項作難家庭臨海擊柝不救聖漢因循未之匡改猶依古法潁川南陽陳留上黨三河近郡不封爵諸侯臣愚以爲千里國内可略從周官六鄉六遂之文分取北郡皆令屬司隷校尉正以王賦以崇帝室投自近以寛逺繇華貢獻外薄四海揆文奮武各有典書帝從之戊辰以司空曹操領兾州牧或說操曰宜復古制置九州則所制者廣大天下服矣操將從之荀或言於操曰兾州求公領牧以要民心甚善至於分改九州竊有疑焉􅀂是兾州當取河東馮翊扶風西河并幽之地所奪者衆前日公破􅀽尚擒審配海内震駭人人自恐不保其土地守其兵衆也今便分屬兾州將皆動心且人多悅關右將皆以動心之計今此必以爲次第見奪一旦生變有守善者轉相脅爲非則􅀽尚得寛其死而􅀽譚懐貳劉表遂有江漢之間天下未易圖也願公引兵先定河北然後修復舊京南臨荆州責王貢之不入則天下咸知其意人人自安天下大定乃議古制操曰微足下失之者多矣遂寢九州之議十月有星孛于東井分凉州四郡爲梁州十年春正月曹操攻袁譚於南皮大破斬之丁丑增封操萬三千戶平幽兾之功也八月侍中荀悅撰政治得失名曰申監旣成而奏之曰夫道之本仁義而巳五典以經之羣籍以緯之詠之歌之絃之舞之前監旣明後復申之致治之術先屏四患乃崇五政一曰僞二曰私三曰放四曰奢僞亂俗私壞法放越軌奢敗制四者不除則政末由行矣其致也俗亂則道荒雖天下不得保其性也法壊則世傾雖人主不得守其度也軌越則禮亡雖聖人不得全其行矣制敗則欲肆雖四表不得充其求矣是謂四患修農桑以養其生審好惡以正其俗置文教以章其化立武備以秉其威制賞罰以統其法是謂五政民之不畏死不可懼以罪人不樂生不可勸以善雖使契布五教咎繇作士政不行矣故在上者先豐民財以定其志帝耕籍田后桑􅁞宮國無遊民野無荒業財賈不用力不妄加以周民事是謂養生君子之所以動天地感神明正萬物而成至治者必乎眞定而巳故在上者審定好惡旣安乎功罪毀譽亦終於準驗聽言責事舉名察實無或作詐僞淫巧以蕩衆心故事無不核物無不功善無不顯惡無不彰俗無姦詐民無淫風百姓上下覩利害之存乎巳也故肅敬其心内不回惑外無異望則民志平矣是謂正俗君子以情用小人以刑用榮辱者賞罰之精華也故禮教榮辱以加君子化其情也桎梏以加小人化其刑也君子不犯辱况於刑乎小人不忘刑况於辱乎􅀂在具中人之倫則禮刑兼焉教化之廢推中人而墮於小人之域教行之行引中人而納於君子之塗是謂章化小人之情緩則驕驕則怠怠則怨怨則叛危則謀亂安則思欲非威強無以懲之故在上者必有武備以戒不虞以遏冦虐安居則寄之内政有事則用之軍旅是謂秉威賞罰政之柄也賞以罰審信順令行賞以勸善罰以懲惡人主不妄賞非徒愛其財也賞妄行則善不勸矣不妄罰非徒矜其人也罰妄行則惡不懲矣賞不勸謂之止善罸不懲謂之縱惡在上者能不止下爲善不縱下爲惡則國法立矣是謂統法四患旣蠲五政旣立行之以誠守之以固簡而不怠踈而不失無爲爲之使自施之無事事之使自安之不肅而成不嚴而治垂拱揖讓而海内平矣古者天子諸侯有事必告于廟廟有二史左史記言右史記事事爲春秋言爲尚書君舉必記善惡成敗無不存焉下及士庶苟有茂異咸在載籍或有欲顯而不得欲隱而名彰得失一朝榮辱千載善人勸焉淫人懼焉可備史官掌其典常上覽而善焉悅字仲豫潁川人也少有才理兼綜儒史是時曹公專政天子端拱而巳上旣好文章頗有才意以漢書爲䌓使悅刪取其要爲漢紀三十篇冬十一月并州刺史高幹反十一年正月有星孛於北斗占曰人主易位曹操征高幹斬之己丑增封操并前三萬戶食柘城陽夏四縣比鄧禹吳漢故事秋七月武威太守張猛殺凉州刺史商邯後漢孝獻皇帝紀卷第二十九
