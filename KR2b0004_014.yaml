body:
  text: 後漢孝和皇帝紀下卷第十四袁宏九年春三月癸巳濟南王康薨諡曰安王康不修法度通賔客人有上書告康使中郎將張陽董臣招來州郡姦猾顔忠劉子産等案圖書謀議不軌有司舉奏明帝以至親不忍窮竟削視阿隰隂東胡陽安德西平昌五縣康殖財貨治宮室奴婢至千餘人廄馬千餘匹田八百餘頃何敞之為傅上疏諫曰蓋聞諸侯之義以制節謹度為忠然後能保其社稷和其民人昔管仲相齊九合之功而孔子譏其器小以奢侈適上不知禮也今大王以骨肉之親亨蕃國之尊當率先天下以為化首今國家制度王侯車服章事有其科不可越也夫文繁者質枯木勝則人亡經傳所載也且君國者以道德仁義為營豈飾宫室充實廄馬為尊哉楚作章華吳興姑蘇卒亡景公千駟民無所稱其效也如大王數遊諸第出入無節或涉晨夜非所以逺防未然臨深履薄垂示後詞之法也願大王修恭儉遵古制以法自治以禮率下省奴婢之數減乘馬之費以禮起居則敞之願藥酒苦於口而利於病至言逆耳而便於行惟大王深察愚言王甚敬禮而不能改夏五月封皇后父隂綱為防侯綱上疏辭位以特進侯就第綱弟鳯謁為為郎中子軼政比黃門郎隂氏自建武以來緣屬戚之故世為卿校外典禁兵內侍帷幄賞賜恩寵貴重當世秋七月蝗蟲飛過京都閏月辛巳皇太后竇氏崩太尉張酺與司空司徒共上依吕太后故事貶竇太后尊號勿葬敬陵百官言之者亦多上手報酺日禮臣子無貶之義今皇太后家雖不遵法度然常欲自滅損奉事十年恩不忍虧案前世上官太后子奉終義從其忽復議丙申葬章德竇皇后隴西羌犯塞執金吾劉尚將三萬騎擊平之九月􅏤申司徒劉方有罪自殺初梁貴人生和帝竇后以為巳子飬而隱之貴人者梁竦女也永平初竦兄陵鄉侯松因事徙邉後詔書聽還本郡闔門不出作經書數篇名曰七序班固見而稱之曰昔孔子作春秋而賊臣亂子懼梁竦作七序而竊位素餐者慙輕財好施不得産業兄嫂舞隂長公主振施諸梁親踈有序然猶獨敬異竦衣裘品物事殊别竦未嘗獨饗常與宗族共之竦少長京師逮父兄時遊士林故不樂歸鄉里雅有太志每登高望逺未曾不歎息曰大丈夫居世生當封侯死當廟食詩書足以自娛州郡之職但勞人耳竦生二男三女長男棠及翟長女憑及二貴人初馬太后良家女貴人與姊以選入宮得幸於帝生和帝竦不勝喜與舞隂長公主和相罵語泄聞於竇氏欲專名太子外家心惡梁氏欲毀販之乃誣以惡逆詔郡縣考竦死獄中家屬舞隂公主居新野使者護守之貴人與姊以憂死有闕竇后崩舞隂公主兄子梁扈遣從兄擅奏記三府曰春秋之義毋以子貴漢家舊典也今梁貴人親育聖躬而不蒙尊號補得記謝遣擅太尉張酺獨見擅具問之曰此公之職而梁氏之福也會以蝗飛過過師召見對説固具言擅記上曰意云如酺不知葬禮有闕也對曰陵上宜置長史加祠祭之禮收録諸舅以明親親上復曰於義如何酺曰今春秋之義漢家有行事梁竇並為名姓保守河西以忠獲封竇憲兄弟不軌太后謗議籍籍聞於天下姓族死以逾梁氏加以親外家誠尊顯上曰非君孰為朝廷恩大家事籍籍君所知上深納酺言會貴人姊慿上書曰同産女弟貴人前充後宫蒙先帝厚恩得見寵幸皇天所夀誕育陛下為竇憲兄弟譖虐妾父竦冤死牢獄骸骨不掩毋孤弟逺徙萬里獨妾遺脫逃伏草野常恐沒命無由自逹值陛下神聖之德統覽萬機憲兄弟皆已伏誅海內曠然各得其所妾得蘇息拭目更視乃敢昧死自陳妾竊悲死父既冤不可復生毋年七十逺在絶域不知死生願乞母弟還本郡收葬竦骨妾聞文帝既立薄氏蒙榮宣帝繼統史氏復興妾自悲有薄史之親獨不蒙外戚餘恩辭甚悲切上惻然感寤使中常侍掖庭令雜訊問慿辭語證明甲子改殯梁貴人于承光宫追尊為皇太后諡曰恭懷葬于西陵上乃别見慿慿具自陳説上歔欷流涕留慿宫中連日不出賞財物第宅旬月之間資纍千萬慿素有行遂寵之加號梁貴夫人擢獎慿夫調為羽林佐監追加諡竦為親愍侯遣中謁者迎竦喪于京師改殯之賜東園畫棺玉匣冡葬於西陵旁上親臨送徴竦妻子還京師梁貴人遇竇氏之譖葬禮有闕清河王慶涕泣不敢言常私祭于室及梁后改葬慶乃上書求上貴人冡詔聽許悲喜曰生雖不得供飬終得奉祭祀私願畢矣太尉張酺上疏乞骸骨上使中黃門問􅍚加以珍羞酺稱篤詔曰元首不明黎民困窮朕與君同其憂責豈可引退邪其勿復言是時酺子蕃以郎侍講上復詔蕃曰隂陽不調朝廷望公以為憂託病自退潔已而已誰當與朕同心者非所望於公也酺惶恐詣闕謝因起視事酺自為三公父尚在酺每遷父輒自田里來適會歲臘公卿罷朝共詣酺父上酒為酺夀極歡移日當時以為榮冬十月癸卯光祿勳吕蓋為司徒十一月丙寅司空張奮老病致仕壬申太僕韓稜為司徒奮在家上疏曰安上治民莫善於禮移風易俗莫善於樂又曰揖讓而治天下者禮樂之謂也先王之道於斯為盛故曰禮樂不興刑罰不中民無所措手足漢既受命禮樂冝作圖讖明文王若是以先帝聖德逺監每存禮樂衆儒不逹多生駭異臣纍世輔位而漢禮樂未定誠切以為憂負臣犬馬齒盡誠冀先死及見禮樂之定上善之十年夏五月封梁堂為樂平侯雍為乘氏侯翟為單父侯位特進堂等自九真還過長沙迫從竇懷令自殺秋九月庚戍初復廪犧官冬十二月戊辰梁王暢薨諡曰節王毋隂貴人有寵於明帝暢尤受辛諸國土且入倍於國章緣明意賞賜息寵務加篤厚乃封暢舅隂棠為西陵侯暢性聰惠然少驕貴頗不遵法度暢常夢見星宿從官卞忌自言善占夢又能使六丁神暢使忌占夢卜筮又使乳毋王禮侍史李阿與忌祠祭求福言王當為天子暢心喜永元初豫州刺史舉奏暢考訊辭不復有司請徴暢詣獄天子以加恩不忍聽復奏徙九真有詔削城武單父二縣暢懼上疏辭謝曰臣天性狂愚少長深宮從官侍史利臣財物暢無所照見與相然諾不自知陷死罪自負自悔無所復及陛下聖德弘裕枉法赦臣上念以負先帝而令陛下收耻天下誠無氣以息筋骨不相連臣暢知大貸不可再得束身不敢復出是載食睦陽榖熟虞蒙寧陵五縣還餘所食四縣臣暢小妻三十七願還其無子者選擇謹勑奴婢三百人其餘所爰虎賁官騎鼓吹倉頭兵弩廄馬皆上還本署陛下加大恩開臣自悔之門假臣小善之路令天下知臣得去死就生頗能自悔若不聽許臣實無顔以久生下入黃泉無以見先帝詔曰唯王至親之屬純淑之美傅相不良不能防邪至令有司紛紛彰于內外令至深思悔過以自尅責朕惻然傷之傳曰尅已復禮天下歸仁其安心靜意茂休厥德強食自愛其何讓哉暢固請章數十上卒不許十一年春三月遣使行郡國水旱災貧不能自存者廪貸榖食令山林池澤勿收假稅夏四月丙寅大赦天下十二年春三月賜天下男子爵各有差鰥寡孤獨不能自存者粟人三斛博士弟子布三匹夏閏四月戊辰南郡秭歸山崩壓殺百餘人秋七月辛亥朔日有蝕之初太尉張酺與司隸晏稱會于朝堂酺從容謂稱曰三府椽史多非其人既罷稱奏令三府長史各實其椽史酺以恨稱會復共謝以責稱稱辭色不順酺怒廷叱之稱乃奏酺以為怨望上以酺先帝師優遊不斷詔公卿廷議之司徒吕蓋以為酺知公門有儀不屏氣鞠躬而作色大言不可示四方乃䇿免酺曰詩云節彼南山惟石巖巖赫赫師尹民具爾瞻今君在位八年于兹康哉之歌既無聞焉而於兩觀之下有醜慢之音傷南山之體虧穆穆之風將何以宣示四方儀刑百寮履霜知氷朕甚焉君其上太尉綬君自取之靡有後言九月太尉張酺䇿免歸里舍謝遺門生闔門不通賔客中郎將敞等多言酺公直中正不宜久棄草廬上亦雅重之數年復以酺為光祿勳丙辰大司農張禹為太尉東西域蒙竒兜勒二國內屬十三年秋九月詔曰水旱不節蝗螟兹生令天下田租皆半入𬒳災者除之貧民受貸種食皆勿收責冬十月安息國獻師子大雀班超上書求代曰臣聞太公封齊五世葬周故狐死首丘代馬依風夫周齊同在中土千里之間尓况於萬里絶域小臣能無依風首丘之思哉蠻夷畏壯侮老自其天性臣犬馬齒殱常恐奄忽僵仆孤魂棄捐臣義不營私竊恐後世以臣為沒西域不敢望到酒泉郡但願生入玉門關以示邉境威外臣老病衰困冒死瞽言謹先遣子勇隨獻物入塞以臣生在令勇見中土超妹昭擢遂死於邉上書曰妾同産兄西域都護超捐軀為國以功自效賴陛下神靈得待罪沙漢至今積三十年矣骨肉妻子生不復相識時人士衆皆巳死亡超年至七十衰老𬒳病扶杖而行雖以竭盡其力以報大恩迫于歲暮犬馬齒盡蠻夷之性悖逆侮老恐開姦宄之源生逆亂之心而公卿大夫咸懷一切而莫肯逺慮如有卒暴超之氣力不能從心即恐上損國家纍世之功下棄忠臣竭力之用以榮為辱誠可痛也故超萬里歸誠自陳苦急延頸逾望三年于兹超有書與妾生訣恐不復相見妾誠復超以壯年竭力忠孝於沙漠罷老則使捐棄于擴野誠可哀憐如不蒙救護超後有一旦之變異幸超家得蒙趙母衛姬先請之貸書奏上感其言乃徴超還以校尉任尚代超超到拜射聲校尉數月薨朝廷愍惜之賵贈甚多子勇復有功西域初尚與超書曰君侯在外國三十餘年而小人猥承君後任重慮淺冝有以誨之超曰任君數當大位豈班超所能及哉必不得巳願進愚言塞外吏士本非孝子順孫皆以過補屯部蠻夷獸心難飬易動今君性嚴急清水無大魚將軍冝寬小過揔大綱而巳尚私謂所親曰我以班君當贈以竒䇿今所云平平耳尚後竟遭邉禍如超所言袁宏曰古之有天下者非欲制御之也貴在安靜之故修巳而求于物治內不務於外自小至大自近及逺樹之有本枝之有葉故郊畿固而九服寧中國實而四夷賔夫唐虞之盛德澤之濃正朔所及五千而已自此以外羈縻而弗有也三代建國弗動逺略歧邠江淮之間習其故俗朔野遼海之域戎服不改然而冕旒端委南面稱王君臣泰然不以區宇為狹也故能天下乂安享國長久至于秦漢開其土宇方于三五之宅故以數倍矣然顧瞻天下未厭其心乃復西通諸國東略海外故地廣而威刑不制境逺而風化不同禍亂薦臻豈不斯失當世之主好為身後之名有為之人非能守其貧賤故域外之事興僥幸之人至矣夫聖人為治貴英才安天下􅓵羣才故僥幸之人王制之所去也班超之功非不可竒也未有以益中國正足以復四夷故王道所不取也戊辰司徒吕蓋老病致仕十二月丁丑光祿勳魯恭為司徒恭字仲康右扶風平陵人也父武陵太守卒官時恭年十二弟丕年七歲晝夜號泣哀動路人郡吏贈送一皆不受處喪如禮鄉里竒之年十五與弟俱居太學詣博士受業閉門講誦不隨儔黨兄弟知名為學者所宗扶風數以禮請謝而不應毋強遣之不得巳而去同業隨之者前後盈路恭乃始為新豐教授以丕年小欲就其名常託病不仕及丕舉方正乃始為郡吏辟太尉掾遷中牟令民李勉為母所言恭召就責問因為陳父母恩德勉慙悔返恭為政專以德化不任刑罰亭長敕令還牛亭長不還如是者三遂不還恭涕泣曰德化不行也欲解印綬去掾吏涕泣因爭亭長即還牛詣獄受罪恭貫出不問於是吏民敬信皆不忍欺是時天嘗蝗獨不入中牟界河南尹袁安恐有不實使部掾肥親案行之皆如所言恭隨親行阡陌坐桑下雉過止其側旁有小兒親曰兒何不擊雉小兒曰雉方將雛雊親默然而起曰今來考君之短耳蟲不犯境此一異也化及鳥獸此二異也竪子有仁心此三異也府掾久留但擾賢因還府以狀白安安美其治是年嘉禾生縣庭中安具以狀上詔舉賢良方正恭薦中牟人王方天子徴方公車禮之與公卿舉賢者同上即位徴為博士侍中車馬每出郊廟恭常陪乘上顧問之語及政治有便於民者無所隱諱十四年春二月修西海郡三月戊辰上臨辟雍亭射大赦天下夏六月封中常侍鄭衆為列侯賞討竇氏之謀也衆南陽人明帝時以謹愼事太子家章帝即位為中常侍竇憲專權內外蟻附衆獨不交結一心王室竇氏既誅遷大長秋天子常與謀國事閹官專權自衆始焉辛卯皇后隂氏廢初后與外祖毋鄧祀呪詛詔中常侍張禛尚書陳褒於掖庭窮治其獄父綱自殺兄軼等徙合浦毋及后二姨毋徙日南祀等內外親皆免歸本郡冬十月辛卯立皇后鄧氏后鄧訓女也訓閨庭甚嚴諸子進見未嘗賜席至於后事無大小每輒咨之弟邠曰平生不與諸男語今豈年哀邪訓曰我不是女也雖小諸兒無及者必有益於我家是以竒之𥘉鄧禹佐命位冠諸臣常言曰我常將百萬衆秋毫不犯未嘗妄殺一人子孫必當大興訓嘗為謁者治石臼河甚有方活數千人謂弟邠曰吾聞活千人者有封子孫豈其然乎訓生五男三女長男隲次京次悝次弘次誾長女燕次綏即后也次容后年五歲祖母為翦髮老人目冥并中后額忍痛不言一額盡傷左右怪而問之后曰大夫人慈恩為斷髮難傷老人意故忍之耳后姊燕早卒有遺腹女娥在襁褓后年十二傷娥早孤躬自飬撫由為閨門所敬與叔父邠及諸兄語常問祖父禹為布衣佐命時事邠茍説結髮殖業著名鄉閭遭世龍飛興杖䇿歸得征伐四方天下大定功成之後閨門自守事寡姊盡禮敬子孫法遭光武皇帝憂悲哀吐血因發病薨后未嘗不歎息流涕言立德之苦乃至于斯後通論志在經書不問家事后毋非之曰女人書足注疏通一孝經而巳今不務女工長大寧舉博士邪后不欲重違毋意晝則修女工夜則讀經傳宗族皆號曰諸生𥘉相工蘇大偏相家人至后大驚曰此成湯之骨法也貴不可言室家乃竊喜而不數傳后長七尺二寸年十六以選入掖庭為貴人承事隂后夙夜兢兢撫接同列常克已以下之遂有寵每􅍚上輒令母兄入視醫藥不拘以日數后輒言外家久在省中令陛下有私妾之譏下令妾𬒳內顧不知足之謗上下有損誠不願也上曰他人以數入為榮而鄧貴人反為憂誠難及也諸貴人競自修飾后獨衣不求綵裳令侍者賫羸衣設與隂氏同服即時解易不欲同服避正統也上乃歎曰修德之苦乃如是也上每訪問政事謙退不敢對欲令隂后得進不獲巳然後塞所問隂后短小舉止時失儀左右掩口而笑后獨愴然不樂為之隱諱若已之失及與隂后進止不敢正立坐則為之僂所以苦心曲體勞謙甚至上愈重之后每當進見輒以􅍚退御左右常為上言繼嗣不多當普施恩惠以獲子孫發言懇惻形于顔色隂后素妬見寵甚多設方巧欲以危后上嘗病隂后曰我得意之後皆當夷滅之后恐舉宗受禍流涕曰竭節以事隂后可謂至矣竟不為所祐而當獲罪於天無相禱婦人雖無從死之節然越姬有必死之志上可以報上厚恩次可解宗親之禍下不令隂氏有人豕之譏即欲飲藥會宫人救止因詐言屬有來者陛下病以差信以為然故止其後宫人告隂后巫蟲事后涕泣救護無所不至自隂后之廢上歎曰聖后之尊與帝同體承宗廟毋天下誰能當之唯鄧貴人德冠後廷為能光之耳初隂后時諸家四時貢獻以奢侈相高器物皆飾以金銀后不好玩弄珠玉之物不過於目諸家歲時裁供𥿄墨通殷勤而巳後自入官後遂博覽五經百家圖讖無不畢覽善易及隂陽占候希有者上每欲官秩后諸兄輒推誠固讓自抑為務故隲終帝世不過虎賁中郎將隲虎賁郎時京悝弘闓黃門郎京早卒贈以騎尉印綬丁酉司空韓稜薨大司農徐防為司空稜字伯師頴川舞陽人幼失父母與孤弟居壯大推家財數百萬與從昆弟鄉里高之仕郡至功曹太守葛興􅍚錯亂稜輔助經年政令無闕興子嘗出教轉吏稜封還不聽訟書以稜掩蔽興􅍚專郡事不得復為吏後解禁綱辟司空府稍遷至尚書令在機密數有忠言進用良吏章帝以稜憂國忘家夙夜匪懈數賞賜之是時郅夀陳寵俱為尚書皆以才能見重帝賞三人寶劒手自題其名韓稜龍泉郅夀漢文陳寵鍛成論者以為稜淵深有謀故得龍泉夀含章明逹故得漢文寵敦朴內濟故得煆成防字謁卿沛國銍人也矜嚴有容貌𥘉為郎明帝見而異之權為尚書郎在臺閣十餘年未嘗有過稍遷至少府大司農憂勤於衆事所在著名迹十五年春二月出廪貸郡國𬒳災貧民各有差夏四月甲子晦日有蝕之冬十月戊申行幸章陵祠舊宅園廟戊午行幸雲夢是時廣陵人王渙為洛陽令治有異迹𥘉渙遊俠尚氣晚節好儒術為治修名責實抑強扶弱并官職吏輒兼書佐小史無事皆令讀孝經病卒官百姓無老幼皆叩心泣涕相賦斂為祭者數千人渙喪當還鄉里新安道以西道旁往往會聚設祭吏問其故盛言平常到洛為吏卒所抄奪王君到洛不復侵擾故欲報恩後民思其德為立祠安陽亭西每有酒食輒弦歌薦之十六年二月以兖豫徐兾民榖不登三遣府掾分行貧民勸民盡地利貧無所耕者為顧夏客星入紫微宫秋七月辛酉司徒魯恭䇿免􅏤午光祿勳張酺為司徒八月巳酉司徒張酺薨酺病困敕其子曰顯節陵掃地露祭欲率天下以儉也吾為三公不能使從制豈可犯之乎無起祠堂露祭而巳上聞酺薨愍焉縞素即賜以印綬冡塋恩寵隆加于相酺字孟侯汝南細陽人永平中崇尚儒術學自皇太子諸王侯及臣子弟莫不受經又為外戚樊氏郭氏馬氏諸子弟立學號曰四姓小侯置五經師酺以明經充焉除廣平郎中每朝會進見輒講於上前辭義高亮音動左右上新即位應在祠朝廷為出為外郡內不自得上疏願留左右上不聽賜錢三十萬亟發之官酺雖儒者剛而有斷下車擢用賢俊挫擊豪強旬月之間郡中肅然酺既出上見諸王師傅曰東郡太守張酺講授畢輒諫正誾誾時有小善稱之不巳忠言蹇蹇有史魚之風初賈逺明古學曹裒制漢禮酺常非之及為太尉上疏陳其不可書五奏上知酺守學不通寢其奏者十月辛卯司空徐防為司徒大鴻臚陳寵為司空徴巨鹿太守魏霸為將作大匠霸濟隂人也少失父母兄弟同居數十年妻子數執勤苦動則推讓為群妻子不之官霸以兄嫂勤而巳獨榮樂常衣布蔬食敕妻子親之耕𧖟與兄弟子姪同勞逸為寬恕而巳不求備於一人掾吏有過輒私責改不改休罷之終不暴揚其惡吏有相讚者輒歎息曰某甲賢者也不及人短太守以是重之其人慚責自引退郡中化之皆和睦後拜太常以病致仕為光祿太夫霸妻死長兄伯為霸取妻送至官舍霸笑曰年老兒子備具何養他家婦邪自入拜其妻曰夫人視老夫何空中直而空逺來使計義不相屈即拜而出妻慚求去遂送還之胸奴北單于遣使奉獻元興元年春三月追爵諡皇后父鄧訓為平夀敬侯司空陳寵以非舊典也太尉張酺太尉張禹司徒徐防以為冝封爭之連日乃從禹防議由是虎賁中郎將有恨寵夏四月封鄧禹馮魴後為列侯丙午大赦天下五月癸酉扶風雍地震十二月辛未帝崩于嘉德殿初數失皇太子養於民間羣臣無知者莫不惶懼鄧后乃收皇太子於民間皇子勝長有􅍚皇子隆生百餘日后養之太后乃引兄等定䇿禁中立隆為皇太子是日即皇帝位太后攝朝賜天下男子爵各有差鰥寡孤獨篤㾣不能自存者者粟人三斛封皇子勝為平原王詔曰昔唐虞之盛猶待四輔周文之寧實在多士漢興舊制咸冝保傅並建左右以參聽斷太尉禹三世在位黃髮罔愆司徒防竭力致身先帝嘉之其以禹為太傅防為太尉參録尚書事百官總巳以聽政𥘉郡國定符瑞八十餘品和帝恐虛妄抑而不宣後漢孝章皇帝紀卷第十四
