body:
  text: 後漢孝獻皇帝紀卷第二十七袁宏三年春正月丁丑大赦天下牛輔遣李傕郭汜張倕賈詡出兵繫關東先向孫堅堅移屯梁東大為傕等所破堅率千騎潰圍而去復相合戰於陽人大破傕軍傕遂掠至陳留潁川荀彧鄉人多被殺掠帝思東歸使侍中劉和出關詣其父太傅劉虞令將兵來迎道經南陽袁術利虞為援質劉和不遣許以兵至俱西命劉和為書與虞虞得書遣數千騎詣術公孫瓉知術有異志不欲遣乃止虞虞不從瓉懼術聞而怨之亦遣其從弟越將千騎詣術以自結隂教術執和奪其兵由是虞瓉有隙初五原人吕布便弓馬膂力過人既殺丁原董卓信愛之誓為父子卓自以遇人無禮恐人謀巳行止常以布自衛卓性剛𥚹忿不思難嘗以小失意拔手戟擲布布捷避之為卓致謝卓意亦解由是隂怨卓嘗使布守中閣布與卓侍婢私通恐事發覺心自不安司徒王允以布州里壯健厚接納之布詣允陳卓幾見殺狀允與僕射士孫瑞密謀誅卓是以告布使為內應布曰奈如父子何允曰君自姓吕本非骨肉今憂死不暇何謂父子遂許之夏四月辛巳帝有疾既瘳大會羣臣於未央殿卓置衛自其營至於掖門士孫瑞使騎都尉李順將吕布親兵十人偽著衛士服於掖門卓將出馬散不進卓怪之欲還布勸之遂行入門衛士以戟刺之卓衣內有鎧不入傷臂墜車大呼曰吕布何在對曰在此布曰有詔趣兵斬之卓罵曰庸狗敢如是邪遂斬之卓母子皆誅之尸於市司徒王允使人然火卓腹上臭乃埋之卓字仲潁隴西臨洮人少好任俠嘗遊羌中盡與諸帥相結後歸耕於野而豪帥有來從之者卓與俱還殺耕牛相與宴樂諸豪帥感其意歸相斂得雜畜千餘頭以贈之卓桓帝末以六郡良家子為羽林郎有才武膂力雙帶兩鞬左右馳射稍以軍功遂至大將軍卓之死蔡雍在允坐聞卓死有嘆惜之音允責雍曰國之大賊弒主殘臣天地所不覆人臣所同疾君為王臣世受國恩國主危難曾不倒戈卓受大誅而更嗟歎禮之所去刑之所取使吏收付廷尉治罪雍謝允曰雖不忠猶識大義古今安危耳所厭聞口所常説豈當以背國而向卓也狂瞽之言謬出患入所謂雍也願黔首為刑以繼漢史公卿惜雍才咸共諫允允曰昔武帝不殺司馬遷使作謗書流於後世方今國祚中微戎馬在郊不可令佞臣執筆在幼主左右後令吾徒受謗議遂殺雍雍字伯喈陳留圉人也博學有雋才善屬文解音聲伎藝并術數之事無不精綜初辟司徒府吏遷郎中著作東觀以直言𬒳刑初太尉董卓見雍甚重之舉高第輔御史又轉治書御史尚書三月之間周歷三臺左中郎將封高陽侯於是以吕布為奮武將軍假節開府如三公初黃門郎荀攸與議郎鄭泰何顒侍中种輯謀曰董卓無道甚於桀紂天下怨之雖資強兵實一匹夫耳今直刺殺之以謝百姓然後據殽函挾王命以號令天下桓文之舉也事垂就而發覺收顒攸繫獄顒憂懼自殺攸言笑飲食自若會卓死得免棄官歸鄉里兖州刺史劉岱為黃巾所殺東郡刺史曹操為兖州牧繫黃巾破之降者三十餘萬人五月丁未大赦天下征西將軍皇甫嵩為車騎將軍董卓既死牛輔為其麾下所殺李傕等還以輔死衆無所倚仗欲各散歸既無赦書而聞長安中欲盡誅涼州人憂恐不知所為賈詡曰聞長安中議欲盡殺涼州人而諸君棄衆單行即一亭長能束君矣不如率衆而西所在收兵以攻長安為董公報仇幸而事濟奉國家以正天下若不濟走未晚也衆以為然遂將其衆而西所在收兵攻至長安衆十餘萬卓故部將樊稠等合兵圍長安劉表與袁紹連和袁術怒召孫堅攻表戰於新野表退屯襄陽堅悉衆圍之表將黃祖自江夏來救表堅逆擊破祖乘勝將輕騎追之為祖伏兵所殺堅子䇿權皆隨袁術六月戊午長安城陷呂布與戰不勝將數百騎奔冀州傕等入城內殺太常种弗太僕魯猷大鴻臚周奐城門校尉崔烈越騎校尉王順死者數十人司徒王允挾乘輿上宣平城門允謂傕等曰臣無作威作福而乃放兵縱橫欲何為乎傕曰董卓忠於陛下而無辜為吕布所殺欲為卓報布不敢為逆爾請事竟詣廷尉受罪巳未大赦天下拜李傕為揚武將軍郭汜為揚烈將軍樊稠等皆為中郎將甲子李傕殺故太尉黃琬司徒王允及其妻子衆庶為之流涕莫敢收允故吏京兆趙戩葬允上以允為忠封其孫異為安樂侯允字子師太原祁人容儀雅重非禮不動郭林宗稱允曰宰相才也與之友善仕為郡主簿太守劉偉受宦者趙津請託召中都路拂為五官掾允以拂狡猾不良封還偉教至於四五坐鞭杖數十終不屈撓拂由是廢棄而允名震逺近拂富於財賔客數百深怨允常欲害之允從者不過數人每與拂遇允常坐車中按劒叱之拂輒不敢當辟司徒府稍遷豫州刺史黃巾賊别黨起於豫州允擊大破之於是賊中得中常侍張讓書允具以聞靈帝帝深切責讓讓辭謝僅而得免讓由是怨允譛之於靈帝詔徴允治罪道遇赦還官後百餘日復見徴太尉楊賜與允書曰若以張讓事百日再徴宜深思之允故吏流涕進藥允棄而不飲會大將軍何進請允得減死一等遂變名姓隱遁山藪後何進表允為從事中郎遷河南尹太僕及在公輔值國家禍亂允外相彌縫內謀王室甚有大臣之度自天子及國中皆倚允卓亦雅信焉卓既死與士孫瑞議赦卓部曲既而疑曰部曲從其主耳今若名之惡逆而赦之恐適使深自疑非所以安之也乃止或説允曰卓部曲素憚袁氏而畏關東若一旦解兵開關必人人自危不如使皇甫嵩領其衆因使屯陜以安之徐與關東通謀以觀其變允曰不然關東舉義兵者皆吾徒也今若距險屯守陜雖安涼州人而疑關東之心也吕布將奔謂允曰公可去矣允曰安國家吾之上願也若其不獲則殺身以奉朝廷幼主恃我而巳臨險難苟免吾不為也努力謝關東諸公當以國家為念黃琬字子琰太尉瓊之孫也為五官中郎將所選舉皆貧約守志者諸權富郎共疾之構琬以為黨遂免官禁錮幾將二十年司空楊賜深敬重之上書薦琬有撥亂之才由是徴拜議郎權為青州刺史遷侍中尚書中平末涼州叛大將軍出征軍調不足富殖之徒多以財為官者或起家為州郡琬由是奏太尉樊稜司徒許相皆竊位懷祿苟進無耻終無匡救之益必有覆公折足之患宜皆罷遣以清治路軍費雖急禮義廉耻國之大本也苟非其選飛隼在墉為國生事此猶負石救溺不可不察頃之遷右扶風歷九卿徵為豫州牧值黃巾陸梁民物凋弊延納豪俊整勒戎馬征討羣賊威聲甚震是時上遣下軍校尉鮑鴻征葛陂賊鴻因軍徵發欲盜官物贓過千萬琬乃紏奏其姦論鴻如法琬既名臣又與王允同謀故及於難傕兵之入長安太常种弗曰為國大臣不能禁暴禦悔使白刃向宫去將安之遂戰而死弗字潁伯司徒皓之子也弗子邵為使者嘗忤於卓左遷涼州刺史徴為九卿辭曰我昔盡忠於國為邪臣所妬父以身徇國為賊所害夫為臣子不能除殘去逆何靣目復見明主哉三輔之臣聞之莫不感慟焉初南陽何顒河內鄭泰好為竒畫顒逮郭林宗與之遊學及黨事起顒以被禁錮乃變姓名亡匿汝南所至皆結豪傑名顯荆豫之間靈帝末君子多遇禍難顒歲中率常再三私入洛陽為人解釋患難泰知天下將亂隂交結豪傑家冨於財有田四百頃而食常不足名聞山東王室西遷泰以尚書郎從入關是時京師飢乏士人各各不得保其命而泰日與賔客高會作倡樂仰泰全濟者甚衆長安既亂南奔袁術術以泰為揚州刺史未至而卒丙子前將軍趙謙為司徒尚書令朱雋之出奔也與孫堅俱入洛陽既而屯於中牟李傕等既破長安懼山東之圖巳而畏雋之名傕用賈詡計使人徴雋軍吏皆不欲應雋曰以君召臣義不俟駕况天子詔乎且傕汜小豎樊稠庸兒無他逺略又勢均力敵內難必作吾乘其弊事可圖也遂就徴為太僕秋七月李㴶使樊稠至郿葬董卓大風暴雨流水入墓漂其棺椁庚子太尉馬日磾為太傅録尚書事八月辛未車騎將軍皇甫嵩為太尉使太傅馬日磾太僕趙岐持節鎮關東初孫堅殺南陽太守張咨袁術得據其郡南陽戶口數百萬而術奢淫肆欲徴發無度百姓苦之既而與紹有隙又與劉表不平引軍入陳留曹操袁紹會擊術大破之術將餘衆奔九江殺楊州刺史陳溫領其州李傕等欲術為援因令日磾即拜術為左將軍封陽翟侯假節日磾趙岐俱在壽春岐守志不撓術憚之日磾頗有求於術術侵侮之從日磾借節視之因奪不還日禪欲去術又不遣病其所守不及趙𡵨嘔血而死九月揚武將軍李傕為車騎將軍封池陽侯領司隸校尉假節郭汜為後將軍封郿陽侯樊稠為右將軍封萬年侯㴶汜稠擅朝政張濟為驃騎將軍平陽侯屯弘農初董卓入關説韓遂馬騰共圖山東遂騰見天下方亂亦欲起兵倚卓卓死傕汜攻破京師遂騰將兵救天子是月遂屯郿騰屯鄠司徒趙謙以久病罷甲申司空淳于嘉為司徒光祿大夫楊彪為司空録尚書事冬十月荆州刺史劉表遣使貢獻以表為荆州牧初弘農王唐姬者故會稽太守唐瑁女也王薨人欲嫁之不從及關中破為李傕所略不敢自説也傕欲妻之唐姬不聽尚書賈詡聞之以為宜加爵號於是迎置於園拜為弘農王妃李㴶舉博士李儒為侍中詔曰儒前為弘農王郎中令迫殺我兄誠宜加罪辭曰董卓所為非儒本意不可罰無辜也丁卯日有重暈太尉皇甫嵩以災異䇿免光祿大夫周忠為太尉録尚事嵩字義真規之兄子也善用兵為將飲食舍止必先將士然後至巳乃安焉兵曹有所受賂者嵩曰公素廉必用乏也出錢賜之吏慚即自殺董卓之入徴嵩為城門校尉嵩長史梁衍説嵩曰漢室微弱宦豎亂朝卓既誅之不能盡忠奉主而廢立縱意今徴將軍禍大則憂危禍小則困辱卓在洛陽天子來西以將軍之衆奉迎天子發命海內袁氏逼其東將軍逼其西則成禽矣嵩不從遂就徴有司承旨奏嵩下吏將殺之嵩子堅壽與卓素善詣卓請嵩卓免之華嶠曰臣父袁每言臣祖歆當時人以皇甫嵩為不伐故汝豫之戰歸功於朱雋張角之捷本之於盧植蓋功名者士之所宜重誠能不爭天下莫之與爭則怨禍不深矣四年春正月甲寅朔日有蝕之未晡八刻太史令王立奏曰日晷過度無有變色於是朝臣皆賀帝密令尚書候焉未晡一刻而蝕尚書賈詡奏立司候不明疑誤上下太尉周忠職所典掌請皆治罪詔曰天道幽逺事驗難明且災異應政而至雖探道知微焉能不失而欲歸咎史官重益朕之不德不從於是避正殿寢兵不聽事五月丁卯大赦天下徐州刺史陶謙遣使奉貢以謙為徐州牧癸酉無雲而雷六月華山崩東海王子琬琅邪王弟邈詣闕貢獻以琬為平原相邈為九江太守皆封列侯太尉周忠以災異罷太僕朱俊為太尉録尚書事巳酉以平原相劉備為豫州牧是時新遷都宫人多無衣服秋七月帝欲發太府繒以作之李傕不欲曰宫中有衣胡為復作邪尚書郎吳碩素諂於傕乃言曰關東未賔用度不足近幸衣服乃陵轢同寮尚書梁紹劾奏碩以瓦器奉職天臺不思先公而務私家背奧媚竈苟諂大臣昔孔子誅少正卯以顯刑戮碩宜放肆以懲姦偽若久舍不黜必縱其邪惑傷害忠正為患不細帝以碩傕所愛寢其奏是時帝使侍御史裴茂之詔獄原輕繫者二百餘人其中有善士為傕所枉者傕表之曰茂之擅出囚徒疑有姦故冝置于理詔曰災異數降隂雨為害使者銜命宣布恩澤原解輕微庶合天心欲解冤結而復罪之乎一切勿問七月甲午試耆儒三十餘人上第賜郎中次太子舍人下第者罷詔曰孔子歎學之不講不講則所識日志矣今者儒年餘六十離本土家餉不到當展四體以糊口腹幼童始學老委農野朕甚愍焉其不在第者為太子舍人冬十月太學行禮車駕幸宣平城門臨觀之賜博士以下各有差辛丑京師地震有星孛于天市占曰民將徙天子移都其後上東遷之應也司空楊彪以地震䇿罷丙午太常趙溫為司空録尚書事初公孫瓉與劉虞有隙虞懼其變遣兵襲之戒行人曰無傷餘人殺一伯圭而巳瓉放火燒虞營虞兵悉還救火虞懼奔居庸欲召烏桓鮮卑以自救瓉引兵圍之生執虞而歸是時朝廷遣使者殷訓增虞封邑督六州事以瓉為前將軍封易侯瓉誣虞欲稱尊號脅訓誅之於是虞故吏漁陽鮮于輔率其州人及三郡烏恆鮮卑與瓉所置漁陽太守鄒丹戰於蒯北大破之斬丹既而持其衆奉王命帝嘉焉袁紹又遣其將麴義及虞子合繫瓉瓉敗遂走還易先有童謡曰燕南垂趙北際中央不合大如礪唯有此中可避世瓉以為易當之乃築京固守積粟三百萬斛瓉曰昔謂天下事可指麾而定今日視之非我所決不如伏兵力田食盡此穀足知天下事矣初劉虞歎曰賊臣作亂朝廷播蕩四方俄然莫有固志吾為宗室遺老不得自同於衆今欲奉使展效臣節安得不辱之士乎衆咸曰田疇其人也疇字子泰右北平無終人也好讀書善擊劒時年二十二虞乃備禮請與相見大恱之遂署為從事與車騎將行疇曰今道路險逺冦虜縱橫稱官奉使為衆所指今願以私行期於得通而已虞從之疇乃選多少勇壯募從二十騎虞自出祖而遣之疇出塞外傍北山直馳趣朔循問經遂至長安致命詔拜騎都尉疇以天下方蒙塵不可荷佩榮寵固辭不受朝廷甚義三府並辟皆不就得報馳還未至虞巳為公孫瓉所殺疇至謁祭虞墓陳發章表哭泣而去瑣聞之大怒購求獲疇謂曰汝何故自哭劉虞墓而不送章報我乎疇曰漢報所言於將軍未美恐非所樂聞故不進也且將軍方舉大事以求所欲既滅無罪之君又讎守義之臣誠能行此則燕之士將蹈東海而死豈有思從將軍者乎瓉壯其對釋而不誅拘之軍下禁其故人莫得與之通或説瓉曰田疇義士君不能禮而拘囚之恐失衆心瓉乃遣疇疇北歸率舉宗族他附從者亦數百人掃地而盟曰君不報吾不可以立世遂入徐無山營深險平曠而居躬耕以飬父母百姓歸之數年間五千餘家疇謂其父老曰諸君不以疇不肖逺來相就衆成都邑而莫相統一恐非久安之道願推擇賢良長者以為之主皆曰善僉共推疇疇曰今來在此茍存而巳將圖大事復恐雪耻竊恐未得其志而輕薄之徒自相侵侮偷快一時無深計逺慮疇有愚計與君行之可乎皆曰可乃為約束相殺傷把盜爭訟之法法重至死其次抵罪二十餘條又制為婚姻嫁娶之禮興學校講授之業班行其衆衆皆便之道不拾遺北邊翕然服其威信烏桓鮮卑並各遣屬通好疇悉撫納令不得為冦袁紹數遣使命又即授將軍印綬皆距而不當之十二月辛丑司空趙溫以地震罷乙巳衛尉張喜為司空録尚書事分漢陽郡為永陽郡是歲袁術使孫䇿略地江東軍及曲阿揚州刺史劉繇敗績將奔會稽許邵曰會稽富䇿之所貪且窮在海陽不可往也不如豫章西接荆州北連豫章若收合吏民遺貢獻焉與曹兖州相聞雖有袁公路隔在其間其人豺狼不能久也足下受王命孟德景升必相救濟繇從之邵字子將汝南平輿人也少讀書雅好三史善與人論臧否之談所題目皆如其言世稱郭詩之鑒焉廣陵徐球為汝南太守請邵為功曹球亦名士解褐事之同郡陳仲舉名重當時鄉里後進莫不造謁邵獨不詣蕃謂人曰長幼之序不可廢也許君欲廢之乎邵曰陳侯崖岸高峻百谷莫得而往遂不造焉嘗至潁川不詣陳仲弓或問其故邵曰此君之道廣廣則不周故不行也同郡袁季初公族豪俠賔客輻輳去濮陽令歸從車甚盛將入郡界歎曰吾輿服豈可令許子將見之乎謝遣賔客以單車歸家邵之見憚皆此類也司空楊彪辟不就舉方正公車徴不行或勸邵邵曰方今小人道長王室將亂吾欲避地淮海以全老幼及天下亂邵至廣陵徐州刺史陶謙禮之甚厚邵曰陶恭祖外好聲名內非其真今徐州榖貴小人在側方厭賔客待吾雖厚其勢必薄乃渡江投劉繇其後謙捕諸寓士陳留史堅元陳郡相仲華逃竄江湖皆名士也邵與劉繇俱行終于豫章焉興平元年春正月辛酉大赦天下甲子帝加元服二月戊寅有司奏立長秋詔曰皇妣宅兆未卜三年之戚禮不言吉朕雖不能終身思慕其何忍言後宮之選乎於是太尉朱雋司徒淳于嘉司空張喜奏曰春秋之義母以子貴宜改葬皇妣追上尊號曰穆宗恭宗故事甲申改葬皇妣王氏號曰靈懷皇后后邯鄲人祖苞治尚書為五官中郎父章襲苞業居貧不仕有子二人男斌女曰榮榮則后也后以選入掖庭為貴人有寵妊身怖畏何后服藥欲除胎胎安不動又夢負日而行遂生帝何后惡之鴧殺靈后帝大怒欲廢何后諸黃門請僅而得止靈帝憫上早孤追思王后乃作令儀頌初上詔求斌斌將妻子詣長安賜第宅田業遷執金吾封都亭侯丁亥車駕耕于藉田是時李傕等專亂馬騰等私求不獲騰怒以益州牧劉焉宗室大臣遣使招引欲共誅傕等焉遣子範將兵就騰岐州刺史种邵太常拂之子拂為棹所害中郎將杜稟與賈詡有隙並與騰合報其讐隙於是傕騰擕二上遣使者和之不從轉遂率衆來欲和傕騰既而復與騰合壬申騰遂勒兵屯平樂觀將圖長安傕使樊稠郭汜及兄子李利擊騰遂破之邵範等皆死遂西走稠追之遂謂稠曰天地反覆未可知本所爭者非私怨王家事耳與足下州里雖小有違要當大同欲相與善語而不意後不可復乃交馬共語良久别去庚申赦騰夏四月以馬騰為安狄將軍遂為安降將軍徐州牧陶謙比海相孔融謀迎天子還洛陽會曹操襲曹州而止陳留太守張邈反吕布為兖州牧郡縣皆應之唯甄城范陽東阿三縣不從邈使人告荀彧曰吕布將軍來助曹使君繫陶謙宜給其食衆皆疑彧知邈為亂即勒兵設備時操軍攻謙留守少而布督將大吏多與邈謀其夜或誅謀叛者數十人衆乃定豫州刺史郭貢率衆數萬人來至城下彧言與吕布同謀衆甚懼貢求見彧彧將往或曰君一州鎮也往必危不可彧曰貢邈分非素結今來速計必未定及其未定説之縱不為用可使中立若先疑之彼將怒而成計貢見彧無懼意謂甄城未易攻也遂引兵去操引軍還攻吕布五月即拜揚武將軍郭汜為復將軍更封美陽侯安集將軍樊稠為右將軍開府如三公六月丙子分河西郡為雍州丁丑京師起震戊寅又震乙酉晦日有蝕之避正殿寢兵不聽事五日秋七月壬子太尉朱雋以災異䇿罷戊午太常楊彪為太尉録尚書事甲子即拜鎮南將軍楊定為安西將軍開府如三公自四月不雨至于七月詔使侍御史侯汶洗囚徒原輕繫上避正殿於是榖貴大豆一斛至二十萬長安中人相食餓死甚衆帝遣侍御史侯汶出太倉米豆為貧人作糜米豆各半大小各有差餓死者甚衆帝疑廪賦不實勑侍中劉艾取米豆各五升燒火於御前作糜得二盆於是艾出問書米豆五升得糜二盆而民委頓何也朕甚愍之民不能自濟故部使者出米豆兾有益焉御史不加隱恤乃如是乎尚書以下詣省閣謝奏收侯汶考治實詔曰未忍致于理杖五十亟遣上親所廪人名於是悉得全濟八月馮翊羌冦屬縣後將軍郭汜右將軍樊稠等率衆破之斬首數萬級九月曹操還鄄城吕布屯山陽冬十二月司徒淳于嘉久病罷衛尉趙溫為司徒録尚書事後漢孝獻皇帝紀卷第二十七
