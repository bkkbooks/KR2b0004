body:
  text: 後漢孝章皇帝紀卷上第十一袁宏建𥘉元年春正月燉煌太守王遵酒泉太守殷彭將兵五千人破車師耿恭遣吏范羌迎軍資於燉煌羌還與大軍俱西及車師破諸將欲還羌請迎恭諸將不肯羌固請之乃分兵二千人至踈勒城城中夜聞兵聲以為虜至皆恐羌呼曰我范羌也漢兵來相迎恭等皆稱萬歲乃開城門恭見悲喜垂涕相持明日隨軍俱還燉煌吏士餘十三人關寵病死以喪歸西域遂絶恭至司徒鮑昱以恭節過蘇武宜蒙爵土之賞不從上拜恭為騎都尉先恭未還恭毋亡自恨不得親飯啥追行喪服詔使五官中郎將馬嚴以牛酒釋恭服初班超與踈勒城王忠首尾吏士單少徒以恩義相撫數歲幾為龜兹所得及西域沒超孤絶有詔召超超發踈勒都尉黎弇以刀自刺之漢士棄我去勢不能白首當復為龜兹所屠誠不忍見漢使去故先自殺超到于闐王侯以下涕泣抱持超馬依漢如父毋誠不可去超度于闐終不聽其東又畢成本志乃復從于闐還踈勒超去後而兩城降龜兹超收捕反者斬之踈勒復安是時天小旱榖貴民飢丙寅詔曰比年飢旱民頻流亡朕甚懼之公卿二千石各推精誠專以民事為急罪非殊死且勿案驗立秋如故事有司明慎選舉進柔良退貪殘順時令理冤獄五教在寬帝典所美愷悌君子大雅所歎露布天下使明知朕意於是旱甚上問司徒鮑昱曰將何以復災昱曰臣聞聖人治國三年有成陛下即位未久就政有得失未足致異雖修禮樂崇德教亦足以移風臣前為汝南太守典治楚事但汝南一郡繫者千餘人恐未能盡當其罪先帝定大獄一起冤者過半又諸徙家骨肉離散孤魂不祀骸骨流離死生𬒳毒一人呼嗟王道為虧宜一切還諸徙家使生者悅懌死者得歸興滅繼絶和氣可致上從之即詔坐楚淮陽事徙者令歸本郡袁宏曰夫物有方事有類陽者從陽隂者從隂本乎天者親上本乎地者親下則天地人物各以理應矣故于其一物是虧其氣所犯彌衆所以寒暑不調四時失序蓋由斯也古之哲王知治化本於天理陶和在於物類故道之德禮威以刑戮使賞必當功罰必有罪然後天地羣生穆然交泰故斬一木傷一生有不得其理以為治道未盡也而况百姓之命乎夫致之也有物則病之也必深化之也有由則禳之也有術是以炎夏餘虐以成水旱之災也堯湯暫撫足免黎民之患由斯觀之自三代以下刑罰失中枉死無辜幾將半而欲隂陽和調水旱以時其可得乎若能寬以臨民簡以役物罰懼其濫雖不能萬物調暢同符在昔免夫甚泰之災固遠矣三月丙午隱強侯隂博坐驕溢膠東侯賈敏坐不孝皆免為庶人甲寅山陽東平地震詔三公二千石舉賢良方正能直言極諌之士各一人夏四月丙戍詔曰蓋褒德賞功興亡繼絶所以昭孝事親以旌善人故仁不遺德義不忘勞先王之令典也故特進膠東侯佐命河北列在元功衛尉隂興忠貞愛國先帝休之今興子輔向復孫敏頑凶失道自陷刑以喪爵土朕甚憐之其封復子邯為膠東侯興子貟為隱強侯秋七月辛亥詔以上林兩禦田賜鰥寡貧窮不能自存者冬十一月阜陵王延與子男魴等謀反延奢泰驕佚待下嚴刻永平中有上書告延謀反者辭所連及坐死徙者甚衆有司奏誅延明帝以至親不忍徙阜陵王延因以見侵怨望至是復有告延與子男魴等謀反者有司檻車徴延詣廷尉帝不聽詔貶延為阜陵侯赦魴等罪一切勿治延在國謁者一人當監護不得與吏民通司空長史江革為五官郎將每朝會天子常自禮之時又疾不會輒令太宫送飱醪恩寵莫與為比於是京師貴戚衛尉馬廖侍中竇憲等慕其行各奉書致禮革畏慎一無所受上益善之革字次伯齊國臨淄人也居家專心於孝養不為修飾之行務適親意而已嘗自為毋炊㸑不任妻子每至歲時當案比革以母老不欲勞動自在轅中挽車不用牛馬由是鄉里稱之曰江巨孝太守嘗以禮召之母老不應及母卒哭泣不絶聲常寢塜廬服竟不忍除太守遣掾釋服固請以為吏舉孝廉為郎補楚太僕月餘自劾去楚王英馳遣官屬追之遂不肯還復使中傅贈送辭不受既為中郎將復上書乞骸骨轉諌議大夫告歸遣子奐詣闕謝病篤天子思革篤行詔齊相曰諌議大夫江革前以病歸今起居如何夫孝百行之本冠衆善之始也國家每惟忠孝之士未嘗不及革也縣以見榖千斛賜巨孝嘗以八月長吏存問致羊一頭酒二斛終身以顯異行如有不幸祠以中牢由是巨孝之名行於天下廬江毛義以孝行稱南陽人張奉慕其名故往候之坐定而府檄適至以義為守令義喜甚動於顔色奉者志尚士也心賤之自恨來固辭去義母死棄官行服進退必以禮賢良公車徴皆不至張奉歎曰賢者之心故不可測往日之喜乃為親也所謂家貧親老不擇官而仕也天子聞而嘉之賜榖千斛八月長吏問起居加賜羊酒汝南薛苞字孟嘗喪母以至孝聞後母憎苞出令别居苞日夜號泣不肯去被歐打不得已廬住門外旦夕灑掃進養父怒之又廬於里頭晨昏不廢積歲父母慙而還之後行六年服喪過其哀而弟子求出居苞不能止乃中分財奴婢引其老者曰與我共事久若不能使也田廬取其荒者曰吾少時所治意所戀也器取朽者曰我服之久身所安也徴拜侍中苞性恬虗以死自乞有詔聽焉禮如毛義華嶠曰孔子稱孝莫大於嚴父嚴父莫大於配天則周公其人也子路曰傷哉貧也生無以養死無以葬子曰啜菽飲水孝也鍾鼓非樂云之本而器不可去三牲非孝養之主而養不可廢夫務器而忘本樂之過也崇養以傷行養之纍也故定以道養周公之禮致四海之祭定以義養則仲由之粥無驕慢之性夫患啜菽粥之粗千祿以求養是以祿親也孜孜於致孝孝成而祿厚者此能以義養也孔子稱孝哉閔子騫人不間於其父母兄弟之言言其孝皆合於道莫可復間也先代石氏父子稱孝子慶相齊人慕其言而治此殆所謂孝乎惟孝友于兄弟施於有政是亦為政也若二子者推至誠以為行行信於心而感於人以成名受祿可謂能孝養也二年夏四月徙羌降者於河東封汝南王舅隂堂為西陵侯楚王英子五人為列侯勿置於不得臣戊子有司依舊典奏封諸舅太后詔曰有舊典舅氏一人封也吾非謙而不為誠昧有可耳今水旱連年民流滿道至有餓餒者而欲施封爵上行之為失政臣受之為喪軀不可明矣先帝嘗言諸王財令半楚淮陽吾子不當與光武帝子等今何以馬氏比隂氏乎且隂衛尉天下稱之省中御者出不及履而至門此蘧伯玉之敬也又有好賢下士吐握之名親陽侯雖剛強微失理然有方略據地談論一朝無雙原鹿貞侯勇猛誠信此三人者天下選臣豈可及哉馬氏不及隂氏遠矣吾不才夙夜纍息常恐虧先后之法有毛髮之罪吾不釋也言之不舍晝夜而親屬犯之不止治喪起墳又不時覺是吾言之不立耳目之塞也吾萬乘主身服大練食不求甘左右旁人無香薰之飾但布帛如是者欲以身率服衆也以為外親見之當傷心自刻但發笑言太后素好儉前過濯龍門上見外家車如流水馬如龍吾亦不譴怒之但絶其歲用冀以默愧其心而猶駑怠無憂國忘家者知臣莫若君況親屬乎上固請封之太后詔曰吾反覆念之欲令兩善豈徒欲獲謙虛之名而令帝受不外施之恩哉竇太后欲封皇父曲周侯言髙祖要無軍功非劉氏不封今馬氏無功於漢不得與隂郭中興之后等也今輦轂下民食不造歲湯火之憂也奈何欲以此時封爵舅氏令吾無面目於園陵而令帝不知稼穯之艱難不可明矣吾巨冨貴重疊若再實木根必傷也且人所以欲封侯者欲以祿養親奉祭祀身溫飽也祭祀則受太官之賜其身則御府之餘尚未足邪而必當一縣封乎吾計之熟矣勿有疑至孝之行安親為上今遭變異榖價數倍憂惶晝夜坐起不安而欲違慈母之拳拳吾素剛急有胸中氣不可不慎子之未冠由於父毋巳冠成人則子之志念帝人君也吾以未逾三年之故自吾家族故得專之穰歲之後行子之志吾但當含飴弄孫不能復知政於是止不封初明帝寢疾馬防為黃門郎參侍醫藥及太后為明帝起居注削去防名上即位太后詔三輔諸馬婚親有囑託郡縣干亂吏治者以法聞防等治母喪起墳逾制度太后以為言即時削滅自後諸王公主家莫敢犯者率相效以素被服如一上下相承不嚴而化太后置織室於濯龍中內以自娛外以先女功衣大練御者秃裙不緣諸主家朝請望見后袍極粗踈反以為侍婢之數就視乃非人知者莫不歎息是時廖為衛尉防為城門校尉光為越騎校尉廖等皆好施愛士藉以各勢賔客爭歸之言事者多以為譏雖天子亦不善也秋盧水羌反以城門校尉馬防行車騎將軍與長水校尉耿恭率師征之司空第五倫諌曰臣愚以為貴戚可封侯富之不當豫於國事何者有過繩以法則負下竊聞馬防當西征臣誠以防親舅皇太后慈仁脫有纎芥之難為意此陛下之憂不從防遂出征大破羌恭到隴西上言宜令車騎將軍防屯漢陽以為威重昔安封侯竇融懷集羌胡聞其歡心子孫于今樂聞竇氏大鴻臚固前擊白山盧水聞固至三日而兵合卒剋白山盧水固之力也宜復遣固奉大使又薦臨邑侯劉復素好邉事明略卓異反以微過歸國宜令以功自效令復將烏桓兵所向必剋由是忤於防防令謁者李談奏恭不憂軍被詔怨望徴下獄免官本郡上欲為原陵顯節陵致國於是東平王蒼上疏諌曰臣竊見光武皇帝躬儉約之質覩終始之分初營壽陵且遵古制孝明皇帝大孝不違奉而行之不敢有所加焉至於自奉之禮尤為儉約謙謙之美於斯為盛臣愚以為園邑之興由秦以來非古之制丘隴且不欲其著明豈況郛郭哉上違先帝之心下造無益之功虗費國用動搖百姓非所以致和氣祈豐年也又以吉凶之教言之俗不欲無故繕修丘墓所有興起考之古法則乖禮典稽之時宜則違民欲求之吉凶未見其福陛下追考祖禰思慕無巳誠恐左右過議以纍聖心臣蒼誠傷二帝之美不暢於無窮也帝雅敬蒼從之而止三年春正月巳酉大赦天下詔東平王曰聞於師曰其物存其人亡不言哀而哀自至惟王孝友之性豈不能哉今以光烈皇后衣一篋遺王可時禮瞻以慰凱風寒泉之思又令後生子孫得見先后衣服迄今魯國孔氏猶有仲尼衣車明德盛者光靈遠也京都子孫亦各得一篋光武皇帝衣以賦諸國故不復送乙卯廣平王巨鹿王樂成王就國三月癸巳立皇后竇氏賜天下男子爵人二級三老孝悌力田人三級鰥寡孤獨貧不能自存者粟人五斛竇后勳女也勳尚沘陽公主生四男二女男憲次景篤瓌及后有容貌才能帝聞之數以問諸家及后女弟隨沘陽主入見長樂宫進止得適人事修備奉事太后下及侍御貢御問遺皆得其歡心太后異之上可意焉遂入掖庭后性敏給稱譽日聞太后緣上意乃立為后專後宫追爵諡勳為安成思侯憲兄弟親幸並侍宮省賞賜日盛自馬氏侯及王主親家莫不畏憚憲乘勢放縱奪沁水公主田主畏憲不敢爭左右莫敢言上嘗幸公主第問以田事憲託言借之後上知焉大怒詔以田還主切責憲曰此何異指鹿為馬久念使人驚怖昔先帝每以舅氏田宅為言而憲反奪貴主田何況小民哉難雕之人不可汲引吾捐棄汝等如孤雛腐鼠爾皇后毁服謝良久乃解由是帝不大受以位唯憲至侍中虎賁郎將焉景瓌皆黃門郎秋八月辛巳行車騎將軍防還京師車駕親幸其第後加賞賜上美防功令史官為之頌不使防歲舉吏二人冬十二月丁酉以行車騎將軍城門校尉如故位逾九卿班同三府置援吏十人上欲令衛尉馬廖朝會居防上將以優廖也辭曰朝廷以爵王道所由黜陟之序子得先父大臣列國之綱紀今以一臣亂朝廷臣不敢當也是歲班超率踈勒諸國破姑墨城上書求助臣竊見先帝欲聞西域校尉計思慮十有餘年乃發大䇿北擊胸奴西使諸國於是鄯善諸國咸願盡力破滅龜兹平通道若為百分西域未得其一臣誠願棄身曠野竟卒聖朝本志昔魏絳以晉大夫和集諸戎況臣乘聖漢之威萬死之志冀必立鉛刀一割之用前世議者皆曰取三十六國號為斬胸奴右臂遂定西域于今諸國西至日所入莫不向化各奉國珍前後不絶唯獨焉蓍龜茲未服從臣初與官屬三十六人在踈勒更遭厄難今巳五歲矣大小皆言依漢與天等以是效臣之能通蔥領蔥領通則龜兹可伐今宜拜龜兹侍子白霸為其國王以步騎數百送之與諸國連兵歲月之間龜兹可擒今來四月到踈勒臣請于闐莎車踈勒兵擊蠻夷計之上也臣區區竊幸西域平定陛下舉萬年之觴布大喜於天下天子覽超奏知西域可成議欲給超兵卒平陵人徐幹等素善超上疏願奮身佐超上以幹為假司馬將弛刑及義從千人詣超四年春二月􅏤辰太尉牟融薨上痛惜親自臨喪賵賜出於豐厚時融長子歸田里上以其餘子多小恐其喪有闕也乃使太尉掾吏教其威儀初光武勤治孝明好吏事風聲相勸俗頗苛刻司空第五倫以為政化之本宜以寬和為先及上即位崇寬而多恕於是倫上疏褒稱因以諷曰陛下即位以寬臨下舉賢良選寬博聖明殊絶非羣下所能及詔書每下務寬和而政急不解欲節儉而奢泰不止咎在俗弊臣下不稱故也臣聞為政三年有成必世而後仁光武皇帝承王莽之後加嚴猛為政因以成俗是以郡國所舉皆多辦職俗吏不應寬博之選臣聞其身不正雖令不從是以從上之行不從其言故曰以身教者訟今但進仁賢節儉者不過數人則俗必自化由形直者則影不得曲矣臣所以嘗懇懇欲行寬和者書記秦以酷急亡王莽亦以苛法自滅臣以為大戒夫隂陽和則歲豐君臣同則化成刺史太守以下初拜京師及道出洛陽者宜皆召見可以博觀四方因以察其人諸上書言事有不合者但報歸田里不宜加過怒以明在寬夏四月戊子立皇子慶為皇太子賜天下爵人二級三老孝悌力田人三級鰥寡孤獨貧不能自存者粟人五斛已巳靈夀王恭為彭城王常山王炳為淮南王汝南王暢為梁王辛卯封皇子伉為千乘令平春王癸卯封車騎將軍防為順陽侯衛尉廖為潁陽侯執金吾光為親汲侯廖等既受封上書讓位天子許焉皆以特進歸第於是竇氏始貴司空第五倫上疏曰當今百王之弊人民又巧咸趣邪路莫能守正虎賁將軍竇憲椒房之親出入省闥年盛志美卑謙樂善此其好士之風也然諸出入貴戚者率皆疵瑕禁固州縣無守納安貧之節希求進苟得之志更相扇動浮譽成雷蓋驕佚所從生也三輔議者至云以貴戚浣濯之猶解酲當以酒也險陂趨勢之徒誠不可親臣愚願陛下中宫嚴敕憲閉門自守無妄交通士大夫防其未萌慮於無形令憲永保福祿君臣交歡無纎介之隟此臣之願也倫志在奉公言事無所隱諸子或時諫止輒叱遣之每上事自為草不復示掾吏民或奏記輒便封上之曰臣任重憂深不能出竒策異謀吏民責讓臣者多謹並封上其無私若此然少藴藉不修威儀以此見輕甲戍司徒鮑昱為太尉南陽太守桓虞為司徒虞字仲春左馮翊萬年人也初為魯令以父母老去官二親既終訖乃仕稍遷南陽太守表賢黜惡校練名實豪吏無所容其姦百姓恱之為建武以來太守名稱無及虞者及為三公無他異政六月癸丑皇太后馬氏崩秋七月壬戍葬明德皇太后八月甲午詔曰賈貴人者奉侍先帝劬勞帷幄建𥘉之後以至親供養長樂宫昏定晨省夙夜匪懈今賜貴人赤綬安車一駟永巷宫人二百御府雜帛二萬匹大司農黃金千斤錢二萬詔既早離皇太后幸復承子道中心依依昊天罔極貴人南陽人明德馬后姊子也以選入宫為貴人生章帝馬后無子母而養之明帝謂馬后曰人未當自生子也但患養之不勤愛如巳子則愛敬如親生矣於是馬后遇帝感養育之恩遂帝名馬氏為外家故馬氏不蒙舅氏之寵袁宏曰夫剛健獨運乾之德也柔和順從坤之性也是以制教者本於斯男有專行之道女有三從之義君尊用專故人子不加爵於其父履柔體順故國君可得崇禮於其母古之道也能封賈氏之號不盡名稱之極求之典籍異乎春秋之義也是秋詔儒會白虎觀議五經同異曰白虎通五年春二月庚辰朔詔曰朕新離供養罪惡著衆上天降異止于朕躬非羣司之咎其咎朕而巳公卿能極諫朕之過失者各舉一人巖穴之德為先勿取浮華是時用永平故事吏治尚嚴尚書決事類近於重尚書陳寵上疏曰臣聞先王之政必以刑罰為首咨歎相戒者重刑之至也往者治獄嚴明以刑姦慝姦慝既平宜濟之以寬陛下即位率由此義數詔羣寮弘崇晏晏而有司執事未悉奉承治獄者急於榜格執憲者煩於詐欺或因公行私以聘威福違本離實捶楚為姦夫為政猶張琴瑟大絃急者小絃絶故子貢非臧孫之行猛而美鄭喬之仁政詩云不剛不柔布政優優方今聖德充塞照于上下宜因此時隆先聖之務蕩滌煩苛輕薄捶楚以祐蒼生廣至德也帝納寵言每事務於寬厚其後遂詔有司禁絶慘酷之制五十餘事寵性周密時有所表薦手書削草人不得知嘗稱人臣之義苦不能愼自在樞機謝遣門人不復教授絶知交惟在公家朝廷器之皇后弟竇憲侍中貴幸憲薦真定張林為尚書上以問寵對曰林雖有才能而行貪穢憲深以恨寵而上竟徴用林卒以贓汙抵罪夏五月戊辰太傅趙喜薨是時承平久宫室臺榭漸為壯麗扶風梁鴻作五噫歌曰陟彼北邙兮噫覽觀帝京兮噫宫室崔嵬兮噫民之劬勞兮噫尞尞未央兮噫上聞而非之求索不得鴻乃逃會稽依大家臯伯通以賃舂為事其妻息具食於鴻前不敢失伯通知其賢以客禮待之鴻當門吟詠著書十餘篇鴻病困篤與伯通及會稽大夫語曰昔延陵季札葬子於羸博之間不歸其鄉里愼勿令我妻子持尸具柩去衆曰要離古之烈士今伯鸞之清髙可令相近葬要離墓旁子孫歸扶風鴻字伯鸞髙抗不羣初扶風世家多慕其名欲以女妻之𬒳服華麗鴻甚惡之後鄉里孟氏有女容貌醜而有節操多求者女不肯往至年三十無嫁處父母問其所欲曰得賢如梁伯鸞者可矣父母曰伯鸞清髙汝安能稱之哉後鴻聞而求之遂許焉為服畢女求作布衣麻履及織作之具乃衣新婦衣入門積七日鴻不答婦跪牀下曰竊聞夫子髙義曽逐數婦而妾亦偃蹇數夫故來歸夫子而不見採擇鴻曰吾欲得裘褐之人可與俱隱深山爾今若乃衣綺縞白黑豈梁鴻所願者哉於是婦對曰妾恐夫子不願爾妾有隱居之具乃起椎髻衣布操作具而前鴻大悅曰此真梁鴻之妻也能成我矣字之德耀孟光無幾何妻曰常聞夫子欲隱居避世不欲榮爵以致憂患今何其默默也得無欲低頭就之邪鴻曰諾乃相隨之霸陵山耕耘織作以供衣食彈琴誦書以娛其志六年春三月辛卯琅邪王京薨諡曰孝王京光烈皇后少子而明帝母弟也恩愛特隆寵異諸國京亦孝友謙讓雅好經書光烈皇后崩帝手書以后之珍寶賜京京好治宫室窮極伎巧殿宇牆壁皆飾以金銀六月丙辰太尉鮑昱薨昱字文淵永之子也初為司隸校尉時胸奴新降召皇詣尚書使封胡降檄世祖遣小黃門宗厲問昱有所怪不昱對曰故事通官文書不著姓又當司徒露布怪司隸下書也世祖曰欲令天下知忠臣子復為司隸也及居三司善其事雖剛直不及永猶其風也昱子德少為黃門侍郎修至節有名稱官至大司農辛未晦日有食之秋七月癸巳大司農鄧彪為太尉東平王上疏請詔諸王朝各賜裝錢千萬東平王加五百萬七年春正月沛王東平王中山王東海王琅邪王廣陵王榆鄉侯東鄉侯朝使中謁者以乘輿服太官珍膳迎蒼於郊是時國邸皆豫受賜金帛牀帷充實其中駕親自循行上欲蒼先至待以殊禮詔滎陽令東平王至者徑追會蒼與諸王俱至滎陽使大鴻臚持節郊迎詔沛王東平王中山王讃拜不名天子親答拜所以寵光榮顯加於古典每入宫殿輒以迎至省闥及下廡會上嘗坐假皇后親拜於內蒼等皆鞠躬辭謝不自安歲餘大鴻臚奏遣諸王歸國上將留蒼封女三人皆為公主賜以祕書列圗有司復奏遣上乃手書與蒼曰骨肉天性昔念王久勞歷時欲署大鴻臚奏不忍下筆顧授小黃門中心戀戀惻然不能言蒼發上臨送之流涕而别復賜乘輿服御物珍寶輿馬錢布以億萬計詔遣中使追問起居相望於道袁宏曰章帝尊禮父兄敦厚親戚發自中心非由外入者也雖三代之道亦何以過乎嘗試言之曰夫不足則相資相資則見足見足則無求無求則相踈常人之性也何以知其然乎夫終朝之飯糟粳不飽壺餐之饋必習其鄰人者甘所不足也貴為王侯富有國家聲色之娛而忘其親戚者安其餘也故處不足則壺餐豆羔不忘其鄰人安其有餘徒鈞天廣樂必遺其親戚其勢然也故親戚之弊常在於富貴不在於貧賤其可知矣夫同隂以憩眷然相應者一遇之歡也同生異處敖然相忘者不接之患也故形神不接雖兄弟親戚可同之於胡越交以言色雖殊途之人猶有眷恨之心由斯觀之王侯貴人乘有餘之勢處不接之地唯意而欲恩情含暢六親和睦蓋以鮮矣古之聖人懼其如此故明儉素之道顯謙恭之義使富者不極其欲貴者不博其高里老且猶矜愛而况兄弟乎朝會以敘其儀燕享以篤其親聘問以通其意玉帛以將其心故欲不滿而和愛生情意交而恩義著也嗚呼有國有家者可不親乎夏六月甲寅廢皇太子慶為清河王皇子肇為皇太子初宋貴人有寵生太子慶會竇后寵盛心惡貴人外令兄弟求宋氏微過內令御者伺察貴人貴人嘗病思生莵令家求之竇后誣言欲呪咀上信之出貴人姊妹於丙舍使小黃門蔡倫考之竇后諷厲考者皆致以巫蠱事送暴室二貴人同時飲藥死並葬於濯龍中貴人扶風平陵人其先惠將軍宋昌後也父陽恬於榮勢不願仕官專以事親色養陽有女三人選入掖庭小貴人生太子慶拜陽為議郎二貴人既死陽免歸本郡幽閉之陽為人仁厚時人多救請者遂得免焉秋九月行幸河內魏郡辛卯令天下繫囚減罪各有差冬十月行幸長安祀園陵上召奉車騎都尉韋彪問以三輔舊事彪對訖因言巡省舊都宜録先帝功臣及其子孫上嘉納焉即封蕭何曹參霍光後為列侯擢為鴻臚卿彪字孟逹右扶風平陵人髙祖賢曾祖立成皆致位丞相彪父母卒三年不出廬毀瘠骨立醫治數年乃能起以至行聞舉孝廉為郎中以教授為事安貧樂道恬於進趨三輔自耆儒後學莫不慕之明帝聞彪之名有詔拜謁者賜以車馬衣服稍遷尚書魏郡太守上即位以病復為議郎遷左右中郎將長樂衛尉數陳政事歸於寬厚彪比上疏乞骸骨天子重彪禮讓拜為奉車都尉秩中二千石賞賜禮侔於親戚是時言事者多言郡國貢舉不以功次養虗名者纍進故守職者益懈而吏事陵遲彪議曰伏惟明詔憂勞百姓察察不舍晝夜垂恩選舉必務得人夫國以賢為本以孝為行孔子曰事親孝故忠可移於官是以求忠臣必於孝子之門夫人才行少能相兼是以孟公綽優於趙魏老不可以為滕薛大夫忠孝之人治心近厚煆鍊之人治心近薄斯三代所以直道而行在其所以磨之故在士雖不磨吏職有行美材高者不可以純以閥閲取然要歸在於選二千石二千石賢則貢舉皆得其人矣頃之彪復稱疾歸家賜布帛百匹榖三千斛彪清儉好施祿賜分與宗族家無餘財著書十二篇號韋卿子後漢孝章皇帝紀卷上第十一
