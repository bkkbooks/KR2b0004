body:
  text: 後漢灮武皇帝紀卷第八袁宏二十二年春閏月丙戌上幸長安祠園陵夏五月乙未晦日有蝕之六月伏波將軍馬援還京師是時梁松貴幸百僚憚之援嘗小病松來候見援獨拜牀下援安然受之松意不平諸子曰梁伯孫貴重將軍宜為之禮援曰我乃其父友也雖貴何得失禮由是不為權貴所愛援外坦薄而內備禮事寡嫂不衣冠不入閨其於人泛愛多容然見爵位而無實者笑曰刀不應齒士不聞耳何足畜乎有奇異於衆者雖在少賤必異待之援有籌䇿世祖曰伏波論兵常與吾合初援交址還書誡其兄子嚴敦曰吾欲汝曹聞人過失如聞父毋之名耳可得聞口不可得言也如論議人長短是非此吾所大惡也寧死不願聞子孫有此行也汝曹知吾惡之甚矣所以復言欲汝曹不忘之爾龍伯髙敦厚周愼口無擇言謙約節儉廉公有威吾重之愛之願汝曹效之杜季良豪俠好義憂人之急父喪致客數郡畢至吾愛之重之不願汝曹效之效龍伯髙之正不就猶為謹勑士所謂刻鵠不成尚類鶩者也效杜季良而不成陷為天下輕薄子所謂畫虎不就反類狗者也迄今季良尚未可知郡將下車輒切齒州郡以為言吾常為之寒心是以不願子孫效也季良名保為越騎司馬保怨家上書言保所在惑衆伏波將軍萬里還書以戒孤兄子今在京師與梁松竇固等交上召責松松叩頭流血乃召問援因取所與嚴敦書即日免保官時龍伯髙為山都長擢為零陵太守秋九月地震詔南陽郡勿輸今年田租南陽繫囚減死罪一等是歲胸奴國中亂諸將多言可繫者上以問朗陵侯臧宮宮曰願得五千騎足以立功上笑曰常勝之家難與慮敵吾方自思之遂不出師胸奴之族由來尚矣其在殷周則有山戎獫狁之難逮于秦漢而有胸奴強弱之勢中國征之事詳矣王莽時欲分胸奴胸奴大怒縱兵犯塞傷殺吏民莽乃盛兵以擊胸奴嚴尤諫曰臣聞胸奴為害所從來久矣周秦漢征之然皆未有得上策者周得中策漢得下策秦無策也當周宣王時獫狁內侵至于涇陽命征之盡境而還視戎狄之侵譬猶蚊虻之蟲驅之而已故天下稱明是為中策武帝選將練兵深入遠戍雖有剋獲之功胡輒報之兵連禍結三十餘年中國疲耗胸奴亦困而天下弊是為下策秦始皇不忍小恥而輕民刀長城之固延袤萬里轉輸之行起於負海強境既完中國內竭以喪社稷是為無策也莽不從胸奴遂叛北邉大擾世祖之初方憂中國未遑外事也初胸奴右日逐王北單于知牙斯之長子也自呼韓耶單于死後更令兄弟相傳知牙斯死傳弟臧咸臧咸死傳弟輿輿立欲傳其子然其弟知牙帥川次當為單于者也皆以兄弟言之知牙帥當立以子言之我前單于長子也輿疑之輿死子焉鞮立鞮死弟滿奴立比遂失次怨恨而胸奴國中旱蝗連年草木皆盡人畜死者過半比乃遣人奉胸奴圗詣西河求和親盡牧南邉諸部呼衍日逐等叛胸奴胸奴遣萬餘騎擊比不勝呼衍日逐等共立比為呼韓邪單于孝宣時其大父呼韓耶歸漢得成故襲其號於是有南北單于二十三年春正月南郡蠻夷反武威將軍劉尚擊破之置江夏郡三月南單于遣使稱藩願修舊約天子議於公卿咸以為蠻夷猾夏情偽難知不可許大司農耿國以為今天下初定尤宜受之令東撫烏桓北拒胸奴邉陲永息干戈之役萬世之策也上善而從之使中郎將假柳使胸奴於是單于拜伏受詔遣弟左賢王將兵擊北單于連破之北單于震怖却地千里單于既稱臣入居塞內上書遣子貢獻漢賜單于冠帶衣裳黃金龜璽什物各有數單于乃分部諸帥以鄣北邉北單于惶恐願還所略漢人數遣使詣武威求使者皇太子以為南單于新立今若遣使恐阻南單于意故但報其書不遣使者冬十二月武溪蠻夷反遣劉尚擊之尚軍沒驃騎大將軍杜茂鬲侯朱祐祝阿侯陳俊薨朱祐貴儒學論議常依古法為將帥受降追奔逐北以破敵為功不問斬首多少軍吏以不得鹵掠故或有怨者徙封鬲侯食邑七千餘戶自陳功薄而賞大願受南陽五百戶足矣上不許𥘉上學長安嘗過祐祐方講留上須講竟乃共宴語及上幸祐第語及平生上曰主人得無捨我講乎二十四年春正月乙亥大赦天下大司空杜林薨太僕張純為大司空林字伯山右扶風茂陵人父業以文章顯林少有俊才好學問沈深好古家既多書又外家張竦父子善文章林從竦受書漸漬內外為當世通儒王莽敗盜賊並起林與弟成俱至河西隗囂聞林名故深敬待之以為治書後以病去囂欲超用之遂稱痼疾囂心恨林曰杜伯山天子所不能臣諸侯所不能友蓋伯夷叔齊恥食周粟也今且從師友之位以從其志焉林雖困乏終為不屈林嘗得漆書古文尚書一卷獨寶愛之每遭困厄自以不能濟於衆也猶握抱此經獨歎息曰古文之學將絶於此邪至建武初弟成死故林持喪東歸囂既遣林後悔令刺客楊賢於隴遮刺林賢見林自推車載弟喪歎曰當今之世誰能行義者我雖小人何忍殺義士亡去上聞林巳還乃徴林拜侍御史引見問經書故舊及西州事上甚悅賜車馬衣被歲餘遷司馬直百僚知林以名得用甚敬憚之林既至京師與英俊集會咸敬林之博雅洽聞河南鄭興東海衛宏等皆長於古學從劉歆受左氏春秋定三統曆及見林皆推服焉濟南徐兆始事衛宏後皆更受林以前所得一卷古文尚書示宏曰林危厄西州時常以為此道將絶也何意東海衛宏濟南徐生復得之邪是道不墜於地矣二十五年春正月烏桓大人郝且等率衆貢獻封其渠帥為侯王烏桓者東胡也漢初胸奴冒頓伐其國餘類保烏桓山因以為號焉其俗善騎射隨水草放牧居無常處刻木為信無文字而衆不敢違犯其先為胸奴中亂烏桓始盛鈔擊胸奴胸奴為之轉徙數千里漢南遂空戊申晦日有蝕之初劉尚軍沒議復遣將帥時馬援年六十二矣上憫其老方內選擇未有所定援自請曰臣尚能被鎧上馬上試焉援既據鞍左右顧乃下遂遣之冬十月伏波將軍馬援揚虗侯馬武東牟侯耿舒擊武溪援謂所親杜憶曰吾受恩深厚常恐不得死國事也今得所甘心瞑目但畏長者家兒或左右或與共事獨惡是爾南鄉侯鄧晨薨初晨為常山汝南太守皆有名迹為吏民所愛在汝南起鴻陂溉灌田數千頃百姓于今利之徴為灮祿大夫數與宴見陳説平生晨從容白上曰僕竟辦之上大笑晨疾病天子手書慰問中宫及寧平公主皆為垂泣既薨使謁者招新野王魂備官屬合葬于北邙山上與皇后親臨送葬賞賜甚厚諡曰惠侯二十六年春正月增吏俸自三公至干佐吏各有差二月馬援至臨鄉大破蠻軍斬首千餘級蠻有二道一曰壺頭二曰克中壺頭徑近而多險充中遠而運糧難初上與諸將議所先擊因以疑而未決軍至長沙中郎將耿舒上言先擊充中賊援以為延日費糧不如進攻壺頭賊乘髙守隘船不得進會夏暑熱吏士疫死者多援亦病困穿岸為室以避暑氣賊每乘髙鼓譟援輒扶人觀之左右壯其意皆為之流涕耿舒與兄好畤侯弇書言舒前上言擊充中賊糧雖難致兵馬得用軍人數萬爭欲奮擊今壺頭竟不得上又大軍疾疫皆如舒言弇奏舒書上遣梁松驛責問援因代監軍松未至而援巳死松與馬武等毁惡援於上上大怒收援將軍侯印綬是時軍士死者太半謁者宋均軍不得返與諸將議欲承制降賊諸將莫敢應均曰夫忠臣出境有可安國家專之可也均勒兵成列稱詔降之蠻夷震怖即共斬其大帥降均均為置長吏而還均自請矯制罪天子嘉其功賜以金帛其後每有四方異議數訪問焉於是援家屬惶怖不敢歸舊墓買城西數畝地葬其中賔客故人不敢送葬故雲陽令朱勃詣闕上書曰臣聞王德聖政不忘人之功采其策不求備於衆故髙祖赦蒯通以王禮葬田橫令大臣曠然咸不自疑夫大將在外讒言在內微過輒記大功不計誠為國之所慎也故章邯畏誅而奔楚燕將據聊而不下豈其甘心末規哉悼巧言之傷類也竊見故伏波將軍新息侯馬援以四年冬始歸正朔當此之時虜述矯號於益州隗囂擁兵於隴冀豪傑盱睢且自為政援拔自西州慕德效死孤立貴人之間曾無一言之佐自知當要十郡之使徼封侯之福邪八年車駕西征衆議狐疑援深建西州可破之策隗囂剋定援有力焉及隴右未清羌虜擾邉援奉使隴西奮不顧身行關山間谷之中揮戈先零之野兵動有功師進輒克徴在虎賁則有忠策嘉謀於國用之南征交趾充平一州使王府納越裳之貢邊境無兵革之憂間者使南立陷臨鄉師巳有業未竟而卒吏士雖疫援不獨存夫戰或以久而立功或以速而沒師深入未必為是不退未必為非人情豈樂久在遠地不生歸哉惟援得事朝廷二十二年北征出塞再南渡江觸冒害氣僵尸軍中名滅爵絶國土不傳海內不知其過衆庶未聞其罪卒遇三夫之言被誣罔之讒家屬杜門葬不歸墓怨隙並攻宗親怖栗死者不能自列生者莫為之訟臣竊傷之夫操孤危之忠而不能自免於讒此義士之所悲也惟陛下思竪儒之言無使功臣懷恨於黃泉也書奏不報歸田里時梁松竇固等在中上問知朱勃乎對曰故雲陽令也以所上章使讀之松固驚相謂曰如是陛下不甚罪伏波也袁宏曰馬援才氣志略足為風雲之器躍馬委質編名功臣之録遇其時矣天下既定偃然休息猶復垂白據鞍慷慨不亦過乎嘗試言之所以寶才者智也才智之用通物為貴苟才大者濟智小者獨善則涉乎通濟者其智彌廣矣夫觀雲機之功則知班匠之巧覩太平之業則悟聖人之明降斯以還參差百品雖智效一官功覆一匱亦才力之所會也古之君子遇有為之時不能默然而止擊節驅馳有事四方者蓋為斯也然自非賢逹不能量也遭命世之君傍日月餘光廢興指授稟其規略故功名保全身有餘地若不值其主而獨仕其心得一旅而志一邑得一邑而圗一國故事捷而攻之者衆勳立而日就於難又况顛沛險巇不測之慮哉夫才智有餘功名不足者有矣事業未半而勳過者有矣所乘之勢異而難易之功殊也而有為之人幸而要之雖徼一時之功暴居視聽之右外有駭物之患內懷思慮之憂爾中路悵然欲退無途其勢然也善為功者則不然不遇其主則弗為也及其不得巳必量力而後處力止於一戰則事易而功全勞足於一邑則慮少而身安推斯以往焉有毁敗之禍哉馬援親遇明主動應銜轡然身死之後怨謗並興豈非過其才為之不巳者乎夏四月初營夀陵依孝文故事務從省約使迭興之後與丘隴同體凡帝即位必營壽陵具終器漢之制也上常聽朝至于日昃講經至于夜分或與羣臣論政事或説古今言行鄉黨舊故語及忠臣孝子義夫節婦侍對之臣莫不悽愴激揚欣然自得雖非大政進止之宜必遣問焉所以勸羣能也皇太子從容言曰陛下有禹湯之明而失黃老養性之道今天下乂安願省思慮養精神優遊以自寬上答曰吾自以為樂矣二十七年夏太僕趙喜為太尉是時南單于新稱藩烏桓始入朝上命喜思安邉之策為久長之計喜乃議復代郡朔方五原雲中定襄鴈門郡遣諸王之國喜字伯陽宛人也喜從兄為人所殺無子喜年十五結客為報仇更始初舞隂大姓李氏擁兵自守更始遣將降之不下曰聞趙氏有孤孫喜信義著聞願降之更始乃徴喜時未二十更始笑曰璽栗犢能服重致遠乎即以為偏將軍詣舞隂降李氏因入頴川轉擊諸未下者更始大喜曰卿名家駒也努力勉之昆陽之戰喜頗有功拜為中郎將封勇功侯更始敗喜歸鄉里初喜與鄧奉善奉之叛也喜數與書切責之時有言喜為鄧奉計策以毀惡之者詔喜屬建威將軍以功自贖喜不自言奉死後上得喜書驚曰趙喜真長者也即徴喜待公車時江南未通以喜守簡陽侯桓將給兵騎之官喜自請不願請單騎馳往度其形勢臨敵制宜若將兵騎往彼必為吏民所疑上許之喜至簡陽民閉城門不肯納喜便止城門外問國中大夫素為百姓所親信者乃召問之對曰不擁兵欲以自守而至於為賊恐懼不能自反耳喜因告以倉卒之時非國家所疾無自疑阻懇為陳恩信賊遂自縛詣喜降後為平原太守甚有治迹百姓歌誦之二十八年春正月遺諸王就國三月臧宫上書勸上征胸奴詔曰有德之君以所樂樂民無德之君以所樂樂身樂民者其祚延長樂身者不久而亡故曰地廣者荒德廣者強今無善政災變不息憂念嵗闕論語云吾恐季孫之憂不在顓臾而在蕭牆之內也而復欲遠征乎冬十月癸酉詔死罪下𧖟室其女子者宮上會羣臣問曰誰可傅太子者皆曰執金吾隂就可也博士張佚正色曰今陛下立太子為隂氏乎為天下乎即為隂氏則隂侯可為天下則固宜用天下之賢上曰善欲置傳者以輔太子今博士不難正朕况太子乎即拜佚為太子太傳而以桓榮為少傅賜以輜車乘馬乃大會子弟陳其車馬印綬曰此皆稽古之力也可不勉邪於是皇太子經學始成少傅府桓榮上疏曰臣幸得侍帷幄經學淺短無所補益聖質夙夜慙愧今太子經學巳通自有識以來儲君副主莫能傅之今太子獨能傅之此誠萬國之福也臣師道巳盡皆在太子矣謹遣掾臣汜再拜歸道太子報曰陽以童蒙承訓九載不深逹師意而猥見褒獎非其實也夫五經之道廣大非天下之至精其孰能與於此自宰豫之徒親事孔門間邪以度猶尚怠懈晝寢况於不才者乎苟非其人道不虗受冉求曰非不悅子之道力不足者歸道受謝非所敢聞是時禁網踈闊王侯貴人多通賔客壽光侯劉悝更始少子也得幸於沛王輔悝怨盆子殺其父因輔結客報殺盆子兄故式侯恭輔坐繫獄三日由是捕諸王賔客死者千餘人初馬援謂其司馬吕种曰建武初名為天地始開從今巳後海內日當安樂耳顧我嘗獨有所憂國家諸子並壯皆不防微廣通賔客門庭如市吾恐自此大獄起矣卿其愼之援兄女壻王礱故平阿侯子也好施愛士名振江淮間後遊京師交結諸侯援謂所親曰王子石傑士也今若京師在長者間用氣自行陵折者多必用亡身於是臣仲王礱馮衍皆以諸王賔客下獄仲歎曰馬生之言其神乎仲礱死獄中衍被赦出廢于家上言曰臣伏念帝王大體古今通論常獨慨然夫以髙祖之略而陳平之謀毁之則踈與之則親以文帝之明而魏尚之忠繩之以法則為罪施之以德則為功逮至晚世董仲舒言道德見妬於公孫弘李廣奮節於胸奴見排於衛青此忠臣所為流涕也臣衍自惟上無無知之薦下無馮唐之説乏董生之才寡李廣之勞而欲免讒口於當世豈不難哉臣之先祖以忠貞之故成私門之禍而臣值兵革之際不敢回行苟容以求世利事君無傾邪之謀將帥無鹵掠之心今幸遭清明之世飭躬自行之秋而怨讎􅓜雜譏議橫世蓋冨貴易為善貧賤難為工也踈遠隴畝之臣無望髙闕之日惶恐自陳以救罪過書奏天子不用猶以前過也衍字敬通馮奉世之後有奇才博通無所不覽王莽時諸公多薦之者衍辭不肯仕衍有大度自負其才不能耦世耴容故遂坎壈失志居常慷慨庶幾名賢之風家貧年老常為司隸從事全椒侯馬成薨二十九年春二月丁巳朔日有蝕之遣使者舉冤獄問鰥寡􅏤申賜天下男子爵各二級鰥寡孤獨貧不能自存者粟人五斛夏四月乙丑詔天下繫囚自殊死巳下減本罪各一等不孝不道不在此書三十年春二月甲子上幸魯國濟南夏四月徙左馮翊公焉為中山王五月旱賜天下男子爵人二級鰥寡孤獨貧不能自存者粟人五斛冬十月丁酉上幸魯國太尉喜司空純上書曰自古帝王治道之隆未嘗不登封太山以告成功書曰二月東巡狩至于岱宗封禪之義也陛下受命中興順天行誅修復祖宗撫寧萬國天下曠然咸蒙更生夷狄慕義符瑞並應詩云受天之福四海來賀誠宜封禪告成以順天心詔曰是何言也當今日月薄蝕災異並臻吏失其職百姓怨讟吾誰欺欺天乎於是羣臣不敢言膠東侯賈復薨諡曰剛侯復嘗戰𬒳創甚上大驚曰我所不令復别將者為其輕敵也果然失吾名將聞復婦孕上曰女邪我取之男也我與之女勿憂妻子復數徙征伐未嘗破敗數為諸將潰圍解陳身被十二創上以復敢深入稀令遠征欲自將之故少方面之功諸將每論功人人自伐復獨默不言上曰賈君之勳我自知之功臣中最見親禮左將軍官罷以列侯就第加位特進為人剛毅方直慷慨有大節闔門守靜朱祐等薦復宜為宰相世祖方以吏事責三公故遂不用功臣是時列侯唯膠東侯賈復髙密侯鄧禹固始侯李通與公卿參議國事三十一年夏五月戊辰賜天下男子爵人二級鰥寡孤獨貧不能自存者粟人五斛癸酉晦日有蝕之秋九月甲辰詔死罪下𧖟室其女子者宫鮮卑大人於仇賁率禮種人貢獻封賁為王鮮卑亦東胡之餘也别祿鮮卑山因號焉其言語習俗與烏桓同自為冒頓所破遠竄遼東未有名通於漢而與烏桓接當是南北單于更相攻伐而鮮卑遂以強盛中元元年春正月天子覽河圖會昌符而感其言於是太僕梁松復奏封禪之事乃許焉二月辛卯上登封于太山事畢乃下是日山上雲氣成宮闕百姓皆見之甲午禪于梁父袁宏曰夫天地者萬物之官府山川者雲氣之丘墟萬物之生遂則官府之功大雲雨施其潤則丘墟之德厚故化洽天下則功配于天地澤流一國則德合於山川是以王者經略必以天地為本諸侯述職必以山川為主體而象之取其陶育禮而告之歸其宗本書云東巡狩至于岱宗柴傳曰郊祀后稷以祈農事夫巡狩觀化之常事祈農撫民之定業猶潔誠殷薦以告昊天況創制改物人神易聽者乎夫揖讓受終必有至德於萬物是故王者初基則有封禪之事蓋以其成功告於神明者也夫東方者萬物之所始山嶽者靈氣之所宅故求之物本必於其始取其所通必於所宅崇其壇場則謂之封明其代興則謂之禪然則封禪者王者開務之大體也德不周洽不得擬議斯建功不弘濟不得髣佛斯禮曠代一有其道至髙故自黃帝堯舜至于三代各一封禪未有中修其禮者也雖繼體之君時有功德此蓋率復舊業增修前政不得仰齊造國同符改物者也夫神道貞一其用不煩天地易簡其禮尚質故藉用白茅貴其誠素器用陶匏取其易從然則封禪之禮簡易可也若夫石函玉牒非天地之性也三月丙辰司空張純薨純字伯仁京兆杜陵人父放襲爵昌平侯成帝時以遊宴得幸而純以學行稱哀平世為侍中諸曹校尉王莽時為九卿遭亂世保全侯爵建武𥘉以先詣闕復封故國拜太中大夫遷五官中郎將有司奏列侯非宗室不宜復國上以純宿衛久弗奪也更封武始侯食富平之半純歷事先朝明習故事是時朝廷草創舊典多闕每有疑議輒訪問純自郊廟冠婚之禮多所正定純重愼固密時有上書輒削藁草上甚重之一日至數引見及為宰相務存無為慕曹參之迹所辟召皆當世通儒純臨薨敕家丞曰司空無功勞於國猥蒙大恩爵不當及子孫其勿紹嗣純長子根常𬒳病大行問嗣家上小子奮奮辭讓曰先臣遺令臣兄弟不得襲爵故臣不即是正猥聞詔書驚愕惶怖臣兄哀臣幼小故託稱疾病不聽奮字釋通謙約節儉闔門雍穆租稅賑給宗族常自困乏官至司空夏四月巳卯大赦天下復梁父奉髙羸勿出今年田租戊子上幸長安祀長陵是時醴泉出京師百姓痼疾飲者皆愈又有赤草生于泉側郡國三十一上言甘露降有司奏曰孝宣帝時每有嘉瑞輒為之改元故有神雀五鳯之號所以奉答神祗表彰德信也天子拒而不納是以史官不得而記焉六月衛尉馮魴為司空賜爵關內侯冬十月甲申使司空魴告禮髙廟曰髙帝與羣臣約非劉氏不得王吕太后王諸吕滅亡三趙賴神靈諸吕伏誅國家永寧吕后不宜配食地祇髙廟薄太后慈仁孝文皇帝賢明子孫賴之福延至于今宜配食地祇髙廟今上薄太后尊號為髙皇后遷吕后尊號為髙后袁宏曰夫越人而臧否者非憎於彼也親戚而加譽者非優於此也處情之地殊故公私之心異也聖人知其如此故明彼此之理開公私之塗則隱諱之義著而親尊之道長矣古之人以為先君體猶今為君之體推近以知遠則先後之義均也而況彰其大惡以為貶黜者乎是歲起明堂辟雍靈臺初議靈臺位上問議郎桓談曰吾欲以讖決之何如談默然良久曰臣不讀讖上問其故談復言讖之非上大怒曰桓談非聖人無法將下斬之談叩頭流血良久乃解談以屢不合旨出為六安太守丞失意忽忽不樂道病卒時年七十餘南陽人尹敏字幼季才學深通能論議以司空掾與校圗讖敏言於上曰讖書聖人所作然其中多近語以字取類俗人之辭虛實難識恐誤後生上不然其言敏因書之闕因增之曰君無口為漢輔上讀得之召敏問其故敏曰臣見前人多增損圗書是以因自著罪無狀上深非之而不罪但令削去之然以是沈滯官止長陵今敏性恬淡不慕功名專好聖哲之書𥘉與班彪相善每相與談常日晏不食晝即至夜夜即至旦彪曰相與久語為俗人所怪然鍾子期死伯牙破琴惠施沒莊周杜門相遇之難也二年春正月辛未𥘉起北郊祀后土丁丑倭奴國王遣使奉獻二月戊戍帝崩南前殿遺詔曰朕無益百姓如孝文帝制度務從約省刺史二千石長吏皆無離城郭無遣使因督郵奉奏是日太子即皇帝位年二十四尊皇后曰皇太后凡帝妃稱皇后帝母稱皇太后祖母稱太皇太后妾臣昭儀巳下至中家人子二十等漢之制也光武中興悉闕昭儀家人之號唯有貴人金印紫綬自美人宮人綵女皆無秩祿四時賞賜而巳是時諸王皆徴還國遭大憂新承王莽之亂國失舊典嗣帝與諸王居止同席時上下咸兩莫之與正太尉趙喜橫劒正色扶諸王下以正尊卑乃申宫衛整禮儀百官肅然三月丁卯葬光武皇帝于原陵愼侯劉隆薨夏四月丙辰詔曰豫末小子奉承聖業夙夜祇畏不敢荒寧先帝受命中興德侔五帝朕繼體守文不知稼穯之艱懼有廢失以墮先業公卿百僚將何以輔朕之不逮特進髙密侯禹明允篤誠元功之首其以禹為朕之太傅進見東向以明殊禮東平王蒼寬博有謀可以託六尺之孤臨大節而不可奪也以蒼為驃騎將軍其賜天下男子爵人二級三老孝悌力田人三級鰥寡孤獨粟人十斛上新即位欲崇引親賢優寵大臣乃以山林之勞封太尉喜為節鄉侯司空欣為安鄉侯司徒魴為揚邑侯蒼上疏讓曰陛下慈恩哀臣蒼臨朝之日以為命首舉負薪之才升君子之器今勸賞之士怠於力行臣誠內迫頑愚辱汙輔將之位必被詩人赤紱之刺今方域晏然要荒無警將遵上德無為之時也文官猶宜并省武官尤不宜建昔虞氏克諧君象有鼻不及以政誠不忍揚其惡也前事之不忘後事之師也自漢巳來子弟無得在公卿位者唯陛下遠遵舊典終畜養之恩不勝至願願上驃騎將軍印綬上不聽蒼以毋弟輔政盡心王室其所賔禮皆當世名士𥘉太原人郇恁隱居山澤不求於世胸奴嘗入太原素聞其名乃不入郇氏舉宗賴之建武中徴恁不至於是蒼復辟恁而敬禮焉嘗朝會上戲恁曰先帝徴君不至驃騎辟君反來何也對曰先帝秉德以惠下故不得來驃騎執法以檢下臣不敢不至月餘辭去終于家秋九月隴西羌反冬十一月中郎將竇固楊虗侯馬武征羌十二月甲寅詔自殊死巳下聽贖罪各有差後漢光武皇帝紀卷第八
