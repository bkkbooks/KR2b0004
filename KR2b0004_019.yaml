body:
  text: 劉向父子領校祕書閲定九流復無讖書讖書出於哀平之際皆虛偽之徒以矯世取容不可信也衡乃上書其陳讖不可用衡字平子南陽鄂人也和帝世為尚書郎是時承平日久天下奢泰自王公至于庶人莫不逾制故衡作二京賦諷焉衡精微有文思善於天文隂陽之數由是遷太史令衡作地動儀以銅為器圎徑八尺形似酒樽合蓋充降飾以山龜鳥獸樽中有都柱旁行八道施關發機外有八方兆龍首銜銅九蟾蜍承之其牙機巧制皆隱樽中張訖覆之以蓋周密無際若一體焉地動搖樽所從來龍機發則吐九蟾蜍張口受之九聲振揚同者覺知即省龍機其餘七首不發則知地震所起從來也合契若神自此之後地動史官注記記所從方起來觀之者莫不服其竒又作渾天儀衡深歎楊雄太玄經謂崔瑗曰觀太玄經知子雲殆盡隂陽之數也非特記傳之屬實與五經相擬漢得天下二百歲之書也所以作者之數必顯一世常然之符也太玄四百歲其興乎竭己之精思以揆其義更使人難論隂陽之事久之出為河間相衡所著述皆傳於世九月太尉王龔以疾罷初龔患宦官之亂上疏言其罪宜罷遺逐之宦官乃使客作飛章欲陷龔以罪詔太尉龔亟自實從事中郎李固説大將軍梁商曰王公束修勵節而受讒佞之患夫三公尊重舊典不有大罪不至輕問也王公沈靜內明若有他變朝廷獲害忠良之名語曰善人在患飯不及餐宜救其艱商從之由是得免龔字伯宗山陽高平人安帝時為司隸校尉京邑肅然有高明於天下初龔夫人卒龔與諸子並扶杖行服是時山陽太守薛勤喪妻不哭將殯臨之曰幸不為夭復何恨哉議者兩譏焉六年春正月丙子征西將軍馬賢討羌到射姑山回三月庚午司空郭虔久病䇿罷丙午太僕趙誡為司空秋八月丙午大將軍梁商薨初商會於洛水請從事中郎周舉舉稱疾不行商親眤皆會焉倡樂既畢終以薤露之歌坐中皆流涕舉聞而歎曰此所謂哀樂失時非其所也懼將有禍俄商疾困移歸舊第勑兾不疑曰吾以無德受恩深厚生補益朝廷死必耗費帑藏衣食飲含玉神珠物無益朽骨但增塵埃我生平所不願雖有聖人神制亦有權時之宜方今邊境未寧盜賊未息朝廷用度常若不足氣絶之後便斂以時服殯已便關關必便葬上無損於國下從我本意孝子善述人之志忠臣每事依先公必從吾言使魂神有知無恨於黃泉兾不疑欲奉行朝廷不聽車駕親臨諡曰忠侯以河南尹兾為將軍不疑為河南尹九月羌冦武威辛亥晦日有蝕之冬十一月行車騎將軍執金吾張喬兵屯三輔漢安元年春正月癸巳大赦天下二月丙辰詔大將軍公卿舉賢良方正探賾索隱者各一人夏六月以胸奴立義王兜樓儲為南單于立於京師公卿備位使大鴻臚授印綬引上殿賞賜閼氏以下各有差初商病篤上親臨幸問以遺言商對曰人之將死其言也善臣從事中郎將周舉淸高忠正可重任也由是上拜舉諫議大夫及是之時連有變異上思商言召舉於顯親殿問之舉對曰陛下初即位遵修舊典逺近肅然頃年以來稍違於前朝多寵幸祿不原德府藏空匱有瓦解之心觀天察人方古凖今誠可危懼書曰僭恆陽若夫僭差無度則言不從而下不治陽無以制則上擾下竭宜密嚴勑州郡察強豪大姦以時擒討於是下不循法盜賊並起殺長吏二千石橫行州郡不能禁歸罪刺史二千石上乃召舉與羣議遣八使秋八月遣光祿大夫張綱侍中杜喬等八人持節循行天下表賢良顯忠勤貪汙有罪者雖刺史輒收以聞喬等奉命而行唯綱獨埋車輪於都亭不動曰豺狼當路安問狐狸遂上書曰大將軍梁兾河南尹不疑蒙外戚之援荷過厚之恩以芻蕘之姿居阿保之任不能敷揚五教翼贊日月而專為封豕長蛇肆其貪叨甘心貨賄縱恣無厭多結諂諛以害忠良誠天威所不赦大辟所宜加也謹條其無君之心一十五事於左皆忠臣之所切齒也書奏京都振竦時皇后內寵方盛兾兄弟權重於主諸梁姻族冠冕盈朝上雖信綱言然卒不罪兾侍中杜喬奏免陳留太守梁讓濟陽太守汜宫濟北太守崔瑗贓罪狼籍梁氏親黨也薦泰山太守李固在郡忠能徵固為將作大匠固亦方直不撓好推賢士上疏曰臣聞氣之淸者為精人之淸者為賢治身者以積精為寶治國者以積賢為道昔秦欲謀楚遣使觀寶楚王乃列其賢臣以為國寶秦使懼之遂為寢兵魏文侯師子夏友田子方軾段干木之閭羣俊競至名過齊桓斯誠積賢之符效也陛下撥亂龍飛初登大位聘南陽樊英徵江夏黃瓊廣漢楊厚會稽賀純策書嗟歎待以優位是以巖穴幽人肥遁之士莫不彈冠振衣樂為時用四海歡然歸服聖德自頃以來漸更陵遲諸侍中皆膏梁之餘勢家子弟無宿德名儒可顧問者愚以為瓊等久處郎署已且十年誠恨陛下隆崇於始而棄之於末也光祿大夫周舉侍中杜喬深沉正直當世名臣宜登常伯豫聞國政者也天子納焉大將軍梁兾怨張綱之奏已也會廣陵賊張嬰殺刺史二千石兾以綱為廣陵太守若不為嬰所殺則欲以法繩之前太守往輒多請兵及綱受拜詔問當須兵幾何對曰無用兵為遂單車之官徑詣嬰壘門嬰大驚劇走閉壘綱又於門外罷遣吏兵獨留所親者十餘人以書喻其長老素為嬰所信者請與相見問以本變因示以詔恩使還嬰嬰見綱推誠即出見綱綱延置上坐問所疾苦禮畢乃喻之曰前後二千石多非其人杜塞國恩肆其私求鄉郡逺天子不能朝問之也故民相聚以避害也二千石信有罪矣為之者又非義也忠臣不虧君以求榮孝子不損父以求富天子仁聖欲文德以來之故使太守來思以爵祿相榮不願以刑罰也今誠轉禍為福若聞義不服天子赫然發怒大兵雲合豈不危乎今不料強弱非明也棄福取禍非智也去順效逆非忠也身絶無嗣非孝也背正從邪非直也見義不為非勇也六者禍福之機也宜深計其利害嬰聞泣曰荒裔愚臣不能自通王室數為二千石所枉不堪困苦故遂相聚偷生若魚遊釡中知其不久可且以喘息須臾耳明府仁及草木乃嬰等更生之澤也愚戇自陷不義實恐投兵之日不免孥戮也綱曰豈其然乎要之以天地誓之以日月方當相顯以爵位何禍戮之有嬰曰苟赦其罪得全首領以就農畝則抱戴沒齒爵位非望也嬰雖為大賊起於狂暴自分必及禍得綱言曠若開明乃辭還營明日遂將所部萬餘人與妻子面縛謁綱綱悉釋縛慰納單車將嬰入營置酒為樂大會月餘撫循以意莫不委心謂嬰曰卿諸人積年為害一旦解散方垂蕩然當名上條必受封賞嬰曰乞歸故業不願復以穢名汙明時也綱以其至誠乃各從其意親悉為安處居宅子弟欲為吏者聽之不欲不強為吏則隨才任職為民則勸以農桑四業並興南州晏然論綱功當封為兾所遏絶故不侯天子美其功徵用之疾病卒官時年四十六朝廷甚惜嬰等三百餘人皆衰杖送喪同考妣封中常侍鞏順為列侯冬十月辛未太尉桓焉司徒劉壽以災異罷十一月司隸校尉趙峻為太尉大司農胡廣為司徒十二月封故征西將軍馬賢孫承光為列侯以賢死王事也二年冬十月辛丑令郡國中都官死罪繫囚犯大逆以下出縑贖罪禁吏民無沽酒十二月辛丑死罪不能入贖者遣詣臨羌居二歲胸奴中郎將馬實有功於邊詔書褒奬賜錢十萬實字伯騫扶風茂陵人也晝誦經書夜習弓兵希慕名流交結豪傑荷擔徒走不逺千里山陽王暢知名當時實慕其名故往之暢欲觀其舉措不即見勑門曰行經日未旋實留住彌日而故云未還實謂從者曰夫孝子事親行不逾日而至今不歸非孝子也暢聞之即引俱入知其異士也既入見其母結好而退實臨退執暢手曰太上立德其次立功幸俱生盛明之世當垂名千載不可徒存天壤之間各遇當仁之功勿相忘也歸舉孝廉輔尚書郎西羌之難王暢薦實於執事由是為胸奴中郎將建康元年春尚書僕射黃瓊上疏曰臣聞古之帝王莫不敬恭神明劬勞農事必躬郊廟之禮親籍田之勸所以率先羣萌勉勸農功昔宣王不籍千畝􅉑公以為大譏伏惟陛下遵稽古之鴻業體虔肅以應天順時奉元懷柔百神雖詩詠成湯書美文王誠不能加今廟祀適訖而祈穀方至恐左右忠孝不欲屢勞聖躬以為親耕可廢臣聞先王制典籍田有日司徒咸戒司空除壇所以迎氣東郊以應時風伏願陛下率群后冕旒三推則和澤滂流蒼生有賴上從之夏四月辛巳立皇子炳為皇太子大赦天下賜男子爵各有差上使中常侍高𣑽迎太子不賫詔書直詣承光宫以車載太子出太子太傅杜喬不能止不知所為御史种皓適至橫劒當車曰太子國之儲副巨命所繫常侍來無詔書何得將太子去安知常侍非姦邪今日之事有死而已𣑽不敢爭遣詣尚書得報乃聽太子既至上嘉皓持重稱善者良久秋八月徐揚州盜賊羣起遣御史中丞馮放督州郡兵討之庚午帝崩于玉堂遺詔無起寢廟衣皆以故珠玉玩好皆不得下是日太子即皇帝位年二歲太后臨朝以太尉趙峻録尚書事九月丙午葬孝順皇帝於憲陵尚書欒巴坐諫作陵不欲壞民冢下獄免為庶人丙午京師地震詔公卿特進校尉舉賢良方正能直言極諫者各一人皇甫規對策曰陛下聖德欽明聞災責躬咨嗟羣寮招延敢諌臣得踐天庭承大問此誠臣寫憤畢命之期也臣伏見孝順皇帝𥘉勤王事綱紀四方天下欣然幾以獲治自後中常侍小黃門兄數十人同氣相求如市賈焉競思作變導上以非因緣嬖幸受賂賣爵分贓解罪以攘天威公卿以下至於佐吏交私其門終無紀極頑凶子弟布列州郡並為豺狼暴虐羣生天下擾擾從亂如歸至令風壞俗敗招災致冦今宜庭問百寮常侍以下尤無狀者亟便絀遣與衆共之披掃其黨蕩滌其賄以答天誡大雅曰敬天之怒無敢戲豫此之謂也大將軍河南尹處周邵之任為社稷之鎮加與王室舊有姻族今日立號雖尊可也而天下區區願其霈然增修謙節省去遊虞不急之費減廬第無益之飾近儒術考論經書輔佐日月宜有至效夫朝者舟也民者水也朝之羣臣乘舟人也大將軍兄弟操楫者也雖曰衆也在所欲之苟能卒志畢力守遵常軌以度元元所謂福也或乃怠弛中流而捐棹放楫將淪波濤歸咎受愆可不愼乎臣生長邊逺希步紫微怖懾失守言不盡心梁兾忿其間巳第規對下第拜郎中託疾免歸冬十一月九江盜賊徐鳳稱上將軍殺略吏民己酉令郡國死罪繫囚減死一等徙邊戍於是殤帝廟次在順帝下鴻臚周舉議曰春秋魯閔公無子庶兄僖公代立躋僖公於閔公上孔子譏之經書曰大事于太廟躋僖公傳曰逆祀也至定公正而下之孔子是之經曰從祀先公為萬代法也殤帝在先於親為父順帝在後於親為子先後之義不可改昭穆之序不可亂上不從舉字宣光汝南汝陽人也聰敏多識善屬文學者為之頌曰五經縱橫周宣光初辟司徒椽稍遷州刺史尚書令左雄薦舉為尚書俄而雄為司隸詔書選武猛任將帥者選故兾州刺史馮直直卒坐罪減死又無武猛驗舉劾奏雄之復為尚書令雄謂舉曰詔書使我選武猛不使選淸高舉曰詔書選武猛不使君選貪汙也雄曰進君適所以自伐也舉曰昔趙宣子任韓厥為司馬厥以軍法戮宣子僕宣子謂大夫曰可賀我矣選厥也任其事今君不以舉之不才誤升諸朝不敢阿君以為君羞不寤君之與宣子殊也雄謝而服之舉公亮不撓皆此類也後漢孝順皇帝紀卷第十九
