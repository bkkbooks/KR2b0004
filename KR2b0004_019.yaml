front:
  text: 後漢孝順皇帝紀卷第十九袁宏四年春三月乙亥京師地震初上之立閹官之力也由是寵之始專政事爭執權勢中常侍張逹等乃讒中常侍曹騰孟賁與將軍商召諸王子請收之上曰將軍父子我所親必是共嫉之耳乃誅逹等辭及在位大臣商上表曰春秋之義功在元帥罪在首惡賞不僭溢刑不淫濫五帝三王所以致康乂也竊聞考故中常侍張逹等語多所及大臣大獄一起無辜者衆非所以逹和氣平政化也宜早決竟以息逮捕之煩上從之二月以商少子虎賁中郎將不疑為步兵校尉商上書曰不疑童孺猥處成人之位是以寢不安席食不甘味昔者晏平仲辭鄁殿以守其富公儀休不愛魚食以定其位臣雖不才亦願固福祿於聖世故敢布腹心觸罪歸誠上許之以不疑為侍中奉車都尉商疾邊吏失和使羌戎不靜并州刺史來機涼州刺史劉康當之官商親喻之曰戎狄荒服蠻夷要服言其荒忽無常統領之道亦無常法臨事制官略依其俗二君皆表素疾惡欲分眀白黑孔子曰人而不仁疾之已甚亂也況戎狄乎宜防其大惡忍其小過機康不從羌戎擾動機康皆坐事徴夏四月戊午賜天下男子爵各有差鰥寡篤癃不能自存者人粟五斛貞婦帛人三匹九十已上人二匹是時良二千石初有任峻蘇章後有陳琦吳祐第五訪之徒海內稱之峻字叔髙渤海蓨人也為劇令洛陽自王奐之後連詔三公特選皆不稱職峻以公能召拜選文武吏各盡其用發剔姦盜不得旋踵民間皆畏之斷獄歲不過數十人其威禁猛於王奐而文理政教不如也後為太山太守蘇章字孺父京兆茂陵人也為兾州刺史勤恤百姓摧破豪俠坐免歸養高於鄉里時天下不治民多悲苦論者日夜稱章朝廷遂不能復用之陳琦字公魯陳留人也為徐州刺史時有盜賊與吏士同寒苦爭為用後遷琅邪相天大旱用功曹伏禹之言條前相所賊殺無辜齋戒設壇而祭之數日天下大雨第五訪字仲謀京兆人也初為新都令恩化大行二年之間鄰縣歸之戶口十倍遷張掖太守民飢米石數千訪開倉廩賑之不待上詔謂掾吏曰民命在溝壑太守權以救之由此一郡得全朝廷降璽書嘉之既而從輕騎循行田畝勸民耕農其年穀石百錢後為南陽太守護羌烏桓校尉邊境伏其威信五年春二月戊申京師地震夏四月南單于冦河西天子聞以恩信喻而降之單于脫帽辟帳謝罪中郎將陳龜以單于無足可效迫切令自殺龜下獄五月己丑晦日有蝕之秋七月羌冦金城及三輔將遣西師謀元師僉曰講羌校尉馬賢大將軍梁商曰賢本西方斗筲之子雖有割雞之效然齒以老矣不如太中大夫宋漢不從丁丑赦死罪以下及亡命贖罪各有差八月以弘農太守賢為征西將軍稽久不進馬融知其將敗上疏乞自效曰今雜種諸羌轉相鈔盜宜及其未并亟遣深入破其支黨而馬賢等處處留滯羌胡百里望塵千里聽聲飲酒高會不以為慮坐食榖米未聞所擊臣竊惑之夫事不復校而可收名獲實斯乃征討者之私便非國家之公利也臣聽輿人之頌云賢欲目前受降使譁聲東聞且懼士卒將不堪命有高克潰叛之變也臣又聞吳起為將暑不張蓋寒不披裘戎事不邇女器今賢野次垂幕珍肴雜遝兒子侍妾事與古反臣兄弟受恩誠私憤悒鉛錫之刃以效一割之用臣願請兵五千才加部隊之號庶自率勵與之齊勇昔毛遂願處囊中趙之厮養欲燕初為衆笑後效其功臣託儒者不便武職猥陳此言訪之羣司知當受虛誕之辜唯加裁省不聽融字季長援兄子嚴之子也兄續博覽古今同郡班固著漢書篇其七表及天文志有録無書續盡踵而成之融少篤學多所通覽大將軍鄧隲聞其才學召為舍人非其好也避地至涼州會羌戎擾攘邊穀踴貴困厄甚乃歎曰古人有言左手據天下圖右手刎其喉愚夫不為也何則生貴於天下今以咫尺之耻而喪千金之軀非老莊之意也乃還應隲命轉為中郎校書東觀十餘年窮覽典籍稍遷尚書南郡太守坐事髠徙朔方遇赦還為議郎融美才貌解音聲學不師受皆為之訓詁弟子自遠方來受業者常千餘人融外戚家雖好儒術而服飾甚麗坐絳紗帳侍婢數十聲妓不乏於前弟子以次相授鮮有覩其面者十一月遣胸奴中郎將將兵討南胸奴叛者斬首二千餘級叛者乞降是時朝政多僻競崇侈靡侍中張衡上書曰臣伏惟陛下宣哲克明繼體承天中遭傾覆之變以應濳龍之德及乘雲高濟盤桓天位誠所謂將隆大任必先倥偬之也親履艱難猶知物情故能一貫萬機無所疑惑宜獲神祗之應受黎庶之譽而隂陽未知災青屢見天道幽遠成敗易覩近世鄭蔡江樊周廣王聖皆為效矣恭儉畏忌必蒙社祉奢淫諂慢鮮不夷戮前事不忘後事之師也夫情勝其性流遁忘返豈惟不肖中才皆然苟非大賢不能思義故過結罪成向使能瞻前顧後援鏡自戒則何陷於凶患乎貴寵之臣衆所屬仰其有僭尤上下知之褒美誡惡有心皆同故怨讟溢乎四海神明降其禍孳頃年雨常不足思求所失則洪範所謂僭恆陽若也懼羣臣奢泰昏迷典式自下逼上用速咎徴又前年京都地震土裂土裂者威分地震者民擾也君以靜唱臣以動和威自上出不趣於下禮之正也竊懼君有厭倦制不專己恩不忍割與衆共威威不可分德不可共洪範曰臣有作福作威玉食其害干而家凶干而國天監孔明雖疏不失災異示人前後數矣未見所革以復往悔自非聖人不能無過願陛下思惟所見稽古率舊勿令刑德大柄不由天斷懲忿窒欲事依禮制禮制修奢僭息事合宜則無凶咎然後神聖允塞災沴不至矣衡雅
