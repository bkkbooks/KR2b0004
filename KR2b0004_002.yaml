body:
  text: 後漢灮武皇帝紀卷第二袁宏二年春正月公到薊王郞購公十萬戸薊中驚恐言郞使者方至太守巳下皆出城迎公見宮屬議耿弇曰今兵從南方來不可南行上谷太守耿況漁陽太守彭寵公邑人也發此两都控弦強弩萬騎所向無前邯鄲不足平也公曰卿言善時公官屬盡南方人莫有欲北者皆曰死南首柰何北行公指弇曰是我北道主人公駕出官屬不盡相及弇與公相失道路擾攘皆欲擊公銚期奮㦸在前嗔目叱之至城門巳閉矣攻之得出兼晨夜蒙霜雪所過城邑不敢入或絶日不食至饒陽蕪蔞亭馮異進豆粥公曰得公孫豆粥饑寒俱觧公將出或曰閉之亭長曰天下詎可知何閉長者爲遂南行至呼沱河導吏還言河水流澌無舩不可渡官屬皆失色公遣王霸視之信然霸恐驚衆不可渡且前依水爲阻即言冰堅可渡士衆大喜比至冰合可渉旣渡公謂霸曰安吾衆令渡者卿力也霸曰此明公至德神靈之祐雖武王渡河白魚之應無以加也公曰王霸權時以安衆是天瑞也爲善不賞無以勸後以霸爲軍正賜爵關內侯於是未知所之有老公在道旁曰信都爲長安城守去此八十里乃至信都太守任灮都尉李忠聞世祖至開門出迎世祖見灮喜曰伯卿兵少不足用如何灮曰可發奔命攻旁縣不降者掠之兵貪財物可大致也以灮爲左大將軍封武成侯忠爲右大將軍封武固侯灮字伯卿南陽宛人好黃老言爲人純厚鄕里愛之知漢兵至宛或見灮衣服鮮明欲殺之觧衣未已㑹安城侯劉賜適至見灮容貌長者救全之因率黨與從賜爲偏將軍與世祖共破二公於昆陽後更始拜灮爲信都太守李忠字仲卿東萊人以好禮稱王莽時爲信都都尉更始立以忠郡中爲所敬信即拜忠爲都尉兼璽書勞勉焉王郞起灮與忠發兵固守廷掾有持郞檄詣府者光斬之以令百姓邳彤字偉君信都人王莽時分鉅鹿爲和成郡以􅊮爲郡卒正公之平河北􅊮舉城降復以􅊮爲太守是時郡縣得王郞檄皆望風嚮應唯信都和成二郡不降􅊮聞公來失衆使五官掾張萬將精騎二千詣公所􅊮與公㑹信都議者或言可因信都兵自送入關􅊮庭對曰議者之言皆非也何者吏民思漢久矣故更始之立天下嚮應當此之時一夫大呼無不捐城遁逃虜伏請降自上古巳來用兵之盛未有如此者也邯鄲劉胡子等假此威勢惑亂吏民詐以卜者王郞爲成帝子擁而立之其衆烏合無有根本之固明公奮二郡之兵揚嚮應之威以攻則何城不剋以戰則何軍不服今釋此而西歸非徒亡失河北又驚動三輔其隳損威重安可量也明公審無征伐之計則雖信都之衆難可合也何者明公西則邯鄲和成民不肯捐棄親戚而千里送公其離散逃亾誠可必見以彤爲後大將軍世祖使宗廣守信都李忠邳彤征伐耿純率宗族二百餘人老者載棺而随之及賔客二千人并衣𥜗迎公於貫鉅鹿人劉植亦率賔客數十人開城門迎公大悅以純爲前將軍植爲驍騎將軍衆益盛乃渡呼沱攻中山所過郡縣望風影附耿純使從弟訢歸燒宗室廬舍公以問純純曰竊見明公單車臨河北非有府蔵之畜重賞甘餌以聚人者也接下以至誠待之以恩徳是以士衆旁來思樂僵仆今邯鄲自立北州疑惑純雖舉宗歸命老弱充行猶恐宗人賔客卒有異心無以自固燔燒廬舎絶其反顧之望公善之更始將相皆山東人也咸勸更始都洛陽丞相長史鄭興說更始曰陛下起自荆楚無施於民舉號南陽而雄傑已誅王莽開門而迎者何也苦王氏思髙祖之舊徳也今不乆撫之臣恐百姓心動盜賊復起議者欲平赤睂而後入闗是不守其本而爭其末也恐國家之守轉在函谷雖卧洛陽得安枕邪更始曰朕西決矣乃以興爲梁州刺史二月更始西至長安自王莽之敗西宫燔燒東宫府市里太倉武庫皆如故更始居於東宫郎吏以次侍更始媿不能視諸將後至者更始勞之曰掠得幾返左右大驚李松趙萌說更始宜立諸功臣為王以報其功朱鮪以爲髙祖之約非劉氏不得王更始乃先封宗室劉祉爲定陶王劉賜爲宛王劉慶爲燕王劉歙爲元氏王劉嘉爲漢中王後遂立王匡爲比陽王王鳳爲宜城王朱鮪爲膠東王張卭爲淮陽王王常爲鄧王廖湛爲殷王申屠建爲平氏王胡殷爲隨王李通爲西平王李軼爲武隂王成丹爲襄邑王陳茂爲隂平王宋佻爲潁隂王以李松爲丞相趙萌爲大司馬隗嚻爲御史大夫即拜張步爲輔漢大將軍步弟弘爲衞將軍藍玄武將軍夀髙密太守步乃分兵略地盡得琅邪泰山城陽東萊髙密膠東北海齊郡濟南拜董憲爲臨淮太守憲還東海攻利城耿況攻曲陽皆下之拜劉芳爲騎都尉使鎮撫安定以西更始以趙萌女爲夫人有寵委政於萌更始日在後宫與婦女飲酒諸將欲言事更始醉不能見請者數來不得巳令侍中於帷中與語諸將又識非更始聲皆怨曰天下未可知欲見不得而韓夫人尤嗜酒手自滴酒謂常侍曰帝方對我樂飲間時多正用飮時即事來爲起抵書按破之議郎有諌者言萌放縱縣官但用趙氏家語署耳更始怒拔劔斫議郎時御史大夫隗嚻在旁起謂左右曰無漏泄省中事萌嘗以私事扶侍中下斬之侍中呼曰陛下救我更始言大司馬哀縱之萌曰臣不奉詔遂斬之如此者數李軼等擅命於外所置牧守交䥘州郡不知所從強者爲苦王匡張卬之屬橫暴長安三輔苦之又所署官爵多群小長安爲之語曰䆴下養中郞將爛羊胃騎都尉由是四方不信豪傑離心博士李淑諫曰方今賊臣始誅王化未行百官有司宜得其人陛下本因下江平林之勢假以成業斯亦臨時之宜事定之後宜釐改制度更延英俊以匡王國今者公卿尚書皆戎陣亭長凢庸之隷而當輔佐之任望其有益猶緣木求魚終無所獲海内望此知漢祚永興臣非有憎疾以求進也但爲陛下惜此舉措願陛下更選英彥以充廊廟永隆周文濟濟之盛更始怒收淑繫之詔獄歷年至更始之敗乃免初隗囂被徴將行方望止之曰更始未可保且觀百姓所歸囂不聽以書謝囂曰足下將建伊呂之業任存亡之權大事草創雄傑未集以望異域之人疵瑕未曝於衆可且依託亦有所宗望知大指順風不讓幸賴將軍尊賢廣謀動有功發中權基業巳定英傑雲集思爲羽翮比肩是也望久以羈旅抱空資託賔客之上誠自媿也假望懷介然之節潔去就之分又不貳其志矣何則范蠡收績於姑蘇狐犯謝罪於始入夫以二子之勤從君二十餘年蠡苞七術之機犯爲舅氏之親然至際㑹猶釋罪削迹請命乞身蓋亦宜也望聞烏氏有龍池之山微徑南通與漢相連其旁有奇人聊及閑暇廣求其真願將軍勉之而巳囂固留望遂去囂詣長安更始以囂爲右將軍季父崔爲白虎將軍義爲左將軍旣而崔義謀叛西歸囂懼其幷誅即求見而告其謀二人誅死更始以囂爲忠故以爲御史大夫方望旣去隗囂遂說安陵人弓林曰更始必敗劉氏真人當受命劉嬰本當嗣孝平帝王莽以嬰爲孑焉正子依託周公以奪其位以爲安定公今在民間此當是也林等信之於長安求得嬰將至臨涇聚黨數千人立嬰爲天子望爲丞相林爲大司馬更始遣李松蘇茂等擊皆斬之公之擊趙國引兵入鉅鹿降廣阿更始初立遣使徇諸國曰先降者復爵位上谷太守耿况出迎使者上印綬使者無還意功曹冦恂勒兵入請印綬使者曰天王使者功曹欲脅之邪恂曰非敢脅使君竊傷計之不詳也今天下初定國信未宣使君立節衘命以臨四方郡國莫不延頸傾耳望風歸命今至上谷而隳阻向化之心生離叛之隙何以復令他郡乎且耿况在上谷久爲吏民所親今易之得賢則造次未安不賢則爲亂爲使君計莫若復况以安上谷外以宣恩信使者不應恂因顧叱左右以使者敎召況況至恂前取印綬帶況使者不得巳承詔授之況遂拜受而出恂字子翼上谷北平人也家世爲郡縣之著姓恂好學爲郡功曹耿況甚重之時王郞使上谷發兵恂與門下掾閔業議邯鄲拔起不可信王莽末時所難伯昇今聞大司馬伯昇親弟尊賢下士所至見說可歸附也況曰邯鄲兵強不能獨距如何對曰今據大郡悉舉其衆控弦萬騎可以詳擇去就恂請束約漁陽太守與合爲一邯鄲不足圖也耿弇之與公相失也聞行歸上谷會適至勸況發兵乃遣冦恂至漁陽說太守彭寵初呉漢說寵曰漁陽上谷突騎天下所聞也君何不率勉上谷共遣精銳以詣劉公幷力擊邯鄲此一時之功也護軍蓋延狐奴令王梁亦勸寵寵欲從之其官屬不聽漢知寵不得自專乃辭去城外思所以調其衆者時道多饑民見一諸生漢使人召之乃問所聞見此生具說劉公所過爲郡縣所稱言邯鄲劉子輿非劉氏也漢乃獨爲檄發漁陽兵使此生奉檄詣寵寵官屬皆疑會恂至寵遂發兵以漢行長史事與都尉嚴宣護軍蓋延王梁等將歩騎三千人共攻薊誅王郞大將趙閎等所過攻下郡邑誅其將帥將及廣阿聞城中車騎甚衆漢乃勒兵問曰此何兵曰大司馬公也時王郞亦遣大司馬畧地漢復問曰大司馬爲何公也對曰劉公也漢聞之喜即進兵城下初聞二郡兵且至或云王即來甚憂之及聞外有大兵公親乗城勒兵傳問之漢等答曰上谷兵爲劉公諸部莫不喜躍耿弇得所歸附矣耿弇拜於城下具言發兵狀公廼悉召入咲曰邯鄲將帥數言我發漁陽上谷兵吾聊應一言我亦發之何意二郡良爲吾來方與士大夫共此功名耳乃皆以爲偏將軍加況寵大將軍封列侯呉漢爲人質厚少文造次不能以辭自逹然沈勇有智畧鄧禹及諸將多知之數相薦舉乃得召見遂見親信常居門下更始遣尚書令謝躬率六將軍討王郞不能下王郞遣將攻信都信都大姓馬寵等開城內之收太守宗廣及武固侯李忠母妻而令親属招呼忠時寵弟從忠爲校尉忠即時召見責數以背恩反城因格殺之諸將皆驚曰家屬在人手中殺其弟何猛也忠曰若縱賊不誅則二心也公聞而美之謂忠曰今吾兵巳成矣將軍可歸救老母妻子宜自募吏民能得家屬者賜錢千萬來從我取忠曰蒙明公大恩思得效命誠不敢内顧宗親郞所置信都王捕繫後大將軍邳􅊮父弟及妻子使爲手書呼􅊮曰降者封爵不降族滅􅊮涕泣報曰事君者不得顧家􅊮親屬所以至今得安於信都者劉公之恩也公方爭國事􅊮不得復念私也公乃使左大將軍任光將兵救信都光兵於道散降王郞無功而還㑹更始所遣將攻拔信都敗走王郎兵忠彤家屬悉全公因使忠行太守事還歸信都誅郡中反者數百人公東擊鉅鹿未下耿純說公曰守鉅鹿士衆疲弊雖屠其城邯鄲存不如以精銳擊邯鄲若王郎巳誅鉅鹿不戰自服矣公從之夏四月攻邯鄲王郎使杜威持節詣軍威曰實成帝遺體子也公曰設使成帝復生天下亦不可得也況詐子輿者乎威固請降求萬戸侯公曰一戶不可顧得全身耳威曰邯鄲雖鄙幷力城守尚曠日月終不君臣俱降但欲全身也乃辭去少傅李立反開城門五月甲辰破邯鄲誅王郎公得文書謗毁公者皆燒之曰令反側子自安也更始遣使封公爲蕭王令罷兵將有功者詣行在所遣幽州牧苗曾之部王幸温明殿耿弇請問曰吏士死傷者多願歸上谷益兵王曰王郎巳破河北畧平國家今都長安天下大定復用兵何爲弇曰王郎雖破天下兵革乃始耳今使者來欲罷兵不聽也銅馬赤眉之屬數千萬人所向無前聖公不能辦也敗必不久王曰卿勿妄言我告斬卿弇曰大王哀厚弇如父子故敢披赤心王曰我戲卿耳何以言之弇曰百姓患苦王莽復思劉氏聞漢兵起莫不歡喜從風如去虎口得歸慈母倒㦸橫矢不足以喻更始未都長安時百姓未具責也今都長安即位宫室成以爲天子而大臣專權貴戚縱横夫政令不出城諸將虜掠甚於賊盜百姓愁怨天下失望是以知必敗也明公首事南陽破昆陽下百萬衆今復定河北以義征伐表善懲惡躬自剋薄發號嚮應望風而至天下至重公可自取無令他徃得之王曰卿得無爲人道之弇曰此重事不敢爲人道於是王謂鄧禹曰吾欲取幽州突騎誰可使者禹曰呉漢文能柔未附武足㫁大事可用也乃以漢爲大將軍持節與耿弇發幽州十郡兵幽州牧苗曾不肯調漢將二十騎至無終曾以漢無備出迎漢漢麾騎收曾即誅之遂取其軍威振北州漢將兵詣王所諸將望見漢還兵馬甚盛皆曰此欲自將之何肯與人及漢至上公簿請所付諸將各多請之王曰屬者恐其不與人今所請又何多也諸將由是服焉秋王擊銅馬於清陽破之又擊髙明董連大破之衆十餘萬悉降皆封其渠帥諸將未能信賊賊示二其心王勑降賊各勒兵王將輕騎入其營渠帥曰王推赤心置人腹中安得不投死由是遂安悉以賊配諸將營更始柱功侯李寳益州刺史張忠徇益州公孫述使弟將兵要之綿竹大破寳忠由是威振益州功曹李熊說述曰方今四海震盪匹夫橫議將軍割據千里地十湯武奮發威德以投天隙王霸之業成矣宜改名以鎮百姓述以爲然乃自立爲蜀王遣將軍侯丹守白水關任滿據扞關蜀地肥饒民強兵實遠方多歸之卭人長貴殺王莽越嶲太守自立爲卭穀王稱臣於述塞外君長皆貢述更始武陰王李軼據洛陽尚書謝躬據鄴各十餘萬王患焉將取河内以迫之謂鄧禹曰卿言吾之有河内猶髙祖之有關中關中人非蕭何誰能之使一方晏然髙祖無西顧之憂者矣呉漢之能卿之舉矣復爲吾舉蕭何禹曰冦恂才兼文武有御衆才非恂莫可安河内也王至河内太守韓歆謀將城守備武人衞文多奇計馮異素知之異言於王使衞文說歆令降岑彭亦勸歆遂從之王以歆不即降置之皷下將斬之彭在城内使人召彭初彭賴伯昇獲免因以兵屬伯昇被害更爲朱鮪校尉後爲潁川太守將之官道不通乃將麾下數百人從邑人韓歆於河内彭見王曰赤眉入關更始危殆四方蜂起羣雄競逐竊聞大王開拓河北此誠皇天祐漢士民之福也彭賴司徒公得全濟今復遇大王誠願出身自効以報恩施王深納之因言歆南陽人可以爲用乃赦之於是以馮異爲孟津將軍冦恂爲河内太守王謂恂曰河内富實帶河爲固北通上黨南迫洛陽吾將因是以濟髙祖留蕭何守關中吾令委卿以河内恂乃伐其園竹以爲兵矢收淇租賦以給年粮養馬二千匹以供軍用劉隆字元伯王之宗人更始初爲偏將軍預於昆陽之戰更始入關請迎妻子至洛陽聞主在河北隆單身歸王王以爲騎都尉使與馮異守洛陽李軼聞隆歸王乃盡殺隆妻子河北旣定遣呉漢岑彭擊謝躬時拒五校於隆慮令大將軍劉慶守鄴城漢說魏郡太守陳康曰上智處危以求安中智因危以爲功下愚安危以自亡危亡之至在人所由不可不察今京都敗亂四方雲擾劉公所向輒平之公所見也謝尚書不量力内與蕭王違戾外失河北之心公所知也公據孤危之城堅守自安以待滅亡義無所立節無所成不若開門内軍轉禍爲福免下愚之危收中智之功此計之至者也於是陳康乃收劉慶及躬妻子開門内漢軍躬聞漢等至將輕騎歸不知漢巳得其城與數百騎夜至鄴時漢在城外彭在城中開門内躬脅將詣傳斬之初更始遣躬將馬武等六將軍與世祖俱定河北及王郞平躬與世祖復俱共在邯鄲中不居城内躬所領諸將多放縱爲百姓所苦躬不能整又數與王違戾常欲襲之以爲兵強故止然躬勤於吏事毎至所在理冤結決詞訟王常稱之曰謝尚書真吏也躬由此不自疑躬妻子嘗誡之曰終爲劉公所制焉馬武字子張南陽湖陽人少時避怨綠林中起隨擊甄阜二公兵故王常親引之邯鄲旣平王登臺從容謂武曰吾得漁陽上谷突騎欲令將軍主之何如武讓不敢當然歸心於王武旣降置之帳下毎饗諸將武斟酌於前自以新屬也甚卑恭不敢與南陽時等王善之冬十二月赤眉西入關更始定國上公王匡襄邑王成丹抗威王劉均據河東丞相李松大司馬朱鮪據弘農拒之王度長安必危方憂山東關西未有所屬乃以鄧禹爲前將軍中分軍西入關以韓歆爲軍帥李文程憲李春爲祭酒馮愔爲積弩將軍樊崇爲驍騎將軍宗歆爲大將軍鄧尋爲建武將軍耿訢爲赤眉將軍左于爲軍師戎士二萬王送鄧禹於野王王反而獵於道見二人者即禽王曰禽何向二人舉手西指曰此中多虎臣毎即禽虎亦即臣大王勿徃也王曰苟有備虎何患二人曰何大王之謬也昔湯即桀於鳴條而大城於亳其備非不深也武王即紂而殺之故即人者人亦即之雖有重備豈能自守乎王不自得顧謂左右曰此隱者也將之乃不辭而俱去後漢灮武皇帝紀卷第二
