body:
  text: 後漢孝安皇帝紀卷第十六袁宏永初元年春正月癸酉大赦天下靑兖豫徐兾并六州民飢三月癸酉日有蝕之詔公卿舉賢良方正能直言極諫者各一人夏四月太傅張禹為安鄉侯太尉徐防為龍節侯司空尹勤為傅亭侯車騎將軍鄧隲為上蔡侯城門校尉悝為業侯虎賁中郎將弘為西平侯黃門郎闓為西華侯食邑各萬戶隲奉節親迎增封三千戶隲逃避使者詣闕上疏固辭乃許五月戊寅熒惑逆行守心夲志以為後周章謀廢帝之應也立壽光侯並為北海王甲戌長樂衛尉魯恭為司徒是時詔書令得案驗薄罪恭上疏諌曰詔書憂萬人而郡國記言勞來貧民多為煩擾逮證一人有疑罪近及良人數十人上逆時氣妨廢農功案易消息四月乾卦用事經曰乾以美利利天下又曰時乘六龍以御天五月姤卦用事經曰后以施命誥四方君以夏至之日止四方行者助隂氣也況於逮召考掠擾百姓哉月令孟夏斷薄刑謂正罪不欲令久繫不謂可考正罪法也故出輕繫明不欲拘之也月令周世所造而所據皆夏之時也所變者唯正朔衣裳犧牲徽號器械而巳不可變易者也易曰潜龍勿用言十一月十二月也又曰馴致其道至堅氷也言五月微隂起至十一月堅冰至也十一月中孚曰君子以議獄緩死可令疑罪皆詳議其法大辟之罪極盡冬月乃斷其獄其立春在十二月中者勿以報囚詔從之爵太后鄧氏母新野君西羌叛車騎將軍鄧隲率師擊之是時水雨屢降災虐並生百姓飢饉盜賊群起於是策免太尉防司空勤太傅禹稱疾告退丙戌死罪以下及亡命贖罪各有差庚寅太傅張禹為太尉太常周章為司空十月倭國遣使奉獻初上立非大臣意也司空周章謀誅鄧隲兄弟廢太后及上立平原王為帝事發覺十一月丁亥司空周章有罪自殺潁川太守張敏為司空十二月郡國十八地震李固曰地者隂也法當安靜今乃越隂之職專陽之政故應以震動太后攝政之應也騎都尉王仁將兵迎悝將吏還入塞遂棄西城都護任尚抵罪二年春京師旱太后親幸洛陽獄省罪囚繫夏四月甲寅濮陽阿城中失火燒殺三千餘人冬十一月車騎將軍鄧隲與羌戰平襄羌詐降既而復叛侵掠邊郡吏民死者無數并凉遂虛十二月徵車騎將軍鄧隲還京師遣使者迎拜隲為大將軍詔大鴻臚親迎中常侍郊勞以乘馬束帛於是悝為執金吾弘為屯騎校尉闓為捕兵校尉郎中潁川杜根與同署郎共諫太后不宜久攝政太后怒以絹囊盛根於殿撲殺之其諫者皆以被撲矣根先知召司撲者隂共為意乃使執撲者不加力既畢皆載出城外根以撲輕得免逃竄宜城山中為酒家傭積十年餘酒家知其賢常厚遇之及鄧太后崩天子知根等忠普告天下使録其子孫根乃自出公車徵轉遷至濟隂太守以德讓為政移風易俗是歲郡國十地震三年春正月庚子皇帝加元服大赦天下賜公卿巳下天下男子爵各有差騎都尉任仁將兵討凉州三月京都飢人相食癸巳司徒魯恭以災異策罷恭再為宰相掾屬至卿大夫者數十人恭門下耆生或望恭為之論議恭曰學之不講是吾憂也不有鄉舉乎終無所言學者受業必躬核問難道成然後謝遣之學者曰魯公謝與議論不可虛得也謙退不伐有善終不自顯是以在位不以亮直稱自為三公常稱病不視事上輒遣小黃門問疾喻令強起者數矣至是遂稱疾篤賜錢二十萬年八十餘終於家賜至厚以兩子為郎弟丕字叔陵以篤學質直稱仕至侍中三老章帝初對策曰政莫先於從民之所欲除民之所惡先教後刑先近後遠君為陽臣為隂君子為陽小人為隂京師為陽諸夏為隂男為陽女為隂樂和為陽憂苦為隂各得其所則和調精誠之所發無不感浹吏多不良在於賤德而貴功欲速莫能修長久之道古者貢士得其人者有慶不得其人者有讓是以舉者務力行選舉不實咎在刺史二千石書曰天工人其代之觀人之道幼則觀其孝順而好學長則觀其慈愛而能教設難以觀其謀煩事以觀其治窮則觀其所守逹則觀其所施此所以核之也民多貧困者急急則致寒寒則萬物多不成去本就末奢所致也制度明則民用足刑罰不中則於名不正正名之道所以明上下之稱班爵號之制定卿大夫之位也獄訟不息在爭奪之心不絶法者民之儀表也法正則民慤吏民凋弊所從久矣不求其本浸以益甚吏政多欲速又州官秩卑而任重競為小功以求進取生凋弊之俗救弊莫若忠故孔子曰孝慈則忠治姦詭之道必明慎刑罰孔子曰導之以禮樂而民和睦以犯難民忘其死死且忘之況使為禮義乎丕後為靑州刺史遷拜趙相門徒數百人吏民愛之趙王嘗欲避疾便時止於學官丕不聽王上書自言詔下丕丕上言曰禮諸侯薨於露寢大夫卒於適室死生有命本無偏旁可避者學宮傳先王之禮樂教化之處不宜妨塞之詔書從之丕每論難稱曰經者傳先師之言非從巳出不可相讓相讓則道不明若規矩權衡之不可枉也難者必明其據說者務力其義浮華無用之言不陳於前故精不勞而道術逾彰也夏四月丙寅大鴻臚夏勤為司徒以用度不足令吏人入錢榖為關內侯以上林廣城苑可墾闢者與貧民五月丙申立樂安侯子延平為淸河王六月烏桓寇代郡秋七月太后有疾左右請禱以人為代太后聞之怒即勑掖庭令何故有此不祥之言自今巳後祀但謝過而巳不得復有此言冬十月南單于擅叛行車騎將軍大司馬何熙將兵征擅擅降十二月辛酉郡國九地震有星孛于天苑四年春二月胸奴寇常山於時西北有事民飢國用不足大將軍鄧隲欲棄凉州專務北邊曰譬家人衣壞取一以相補猶有所完若不如此將兩無所保公卿皆以為然郎中虞詡說太尉張禹曰若大將軍之策不可者三禹曰奈何詡曰先帝開土闢境而今棄之此不可一也棄凉州即以三輔為塞園陵單外此不可二也諺曰關西出將關東出相烈士武臣出凉州土風壯猛便習兵事今羌胡所以不過三輔為腹心之害者以凉州在其後也凉州士民所以推鋒執鋭蒙矢石於行陳不避危亡父死於前子戰於後無反顧之心者為臣屬於漢也今推而捐之割而棄之庶人安土不肯遷徙必引領而怨曰中國棄我於夷狄雖赴義從善之人不能無怨恨卒然起謀以圖不軌因天下之飢弊乘海內之虛弱豪傑相聚量才五帥驅氐羌以為前鋒席卷而東雖貴育為卒太公為將猶不能當如此則函谷以西園陵舊京非復漢有此不可三也議者喻以補衣猶有所完詡恐疽食浸淫而無限極也禹曰意不及此微君大計幾敗然則計將安出詡曰所憂與明公異恐凉州一旦有囂述之變宜且羅其雄傑收其冠帶引其牧守子弟於朝令諸府各辟數人外以勸其勤內以散其謀計之長者從之俄而詡遷朝歌長時朝歌多盜賊連年不解親舊皆勞弔之曰得朝歌何哀也詡笑曰難者不避易者必從臣之節也不遇盤根錯節無以别堅利此乃吾立功之秋怪吾子以此相勞也詡謁河內太守馬稜稜曰君儒者當謀謨廟堂乃在朝歌甚為君憂之詡曰此賊犬羊相聚以求溫飽耳明府未以為憂稜曰何以言之對曰賊去敖倉不過百里不知取以為糧靑兾流人前後連屬不知略以為衆出入河山守厄塞此為斷天下之右臂今則不然此無大計之效也於是詡悉罷戎兵而設方略即時皆平乙亥詔曰自建初元年徙邊者各歸本郡沒入為官奴婢者免為庶人三月西羌寇漢中戊子杜陵園火夏四月丁丑大赦天下新野君有疾太后與上親幸其第宿止連日太尉張禹司徒夏勤司空張敏固諫乃還甲戌新野君薨太后制齊縗上緦麻贈送之禮一依東海恭王司空持節護喪事隲等皆棄官行服服除有司奏隲等復輔政固請乃止非朝廷大議未掌元初中悝弘闓並卒未大斂天子並封爵太后輒不許太后上制服新野君贈賵甚厚使九卿護喪事悝子廣宗襲爵為業侯弘子廣德為西平侯封京子寶為安陽侯隲子鳳為侍中初都護任尚致鳳馬及尚坐事檻車徵鳳懼其及巳私屬中郎馬融宜在臺閣事發覺鳳先自首隲乃髠妻及鳳上疏謝罪新野君薨後太后崩上見白首者未嘗不流涕宗族耆老皆加親禮讀書至孝子事親喪親之禮常廢書噓欷太后久執朝政從樂安侯康內懼盛滿數上書諫宜崇公室挹損私權言甚切至太后怒康乃託病不朝太后使家舊往問之初外給使以宮中婢年長者為中夫人因自以通康曰汝非我家婢也何自謂中夫人婢聞之怒因言託病不遜遂免康官遣歸國絶康屬籍五年春正月庚辰朔日有蝕之本志以為正旦王者聽朝之日也是時太后攝政天子守虛位不得行其號令蓋陽不克之象也乙巳太尉張禹以災異䇿罷閏月戊戌詔舉賢良方正能直言極諫之士各一人及至孝與衆卓異者冬謁者劉珍上言曰竊見永平初虎賁中郎將梁松言皇太后宜入廟與陛下交獻以彰至孝之心孝明皇帝務遵經典使公卿博士議時太傅鄧禹奏宜如松言光烈皇后於是入廟惟皇太后聖德通靈與神合契宜入宗廟如光烈皇后故事率禮復古垂示萬代事下公卿僉曰宜如珍言六年春正月甲寅皇太后初親祭於宗廟與皇帝交獻大臣命婦相禮儀夏四月乙亥司空張敏以久病策罷太常劉愷為司空五月丙寅羣吏復秩賜爵有差丁卯封鄧禹馮異等後九人為列侯六月辛巳大赦天下丙申河東水變色皆赤如血本志以為鄧太后攝政之應也七年春郡國十八地震夏四月丙申晦日有蝕之元初元年春正月甲子賜天下男子爵各有差鰥寡篤癃不能自存者粟人三斛貞婦人帛一匹三月巳卯日南地坼長一百餘里夏四月丁酉大赦天下詔三公卿士舉敦厚質直各一人九月辛未大司農司馬苞為太尉冬十月戌十朔日有蝕之是歲郡國十五地震高句麗王宫數寇幽部是歲宫死玄菟太守姚光上言欲因其喪發遼東樂浪三郡兵出擊之議者以為可許尚書陳忠曰前者宫傑惡光不能討今自死宜遣使者吊問因責讓宫時所犯告以赦令不加誅責取其後善從之句麗由是服焉二年春以郡國被災賑粟貧民自上即位至于是年頻有水旱之災百姓飢饉每歲遣使者開倉廩賑飢民三月癸亥京都大風拔樹夏四月丙午立皇后閻氏河南滎陽人暢之女也暢有五男二女長男顯及術景曜昆長女迎次姬即后也以選入掖庭為貴人有寵立為皇后暢為長水校尉太尉司馬苞薨秋七月西羌犯境右扶風太守种皓南安太守杜佐擊之皆被害九月壬午晦日有蝕之冬十月郎將任尚將兵屯三輔懷令虞詡說尚曰使君奉國威靈討捕叛羌兵出巳久而未有伏誅者三州屯兵二十萬民棄農桑戶無聊生於此上聞誠竊危之尚曰憂惶久矣不知所出詡曰兵法弱不攻強走不遂飛自然之勢也今虜皆騎馬尤良一日之間行數百里來如風雨去如絶絃以步追之勢不相及故所以曠日而無功也為君計者莫如罷諸郡兵令二十人共市一馬民出數千錢得免介胄去行伍以萬騎之衆逐數千之虜追尾掩截其道自窮便民利事大功必立尚從之大破羌戎餘種悉降上問何從發此計尚表之受於懷令虞詡由是知名詡有將帥之任乃遷武都太守羌數千人於陳倉殽谷欲遮道擊詡詡乃宣言上書請兵兵至及發虜聞之將謂實然乃晨夜進道時冬月多雪使騾驢居首人隨其後日行百五六十里勑吏士人作兩竈日增之或問曰孫臏減竈而君增之兵法日行三十里而戒不虞今日且二百里何也詡曰虜多吾少勢不相敵緩行即為虜所及故兼道取疾若舌之避齒耳虜見吾竈多謂羣兵來迎追吾必遲孫臏見弱吾欲見強勢固不同也詡既到郡兵不滿三千人虜衆萬餘人攻赤亭詡便出戰勑曰吾言強弩發於是小弩先發虜以為弩力極不能至即皆解施乃使強弩射之發無不中虜前行潰乘勝追之殺百餘人詡謂掾吏曰何如皆謝曰所不及明日令從東郭門出北郭門入貿易衣服四轉無巳虜不知其數謀將退詡乃分數百兵險要處設伏虜果引去迎擊大破之於是羌畏伏武都遂安詡乃占相地勢築營壁百八十所招還流民三千餘戶郡以富實冬十一月庚申郡國十一地震十二月庚戌司空劉愷為司徒光祿勳袁敞為司空三年春二月郡國十地震夏四月壬寅封皇后父閻暢為北宜春侯冬十一月丙戌初聽大臣行三年喪郡國九地震四年春二月乙巳日有蝕之九江太守以聞乙卯大赦天下壬戌武庫火夏四月戊申司空袁敞薨微字升平少有節操及在朝廷廉潔無私坐子與尚書郎張俊交通漏泄省中語策罷敞不阿權勢失鄧氏㫖遂自殺朝廷隱之敞死葬以公禮復位其子五月丁丑太常李咸為司空五年秋七月丙子詔有司由舊令崇節儉嫁娶送終不得奢侈八月鮮卑冦代郡是歲郡國十四地震六年春正月乙巳京都郡國三十二地震水泉湧出壞城郭宇舍壓殺人三月庚戌初祀六宗於國北儀比太社夏五月京師旱七月鮮卑入塞冬十二月戊子朔日有蝕之郡國八地震是歲北單于與車師後部王攻燉煌長史索班殺之遂略有北道逐太守曹宗宗請兵擊胸奴報索班之耻因復取西域司空司勇議曰愚以為邊境者中國之脣齒脣亡則齒寒其理然也先帝命將征伐曠引年歲然後西域內屬邊境獲安宗不度當時之宜自見有喪敗之負欲舉兵荒外以要功名是為始禍唱兵其患難量也今府藏未充而當逺出師師無後繼是示弱於逺夷暴短於海內臣愚以為不可許燉煌郡舊有營兵三百人今宜復置之西域長史屯蘭樓蘭樓西當焉耆龜兹是則周遊一處而所制者多也公卿皆從勇議勇習邊事有籌策於是以勇為西域長史頃之勇發鄯善車師前部王兵擊後部王大破之捕得後部王胸奴使者將至索班所沒處斬之傳首洛陽永寧元年夏四月丙寅立皇子保為皇太子大赦天下賜公卿巳下金帛天下男子爵各有差鰥寡孤獨癃篤不能自存者人粟三斛貞婦人帛一匹巳巳立濟北王子萇為樂城王立河間王子翼為平原王萇驕淫失度兾州刺史舉奏萇罪至不道尚書侍郎岑宏議以為非聖人不能無過故王侯世子生為立賢師傅以訓導之所以目不見耳不聞非能保其社稷高明令終萇少長蕃國內無過庭之訓外無師傅之道血氣方剛卒受榮爵機微生過遂陷不義臣聞周官議親蠢愚見赦萇不殺無辜以讉訶為非無赫赫大惡可裁削奪損其租賦令得改過自新革心向道詔貶萇為臨湖侯袁宏曰昔王侯身能衣而宰設服足能行而相者導進口能言而行人稱辭間之有禮輔之有物少而習之長而不改和睦之性與教而淳淫僻之心無由得生若縱而任之不為師保恣其嗜欲而莫之禁禦性氣既成不可變易情意流蕩不可收復故動之凶德而國殄身亡也秋七月乙丑日有蝕之酒泉太守以聞六月羌寇張掖十一月司徒劉愷固疾策罷太常楊震為司徒後漢紀孝安皇帝卷第十六
