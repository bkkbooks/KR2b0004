body:
  text: 後漢孝安皇帝紀卷第十七袁宏建光元年春正月高麗冦玄菟二月辛亥大赦天下三月辛巳皇太后鄧氏崩癸未大歛封大將軍隲爲上蔡侯丙子葬和熹鄧后𥘉上少號聰明故太后立之後有不可意上乳母王聖知之見太后久不歸政恐有廢置意中常侍黃門郞李閏爲上伺候及后崩因言鄧悝兄弟嘗從尚書鄧防取廢帝故事謀欲立平原王爲帝五月庚申有司奏故金吾悝屯騎校尉弘歩兵校尉闓大逆無道宜追奪爵土以眀褒貶遂免悝子廣宗弘子廣德等爵宗族皆免歸本郡以隲不豫謀徙封沙羅侯行道爲郡縣所逼隲與鳳自殺廣宗隲從弟遵約皆自殺唯廣德母與閻后同産故得免以樂安侯康賢而有行徵爲太僕卿𥘉河間孝王子蠡吾侯翼與諸王子朝京師鄧太后善翼之爲人也封翼爲平原王因留京師及太后崩上以翼謀圖不軌竊闚神器乃貶翼復蠡吾侯封中常侍李閏江京爲列侯賞發鄧氏之謀也大司徒朱寵隲之所舉乃肉袒輿櫬上疏曰和熹皇后聖善之德爲漢文母兄弟忠孝同心憂國宗廟有主王室是頼功成身退讓國遜位歷世外戚無與爲比當享積善之祐宜象謙約之報横以宫人單辭事不可信隲等父母羣從不以夀終尸喪流離逆天威人宜皆還葬寵其遺孤以答亡魂安帝𥘉天災疫百姓飢饉死者相望盗賊羣起四夷反叛隲等崇節儉罷力役推賢進能盡心王室故天下頼以復安乃𬒳誅責其事闇昧衆庶多稱其冤上旣聞之又感寵之言乃切詔州郡還隲等喪葬以舊瑩使使祠以中牢諸從兄弟歸京師袁宏曰夫吉凶由人而存亡有地擇地而處君子所以無咎也長木之標其勢必顚勢極故也勢極則受患故無全物焉然則貴盛之極傾覆之所由也外戚則尤甚焉得之不以至公宰割之日久也夫人君之勢非不高且極也置君於無過之地萬人莫之計人臣則不然比肩而立相與一體也操大權於天下萬物之所惡也周公且猶狼狽而況其餘乎夫慿寵作威以取傾覆理用等矣若乃推心向善而不免闇昧之誅所處之地危也死而不異二者自處之道然未逹擇地之方昔楚人三世殺其君將立王子捜搜逃之丹穴楚人承以玉輿燻之以薪乃出故曰王子搜非惡爲王惡其爲己患也然則外戚之患也非徒一巳燋爛而歷代貴寵未有不患其爲患豈不哀哉戊申有司奏尊清河王爲孝德皇帝左姬爲孝德皇后宋貴人爲敬隱皇后左姬犍爲武陽人父坐事姬與姊妹俱入掖庭和帝特詔分宫人賜諸王以姬爲淸河孝王姬有令色王絕重之生孝安帝於是天子始親萬機尚書陳忠以爲首政之初宜徵天下隱逸乃詔公車以玄纁徵南陽馮良汝南周爕皆稱疾不至良字君卿少爲縣吏從尉迎督郵良耻厮役因毀其車馬壞其衣冠絕迹逺遁妻子見敗車壞衣皆以猛獸所食遂發喪制服良至犍爲從師受業十餘年還鄉里雖處幽闇必自整頓非禮不動鄕里以爲師舉賢良方正敦朴皆不行爕字彦祖敦詩書非法不言所與交游者不過數四人室家相待如賔客化行鄕黨舉孝廉茂才公車再徵皆不就上新聽政開諌諍路尚書陳忠以直言爲名而人主不能容乃上書通廣帝意曰臣聞人君廣山藪之大納切直之言忠臣盡蹇蹇之節不畏逆耳之誅是以高祖舍周昌桀紂之譬孝文嘉袁盎人豕之喻世宗納東方朔宣室之正孝元容薛廣德自刎之諫陛下崇寛厚之德推宋景之誠引咎責躬咨訪羣吏言事者新蒙採録顯列二臺必承風而靡爭効切直如有管闚愚見妄陳得失雖苦口逆耳不得事實宜優游寛容以遵四帝之緒也秋七月己亥大赦天下八月甲子故司徒劉愷爲太尉九月戊子上幸衛尉馮石上寳劒玉玦冬十二月丙申乃還宫己丑郡國三十五地震壊城郭壓殺人本志以爲安帝不明宫人與王聖專權之應也鮮卑冦玄菟庚子絕大臣行三年喪尚書陳忠上疏曰昔先王孝治天下始於愛親終於哀戚上自天子至於庶人尊卑貴賤其義一也夫人生三年乃免父母之懷先聖縁情著其節制故曰臣有大䘮君三年不呼其門周室陵遲禮制衰廢蓼莪之人作詩自傷曰瓶之罄矣惟罍之耻言已不得終竟子道者亦上之耻也高祖受命蕭何創制大臣有寧告之科合於致憂之義建武初撥亂之世國政草創人倫未厚鮮循三年之喪以報顧復之恩禮義之廢實由於此然仁道無逺弘之即是故籍田之科起於太宗孝廉之貢發於孝武郊祀之禮定於元成三雍之序備於永平大臣送終于今乃章聖功美業於是乎在孟子有言老以及老㓜以及㓜天下可運於掌臣願陛下登高北望以甘陵之思揆臣子之心則海内羣生各得其所上不從袁宏曰古之帝王所以篤化美俗率民爲善者也因其自然而不奪其情民猶有不及而況毀禮止哀滅其天生乎冬十月羌冦張掖武威十二月高句麗圍玄莬延光元年春夫餘王遣兵助玄莬使貢獻三月丙午大赦天下賜天下男子爵各有差鰥寡孤獨篤癃不能自存者粟人三斛貞婦人帛三匹夏四月京師地震癸巳司空陳褒以災異免於是猶有風雷之變有司復以追咎三公尚書僕射陳忠上書曰臣聞君使臣以禮臣事君以忠故天子三公入則㕘議政事出則司察羣后然王者虚己待以殊禮在輿爲軾在坐爲起漢典舊事丞相所揔靡有不聽今之三公有古之名而無其實選舉誅賞一由尚書尚書之任重於三公凌夷巳來其漸久矣近以地震策免司空今言者復欲切讓三公以解天意臣愚闇竊信宋景克己之誠孝成皇帝時妖星守心納賁麗之說令丞相方進自裁卒不蒙其福以此況之是非之分其可詳見今尚書奏事有所請造及決天下罪法不依故事者宜使左右責求其意割而勿聽上順古典之義下防威福之專置方圎於規矩審輕重於權衡誠國家之典萬國之法也忠意在裦崇大臣待下以禮九卿疾病使者臨問加賜錢帛皆忠之議也遷尚書令司隷校尉初忠父太尉寵守正不事諸鄧故忠不得志於其門及鄧氏𬒳誅衆庶多冤之而忠數上書䧟城其惡奏劾司農朱寵太子之廢諸名臣來曆等守闕固爭忠又劾奏當丗以此譏忠五月庚戌宗正劉授爲司空秋七月癸卯京師地震庚申高句麗王乞降八月羌冦凉州戊子陽陵寢殿火本志曰棄法律逐大臣殺太子以妾爲妻則火不炎上謂火失其性而爲災也今發于先陵此天子將變象也若曰不當廢太子以自翦如火不當害先陵之寢也辛卯黃龍見九眞九月戊申郡國二十七地震冬十月鮮卑冦鴈門定襄十一月鮮卑攻九原二年春正月燉煌太守張璫上書陳邊事曰臣在京師亦以爲西域宜棄今親踐其土地乃知棄西域則河西不能自存謹陳西域三策今北虜呼衍王等展轉蒲類奏海左右可發張掖酒泉屬國之吏士義從合三千五百人集崑崙塞先擊呼衍王絕其根本因發鄯善兵五千人脅車師後部此上計也若不能出兵可置軍司馬將士五百人四郡供其穀食岀據柳中此中計也如亦不能則棄交河城放鄯善等悉使入塞此下計也尚書陳忠上䟽曰臣聞八蠻之冦莫甚北虜漢興高祖窘平城之圍太宗屈供奉之耻故孝武憤怒深惟久長之計命遣虎臣浮河絕漠窮其虜庭當斯之時黔首隕於狼望之北山中國弊於廬山之壑府庫殫竭杼軸空虚筭至車舩貲及六畜夫豈不懷慮有故也遂規酒泉燉煌四郡以隔兩羌開三十六國妻以公主以斷其右臂是以單于孤特竄遁逺藏至於宣元遂被蕃臣關徼不閉羽檄不行由此察之戎狄可以威服難以化洽西域内附日久區區東望叩關者數矣此其不樂匈奴慕漢之效也今北虜已破車師勢必南攻鄯善棄而不救則諸國從矣若然則北虜財賄益增贍勢益殖威臨南羌與之交連如此河西四郡危逼不得不救則百倍之役興不貲之費發矣今議者但念西域絕逺恤之煩費有見先世苦心勤精之意方今邊郡守禦之具不精内郡武衛之備不修燉煌孤隅逺來告急復不轉助出無慰勞民吏外無威示百蠻辟榖蹙土經有明戒臣以爲燉煌宜置校尉案舊增四郡屯兵以西撫三十六國建屯益兵宣揚雷風兾以折衝萬里震怖匈奴於是從之夏四月戊子爵乳母王聖爲野王君聖女壻劉瓌爲朝陽侯司空楊震詣闕上書曰臣聞高祖與羣后約非功臣不得封攻城野戰棄身沙漠降服百蠻不羈之虜然後得受茅土故經制父死子繼兄亡弟及所以别親踈殊適庶尊國體重繼嗣防淫篡絕姦謀百王不易之道天子不專封封有功諸侯不專爵爵有德今瓌無他功德但以配阿母女旣忝位侍中一時之間超至封侯稽之舊制不合經義行人諠譁百寮不安臣誠知言與罪俱辭與辜會忝當台翰之任故不敢不盡言之上不從又爲阿母起第舍震復上疏曰臣聞古者三年耕有一年之儲九年耕有三年之儲故堯之遭洪水民無菜色傳曰國無三年之儲非其國也故豐年知禮凶年減除臣伏念災害發起彌以滋甚百姓空虚不能自贍重以羌虜抄掠二邊雲擾戰鬪之役至今未息兵甲軍糧恒不足給殆非社稷安寧之術伏見興起津城門内第舍雕繕之飾窮極巧妙使者將作轉相逼促盛夏土王攻山採石百姓布野農民廢業臣聞上之所取財盡則怨力盡則叛怨叛之民不可復使故曰百姓不足君孰與足上不從冬十月辛未太尉愷久病罷司徒楊震爲太尉是時京都郡國三十七地震三年春二月丙寅上與太子行幸泰山復濟陽今年田租戊子鳳凰集濟陽賜見者帛二十匹鳳凰所過亭部無出今年租賜天下男子爵二級壬辰祠五帝于汶上明堂戊戌祠孔子于闕里及七十二弟子遂幸東平魏郡河内壬戌太尉楊震策免初河内人趙騰諸闕上書陳得失收考治詔下獄震隱其狂直上疏曰臣聞堯舜之朝設直諫之鼓誹謗之木蓋欲闢廣四門開直言之路轉采負薪盡賢愚之情也乞全騰性命以納蒭蕘之言不從騰竟死於都市中常侍樊豐等由是共稱譖震騰死之後深用怨懟乃策免收震印綬遣歸本郡到洛陽沈亭震顧諸子謂門生曰人非金石死者士之常吾蒙恩居上司疾姦臣樊豐之狡猾而不誅惡孽女王聖之傾亂而不能禁知帑藏虚竭賞賜不節而不能實何面目見日月身死之日但雜木爲棺勿漆布單衣才足蓋形勿歸塜次勿設祭祀遂仰鴆而死震字伯起弘農華隂人也博學無所不究數十年不應州郡之命衆人謂晚暮而震志業愈篤年過五十乃應州郡之命大將軍鄧隲聞而辟之以爲賢舉茂才累遷荆州刺史東萊太守當之郡道經昌邑故茂才王密爲昌邑令謁見至夜懷金十斤遺震震曰故人知君君不知故人也密曰暮夜無知者震曰君知我知天知地知何故無知密慙愧而出震言行不媿於心皆此類也子孫常蔬食歩行故舊長者或諌令爲開産業震曰使後世稱曰清吏子孫以此遺之不亦貴乎及爲公卿敦古守朴推其誠心每言事不爲文辭意在臣主疾姦而已子秉以義正知名袁宏曰夫生而樂存天之性也困而思通物之勢也愛而効忠情之用也故生苟宜存則四體之重不可輕也困必宜通則天下之欲不可去也愛必宜用則北面之節不可廢也此三塗者其於趣舍之分則有同異之辨矣統體而觀亦各天人之理也是以君子行己業心所託焉古之道術有於此者夷明隱困而不耻箕子之心也璩寗聞其風而恱之舍否之通利見大人微子之趣也叔孫通聞其風而行之諫以弼君死而不貳比干之志也楊震聞其風而守之此數賢者雖行其所聞殉託不同皆終始之道而不由愧於心者也是以聖人知天理之區别即物性之所託混衆流以弘通不有滯於一方然後品類不失其所而天下各遂其生矣然君子之動非謀於衆也求之天地之中𣢾之胷懷之内苟當其心雖殺身糜軀未爲難也苟非其志雖舉世非之而不沮也夏四月戊辰光禄勲馮石爲太尉五月南單于左尸逐燒當郡部扶渠當等反秋八月辛巳大鴻臚耿珍爲大將軍戊子麒麟一白虎二同見陽翟九月丁酉廢皇太子保爲濟隂王太子甞有疾避于野王君王聖第太子乳母王男㕑監邴古與中常侍江京樊豐及聖永等爭言相是非遂誣譖男等皆幽死獄父母妻子徒日南太子思戀男等數爲歎息聖永懼有後患乃與京豐共譖構太子是時閻后寵盛京豐媚於閻顯等信之遂與后共助毀太子上召大將軍公卿議太子應廢白大將軍耿珍等事不宜奉嫡嗣太常桓焉太僕來曆廷尉張皓曰邴古等所議謀太子不知經說年未十五過惡不在身太子少宜選忠良師友輔以禮義廢置重事此誠聖恩所宜詳審上使中常侍奉詔脅諸大臣大臣皆失色來歷獨固爭之上乃免歷官削爵土是日太子廢於是光禄勲祝諷中郞將閭丘弘符節令張敬太中大夫第五頡中散大夫曹成諫議大夫李泰羽林右監孔顯治書侍御史龍調衞尉丞樂闈城門司馬徐崇開封人鄭安世等守闕上書訴太子之冤癸巳令天下死罪減一等徙邊戍亡命贖罪者各有差辛亥黃龍見曆城庚申晦日有蝕之冬十月壬午鳳皇見新豐本志曰皇之不極是謂不建時則有龍蛇之孽又曰視之不明是謂不哲時有羽蟲之孽鳳皇者陽眀之應也故非明王則隱而不見凡五色大鳥似鳳凰者多爲羽蟲之孽是時上信䜛免楊震廢太子不哲之異也丁亥行長安祠陵廟十二月乙未黃龍見琅邪是歲京師郡二十二地震四年春正月壬午黃龍二麒麟一見濮陽三月戊午朔日有蝕之庚申上幸宛當祠章陵覺體不安乙丑疾篤自宛還徵濟北河間王子年十四已下七歲已上詣京師進號皇后母北宜春夫人爲滎陽君丁卯帝崩於葉不發喪庚午還宫辛未乃發喪皇后與兄閻顯謀以所徵濟北王子北鄕侯懿爲帝嗣以閻顯爲車騎將軍乙酉北鄕侯即皇帝位太后臨朝夏四月丁酉太尉馮石爲太傅司徒劉喜爲太尉叅録尚書事故司空李郃爲司徒有司奏大將軍耿珍中常侍樊豐野王君王聖女永下獄誅己酉葬孝安帝於恭陵六月乙巳大赦天下冬十月丙午蜀郡越嶲山崩殺四百餘人辛亥北鄕侯薨車騎將軍閻顯中常侍江京等謀曰前不用濟北王今立之後必怨人乃言於太后徵濟北王河間王子將以爲嗣初太子之廢居于德陽殿西鐘下中常侍黄門孫程王成王國等常懷憤懣謀欲立之以告中常侍侯生李閏殺中常侍江京陳達劉安于省門之外王成以劒脅李閏曰太子之廢天下咸怨今北鄕早薨安帝無嗣太子保明天將啓之從我乎閏許諾成乃與閏列尚書將僕射以下到西鐘下立濟隂王爲皇帝時年十一升雲臺召百官顯聞帝立懼不知所爲小黃門樊登曰何不發兵擊之顯以太后詔越騎校尉馮詩虎賁中郞將閻景將兵屯平朔門登引詩等入省顯謂詩曰濟隂王立非皇太后意璽綬在此苟盡力効功封侯可得太后使授詩等曰能得濟隂王者封萬戶侯李閏者五千戶侯等皆許諾卒被召所將吏士少顯使詩與登迎吏士于左掖門外詩因歸營知事將敗乃格殺登閻景歸衞府收兵將欲作亂是時尚書郭鎭勒兵詣闕遇景於公車門鎭下車詔景景以刃斫鎭鎭抽劒斬景戊午使御史詣崇德殿收顯等親族下獄誅妻子徙日南初上之廢閻后豫焉議郞陳禪議以爲太后與上無母子之恩當廢羣臣咸以爲宜司徒掾周舉說司徒李咸曰昔瞽瞍常欲殺舜舜事之逾謹鄭武姜謀殺莊公奏始皇與母隔絕感考叔茅焦之言修復子道斯皆前世之迹書傳之所美也今諸閻新誅太后前宫恐悲生疾如從禪讓若有變異後世歸咎明公不刋之事也以聞上從之丁卯以王禮葬北鄉侯辛巳封孫程王國等十九人爲列侯司空劉授以阿附惡逆免十二月詔曰朕以不德纂承洪緒今隂陽不和疾疫爲害思聞忠正以匡不逮其令三公卿士舉賢良方正能直言極諫之士各一人楊震門下人訟震之冤天子加震之忠除二子爲郞賜錢二十萬以禮改葬之日有大鳥翼廣一丈三尺集于柩前低頭淚出衆人莫能驚者葬畢飛而沖天甲申少府陶敦爲司空後漢孝安皇帝紀卷第十七
