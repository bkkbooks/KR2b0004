body:
  text: 後漢孝桓皇帝紀卷第二十一袁宏建和元年春正月戊午大赦天下賜男子爵各有差鰥寡孤獨不能自存者粟人三斛貞婦帛人三匹二月黃龍見譙夏四月庚寅京兆地震以定策功益封太將軍梁冀萬戸太尉胡廣爲安樂侯司徒趙誡爲江南侯司徒袁陽爲安國侯六月太尉胡廣以病薨光禄勲杜喬爲太尉秋七月立蠡吾侯悝爲勃海王封少府梁不疑爲潁陽侯不疑弟蒙爲西平侯梁冀子胡狗爲襄邑侯不疑子焉爲潁隂侯冀孫祧爲城父侯又封中常侍劉廣等爲列侯太尉喬曰古之明君皆以用賢賞罰爲務失國之主其朝豈無貞幹之臣典誥之篇哉患得賢不用其謀韜書不施其教聞善不信其義聽讒不祥其理也昔桀紂之時非無先王之書折中之臣然下愚難移卒以亡國已然之鍳也陛下越從蕃王龍飛即位應天順人萬夫側望不急忠賢之賞而先左右之封傷善害德讒䛕暴興大將軍梁冀兄弟姦邪傾動天下皆有正卯之惡未被兩觀之誅而橫見式叙各受封爵天下惆悵人神共憤非所爲賞必當功罰必有罪也夫有功而不賞則爲善失其望姦回而不誅則爲惡遂其性故陳斧鉞而民不畏刑班爵位而人不樂善苟遂斯道非徒傷治殄民爲亂而已至於䘮身㓕國豈不慎哉喬字叔榮河内林盧人也少以孝悌稱歷位尚書九卿皆有名迹是時梁氏貴盛群臣莫不傾意惟喬直道而行在位者皆以爲不及也八月立皇后梁氏太后之妹也初爲蠡吾侯妃未及成禮而帝即位后入掖庭數月立爲皇后九月京師地震甘陵人劉文謀立清河王䔉爲帝䔉閉門拒文事發覺伏誅貶䔉爲尉氏侯徙桂陽郡䔉自殺冀於是誣太尉杜喬故太尉李固與文通謀喬固皆下獄固門生勃海王調等十餘人負鉄鑕詣闕理固大將軍長史吳祐傷固之枉與冀争之冀怒不從從事中郎馬融主爲冀作章表融時在坐祐謂融曰李公之罪成於卿手李公若誅卿何靣目示天下人兾怒而起出喬固遂死獄中郡守承旨殺之固字子堅漢中南鄭人父邰爲漢司徒固躭志於學雖三公子常自負書千里尋師親給灑掃學行根深無所不貫四方之士自逺而來僉曰復至公輔矣初固二子憲公季公並爲長吏聞䇿免皆棄官歸固知罪之將及乃命二公將小子爕還郷里固女文姬涕泣曰李氏㓕矣自太公已來積德累仁何故遇此密與二公謀共逃爕室言還京師矣郷人信之後被郡書二公皆受害王成者固之僕隷也文姬厚爲其資以爕屬成曰君執義於公家其日久矣是以臨危託君以六尺之孤若李氏復存君之名義齊於程杵富貴榮華與君同之成爲義士乃將爕徃徐州界變姓名爲酒家僕賣卜於市隂相徃來會赦得免而成病卒爕厚葬之四時祭焉爕旣歸文姬涕泣相對因屏人而言曰先公蹇蹇爲漢忠臣雖死之日猶生之年然梁氏久暴動協王威令弟幸全血屬豈非天乎宜杜絶衆人愼勿令斥言加於梁氏加梁氏則連主上連主上則禍重至矣爕敬從姉言卒以獲全爕學行才藝亞於固官至京尹卒呉祐字季英陳留長垣人父恢南海太守欲􅃮簡寫尚書章何時祐年十二諫恢曰今君逾江湖越五嶺僻在海邊風俗雖陋然多珍玩上爲朝廷所疑下爲權豪所望此書若成必載兼兩昔馬援以薏苡興謗王陽以衣囊儌名嫌疑之戒先賢所慎願君少留意矣恢笑而撫其首曰吳氏世不乏季子矣遂然其意輟而不寫祐年二十䘮父服除居無擔石之蓄不受宗人之遺牧猪長羅澤中年四十餘乃爲郡吏舉孝廉遷膠東侯相政尚清靜以身率下以褒賢賞善爲務吏民有以罪過相告訴者祐輒閉閤自責良久然後問之民有詞訟先命三老孝悌喻解之不解祐身至閭里自和之自是之後吏民不忍欺十月司徒趙誡爲太尉司空袁湯爲司徒故太尉胡廣爲司空二年正月甲子皇帝加徽號庚午大赦天下賜王侯已下金帛各有差四月丙子立都郷侯予爲平原王五月癸丑北宫德陽殿火六月立徑城侯悝爲清河王改清河爲甘陵七月京師大水十月長平盗賊陳景自號爲皇帝子伏誅三年二月己丑詔曰昔在前代封墓軾閭所以激忠厲俗以光後昆故光禄大夫周舉性侔夷齊直同史魚入叅讃納出司京輦有密靜之風予欽乃勲將登三事不幸夙終朕甚惜焉詩不云乎肇敏戎功用錫爾祉其賜錢千萬以旌素節四月丁卯晦雨肉大如手本志曰視之不明是謂不哲時則赤祥雨肉近赤祥也是時太后攝政梁冀專權枉誅良臣李固杜喬天下冤之十月太尉趙誡以疾罷太尉司徒袁湯爲太尉和平元年正月甲子大赦天下己丑太后詔曰曩者遭家不造大禍荐臻欽惟宗廟之重社稷之大爰立明哲將即委授而東南西北醜類未賔故且總攝助理萬機今悉討除逺慕復子明辟之義其及今辰皇帝稱制二月甲寅皇太后梁氏崩三月甲午葬順烈皇后乙酉爵大將軍冀夫人爲襄城君夏五月庚辰尊匽貴人爲孝崇皇后宫曰永樂皆如長樂宫故事以蕃后不得至京師居真定五官元嘉元年正月癸酉大赦天下四月己丑上㣲服幸河南梁不疑府是日天大風尚書楊秉諫曰臣聞瑞由德至災應事興傳曰禍福無門唯人所召乃者暴風迅疾殆必有異上天不言以災異譴告是以孔子曰迅雷風烈必有變動詩云敬天之怒不敢驅馳王者至尊出入有常警蹕而行清室而止自非郊廟鸞旗不駕故詩稱自郊徂宫易曰王假有廟致孝享也未有私從意志日般遊諸臣之家降尊亂卑等威無别宿衛守空宫璽􅌧委女妾設有非常之變任章之謀上負先帝下悔靡及臣奕世受恩得備納言又以薄學充在勸講特蒙光識見照日月恩重命輕敢陳其愚大將軍冀怨秉出爲扶風太守初秉侍講以經學見重太常黃瓊以秉勸講帷幄不宜外遷留拜光禄大夫當冀之時抑而不用十月司空胡廣薨太常黃瓊爲司空十一月辛巳京師地震詔百官上封事靡有所諱獨行之士各一人安平崔寔郡舉詣公事稱病不對退而論世事曰凡天下所以不治者其患在世承平政漸衰而不改俗漸弊而不悟習亂安危忽不自覺或耽荒嗜欲不恤萬機或恱衆言莫知所從或見信之臣懷寵苟免或踈逺之士言以賤廢是以紀網弛而不振智士損而不用悲夫自漢興以來三百餘年矣政令刓瀆上下懈怠風俗凋弊人民僞巧百姓囂然復思中興之功矣救世之術豈必堯舜而治哉期於紐絶拯撓去其煩惑而已是以受命之君創制改物中興之主匡時𥙷失昔盤庚遷都以易殷民之弊周穆改刑而正天下之失俗人守古不逹權變苟執所聞忽略所見焉可與論國家之事哉故言事者頗合聖聽於今湏有可採輒見掎奪何者其頑士則闇於時權其逹者則寡於勝負斯賈誼所以見悲於上世也雖使稷契猶不能行其志而况下斯者乎春秋之義量力而舉度德而行今已不能用三代之法故宜以覇道而理之重賞罰明法術自非上德嚴之則治寛之則亂其理然也爲國之法有似理身平則致養疾則攻治故德教者治世之粱肉刑法者救亂之藥石也今以德除殘是猶粱肉治疾也欲望療除其可得乎自數世以來政多恩貸御安轡馬而忌其銜四牡橫馳皇路險傾必將鉗勒鞭撻以救奔敗豈暇鳴鑾從容平路哉袁宏曰觀崔寔之言未逹王覇之道也常試言之夫禮備者德成禮順者情㤗德苟成故能儀刑家室化流天下禮苟順故能影響無遺翼宣風化古之聖人知人倫本乎德義萬物由乎化風陶鑄因乎所受訓導在乎對揚崇軌儀於化始必理備而居宗明恭肅以弘治則理盡而向化斯乃君臣尊卑之基而德和洽之本也是以大道之行上下順序君唱臣和其至德風教繫乎一人政化行於四海無犯禮而王迹彰矣及哲王不存禮樂凌遲風俗自興戸皆爲政君位且猶未固而况萬物乎於斯時也臣子自盡之日將守先王之故典則元首有降替之憂欲修封域之舊職則根本無傾㧞之慮故忠奮之臣推其義心不忍其事思屏王室故有自下匡上之功以卑援尊之事雖失順序之道然效忠之迹也欲齊王體則異乎承宣之羙欲同之不順而終有翼戴之功故聖人因事作制以通其變而覇名生焉春秋書齊晉之功仲尼美管仲之勲所以括囊盛衰彌綸名教者也夫失仁而後義必由於仁失王而後覇而致於覇必出於忠義誠仁之不足然未失其爲忠也推斯以觀則王覇之義於是見矣初上欲封大將軍梁冀使公卿會議其禮特進安樂侯胡廣太常羊儒司隷校尉祝恬太中大夫邊韶等稱冀之德宜比周公錫之山川封以附庸司空黃瓊議曰昔周公輔相成王制禮作樂是以大啓土宇賜以山川郊祀天地行天子禮此百世未有唯周公宜之耳蕭何識高祖於泗上霍光輔昭宣於中興皆益戸增封以顯其功冀合食四縣賞賜皆如霍光使天下知賞必當功爵不越德冀恨之因地動䇿免瓊丁亥司空黃瓊以災異䇿免是月五色大鳥見巳氏時以爲鳳皇本志以政理衰缺梁兾專權皆羽孽之異也二年正月丙辰京師地震四月甲寅孝崇皇后崩帝舉哀洛陽西鄉有司奏禮爲人後制服有降公卿已下各差贈送之禮儀比恭懷皇后是時大將軍梁冀輔政匽氏無在位者八月黃龍見句陽又見允衙十月乙亥京師地震永興元年五月丙申大赦天下十一月丁丑減天下人死罪一等民饑流亡數十萬口詔所在賑給太尉袁湯致仕湯字仲河初爲陳留太守褒善叙舊以勸風俗甞曰不値仲足夷齊西山餓夫柳下東國黙臣致聲名不泯者篇籍浸然也乃使戸曹吏追録舊聞以爲耆舊傳數年薨追贈特進謚曰康侯子成左中郎將逢及隗並爲三公太常胡廣爲太尉太僕黃瓊爲司徒二年正月甲午大赦天下二月初聽刺史二千石三年喪癸卯京師地震詔公卿舉賢良方正能直言極諫者各一人潁川荀淑對䇿譏切貴幸爲梁冀所忌出爲朗陵侯相吏民敬愛稱爲神君焉淑字季和棄官隱居以壽終是時潁川鍾皓字季明以德行稱官至林慮長初皓爲本郡功曹西門亭長陳寔未知名皓獨敬異焉皓初辟公府太守問有誰可代君者皓曰明府必欲得其人西門亭長陳寔可也自是名重海内寔曰鍾君似不察人不知何獨識我潁川李膺常嘆曰荀君清識難尚鍾君至德可師皓之嫂膺之姑也有子曰覲與膺同年而並有令名覲爲人好學慕古有進退之行膺祖太尉脩常言覲似我家性國有道不廢國無道免於刑戮者也復以膺妹妻之覲屢𬒳辟命未嘗屈就膺謂覲曰孟軻以爲人無是非之心非人也弟於是何太無皂白邪覲嘗以膺言吿人曰元禮祖父在位諸並盛又諱公之甥故得然乎國武子好招人過以爲怨本豈其時保身全家袁宏曰鍾生之言君子之道古之善人内修諸己躬自厚而薄責於人至其通者嘉善而矜不能其狹者正身而不及於物若其立朝爲不得已而後明焉事至而應之非司人之短者也如得其情猶復託以藜蒸使過而可得悔失而自新之路長君子道廣而處身之途全矣末世陵遲臧否聿興執銓提衡稱量天下之人揚清激濁繩墨四海之士於是德不周而怨有餘故君子之道亢而無必全之體小人途窮而有害勝之心風俗凋薄大路險巇其在斯矣六月乙丑封乳母馬惠子初爲列侯九月丁卯朔日有蝕之太尉胡廣免司徒黃瓊爲太尉光禄勲尹頌爲司徒閏月蜀郡盗賊李伯自稱太初皇帝伏誅元壽元年正月戊申大赦天下二月司冀民饑人民相食詔所在賑給各有差時梁氏威勢傾天下而上無繼嗣災異數見潁隂人劉陶上䟽曰蓋人非天地無以寓生天地非人無以爲靈是故帝非民不立民非帝不寧夫天地之與帝帝之與民猶首之與足相湏而行混同一體自然之勢也臣竊觀之今玄象錯度日月不明地裂川溢妖祥並興胤嗣仍絶民率流亡昔夏癸由此而廢啇辛以斯而䘮若不悔寤恐懼將無及矣伏惟陛下年隆德茂中天稱號襲常存之爵修不易之制目不視鳴條之事耳不聞檀車之聲天災不卒有痛於肌膚震蝕不卒有捐於己身故篾三光之錯不畏上天之怒怡民饑少憂忽震裂之變輕無嗣之禍殆國家之命非所以彰羙祖業克保天祉者也當今忠諌者誅䛕進者賞嘉言結於忠舌國命在於讒口擅閻樂以咸陽授趙高以車府夫危非仁不扶亂非智不救故武丁得傳說以消鼎雉之變周宣用山甫以濟幽厲之荒竊見兾州刺史朱穆烏桓校尉李膺皆履正清修貞介絶俗穆前在兾州彈紏豪桀掃滅饕惡肅清萬里不仁者逺雖山甫不畏強禦誠無以逾也膺前後歷職正身率下及掌戎馬鎭撫北疆神武揚于朔州強胡懾於漢北文旣爼豆武亦干戈功遂身退家無私積斯則中興之良佐國家之柱臣也宜還本朝夾輔王室不合久屈閒曹委於草莾臣恐小人道長遂成其敗犯冒天威言誠非議知必以身脂鼎鑊爲海内先笑所學之事將復何恨不學鬼谷之於東齊習秦儀之於周魏賈王孫於蜀都交猗頓之貨殖如此亦可以示王室之爵置天地之位矣臣始悲天下之可悲今天下亦悲臣之愚惑矣書奏上善其言六月匈奴叛中郎將張渙擊降之太常韓縯爲司空二年春正月初聽中常侍行三年䘮七月鮮卑寇雲中十月京師地震三年春正月癸未大赦天下六月司徒尹頌薨司空韓縯爲司徒是時有人上書言人所以貧困者貨輕也欲更鑄錢事下群臣及太學之士時劉陶等在太學議曰夫讀鑄錢之詔下及幽㣲不遺窮賤是以藿食之人敢懸書象魏聽罪綘闕蓋以爲當今之憂不在於此在民有饑勞之怨海内無耳目之變乃箕子所爲佯愚而對也臣不逹殷人佯愚之慮欲於不問而言甲子之事故念生鮮死久復不敢極諫陳其要請粗言生民之業夫食者有國之大寳生民之至貴也竊見比年已來良苗盡於螳螟之口杼軸空於公孫之衣野無青草室如懸磬所急朝夕之飡所患靡盬之事豈謂錢之薄銖兩輕重哉今議者不逹農殖之本多言鑄錢之便或欲因縁行詐以賈國利國利將盡取者爭競故造鑄錢之端於是乎生萬人鑄之一人奪之猶不能給設令一人鑄之則萬人奪之雖以隂陽爲炭萬物爲銅役不食之民使不饑之士猶不足無厭之求也陛下聖德愍海内之憂感天下之難欲鑄錢齊貨以救其厄此猶養魚於沸鼎之中棲鳥於烈火之上夫火土湯水魚鳥之所生用之不時必也燋爛當今地廣而不得耕民衆而無所食群小競逐吞噬無厭誠恐卒有役夫窮匠起於板築之間投斤攘臂登高大呼則愁怨之人狼跳虎駭響應雲會八方分崩中夏魚潰雖方尺之錢不能救此若不早寤恐將及之上從之延嘉元年夏五月甲戊晦日有蝕之京都蝗六月大赦天下丙戌初置博陵郡詠侍中冦榮榮恂之曾孫辯絜自善少與人交以此見害於貴寵榮從兄子尚益陽長公主帝又取其從孫女於後宫左右益惡之乃䧟榮以罪宗族遂免歸故郡吏持之急榮懼不免奔闕自訟未至刈史張敬追劾榮以擅去邊有詔捕榮榮亡命數年會赦令不得免窮困乃亡命山中上書曰臣聞天地之於萬物也好生帝王之於萬民也慈愛陛下統天理物作民父母自生育已上咸蒙德澤而臣兄弟獨爲權門所嫉以臣婚姻王室謂臣將撫其背奪其位退其身受其勢於是造作飛章𬒳以臣宗欲使墜於萬仭之坑踐於必死之地陛下忽慈母之仁發投杼之怒有司承㫖驅逐臣門臣輒奔走本郡没齒無怨臣誠恐卒爲豺狼橫見噬食故冐死詣闕披布肝膽刺史張敬好爲䛕謟張設機牢令陛下復興雷霆之怒司隷校尉應奉河南尹何豹洛陽令袁騰三官並驅若赴讐敵威加亡罪罰及朽骨但未掘壙出骸剖棺露胔耳殘酷之吏不顧無辜之害欲使聖朝必加罰於臣宗是以不敢觸突天威而自竄山林以陛下發神聖之聽啓獨見之明距䜛慝之謗絶邪巧之言救可濟之民援没溺之命臣不意滯怒不爲春夏息淹恚不爲順時怠布告逺邇求臣甚切張羅海隅置罝萬里逐者窮人迹追者極車軌雖楚購伍貟漢求季布無以復過也自臣遇罰以來三蒙赦令無驗之罰足以蠲除而陛下疾臣逾深有司咎臣甫力止則見掃㓕行則爲亡虜苟生則爲窮民殛死則爲怨鬼天廣而無以自覆地厚而無以自載蹈陸有沈淪之憂逺巖墻有鎭壓之患精誠足以感天而陛下不悟如臣元惡大憝足備刀鋸陛下當班之市朝坐之王庭使三槐九棘平臣之罪無縁萬乘之前永無見信之期也勇者不逃死智者不毀名豈惜垂盡之命願赴湘沅之波故假湏臾之期不勝首丘之情欲犯王怒觸帝禁伏於兩觀之下陳寫痛毒之冤然後登金鑊入沸湯雖死而不恨悲夫久生亦後何聊頼願陛下使臣一門頗有遺類以崇天地寛厚之惠謹先死陳情臨章泣血上不省遂㓕冦氏袁宏曰冦榮之心良可哀矣然終至滅亡者豈非命也哉性命之致古人豈肯明之其可略言乎易稱天之所助者信然則順之與信其天人之道乎得失存亡斯亦性命之極也夫向之則吉背之則凶順之至也推誠則通易慮則塞信之極也故順之與信存乎一己者也而吉凶通塞自外而入豈非性命之理致之由己者乎夫以六合之大萬物之衆一體之所捿宅猶秋毫之在馬背也其所資因小許處耳而賢者順之以通不肖者逆之以塞彼之所乘豈異塗徹哉致之在己故禍福無門之殊應也夫松竹貞秀經寒暑而不衰榆柳虚橈盡一時而零落此草木之性脩短之不同者也廉㓗者必有貪濁之對剛毅者必遇強勇之敵此人事之對感時之不同者也咸自取之豈有爲之者哉萬物之爲莫不皆然動之猶己應之在彼猶影響形聲不可得而差者也故君子之人知動靜爲否㤗致之在己也繕性治心不敢違理知外物之來由内而至故得失吉凶不敢怨天夫然遇㤗而不變其情遭否而不愠其心未嘗非巳夫何悲哉二年三月甲午絶刺史二千石三年䘮六月鮮卑冦遼東度遼將軍李膺擊破之膺字元禮潁川襄城人初爲蜀郡太守威德並行後轉護烏桓校尉會匈奴攻雲中殺略吏民膺親率歩騎臨陣交戰斬首二千級羗寇逺退邊城安靜後以公事免官天子賢劉陶之言而嘉膺之能遷度遼將軍先時踈勒龜兹數抄張掖酒泉雲中諸郡吏民苦之自膺在邊皆不復爲害匈奴莎車烏孫鮮卑諸國常不賔附者聞膺威名莫不畏服先時略取民男女皆送還塞下遷河南尹司隷校尉膺風格秀整高自標特欲以天下風教是非爲己任後進之士有升其堂者皆以爲登龍門七月太尉黃瓊免太常胡廣爲太尉丙午皇后梁氏崩乙丑葬懿獻梁皇后於是梁冀專權其同己者榮顯違忤者劾死百僚側目莫不從命省中咳唾之音冀必知之臺閣機事先以聞冀乃得奏御内外恐懼上下鉗口而帝不得有所親任上旣不平之矣冀以私憾專殺議郎邴尊上益怒之是時豪貴人見幸冀嫉其寵遣客夜盗其家欲刺貴人母母入宫求哀因言冀之罪八月癸酉上問小黃門唐衡曰左右誰與冀不相得者衡曰單超左悺前詣河南尹不疑禮敬極簡不疑收其兄弟送洛陽獄二人詣謝而得免徐璜具瑗常私忿梁氏放橫口不敢言於是上呼超悺入室上曰梁將軍兄弟專朝追脅外内公卿以下從其風旨今欲誅之於常侍意如何皆對誠爲國賊當誅日久臣等弱劣未知聖意何如耳上曰審然者常侍密圖之對曰圖之易耳但恐陛下腹中狐疑上曰姦臣脅國當伏其罪復何狐疑於是令衡呼璜瑗五人遂於宅中定議上齧超臂出血以爲盟超等曰陛下今計已定勿復更言恐爲人所疑丁丑冀心疑超等使中黃門張惲入省宿以防其變瑗勑吏收惲以自外來謀圖不輒於是帝幸前殿召公卿勒兵遣使者收冀大將軍印綬更封北景都郷侯黃門令瑗將虎賁士千人與司隷共捕冀宗親洛陽獄無少長皆誅之冀自殺追癈懿獻后爲貴人初上旣與中官成謀乃召尚書令尹勲使任其事上素惡冀倉卒恐不能辦勲臨事明斷甚有方略冀旣誅上嘉其能坐冀所連及公卿列侯校尉刺史二千石死者數十人冀故吏賔客免絀者三百餘人朝庭爲之一空唯光禄勲王躬廷尉邯鄲義在焉是時從禁中發使者交馳道路公卿失其度州府市朝閭里鼎沸數日乃定百姓莫不稱快冀財貨已充王府用減天下租稅之半先時立名行高節之士多遭梁冀之害免身茍容而已莫敢潔去就矣唯周協不屈其志而獨能自免於難故士以此服之也協字巨勝周舉之子玄虚養道以典墳自娛初以父任爲郎自免歸徵辟不就杜門不出十餘年及延嘉初乃開門延客逰談宴樂是秋梁冀誅而協亦病卒識者以爲知命初冀之盛也尚書陳覇上䟽言其罪請誅之上不省霸知爲冀所害七日不食而死戊寅太尉胡廣司徒韓縯以阿附梁冀減死一等壬午立皇后亳氏實鄧后也后即鄧香之女香則禹之孫初后母宜起於㣲賤間香生后後適梁紀故后冐姓梁氏紀姉子孫壽冀之妻也進后入掖庭有寵立爲皇后惡梁姓之同改爲亳氏封宣爲長安君追尊香爲車騎將軍安陽侯宣子演封南頓侯位特進后復姓鄧氏徙宣爲昆陽君演子康比陽侯賞賜巨萬封平梁冀之功也白馬令李雲上書移副三府曰故大將軍梁冀雖持權日久今得誅之猶召家臣殪而殺也而猥封謀臣萬戸高祖聞之得無見非西北列將得無不事孔子曰帝者諦也今官位錯亂小人日進財貨公行政治日消是帝欲不諦乎上得雲奏大怒送雲黃門北寺使中常侍管覇與御史廷尉雜考之弘農五官掾杜衆傷雲以忠獲罪上書願與同日死帝愈怒遂并下廷尉廷尉奏雲不遜欲獲抗直之名衆逺爲邀訴皆大逆不道請論如律霸入奏上在濯龍池霸跪言曰雲野澤愚夫衆郡中小吏出於狂戅不足加罪上謂霸曰使帝欲不諦是何等語而常侍欲原之耶顧小黃門吳伉可其奏大鴻臚陳蕃上䟽救雲曰臣聞所言雖不識禁忌干上其意歸於憂國但違將順之禮禮譏暴諫然亦有狂狷愚忠不顧誅族人禍者古今有之是以高祖忍周昌不諱之言孝成皇帝赦朱雲腰領之誅二主非不忿此二臣以忠不思難皆不罪之今日殺李雲天下猶言陛下誅諫臣所以臣敢觸龍鱗也上不從雲衆死獄中蕃免歸田里袁宏曰夫欲之則至仁心獨行人君之所易人臣之所難也動而有悔希意恂制人臣之所易人君之所難也古之君臣必觀其所易而閑其所難故上下恬然莫不雍睦逮于末世斯道不存君臣異心上下乖違各行所易不顧其所難難易之事交而諌爭之議生也夫諫之爲用政之所難者也處諫之情不同故有三科焉推誠心言之於隱貴於誠入不求其功諫之上也率其所見形於言色靣折庭爭退無後言諫之中也顯其所短明其不可彰君之失以爲己名諫之下也夫不吝其過與衆攻之明君之所易庸王之所難觸其所難暴而揚之中諌其猶致患而况下諫乎故諫之爲道天下之難事死而爲之忠臣之所易也古之王者辦方正位各有其事在朝者必諫在野者不言所以明職分别親踈也忠愛心至釋來而言者王制所不禁也無因而去處言之地難故君子罕爲也十月行幸長安祠章陵壬寅中常侍單超爲車騎將軍十二月西戎犯塞護羗校尉叚潁討之天竺國來獻故太尉黃瓊爲太尉光禄大夫祝恬爲司徒詔曰太尉黃瓊清儉不撓數有忠謇加以典謀深奥有師傅之義連在三司不阿權貴疾風知勁草朕甚嘉焉其封瓊邟郷侯瓊固讓不聽是時新誅梁冀天下相望異政故瓊首爲三公多奏州縣諸不法死徙者十餘人海内翕然副其耳目上委任之會單超等五侯擅權瓊自度力不能制乃稱疾不朝上表曰臣聞天者務剛其氣君者務強其政是以王者居高履貴則以德義爲首臨危處難則以忠賢爲助故能長守萬國保其社稷而陛下即位以來諸梁秉政宦堅充朝富擬王公勢傾海内言之者輒族滅稱之者必榮顯忠臣懼死而杜口萬夫畏禍而括囊故太尉李固杜喬以直言干政遂見殘㓕賢愚傷心故白馬令李雲指言宦官以忠獲罪是使天下結舌以忠爲諱也徐璜唐衡單超貝瑗等於梁冀之盛苟免相連及其當誅說以要賞陛下不復澄清善惡俱與忠臣尚書令尹勲等並時顯封使朱紫不别粉墨雜糅所謂消金玉於沙礫碎珪璧於泥塗四方聞之莫不叩心傷陛下失賞於見誣虧爵於姦臣夫䜛䛕相與無髙而不升阿黨相抑無深而不淪陛下年在方剛聖慮未衰願還旣誤之封折后族之勢夫懷寳者湏世抱璞者待時陛下誠能行臣所陳則懷寳抱璞之徒特將竭力致身以趨聖世臣身輕任重勤不𥙷過敢以垂死之年陳不諱之言三年正月丙甲大赦天下丙午車騎將軍單超薨閏月羌冦張掖護羌校尉叚潁討之五月甲戌詔曰汝南太守張彪故河南尹鮑吉與朕有潜龍之舊皆封列侯六月辛酉司徒祝恬薨光禄勲种暠爲司徒九月泰山盜賊羣起十二月中郎將宗資討之後漢孝栢帝紀卷第二十一
