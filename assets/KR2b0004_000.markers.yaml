  - {type: variant, offset: 0, length: 190, content: 後漢紀序晉東陽太守袁予嘗讀後漢書煩穢雜亂睡而不能竟也聊以暇日撰集爲後漢紀其所掇㑹漢紀謝承書司馬彪書華嶠書謝忱書漢山陽公記漢靈獻起居注漢名臣奏㫄及諸郡耆舊先賢傳凢數百卷前史闕畧多不次叙䥘謬同異誰使正之經營八季疲而不能定頗有傳者始見張璠所撰書其言漢末之事差詳故復探而益之夫史傳之興所以通古今而篤名教也丘明之作廣大悉備史遷剖判六家建立十書非徒記事而巳信足扶明義敎網羅治體然未盡之班固源流, WYG: ''}
