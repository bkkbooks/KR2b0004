  - {type: variant, offset: 0, length: 18, content: 重刻兩漢紀後序右荀悅前漢紀三十卷袁宏, WYG: ''}
  - {type: 'kr:newline', offset: 7, content: '

      ', id: KR2b0004_krp_031-bkkkrnewl2}
  - {type: line-break, offset: 7, content: '', id: KR2b0004_SBCK_031-1a02}
  - {type: variant, offset: 16, length: 1, content: 袁, SBCK: 􅀽}
  - {type: variant, offset: 21, length: 0, content: '', WYG: 卷}
  - {type: variant, offset: 23, length: 507, content: 卷祥符中刋版於錢塘版廢幾百年今始合二書用諸家博本校其異同撥其譌誤稍條然可讀遂再刻之夫兩漢之事最備者繇司馬遷班固范曄與夫荀悅袁宏之書俱存故也其事咸萃於編年故曰紀其事分於傳表紀志故曰書讀荀袁之紀如未甞有班范之書讀班范之書亦如未甞有荀袁之紀也各以所序自逹於後世荀悅之作後於班固而袁宏之作先於范曄或先或後或略或詳其體製凡例則猶黒白之不相亂河漢之不相渉也荀袁二紀於朝廷紀綱禮樂刑政治亂成敗忠邪是非之際指陳論著毎致意焉故其詞縱横放肆反復辯逹明白條暢旣啓告當代而垂訓無窮其爲書卓矣然比班范二史缺裂不傳僅存篇目蓋因縁世故自有次第而顯晦若有時也編修王公敦閱古訓博極羣書其出使浙東也旣刻劉氏外紀以足資治通鑑又重刻舊唐書至刻此兩漢紀其艱其勤尤爲盡力諸書咸備然後綢繹上下數千載間侵尋相接矣其發揮欲廢用心高逺以加惠學者非異時刻一書一集之比僕嘗謂校讎是正文字固儒者先務然執一而意改者所當愼也蓋一字之疑後或得善本正之若率以意改即疑成實傳世行後此字繇我而廢故學者貴於弛張變通也公聞僕語欣然有取輒敢載之篇末因論公覃思此二紀謂與漢書不同使並傳于後未易以彼廢此而一字不可相雜之本意其不苟如此抑以見瓌竒偉麗之觀必待人而後彰也紹興十二年六月甲子日汝隂王銍序, WYG: ''}
