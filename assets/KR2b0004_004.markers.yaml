  - {type: variant, offset: 7, length: 7802, content: 卷第四袁宏二年春正月甲子朔日有蝕之本志曰日者陽精人君之象也君道虧故日爲之蝕諸侯順從則爲王者諸侯專權則疑在日於是在危十度齊之分野張歩未賔之應也封諸有功者二十人更封鄧禹爲梁侯吳漢爲廣平侯各食四縣諸將各言所欲封唯景丹辭櫟陽丁綝請鄕亭上謂丹曰關東數縣不當櫟陽萬戸富貴不歸故鄕如衣錦夜行丹謝而受之或謂丁綝曰人皆求縣子何取鄕邪綝曰昔孫叔敖受封必求墝埆之地今綝能薄功淺豈可遇厚哉壬辰立宗廟社稷于洛陽漁陽太守彭寵涿郡太守張豐反銅馬餘人上率諸將追之師及於薊彭寵郊迎謁見意頗不滿上知寵不說以問幽州牧朱浮浮曰前吳漢北發兵時上遺寵以所服劒又手書慰納用爲北面主人寵望上至當迎問握手特異於衆也今誠失望上曰何等子而望獨異乎浮因曰王莽爲宰衡時甄豐旦夕論議於前常言夜半客甄長伯及莽即位後豐見踈不說父子誅死上大笑曰不及於此是時朱浮爲牧年少昭厲治迹辟州郡名士招王莽時故吏二千石皆置幕府欲收禮賢之名多發漁陽倉榖給其貧民寵以爲天下未平軍旅並發不冝多置官屬費耗倉榖頗不從其令浮性隘急發於睚眦因峻文法以司察寵寵亦自伐其功以爲羣臣莫能及吳漢王梁爲三公寵所遣也寵曰如此我當爲王今但若是陛下忘我邪是時北州殘破漁陽獨完有鹽鐡之積寵多買金寳浮數奏之上輒漏泄令寵聞以脅恐之是春遣使徴寵寵上書願與朱浮俱徴又與吳漢王梁盖延書自陳無罪爲朱浮所侵上不許而漢等亦不敢報書寵旣自疑其妻勸寵曰天下未定四方各自爲雄漁陽大郡兵馬最精何故爲人所奏而棄此去寵與所親人議皆勸寵反上遣寵從弟子后蘭卿喻寵寵因留之遂發兵反攻朱浮分兵擊旁郡上谷太守耿况遣子舒將突騎救浮寵兵乃退上遣游擊將軍鄧隆軍於潞浮軍雍奴相去百餘里遣吏奏狀曰旦暮破寵矣上大恐曰處營非也軍必敗比汝歸可知也寵遣萬餘人長潞西與險相距而使精騎二千從潞南濟河襲隆營大敗之浮逺不能救引兵而却吏還說上語皆以爲神也眞定王劉楊謀反使耿純持節收楊純旣受命若使州郡者至眞定止傳舎楊稱疾不肯來與純書欲令純徃純報曰奉使見王侯牧不得先徃冝自強來時楊弟林邑侯讓從兄紺皆擁兵萬餘人楊自見兵強而純意安靜即從官屬詣傳舎兄弟將輕兵在門外楊入見純接以禮敬因延請其兄弟皆至純閉門悉誅之勒兵而出眞定振怖無敢動者純還京師自請曰臣本吏家子孫幸遭大漢復興聖帝受命位至列將爵爲通侯天下略定臣無所用志願試治一郡盡力以自効上笑曰卿復欲治人自著邪乃拜純爲東郡太守詔純將兵擊泰山濟南平原數郡皆平之居東郡數年抑強扶弱令行禁止後坐殺長吏免以列侯奉朝請甞從上東征過東郡百姓老小數千人隨車駕啼泣曰願得耿君上謂公卿曰純年少𬒳甲胄爲軍治郡何能見思若是百官咸嗟歎之更始諸將多據南陽聞更始死世祖起河北皆勒兵爲亂上㑹諸將以檄叩地曰郾最強宛次之誰當擊郾者賈復率然對曰臣請擊郾上笑曰執金吾擊郾吾復何憂大司馬當擊宛於是賈復擊郾吳漢擊南陽皆平之漢縱兵掠新野破虜將軍鄧奉新野人也怒漢暴巳邑勒兵反襲漢敗之三月乙酉大赦天下詔曰惟酷吏殘賊用刑深刻獄多冤人朕甚愍之孔子不云乎刑罰不中則民無所措手足其與諸中二千石諸大夫議省刑罰更始之敗劉永以兵略地北至河南及陳汝以周建爲將軍蘇茂爲大司馬遣使拜張歩爲齊王董宮爲西海王夏四月蓋延王霸等擊劉永永守城不出晝收其麥夜襲其城永大驚引兵走延逆擊大破之永棄其軍輕騎將母妻奔虞虞人反殺其母妻永與麾下數十人奔譙蘇茂周建將三萬人攻延於浦西延逆擊大破之茂保廣樂永保胡陵世祖使太中大夫戴兢使兖州東昏人執以詣永兢罵永曰若非國家敵也猶今死耳永怒殺兢甲午封叔父良爲廣陽王兄子章爲太原王章弟興爲魯王故定陶王劉祉爲城陽王外祖母黃爲湖陽君良甞爲蕭令坐法免世祖齊武王少孤良撫循甚篤及漢兵起世祖以告良良大怒不聽既而不得巳良從更始入關甚見尊寵更始敗良乃歸世祖章興皆伯昇之子旣封爲王世祖以其少貴欲以吏事就其名乃使章守平隂令興守緱氏令頃之章遷梁郡太守興遷弘農太守興求賢好善郡中翕然朝廷毎有異議之乗驛問興祉字巨伯世祖族兄也爲人謙遜爲宗族所敬更始敗祉間行詣世祖是時宗室唯祉先至上大恱賞賜車服甚厚五月宛王劉賜將更始三子詣闕皆自爲列侯封故元氏王劉歙爲泗水王歙子終為淄川王故宛王劉賜爲順侯劉順爲成侯周後姬當爲周承休公李通爲固始侯歙字經世世祖族父也歙從兄稷有功於齊武王歙子終又與上少相善漢兵之尅新野終之力也上曰使歙父子並王者所以顯報之也賜字子琴順字平仲皆世祖族兄也更始敗賜親至武關迎更始妻子將詣洛陽上以賜得爲臣之道毎嘉歎之順與上同里少相親厚更始死順東歸世祖順素謹厚以其事更始不失節尤重之初更始使宛王劉賜鄧王王常西平王李通俱之國鎭撫南方通娶世祖妹即寧平公主也世祖即位徵通爲光禄勲上毎征四方嘗留通守京師撫百姓治宮室六月戊戍立皇后郭氏皇子彊爲皇太子大赦天下增卿謁者秩各一等郭氏眞定人也父昌孝謹眞定恭王以女妻昌昌早終其妻號爲郭主好禮節儉雖以王女之富手常執作有女曰聖通男曰況世祖自信都還納聖通有寵生皇子彊以況爲城門校尉緜蔓侯雖皇后弟賔客輻湊而小心謹愼謙恭愈篤追贈昌爲安陽思侯上數幸況第賞賜甚厚京師號況爲金穴鄧禹遣兵上林中率諸將謁髙廟收十二帝神主送洛陽掃除園陵爲置吏卒復就穀雲陽漢中王劉嘉來歙詣禹降嘉字孝孫世祖族兄少孤爲世祖父南頓君所養遇之如子與齊武王俱學長安而與世祖尤相親嘉之王漢中都南鄭衆數十萬南陽人延岑起兵武當衆數萬人轉攻漢中圍南鄭嘉戰敗餘衆走谷口赤眉使廖湛將十餘萬兵擊嘉嘉大敗之斬廖湛遂至雲陽上素與嘉善常開引之來歙又勸嘉歸世祖乃詣禹降以嘉爲千乗太守封順陽侯嘉子廧爲黃李侯來歙字君叔南陽新野人父沖哀帝時爲諫議大夫娶世祖姑生歙歙有才略多通慷慨有大志兄弟五人而世祖獨親愛之漢兵起王莽使人捕諸劉親屬得歙擊之賔客共簒出歙更始立以歙爲吏數正諫不用謝病去歙女弟爲劉嘉妻遣人迎歙因南就之時或勸嘉未可降冝觀天下形勢歙爲陳成敗深曉喻之嘉乃從焉上見歙大悅拜歙爲太中大夫秋濉陽反劉永復入濉陽吳漢盖延帥諸將圍之九月赤眉復入長安鄧禹連戰輒爲赤眉所敗三輔飢民人相食諸有部曲者皆堅壁清野赤眉虜掠少所得上復詔鄧禹令勒兵堅守愼無與窮冦交鋒老賊疲弊必當束手事吾也以飽待飢以逸擊勞折捶而笞之耳自馮惜殺宗歆後禹威益損又乏粮食歸附者離散上乃遣使徴禹馮異西征上勑異曰三輔遭王莽更始之亂又遇赤眉延岑之弊兵家縱橫百姓塗炭將軍今奉辭討諸不軌兵家降者遣其渠帥皆詣京師散其小民令就農桑壞其營壁無使復聚征伐非在逺戰掠地多得城邑要在平定安集之耳吾諸將非不健鬪然多好虜掠爲小民害卿本能檢吏民勉自修整無爲郡縣所苦於是異㩀華隂以待赤眉冬太中大夫伏隆使靑徐張歩降因除令長多所懷服上嘉歎隆功比之酈生歩求爲齊王隆曰髙祖與天下約非劉氏不得王歩乃殺隆受劉永封焉隆字文伯大司徒湛之子以節操聞上聞其死爲之流涕十二月戊子詔曰維列侯爲王莽所廢先祖魂神無所依歸朕甚閔之列侯身廢者國如故身死若子孫見在令繼其先焉河内太守冦恂坐繫治上書者免會頴川不靜復以恂爲頴川太守郡中悉平封恂爲雍奴侯是時賈復兵在汝南其部將殺人恂戮之復怒曰吾與冦恂並立而爲其所䧟大丈夫豈有侵辱而不决之者乎今與相見欲手劒擊之恂謀好避之終崇曰請以劒從有變足以相當恂曰不然昔藺相如不畏秦王而屈於廉頗者爲國也區區之趙尚有此義士吾安可以忘之乎乃勑縣盛供具執金吾軍入界者一人皆二人待之恂旣迎復道稱病而還復欲追擊恂而吏士皆醉復遂去上徴恂恂至引入時復在前欲起上曰天下未定兩虎安得私鬪詔令並坐極歡遂共車出結友而去更拜恂爲汝南太守郡中無事乃修鄕校能爲左氏春秋者親與學焉是歳鄧王王常將妻子詣洛陽世祖曰毎念徃時艱難何日忘之莫徃莫來豈違平生之言哉常頓首曰臣蒙天命遭值陛下始遇宜秋後會昆陽幸頼威靈輙成斷金雖踈賤遼遠不敢自疑伏願陛下聖王知臣本心上㑹百官指常曰此人率勵諸將輔翼漢家心如金石眞漢忠臣也拜常爲漢忠將軍封山桑侯大司空王梁免初梁與諸將擊檀郷詔令兵事一屬大司馬吳漢而梁獨發野王兵上以梁不奉詔詔梁留在所縣梁以便冝進兵上大怒遣尚書宋廣持節收斬梁廣檻車執梁詣京師旣至赦之以爲中郎將赤眉去長安東掠郡縣也三年春正月立親廟于洛陽即日拜馮異征西大將軍鄧禹旣𬒳徴與車騎將軍鄧弘還至華隂欲進兵擊赤眉馮異曰赤眉衆多可以恩信傾難用兵力破也上令諸將屯澠池要其東異相連綴擊其西上自待其㑹可一舉取之萬全之計也禹弘自以西征又被徴當還欲一戰決之遂戰移日禹軍大敗馮異將兵救之不勝棄軍走與麾下數人歸營復收散卒堅壁㑹赤眉飢困乃謀擊之大破之降者八萬餘人十餘萬東走冝陽璽書勞異曰垂翅回谿奮翼澠池失之東隅收之桑榆是時延岑據藍田兵力最強上嘗璽書慰之其餘豪傑徃徃屯聚多者萬人少者數千人轉相攻擊百姓飢餓黃金一斤五斗榖數異轉鬪而屯上林中道路不通委輸未至軍士皆以果實爲粮延岑率豪傑攻異異擊大破之岑連戰不利支黨皆叛遂自武關走南陽豪傑以異破赤眉走延岑皆遣使請降異威震關中乃修園陵建官府理枉直禁盜賊數年之間上林成都是月陜人蘇況反殺弘農太守上夜召景丹以檄示之曰弘農太守無任爲賊所害今聞赤眉從西方來恐蘇況舉郡以迎之弘農迫近京師今將軍雖疾病但卧而鎭之耳即拜丹爲弘農太守將其所領西至郡十餘日丹薨閏月巳亥上幸冝陽令司馬在前中書次之驍騎元戎分陣左右赤眉震怖遣劉恭請降盆子與徐宣等二十餘人肉祖奉所得更始璽綬積兵甲冝陽西與熊耳山等世祖陳兵臨洛水中盆子徐宣以次列於前世祖曰卿等得無悔降邪宣曰臣等出長安東門君臣議計歸命聖德百姓可與樂成難與圖始故不告衆耳今日得降猶去虎口而歸慈母誠歡誠喜無所恨也世祖曰卿所謂䥫中錚錚庸中佼佼者也乃皆赦之與妻子居洛陽各賜宅一區田二頃其後樊崇謀反誅楊歆在長安時遇廣陽王良有恩賜爵關内侯與徐宣俱歸鄕里以壽終式侯恭爲更始報殺謝禄自繫獄上赦之世祖憐盆子賞賜甚厚以爲趙王郎中病失明賜滎陽官地以爲列肆使食其稅鄧禹至冝陽上大司徒梁侯印綬有詔還梁侯印綬以爲右將軍彭寵圍薊耿況遣兵救之使人招況況輙斬其使二月己未告祠髙廟受傳國璽賜天下長子爲父後者爵人二級中軍將軍杜茂爲驃騎大將軍茂字諸公南陽冠軍人隨世祖征伐數有戰功三月尚書伏湛爲司徒湛字恵公琅邪東武人王莽時爲繡衣執法遷後隊正更始立爲平原太守遭倉卒世莫不驚擾而湛獨晏然教授如故謂妻子曰一榖不昇國君徹膳今人皆飢柰何獨飽乃以俸禄分賑鄕里來客者百餘家時郡中不安湛移書屬縣不得相侵凌天生蒸民爲立君非乆亂也且養老育㓜以待眞主門下督素有氣力欲起兵湛曰孔子誅少正卯爲其惑衆也即誅督以示百姓於是吏民信嚮逺近獨完湛之力也吳漢圍廣樂周建將十餘萬人救之漢逆戰不利墮馬傷膝建等遂得入城諸將謂漢曰大敵在前而公卧衆懼矣乃裹瘡而起椎牛饗士曰賊兵雖多乃刼掠群盜耳勝不相讓敗不相救非有伏節死義同心者也封侯之秋諸將勉之吏士聞之莫不激怒明日賊兵大出圍營數重漢乃被甲仗㦸曰聞雷鼔聲皆大呼俱進後至者斬遂鼓而進之賊兵大破廣樂降蘇茂周建走胡陵復圍睢陽是時秦豐據黎丘延岑據武鄕董訢據堵鄉鄧奉據新野荆楚尤亂上方圖之以岑彭爲征南大將軍與耿弇賈復朱祐王常等并力征討先圍董訢鄧奉將萬人救訢訢奉兵甚精諸將連戰不利奉乗勝生執朱祐上聞之大怒夏四月上自南征至葉訢奉將兵遮道不得前上謂岑彭曰此將軍之任也彭乃奮擊破之董訢鄧奉走育陽因朱祐請上以奉舊功臣意欲赦之耿弇曰奉背恩反逆暴師連年陛下旣至親在行陣兵敗乃降不誅奉無以懲惡於是誅奉上以朱祐見獲厚加賞賜使復其位耿弇破延岑岑亡入蜀五月乙卯晦日有蝕之大赦天下劉永將慶吾斬永降封吾爲列侯蘇茂周建立永子紆爲梁王保垂惠冬十二月上幸舂陵祠園廟大置酒與舂陵父老故人爲樂遣岑彭傳俊臧宫擊秦豐秦豐拒漢軍於鄧彭等數月不得進上數以讓彭乃令軍中曰明旦軍㑹和成隂逸因豐聞之悉引軍西邀彭彭乃直襲黎丘黎丘震駭豐遽歸救之彭逆擊大破之遂圍黎丘乃封彭爲舞隂侯初汝南人田戎起兵南郡衆數萬人屯夷陵謀將降漢戎妻兄辛臣反覆人也乃圖彭寵張歩董憲劉永李憲公孫述隗囂劉芳所得郡國云洛陽所得地如掌耳且案兵觀形勢何遽降哉戎曰吾衆不如秦豐豐猶爲征南所圍而況吾乎降決矣乃順江入沔將降岑彭使辛臣與長史留守臣盜戎珍寳及善馬從陸道晨夜詣彭曰謹說戎降戎在後方到因從彭營與戎書曰岑將軍巳奏我封五千戸侯虚心相待願急來無拘前圖戎令臣留守而先至封侯旣以疑之矣又長史檄至知臣盜寳物善馬猶是益猜復反彭擊戎破之還屯夷陵隗囂遣使詣闕上甚恱素聞其聲虚心相待毎報答之常手書稱字是歳彭寵自立爲燕王李憲自稱天子四年春正月甲申大赦天下耿況耿舒取軍都彭寵之邑也於是更封況爲隃靡侯舒爲牟平侯祭遵耿弇擊張豐豐功曹執豐降初豐好方士方士言豐當作天子囊盛石擊豐肘云石中當出玉璽豐信之故反豐臨當誅遵掾爲破其石豐乃歎曰死亡所恨上使耿弇拒彭寵弇上䟽曰大兵未㑹臣不能獨進旦臣家屬皆在上谷京師無骨肉之親願得還洛陽上報曰將軍出身爲國功効尤著何嫌何疑而求徴乎其勉思方略以成功業耿況聞弇求徴乃遣少子國入侍上以爲黃門侍郎初上訪博通之士於司空宋弘弘薦沛國人桓譚以爲才學博聞幾及劉向揚雄召拜議郎給事中上令譚鼓琴奏其繁聲乃得侍宴弘聞之大恨伺譚出時正朝服坐府上遣召譚譚到不與席讓之曰吾所以薦子者欲令輔國以道德也而今數進鄭聲亂雅頌非中正者也能自改耶不然正罪法譚頓首辭謝良乆乃遣之後召羣臣㑹樂上使譚見弘失其度上怪而問之弘乃離席上免冠謝曰譚臣所薦逹不能以忠導主而令朝廷恱鄭聲臣前召以責之臣之罪也上謝弘使譚反其服後遂不復令給事中是時天下草創政治未立譚旣見退上䟽言時宜曰國之廢興在於政事得失在於輔佐輔佐賢明則俊士充朝而治世合務輔佐不明則論時失冝而舉多過事秉國之君俱欲興化建善而治殊事異者所謂賢者異也蓋善者視俗而施教察失而爲防威德更興文武迭用然後政調於時而躁民可定也昔董仲舒言治國譬若張琴焉小不調者可因而就和也及至大差謬則解而更張之夫更張難行而拂衆者亡是故賈誼以才逐眺錯以智死雖有殊能而莫敢談懼於前事也且設法禁者非能盡天下之姦又皆合衆人之所欲大抵取便國利事則可矣書奏不省是時天子方篤於䜟而譚雅不善之又以功賞薄故令天下不時定復上䟽曰臣前獻䇿未有詔報不勝憤懣復言其過蓋天道性命聖人難言也自子貢等不得而聞況後世淺儒能通之乎或收古之圖書増益造飾稱孔子並爲䜟記以誑誤人主可不抑逺之哉臣聞安平則尊道術之士有難則貴介胄之臣今聖朝以興復祖統爲民臣主而四方尚有未盡降歸者此權謀未得也臣譚伏觀陛下之用人其說士則無異略奇謀若酈生隨何者將帥則無勇智習兵若韓信吳起者其降下無大恩重賞以誘其後至或虜奪財物使徴又狐疑連歳月而不解古人有言皆知取之而取莫知與之而取陛下若能輕爵禄與士大夫共之而勿愛惜則何招而不至何說而不釋何向而不開何征而不剋如此則能以狹爲廣以遲爲速亡者復得矣由此上逾不悅譚字君山有儁才博覽無所不見不爲章句訓誥皆通其大義數從劉歆楊雄稽疑論議至其有所得歆雄不能間也好音樂鼓琴性簡易不修廉隅頗以此失名譽嘗疾俗儒高談弘論不切時務由此見排擯哀平間位不過郎然王侯貴人皆願與之交王莽居攝篡弑之間天下諸儒莫不競襃稱德美作符命以求容媚譚獨嘿然無言官止樂大夫袁宏曰桓譚以踈賤之質屢干人主之情不亦難乎甞試言之夫天下之所難於干人主之心一曰性有逆順二曰慮有異同三曰情有好惡四曰事有隱顯五曰用有屈伸六曰謀有内外七曰智有長短八曰意有興廢夫順之則喜逆之則怒同之則欣異之則駭好之則親惡之則踈過之欲隱善之欲顯屈者多耻伸者多怒語伏在内志散在外所長必矜所短必吝愛之欲興憎之欲廢此皆人君非必天下之正也人臣所以干人君者必天下之正也然而八者之間禍福不同可不察也夫一人行之萬人議之雖人君之所資亦人君之所惡也百姓有心一人制之雖百姓之所頼亦百姓之所畏而干人君之所惡求其心入天下所難地也縱不致患於其胷中固未能帖然也故有道之君知所處之地萬物之所不敢干也故柔情虚巳布其腹心引而盡之常恐不至而況抑而劾之使其自絶哉自三代巳前君臣穆然唱和無間故可以觀矣五霸秦漢其道參差君臣之際使人瞿然有志之士所以苦心斟酌量時君之所能迎其恱情不干其心者將以集事成功大庇生民也雖可以濟一時之務去夫高尚之道豈不逺哉夏四月吳漢擊五校賊追之至東郡平原又破之鬲縣五姓反逐其守長諸將曰朝擊鬲暮可㧞也漢怒曰敢至鬲下者斬使鬲反者守長罪移檄告郡牧守長欲斬之諸將皆竊言不擊五姓反欲斬守長乎漢乃使人謂五姓曰守長無狀復取五姓財物與冦掠無異今巳收擊斬之矣五姓大喜相率而降諸將曰不戰下人之城非衆所及也甞有冦夜攻漢軍中驚擾漢堅卧不動軍中聞漢不動皆還按部漢乃選精兵夜擊大破之是時泰山豪傑與張歩連兵漢言於上曰非陳俊莫能安泰山也於見以俊爲泰山太守行大將軍事歩聞之遣兵迎俊於嬴下俊擊大破之因攻下諸縣遂定泰山五月上幸盧奴初上將征彭寵過盧奴而還諸將問吳漢曰敵未破而上還何也漢曰陛下曉兵還必不虚上告諸將曰狡賊出魏郡在人後故還也六月上幸譙王霸馬武攻垂惠蘇茂將兵救之馬武與戰不利從霸求救霸閉營不出軍吏爭之霸曰賊兵精銳其衆又多吾吏士心恐而武軍挫退此敗道也今堅閉示不相救武軍困急其戰自倍賊衆疲勞吾以精兵乗其弊乃可剋也賊果大出合戰良乆霸出精騎擊其後賊皆破走茂復求戰吏士皆曰賊前巳破今易擊也霸曰不然蘇茂逺來相救粮食不足以乆留故挑戰兾得一切之勝耳今閉營休士而勝可全所謂不戰而詘人兵善之善者也遂閉門堅守勞賜吏士城中數出挑霸霸不動茂果引兵去秋八月上幸壽春馬武劉隆圍李憲於舒彭寵圍薊朱浮不能守單馬奔京師尚書令侯霸奏浮構成寵罪敗亂幽州不能伏節死難與寵相拒罪當誅上赦之冬十月上幸宛朱祐耿植圍秦豐岑彭傳俊擊田戎於夷陵戎破走上蜀彭遣積弩將軍傳俊至江南偏將軍房兖至交州班行詔書陳國家威德於是交州牧鄧讓蒼梧太守社稷交趾太守楊光更始所用也皆上書貢獻江南郡縣亦信使通焉十二月上幸黎丘詔秦豐出惡言朱祐等急攻之豐將妻子降祐轞車送洛陽大司馬吳漢劾祐曰秦豐狡猾連年固守陛下親踰山川逺至黎丘開日月之信而豐悖逆天下所聞當伏誅滅以謝百姓祐不即斬截以示四方而廢詔命聽受豐降無將帥之任大不敬上誅豐不罪祐是冬馬援爲隗囂使來援字文淵茂陵人長兄況最知名爲河南太守封窮虜侯況兄余中壘校尉封致符子次兄貟增山連率皆二千石封侯援少有大志諸兄竒之年十餘歳平陵朱勃與援同年能說韓詩援纔能書退有慙色況謂援曰小噐速成朱㪍智能盡於今日矣後成人知謀衆事皆從汝禀受勿畏也援以況欲獎勵已内以爲不然焉援受齊詩數年意不能守章句乃辭況欲至邉郡畜牧況曰汝大才當晚成良工不示人以璞且從所好治裝未辦會況卒援行䘮朞年常不離墓時朱勃以試守渭城宰援獨言朱勃終當何時禀仰我頃之或薦援有大略由是爲曹督郵送罪人司命府援皆縱遣之因亡命北地以畜牧爲事援父嘗爲牧帥令兄貟爲護宛吏者故人賔客多從之轉安定天水隴西數郡豪傑望風而至賔客自環嘗數十人援田畜日廣羊五六千頭馬數百羣榖萬斛乃歎曰凢殖財者貴以施也不則守錢奴耳乃散以賑昆弟舊故乃還至長安王莽末盜賊起求雄傑之士援與原渉爲頴川太守援爲漢中太守適至官王莽敗貟亦亡去増山俱之梁州會隗囂兾用援爲綏德將軍而公孫述稱帝於蜀囂意未知所附乃遣援南視述素與援舊以到當握手相迎也乃盛陳陛㦸見援語言未悉延援就客館述備威儀㑹百官爲援立舊交之位述罄折而入鸞旗旄騎警蹕車盛噐服賔客甚盛欲留援援曰天下雌䧺未定公孫不吐哺走迎國士與圖成敗乃修飾邉幅如偶人形此何足乆留乎數月辭去還謂囂曰子陽若井底蛙妄自尊耳不如專意東方於是遣援與拒蜀侯國遊先俱奉章詣京師初到召詣尚書有頃中黃門一人引入時在宣德殿援拜上大笑曰卿遨遊二帝間見卿大慙援頓首辭謝因曰當今之世不但君擇臣臣亦擇君臣與公孫述同縣少有娛臣前至蜀陛㦸乃見臣臣逺異方來陛下何以知臣非刺客姦人而簡易若是上復大笑曰卿非刺客顧說客耳援對曰天下傾覆盜賊自立名姓者不可勝數今得見陛下寥廓大度同符高祖乃知帝王自有眞也上壯之使從征伐毎召見讌語夜至天明援才略兼人又好縱橫之畫故未得官待詔而巳上遣太中大夫來歙持節送援國遊先至長安怨家殺遊先其弟爲囂雲旗將軍來歙恐其怨恨即與援俱還長安後漢光武皇帝紀卷第四, WYG: ''}
