body:
  text: 後漢光武皇帝紀卷第三袁宏建武元年春正月鄧禹攻安邑王匡成丹劉均等合兵十餘萬共擊禹禹與戰不利驍騎將軍樊崇臨陣死會日暮兵疲韓歆及諸將見戰敗而敵盛皆諫禹欲夜去禹不聽明旦癸丑匡等以六甲窮日不出禹得益治兵勑軍中曰匡等雖出無妄動令至營下乃擊匡等悉至禹皷而竝進大破之斬劉均河東太守楊寳遂定河東禹承制拜軍祭酒李文爲太守悉更置令鎮撫之王擊銅馬於元氏使耿弇呉漢將精兵在前大破之追至慎水北漢兵乘勝薄之賊皆殊戰漢軍大壞王親揮刃以禦賊未交鋒耿弇射之賊不得前岸髙不得上王自投馬下値突騎王豐豐以馬授王王撫豐肩曰幾爲賊所突馬武在後戰甚用力故賊不得進軍士奔散者先保范陽或言王巳没矣軍中恐懼不知所爲呉漢曰王兄子在南陽何憂有頃王至衆乃復振夜賊引去王退入漁陽破之呉漢别追至右北平斬首三千餘級更始遣廪丘王田立大司馬朱鮪白虎公陳僑將三十萬衆助李軼守洛陽馮異與李軼書曰愚聞明鏡所以照形往事所以知今也昔微子去殷而入周項伯叛楚而歸漢周勃迎代王而黜少帝靃光尊孝宣而廢昌邑彼皆畏天知命重祖宗而憂萬民覩存亡之符効見廢興之必然故能成功於一時垂業於萬世今長安壞亂赤眉在郊王侯搆難大臣分離朝無紀綱而四方分崩異姓竝起此劉氏之憂也故蕭王䟦渉霜雪躬當矢石經營河北英俊雲集百姓歸徃豳岐見慕不足爲喻今馬子張皆復親幸爵位如此謝躬違戾伏辜如彼又明效也季文誠能覺悟亟斷大計論功古人轉禍爲福在此時矣如猛將長驅嚴兵圍城雖有悔恨亦無及巳矣初軼譛害伯昇欲降而不自安冀王開納之乃報異書曰軼本與蕭王首謀造漢約結死生邂逅中道别離今軼守洛陽將軍鎮孟津俱據機軸千載一㑹思成斷金唯有深逹蕭王兾得進愚筞以得佐國安人異奏軼書王報異曰季文多詐人不能得其要領今移其書告守尉當警備者衆以軼擁大衆據名都欲有降意怪上露之也軼書旣布朱鮪得其書使人殺軼雒陽大衆乖離多出降者蕭王之北朱鮪使蘇茂將三萬人渡河襲温鮪自將數萬人攻平隂冦恂乃發屬縣兵令與恂㑹温軍吏皆諌曰洛陽兵渡河前後不絕宜待衆兵畢至乃可擊之恂曰温者郡之落蔽如失温郡不可得守也遂馳赴之明旦陳兵未合而馮異適至恂乃令士卒乗城鼓噪曰公兵至茂陣動因奔擊大破之茂兵自投河死者過半斬其副將賈強遂乗勝渡河環洛陽城乃還自是洛陽震恐城門晝閉初傳聞朱鮪破河内有頃恂檄至上大喜曰吾知冦子翼可任也三月李松與赤眉戰於蓩鄕松大敗李熊說公孫述曰山東饑饉人民相食百姓塗炭城邑丘墟今蜀土豐沃稼穡嘗熟果實所生不穀而飽女工之業覆衣天下陸有器械之用水浮轉漕之便北據漢中杜褒斜之險東守巴郡拒扞關之口地方數千里戰士百萬見利則出兵而畧地無利則堅守而力農東浮漢水以闚秦地南順江流以震荆揚所謂用天因地成功之資也今君王之聲聞於天下號位不定志士狐疑冝即大位使遠人有知述然其言有龍出府殿中夜有灮述以爲符瑞夏四月公孫述自立爲天子廣􅗛人李業字巨遊嘗爲郞王莽居攝謝病去不應辟召隱迹山谷述素聞業名欲以爲博士因辭病不起述羞不致業乃遣大鴻臚尹融奉詔持鴆曰業起則授大位不起則賜鴆融喻業曰今天下三分孰非孰是何爲區區身投不測之泉朝廷募名德於子厚矣宜上奉知巳下爲妻子計之身名俱全不亦優乎今阻疑衆心凶禍立加非計之得者也業乃歎曰危邦不入亂邦不居蓋爲此也君子見危授命何可誘以高位哉融見持心彌堅復曰宜呼室家計之業曰丈夫内斷於心久矣何妻子之爲乎遂仰鴆而死袁宏曰夫名者心志之標牓也故行著一家一家稱焉德播一鄕一鄕舉焉故博愛之謂仁辨惑之謂智犯難之謂勇因實立名未有殊其本者也太上遵理以修實理著而名流其次存名以爲巳故立名而物懟最下託名以勝物故名盛而害深故君子之人洗心行道唯恐德之不修義之不高崇善非以求名而名彰於外去惡非以邀譽而譽宣於外夫然故名盛而人莫之害譽高而世莫之爭末世陵遲大路巇險雖持誡行巳不求聞逹而讒勝道消民怨其上懼令名之格物或伐賢以示威假仁義以濟欲或禮賢以自重於是有顛沛而不得其死屈辱而不獲其所此又賢人君子所宜深識遠鑒退藏於密者也易曰无咎無譽衰世之道也若夫潔巳而不汙其操守善而不遷其業存亡若一滅身不悔者此亦貞操之士也嗚呼大道之行萬物與聖賢竝通及其衰也君子不得其死哀哉更始諸將懼赤眉至申屠建等御史大夫隗囂共勸更始讓帝位更始不應建等謀刼更始未行其計侍中劉熊卿知其謀告之更始召申屠建斬之張卭廖湛胡殷於是自爲王勒兵燒宮門隗囂將賔客奔天水更始與三王戰宮中不勝將妻子車騎百餘人東至新豐從大司馬趙萌萌以爲王匡陳收成丹皆與三王有謀可收斬之更始乃召陳收成丹即斬之王匡不應召因幷將收丹兵歸長安從三王於太子宮趙萌李松亦將其衆從更始於太倉中五月蕭王自漁陽過范陽命收葬士卒死者至中山羣臣上尊號曰大王初征昆陽則王莽敗亡後伏邯鄲則北州平定此豈人力哉三分天下而有其二跨州據土帶甲百萬武功論之無所與爭文德論之無所與讓宜正號位爲社稷計王不聽諸將固請王曰冦賊未平四面受敵何遽欲正位號乎諸將出耿純進曰天下士大夫捐親戚棄土壤從大王於矢石之間者其計固望攀龍鱗附鳳翼以成其志耳今功業巳定天時人事巳可知矣而大王留時逆衆不正位號純恐士大夫望絕計窮則有去歸之思無從大王也王感其言使馮異問以羣臣之議異至曰三王背叛更始敗亡天下無主宗廟之憂在於大王宜從衆議上以安社稷下以濟百姓王曰我昨夢乗赤龍上天覺悟心中悸動此何祥也異再拜賀曰此天帝命發於精神心中悸動大王重慎之至也㑹諸生強華自長安奉赤伏符詣鄗羣臣復請曰受命之符人應爲大今萬里合信周之白魚焉足比乎符瑞昭晢宜答天神以灮上帝六月巳未即皇帝位于鄗改年爲建武元年大赦天下改鄗爲髙邑袁宏曰夫天生蒸民而樹之君所以司牧羣黎而爲謀主故權其所重而明之則帝王之畧也因其所弘而申之則風化之本也夫以天下之大羣生之衆舉一賢而加于民上豈以資其私寵養其厚大將開物成務正其性命經綸㑹通濟其所欲故立君之道有仁有義夫崇長推仁自然之理也好治惡亂萬物之心也推仁則道足者宜君惡亂則兼濟者必王故上古之世民心純朴唯賢是授揖讓而治此蓋本乎天理君以德建者也夫愛敬忠信出乎情性者也故因其愛敬則親踈尊卑之義彰焉因其忠信而存本懷舊之節著焉有尊有親則名器崇矣有本有舊則風敎固矣是以中古之世繼體相承服膺名敎而仁心不二此又因於物性君以義立者也然則立君之道唯德與義一民之心莫大於斯先王所以維持天下同民之極陳之千載不易之道昔周秦之末四海鼎沸義心絕於姬氏干戈加於嬴族天下無君六合無主將求一時之傑以成撥亂之功必推百姓所與以執萬乗之柄雖名如義帝強若西楚焉得擬議斯事乎由是觀之則髙祖之有天下以德而建矣逮於成哀之間國嗣三絕王莽乗權竊有神器然繼體之政未爲失民劉氏德澤實繫物心故立其寢廟百姓覩而懷舊正其衣冠父老見而垂泣其感德存念如此之深也如彼王郞盧芳臧獲之儔耳一假名號百姓爲之雲集而况劉氏之胄乎于斯時也君以義立然則更始之起乗義而動號令禀乎一人爵命班乎天下及定咸陽而臨四海清舊宫而饗宗廟成爲君矣世祖經畧受節而出奉辭征伐臣道足矣然則三王作亂勤王之師不至長安猶存建武之號巳立雖南面而有天下以爲道未盡也初赤眉二道入關至弘農復大合分其衆萬人爲一營軍中嘗有齊巫祠城陽景王巫言景王大怒當爲縣官則可何故爲盗賊有災巫言輒病方望弟陽怨更始殺其兄乃說樊崇等曰更始荒亂政令不行將軍擁百萬之衆西向帝城而無稱號且爲羣賊不可以久不如挾宗室以行誅伐不敢不服崇等然之又迫於巫言乃求景王後得七十餘人唯盆子最親是月赤眉立盆子爲天子盆子年十五被髪徒跣見衆人拜恐怖欲啼崇等自相署置崇本先起有勇力方畧自徐宣等皆宗之然不能書徐宣故獄吏通易經於是推宣爲丞相崇爲御史大夫盆子者故式侯萌子王莽時廢爲家人更始過式畧盆子與二兄恭茂俱在軍中更始之詣洛陽恭隨見南宫恭前頓首曰故式侯世子大漢復興聖主在堂不勝歡喜願上壽有詔引上殿稱壽曰九族旣睦平章百姓更始悅之即封爲式侯恭通尚書以明經數幸言事擢爲侍中從更始入關茂與盆子留赤眉中嘗爲劉俠卿牧牛盆子旣立猶朝夕拜俠卿俠卿爲之跪後祠景王於郭北使盆子乗鮮車大馬草中牧兒皆隨車觀曰盆子在是中至祠所盆子拜崇等皆爲之拜祠罷復歸俠卿所時欲出從牧兒戲俠卿怒止崇等亦不復候視也秋七月辛未前將軍鄧禹爲大司徒封鄼侯野王令王梁爲大司空封武強侯初赤伏符曰王良主衞作玄武上以野王衞徒也玄武水神也大司空水土之官也乃以梁爲大司空又以䜟言以平狄將軍孫臧行大司馬事衆大不悅僉曰呉漢景丹應爲大司馬上曰景將軍舊將是其人也然呉將軍有建策之謀又誅苗曽收謝躬其功大於是以呉漢爲大司馬封武陽侯景丹爲驃騎大將軍袁宏曰夫天地之性非一物也致物之方非一道也是以聖人仰觀俯察而備其法象所以開物成務以通天下之志故有神道焉有人道焉微顯闡幽遠而必著聦明正直遂知來物神之所爲也智以周變仁以博施理財正辭禁民爲非人之所爲也故將有疑事或言乎遠必神而明之以一物心此應變適㑹用之神道者也辯物設位官方授能三五以盡其性黜陟以昭其功此經綸治體用之人道者也故求之神物則蓍筞存焉取之人事則考試陳焉是善爲治者必體物宜參而用之所以作而無過各得其方矣若夫䜟記不經之言奇怪妄異之事非聖人之道世祖中興王道草昧格天之功實賴台輔不徇選賢而信䜟記之言拔王梁於司空委孫臧於上將失其方矣苟失其方則任非其人所以衆心不悅民有疑聽豈不宜乎梁實負罪不暇臧亦無所聞焉易曰鼎折足覆公餗此之謂也上璽書勞鄧禹曰將軍與朕謀謨帷幄决勝千里孔子曰自吾有囘門人益親平定山西功効尤著爾作司空敬敷五敎禹遂渡汾陰入夏陽更始中郞將公乗歙將十萬衆拒禹於衙禹擊破之時赤眉入關三輔擾亂民無所歸聞禹至衙軍兵整齊百姓喜悅相隨迎禹降者日以千數號百萬衆禹時年二十四所止住儀節白首耆老及諸將在軍下莫不飽滿名震關西八月壬子初祠社稷于懷是時上新即位軍食不足冦恂轉運不絶百官頼焉以爲奉上上數璽書勞恂茂陵人董崇說恂曰上新即位四方未定而以此時據大郡内得人民外破蘇茂威震遠近此讒人所因怨禍之時也昔蕭何守關中悟鮑生之言而髙祖恱今君所將皆宗族兄弟也無乃以前人爲鏡戒哉宜從功遂身退之計恂然其言稱病不親事自請從上征上曰河内未可離也固請不聽恂乃遣兄子冦張姊子谷崇願爲前鋒上悅以爲偏將軍廩丘王田立降趙萌李松攻三王三王敗走更始徙居長信宫三王降赤眉别兵出戰李松拒之赤眉生得松時松弟汎爲城門校尉赤眉使人誘汎曰開城活汝兄汎遂開城門九月赤眉入長安更始出渭濵式侯恭以盆子之立自繫有司赤眉入吏民奔式侯從獄中出三械見定陶王劉祉解其械言帝在渭濵遂相隨見更始於舟中弘農太守公乗歙謂京兆尹解惲曰送帝入弘農我自保之惲曰長安巳敗吏民不可信右輔都尉嚴本恐失更始爲赤眉所誅即曰高陵有精兵可徃時虎牙將軍劉順定陶王劉祉尚書任延君侍中劉恭歩將更始至髙陵嚴本將軍兵城守外如宿衞内實圍之上聞更始失城守未知所在詔封更始爲淮陽王敢有害及妻子者罪大逆其送詣吏者封列侯赤眉更始降者以爲長沙王過二十日者不受更始知嚴本所守恐其日盡卽遣劉恭請降赤眉遣大司徒謝禄受之更始於庭下議殺之式侯與謝禄共請不聽逐更始去式侯舉刃欲自刎崇等共止之乃捨更始封爲畏威侯式侯復守崇本求約竟封更始爲長沙王常依謝禄式侯擁謢之頗得與故人賔客相見故人有欲盗更始去者事發皆繫獄於是禄閉更始自是式侯不得見也赤眉諸將日㑹爭功各言所欲封拔劒斫柱稍得王莽時中黃門數十人皆曉故事頗得差整數日輒復亂初三輔畏赤眉兵強又見更始降諸縣營長皆遣使奉獻絡繹道路赤眉兵輒遮殺取其物吏民由是皆城守上書封拜者不關盆子盆子日夜號泣詣黃門中共臥起登諸臺榭諸黃門皆哀憐之式侯知赤眉必敗自恐兄弟俱死即勸盆子歸璽綬教習爲辭讓語後崇等大會式侯先於衆中跪言諸君共立恭弟爲君德誠深厚立且一年散亂益甚誠不足以相成恐死而無益願得兄弟退爲庻人宜更求賢聖今有君而更求恐賢人不出不如空其位而博選賢聖唯諸君省察崇等謝曰皆某等罪也盆子因下牀解璽綬叩頭曰今設爲縣官而爲盗賊如故流聞四方莫不怨恨不復信向此皆非其人之所致也願乞骸骨以避賢兄弟備行伍必欲殺盆子以塞事者無所離死誠冀諸君相哀之耳因涕泣㱆欷崇等及郞吏數百人無不感慟崇等下座頓首曰無狀負陛下請自今巳後相檢勑不敢放縱因共扶盆子帶以璽綬盆子號泣不得自在崇等旣罷各閉門不出鹵掠三輔聞之翕然百姓爭入長安中市里且滿後二十餘日赤眉貪其財物因大放兵虜掠因縱火燒宮室三王謂謝禄曰三輔營家多欲得更始者一朝失之必合兵攻赤眉不如殺之也於是謝禄使兵殺更始式侯夜徃葬之諸將勸鄧禹取長安禹曰璽書毎至輒曰無與窮赤眉爭鋒今吾衆雖多能戰者少前無可仰之積後無轉運之饒赤眉新拔長安財富日盛鋒銳不可當也盗賊羣居無終日計財貨雖多變故萬端非能堅守長安也上郡北地饒穀多畜吾且休兵北道就粮養士觀其弊乃可圖也於是引軍北行所至郡縣皆降頃之積弩將軍馮愔與車騎將軍宗歆在愔邑爭權愔殺歆與禹相攻上聞之遣尚書宋廣持節喻降馮愔及更始諸將王匡朝殷成丹等廣至安邑盡誅之隗囂之奔天水復聚其衆自稱西州大將軍長安旣壞士人多奔隴西囂虗巳接之以谷恭范逡爲師友趙秉鄭興爲祭酒申屠剛杜林爲治書王遵周宗楊廣王元爲將帥於是竇融始據河西融字周公右扶風平陵人也融家貧少時爲驃騎將軍王舜令史汎愛好交㳺女弟爲大司空王邑小婦出入貴戚結交豪傑以任俠爲名然事母兄養弱弟内行修整漢兵起融從王邑敗昆陽漢兵得新豐邑薦融可任用莽拜融爲波水將軍賜金千斤引兵新豐㑹三輔内潰融降大司馬趙萌萌以融爲校尉絶重之薦融於更始拜爲鉅鹿太守融見更始立東方擾攘融祖父爲張掖太守從祖父爲護羌校尉從弟又嘗爲武威太守累世在河西知其土俗融心樂之獨謂兄弟曰天下安危未可知河西人民殷實帶河爲固張掖屬國精兵萬騎欲求爲之且以避世一旦有緩急杜絶河津足以自守此真遺種處也兄弟皆勸之融乃辭讓鉅鹿求張掖屬國都尉萌爲言竟得之融大喜遂將家屬而西撫養吏民結雄傑懷集羌胡河西翕然而治是時酒泉太守梁綂金城太守庫鈞張掖都尉史苞酒泉都尉笁曾燉煌都尉辛彤皆州郡英俊與融有舊更始欲敗融與綂等議皆以爲天下擾亂未知所綂河西斗絶在羌胡中不同心幷力則不能自守權均力齊又不相率當推一人爲將軍共全五郡觀世變動皆曰善以梁綂爲太守先共推之綂固辭曰昔陳嬰不受王者以有老母今綂内親老又德能鮮薄不足以當督帥也綂字仲寧安定烏氏人少治春秋好法律更始時爲中郞將安集凉州因爲酒泉太守竇融典兵馬又家世爲河西二千石吏民所向即共推融行河西五郡大將軍事是時武威太守馬期張掖太守任仲二人孤立無黨融等議定移書告喻之即時解印綬避位於是梁綂爲武威太守史苞爲張掖太守笁曾爲酒泉太守辛彤爲燉煌太守融居屬國領都尉如故置從事監察而太守各治其郡尊賢養士務欲得吏民心修騎射明烽燧羌胡犯塞融躬自擊之諸郡相應莫不富殖初更始遣將軍鮑永撫河東北及幷州永好文德雖爲將帥常儒服從事素重杜陵人馮衍以爲謀主同心戮力以奉更始上使諌議大夫儲伯持節徵永時或傳更始猶存永奪伯節執而梏之遣使至長安知更始審被害乃哭泣盡哀罷兵與衍幅巾詣上上問永衆所在永離席曰臣事更始不能令全豈可以衆獲貴故悉罷之上不悅時魯郡多盗賊以永爲魯郡太守降者數千人唯彭豐虞休各將千人稱將軍不肯降永數以恩禮暁喻之猶不移孔子闕里荆棘自除從講堂至里門外永異之召府丞魯令告曰方今世道艱難而闕里無故荆棘自除意者豈非夫子欲令太守行饗禮而誅姦惡邪乃求民好學者修學校之禮召豐等觀禮豐等持牛酒因謀欲害永永覺之手刃殺豐等擒破黨與封關内侯於是馮衍未得官永謂之曰昔髙祖賞季布之罪誅丁公之功今遭明主亦何憂哉衍曰人有挑其鄰之妻者挑其長者長者罵之挑其少者少者報之俄而其夫死而娶其長者或謂之曰非罵汝邪曰在人之所即欲罵我在我之所即欲其罵人夫天地難知人道易守守道之臣何患死乎頃之衍爲曲陽令誅劇賊郭勝等降五千餘人論功當封以讒不行甲申以故密令卓茂爲太傅封褒德侯茂字子康南陽人温而寬雅恭而有禮其行巳處物在於可否之間不求備於人鄕黨老少雖行不逮茂皆受而容之常有認茂馬者茂問亡馬幾時曰有日月矣茂解馬與之曰若非公馬幸即歸我後馬主得馬詣門謝之茂以德行舉爲侍郞給事黃門遷爲密令其治視民如子舉善而敎口無惡言民常有言亭長受米肉者茂問之曰亭長從汝求之乎汝有事囑之受取乎將平居以恩意遺之乎民曰徃遺之而受茂曰遺之而受何故言邪民曰聞君賢明使民不畏吏吏不敢取民不敢與茂曰汝爲敝民矣凢人所以貴於禽獸者以其仁愛相敬也鄰伍長老嵗時致禮人道如此乃能勸愛即不如是側目相視怨憎忿怒所由生也吏固不當乗威力強請求耳誠能禁備盗賊制禦強暴使不相侵民有事爭訟爲正曲直此大功也嵗時修禮敬徃相見之不亦善乎民曰苟如是律何故禁之茂曰律設大法禮順人情今我以禮教汝汝必無所怨以律治汝汝無所措手足一門之内小者可論大者可殺也且歸念之民曰誠如君言也茂教民制法皆此類也初茂到官吏民皆笑之鄰縣及府官以爲下治河南太守爲置守令茂治自若數年敎化大行路不拾遺天下嘗蝗河南二十縣皆傷蝗獨不入密境是時王莽爲安漢公置大司農六部丞勸課農桑茂遷京部丞吏民老小皆啼泣道路王莽居攝茂以病免常爲郡門下掾不肯爲職吏更始立以茂爲侍中從至長安知更始政亂以老乞骸至是年七十餘矣袁宏曰夫帝王之道莫大於舉賢舉賢之義各有其方夫班爵以功歷試而進經常之道也若大德奇才可以灮昭王道弘濟生民雖在泥塗超之可也傅巖磻溪之濵頃居宰相之任自古之道也卓公之德旣巳洽於民聽灮武此舉所以宜爲君也呉漢率耿弇等十將軍圍朱鮪於洛陽數月不下世祖以岑彭常隷於鮪也使彭說之鮪在城上彭在城下相勞如平生彭因說鮪曰赤眉巳得長安更始爲三王所反今公爲誰守乎陛下受命平定燕趙盡有幽冀之地百姓歸心賢俊雲集誅討羣賊所向破滅今北方清靜振大兵來攻洛陽正使公有連城之守猶不足當今保一城欲何望乎鮪曰大司徒被害時鮪與其謀誠自知罪深故不敢降世祖曰夫建大事者不思小怨今降官爵可保况誅罰乎河氷在此吾不食言彭以告鮪辛卯鮪降以爲平狄將軍扶溝侯冬十月癸丑上都洛陽宫十一月蘇茂降旣而奔劉永永以爲淮陽王十二月赤眉去長安西畧郡縣後漢灮武皇帝紀卷第三
